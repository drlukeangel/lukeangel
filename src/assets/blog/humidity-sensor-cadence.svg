<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="Three sensor generations by reporting cadence">
  <rect width="760" height="320" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- three rows, sparser to denser report ticks down the page -->
  <!-- row 1: 5 min, very sparse -->
  <g transform="translate(40,60)">
    <circle cx="14" cy="0" r="13" fill="#fdfaf2" stroke="#7a808c" stroke-width="4"/>
    <text x="48" y="-4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#1a1d24">Aeotec MS6</text>
    <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">5 min · lags the shower</text>
    <line x1="270" y1="6" x2="700" y2="6" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.25"/>
    <g fill="#7a808c">
      <circle cx="290" cy="6" r="5"/><circle cx="430" cy="6" r="5"/><circle cx="570" cy="6" r="5"/><circle cx="700" cy="6" r="5"/>
    </g>
  </g>

  <!-- row 2: 30s, medium -->
  <g transform="translate(40,150)">
    <circle cx="14" cy="0" r="13" fill="#fdfaf2" stroke="#6a4c93" stroke-width="4"/>
    <text x="48" y="-4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#1a1d24">Aqara WSDCGQ</text>
    <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">~30 s · reads a touch high</text>
    <line x1="270" y1="6" x2="700" y2="6" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.25"/>
    <g fill="#6a4c93">
      <circle cx="290" cy="6" r="5"/><circle cx="350" cy="6" r="5"/><circle cx="410" cy="6" r="5"/><circle cx="470" cy="6" r="5"/><circle cx="530" cy="6" r="5"/><circle cx="590" cy="6" r="5"/><circle cx="650" cy="6" r="5"/><circle cx="700" cy="6" r="5"/>
    </g>
  </g>

  <!-- row 3: 5s, dense -->
  <g transform="translate(40,240)">
    <circle cx="14" cy="0" r="13" fill="#fdfaf2" stroke="#3a7d44" stroke-width="4"/>
    <text x="48" y="-4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#1a1d24">DIY SHT31</text>
    <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">5 s · calibrated, tracks live</text>
    <line x1="270" y1="6" x2="700" y2="6" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.25"/>
    <g fill="#3a7d44">
      <circle cx="290" cy="6" r="4.5"/><circle cx="320" cy="6" r="4.5"/><circle cx="350" cy="6" r="4.5"/><circle cx="380" cy="6" r="4.5"/><circle cx="410" cy="6" r="4.5"/><circle cx="440" cy="6" r="4.5"/><circle cx="470" cy="6" r="4.5"/><circle cx="500" cy="6" r="4.5"/><circle cx="530" cy="6" r="4.5"/><circle cx="560" cy="6" r="4.5"/><circle cx="590" cy="6" r="4.5"/><circle cx="620" cy="6" r="4.5"/><circle cx="650" cy="6" r="4.5"/><circle cx="680" cy="6" r="4.5"/><circle cx="700" cy="6" r="4.5"/>
    </g>
  </g>
</svg>
