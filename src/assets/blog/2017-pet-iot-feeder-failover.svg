<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" role="img" aria-label="feeder failover, 2017">
  <rect width="1000" height="400" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#1a1d24">A DUMB BACKUP BEHIND THE SMART FEEDER</text>

  <!-- cloud -->
  <g transform="translate(120,110)">
    <path d="M0 28 a26 26 0 0 1 8 -51 a34 34 0 0 1 64 4 a24 24 0 0 1 2 47 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="2"/>
    <text x="40" y="6" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">PETNET CLOUD</text>
  </g>
  <text x="160" y="180" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#c14a3a">2 single-day outages this year</text>

  <!-- arrow cloud -> smart feeder -->
  <line x1="160" y1="195" x2="160" y2="232" stroke="#7a808c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 z" fill="#7a808c"/>
    </marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 z" fill="#3a7d44"/>
    </marker>
  </defs>

  <!-- smart feeder -->
  <g transform="translate(90,242)">
    <rect x="0" y="0" width="140" height="86" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="86" rx="3" fill="#c87533"/>
    <text x="76" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#1a1d24">PETNET</text>
    <text x="76" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">Wi-Fi + cloud</text>
    <text x="76" y="70" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">scheduled feeds</text>
  </g>
  <text x="160" y="354" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">fails when the cloud does</text>

  <!-- failover bracket -->
  <text x="500" y="155" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">if Petnet misses a feed for Joule&#8230;</text>
  <line x1="270" y1="285" x2="560" y2="285" stroke="#3a7d44" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="415" y="276" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#3a7d44">failover</text>

  <!-- dumb feeder -->
  <g transform="translate(600,242)">
    <rect x="0" y="0" width="160" height="86" rx="10" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="80" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#1a1d24">MECHANICAL TIMER</text>
    <text x="80" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">no Wi-Fi, no cloud</text>
    <text x="80" y="70" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">spring + clock</text>
  </g>
  <text x="680" y="354" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#3a7d44">feeds regardless of the network</text>

  <!-- a clock glyph on dumb feeder -->
  <g transform="translate(792,265)">
    <circle cx="0" cy="0" r="20" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#3a7d44" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="9" y2="4" stroke="#3a7d44" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
