<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="2016 household device split">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#1a1d24">WHAT'S ON EACH ANIMAL, END OF 2016</text>

  <!-- divider -->
  <line x1="500" y1="78" x2="500" y2="356" stroke="#1a1d24" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- DOG column -->
  <text x="40" y="104" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c87533">ATOM — DOG SIDE (MATURING)</text>

  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">
    <!-- check rows -->
    <g transform="translate(40,134)">
      <circle cx="11" cy="-4" r="11" fill="#3a7d44"/>
      <path d="M5 -4 l4 5 l9 -11" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="1">2013 Whistle activity + FitBark</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">redundant, no subscription</text>
    </g>
    <g transform="translate(40,184)">
      <circle cx="11" cy="-4" r="11" fill="#c14a3a"/>
      <path d="M6 -9 l10 10 M16 -9 l-10 10" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round"/>
      <text x="32" y="1">Whistle GPS cellular (shelved)</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">3-4 day battery, subscription bricks it</text>
    </g>
    <g transform="translate(40,234)">
      <circle cx="11" cy="-4" r="11" fill="#3a7d44"/>
      <path d="M5 -4 l4 5 l9 -11" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="1">Petnet SmartFeeder (shared)</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">a full year on, occasional missed feed</text>
    </g>
    <g transform="translate(40,284)">
      <circle cx="11" cy="-4" r="11" fill="#3a7d44"/>
      <path d="M5 -4 l4 5 l9 -11" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="1">Furbo treat-cam (Aug)</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">too new to review yet</text>
    </g>
  </g>

  <!-- CAT column -->
  <text x="540" y="104" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#5b616b">JOULE — CAT SIDE (STALLED)</text>

  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">
    <g transform="translate(540,134)">
      <circle cx="11" cy="-4" r="11" fill="#3a7d44"/>
      <path d="M5 -4 l4 5 l9 -11" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="1">SureFlap microchip door</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">100% read reliability, 18 months</text>
    </g>
    <g transform="translate(540,184)">
      <rect x="2" y="-13" width="18" height="18" rx="3" fill="#fdfaf2" stroke="#c87533" stroke-width="2"/>
      <path d="M6 -4 l4 5 l8 -10" fill="none" stroke="#c87533" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 2"/>
      <text x="32" y="1">SureFlap connected hub</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">announced; ship slipped to 2017</text>
    </g>
    <g transform="translate(540,234)">
      <circle cx="11" cy="-4" r="11" fill="none" stroke="#7a808c" stroke-width="2" stroke-dasharray="3 3"/>
      <text x="32" y="1" fill="#7a808c">no tracker</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">no credible cat-fitness device exists</text>
    </g>
    <g transform="translate(540,284)">
      <circle cx="11" cy="-4" r="11" fill="none" stroke="#7a808c" stroke-width="2" stroke-dasharray="3 3"/>
      <text x="32" y="1" fill="#7a808c">no health sensing</text>
      <text x="32" y="20" font-size="11.5" fill="#7a808c">the cat side stays thin</text>
    </g>
  </g>

  <!-- footer -->
  <line x1="40" y1="348" x2="960" y2="348" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="1.5"/>
  <text x="40" y="380" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">Four boxes ticked on the dog, one-and-a-half on the cat. The maturity gap is the whole year.</text>
</svg>
