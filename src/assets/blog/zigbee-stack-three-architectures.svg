<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Three Zigbee stack architectures">
  <rect width="1000" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .edge { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 10.5px; fill: #6a4c93; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">SAME RADIO, THREE WAYS TO REACH HOME ASSISTANT — COUNT THE HOPS</text>

  <!-- column headers: stick | ... | HA -->
  <!-- shared: a coordinator on the left of each row, HA on the right -->

  <!-- ROW 1: ZHA (direct) -->
  <g transform="translate(0,70)">
    <text x="40" y="14" class="lbl">ZHA</text>
    <rect x="40" y="24" width="120" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="100" y="51" text-anchor="middle" class="sub">CC2652 stick</text>
    <!-- direct arrow to HA -->
    <line x1="160" y1="46" x2="786" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M786 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <text x="460" y="36" text-anchor="middle" class="edge">HA core drives the USB directly — no add-on</text>
    <rect x="790" y="24" width="150" height="44" rx="7" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="865" y="51" text-anchor="middle" class="sub">Home Assistant</text>
  </g>

  <!-- ROW 2: deCONZ (one relay) -->
  <g transform="translate(0,180)">
    <text x="40" y="14" class="lbl">deCONZ</text>
    <rect x="40" y="24" width="120" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="100" y="51" text-anchor="middle" class="sub">ConBee II</text>
    <!-- to deCONZ service -->
    <line x1="160" y1="46" x2="406" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M406 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <rect x="410" y="24" width="150" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="485" y="44" text-anchor="middle" class="sub">deCONZ / Phoscon</text><text x="485" y="60" text-anchor="middle" class="sub">add-on</text>
    <!-- websocket to HA -->
    <line x1="560" y1="46" x2="786" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M786 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <text x="673" y="36" text-anchor="middle" class="edge">WebSocket</text>
    <rect x="790" y="24" width="150" height="44" rx="7" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="865" y="51" text-anchor="middle" class="sub">Home Assistant</text>
  </g>

  <!-- ROW 3: Z2M (broker relay) -->
  <g transform="translate(0,290)">
    <text x="40" y="14" class="lbl">Zigbee2MQTT</text>
    <rect x="40" y="24" width="120" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="100" y="51" text-anchor="middle" class="sub">CC2652 stick</text>
    <line x1="160" y1="46" x2="306" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M306 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <rect x="310" y="24" width="130" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="375" y="44" text-anchor="middle" class="sub">Z2M (Node.js)</text><text x="375" y="60" text-anchor="middle" class="sub">add-on</text>
    <!-- to broker -->
    <line x1="440" y1="46" x2="556" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M556 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <circle cx="600" cy="46" r="26" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.4"/><text x="600" y="50" text-anchor="middle" class="sub">broker</text>
    <!-- broker to HA -->
    <line x1="626" y1="46" x2="786" y2="46" stroke="#6a4c93" stroke-width="2.6"/><path d="M786 46 l-10 -5 v10 z" fill="#6a4c93"/>
    <text x="700" y="36" text-anchor="middle" class="edge">MQTT</text>
    <rect x="790" y="24" width="150" height="44" rx="7" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="865" y="51" text-anchor="middle" class="sub">Home Assistant</text>
  </g>

  <text x="500" y="430" text-anchor="middle" class="cap">More hops buy you things: deCONZ adds a polished UI; Z2M's broker hop is the same bus every other device already rides.</text>
</svg>
