<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The year's three pet-IoT highlights">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#c87533"/>

  <!-- three text-free highlight cards -->

  <!-- CARD 1: DIY ESP32 board (the DIY era arrived) -->
  <g transform="translate(130,200)">
    <rect x="0" y="0" width="280" height="230" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(140,115)">
      <rect x="-58" y="-42" width="116" height="84" rx="8" fill="#1a1d24"/>
      <rect x="-40" y="-26" width="46" height="34" rx="4" fill="#fdfaf2" opacity="0.9"/>
      <path d="M18 -28 h22 v10 h-16 v10 h16" fill="none" stroke="#c87533" stroke-width="3"/>
      <g fill="#c87533">
        <rect x="-46" y="46" width="6" height="14"/><rect x="-30" y="46" width="6" height="14"/><rect x="-14" y="46" width="6" height="14"/><rect x="2" y="46" width="6" height="14"/><rect x="18" y="46" width="6" height="14"/><rect x="34" y="46" width="6" height="14"/>
      </g>
    </g>
  </g>

  <!-- CARD 2: the divest handoff (Mars → Tractive) -->
  <g transform="translate(460,200)">
    <rect x="0" y="0" width="280" height="230" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- big block (empire) shedding a small puck to a small block -->
    <rect x="40" y="80" width="64" height="80" rx="8" fill="#1a1d24" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(140,118)">
      <path d="M-16 -2 H16" stroke="#1a1d24" stroke-width="4"/>
      <path d="M22 -2 l-12 -7 v14 z" fill="#1a1d24"/>
    </g>
    <rect x="176" y="96" width="64" height="56" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="208" cy="124" r="15" fill="#c87533"/>
    <g stroke="#fdfaf2" stroke-width="2.4" fill="none"><path d="M220 116 a13 13 0 0 1 0 16"/></g>
    <!-- small paw under recipient -->
    <g transform="translate(208,170)" fill="#1a1d24" fill-opacity="0.4">
      <circle cx="0" cy="4" r="7"/><circle cx="-10" cy="-6" r="4"/><circle cx="0" cy="-11" r="4"/><circle cx="10" cy="-6" r="4"/>
    </g>
  </g>

  <!-- CARD 3: the long-arc retrospective (a settled arc) -->
  <g transform="translate(790,200)">
    <rect x="0" y="0" width="280" height="230" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M36 170 C110 96, 170 96, 244 150" fill="none" stroke="#1a1d24" stroke-width="3.5" opacity="0.7"/>
    <circle cx="36" cy="170" r="6" fill="#c87533"/>
    <circle cx="140" cy="106" r="6" fill="#c87533"/>
    <circle cx="244" cy="150" r="6" fill="#1a1d24"/>
    <!-- small year ticks as plain marks (no text) -->
    <g stroke="#1a1d24" stroke-width="2" opacity="0.2">
      <line x1="36" y1="186" x2="36" y2="196"/>
      <line x1="140" y1="186" x2="140" y2="196"/>
      <line x1="244" y1="186" x2="244" y2="196"/>
    </g>
  </g>
</svg>
