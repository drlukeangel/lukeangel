<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">2025 Pet IoT Year in Review cover</title>
  <desc id="d">2025-era cover graphic for the pet-IoT year in review — gradient backdrop with three column highlights: DIY pet feeder built, Mars divested Whistle to Tractive, twelve-year long-arc retrospective published.</desc>
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c87533"/>
      <stop offset="60%" stop-color="#a85d28"/>
      <stop offset="100%" stop-color="#4a2d18"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <g fill="#fdfaf2" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="80" y="80" font-size="20" letter-spacing="6" opacity="0.7">PET IOT · YEAR IN REVIEW</text>
    <text x="80" y="200" font-size="140" font-weight="500" letter-spacing="-3">2025</text>
    <text x="80" y="280" font-size="36" font-weight="300">The DIY era, properly arrived.</text>
  </g>

  <!-- Three highlight cards -->
  <g transform="translate(80,360)">
    <!-- DIY -->
    <g transform="translate(0,0)">
      <rect width="340" height="200" rx="12" fill="#fdfaf2" opacity="0.95"/>
      <text x="20" y="36" fill="#c87533" font-family="'JetBrains Mono',monospace" font-size="13" letter-spacing="3">№ 01 · DIY</text>
      <text x="20" y="80" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">ESP32 pet feeder</text>
      <text x="20" y="108" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">shipped</text>
      <text x="20" y="146" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">$35 in parts, zero subscription,</text>
      <text x="20" y="166" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">Home Assistant integration.</text>
      <text x="20" y="186" fill="#9aa3ad" font-family="'JetBrains Mono',monospace" font-size="11">no vendor cloud · zero hours of downtime</text>
    </g>

    <!-- Mars/Tractive -->
    <g transform="translate(360,0)">
      <rect width="340" height="200" rx="12" fill="#fdfaf2" opacity="0.95"/>
      <text x="20" y="36" fill="#dc2626" font-family="'JetBrains Mono',monospace" font-size="13" letter-spacing="3">№ 02 · UPSET OF THE YEAR</text>
      <text x="20" y="80" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">Mars divests</text>
      <text x="20" y="108" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">Whistle → Tractive</text>
      <text x="20" y="146" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">Two forecasts inverted on a</text>
      <text x="20" y="166" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">single July announcement.</text>
      <text x="20" y="186" fill="#9aa3ad" font-family="'JetBrains Mono',monospace" font-size="11">9 years after acquiring · cloud dark Aug 31</text>
    </g>

    <!-- Retrospective -->
    <g transform="translate(720,0)">
      <rect width="340" height="200" rx="12" fill="#fdfaf2" opacity="0.95"/>
      <text x="20" y="36" fill="#2a52be" font-family="'JetBrains Mono',monospace" font-size="13" letter-spacing="3">№ 03 · LONG ARC</text>
      <text x="20" y="80" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">Twelve years,</text>
      <text x="20" y="108" fill="#1a1d24" font-family="'Inter',Arial" font-size="26" font-weight="600">four pets, five eras</text>
      <text x="20" y="146" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">Atom (2013-2024), Joule, Boson,</text>
      <text x="20" y="166" fill="#5a6470" font-family="'Inter',Arial" font-size="15" font-style="italic">Quark. Lessons written down.</text>
      <text x="20" y="186" fill="#9aa3ad" font-family="'JetBrains Mono',monospace" font-size="11">~$8k in devices · mostly worth it</text>
    </g>
  </g>

  <text x="80" y="608" fill="#fdfaf2" opacity="0.55" font-family="'JetBrains Mono',monospace" font-size="13" letter-spacing="4">LUKEANGEL.CO · PET IOT FIELD GUIDE · NB № 42</text>
</svg>
