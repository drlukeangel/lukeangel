<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Ceiling smoke detector">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- ceiling line -->
  <line x1="120" y1="150" x2="1080" y2="150" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>

  <!-- detector body, ceiling-mounted -->
  <ellipse cx="600" cy="150" rx="150" ry="20" fill="#1a1d24" fill-opacity="0.06"/>
  <path d="M450 150 a150 150 0 0 1 300 0 z" fill="#f3eee0" stroke="#1a1d24" stroke-width="4"/>
  <ellipse cx="600" cy="150" rx="150" ry="6" fill="#1a1d24" fill-opacity="0.12"/>
  <!-- vent slots -->
  <path d="M520 196 a90 90 0 0 1 160 0" fill="none" stroke="#7a808c" stroke-width="3"/>
  <path d="M540 214 a70 70 0 0 1 120 0" fill="none" stroke="#7a808c" stroke-width="3"/>
  <!-- center status LED -->
  <circle cx="600" cy="186" r="13" fill="#c14a3a"/>
  <circle cx="600" cy="186" r="22" fill="none" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="3"/>

  <!-- smoke rising from below -->
  <path d="M600 470 q-40 -60 0 -120 q40 -60 0 -120 q-30 -50 0 -84" fill="none" stroke="#7a808c" stroke-width="9" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M650 480 q-30 -50 0 -110 q34 -56 4 -120" fill="none" stroke="#7a808c" stroke-width="7" stroke-linecap="round" stroke-opacity="0.35"/>
  <path d="M548 478 q-26 -46 2 -104 q-26 -44 2 -96" fill="none" stroke="#7a808c" stroke-width="7" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- radio pulse to the right (Z-Wave secondary path) -->
  <g stroke="#6a4c93" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M770 130 a50 50 0 0 1 0 100"/>
    <path d="M800 110 a85 85 0 0 1 0 140"/>
    <path d="M830 92 a118 118 0 0 1 0 176"/>
  </g>
  <circle cx="752" cy="180" r="9" fill="#6a4c93"/>

  <!-- hub/node receiving -->
  <rect x="920" y="430" width="150" height="100" rx="12" fill="#f3eee0" stroke="#1a1d24" stroke-width="4"/>
  <circle cx="950" cy="460" r="7" fill="#3a7d44"/>
  <rect x="936" y="490" width="118" height="9" rx="4" fill="#1a1d24" fill-opacity="0.2"/>
  <rect x="936" y="506" width="80" height="9" rx="4" fill="#1a1d24" fill-opacity="0.2"/>
  <path d="M845 250 Q905 360 936 440" fill="none" stroke="#6a4c93" stroke-width="4" stroke-dasharray="3 10" stroke-linecap="round"/>
</svg>
