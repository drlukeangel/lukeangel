<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="No-neutral trickle current">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- TOP: normal switch (needs neutral) -->
    <text x="60" y="60" font-size="15">normal switch — interrupts the circuit</text>
    <g transform="translate(80 90)">
      <!-- hot -->
      <line x1="0" y1="20" x2="120" y2="20" stroke="#1a1d24" stroke-width="3"/>
      <!-- switch open gap -->
      <circle cx="120" cy="20" r="4" fill="#1a1d24"/>
      <line x1="120" y1="20" x2="160" y2="4" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="170" cy="20" r="4" fill="#1a1d24"/>
      <line x1="170" y1="20" x2="290" y2="20" stroke="#1a1d24" stroke-width="3"/>
      <!-- bulb -->
      <circle cx="330" cy="20" r="22" fill="#c87533" fill-opacity="0.18" stroke="#1a1d24" stroke-width="3"/><circle cx="330" cy="20" r="7" fill="#c87533" fill-opacity="0.4"/>
      <line x1="352" y1="20" x2="470" y2="20" stroke="#1a1d24" stroke-width="3"/>
      <text x="120" y="62" font-size="12" fill="#5b616b">open = off, fully dead</text>
      <text x="500" y="24" font-size="12" fill="#5b616b">needs a neutral to run any electronics</text>
    </g>

    <line x1="60" y1="190" x2="940" y2="190" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="4 8"/>

    <!-- BOTTOM: no-neutral switch (trickle) -->
    <text x="60" y="235" font-size="15" fill="#6a4c93">no-neutral switch — trickles through the bulb</text>
    <g transform="translate(80 270)">
      <line x1="0" y1="20" x2="110" y2="20" stroke="#1a1d24" stroke-width="3"/>
      <!-- switch electronics box, always passing a trickle -->
      <rect x="110" y="0" width="60" height="40" rx="6" fill="#6a4c93" fill-opacity="0.15" stroke="#6a4c93" stroke-width="3"/>
      <text x="140" y="62" font-size="11" fill="#6a4c93">MCU + radio</text>
      <!-- trickle dots through to bulb -->
      <g fill="#c87533"><circle cx="200" cy="20" r="4"/><circle cx="235" cy="20" r="4"/><circle cx="270" cy="20" r="4"/><circle cx="305" cy="20" r="4"/></g>
      <circle cx="345" cy="20" r="22" fill="#c87533" fill-opacity="0.18" stroke="#1a1d24" stroke-width="3"/><circle cx="345" cy="20" r="7" fill="#c87533" fill-opacity="0.4"/>
      <line x1="367" y1="20" x2="470" y2="20" stroke="#1a1d24" stroke-width="3"/>
      <text x="200" y="-2" font-size="11" fill="#c87533">~5–10 mA continuous</text>
      <text x="500" y="16" font-size="12" fill="#5b616b">harvests power even while the light reads "off"</text>
      <text x="500" y="36" font-size="12" fill="#c14a3a">side effect: some cheap LED drivers flicker</text>
    </g>

    <text x="500" y="392" text-anchor="middle" font-size="13" fill="#5b616b">no neutral in the box → power the switch through the load instead — hence the tested-bulb list</text>
  </g>
</svg>
