<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-label="Software interconnect via the hub">
  <rect width="860" height="360" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- detector that fired (left) -->
  <rect x="40" y="150" width="150" height="70" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  <circle cx="72" cy="185" r="12" fill="#c14a3a"/>
  <text x="120" y="180" font-family="ui-monospace, monospace" font-size="13" fill="#1a1d24" text-anchor="middle">basement</text>
  <text x="120" y="200" font-family="ui-monospace, monospace" font-size="13" fill="#c14a3a" text-anchor="middle">FIRED</text>

  <!-- HA hub (center) -->
  <rect x="350" y="145" width="160" height="80" rx="10" fill="#f3eee0" stroke="#6a4c93" stroke-width="3"/>
  <text x="430" y="180" font-family="ui-monospace, monospace" font-size="14" fill="#1a1d24" text-anchor="middle">Home</text>
  <text x="430" y="200" font-family="ui-monospace, monospace" font-size="14" fill="#1a1d24" text-anchor="middle">Assistant</text>

  <!-- fired -> hub -->
  <path d="M190 185 H350" fill="none" stroke="#c14a3a" stroke-width="4" marker-end="url(#r)"/>
  <text x="270" y="172" font-family="ui-monospace, monospace" font-size="11" fill="#5b616b" text-anchor="middle">state: on</text>

  <!-- hub -> two others (test-alarm) -->
  <path d="M510 170 C620 120 660 90 700 100" fill="none" stroke="#6a4c93" stroke-width="4" stroke-dasharray="6 6" marker-end="url(#p)"/>
  <path d="M510 200 C620 250 660 280 700 270" fill="none" stroke="#6a4c93" stroke-width="4" stroke-dasharray="6 6" marker-end="url(#p)"/>
  <text x="610" y="200" font-family="ui-monospace, monospace" font-size="11" fill="#6a4c93" text-anchor="middle">test-alarm</text>

  <rect x="700" y="75" width="120" height="60" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="728" cy="105" r="9" fill="#6a4c93"/>
  <text x="772" y="110" font-family="ui-monospace, monospace" font-size="13" fill="#1a1d24" text-anchor="middle">upstairs</text>

  <rect x="700" y="240" width="120" height="60" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="728" cy="270" r="9" fill="#6a4c93"/>
  <text x="772" y="275" font-family="ui-monospace, monospace" font-size="13" fill="#1a1d24" text-anchor="middle">living rm</text>

  <text x="430" y="320" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="#7a808c" text-anchor="middle">network-dependent: only the detector that saw smoke is guaranteed to sound</text>

  <defs>
    <marker id="r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#c14a3a"/></marker>
    <marker id="p" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#6a4c93"/></marker>
  </defs>
</svg>
