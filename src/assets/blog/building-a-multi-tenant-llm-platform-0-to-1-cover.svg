<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Three isolated tenant lanes feed a shared platform layer guarded by an evaluation gate; the platform sits on a dashed abstraction line above a row of interchangeable model blocks, one selected">
  <defs>
    <pattern id="mt-dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.1" fill="#d9d3e6"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#faf7ee"/>
  <rect width="1200" height="630" fill="url(#mt-dots)"/>
  <rect width="14" height="630" fill="#4f46b8"/>

  <!-- tenant lanes -->
  <g>
    <g transform="translate(250,70)">
      <rect width="200" height="86" rx="12" fill="#ece9f7" stroke="#4f46b8" stroke-width="2.5"/>
      <rect x="84" y="26" width="32" height="24" rx="5" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <path d="M90 26 v-7 a10 10 0 0 1 20 0 v7" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <circle cx="100" cy="38" r="3.5" fill="#4f46b8"/>
    </g>
    <g transform="translate(500,70)">
      <rect width="200" height="86" rx="12" fill="#e9f0ec" stroke="#4f46b8" stroke-width="2.5"/>
      <rect x="84" y="26" width="32" height="24" rx="5" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <path d="M90 26 v-7 a10 10 0 0 1 20 0 v7" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <circle cx="100" cy="38" r="3.5" fill="#4f46b8"/>
    </g>
    <g transform="translate(750,70)">
      <rect width="200" height="86" rx="12" fill="#f6ecec" stroke="#4f46b8" stroke-width="2.5"/>
      <rect x="84" y="26" width="32" height="24" rx="5" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <path d="M90 26 v-7 a10 10 0 0 1 20 0 v7" fill="none" stroke="#4f46b8" stroke-width="3"/>
      <circle cx="100" cy="38" r="3.5" fill="#4f46b8"/>
    </g>
  </g>

  <!-- tenant -> gate arrows -->
  <g stroke="#6a655c" stroke-width="2.5" fill="none">
    <path d="M350 156 C350 200 600 200 600 222" marker-end="url(#mt-arr)"/>
    <path d="M600 156 L600 222" marker-end="url(#mt-arr)"/>
    <path d="M850 156 C850 200 600 200 600 222" marker-end="url(#mt-arr)"/>
  </g>
  <defs><marker id="mt-arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6a655c"/></marker></defs>

  <!-- eval gate (diamond + check) -->
  <g transform="translate(600,260)">
    <rect x="-34" y="-34" width="68" height="68" rx="8" transform="rotate(45)" fill="#fffdf8" stroke="#4f46b8" stroke-width="3"/>
    <path d="M-16 2 L-4 15 L18 -14" fill="none" stroke="#3a7d44" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <line x1="600" y1="294" x2="600" y2="324" stroke="#6a655c" stroke-width="2.5"/>

  <!-- platform layer -->
  <rect x="220" y="324" width="760" height="76" rx="14" fill="#4f46b8"/>
  <rect x="244" y="348" width="712" height="28" rx="8" fill="#ffffff" opacity="0.18"/>

  <!-- dashed abstraction line -->
  <line x1="220" y1="424" x2="980" y2="424" stroke="#4f46b8" stroke-width="3" stroke-dasharray="10 8"/>

  <!-- interchangeable model blocks -->
  <g>
    <rect x="250" y="462" width="150" height="74" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <rect x="430" y="462" width="150" height="74" rx="10" fill="#ece9f7" stroke="#4f46b8" stroke-width="3.5"/>
    <rect x="610" y="462" width="150" height="74" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <rect x="790" y="462" width="150" height="74" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <!-- swap arrows -->
    <g stroke="#6a655c" stroke-width="2.2" fill="none">
      <path d="M405 499 L425 499" marker-end="url(#mt-arr)"/>
      <path d="M585 499 L605 499" marker-end="url(#mt-arr)"/>
      <path d="M765 499 L785 499" marker-end="url(#mt-arr)"/>
    </g>
  </g>
</svg>
