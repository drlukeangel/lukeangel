<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="how the vitals are derived">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#1a1d24">A VITAL SIGN OUT OF AN ACCELEROMETER, NOT AN ELECTRODE</text>

  <!-- step 1: collar at rest -->
  <g transform="translate(60,110)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="120" rx="3" fill="#c87533"/>
    <text x="103" y="28" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#1a1d24">PET AT REST</text>
    <!-- micro-motion trace -->
    <path d="M22 78 q6 -10 12 0 q6 10 12 0 q6 -10 12 0 q6 10 12 0 q6 -10 12 0 q6 10 12 0 q6 -10 12 0 q6 10 12 0 q6 -10 12 0 q6 10 12 0 q6 -10 12 0"
      fill="none" stroke="#c87533" stroke-width="2"/>
    <text x="103" y="106" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">accelerometer micro-motion</text>
  </g>

  <line x1="268" y1="170" x2="328" y2="170" stroke="#7a808c" stroke-width="2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 z" fill="#7a808c"/>
    </marker>
  </defs>

  <!-- step 2: separate two rhythms -->
  <g transform="translate(336,110)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="110" y="26" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#1a1d24">SEPARATE TWO RHYTHMS</text>
    <!-- fast = heart -->
    <path d="M16 56 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0 q3 -8 6 0 q3 8 6 0"
      fill="none" stroke="#c14a3a" stroke-width="2"/>
    <text x="200" y="60" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#c14a3a">fast = heart</text>
    <!-- slow = breath -->
    <path d="M16 96 q22 -22 44 0 q22 22 44 0 q22 -22 44 0 q22 22 44 0"
      fill="none" stroke="#357a8c" stroke-width="2"/>
    <text x="200" y="104" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#357a8c">slow = breath</text>
  </g>

  <line x1="564" y1="170" x2="624" y2="170" stroke="#7a808c" stroke-width="2" marker-end="url(#ar)"/>

  <!-- step 3: compare to baseline -->
  <g transform="translate(632,110)">
    <rect x="0" y="0" width="300" height="120" rx="10" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="150" y="26" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#1a1d24">TREND vs PER-PET BASELINE</text>
    <!-- baseline band -->
    <rect x="24" y="58" width="252" height="22" rx="5" fill="#3a7d44" fill-opacity="0.12"/>
    <line x1="24" y1="69" x2="276" y2="69" stroke="#3a7d44" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="282" y="73" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#3a7d44"></text>
    <!-- resting trend dots -->
    <circle cx="48" cy="72" r="3" fill="#3a7d44"/>
    <circle cx="96" cy="66" r="3" fill="#3a7d44"/>
    <circle cx="144" cy="70" r="3" fill="#3a7d44"/>
    <circle cx="192" cy="64" r="3" fill="#3a7d44"/>
    <circle cx="240" cy="68" r="3" fill="#3a7d44"/>
    <text x="150" y="104" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">resting HR + resp rate, baselined</text>
  </g>

  <!-- footer -->
  <line x1="40" y1="288" x2="960" y2="288" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="1.5"/>
  <text x="40" y="320" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">Inferred from motion at rest &#8212; not measured by a chest electrode.</text>
  <text x="40" y="348" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">But it's a genuine vital sign, trended against the individual animal &#8212; the thing a decade of giants never shipped.</text>
  <text x="40" y="380" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">Tractive, May 2025 &#8212; free to existing trackers, including the cats' GPS Cat Minis.</text>
</svg>
