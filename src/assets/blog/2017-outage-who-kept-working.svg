<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 410" width="1080" height="410" role="img" aria-label="During the November cloud outage, cloud-dependent automations stopped while local ones kept firing.">
  <rect width="1080" height="410" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE NOVEMBER OUTAGE — WHO KEPT WORKING</text>

  <!-- the cloud, down, center top -->
  <g transform="translate(470,64)">
    <path d="M44 70 a26 26 0 0 1 4 -50 a32 32 0 0 1 60 6 a22 22 0 0 1 -2 44 z" fill="#7a808c" fill-opacity="0.14" stroke="#7a808c" stroke-width="3" stroke-dasharray="6 5"/>
    <g transform="translate(74,40)" stroke="#c14a3a" stroke-width="3.5" fill="none" stroke-linecap="round"><path d="M-13 -5 a18 18 0 1 0 26 0"/><line x1="0" y1="-16" x2="0" y2="3"/></g>
    <text x="74" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c14a3a">SmartThings cloud — down a few hours</text>
  </g>

  <line x1="540" y1="172" x2="540" y2="332" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- LEFT: cloud-dependent home (dark) -->
  <text x="270" y="196" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12.5" fill="#c14a3a">cloud-dependent automations</text>
  <g transform="translate(205,210)">
    <path d="M24 64 L112 24 L200 64 L200 150 L24 150 Z" fill="#1a1d24" fill-opacity="0.06" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <rect x="56" y="88" width="40" height="40" rx="4" fill="#1a1d24" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2.4"/>
    <rect x="128" y="88" width="40" height="40" rx="4" fill="#1a1d24" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2.4"/>
    <!-- broken link up to cloud -->
    <line x1="150" y1="28" x2="250" y2="-26" stroke="#c14a3a" stroke-width="2.6" stroke-dasharray="3 7"/>
  </g>
  <text x="270" y="384" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">lights dead, rules silent</text>

  <!-- RIGHT: my local home (lit) -->
  <text x="810" y="196" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12.5" fill="#3a7d44">my house — local on the Pi</text>
  <g transform="translate(665,210)">
    <path d="M24 64 L112 24 L200 64 L200 150 L24 150 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <path d="M24 64 L112 24 L200 64" fill="none" stroke="#6a4c93" stroke-width="4.5" stroke-linejoin="round"/>
    <rect x="56" y="88" width="40" height="40" rx="4" fill="#c87533" fill-opacity="0.35" stroke="#1a1d24" stroke-width="2.4"/>
    <rect x="128" y="88" width="40" height="40" rx="4" fill="#c87533" fill-opacity="0.35" stroke="#1a1d24" stroke-width="2.4"/>
    <circle cx="112" cy="138" r="6" fill="#3a7d44"/>
  </g>
  <text x="810" y="384" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44">door-to-light rules kept firing</text>
</svg>
