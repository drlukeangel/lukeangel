<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t d">
  <title id="t">Good fast cheap — which corner gives when you pick the other two</title>
  <desc id="d">2020-era flat triangle diagram with three labeled corners — Good, Fast, Cheap. Three smaller triangles below show what happens when you pick each pair of two and which corner becomes the compromise.</desc>
  <style>
    .label{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:600;fill:#1a1d24;font-size:13px}
    .small{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .corner{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:700}
  </style>
  <rect width="800" height="380" fill="#f8fafc"/>
  <text x="40" y="34" class="title">Pick two. The third is the compromise.</text>

  <!-- main triangle -->
  <g transform="translate(80,60)">
    <polygon points="120,10 230,200 10,200" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="120" y="5" text-anchor="middle" class="corner" fill="#92400e">GOOD</text>
    <text x="240" y="215" text-anchor="middle" class="corner" fill="#92400e">FAST</text>
    <text x="0" y="215" text-anchor="middle" class="corner" fill="#92400e">CHEAP</text>
    <text x="120" y="120" text-anchor="middle" class="small">all three</text>
    <text x="120" y="136" text-anchor="middle" class="small">= unicorn</text>
  </g>

  <!-- variant 1: good + fast -->
  <g transform="translate(380,60)">
    <polygon points="80,10 150,140 10,140" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="80" y="5" text-anchor="middle" class="corner" fill="#1e3a8a">GOOD</text>
    <text x="160" y="155" text-anchor="middle" class="corner" fill="#1e3a8a">FAST</text>
    <text x="0" y="155" text-anchor="middle" class="corner" fill="#94a3b8" text-decoration="line-through">CHEAP</text>
    <text x="80" y="90" text-anchor="middle" class="small">= expensive</text>
  </g>

  <!-- variant 2: good + cheap -->
  <g transform="translate(580,60)">
    <polygon points="80,10 150,140 10,140" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="80" y="5" text-anchor="middle" class="corner" fill="#14532d">GOOD</text>
    <text x="160" y="155" text-anchor="middle" class="corner" fill="#94a3b8" text-decoration="line-through">FAST</text>
    <text x="0" y="155" text-anchor="middle" class="corner" fill="#14532d">CHEAP</text>
    <text x="80" y="90" text-anchor="middle" class="small">= slow</text>
  </g>

  <!-- variant 3: fast + cheap -->
  <g transform="translate(380,240)">
    <polygon points="80,10 150,120 10,120" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="80" y="5" text-anchor="middle" class="corner" fill="#7f1d1d" text-decoration="line-through">GOOD</text>
    <text x="160" y="135" text-anchor="middle" class="corner" fill="#7f1d1d">FAST</text>
    <text x="0" y="135" text-anchor="middle" class="corner" fill="#7f1d1d">CHEAP</text>
    <text x="80" y="80" text-anchor="middle" class="small">= regrettable</text>
  </g>

  <!-- bottom note -->
  <g transform="translate(80,310)">
    <text x="0" y="14" class="small">Force the customer to pick a ranking *before* kickoff. Otherwise they get to discover it month four — which is later than ideal.</text>
    <text x="0" y="34" class="small">Document the ranking in the charter. Reference it by name when scope-creep conversations begin. *That single discipline saves quarters.*</text>
  </g>
</svg>
