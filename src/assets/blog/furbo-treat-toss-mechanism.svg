<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Treat-toss mechanism">
  <rect width="1000" height="520" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">

    <!-- device cutaway, left -->
    <g transform="translate(70 60)">
      <!-- body outline -->
      <path d="M0 0 h170 v380 h-170 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <!-- hopper of biscuits at top -->
      <path d="M16 16 h138 v70 l-40 26 h-58 l-40 -26 z" fill="#c87533" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2"/>
      <g fill="#c87533">
        <circle cx="50" cy="40" r="8"/><circle cx="86" cy="32" r="8"/><circle cx="122" cy="42" r="8"/>
        <circle cx="68" cy="62" r="8"/><circle cx="104" cy="60" r="8"/>
      </g>
      <text x="85" y="-12" text-anchor="middle" font-size="14" fill="#5b616b">hopper</text>

      <!-- staging chamber with one treat -->
      <rect x="58" y="150" width="54" height="44" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <circle cx="85" cy="172" r="9" fill="#c87533"/>
      <text x="200" y="176" font-size="13" fill="#5b616b">staging chamber</text>

      <!-- spring + paddle -->
      <path d="M30 280 q 10 -12 20 0 q 10 12 20 0 q 10 -12 20 0" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
      <rect x="90" y="266" width="14" height="34" rx="3" fill="#1a1d24"/>
      <text x="30" y="328" font-size="13" fill="#5b616b">spring-loaded paddle</text>

      <!-- exit slot -->
      <rect x="150" y="266" width="24" height="34" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    </g>

    <!-- launch arc out the front -->
    <path d="M250 343 C 430 250, 640 250, 770 400" fill="none" stroke="#c87533" stroke-width="3.5" stroke-dasharray="3 9" stroke-linecap="round"/>
    <circle cx="510" cy="268" r="11" fill="#c87533"/>
    <text x="430" y="240" font-size="14" fill="#1a1d24">~1.5–2 m arc</text>

    <!-- dog at landing -->
    <g transform="translate(800 410)" fill="#1a1d24">
      <path d="M0 0 q 22 -42 64 -36 q 22 8 24 40 l 4 36 l -12 0 l -6 -34 q -16 8 -40 8 l -4 30 l -12 0 l 0 -32 q -28 -6 -38 -30 z"/>
      <circle cx="80" cy="-26" r="3" fill="#fdfaf2"/>
    </g>

    <!-- angle dial -->
    <g transform="translate(300 440)">
      <text x="-30" y="5" font-size="13" fill="#5b616b">3 launch angles:</text>
      <line x1="110" y1="0" x2="160" y2="-26" stroke="#1a1d24" stroke-width="2.5"/>
      <line x1="110" y1="0" x2="166" y2="-6" stroke="#c87533" stroke-width="2.5"/>
      <line x1="110" y1="0" x2="158" y2="16" stroke="#1a1d24" stroke-width="2.5"/>
      <circle cx="110" cy="0" r="4" fill="#1a1d24"/>
    </g>
  </g>
</svg>
