<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- a row of node cards in lifecycle colors -->
  <g stroke-width="5" fill="#fdfaf2">
    <rect x="140" y="270" width="150" height="100" rx="10" stroke="#3a7d44"/>
    <rect x="320" y="270" width="150" height="100" rx="10" stroke="#2a52be"/>
    <rect x="500" y="270" width="150" height="100" rx="10" stroke="#c87533"/>
    <rect x="680" y="270" width="150" height="100" rx="10" stroke="#c14a3a"/>
  </g>
  <!-- dead: a faded tombstone -->
  <rect x="860" y="270" width="150" height="100" rx="10" fill="#1a1d24" fill-opacity="0.06"
        stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3" stroke-dasharray="6 6"/>
  <path d="M895 370 v-55 a40 40 0 0 1 80 0 v55" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>

  <!-- small state dots inside each card -->
  <circle cx="170" cy="300" r="9" fill="#3a7d44"/>
  <circle cx="350" cy="300" r="9" fill="#2a52be"/>
  <circle cx="530" cy="300" r="9" fill="#c87533"/>
  <circle cx="710" cy="300" r="9" fill="#c14a3a"/>

  <!-- shutdown control message arriving at one card from off-canvas -->
  <line x1="600" y1="150" x2="585" y2="262" stroke="#b7410e" stroke-width="4"/>
  <polygon points="585,262 576,247 596,250" fill="#b7410e"/>
  <circle cx="610" cy="140" r="16" fill="#b7410e"/>
</svg>
