<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- booting node on the left, emitting a vertical chain of spans -->
  <circle cx="320" cy="200" r="46" fill="#b7410e"/>
  <g fill="#1a1d24" fill-opacity="0.7">
    <rect x="250" y="300" width="260" height="26" rx="4"/>
    <rect x="270" y="338" width="220" height="26" rx="4"/>
    <rect x="290" y="376" width="180" height="26" rx="4"/>
    <rect x="310" y="414" width="140" height="26" rx="4"/>
  </g>
  <line x1="320" y1="246" x2="320" y2="300" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="3"/>

  <!-- second mesh cluster on the right -->
  <g>
    <g fill="#b7410e">
      <circle cx="840" cy="250" r="24"/>
      <circle cx="960" cy="320" r="30"/>
      <circle cx="900" cy="430" r="24"/>
      <circle cx="1030" cy="430" r="24"/>
    </g>
    <g stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2">
      <line x1="840" y1="250" x2="960" y2="320"/>
      <line x1="960" y1="320" x2="900" y2="430"/>
      <line x1="960" y1="320" x2="1030" y2="430"/>
    </g>
  </g>

  <!-- direct cross-mesh link, no bridge node in between -->
  <line x1="366" y1="200" x2="816" y2="250" stroke="#b7410e" stroke-width="4"
        stroke-dasharray="12 9"/>
  <polygon points="816,250 800,242 800,260" fill="#b7410e"/>
</svg>
