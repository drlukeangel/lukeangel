<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" width="1120" height="520" role="img" aria-label="Three dashboards and four alarms">
  <rect width="1120" height="520" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE DASHBOARDS · FOUR ALARMS · WHO GETS WOKEN UP</text>

  <!-- dashboard 1: fleet health (on-call) -->
  <rect x="40" y="80" width="320" height="200" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
  <text x="64" y="112" font-family="ui-monospace,monospace" font-size="13" fill="#2a52be">DASHBOARD 1 · fleet health</text>
  <text x="64" y="134" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">on-call looks here by default</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <text x="64" y="166">· connected device count</text>
    <text x="64" y="190">· messages / minute</text>
    <text x="64" y="214">· per-device p50 / p95 / p99</text>
    <text x="64" y="238">· MQTT auth failures</text>
    <text x="64" y="262">· ingest Lambda error rate</text>
  </g>

  <!-- dashboard 2: drill-down (diagnosis) -->
  <rect x="40" y="300" width="320" height="180" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="64" y="332" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DASHBOARD 2 · per-device drill-down</text>
  <text x="64" y="354" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">finds the WHICH after 1 says wrong</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <text x="64" y="388">· Contributor Insights</text>
    <text x="64" y="412">· rank thing_name by errors</text>
    <text x="64" y="436">· click → that device's logs</text>
  </g>

  <!-- dashboard 3: pipeline health (engineers) -->
  <rect x="384" y="300" width="320" height="180" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="408" y="332" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DASHBOARD 3 · pipeline health</text>
  <text x="408" y="354" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">engineers, not on-call</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <text x="408" y="388">· IoT Rule SQL failures</text>
    <text x="408" y="412">· Lambda throttles / concurrency</text>
    <text x="408" y="436">· DynamoDB write throttle, p99</text>
  </g>

  <!-- legend: fleet red vs infra red -->
  <text x="408" y="112" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">1 or 2 red → the FLEET is sick</text>
  <text x="408" y="136" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">3 red → the INFRA is sick</text>

  <!-- alarms column -->
  <rect x="728" y="80" width="356" height="400" rx="14" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  <text x="752" y="112" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">FOUR ALARMS · anything more is noise</text>

  <!-- paged alarms -->
  <g>
    <!-- bell icon paged -->
    <g transform="translate(752,140)" stroke="#c14a3a" stroke-width="2.5" fill="none"><path d="M10 4 C 2 4 -2 10 -2 18 L -2 26 L -5 30 L 25 30 L 22 26 L 22 18 C 22 10 18 4 10 4 Z" stroke-linejoin="round"/><path d="M6 34 a 4 4 0 0 0 8 0"/></g>
    <text x="788" y="156" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">PAGE · device count drops &gt;20% / 5m</text>
    <text x="788" y="180" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">PAGE · ingest 5xx &gt;1% / 10m</text>
    <text x="788" y="204" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">PAGE · MQTT auth fails &gt;100 / 5m</text>
  </g>

  <line x1="752" y1="226" x2="1060" y2="226" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- slack-only alarm -->
  <g transform="translate(752,250)" stroke="#7a808c" stroke-width="2.5" fill="none"><rect x="-4" y="-2" width="28" height="22" rx="5"/><path d="M2 6 h16 M2 12 h10"/></g>
  <text x="788" y="266" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">SLACK · p99 latency &gt;2x baseline / 15m</text>
  <text x="788" y="288" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">no page — investigate next morning</text>

  <line x1="752" y1="312" x2="1060" y2="312" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- what's NOT alarmed -->
  <text x="752" y="340" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">NOT alarmed — too noisy to page on:</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">
    <text x="752" y="366">✗ total volume drops</text>
    <text x="752" y="390">✗ a single device offline</text>
    <text x="752" y="414">✗ one Lambda invocation error</text>
  </g>
  <text x="752" y="450" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#7a808c">they live on the dashboards,</text>
  <text x="752" y="470" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#7a808c">they don't fire pages.</text>
</svg>
