<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">Mobile CI/CD with feature flags — dark releases for safer mobile rollouts</title>
  <desc id="d">2016-era flat diagram showing a feature-flag-driven mobile release: ship feature dark behind flag → release to 1% → 10% → 50% → 100%, with rollback at any stage. Trunk-based commit on the left, gradually-enabled flag on the right.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#fff;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .step{font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Feature-flag release — ship dark, ramp gradually, roll back fast</text>

  <!-- Stages -->
  <g transform="translate(40,90)">
    <rect width="130" height="60" fill="#1a1d24" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">1. Commit</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#9aa3ad">behind flag</text>
  </g>
  <line x1="170" y1="120" x2="200" y2="120" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <g transform="translate(210,90)">
    <rect width="130" height="60" fill="#5a6470" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">2. App-store ship</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#fff">flag = off (0%)</text>
  </g>
  <line x1="340" y1="120" x2="370" y2="120" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <g transform="translate(380,90)">
    <rect width="130" height="60" fill="#0066cc" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">3. Internal dogfood</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#cfe0f5">flag = 1% (team)</text>
  </g>
  <line x1="510" y1="120" x2="540" y2="120" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <g transform="translate(550,90)">
    <rect width="130" height="60" fill="#10a37f" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">4. Beta cohort</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#d1fae5">flag = 10%</text>
  </g>

  <!-- Row 2 -->
  <line x1="615" y1="150" x2="615" y2="180" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <g transform="translate(550,190)">
    <rect width="130" height="60" fill="#10a37f" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">5. Half ramp</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#d1fae5">flag = 50%</text>
  </g>
  <line x1="550" y1="220" x2="510" y2="220" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <g transform="translate(380,190)">
    <rect width="130" height="60" fill="#10a37f" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">6. Full release</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#d1fae5">flag = 100%</text>
  </g>

  <!-- Rollback callout -->
  <g transform="translate(40,290)">
    <rect width="720" height="60" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="14" y="22" class="step" fill="#dc2626">⚠ Rollback at any stage</text>
    <text x="14" y="44" class="small">If eval scores or crash rates spike, flip the flag back to a lower percentage. No new app-store submission required. Recovery time in minutes, not days.</text>
  </g>

  <!-- Why it matters -->
  <g transform="translate(40,370)">
    <rect width="720" height="76" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="22" class="step">Why this beats traditional mobile releases</text>
    <text x="14" y="44" class="small">- App-store approval takes 1-7 days · feature-flag flips take seconds. Decouple the deploy from the release.</text>
    <text x="14" y="60" class="small">- Failed feature? Don't roll back the build — just roll back the flag. The fix ships before the user sees the problem.</text>
  </g>
</svg>
