<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Yearly forecast">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- cream background + faint dot pattern -->
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 24px left accent bar (predictions accent) -->
  <rect x="0" y="0" width="24" height="630" fill="#0066cc"/>

  <!-- forecast chart frame: faint baseline + gridlines -->
  <g stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2">
    <line x1="120" y1="430" x2="1110" y2="430"/>
    <line x1="120" y1="350" x2="1110" y2="350"/>
    <line x1="120" y1="270" x2="1110" y2="270"/>
    <line x1="120" y1="190" x2="1110" y2="190"/>
  </g>

  <!-- solid history segment of the forecast trend line (rising) -->
  <polyline points="120,400 230,372 330,388 430,330 540,308 615,250"
            fill="none" stroke="#1a1d24" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- forked dashed projection A (optimistic) -->
  <polyline points="615,250 720,210 830,196 940,160 1060,138"
            fill="none" stroke="#0066cc" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="3 16"/>
  <!-- forked dashed projection B (lower) -->
  <polyline points="615,250 720,272 830,288 940,300 1060,332"
            fill="none" stroke="#0066cc" stroke-opacity="0.55" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="3 16"/>

  <!-- faint fan band between the two projections -->
  <path d="M615,250 L1060,138 L1060,332 Z" fill="#0066cc" fill-opacity="0.05"/>

  <!-- "you-are-here" fork point -->
  <circle cx="615" cy="250" r="16" fill="#fdfaf2" stroke="#0066cc" stroke-width="5"/>
  <circle cx="615" cy="250" r="6" fill="#0066cc"/>
  <line x1="615" y1="266" x2="615" y2="430" stroke="#0066cc" stroke-width="2.5" stroke-dasharray="2 8" stroke-opacity="0.6"/>

  <!-- device row beneath the chart -->
  <g transform="translate(0,478)">
    <!-- AR / smart glasses (prominent, centered) -->
    <g transform="translate(500,0)">
      <!-- left lens -->
      <path d="M40,40 q20,-26 75,-22 q26,2 30,22 q-4,30 -42,32 q-58,2 -63,-32 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
      <!-- right lens -->
      <path d="M260,40 q-20,-26 -75,-22 q-26,2 -30,22 q4,30 42,32 q58,2 63,-32 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
      <!-- bridge -->
      <path d="M145,42 q15,-10 30,0" fill="none" stroke="#1a1d24" stroke-width="4"/>
      <!-- temples -->
      <path d="M38,38 q-26,-2 -34,8" fill="none" stroke="#1a1d24" stroke-width="4"/>
      <path d="M282,38 q26,-2 34,8" fill="none" stroke="#1a1d24" stroke-width="4"/>
      <!-- accent HUD glints on lenses -->
      <rect x="58" y="34" width="34" height="6" rx="3" fill="#0066cc" opacity="0.8"/>
      <rect x="58" y="48" width="22" height="6" rx="3" fill="#0066cc" opacity="0.45"/>
      <rect x="226" y="34" width="34" height="6" rx="3" fill="#0066cc" opacity="0.8"/>
      <rect x="238" y="48" width="22" height="6" rx="3" fill="#0066cc" opacity="0.45"/>
    </g>

    <!-- smart watch (left) -->
    <g transform="translate(150,4)">
      <rect x="20" y="0" width="20" height="22" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <rect x="20" y="78" width="20" height="22" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <rect x="0" y="18" width="60" height="64" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <rect x="10" y="28" width="40" height="44" rx="9" fill="#0066cc" opacity="0.15"/>
      <path d="M30,38 v18 h14" fill="none" stroke="#0066cc" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- smart ring (right) -->
    <g transform="translate(890,18)">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#1a1d24" stroke-width="10"/>
      <circle cx="40" cy="40" r="38" fill="none" stroke="#0066cc" stroke-width="10" stroke-dasharray="40 200" stroke-linecap="round" transform="rotate(-60 40 40)"/>
      <circle cx="40" cy="40" r="22" fill="none" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.18"/>
    </g>

    <!-- earbud (far right) -->
    <g transform="translate(1020,16)">
      <path d="M28,4 q26,2 26,30 q0,16 -14,18 l0,30 q-2,12 -16,10 q-14,-2 -12,-16 q2,-30 8,-58 q4,-22 18,-14 Z"
            fill="#fdfaf2" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="34" cy="30" r="7" fill="#0066cc" opacity="0.7"/>
    </g>
  </g>
</svg>
