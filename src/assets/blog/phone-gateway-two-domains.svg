<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="Two separate trust relationships that never touch. Relationship A, on the left, is device-to-phone established by BLE bonding: a P-256 ECDH exchange under LE Secure Connections yields a long-term key cached on both, so the trust is between two physical objects and the key never leaves them; this relationship dead-ends at the phone and the cloud is not a party to it. Relationship B, on the right, is phone-to-cloud established by OAuth 2.0: the phone holds an access token, so the trust is between an authenticated human and the backend, and it says nothing about any device. Between the two domains is a gap that the phone alone bridges, because the device never speaks to the cloud at all.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">TWO TRUST RELATIONSHIPS, ONE GAP</text>

  <!-- ===== Relationship A enclosure ===== -->
  <rect x="44" y="74" width="468" height="250" rx="14" fill="none" stroke="#357a8c" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <text x="66" y="102" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1.5" fill="#357a8c">A — DEVICE ↔ PHONE  ·  BLE BONDING</text>

  <!-- device -->
  <g transform="translate(78,150)">
    <rect x="0" y="0" width="150" height="104" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <g transform="translate(30,34)" stroke="#357a8c" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -15 L10 -7 L-8 8 M-8 -7 L10 8 L0 15 L0 -15"/>
    </g>
    <text x="92" y="40" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DEVICE</text>
    <text x="92" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">secure element</text>
    <text x="92" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">holds LTK</text>
  </g>

  <!-- bonded link; label above the arrow, lock below it (no overlap) -->
  <text x="289" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#357a8c">LTK · P-256 ECDH</text>
  <g stroke="#357a8c" stroke-width="3.2" fill="#357a8c" stroke-linecap="round">
    <line x1="232" y1="202" x2="346" y2="202"/>
    <path d="M358 202 l-16 -7 v14 z"/>
    <path d="M220 202 l16 -7 v14 z"/>
  </g>
  <g transform="translate(289,210)" fill="none" stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round">
    <path d="M-6 0 v-5 a6 6 0 0 1 12 0 v5"/>
    <rect x="-9" y="0" width="18" height="14" rx="2.5" fill="#fdfaf2"/>
    <circle cx="0" cy="7" r="2" fill="#1a1d24" stroke="none"/>
  </g>

  <!-- phone (drawn once, straddling both — placed at right edge of A box / left edge of B box) -->
  <g transform="translate(372,142)">
    <rect x="0" y="0" width="104" height="170" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="14" y="26" width="76" height="118" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" opacity="0.4"/>
    <text x="52" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">PHONE</text>
    <text x="52" y="160" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">in both</text>
    <circle cx="52" cy="152" r="0"/>
  </g>
  <text x="424" y="132" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#3a3f4a">the only thing in both</text>

  <!-- ===== Relationship B enclosure ===== -->
  <rect x="568" y="74" width="468" height="250" rx="14" fill="none" stroke="#357a8c" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>
  <text x="590" y="102" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1.5" fill="#357a8c">B — PHONE ↔ CLOUD  ·  OAUTH 2.0</text>

  <!-- token link phone->cloud; label above, lock below (no overlap) -->
  <text x="664" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#357a8c">access token (JWT)</text>
  <g stroke="#357a8c" stroke-width="3.2" fill="#357a8c" stroke-linecap="round">
    <line x1="604" y1="202" x2="724" y2="202"/>
    <path d="M736 202 l-16 -7 v14 z"/>
  </g>
  <g transform="translate(664,210)" fill="none" stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round">
    <path d="M-6 0 v-5 a6 6 0 0 1 12 0 v5"/>
    <rect x="-9" y="0" width="18" height="14" rx="2.5" fill="#fdfaf2"/>
    <circle cx="0" cy="7" r="2" fill="#1a1d24" stroke="none"/>
  </g>

  <!-- cloud -->
  <g transform="translate(748,140)">
    <path d="M52 116
             a40 40 0 0 1 3 -80
             a45 45 0 0 1 86 -12
             a36 36 0 0 1 28 92
             z"
          fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.8" stroke-linejoin="round"/>
    <text x="100" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">CLOUD</text>
    <text x="100" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">never saw the LTK</text>
  </g>

  <!-- ===== the gap label ===== -->
  <line x1="40" y1="362" x2="1040" y2="362" stroke="#1a1d24" stroke-width="1" opacity="0.15"/>
  <text x="540" y="398" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Bonding dead-ends at the phone. The token says nothing about the device.</text>
  <text x="540" y="426" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">The device never speaks to the cloud — so the phone is the only bridge, and the only attack surface.</text>
</svg>
