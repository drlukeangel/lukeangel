<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" role="img" aria-label="The Roomba-to-cat-treat conditioning loop">
  <rect width="1000" height="420" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">THE CAT IS, TECHNICALLY, PART OF THE ROUTINE — A CONDITIONING LOOP</text>

  <!-- four nodes in a loop -->
  <!-- 1 roomba starts -->
  <g transform="translate(90,110)">
    <rect x="0" y="0" width="200" height="76" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="100" y="34" text-anchor="middle" class="lbl">Roomba → "cleaning"</text>
    <text x="100" y="56" text-anchor="middle" class="sub">state change in HA</text>
  </g>
  <!-- 2 treat dispensed -->
  <g transform="translate(710,110)">
    <rect x="0" y="0" width="200" height="76" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="100" y="34" text-anchor="middle" class="lbl">treat dispensed</text>
    <text x="100" y="56" text-anchor="middle" class="sub">Z-Wave relay, 2-sec pulse</text>
  </g>
  <!-- 3 cat moves -->
  <g transform="translate(710,250)">
    <rect x="0" y="0" width="200" height="76" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="100" y="34" text-anchor="middle" class="lbl">cat → kitchen counter</text>
    <text x="100" y="56" text-anchor="middle" class="sub">off the floor, out of the way</text>
  </g>
  <!-- 4 association -->
  <g transform="translate(90,250)">
    <rect x="0" y="0" width="200" height="76" rx="10" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="100" y="34" text-anchor="middle" class="lbl">association forms</text>
    <text x="100" y="56" text-anchor="middle" class="sub">sound → treat → move</text>
  </g>

  <!-- arrows around the loop -->
  <g stroke="#6a4c93" stroke-width="2.6" fill="#6a4c93">
    <line x1="290" y1="148" x2="704" y2="148"/><path d="M704 148 l-12 -5 v10 z"/>
    <line x1="810" y1="186" x2="810" y2="244"/><path d="M810 244 l-5 -12 h10 z"/>
    <line x1="710" y1="288" x2="296" y2="288"/><path d="M296 288 l12 -5 v10 z"/>
    <line x1="190" y1="250" x2="190" y2="192"/><path d="M190 192 l-5 12 h10 z"/>
  </g>

  <text x="500" y="392" text-anchor="middle" class="cap">Run it enough times and the cat hears the Roomba spin up and heads for the counter on its own. Conditioning works.</text>
</svg>
