<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- ring connections between the 6 nodes -->
  <g stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2" fill="none">
    <path d="M620 130 L880 215 L940 400 L620 510 L300 400 L360 215 Z"/>
    <line x1="620" y1="130" x2="620" y2="510"/>
    <line x1="360" y1="215" x2="940" y2="400"/>
    <line x1="880" y1="215" x2="300" y2="400"/>
  </g>

  <!-- node + its local card stack: 6 around the ring.
       a "lit" card (rust-orange) appears on three nodes = the shared cache -->

  <!-- top node (lit shared card) -->
  <g>
    <rect x="586" y="86" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="595" y="95" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="595" y="109" width="50" height="9" rx="2" fill="#b7410e"/>
    <rect x="595" y="123" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="620" cy="130" r="11" fill="#1a1d24"/>
  </g>

  <!-- upper-right node (lit shared card) -->
  <g>
    <rect x="846" y="171" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="855" y="180" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="855" y="194" width="50" height="9" rx="2" fill="#b7410e"/>
    <rect x="855" y="208" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="880" cy="215" r="11" fill="#1a1d24"/>
  </g>

  <!-- lower-right node (no lit card) -->
  <g>
    <rect x="906" y="356" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="915" y="365" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="915" y="379" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="915" y="393" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="940" cy="400" r="11" fill="#1a1d24"/>
  </g>

  <!-- bottom node (lit shared card) -->
  <g>
    <rect x="586" y="466" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="595" y="475" width="50" height="9" rx="2" fill="#b7410e"/>
    <rect x="595" y="489" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="595" y="503" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="620" cy="510" r="11" fill="#1a1d24"/>
  </g>

  <!-- lower-left node (no lit card) -->
  <g>
    <rect x="266" y="356" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="275" y="365" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="275" y="379" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="275" y="393" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="300" cy="400" r="11" fill="#1a1d24"/>
  </g>

  <!-- upper-left node (no lit card) -->
  <g>
    <rect x="326" y="171" width="68" height="62" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.7" stroke-width="3"/>
    <rect x="335" y="180" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="335" y="194" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="335" y="208" width="50" height="9" rx="2" fill="#1a1d24" fill-opacity="0.18"/>
    <circle cx="360" cy="215" r="11" fill="#1a1d24"/>
  </g>
</svg>
