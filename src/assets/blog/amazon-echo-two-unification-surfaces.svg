<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" role="img" aria-label="Two unification surfaces">
  <rect width="940" height="440" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>
  <defs><marker id="ua" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#6a4c93"/></marker></defs>

  <line x1="470" y1="60" x2="470" y2="370" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- LEFT: hub-based -->
  <text x="40" y="44" class="hd">Hub unifies (SmartThings)</text>
  <!-- hub center -->
  <g transform="translate(230,200)"><rect x="-44" y="-26" width="88" height="52" rx="9" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="3"/><text x="0" y="5" text-anchor="middle" class="lab">hub</text></g>
  <!-- devices around -->
  <g class="sm" text-anchor="middle">
    <g transform="translate(90,110)"><rect x="-44" y="-18" width="88" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="5">Z-Wave lock</text></g>
    <g transform="translate(90,290)"><rect x="-44" y="-18" width="88" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="5">Zigbee bulb</text></g>
    <g transform="translate(370,110)"><rect x="-50" y="-18" width="100" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="5">sensor</text></g>
    <g transform="translate(370,290)"><rect x="-50" y="-18" width="100" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="5">voice (1 endpoint)</text></g>
  </g>
  <g stroke="#6a4c93" stroke-width="2.5">
    <line x1="134" y1="119" x2="190" y2="184" marker-end="url(#ua)"/>
    <line x1="134" y1="281" x2="190" y2="216" marker-end="url(#ua)"/>
    <line x1="326" y1="119" x2="270" y2="184" marker-end="url(#ua)"/>
    <line x1="320" y1="281" x2="270" y2="216" marker-end="url(#ua)"/>
  </g>
  <text x="230" y="350" text-anchor="middle" class="sm">local automations, fast; voice is just one input</text>

  <!-- RIGHT: voice-assistant -->
  <text x="500" y="44" class="hd">Voice unifies (Alexa)</text>
  <g transform="translate(700,200)"><rect x="-44" y="-26" width="88" height="52" rx="9" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="3"/><text x="0" y="5" text-anchor="middle" class="lab">Alexa</text></g>
  <g class="sm" text-anchor="middle">
    <g transform="translate(560,110)"><rect x="-46" y="-18" width="92" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="5">Hue skill</text></g>
    <g transform="translate(560,290)"><rect x="-46" y="-18" width="92" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 3"/><text x="0" y="5">Wemo skill*</text></g>
    <g transform="translate(840,110)"><rect x="-46" y="-18" width="92" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 3"/><text x="0" y="5">ST skill*</text></g>
    <g transform="translate(840,290)"><rect x="-46" y="-18" width="92" height="36" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 3"/><text x="0" y="5">custom*</text></g>
  </g>
  <g stroke="#6a4c93" stroke-width="2.5">
    <line x1="604" y1="119" x2="660" y2="184" marker-end="url(#ua)"/>
    <line x1="604" y1="281" x2="660" y2="216" marker-end="url(#ua)" stroke-dasharray="4 3"/>
    <line x1="796" y1="119" x2="740" y2="184" marker-end="url(#ua)" stroke-dasharray="4 3"/>
    <line x1="796" y1="281" x2="740" y2="216" marker-end="url(#ua)" stroke-dasharray="4 3"/>
  </g>
  <text x="700" y="350" text-anchor="middle" class="sm">each vendor publishes a skill — * most arrive in 2015</text>

  <line x1="40" y1="402" x2="900" y2="402" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="470" y="428" text-anchor="middle" class="cap">Not rivals: a hub for fast local automations, voice for ad-hoc commands. In 2014, only Hue is wired up.</text>
</svg>
