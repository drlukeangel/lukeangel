<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Multi-vendor silos">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">

    <!-- three islands -->
    <!-- island template: app box + stack lines + ground -->
    <!-- HUE -->
    <g transform="translate(60 50)">
      <rect x="0" y="0" width="240" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="16" fill="#6a4c93">Hue app</text>
      <text x="20" y="64" font-size="12" fill="#5b616b">auth: bearer token</text>
      <text x="20" y="90" font-size="12" fill="#5b616b">discover: config endpoint</text>
      <text x="20" y="116" font-size="12" fill="#5b616b">model: scenes</text>
      <text x="120" y="142" text-anchor="middle" font-size="12" fill="#1a1d24">3 bulbs</text>
      <ellipse cx="120" cy="210" rx="118" ry="20" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.35" stroke-width="2"/>
    </g>
    <!-- WEMO -->
    <g transform="translate(380 50)">
      <rect x="0" y="0" width="240" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="16" fill="#6a4c93">Wemo app</text>
      <text x="20" y="64" font-size="12" fill="#5b616b">auth: Belkin account</text>
      <text x="20" y="90" font-size="12" fill="#5b616b">discover: UPnP</text>
      <text x="20" y="116" font-size="12" fill="#5b616b">model: timers</text>
      <text x="120" y="142" text-anchor="middle" font-size="12" fill="#1a1d24">1 plug</text>
      <ellipse cx="120" cy="210" rx="118" ry="20" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.35" stroke-width="2"/>
    </g>
    <!-- ROUTER -->
    <g transform="translate(700 50)">
      <rect x="0" y="0" width="240" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="16" fill="#6a4c93">router admin</text>
      <text x="20" y="64" font-size="12" fill="#5b616b">auth: HTTP basic</text>
      <text x="20" y="90" font-size="12" fill="#5b616b">discover: static IP</text>
      <text x="20" y="116" font-size="12" fill="#5b616b">model: none</text>
      <text x="120" y="142" text-anchor="middle" font-size="12" fill="#1a1d24">network</text>
      <ellipse cx="120" cy="210" rx="118" ry="20" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.35" stroke-width="2"/>
    </g>

    <!-- crossed links between islands -->
    <g stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round">
      <path d="M300 260 L380 260" stroke-dasharray="4 7" opacity="0.5"/>
      <g transform="translate(340 260)"><line x1="-11" y1="-11" x2="11" y2="11"/><line x1="11" y1="-11" x2="-11" y2="11"/></g>
      <path d="M620 260 L700 260" stroke-dasharray="4 7" opacity="0.5"/>
      <g transform="translate(660 260)"><line x1="-11" y1="-11" x2="11" y2="11"/><line x1="11" y1="-11" x2="-11" y2="11"/></g>
    </g>
    <text x="500" y="300" text-anchor="middle" font-size="14" fill="#c14a3a">no shared state</text>

    <text x="500" y="400" text-anchor="middle" font-size="14" fill="#5b616b">the gap between the islands is the product opportunity — the unifier the vendors won't build</text>
  </g>
</svg>
