<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="goal view hides decline, baseline view shows it">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">THE SAME DATA, TWO VIEWS</text>

  <line x1="500" y1="78" x2="500" y2="430" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- LEFT: daily goal view (decline hidden) -->
  <text x="40" y="106" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#c14a3a">DAILY ACTIVITY GOAL</text>
  <text x="40" y="128" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">the default &#8212; built for a young dog</text>

  <!-- the goal bar -->
  <line x1="40" y1="200" x2="450" y2="200" stroke="#1a1d24" stroke-width="2" stroke-dasharray="6 5" stroke-opacity="0.5"/>
  <text x="450" y="196" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">goal</text>
  <!-- daily bars: all just under the goal, flat red "missed" -->
  <g fill="#c14a3a" fill-opacity="0.3" stroke="#c14a3a" stroke-width="1.2">
    <rect x="60" y="230" width="34" height="160"/>
    <rect x="110" y="238" width="34" height="152"/>
    <rect x="160" y="232" width="34" height="158"/>
    <rect x="210" y="244" width="34" height="146"/>
    <rect x="260" y="240" width="34" height="150"/>
    <rect x="310" y="248" width="34" height="142"/>
    <rect x="360" y="242" width="34" height="148"/>
    <rect x="410" y="250" width="34" height="140"/>
  </g>
  <line x1="40" y1="390" x2="450" y2="390" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
  <text x="40" y="424" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#c14a3a">every day reads "goal missed" &#8212; dismissible noise</text>

  <!-- RIGHT: baseline view (decline obvious) -->
  <text x="540" y="106" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#3a7d44">ROLLING BASELINE</text>
  <text x="540" y="128" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">same data, against the dog's own history</text>

  <!-- axes -->
  <line x1="560" y1="200" x2="560" y2="390" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="560" y1="390" x2="950" y2="390" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
  <!-- the unmistakable downslope -->
  <path d="M570 224 C 660 230, 720 250, 800 296 C 860 330, 910 360, 945 372"
        fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round"/>
  <circle cx="945" cy="372" r="6" fill="#3a7d44"/>
  <!-- a marker where action should have triggered -->
  <line x1="800" y1="200" x2="800" y2="390" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 6" stroke-opacity="0.6"/>
  <text x="792" y="220" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#c14a3a">the slope was the signal</text>
  <text x="540" y="424" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#3a7d44">the months-long downslope is impossible to miss</text>

  <text x="500" y="470" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">The decline was always in the data. Only one view makes it impossible to miss.</text>
</svg>
