<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="2025 connected-device predictions cover">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- The winner, foreground: smart glasses -->
  <g transform="translate(360,250)">
    <circle cx="120" cy="120" r="92" fill="#fdfaf2" stroke="#0066cc" stroke-width="9"/>
    <circle cx="360" cy="120" r="92" fill="#fdfaf2" stroke="#0066cc" stroke-width="9"/>
    <line x1="212" y1="120" x2="268" y2="120" stroke="#0066cc" stroke-width="9"/>
    <line x1="452" y1="108" x2="520" y2="78" stroke="#0066cc" stroke-width="9" stroke-linecap="round"/>
    <line x1="28" y1="108" x2="-40" y2="78" stroke="#0066cc" stroke-width="9" stroke-linecap="round"/>
    <!-- camera dot on the rim -->
    <circle cx="96" cy="172" r="11" fill="#0066cc"/>
  </g>

  <!-- ring (top right) -->
  <g transform="translate(960,120)">
    <ellipse cx="0" cy="0" rx="62" ry="44" fill="none" stroke="#1a1d24" stroke-width="7" stroke-opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="34" ry="24" fill="none" stroke="#1a1d24" stroke-width="5" stroke-opacity="0.4"/>
  </g>

  <!-- watch (bottom right) -->
  <g transform="translate(900,420)">
    <rect x="0" y="0" width="120" height="148" rx="32" fill="#fdfaf2" stroke="#1a1d24" stroke-width="7" stroke-opacity="0.55"/>
    <rect x="22" y="26" width="76" height="96" rx="12" fill="#0066cc" fill-opacity="0.18"/>
    <line x1="60" y1="-26" x2="60" y2="0" stroke="#1a1d24" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>
    <line x1="60" y1="148" x2="60" y2="174" stroke="#1a1d24" stroke-width="14" stroke-opacity="0.45" stroke-linecap="round"/>
  </g>

  <!-- earbud (lower left) -->
  <g transform="translate(150,470)">
    <path d="M70 0 q-34 -8 -50 24 q-16 32 12 54 l8 40" fill="#fdfaf2" stroke="#1a1d24" stroke-width="7" stroke-opacity="0.55"/>
    <circle cx="40" cy="30" r="13" fill="#0066cc" fill-opacity="0.55"/>
  </g>

  <!-- faint forecast arc rising past the glasses -->
  <path d="M150 560 Q620 360 1080 200" fill="none" stroke="#0066cc" stroke-width="3" stroke-opacity="0.4" stroke-dasharray="2 12" stroke-linecap="round"/>
</svg>
