<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Lutron Caseta topology">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24">

    <text x="500" y="42" text-anchor="middle" font-size="16">Caséta topology — the bridge is the brain; the switches never touch your WiFi</text>

    <!-- home network side (left) -->
    <g>
      <rect x="55" y="100" width="150" height="56" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="130" y="125" text-anchor="middle" font-size="13">Ethernet</text>
      <text x="130" y="143" text-anchor="middle" font-size="11" fill="#5b616b">home LAN + cloud</text>
      <text x="130" y="186" text-anchor="middle" font-size="10" fill="#5b616b">Alexa · Telnet integration</text>
    </g>

    <!-- Smart Bridge -->
    <g>
      <rect x="305" y="92" width="180" height="72" rx="10" fill="#6a4c93" fill-opacity="0.15" stroke="#6a4c93" stroke-width="3"/>
      <text x="395" y="122" text-anchor="middle" font-size="15" fill="#6a4c93">Smart Bridge</text>
      <text x="395" y="142" text-anchor="middle" font-size="11" fill="#5b616b">L-BDG2 · the brain</text>
      <line x1="205" y1="128" x2="305" y2="128" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="255" y="118" text-anchor="middle" font-size="10" fill="#5b616b">wired</text>
    </g>

    <!-- RF cloud over to devices -->
    <g>
      <text x="650" y="84" text-anchor="middle" font-size="11" fill="#6a4c93">ClearConnect Type A · 434 MHz FHSS · AES-128</text>
      <!-- RF arcs -->
      <g stroke="#6a4c93" stroke-width="2" fill="none" stroke-opacity="0.6">
        <path d="M495 128 q60 -20 120 0"/>
        <path d="M495 138 q70 -10 140 14"/>
        <path d="M495 148 q80 10 150 36"/>
      </g>
    </g>

    <!-- devices (right): switches + pico, meshed -->
    <g font-size="12">
      <!-- dimmer 1 -->
      <rect x="640" y="100" width="120" height="48" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="700" y="122" text-anchor="middle">in-wall dimmer</text>
      <text x="700" y="139" text-anchor="middle" font-size="10" fill="#5b616b">no-neutral, routes</text>
      <!-- dimmer 2 -->
      <rect x="640" y="172" width="120" height="48" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="700" y="194" text-anchor="middle">in-wall dimmer</text>
      <text x="700" y="211" text-anchor="middle" font-size="10" fill="#5b616b">routes</text>
      <!-- pico -->
      <rect x="640" y="244" width="120" height="48" rx="8" fill="#6a4c93" fill-opacity="0.1" stroke="#6a4c93" stroke-width="2.5"/>
      <text x="700" y="266" text-anchor="middle" fill="#6a4c93">Pico remote</text>
      <text x="700" y="283" text-anchor="middle" font-size="10" fill="#5b616b">CR2032 · ~10 yr</text>
      <!-- plug dimmer -->
      <rect x="800" y="136" width="120" height="48" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="860" y="158" text-anchor="middle">lamp dimmer</text>
      <text x="860" y="175" text-anchor="middle" font-size="10" fill="#5b616b">plug-in, routes</text>

      <!-- mesh links between devices -->
      <g stroke="#6a4c93" stroke-width="1.8" stroke-opacity="0.5" stroke-dasharray="3 5">
        <line x1="760" y1="124" x2="800" y2="160"/>
        <line x1="760" y1="196" x2="800" y2="160"/>
        <line x1="700" y1="148" x2="700" y2="172"/>
        <line x1="700" y1="220" x2="700" y2="244"/>
      </g>
    </g>

    <!-- bottom notes -->
    <g font-size="12" fill="#5b616b">
      <text x="500" y="346" text-anchor="middle">every switch + Pico is a router — adding devices extends the ~30 m range</text>
      <text x="500" y="372" text-anchor="middle" fill="#3a7d44">switches are RF-only: they can't drop off WiFi because they never join it</text>
    </g>
    <text x="500" y="410" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">sub-GHz, near-zero congestion, no IP stack on the switch — so it feels like a real switch</text>
  </g>
</svg>
