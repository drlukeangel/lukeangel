<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="GATT hierarchy">
  <rect width="1000" height="520" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- peripheral root -->
    <g transform="translate(60 40)">
      <rect x="0" y="0" width="180" height="50" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
      <text x="90" y="24" text-anchor="middle" font-size="14" fill="#1a1d24">peripheral</text>
      <text x="90" y="40" text-anchor="middle" font-size="11" fill="#5b616b">exposes services</text>
    </g>

    <!-- connector down -->
    <path d="M150 90 L150 130" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>

    <!-- service 1: heart rate -->
    <g transform="translate(60 130)">
      <rect x="0" y="0" width="260" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="14" y="27" font-size="14" fill="#1a1d24">Heart Rate service</text>
      <text x="200" y="27" font-size="12" fill="#5b616b">0x180D</text>
    </g>
    <!-- characteristics under HR -->
    <g transform="translate(110 188)">
      <path d="M0 -14 L0 16 L20 16 M0 16 L0 56 L20 56 M0 56 L0 96 L20 96" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <g transform="translate(24 4)"><rect x="0" y="0" width="290" height="26" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/><text x="10" y="18" font-size="12">Heart Rate Measurement</text><text x="232" y="18" font-size="11" fill="#6a4c93">notify</text></g>
      <g transform="translate(24 44)"><rect x="0" y="0" width="290" height="26" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/><text x="10" y="18" font-size="12">Body Sensor Location</text><text x="248" y="18" font-size="11" fill="#3a7d44">read</text></g>
      <g transform="translate(24 84)"><rect x="0" y="0" width="290" height="26" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/><text x="10" y="18" font-size="12">Control Point</text><text x="246" y="18" font-size="11" fill="#c14a3a">write</text></g>
    </g>

    <!-- service 2: battery -->
    <g transform="translate(560 130)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="14" y="27" font-size="14" fill="#1a1d24">Battery service</text>
      <text x="180" y="27" font-size="12" fill="#5b616b">0x180F</text>
    </g>
    <g transform="translate(610 188)">
      <path d="M0 -14 L0 16 L20 16" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <g transform="translate(24 4)"><rect x="0" y="0" width="270" height="26" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/><text x="10" y="18" font-size="12">Battery Level</text><text x="178" y="18" font-size="11" fill="#3a7d44">read</text><text x="222" y="18" font-size="11" fill="#6a4c93">notify</text></g>
    </g>

    <!-- service 3: vendor custom -->
    <g transform="translate(560 300)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#6a4c93" fill-opacity="0.06" stroke="#6a4c93" stroke-width="2.5" stroke-dasharray="5 4"/>
      <text x="14" y="22" font-size="14" fill="#1a1d24">vendor service</text>
      <text x="14" y="38" font-size="11" fill="#5b616b">128-bit custom UUID</text>
    </g>

    <!-- legend / note -->
    <g transform="translate(60 420)">
      <text x="0" y="0" font-size="13" fill="#5b616b">16-bit UUIDs = SIG-standard services · 128-bit = vendor-specific</text>
      <text x="0" y="28" font-size="13" fill="#1a1d24">the phone (central) discovers this tree on connect, then read / write / subscribe by UUID</text>
    </g>
  </g>
</svg>
