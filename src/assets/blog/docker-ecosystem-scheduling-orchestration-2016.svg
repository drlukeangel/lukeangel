<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t d">
  <title id="t">Docker scheduling and orchestration — manager node assigning containers to a worker cluster</title>
  <desc id="d">2016-era flat-material diagram: a scheduling manager at top decides container placement; a service definition feeds in from the left; three worker nodes below receive scheduled containers; arrows show task assignment.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:18px;font-weight:600;fill:#1a1d24}
    .wlabel{font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;fill:#fff;font-weight:500}
  </style>
  <rect width="800" height="480" fill="#f5f7fa"/>
  <text x="40" y="42" class="title">Docker orchestration — scheduler places containers across the cluster</text>

  <!-- Service definition input -->
  <g transform="translate(30,80)">
    <rect width="180" height="100" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#7b3ff2" rx="4"/>
    <rect y="18" width="180" height="10" fill="#7b3ff2"/>
    <text x="14" y="20" class="label" fill="#fff" font-size="12">Service definition</text>
    <text x="14" y="50" class="small">image: my-api:v2.1</text>
    <text x="14" y="68" class="small">replicas: 3</text>
    <text x="14" y="86" class="small">cpu: 0.5  · mem: 512M</text>
  </g>

  <!-- Arrow to scheduler -->
  <line x1="215" y1="130" x2="310" y2="130" stroke="#5a6470" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Scheduler manager -->
  <g transform="translate(310,80)">
    <rect width="180" height="100" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#0066cc" rx="4"/>
    <rect y="18" width="180" height="10" fill="#0066cc"/>
    <text x="14" y="20" class="label" fill="#fff" font-size="12">Scheduler (manager)</text>
    <text x="14" y="50" class="small">- read service spec</text>
    <text x="14" y="68" class="small">- evaluate cluster state</text>
    <text x="14" y="86" class="small">- bin-pack onto workers</text>
  </g>

  <!-- Arrow to cluster state -->
  <line x1="495" y1="130" x2="590" y2="130" stroke="#5a6470" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cluster state store -->
  <g transform="translate(590,80)">
    <rect width="180" height="100" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#00bcd4" rx="4"/>
    <rect y="18" width="180" height="10" fill="#00bcd4"/>
    <text x="14" y="20" class="label" fill="#fff" font-size="12">Cluster state (etcd)</text>
    <text x="14" y="50" class="small">- node inventory</text>
    <text x="14" y="68" class="small">- live container map</text>
    <text x="14" y="86" class="small">- resource availability</text>
  </g>

  <!-- arrow heads -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6470"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Schedule arrows down to workers -->
  <line x1="400" y1="190" x2="180" y2="280" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowO)"/>
  <line x1="400" y1="190" x2="400" y2="280" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowO)"/>
  <line x1="400" y1="190" x2="620" y2="280" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowO)"/>

  <!-- Worker nodes -->
  <g transform="translate(60,290)">
    <rect width="240" height="160" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="240" height="28" fill="#1a1d24" rx="4"/>
    <rect y="18" width="240" height="10" fill="#1a1d24"/>
    <text x="14" y="20" class="wlabel">Worker node A</text>
    <text x="220" y="20" class="wlabel" text-anchor="end" font-size="10">2 CPU · 4 GB</text>
    <rect x="14" y="44" width="100" height="46" fill="#e6f0fa" stroke="#0066cc"/>
    <text x="64" y="73" text-anchor="middle" class="small">my-api task 1</text>
    <rect x="124" y="44" width="100" height="46" fill="#e6f0fa" stroke="#0066cc"/>
    <text x="174" y="73" text-anchor="middle" class="small">other task</text>
    <rect x="14" y="100" width="100" height="46" fill="#fff" stroke="#cfd5db"/>
    <text x="64" y="129" text-anchor="middle" class="small">(empty slot)</text>
  </g>

  <g transform="translate(310,290)">
    <rect width="180" height="160" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#1a1d24" rx="4"/>
    <rect y="18" width="180" height="10" fill="#1a1d24"/>
    <text x="14" y="20" class="wlabel">Worker node B</text>
    <text x="160" y="20" class="wlabel" text-anchor="end" font-size="10">2 CPU · 4 GB</text>
    <rect x="14" y="44" width="152" height="46" fill="#e6f0fa" stroke="#0066cc"/>
    <text x="90" y="73" text-anchor="middle" class="small">my-api task 2</text>
    <rect x="14" y="100" width="152" height="46" fill="#fff" stroke="#cfd5db"/>
    <text x="90" y="129" text-anchor="middle" class="small">(empty slot)</text>
  </g>

  <g transform="translate(500,290)">
    <rect width="240" height="160" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="240" height="28" fill="#1a1d24" rx="4"/>
    <rect y="18" width="240" height="10" fill="#1a1d24"/>
    <text x="14" y="20" class="wlabel">Worker node C</text>
    <text x="220" y="20" class="wlabel" text-anchor="end" font-size="10">2 CPU · 4 GB</text>
    <rect x="14" y="44" width="100" height="46" fill="#e6f0fa" stroke="#0066cc"/>
    <text x="64" y="73" text-anchor="middle" class="small">my-api task 3</text>
    <rect x="124" y="44" width="100" height="46" fill="#e6f0fa" stroke="#0066cc"/>
    <text x="174" y="73" text-anchor="middle" class="small">db worker</text>
    <rect x="14" y="100" width="100" height="46" fill="#fff" stroke="#cfd5db"/>
    <text x="64" y="129" text-anchor="middle" class="small">(empty slot)</text>
  </g>
</svg>
