<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Data leaving a device through an encrypted channel (in motion) into an encrypted store (at rest), locked at both.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs><pattern id="dd-dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#dd-dots)"/>
  <rect width="24" height="630" fill="#c14a3a"/>

  <!-- device -->
  <rect x="120" y="300" width="170" height="120" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <circle cx="154" cy="334" r="7" fill="none" stroke="#1a1d24" stroke-width="3"/><circle cx="154" cy="334" r="3" fill="#c14a3a"/>
  <rect x="154" y="362" width="104" height="40" rx="7" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.35"/>

  <!-- encrypted pipe (in motion) -->
  <rect x="330" y="322" width="370" height="76" rx="38" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
  <g fill="#1a1d24" opacity="0.4"><rect x="360" y="352" width="16" height="16" rx="3"/><rect x="392" y="352" width="16" height="16" rx="3"/><rect x="612" y="352" width="16" height="16" rx="3"/><rect x="644" y="352" width="16" height="16" rx="3"/></g>
  <g transform="translate(490,332)" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5"><rect x="0" y="22" width="48" height="36" rx="7"/><path d="M9 22 v-11 a15 15 0 0 1 30 0 v11" fill="none"/><circle cx="24" cy="40" r="5" fill="#c14a3a" stroke="none"/></g>

  <!-- encrypted store (at rest) -->
  <ellipse cx="940" cy="266" rx="108" ry="28" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <path d="M832 266 v176 a108 28 0 0 0 216 0 v-176" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <ellipse cx="940" cy="266" rx="108" ry="28" fill="none" stroke="#1a1d24" stroke-width="6"/>
  <path d="M832 330 a108 28 0 0 0 216 0" fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.35"/>
  <path d="M832 386 a108 28 0 0 0 216 0" fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.35"/>
  <g transform="translate(916,388)" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5"><rect x="0" y="22" width="48" height="36" rx="7"/><path d="M9 22 v-11 a15 15 0 0 1 30 0 v11" fill="none"/><circle cx="24" cy="40" r="5" fill="#c14a3a" stroke="none"/></g>
</svg>
