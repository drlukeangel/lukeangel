<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="2025 forecast confidence">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24">

    <text x="500" y="42" text-anchor="middle" font-size="16">eight bets for 2025, ranked by confidence</text>

    <line x1="320" y1="78" x2="320" y2="452" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
    <text x="320" y="474" text-anchor="middle" font-size="11" fill="#5b616b">0%</text>
    <line x1="640" y1="78" x2="640" y2="452" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="3 6"/>
    <text x="640" y="474" text-anchor="middle" font-size="11" fill="#5b616b">50%</text>
    <line x1="960" y1="78" x2="960" y2="452" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="3 6"/>
    <text x="955" y="474" text-anchor="end" font-size="11" fill="#5b616b">100%</text>

    <!-- 320 + pct*6.4 -->
    <g font-size="13">
      <text x="310" y="106" text-anchor="end">long-arc retrospective</text>
      <rect x="320" y="92" width="640" height="22" rx="4" fill="#6a4c93" fill-opacity="0.6"/>
      <text x="968" y="108" font-size="11" fill="#5b616b">100%</text>

      <text x="310" y="146" text-anchor="end">end-of-2025 review</text>
      <rect x="320" y="132" width="640" height="22" rx="4" fill="#6a4c93" fill-opacity="0.6"/>
      <text x="968" y="148" font-size="11" fill="#5b616b">100%</text>

      <text x="310" y="186" text-anchor="end">SmartThings local-exec post</text>
      <rect x="320" y="172" width="608" height="22" rx="4" fill="#6a4c93" fill-opacity="0.55"/>
      <text x="936" y="188" font-size="11" fill="#5b616b">95%</text>

      <text x="310" y="226" text-anchor="end">Roomba + Braava routines</text>
      <rect x="320" y="212" width="576" height="22" rx="4" fill="#6a4c93" fill-opacity="0.55"/>
      <text x="904" y="228" font-size="11" fill="#5b616b">90%</text>

      <text x="310" y="266" text-anchor="end">Frame TV + appliance sync</text>
      <rect x="320" y="252" width="544" height="22" rx="4" fill="#6a4c93" fill-opacity="0.5"/>
      <text x="872" y="268" font-size="11" fill="#5b616b">85%</text>

      <text x="310" y="306" text-anchor="end">Matter camera support</text>
      <rect x="320" y="292" width="448" height="22" rx="4" fill="#6a4c93" fill-opacity="0.42"/>
      <text x="776" y="308" font-size="11" fill="#5b616b">70%</text>

      <text x="310" y="346" text-anchor="end">HA voice gets usable</text>
      <rect x="320" y="332" width="320" height="22" rx="4" fill="#6a4c93" fill-opacity="0.32"/>
      <text x="648" y="348" font-size="11" fill="#5b616b">50%</text>

      <text x="310" y="386" text-anchor="end">Powerwall reconsidered</text>
      <rect x="320" y="372" width="192" height="22" rx="4" fill="#6a4c93" fill-opacity="0.25"/>
      <text x="520" y="388" font-size="11" fill="#5b616b">30%</text>
    </g>

    <text x="500" y="436" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">the two coin-flips — HA voice and Powerwall — are exactly where last year's misses lived</text>
  </g>
</svg>
