<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="Fi lost pet network">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#1a1d24">TWO WAYS A LOST DOG GETS FOUND</text>

  <!-- lost dog collar (center-left) -->
  <g transform="translate(150,250)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c14a3a" stroke-width="4"/>
    <circle cx="0" cy="0" r="9" fill="#c14a3a"/>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">lost collar</text>
  </g>

  <!-- PATH 1: own cellular fix (always) -->
  <text x="360" y="118" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#3a7d44">PATH 1 &#183; its own LTE-M fix</text>
  <text x="360" y="140" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">works anywhere there's cell signal</text>
  <!-- tower -->
  <g transform="translate(560,150)">
    <path d="M-18 70 L-6 0 L6 0 L18 70 Z" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <path d="M-2 0 a14 14 0 0 1 4 0" fill="none" stroke="#c87533" stroke-width="3"/>
    <path d="M-10 -6 a26 26 0 0 1 20 0" fill="none" stroke="#c87533" stroke-width="3" stroke-opacity="0.6"/>
  </g>
  <line x1="186" y1="232" x2="540" y2="190" stroke="#3a7d44" stroke-width="3" stroke-dasharray="2 0"/>
  <path d="M540 190 l-16 -2 l6 -10 Z" fill="#3a7d44"/>
  <!-- cloud / map -->
  <g transform="translate(800,150)">
    <path d="M-56 22 a26 26 0 0 1 46 -22 a30 30 0 0 1 58 10 a24 24 0 0 1 -4 48 l-94 0 a24 24 0 0 1 -6 -36 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">map</text>
  </g>
  <line x1="612" y1="160" x2="742" y2="160" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5"/>
  <path d="M742 160 l-14 -5 l0 10 Z" fill="#1a1d24" fill-opacity="0.5"/>

  <!-- PATH 2: crowd relay (only where dense) -->
  <text x="150" y="396" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c87533">PATH 2 &#183; nearby Fi collars relay sightings</text>
  <text x="150" y="418" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">only helps where Fi density is high</text>
  <!-- other collars -->
  <g>
    <circle cx="560" cy="368" r="20" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <circle cx="560" cy="368" r="6" fill="#c87533"/>
    <circle cx="640" cy="428" r="20" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <circle cx="640" cy="428" r="6" fill="#c87533"/>
    <circle cx="668" cy="338" r="20" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <circle cx="668" cy="338" r="6" fill="#c87533"/>
  </g>
  <!-- relay arrows lost->others->map -->
  <line x1="184" y1="268" x2="538" y2="364" stroke="#c87533" stroke-width="3" stroke-dasharray="6 5"/>
  <line x1="688" y1="338" x2="770" y2="205" stroke="#c87533" stroke-width="3" stroke-dasharray="6 5"/>
  <path d="M770 205 l-2 14 l-10 -6 Z" fill="#c87533"/>
</svg>
