<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="Why fleet health over time catches a failure that update-success metrics miss.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">EVERYTHING UPSTREAM REPORTED GREEN — THE GRAPH CAUGHT IT</text>

  <!-- LEFT: the green checks that lied -->
  <text x="44" y="86" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">at the moment of update</text>
  <g transform="translate(44,104)" font-family="ui-monospace,monospace" font-size="12">
    <!-- four green rows -->
    <g>
      <rect x="0" y="0" width="380" height="40" rx="8" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="2"/>
      <g transform="translate(20,20)"><path d="M-6 0 l5 6 10 -12" fill="none" stroke="#3a7d44" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="44" y="25" fill="#1a1d24">transfer complete</text>
    </g>
    <g transform="translate(0,52)">
      <rect x="0" y="0" width="380" height="40" rx="8" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="2"/>
      <g transform="translate(20,20)"><path d="M-6 0 l5 6 10 -12" fill="none" stroke="#3a7d44" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="44" y="25" fill="#1a1d24">SHA-256 match</text>
    </g>
    <g transform="translate(0,104)">
      <rect x="0" y="0" width="380" height="40" rx="8" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="2"/>
      <g transform="translate(20,20)"><path d="M-6 0 l5 6 10 -12" fill="none" stroke="#3a7d44" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="44" y="25" fill="#1a1d24">signature valid</text>
    </g>
    <g transform="translate(0,156)">
      <rect x="0" y="0" width="380" height="40" rx="8" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="2"/>
      <g transform="translate(20,20)"><path d="M-6 0 l5 6 10 -12" fill="none" stroke="#3a7d44" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="44" y="25" fill="#1a1d24">boot-counter satisfied</text>
    </g>
  </g>
  <text x="44" y="338" font-family="Newsreader, Georgia, serif" font-size="13.5" font-style="italic" fill="#c14a3a">all true · all useless against a crash three days later</text>

  <!-- RIGHT: the over-time graph -->
  <text x="560" y="86" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">% of cohort online · 72h post-update · by hw rev</text>
  <!-- axes -->
  <g transform="translate(560,104)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#1a1d24" stroke-width="1.6"/>
    <line x1="0" y1="200" x2="440" y2="200" stroke="#1a1d24" stroke-width="1.6"/>
    <text x="-10" y="8" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">100%</text>
    <text x="-10" y="200" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">0</text>
    <g font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">
      <text x="0" y="218" text-anchor="middle">d0</text>
      <text x="146" y="218" text-anchor="middle">d1</text>
      <text x="292" y="218" text-anchor="middle">d3</text>
      <text x="438" y="218" text-anchor="middle">d5</text>
    </g>
    <!-- healthy revs: flat near top -->
    <polyline points="0,16 146,18 292,20 438,22" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="300" y="14" font-family="ui-monospace,monospace" font-size="10.5" fill="#3a7d44">other revs — flat</text>
    <!-- affected rev: drops at day 3 -->
    <polyline points="0,16 146,20 292,24 320,90 360,150 438,176" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="360" y="120" font-family="ui-monospace,monospace" font-size="10.5" fill="#c14a3a">affected rev</text>
    <!-- day-3 marker -->
    <line x1="292" y1="0" x2="292" y2="200" stroke="#c14a3a" stroke-width="1.4" stroke-dasharray="5 5" opacity="0.6"/>
    <text x="292" y="-6" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c14a3a">crash @ day 3</text>
  </g>
  <text x="780" y="346" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="13.5" font-style="italic" fill="#3a3f4a">froze rollout · rolled back · zero permanent bricks</text>

  <!-- bottom line -->
  <line x1="40" y1="372" x2="1040" y2="372" stroke="#1a1d24" stroke-width="1" opacity="0.12"/>
  <text x="540" y="408" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">A clean signature proves the code is yours. It says nothing about whether the code works.</text>
  <text x="540" y="436" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">Measure fleet health over time, not update success at the moment of update.</text>
</svg>
