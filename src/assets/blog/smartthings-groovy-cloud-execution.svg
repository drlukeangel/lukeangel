<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="SmartThings cloud execution path">
  <rect width="800" height="360" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:13px;fill:#5b616b}
    .box{fill:#fdfaf2;stroke:#1a1d24;stroke-width:1.5}
  </style>

  <!-- LAN boundary -->
  <rect x="20" y="58" width="320" height="210" rx="8" fill="none" stroke="#1a1d24" stroke-opacity="0.35" stroke-dasharray="6 5"/>
  <text class="sm" x="30" y="52">inside the house (LAN)</text>

  <!-- door sensor -->
  <rect class="box" x="40" y="90" width="120" height="60" rx="6"/>
  <rect x="58" y="104" width="30" height="32" rx="2" fill="#1a1d24"/>
  <rect x="96" y="104" width="14" height="32" rx="2" fill="#7a808c"/>
  <text class="lbl" x="100" y="166" text-anchor="middle">door sensor</text>
  <text class="sm" x="100" y="182" text-anchor="middle">contact.open</text>

  <!-- hub -->
  <rect class="box" x="40" y="200" width="120" height="56" rx="6"/>
  <circle cx="70" cy="228" r="6" fill="#3a7d44"/>
  <text class="lbl" x="100" y="224" text-anchor="middle">ST hub v1</text>
  <text class="sm" x="100" y="240" text-anchor="middle">Zigbee/Z-Wave</text>

  <line x1="100" y1="150" x2="100" y2="200" stroke="#1a1d24" stroke-width="2" marker-end="url(#a)"/>

  <!-- event up to cloud -->
  <path d="M160,222 C240,222 250,150 320,150" fill="none" stroke="#1a1d24" stroke-width="2" marker-end="url(#a)"/>
  <text class="sm" x="245" y="142" text-anchor="middle">event up</text>

  <!-- cloud -->
  <g>
    <path d="M430 92 q-34 0 -34 30 q-30 0 -30 28 q0 26 34 26 h150 q40 0 40 -30 q0 -26 -34 -28 q-2 -30 -40 -30 q-22 -18 -52 -8 q-18 -10 -34 12 z"
          fill="#fff" stroke="#c14a3a" stroke-width="1.6"/>
    <text class="lbl" x="465" y="132" text-anchor="middle" fill="#c14a3a">SmartThings cloud</text>
    <text class="sm" x="465" y="150" text-anchor="middle">Groovy SmartApp runs HERE</text>
    <text class="sm" x="465" y="166" text-anchor="middle">presence check + sendSms</text>
  </g>

  <!-- SMS out to carrier -->
  <path d="M558,130 C640,130 660,118 700,118" fill="none" stroke="#c14a3a" stroke-width="2" marker-end="url(#ar)"/>
  <rect class="box" x="700" y="92" width="80" height="60" rx="6"/>
  <rect x="724" y="104" width="32" height="36" rx="4" fill="#1a1d24"/>
  <rect x="730" y="110" width="20" height="24" rx="1" fill="#fdfaf2"/>
  <text class="lbl" x="700" y="172" text-anchor="end">SMS to phone</text>
  <text class="sm" x="700" y="188" text-anchor="end">via carrier gateway</text>

  <!-- failure flag -->
  <rect x="360" y="232" width="320" height="48" rx="6" fill="#fff" stroke="#c14a3a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text class="sm" x="378" y="252" fill="#c14a3a">internet drops -&gt; logic never runs,</text>
  <text class="sm" x="378" y="268" fill="#c14a3a">no SMS. The alert is cloud-gated.</text>

  <text class="cap" x="20" y="338">The hub only forwards the event; the Groovy logic and the SMS both live in the cloud — so an internet outage silently kills the alarm.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#1a1d24"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#c14a3a"/></marker>
  </defs>
</svg>
