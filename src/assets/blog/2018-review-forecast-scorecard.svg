<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" width="1080" height="360" role="img" aria-label="The 2018 forecast scored five for five, but most were within my own control.">
  <rect width="1080" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">GRADING THE 2018 FORECAST — 5/5, WITH AN ASTERISK</text>

  <g font-family="ui-monospace,monospace" font-size="12">
    <g transform="translate(60,76)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" fill="#1a1d24">Zigbee onto a coordinator I own (ConBee)</text>
      <text x="650" y="20" fill="#7a808c">within my control</text>
    </g>
    <g transform="translate(60,116)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" fill="#1a1d24">complex automations off YAML (Node-RED)</text>
      <text x="650" y="20" fill="#7a808c">within my control</text>
    </g>
    <g transform="translate(60,156)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" fill="#1a1d24">MQTT becomes the house's message bus</text>
      <text x="650" y="20" fill="#7a808c">within my control</text>
    </g>
    <g transform="translate(60,196)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" fill="#1a1d24">posts slow to 3 or fewer (day job)</text>
      <text x="650" y="20" fill="#7a808c">within my control</text>
    </g>
    <g transform="translate(60,236)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" fill="#1a1d24">a big acquirer consolidates cameras (Amazon to Ring)</text>
      <text x="650" y="20" fill="#6a4c93">the one real outside call</text>
    </g>
  </g>

  <text x="540" y="312" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Five for five — but four were things I planned to do, not things I foresaw. Only Ring was a forecast.</text>
</svg>
