<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="Find My vs cellular tracking">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">TWO WAYS A TAG KNOWS WHERE IT IS</text>

  <line x1="500" y1="78" x2="500" y2="430" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- LEFT: cellular collar (self-locating) -->
  <text x="40" y="104" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#3a7d44">CELLULAR COLLAR &#183; finds itself</text>

  <!-- collar -->
  <g transform="translate(120,210)">
    <rect x="-44" y="-30" width="88" height="62" rx="16" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#3a7d44"/>
    <text x="0" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">GPS + cellular</text>
  </g>
  <!-- satellite + tower -->
  <g transform="translate(300,150)">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="-38" y="-8" width="22" height="16" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="16" y="-8" width="22" height="16" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="0" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">GPS</text>
  </g>
  <line x1="160" y1="190" x2="282" y2="158" stroke="#3a7d44" stroke-width="2.5"/>
  <g transform="translate(300,280)">
    <path d="M-14 50 L-4 0 L4 0 L14 50 Z" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
    <path d="M-2 0 a12 12 0 0 1 4 0" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <text x="0" y="68" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">cell tower</text>
  </g>
  <line x1="160" y1="222" x2="288" y2="300" stroke="#3a7d44" stroke-width="2.5"/>
  <text x="40" y="404" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#3a7d44">works anywhere there's coverage &#183; subscription &#183; days of battery</text>

  <!-- RIGHT: AirTag (crowd-located) -->
  <text x="540" y="104" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#c87533">AIRTAG &#183; borrows other phones' eyes</text>

  <!-- the tag -->
  <g transform="translate(600,210)">
    <circle cx="0" cy="0" r="26" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="0" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">BLE only</text>
    <!-- BLE shout -->
    <g stroke="#c87533" fill="none" stroke-linecap="round">
      <path d="M24 -10 a14 14 0 0 1 10 -8" stroke-width="3"/>
      <path d="M28 -16 a26 26 0 0 1 18 -14" stroke-width="3" stroke-opacity="0.6"/>
    </g>
  </g>
  <!-- passing phones relay -->
  <g fill="#fff" stroke="#1a1d24" stroke-width="2.5">
    <g transform="translate(720,150)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
    <g transform="translate(760,250)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
  </g>
  <line x1="626" y1="200" x2="708" y2="160" stroke="#c87533" stroke-width="2.5" stroke-dasharray="5 5"/>
  <line x1="626" y1="216" x2="748" y2="250" stroke="#c87533" stroke-width="2.5" stroke-dasharray="5 5"/>
  <!-- to icloud -->
  <g transform="translate(880,200)">
    <path d="M-40 16 a20 20 0 0 1 34 -18 a24 24 0 0 1 44 8 a18 18 0 0 1 -4 36 l-70 0 a18 18 0 0 1 -4 -26 Z" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="-3" y="26" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a808c">iCloud</text>
  </g>
  <line x1="772" y1="240" x2="844" y2="216" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5"/>
  <text x="540" y="404" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#c87533">blind where no iPhone walks by &#183; no subscription &#183; a year of battery</text>
</svg>
