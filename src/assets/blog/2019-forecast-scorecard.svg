<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="2018 forecast scorecard">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">SCORING THE 2018 FORECAST</text>
  <text x="40" y="78" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#7a808c">8 predictions &#183; ~50% &#183; dead average</text>

  <!-- legend -->
  <g transform="translate(40,120)">
    <g>
      <circle cx="18" cy="18" r="18" fill="#3a7d44"/>
      <path d="M9 18 l6 7 l13 -15" fill="none" stroke="#fdfaf2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#1a1d24">HIT</text>
      <text x="48" y="35" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">3</text>
    </g>
    <g transform="translate(170,0)">
      <circle cx="18" cy="18" r="18" fill="#c87533"/>
      <path d="M18 6 a12 12 0 0 1 0 24 Z" fill="#fdfaf2" fill-opacity="0.55"/>
      <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#1a1d24">PARTIAL</text>
      <text x="48" y="35" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">2</text>
    </g>
    <g transform="translate(410,0)">
      <circle cx="18" cy="18" r="18" fill="#c14a3a"/>
      <path d="M11 11 l14 14 M25 11 l-14 14" stroke="#fdfaf2" stroke-width="3.5" stroke-linecap="round"/>
      <text x="48" y="16" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#1a1d24">MISS</text>
      <text x="48" y="35" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">3 &#183; mostly timing</text>
    </g>
  </g>

  <!-- rows -->
  <g transform="translate(40,190)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14.5" fill="#1a1d24">
    <g transform="translate(0,0)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Fi ships its consumer collar</text><text x="710" y="0" fill="#7a808c" font-size="12.5">arrived in November</text></g>
    <g transform="translate(0,34)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">Petnet first multi-day outage</text><text x="710" y="0" fill="#7a808c" font-size="12.5">longer, still single-day</text></g>
    <g transform="translate(0,68)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Whistle successor with health sensing</text><text x="710" y="0" fill="#7a808c" font-size="12.5">GO Explore, behavioral</text></g>
    <g transform="translate(0,102)"><circle cx="11" cy="-5" r="11" fill="#c87533"/><text x="34" y="0">Second credible smart-litter device</text><text x="710" y="0" fill="#7a808c" font-size="12.5">cheap entrants, no threat</text></g>
    <g transform="translate(0,136)"><circle cx="11" cy="-5" r="11" fill="#c87533"/><text x="34" y="0">Mars vet strategy tied to devices</text><text x="710" y="0" fill="#7a808c" font-size="12.5">vet visible, tie-in loose</text></g>
    <g transform="translate(0,170)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">First credible HomeKit pet device</text><text x="710" y="0" fill="#7a808c" font-size="12.5">nothing &#8212; year four</text></g>
    <g transform="translate(0,204)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">GPS-fence consumer collar appears</text><text x="710" y="0" fill="#7a808c" font-size="12.5">Halo delayed</text></g>
    <g transform="translate(0,238)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Buy a Fi, stop paying Mars</text><text x="710" y="0" fill="#7a808c" font-size="12.5">done</text></g>
  </g>
</svg>
