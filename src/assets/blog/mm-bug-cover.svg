<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- two consoles, both showing both meshes (after the fix) -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4">
    <rect x="120" y="160" width="380" height="300" rx="12"/>
    <rect x="700" y="160" width="380" height="300" rx="12"/>
  </g>
  <!-- each console: a home cluster (rust) and a backbone cluster (gold) -->
  <g fill="#b7410e"><circle cx="220" cy="280" r="18"/><circle cx="290" cy="330" r="18"/><circle cx="220" cy="380" r="18"/></g>
  <g fill="#c87533"><circle cx="400" cy="300" r="15"/><circle cx="420" cy="370" r="15"/></g>
  <g fill="#c87533"><circle cx="800" cy="280" r="15"/><circle cx="820" cy="350" r="15"/></g>
  <g fill="#b7410e"><circle cx="980" cy="280" r="18"/><circle cx="910" cy="330" r="18"/><circle cx="980" cy="380" r="18"/></g>

  <!-- the magnified log line that overturned the theory -->
  <rect x="360" y="500" width="480" height="78" rx="10" fill="#1a1d24"/>
  <text x="384" y="534" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#7ee0a0">NeighborUp(peer)</text>
  <text x="384" y="562" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#e98b7a">NeighborDown(peer)  +30ms</text>
  <!-- magnifier -->
  <circle cx="330" cy="540" r="34" fill="none" stroke="#1a1d24" stroke-opacity="0.6" stroke-width="6"/>
  <line x1="306" y1="564" x2="280" y2="590" stroke="#1a1d24" stroke-opacity="0.6" stroke-width="8" stroke-linecap="round"/>
</svg>
