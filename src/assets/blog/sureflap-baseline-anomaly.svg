<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Baseline anomaly detection">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- axes -->
    <line x1="80" y1="60" x2="80" y2="340" stroke="#1a1d24" stroke-opacity="0.35" stroke-width="2.5"/>
    <line x1="80" y1="340" x2="930" y2="340" stroke="#1a1d24" stroke-opacity="0.35" stroke-width="2.5"/>
    <text x="40" y="120" font-size="13" fill="#5b616b" transform="rotate(-90 40 120)">trips / day</text>

    <!-- normal band shading around 3-4 -->
    <rect x="80" y="150" width="850" height="70" fill="#3a7d44" fill-opacity="0.08"/>
    <line x1="80" y1="150" x2="930" y2="150" stroke="#3a7d44" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4 6"/>
    <line x1="80" y1="220" x2="930" y2="220" stroke="#3a7d44" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4 6"/>
    <text x="940" y="190" font-size="12" fill="#3a7d44" text-anchor="end">baseline ~3–4</text>

    <!-- daily bars: most around 3-4, then a dip to 1 -->
    <g fill="#c87533">
      <!-- helper: bar at x with height representing count; y baseline 340, scale 56px per trip -->
      <rect x="92"  y="172" width="20" height="168"/>
      <rect x="124" y="200" width="20" height="140"/>
      <rect x="156" y="172" width="20" height="168"/>
      <rect x="188" y="144" width="20" height="196"/>
      <rect x="220" y="200" width="20" height="140"/>
      <rect x="252" y="172" width="20" height="168"/>
      <rect x="284" y="172" width="20" height="168"/>
      <rect x="316" y="144" width="20" height="196"/>
      <rect x="348" y="200" width="20" height="140"/>
      <rect x="380" y="172" width="20" height="168"/>
      <rect x="412" y="200" width="20" height="140"/>
      <rect x="444" y="172" width="20" height="168"/>
      <rect x="476" y="144" width="20" height="196"/>
      <rect x="508" y="172" width="20" height="168"/>
      <rect x="540" y="200" width="20" height="140"/>
      <rect x="572" y="172" width="20" height="168"/>
      <rect x="604" y="200" width="20" height="140"/>
      <rect x="636" y="172" width="20" height="168"/>
    </g>
    <!-- the dip days, in danger red -->
    <g fill="#c14a3a">
      <rect x="668" y="284" width="20" height="56"/>
      <rect x="700" y="284" width="20" height="56"/>
      <rect x="732" y="284" width="20" height="56"/>
    </g>

    <!-- flag over the dip -->
    <g transform="translate(710 250)">
      <line x1="0" y1="0" x2="0" y2="34" stroke="#c14a3a" stroke-width="3"/>
      <path d="M0 0 l34 9 l-34 9 z" fill="#c14a3a"/>
    </g>
    <text x="730" y="240" text-anchor="middle" font-size="13" fill="#c14a3a">drop to 1 → health flag</text>

    <text x="500" y="410" text-anchor="middle" font-size="14" fill="#5b616b">a gradual change a daily eyeball misses, but a logged baseline catches</text>
  </g>
</svg>
