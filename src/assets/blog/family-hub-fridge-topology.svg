<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Family Hub fridge as hub, bridged to Home Assistant">
  <rect width="1000" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .edge { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #6a4c93; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">THE FRIDGE IS A SMARTTHINGS HUB — AND HA TREATS IT AS ONE PARTICIPANT</text>

  <!-- center: the fridge hub -->
  <g transform="translate(400,180)">
    <rect x="0" y="0" width="200" height="110" rx="12" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
    <text x="100" y="40" text-anchor="middle" class="lbl">Family Hub fridge</text>
    <text x="100" y="62" text-anchor="middle" class="sub">SmartThings hub</text>
    <text x="100" y="84" text-anchor="middle" class="sub">Zigbee 3.0 · Z-Wave Plus</text>
    <text x="100" y="100" text-anchor="middle" class="sub">Thread border router</text>
  </g>

  <!-- left: three radio islands -->
  <g transform="translate(70,90)">
    <rect x="0" y="0" width="150" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="75" y="25" text-anchor="middle" class="sub">Zigbee sensors</text>
    <rect x="0" y="120" width="150" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="75" y="145" text-anchor="middle" class="sub">Z-Wave switches</text>
    <rect x="0" y="240" width="150" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="75" y="259" text-anchor="middle" class="sub">Matter / Thread</text>
    <text x="75" y="277" text-anchor="middle" class="sub" fill="#5b616b">(Eve, Nanoleaf)</text>
  </g>
  <g stroke="#6a4c93" stroke-width="2.6" fill="none">
    <path d="M220 110 C 320 120, 360 180, 400 210"/>
    <path d="M220 230 L 400 235"/>
    <path d="M220 350 C 320 340, 360 280, 400 255"/>
  </g>

  <!-- right: HA, bridged via cloud -->
  <g transform="translate(740,120)">
    <!-- cloud between fridge and HA -->
    <path d="M-90 90 a22 22 0 0 1 3 -42 a26 26 0 0 1 50 5 a18 18 0 0 1 -2 37 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.4"/>
    <text x="-62" y="74" text-anchor="middle" class="sub">ST cloud</text>
    <rect x="40" y="40" width="180" height="80" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <path d="M90 70 l40 -26 l40 26" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <text x="130" y="98" text-anchor="middle" class="lbl">Home Assistant</text>
  </g>
  <!-- fridge -> cloud -> HA -->
  <g stroke="#7a808c" stroke-width="2.6" fill="none" stroke-dasharray="6 5">
    <path d="M600 220 C 640 210, 660 215, 678 210"/>
  </g>
  <line x1="700" y1="200" x2="780" y2="195" stroke="#7a808c" stroke-width="2.6" stroke-dasharray="6 5"/>
  <text x="690" y="170" text-anchor="middle" class="edge">1–2 s, cloud-mediated</text>

  <text x="500" y="440" text-anchor="middle" class="cap">The fridge owns the radios; HA reads device state and issues commands through SmartThings' cloud — convenient, but not local.</text>
</svg>
