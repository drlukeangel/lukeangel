<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560">
  <rect x="2" y="2" width="996" height="556" rx="10" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', monospace; fill: #1a1d24; }
    .box { font-size: 16px; font-weight: 700; }
    .dia { font-size: 16px; }
    .cap { font-size: 14px; fill: #5b616b; }
    .y   { font-size: 14px; fill: #3a7d44; font-weight: 700; }
    .n   { font-size: 14px; fill: #c14a3a; font-weight: 700; }
  </style>

  <!-- start -->
  <rect x="395" y="28" width="210" height="60" rx="8" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <text class="box" x="500" y="55" text-anchor="middle">A wants to reach B</text>
  <text class="cap" x="500" y="76" text-anchor="middle">by node key</text>

  <line x1="500" y1="88" x2="500" y2="120" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="500,120 492,106 508,106" fill="#1a1d24" fill-opacity="0.5"/>

  <!-- decision 1 -->
  <polygon points="500,120 700,190 500,260 300,190" fill="#fdfaf2"
           stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <text class="dia" x="500" y="185" text-anchor="middle">direct path</text>
  <text class="dia" x="500" y="207" text-anchor="middle">reachable?</text>

  <!-- D1 yes -> direct box (right) -->
  <line x1="700" y1="190" x2="752" y2="190" stroke="#3a7d44" stroke-width="3"/>
  <polygon points="752,190 738,182 738,198" fill="#3a7d44"/>
  <text class="y" x="712" y="180">yes</text>
  <rect x="754" y="158" width="218" height="64" rx="8" fill="#3a7d44" fill-opacity="0.12"
        stroke="#3a7d44" stroke-width="3"/>
  <text class="box" x="863" y="184" text-anchor="middle">direct connection</text>
  <text class="cap" x="863" y="206" text-anchor="middle">preferred whenever possible</text>

  <!-- D1 no -> down to decision 2 -->
  <line x1="500" y1="260" x2="500" y2="300" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="500,300 492,286 508,286" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="n" x="512" y="285">no</text>

  <!-- decision 2 -->
  <polygon points="500,300 700,370 500,440 300,370" fill="#fdfaf2"
           stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <text class="dia" x="500" y="365" text-anchor="middle">RELAY_URL</text>
  <text class="dia" x="500" y="387" text-anchor="middle">set?</text>

  <!-- D2 yes -> relay box (right) -->
  <line x1="700" y1="370" x2="752" y2="370" stroke="#b7410e" stroke-width="3"/>
  <polygon points="752,370 738,362 738,378" fill="#b7410e"/>
  <text class="y" x="712" y="360" fill="#b7410e">yes</text>
  <rect x="754" y="338" width="218" height="64" rx="8" fill="#b7410e" fill-opacity="0.12"
        stroke="#b7410e" stroke-width="3"/>
  <text class="box" x="863" y="364" text-anchor="middle" fill="#b7410e">via relay</text>
  <text class="cap" x="863" y="386" text-anchor="middle">forwards ciphertext — fallback</text>

  <!-- D2 no -> down to unreachable -->
  <line x1="500" y1="440" x2="500" y2="478" stroke="#c14a3a" stroke-width="3"/>
  <polygon points="500,478 492,464 508,464" fill="#c14a3a"/>
  <text class="n" x="512" y="463">no</text>

  <rect x="370" y="478" width="260" height="62" rx="8" fill="#c14a3a" fill-opacity="0.10"
        stroke="#c14a3a" stroke-width="3"/>
  <text class="box" x="500" y="504" text-anchor="middle" fill="#c14a3a">unreachable across networks</text>
  <text class="cap" x="500" y="525" text-anchor="middle">the direct-only default</text>
</svg>
