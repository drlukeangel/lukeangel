<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" role="img" aria-label="Dual-bank flash layout: bootloader, running bank, staging bank.">
  <rect width="1080" height="400" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">DUAL-BANK FLASH — THE LIVE APP KEEPS RUNNING WHILE THE UPDATE STAGES</text>

  <!-- flash column -->
  <g transform="translate(60,80)">
    <text x="190" y="-12" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">on-chip flash</text>

    <!-- bootloader region -->
    <rect x="0" y="0" width="380" height="66" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <g transform="translate(22,18)" fill="none" stroke="#1a1d24" stroke-width="2.6" stroke-linecap="round">
      <rect x="0" y="11" width="18" height="14" rx="2.5"/>
      <path d="M3 11 v-4 a6 6 0 0 1 12 0 v4"/>
    </g>
    <text x="210" y="32" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">BOOTLOADER · immutable</text>
    <text x="210" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">never overwritten by an OTA</text>

    <!-- Bank 0: running -->
    <rect x="0" y="86" width="380" height="92" rx="10" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="3.5"/>
    <text x="210" y="122" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">BANK 0 — running application</text>
    <text x="210" y="146" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#3a7d44">untouched during transfer · the device keeps working</text>
    <path d="M30 162 l9 9 18 -22" fill="none" stroke="#3a7d44" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bank 1: staging -->
    <rect x="0" y="198" width="380" height="92" rx="10" fill="#357a8c" fill-opacity="0.1" stroke="#357a8c" stroke-width="3.5" stroke-dasharray="7 5"/>
    <text x="210" y="234" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">BANK 1 — staging area</text>
    <text x="210" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">incoming image accumulates here, inert</text>
  </g>

  <!-- chunks flowing into Bank 1 -->
  <g>
    <text x="560" y="305" font-family="ui-monospace,monospace" font-size="11" fill="#357a8c">chunks in</text>
    <g stroke="#357a8c" stroke-width="3" fill="#357a8c">
      <line x1="560" y1="324" x2="476" y2="324"/>
      <path d="M472 324 l15 -7 v14 z"/>
    </g>
    <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4">
      <rect x="566" y="308" width="34" height="32" rx="5"/>
      <rect x="610" y="308" width="34" height="32" rx="5"/>
    </g>
    <circle cx="583" cy="324" r="3.4" fill="#357a8c"/>
    <circle cx="627" cy="324" r="3.4" fill="#357a8c"/>
  </g>

  <!-- the swap rule -->
  <g transform="translate(560,96)">
    <rect x="0" y="0" width="448" height="150" rx="12" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
    <text x="20" y="32" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">THE SWAP RULE</text>
    <g font-family="ui-monospace,monospace" font-size="12" fill="#3a3f4a">
      <text x="20" y="62">1 · chunks fill Bank 1; Bank 0 keeps running</text>
      <text x="20" y="88">2 · last chunk → SHA-256 check, then signature check</text>
      <text x="20" y="114">3 · both pass → flip active bank to 1, reboot</text>
    </g>
    <text x="20" y="138" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="#357a8c">Fail or power loss before the flip → Bank 0 is intact.</text>
  </g>
</svg>
