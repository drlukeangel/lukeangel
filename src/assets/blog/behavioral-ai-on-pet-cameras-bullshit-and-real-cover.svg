<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Real signal vs marketing AI">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
    <marker id="ba" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0 0 L10 5.5 L0 11 z" fill="#3a7d44"/></marker>
    <marker id="bx" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0 0 L10 5.5 L0 11 z" fill="#c14a3a"/></marker>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- pet camera (left) pointed right -->
  <g transform="translate(230,315)">
    <rect x="-50" y="-70" width="100" height="140" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="-20" r="30" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="-20" r="14" fill="#c87533" fill-opacity="0.25" stroke="#c87533" stroke-width="3"/>
    <circle cx="0" cy="-20" r="4" fill="#c87533"/>
    <!-- speaker grille -->
    <line x1="-24" y1="36" x2="24" y2="36" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
    <line x1="-24" y1="50" x2="24" y2="50" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
  </g>

  <!-- a small dog in front of the camera -->
  <g transform="translate(430,360)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-50" y="0" width="105" height="42" rx="21"/>
    <rect x="-38" y="38" width="12" height="30" rx="5"/><rect x="-16" y="38" width="12" height="30" rx="5"/>
    <rect x="28" y="38" width="12" height="30" rx="5"/><rect x="44" y="38" width="12" height="30" rx="5"/>
    <path d="M 50 4 q 26 -5 35 11 q 5 9 16 11 q 7 1 7 7 q 0 6 -7 6 l -16 0 q -17 0 -25 -12 z"/>
    <path d="M 68 4 q 13 -7 18 5 q 3 8 -6 12"/>
    <path d="M -50 16 q -22 -3 -26 -26" fill="none"/>
  </g>

  <!-- output splits into two streams from the camera -->
  <!-- REAL stream (green, solid, checked) -->
  <g transform="translate(680,210)">
    <path d="M -360 110 C -250 60 -120 20 0 14" fill="none" stroke="#3a7d44" stroke-width="4" marker-end="url(#ba)"/>
    <g transform="translate(40,0)">
      <rect x="-40" y="-26" width="120" height="52" rx="10" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="3.5"/>
      <circle cx="-14" cy="0" r="15" fill="none" stroke="#3a7d44" stroke-width="3"/>
      <path d="M -21 1 L -16 7 L -7 -6" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- dog-in-frame glyph -->
      <rect x="12" y="-12" width="52" height="24" rx="4" fill="none" stroke="#3a7d44" stroke-width="2.5"/>
      <circle cx="38" cy="0" r="6" fill="#3a7d44" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- MARKETING stream (red, dashed, crossed) -->
  <g transform="translate(680,430)">
    <path d="M -360 -100 C -250 -40 -120 -10 0 -6" fill="none" stroke="#c14a3a" stroke-width="4" stroke-dasharray="3 9" marker-end="url(#bx)"/>
    <g transform="translate(40,0)">
      <rect x="-50" y="-26" width="150" height="52" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3.5" stroke-dasharray="6 4"/>
      <!-- a 'mood/heart' glyph standing in for "anxiety detected" -->
      <path d="M 0 -8 C -8 -20 -28 -12 -28 4 C -28 18 -8 24 0 12 C 8 24 28 18 28 4 C 28 -12 8 -20 0 -8 Z" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5" transform="translate(-22,0) scale(0.7)"/>
      <!-- crossed out -->
      <line x1="-44" y1="20" x2="94" y2="-20" stroke="#c14a3a" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
