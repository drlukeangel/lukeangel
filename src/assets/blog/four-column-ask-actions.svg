<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480">
  <rect x="2" y="2" width="996" height="476" rx="10" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', monospace; fill: #1a1d24; }
    .q   { font-size: 18px; font-weight: 700; }
    .act { font-size: 15px; fill: #5b616b; }
    .note{ font-size: 13px; fill: #7a808c; }
  </style>

  <text class="note" x="40" y="44">each quadrant mandates a next action — and items move as they earn it</text>

  <!-- Build -->
  <rect x="40" y="80" width="200" height="70" rx="8" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.5"/>
  <text class="q" x="60" y="115" fill="#3a7d44">Build</text>
  <line x1="240" y1="115" x2="360" y2="115" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="360,115 346,108 346,122" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="act" x="376" y="111">code &amp; ship</text>
  <text class="note" x="376" y="132">the only build-now quadrant</text>

  <!-- Test -->
  <rect x="40" y="180" width="200" height="70" rx="8" fill="#2a52be" fill-opacity="0.12" stroke="#2a52be" stroke-width="2.5"/>
  <text class="q" x="60" y="215" fill="#2a52be">Test</text>
  <line x1="240" y1="215" x2="360" y2="215" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="360,215 346,208 346,222" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="act" x="376" y="211">prototype · fake-door · user sessions</text>
  <text class="note" x="376" y="232">passes → slides up into Build</text>

  <!-- Analyze -->
  <rect x="40" y="280" width="200" height="70" rx="8" fill="#c87533" fill-opacity="0.14" stroke="#c87533" stroke-width="2.5"/>
  <text class="q" x="60" y="315" fill="#c87533">Analyze</text>
  <line x1="240" y1="315" x2="360" y2="315" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="360,315 346,308 346,322" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="act" x="376" y="311">research &amp; brainstorm</text>
  <text class="note" x="376" y="332">solution emerges → slides right to Test/Build</text>

  <!-- Drop -->
  <rect x="40" y="380" width="200" height="70" rx="8" fill="#1a1d24" fill-opacity="0.05" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2.5"/>
  <text class="q" x="60" y="415" fill="#5b616b">Drop</text>
  <line x1="240" y1="415" x2="360" y2="415" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="360,415 346,408 346,422" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="act" x="376" y="411">parking-lot backlog</text>
  <text class="note" x="376" y="432">re-enters only when it gains clarity or evidence</text>

  <!-- backward-motion note -->
  <rect x="700" y="80" width="260" height="170" rx="8" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
  <text class="q" x="720" y="116" fill="#c14a3a">items move both ways</text>
  <text class="note" x="720" y="146">a Build item resting on stale</text>
  <text class="note" x="720" y="166">data slides back down to Test —</text>
  <text class="note" x="720" y="186">the conversation nobody wants</text>
  <text class="note" x="720" y="206">and everyone needs.</text>
  <text class="note" x="720" y="232">re-place the board every cycle.</text>
</svg>
