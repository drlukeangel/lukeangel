<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" role="img" aria-label="open wall versus drywall cost cliff">
  <rect width="1000" height="400" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" font-weight="700" fill="#1a1d24">THE 10X CLIFF: ONE DRYWALL SHEET WIDE</text>

  <!-- timeline baseline -->
  <line x1="60" y1="300" x2="940" y2="300" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
  <text x="60" y="328" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">FRAMING</text>
  <text x="940" y="328" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">FINISHED HOUSE</text>

  <!-- drywall divider -->
  <line x1="500" y1="90" x2="500" y2="300" stroke="#6a4c93" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="500" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#6a4c93">drywall goes up</text>

  <!-- open wall bar: $40 -->
  <rect x="120" y="276" width="280" height="24" rx="6" fill="#3a7d44" fill-opacity="0.5" stroke="#3a7d44" stroke-width="2"/>
  <text x="260" y="258" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#3a7d44">$40 / drop</text>
  <text x="260" y="234" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">cable + termination, open stud bay</text>

  <!-- drywall retrofit bar: $400 -->
  <rect x="600" y="116" width="280" height="184" rx="6" fill="#c14a3a" fill-opacity="0.4" stroke="#c14a3a" stroke-width="2"/>
  <text x="740" y="106" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#c14a3a">$400 / drop</text>
  <text x="740" y="210" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">fish + patch + paint</text>

  <!-- 40 drops callout -->
  <text x="260" y="356" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#3a7d44">~40 drops = $1,600</text>
  <text x="740" y="356" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#c14a3a">same 40 drops = $16,000</text>
</svg>
