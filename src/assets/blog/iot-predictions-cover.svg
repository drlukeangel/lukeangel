<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="year-ahead forecast">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- multi-year forecast: a settled past curve that forks into branching predictions -->
  <!-- the scored, settled past (solid, confident) sweeping in from the left -->
  <path d="M110 430 C 240 420, 340 400, 470 372 S 640 330, 720 300"
        fill="none" stroke="#0066cc" stroke-width="6" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- the fork point: where prediction begins -->
  <circle cx="720" cy="300" r="13" fill="#0066cc"/>
  <circle cx="720" cy="300" r="13" fill="none" stroke="#fdfaf2" stroke-width="3"/>

  <!-- branch A: optimistic year-ahead bet (dashed, climbing) -->
  <path d="M720 300 C 830 250, 940 180, 1110 130"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="3 13" stroke-opacity="0.85"/>
  <!-- branch B: flat / consolidation bet (dashed) -->
  <path d="M720 300 C 850 300, 980 305, 1110 296"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="3 13" stroke-opacity="0.6"/>
  <!-- branch C: down / a category that fades (dashed) -->
  <path d="M720 300 C 840 340, 960 410, 1110 462"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="3 13" stroke-opacity="0.45"/>

  <!-- plotted bet markers along the past curve (scored outcomes) -->
  <g fill="#0066cc">
    <circle cx="290" cy="412" r="8" fill-opacity="0.7"/>
    <circle cx="470" cy="372" r="9" fill-opacity="0.8"/>
    <circle cx="600" cy="338" r="8" fill-opacity="0.85"/>
  </g>
  <!-- endpoints of the three future branches -->
  <g fill="#0066cc">
    <circle cx="1110" cy="130" r="10" fill-opacity="0.85"/>
    <circle cx="1110" cy="296" r="9" fill-opacity="0.6"/>
    <circle cx="1110" cy="462" r="9" fill-opacity="0.45"/>
  </g>

  <!-- a row of device silhouettes the forecast rides over, left to right by era -->
  <!-- round thermostat (early smart-home) -->
  <g transform="translate(150,470)">
    <circle cx="55" cy="55" r="55" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <circle cx="55" cy="55" r="26" fill="#0066cc" fill-opacity="0.85"/>
  </g>

  <!-- voice speaker puck -->
  <g transform="translate(320,440)">
    <rect x="0" y="0" width="86" height="150" rx="43" fill="#0066cc" fill-opacity="0.9"/>
    <circle cx="43" cy="40" r="18" fill="#fdfaf2" fill-opacity="0.9"/>
    <g stroke="#fdfaf2" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round">
      <line x1="22" y1="104" x2="22" y2="120"/>
      <line x1="33" y1="96" x2="33" y2="128"/>
      <line x1="43" y1="88" x2="43" y2="136"/>
      <line x1="53" y1="96" x2="53" y2="128"/>
      <line x1="64" y1="104" x2="64" y2="120"/>
    </g>
  </g>

  <!-- smartwatch -->
  <g transform="translate(500,470)">
    <rect x="0" y="0" width="92" height="106" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <rect x="15" y="16" width="62" height="74" rx="11" fill="#0066cc" fill-opacity="0.85"/>
    <rect x="30" y="-14" width="32" height="18" rx="6" fill="#1a1d24" fill-opacity="0.22"/>
    <rect x="30" y="102" width="32" height="18" rx="6" fill="#1a1d24" fill-opacity="0.22"/>
  </g>

  <!-- connected camera -->
  <g transform="translate(660,486)">
    <rect x="0" y="0" width="124" height="80" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <circle cx="42" cy="40" r="24" fill="#0066cc" fill-opacity="0.85"/>
    <circle cx="42" cy="40" r="9" fill="#fdfaf2" fill-opacity="0.9"/>
    <circle cx="100" cy="20" r="5" fill="#0066cc"/>
  </g>

  <!-- AR glasses (the late-era category) -->
  <g transform="translate(850,500)">
    <rect x="0" y="14" width="76" height="48" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <rect x="120" y="14" width="76" height="48" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <path d="M76 32 q22 -10 44 0" fill="none" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4"/>
    <path d="M0 30 l-26 -8" fill="none" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
    <path d="M196 30 l26 -8" fill="none" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
    <rect x="12" y="26" width="52" height="24" rx="8" fill="#0066cc" fill-opacity="0.6"/>
    <rect x="132" y="26" width="52" height="24" rx="8" fill="#0066cc" fill-opacity="0.6"/>
  </g>
</svg>
