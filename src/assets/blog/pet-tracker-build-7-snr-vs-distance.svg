<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="SNR vs distance curve.">
  <rect width="1200" height="560" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="1.5" fill="#1a1d24">SNR vs DISTANCE · dense urban walk · measured</text>

  <!-- plot region: x 100..1100, y 60..460 -->
  <!-- x-axis -->
  <line x1="100" y1="460" x2="1100" y2="460" stroke="#1a1d24" stroke-width="2"/>
  <!-- y-axis -->
  <line x1="100" y1="60" x2="100" y2="460" stroke="#1a1d24" stroke-width="2"/>
  <!-- 0 dB reference line -->
  <line x1="100" y1="260" x2="1100" y2="260" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- x ticks: 200,300,400,500,600 -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">
    <line x1="100" y1="460" x2="100" y2="466" stroke="#1a1d24"/>
    <text x="100" y="486" text-anchor="middle">200 m</text>
    <line x1="350" y1="460" x2="350" y2="466" stroke="#1a1d24"/>
    <text x="350" y="486" text-anchor="middle">300</text>
    <line x1="600" y1="460" x2="600" y2="466" stroke="#1a1d24"/>
    <text x="600" y="486" text-anchor="middle">400</text>
    <line x1="850" y1="460" x2="850" y2="466" stroke="#1a1d24"/>
    <text x="850" y="486" text-anchor="middle">500</text>
    <line x1="1100" y1="460" x2="1100" y2="466" stroke="#1a1d24"/>
    <text x="1100" y="486" text-anchor="middle">600</text>
  </g>
  <text x="600" y="514" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">distance from base (m, great-circle)</text>

  <!-- y ticks: +10, +5, 0, -5, -10 -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">
    <line x1="94" y1="60" x2="100" y2="60" stroke="#1a1d24"/>
    <text x="86" y="65" text-anchor="end">+10</text>
    <line x1="94" y1="160" x2="100" y2="160" stroke="#1a1d24"/>
    <text x="86" y="165" text-anchor="end">+5</text>
    <line x1="94" y1="260" x2="100" y2="260" stroke="#1a1d24"/>
    <text x="86" y="265" text-anchor="end">0</text>
    <line x1="94" y1="360" x2="100" y2="360" stroke="#1a1d24"/>
    <text x="86" y="365" text-anchor="end">-5</text>
    <line x1="94" y1="460" x2="100" y2="460" stroke="#1a1d24"/>
    <text x="86" y="465" text-anchor="end">-10</text>
  </g>
  <text x="40" y="260" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b" transform="rotate(-90 40 260)">SNR (dB)</text>

  <!-- LoRa sensitivity floor band (around -9 to -11 dB for LONG_FAST) -->
  <rect x="100" y="440" width="1000" height="20" fill="#c14a3a" opacity="0.10"/>
  <text x="1090" y="436" text-anchor="end" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#c14a3a">LoRa LONG_FAST floor (≈ −20 dB at the radio; link unusable below −12)</text>

  <!-- Model fit curve at n = 4 (anchored at 268 m, +6.25 dB) -->
  <!-- Points: d, SNR computed for n=4: 268→6.25; 300→4.29; 350→1.62; 400→-0.69; 450→-2.75; 500→-4.59; 550→-6.24; 600→-7.75 -->
  <!-- Mapped x = (d-200)*2.5 + 100; y = 60 + (10-snr)*20 -->
  <path d="M 270 135 Q 350 174 475 228 Q 600 273 725 315 Q 850 351 975 385 Q 1037 400 1100 415"
        fill="none" stroke="#1f7a6b" stroke-width="2.4" stroke-dasharray="6 5" opacity="0.85"/>
  <text x="940" y="378" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#1f7a6b">model fit · n ≈ 4</text>

  <!-- Data points (11 fresh-GPS broadcasts) -->
  <g fill="#1f7a6b" stroke="#fdfaf2" stroke-width="2">
    <circle cx="270" cy="135" r="8"/>        <!-- 268m, +6.25 (closest) -->
    <circle cx="357.5" cy="190" r="7"/>      <!-- 303m, +3.5 -->
    <circle cx="357.5" cy="150" r="7"/>      <!-- 303m, +5.5 -->
    <circle cx="375" cy="140" r="7"/>        <!-- 310m, +6.0 -->
    <circle cx="507.5" cy="170" r="7"/>      <!-- 363m, +4.5 -->
    <circle cx="517.5" cy="150" r="7"/>      <!-- 367m, +5.5 -->
    <circle cx="542.5" cy="140" r="7"/>      <!-- 377m, +6.0 -->
    <circle cx="547.5" cy="145" r="7"/>      <!-- 379m, +5.75 -->
    <circle cx="547.5" cy="205" r="7"/>      <!-- 379m, +2.75 -->
    <circle cx="757.5" cy="185" r="7"/>      <!-- 463m, +3.75 -->
    <circle cx="815" cy="340" r="8"/>         <!-- 486m, -4.0 (furthest) -->
  </g>

  <!-- annotations on the extremes -->
  <line x1="270" y1="135" x2="270" y2="100" stroke="#1f7a6b" stroke-width="1.4"/>
  <text x="270" y="88" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">268 m · +6.25 dB</text>
  <text x="270" y="106" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">closest fix</text>

  <line x1="815" y1="340" x2="900" y2="320" stroke="#1f7a6b" stroke-width="1.4"/>
  <text x="908" y="316" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">486 m · −4.0 dB</text>
  <text x="908" y="334" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">furthest fresh GPS fix</text>

  <!-- seq tail annotation -->
  <path d="M 815 340 Q 1000 432 1080 438" fill="none" stroke="#5b616b" stroke-width="1.2" stroke-dasharray="2 5"/>
  <text x="1080" y="426" text-anchor="end" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#5b616b">seq tail kept arriving past 486 m,</text>
  <text x="1080" y="442" text-anchor="end" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#5b616b">slipping to −9.5 dB before I turned around</text>
</svg>
