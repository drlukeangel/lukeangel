<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460" role="img" aria-label="Inductive coupling between coil and passive chip.">
  <rect x="1" y="1" width="918" height="458" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#5b616b;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;fill:#5b616b;}
  </style>

  <text x="40" y="48" class="lbl" font-size="16" letter-spacing="1.5">POWERED BY THE FIELD — NO BATTERY IN THE CHIP</text>

  <!-- frame coil (reader) -->
  <g transform="translate(150,250)">
    <rect x="-66" y="-90" width="132" height="180" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- coil windings -->
    <g fill="none" stroke="#c87533" stroke-width="3">
      <ellipse cx="0" cy="-48" rx="40" ry="11"/>
      <ellipse cx="0" cy="-24" rx="40" ry="11"/>
      <ellipse cx="0" cy="0" rx="40" ry="11"/>
      <ellipse cx="0" cy="24" rx="40" ry="11"/>
      <ellipse cx="0" cy="48" rx="40" ry="11"/>
    </g>
    <text x="0" y="118" text-anchor="middle" class="lbl" font-size="14" font-weight="600">frame coil</text>
    <text x="0" y="136" text-anchor="middle" class="mut" font-size="12.5">drives 134.2 kHz</text>
  </g>

  <!-- field arrows out toward chip -->
  <g fill="none" stroke="#c87533" stroke-width="2.5" opacity="0.9">
    <path d="M225 215 q90 -30 165 -10" marker-end="url(#ao)"/>
    <path d="M225 285 q90 30 165 10" marker-end="url(#ao)"/>
  </g>
  <text x="320" y="190" text-anchor="middle" class="mut" font-size="13">field wakes the chip →</text>

  <!-- passive chip in shoulder -->
  <g transform="translate(560,250)">
    <rect x="-60" y="-60" width="120" height="120" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- tiny coil + glass capsule glyph -->
    <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <g fill="none" stroke="#c87533" stroke-width="2.5"><path d="M-30 -8 v16 M-20 -8 v16 M-10 -8 v16 M0 -8 v16 M10 -8 v16 M20 -8 v16"/></g>
    <circle cx="30" cy="0" r="5" fill="#c87533"/>
    <text x="0" y="-30" text-anchor="middle" class="mut" font-size="12">FDX-B implant</text>
    <text x="0" y="88" text-anchor="middle" class="lbl" font-size="14" font-weight="600">passive chip</text>
    <text x="0" y="106" text-anchor="middle" class="mut" font-size="12.5">dead until powered</text>
  </g>

  <!-- answer arrow back: load modulation -->
  <g fill="none" stroke="#3a7d44" stroke-width="2.5">
    <path d="M495 320 q-100 55 -270 22" marker-end="url(#ag)"/>
  </g>
  <text x="360" y="392" text-anchor="middle" class="mut" font-size="13" fill="#3a7d44">← 15-digit ID, by load modulation</text>

  <!-- right note -->
  <g transform="translate(700,200)">
    <rect x="0" y="0" width="186" height="120" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <text x="14" y="28" class="mut" font-size="13">the same physics as</text>
    <text x="14" y="48" class="mut" font-size="13">a toothbrush charger:</text>
    <text x="14" y="72" class="lbl" font-size="13.5" font-weight="600">power flows one way,</text>
    <text x="14" y="92" class="lbl" font-size="13.5" font-weight="600">the answer rides back</text>
    <text x="14" y="110" class="mut" font-size="13">on the same field.</text>
  </g>

  <text x="460" y="438" text-anchor="middle" class="cap" font-size="14.5">No battery in the chip — the reader has to pay for both halves of the conversation.</text>

  <defs>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c87533"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a7d44"/>
    </marker>
  </defs>
</svg>
