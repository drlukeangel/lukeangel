<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" width="1080" height="360" role="img" aria-label="OTA topology: cloud to phone to BLE-only device.">
  <rect width="1080" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">OTA TOPOLOGY — THE PHONE IS THE ONLY BRIDGE</text>

  <!-- cloud build -->
  <g transform="translate(60,140)">
    <path d="M40 70 a40 40 0 0 1 6 -79 a52 52 0 0 1 96 8 a36 36 0 0 1 4 71 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="92" y="22" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">CLOUD BUILD</text>
    <text x="92" y="44" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">signed image</text>
    <!-- small seal -->
    <g transform="translate(92,62)">
      <circle cx="0" cy="0" r="11" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.4"/>
      <path d="M-4 0 l3 4 6 -8" fill="none" stroke="#357a8c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- HTTPS link -->
  <g>
    <line x1="252" y1="180" x2="372" y2="180" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.6"/>
    <path d="M376 180 l-15 -7 v14 z" fill="#1a1d24" fill-opacity="0.6"/>
    <text x="314" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">HTTPS</text>
    <text x="314" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">cache when online</text>
  </g>

  <!-- phone -->
  <g transform="translate(386,110)">
    <rect x="0" y="0" width="120" height="170" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="13" y="24" width="94" height="118" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8" stroke-opacity="0.5"/>
    <circle cx="60" cy="156" r="7" fill="none" stroke="#1a1d24" stroke-width="2"/>
    <text x="60" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">PHONE</text>
    <text x="60" y="-12" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">untrusted courier</text>
  </g>

  <!-- BLE link -->
  <g>
    <line x1="520" y1="195" x2="640" y2="195" stroke="#357a8c" stroke-width="3"/>
    <path d="M644 195 l-15 -7 v14 z" fill="#357a8c"/>
    <text x="582" y="183" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#357a8c">BLE 4.2</text>
    <text x="582" y="217" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">~10 kbps · 20-byte MTU</text>
  </g>

  <!-- device -->
  <g transform="translate(654,128)">
    <g stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round">
      <line x1="40" y1="-12" x2="40" y2="0"/><line x1="90" y1="-12" x2="90" y2="0"/><line x1="140" y1="-12" x2="140" y2="0"/>
    </g>
    <rect x="0" y="0" width="180" height="134" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <text x="90" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DEVICE</text>
    <text x="90" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">BLE only · no internet</text>
    <rect x="26" y="68" width="128" height="22" rx="6" fill="#3a7d44" fill-opacity="0.14" stroke="#3a7d44" stroke-width="2"/>
    <text x="90" y="83" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">BANK 0 · running</text>
    <rect x="26" y="96" width="128" height="22" rx="6" fill="#357a8c" fill-opacity="0.12" stroke="#357a8c" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="90" y="111" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">BANK 1 · staging</text>
  </g>

  <text x="540" y="338" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">The phone carries the bytes; the device never trusts it to vouch for them.</text>
</svg>
