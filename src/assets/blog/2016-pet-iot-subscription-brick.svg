<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="Subscription gates the hardware">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">THE SUBSCRIPTION OWNS THE HARDWARE</text>

  <line x1="500" y1="80" x2="500" y2="400" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- LEFT: paying -->
  <text x="40" y="112" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#3a7d44">PAYING &#183; $6.95&#8211;9.95/mo</text>

  <g transform="translate(140,230)">
    <rect x="-50" y="-34" width="100" height="68" rx="18" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="11" fill="#3a7d44"/>
    <!-- live signal -->
    <g stroke="#3a7d44" fill="none" stroke-linecap="round">
      <path d="M30 -16 a18 18 0 0 1 0 32" stroke-width="3"/>
      <path d="M40 -26 a30 30 0 0 1 0 52" stroke-width="3" stroke-opacity="0.55"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#7a808c">GPS reports to app</text>
  </g>
  <!-- cloud -->
  <g transform="translate(340,180)">
    <path d="M-34 14 a17 17 0 0 1 29 -16 a20 20 0 0 1 38 7 a16 16 0 0 1 -4 31 l-60 0 a16 16 0 0 1 -3 -22 Z" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a808c">Mars cloud</text>
  </g>
  <line x1="172" y1="210" x2="312" y2="190" stroke="#3a7d44" stroke-width="2.5"/>
  <text x="40" y="392" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#3a7d44">live location, geofence alerts, history</text>

  <!-- RIGHT: stopped -->
  <text x="540" y="112" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#c14a3a">STOP PAYING &#183; same hardware</text>

  <g transform="translate(640,230)">
    <rect x="-50" y="-34" width="100" height="68" rx="18" fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="11" fill="#7a808c"/>
    <!-- dead: crossed -->
    <path d="M28 -18 l34 36 M62 -18 l-34 36" fill="none" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#7a808c">no signal &#183; inert puck</text>
  </g>
  <!-- cloud, greyed, link severed -->
  <g transform="translate(840,180)">
    <path d="M-34 14 a17 17 0 0 1 29 -16 a20 20 0 0 1 38 7 a16 16 0 0 1 -4 31 l-60 0 a16 16 0 0 1 -3 -22 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.4"/>
    <text x="0" y="22" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a808c">locked out</text>
  </g>
  <line x1="672" y1="210" x2="812" y2="190" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="5 6"/>
  <path d="M736 192 l16 16 M752 192 l-16 16" fill="none" stroke="#c14a3a" stroke-width="3"/>
  <text x="540" y="392" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#c14a3a">a paperweight &#8212; you bought the hardware, not the use of it</text>
</svg>
