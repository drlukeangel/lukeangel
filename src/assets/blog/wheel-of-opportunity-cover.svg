<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="A row of eight circles — five dimmed, three filled in green — with a curved arrow looping back from end to start, suggesting a rotation that refills.">
  <!-- cream background, faint dot grid like the four-column-ask cover -->
  <rect width="1200" height="630" fill="#f5efe1"/>
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#d6cdb6"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f5e4e"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#dotGrid)" opacity="0.7"/>

  <!-- left accent bar (matches pm-fundamentals palette #2f5e4e) -->
  <rect x="0" y="0" width="10" height="630" fill="#c0613a"/>

  <!-- row of eight queue dots, centered. five dimmed (picked), three filled (still queued). -->
  <!-- centers: 240, 340, 440, 540, 640, 740, 840, 940 (gap 100, dia 80) -->
  <g>
    <!-- picked: 1-5 -->
    <circle cx="240" cy="285" r="42" fill="#f5efe1" stroke="#b3a98e" stroke-width="4" opacity="0.55"/>
    <circle cx="340" cy="285" r="42" fill="#f5efe1" stroke="#b3a98e" stroke-width="4" opacity="0.55"/>
    <circle cx="440" cy="285" r="42" fill="#f5efe1" stroke="#b3a98e" stroke-width="4" opacity="0.55"/>
    <circle cx="540" cy="285" r="42" fill="#f5efe1" stroke="#b3a98e" stroke-width="4" opacity="0.55"/>
    <circle cx="640" cy="285" r="42" fill="#f5efe1" stroke="#b3a98e" stroke-width="4" opacity="0.55"/>

    <!-- queued: 6-8, filled in green -->
    <circle cx="740" cy="285" r="46" fill="#2f5e4e" stroke="#1d3d33" stroke-width="3"/>
    <circle cx="840" cy="285" r="46" fill="#2f5e4e" stroke="#1d3d33" stroke-width="3"/>
    <circle cx="940" cy="285" r="46" fill="#2f5e4e" stroke="#1d3d33" stroke-width="3"/>

    <!-- small inner glow on the next-up (leftmost queued) circle to suggest 'who's next' -->
    <circle cx="740" cy="285" r="16" fill="#f5efe1" opacity="0.85"/>
  </g>

  <!-- curved arrow looping under the row, end-to-start, suggesting refill -->
  <path d="M 940 380 C 940 510, 240 510, 240 380"
        fill="none" stroke="#2f5e4e" stroke-width="6" stroke-linecap="round"
        marker-end="url(#arrowhead)"/>

  <!-- two tick marks separating picked vs queued, just visual structure -->
  <line x1="690" y1="200" x2="690" y2="370" stroke="#c0613a" stroke-width="3" stroke-dasharray="6 8"/>
</svg>
