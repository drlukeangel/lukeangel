<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470">
  <rect x="2" y="2" width="996" height="466" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    text{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24}
    .h{font-size:16px;font-weight:700}.sub{font-size:12px;fill:#5b616b}.note{font-size:12px;fill:#7a808c}.big{font-size:15px;font-weight:700;fill:#c14a3a}
  </style>
  <text class="note" x="40" y="38">an unbuilt item isn't free — it pays a small attention tax every cycle, forever</text>
  <!-- one item paying recurring small taxes -->
  <text class="h" x="50" y="92">one zombie item</text>
  <g fill="#c14a3a" fill-opacity="0.5">
    <rect x="50" y="110" width="44" height="22"/><rect x="104" y="110" width="44" height="22"/><rect x="158" y="110" width="44" height="22"/><rect x="212" y="110" width="44" height="22"/><rect x="266" y="110" width="44" height="22"/>
  </g>
  <text class="sub" x="50" y="152">re-read · re-litigated · re-deferred — each cycle, a sliver</text>
  <!-- x100 summed into a big block -->
  <text class="h" x="50" y="210">× 100 of them</text>
  <rect x="50" y="226" width="430" height="150" fill="#c14a3a" fill-opacity="0.16" stroke="#c14a3a" stroke-width="2.5"/>
  <text class="big" x="265" y="295" text-anchor="middle">a slice of every</text>
  <text class="big" x="265" y="320" text-anchor="middle">meeting, forever</text>
  <!-- right: the real list buried -->
  <text class="h" x="560" y="92">what actually matters</text>
  <g>
    <rect x="560" y="110" width="380" height="30" fill="#3a7d44" fill-opacity="0.20" stroke="#3a7d44" stroke-width="2"/>
    <text class="sub" x="575" y="130">the 20% worth building</text>
  </g>
  <!-- padding lines burying it -->
  <g fill="#1a1d24" fill-opacity="0.07">
    <rect x="560" y="148" width="380" height="22"/><rect x="560" y="176" width="380" height="22"/><rect x="560" y="204" width="380" height="22"/>
    <rect x="560" y="232" width="380" height="22"/><rect x="560" y="260" width="380" height="22"/><rect x="560" y="288" width="380" height="22"/>
    <rect x="560" y="316" width="380" height="22"/><rect x="560" y="344" width="380" height="22"/>
  </g>
  <text class="note" x="560" y="392">the padding is the zombies — they make the board lie about what's in play</text>
  <text class="note" x="40" y="440">the build cost you didn't pay isn't the savings; the carrying cost you keep paying is the loss.</text>
</svg>
