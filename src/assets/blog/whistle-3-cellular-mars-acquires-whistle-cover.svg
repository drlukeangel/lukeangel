<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Cellular tracker acquired">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- faint home regime behind: house + wifi (the cheap radio it leaves on at home) -->
  <g opacity="0.28">
    <!-- house -->
    <g transform="translate(250,360)" fill="none" stroke="#1a1d24" stroke-width="4">
      <path d="M -55 30 L -55 -10 L 0 -50 L 55 -10 L 55 30 Z"/>
      <rect x="-18" y="-5" width="36" height="35"/>
    </g>
    <!-- wifi arcs from house toward puck -->
    <g transform="translate(340,300)" stroke="#7a808c" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M 0 40 Q 40 0 80 40"/>
      <path d="M 14 52 Q 40 28 66 52"/>
    </g>
  </g>

  <!-- GPS satellite (top-left) beaming a fix down to the puck -->
  <g transform="translate(380,150)">
    <g transform="rotate(-18)">
      <rect x="-22" y="-12" width="44" height="24" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <!-- solar panels -->
      <rect x="-78" y="-16" width="48" height="32" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <line x1="-66" y1="-16" x2="-66" y2="16" stroke="#1a1d24" stroke-width="2"/>
      <line x1="-54" y1="-16" x2="-54" y2="16" stroke="#1a1d24" stroke-width="2"/>
      <line x1="-42" y1="-16" x2="-42" y2="16" stroke="#1a1d24" stroke-width="2"/>
      <rect x="30" y="-16" width="48" height="32" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <line x1="42" y1="-16" x2="42" y2="16" stroke="#1a1d24" stroke-width="2"/>
      <line x1="54" y1="-16" x2="54" y2="16" stroke="#1a1d24" stroke-width="2"/>
      <line x1="66" y1="-16" x2="66" y2="16" stroke="#1a1d24" stroke-width="2"/>
    </g>
    <!-- downlink beam toward puck center (600,430) -->
    <g stroke="#c87533" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
      <line x1="10" y1="30" x2="180" y2="240" stroke-dasharray="2 12"/>
    </g>
  </g>

  <!-- cellular tower (right) exchanging signal with puck -->
  <g transform="translate(860,250)">
    <path d="M -26 150 L -10 0 L 10 0 L 26 150" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <line x1="-20" y1="56" x2="20" y2="56" stroke="#1a1d24" stroke-width="3"/>
    <line x1="-23" y1="100" x2="23" y2="100" stroke="#1a1d24" stroke-width="3"/>
    <!-- emanating arcs -->
    <g stroke="#c87533" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M 16 -8 Q 44 -2 50 26"/>
      <path d="M 26 -16 Q 66 -8 74 34" opacity="0.6"/>
    </g>
    <!-- link to puck -->
    <line x1="-12" y1="120" x2="-150" y2="180" stroke="#c87533" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round"/>
  </g>

  <!-- corporate enclosure: heavy rounded boundary closing around the puck (the acquisition) -->
  <g>
    <rect x="468" y="318" width="264" height="252" rx="28" fill="#c87533" fill-opacity="0.06" stroke="#1a1d24" stroke-width="6"/>
    <!-- corner brackets to read as "walls closing in" -->
    <g stroke="#c87533" stroke-width="7" fill="none" stroke-linecap="round">
      <path d="M 492 360 L 492 342 L 512 342"/>
      <path d="M 708 342 L 728 342 L 728 360"/>
      <path d="M 492 528 L 492 546 L 512 546"/>
      <path d="M 708 546 L 728 546 L 728 528"/>
    </g>
  </g>

  <!-- the tracker puck at center, now inside the boundary -->
  <g transform="translate(600,444)">
    <circle cx="0" cy="0" r="66" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#c87533" stroke-width="4"/>
    <circle cx="0" cy="0" r="11" fill="#c87533"/>
    <!-- small collar tab top -->
    <rect x="-16" y="-80" width="32" height="20" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  </g>
</svg>
