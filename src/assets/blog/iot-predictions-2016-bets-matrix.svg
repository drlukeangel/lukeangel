<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" role="img" aria-label="2016 bets matrix">
  <rect width="820" height="560" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="20" fill="#1a1d24" font-weight="600">Eight bets for 2016</text>
    <text x="40" y="66" font-size="12" fill="#7a808c">conviction (down) vs. how soon it lands (across)</text>
    <text x="40" y="86" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">top-left = bets I'd stake money on · bottom-right = the ones I'd hedge</text>

    <!-- axes -->
    <g stroke="#1a1d24" stroke-opacity="0.35" stroke-width="1.5">
      <line x1="110" y1="120" x2="110" y2="500"/>
      <line x1="110" y1="500" x2="780" y2="500"/>
    </g>
    <text x="58" y="132" font-size="12" fill="#5b616b">high</text>
    <text x="64" y="496" font-size="12" fill="#5b616b">low</text>
    <g transform="translate(36,320) rotate(-90)"><text font-size="13" fill="#1a1d24" text-anchor="middle">conviction</text></g>
    <text x="120" y="528" font-size="12" fill="#5b616b">H1 / soon</text>
    <text x="700" y="528" font-size="12" fill="#5b616b" text-anchor="end">H2 / uncertain</text>
    <text x="445" y="548" font-size="13" fill="#1a1d24" text-anchor="middle">timing within the year</text>

    <!-- quadrant guides -->
    <line x1="445" y1="120" x2="445" y2="500" stroke="#1a1d24" stroke-opacity="0.08" stroke-dasharray="4 6"/>
    <line x1="110" y1="310" x2="780" y2="310" stroke="#1a1d24" stroke-opacity="0.08" stroke-dasharray="4 6"/>

    <g font-size="12">
      <!-- TOP-LEFT cluster: high conviction, soon/mid -->
      <!-- 1 -->
      <circle cx="180" cy="160" r="15" fill="#0066cc"/><text x="180" y="165" fill="#fff" text-anchor="middle" font-weight="700">1</text>
      <text x="202" y="164" fill="#1a1d24">voice = the smart-home default</text>
      <!-- 4 -->
      <circle cx="210" cy="215" r="15" fill="#0066cc"/><text x="210" y="220" fill="#fff" text-anchor="middle" font-weight="700">4</text>
      <text x="232" y="219" fill="#1a1d24">consumer mesh Wi-Fi arrives</text>
      <!-- 7 -->
      <circle cx="300" cy="270" r="15" fill="#0066cc"/><text x="300" y="275" fill="#fff" text-anchor="middle" font-weight="700">7</text>
      <text x="322" y="274" fill="#1a1d24">no FDA-cleared health on the wrist</text>

      <!-- TOP-RIGHT: high-ish conviction, later -->
      <!-- 3 (just right of center, high) -->
      <circle cx="500" cy="175" r="15" fill="#0066cc"/><text x="500" y="180" fill="#fff" text-anchor="middle" font-weight="700">3</text>
      <text x="522" y="179" fill="#1a1d24">Echo is the hub; stand-alone hubs go flat</text>
      <!-- 8 -->
      <circle cx="560" cy="235" r="15" fill="#0066cc"/><text x="560" y="240" fill="#fff" text-anchor="middle" font-weight="700">8</text>
      <text x="582" y="239" fill="#1a1d24">Pebble runs out of runway</text>

      <!-- BOTTOM-RIGHT: lower conviction / later -->
      <!-- 2 -->
      <circle cx="500" cy="360" r="15" fill="#0066cc" fill-opacity="0.7"/><text x="500" y="365" fill="#fff" text-anchor="middle" font-weight="700">2</text>
      <text x="522" y="364" fill="#1a1d24">Watch apps stay glanceable</text>
      <!-- 5 -->
      <circle cx="560" cy="415" r="15" fill="#0066cc" fill-opacity="0.7"/><text x="560" y="420" fill="#fff" text-anchor="middle" font-weight="700">5</text>
      <text x="582" y="419" fill="#1a1d24">camera category consolidates (Ring)</text>
      <!-- 6 most hedged -->
      <circle cx="610" cy="465" r="15" fill="#0066cc" fill-opacity="0.55"/><text x="610" y="470" fill="#fff" text-anchor="middle" font-weight="700">6</text>
      <text x="632" y="469" fill="#1a1d24">AR via the phone you carry</text>
    </g>
  </g>
</svg>
