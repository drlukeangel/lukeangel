<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" role="img" aria-label="Empty conduit with a pull string versus a future rewire">
  <rect width="1000" height="420" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13.5px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .big { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">WHY 12 EMPTY CONDUITS — THE PULL-STRING BET</text>

  <!-- TODAY: empty conduit with pull string -->
  <text x="60" y="84" class="lbl">TODAY (walls open)</text>
  <g transform="translate(60,100)">
    <!-- conduit tube -->
    <rect x="0" y="20" width="380" height="44" rx="22" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <rect x="0" y="20" width="380" height="44" rx="22" fill="none" stroke="#6a4c93" stroke-width="3" stroke-dasharray="2 6" opacity="0.5"/>
    <!-- pull string running through -->
    <path d="M14 42 q 90 -12 180 0 t 180 0" fill="none" stroke="#1a1d24" stroke-width="2" stroke-dasharray="5 4"/>
    <circle cx="14" cy="42" r="5" fill="#1a1d24"/>
    <circle cx="374" cy="42" r="5" fill="#1a1d24"/>
    <text x="190" y="98" text-anchor="middle" class="sub">empty smurf tube + a pull string tied off both ends</text>
  </g>

  <!-- 2027: feed a cable -->
  <text x="560" y="84" class="lbl">LATER (drywall up)</text>
  <g transform="translate(560,100)">
    <rect x="0" y="20" width="380" height="44" rx="22" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <!-- a cable now pulled through -->
    <path d="M14 42 q 90 -12 180 0 t 180 0" fill="none" stroke="#6a4c93" stroke-width="6"/>
    <circle cx="14" cy="42" r="6" fill="#6a4c93"/>
    <circle cx="374" cy="42" r="6" fill="#6a4c93"/>
    <text x="190" y="98" text-anchor="middle" class="sub">tie new cable to the string, pull it through, terminate</text>
  </g>

  <!-- arrow between -->
  <g transform="translate(460,142)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#1a1d24" stroke-width="3"/><path d="M80 0 l-12 -6 v12 z" fill="#1a1d24"/>
  </g>

  <!-- the cost contrast -->
  <g transform="translate(60,250)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-width="2"/>
    <text x="24" y="40" class="big" fill="#3a7d44">~30 minutes</text>
    <text x="24" y="68" class="sub">with conduit + pull string in place</text>
    <text x="24" y="92" class="sub">feed · pull · terminate</text>
  </g>
  <g transform="translate(560,250)">
    <rect x="0" y="0" width="380" height="110" rx="10" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-width="2"/>
    <text x="24" y="40" class="big" fill="#c14a3a">~$1,000 + drywall</text>
    <text x="24" y="68" class="sub">without it: open walls, fish cable,</text>
    <text x="24" y="92" class="sub">patch, repaint</text>
  </g>

  <text x="500" y="398" text-anchor="middle" class="cap">The conduit is empty on purpose. The bet isn't the cable — it's keeping the path cheap to use later.</text>
</svg>
