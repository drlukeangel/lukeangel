<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img" aria-label="Echo voice-to-lights path">
  <rect width="940" height="470" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>
  <defs><marker id="ea" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#6a4c93"/></marker></defs>

  <text x="40" y="42" class="hd">"Alexa, turn off the living room lights" — where it goes</text>

  <!-- on-device band (left) -->
  <rect x="36" y="64" width="250" height="360" rx="10" fill="#6a4c93" fill-opacity="0.04" stroke="#6a4c93" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="48" y="86" class="sm">ON THE DEVICE</text>
  <!-- cloud band (right) -->
  <rect x="300" y="64" width="380" height="360" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="2"/>
  <text x="312" y="86" class="sm">AMAZON CLOUD</text>
  <!-- your network band (far right) -->
  <rect x="694" y="64" width="210" height="360" rx="10" fill="#6a4c93" fill-opacity="0.04" stroke="#6a4c93" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="706" y="86" class="sm">YOUR HOME</text>

  <!-- steps -->
  <g class="lab">
    <!-- 1 wake word -->
    <g transform="translate(60,108)"><rect x="0" y="0" width="200" height="46" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/><text x="12" y="20">wake-word DSP</text><text x="12" y="38" class="sm">hears "Alexa" (~50ms), local</text></g>
    <line x1="160" y1="154" x2="160" y2="180" stroke="#6a4c93" stroke-width="2.5" marker-end="url(#ea)"/>
    <!-- 2 stream -->
    <g transform="translate(60,184)"><rect x="0" y="0" width="200" height="40" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/><text x="12" y="25">LED ring blue → streams audio</text></g>
    <!-- arrow to cloud -->
    <line x1="262" y1="204" x2="324" y2="150" stroke="#6a4c93" stroke-width="2.5" marker-end="url(#ea)"/>

    <!-- 3 ASR -->
    <g transform="translate(320,108)"><rect x="0" y="0" width="340" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><text x="12" y="25">ASR transcribes the audio</text></g>
    <line x1="490" y1="148" x2="490" y2="172" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ea)"/>
    <!-- 4 NLU -->
    <g transform="translate(320,176)"><rect x="0" y="0" width="340" height="48" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><text x="12" y="22">NLU → intent: TurnOff</text><text x="12" y="40" class="sm">device = "living room lights"</text></g>
    <line x1="490" y1="224" x2="490" y2="248" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ea)"/>
    <!-- 5 hue cloud -->
    <g transform="translate(320,252)"><rect x="0" y="0" width="340" height="48" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><text x="12" y="22">calls Hue cloud API</text><text x="12" y="40" class="sm">PUT /groups/&lt;id&gt;/action {on:false}</text></g>
    <!-- arrow to home -->
    <line x1="662" y1="276" x2="708" y2="200" stroke="#6a4c93" stroke-width="2.5" marker-end="url(#ea)"/>

    <!-- 6 bridge -->
    <g transform="translate(706,170)"><rect x="0" y="0" width="186" height="46" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/><text x="12" y="20">Hue bridge</text><text x="12" y="38" class="sm">Zigbee multicast to group</text></g>
    <line x1="800" y1="216" x2="800" y2="248" stroke="#6a4c93" stroke-width="2.5" marker-end="url(#ea)"/>
    <!-- 7 bulbs off -->
    <g transform="translate(706,252)"><rect x="0" y="0" width="186" height="40" rx="8" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/><text x="12" y="25">bulbs turn off</text></g>
  </g>

  <line x1="40" y1="436" x2="900" y2="436" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="460" class="cap">End to end: ~1–3s for Hue. Wake word is local; everything after the ring goes to the cloud and back.</text>
</svg>
