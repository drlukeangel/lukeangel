<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A connected device with its private key sealed inside an on-board secure element, enrolled into a fleet of devices. One device in the fleet is shown revoked with a red cross.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="fgd-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#fgd-dots)"/>
  <rect width="24" height="630" fill="#c14a3a"/>

  <!-- faint fleet grid (right) -->
  <g fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.18">
    <rect x="620" y="196" width="34" height="24" rx="6"/>
    <rect x="760" y="196" width="34" height="24" rx="6"/>
    <rect x="900" y="196" width="34" height="24" rx="6"/>
    <rect x="1040" y="196" width="34" height="24" rx="6"/>
    <rect x="620" y="300" width="34" height="24" rx="6"/>
    <rect x="900" y="300" width="34" height="24" rx="6"/>
    <rect x="1040" y="300" width="34" height="24" rx="6"/>
    <rect x="620" y="404" width="34" height="24" rx="6"/>
    <rect x="760" y="404" width="34" height="24" rx="6"/>
    <rect x="900" y="404" width="34" height="24" rx="6"/>
    <rect x="1040" y="404" width="34" height="24" rx="6"/>
    <rect x="620" y="508" width="34" height="24" rx="6"/>
    <rect x="760" y="508" width="34" height="24" rx="6"/>
    <rect x="900" y="508" width="34" height="24" rx="6"/>
    <rect x="1040" y="508" width="34" height="24" rx="6"/>
  </g>

  <!-- enrollment lines: hero -> near fleet column -->
  <g stroke="#1a1d24" stroke-width="1.6" opacity="0.2">
    <line x1="470" y1="320" x2="620" y2="208"/>
    <line x1="470" y1="320" x2="620" y2="312"/>
    <line x1="470" y1="320" x2="620" y2="416"/>
  </g>

  <!-- revoked node (accent, crossed out) -->
  <g transform="translate(760,300)">
    <rect x="0" y="0" width="34" height="24" rx="6" fill="none" stroke="#c14a3a" stroke-width="3"/>
    <line x1="-6" y1="-6" x2="40" y2="30" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="40" y1="-6" x2="-6" y2="30" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- trust arcs radiating from the hero device -->
  <g transform="translate(300,320)" fill="none" stroke="#c14a3a" stroke-linecap="round">
    <path d="M150 -70 A 165 165 0 0 1 150 70" stroke-width="4" opacity="0.5"/>
    <path d="M195 -110 A 230 230 0 0 1 195 110" stroke-width="4" opacity="0.3"/>
    <path d="M240 -150 A 295 295 0 0 1 240 150" stroke-width="4" opacity="0.16"/>
  </g>

  <!-- hero device -->
  <rect x="150" y="210" width="300" height="220" rx="26" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
  <circle cx="186" cy="248" r="7" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <circle cx="186" cy="248" r="2.5" fill="#c14a3a"/>

  <!-- secure element chip inside the device -->
  <g transform="translate(235,270)">
    <g stroke="#1a1d24" stroke-width="4" stroke-linecap="round">
      <line x1="-12" y1="26" x2="0" y2="26"/><line x1="-12" y1="66" x2="0" y2="66"/><line x1="-12" y1="106" x2="0" y2="106"/>
      <line x1="130" y1="26" x2="142" y2="26"/><line x1="130" y1="66" x2="142" y2="66"/><line x1="130" y1="106" x2="142" y2="106"/>
    </g>
    <rect x="0" y="0" width="130" height="130" rx="16" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
    <g transform="translate(40,38)" fill="none" stroke="#c14a3a" stroke-width="5.5" stroke-linecap="round">
      <circle cx="16" cy="16" r="15"/>
      <line x1="27" y1="27" x2="58" y2="58"/>
      <line x1="47" y1="47" x2="57" y2="37"/>
      <line x1="53" y1="53" x2="63" y2="43"/>
    </g>
  </g>
</svg>
