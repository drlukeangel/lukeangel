<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="Activity falling and scratching rising over the same six months.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">TWO TRENDS, ONE DOG, SAME SIX MONTHS</text>

  <!-- plot frame -->
  <line x1="120" y1="80" x2="120" y2="380" stroke="#1a1d24" stroke-width="1.5" opacity="0.25"/>
  <line x1="120" y1="380" x2="1000" y2="380" stroke="#1a1d24" stroke-width="1.5" opacity="0.25"/>
  <!-- month ticks -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#7a808c" text-anchor="middle">
    <text x="190" y="402">APR</text>
    <text x="320" y="402">MAY</text>
    <text x="450" y="402">JUN</text>
    <text x="580" y="402">JUL</text>
    <text x="710" y="402">AUG</text>
    <text x="840" y="402">SEP</text>
    <text x="960" y="402">OCT</text>
  </g>
  <g stroke="#1a1d24" stroke-width="1" opacity="0.08">
    <line x1="320" y1="80" x2="320" y2="380"/>
    <line x1="450" y1="80" x2="450" y2="380"/>
    <line x1="580" y1="80" x2="580" y2="380"/>
    <line x1="710" y1="80" x2="710" y2="380"/>
    <line x1="840" y1="80" x2="840" y2="380"/>
  </g>

  <!-- ACTIVITY: the watched line, declining -->
  <polyline points="190,120 320,128 450,150 580,196 710,244 840,300 960,348"
            fill="none" stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <g fill="#1a1d24">
    <circle cx="190" cy="120" r="4"/><circle cx="450" cy="150" r="4"/><circle cx="710" cy="244" r="4"/><circle cx="960" cy="348" r="4"/>
  </g>
  <!-- label for activity -->
  <rect x="600" y="98" width="250" height="44" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.4"/>
  <text x="616" y="118" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">ACTIVITY — the number I watched</text>
  <text x="616" y="134" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">front page, sloping gently down</text>

  <!-- SCRATCHING: the missed line, rising -->
  <polyline points="190,344 320,350 450,326 580,304 710,294 840,250 960,200"
            fill="none" stroke="#c87533" stroke-width="3.5" stroke-linecap="round"/>
  <g fill="#c87533">
    <circle cx="190" cy="344" r="4"/><circle cx="450" cy="326" r="4"/><circle cx="710" cy="294" r="4"/><circle cx="960" cy="200" r="5.5"/>
  </g>
  <!-- label for scratching -->
  <rect x="150" y="206" width="250" height="44" rx="7" fill="#c87533" fill-opacity="0.1" stroke="#c87533" stroke-width="1.8"/>
  <text x="166" y="226" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">SCRATCHING — the one I missed</text>
  <text x="166" y="242" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">+116% by October, a tap deeper</text>

  <!-- marker at the September vet visit -->
  <line x1="840" y1="80" x2="840" y2="380" stroke="#5b616b" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="840" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#5b616b">Sept — diagnosis</text>

  <text x="540" y="446" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">Both lines were in the app the whole time. I only ever looked at one of them.</text>
</svg>
