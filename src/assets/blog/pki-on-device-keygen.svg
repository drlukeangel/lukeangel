<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 360" width="1140" height="360" role="img" aria-label="On first boot the secure element generates the keypair; the private key stays locked inside the chip while the public key leaves in a CSR with the device serial, the issuing CA signs it, and the signed device certificate is installed back on the device.">
  <rect width="1140" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ON THE DEVICE · FIRST BOOT</text>

  <!-- secure element -->
  <g transform="translate(46,92)">
    <g stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round">
      <line x1="-12" y1="40" x2="0" y2="40"/><line x1="-12" y1="90" x2="0" y2="90"/><line x1="-12" y1="140" x2="0" y2="140"/>
      <line x1="200" y1="40" x2="212" y2="40"/><line x1="200" y1="90" x2="212" y2="90"/><line x1="200" y1="140" x2="212" y2="140"/>
    </g>
    <rect x="0" y="0" width="200" height="180" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <text x="100" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" letter-spacing="1" fill="#7a808c">SECURE ELEMENT</text>
    <g transform="translate(58,58)" stroke="#c14a3a" stroke-width="3" fill="none">
      <rect x="0" y="18" width="40" height="32" rx="5"/>
      <path d="M7 18 v-9 a13 13 0 0 1 26 0 v9"/>
      <circle cx="20" cy="33" r="4" fill="#c14a3a" stroke="none"/>
    </g>
    <text x="100" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">private key — stays inside</text>
  </g>

  <!-- public key out -->
  <g transform="translate(258,176)">
    <text x="56" y="-13" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">public key</text>
    <line x1="0" y1="0" x2="104" y2="0" stroke="#1a1d24" stroke-width="3"/>
    <path d="M104 0 l-14 -7 v14 z" fill="#1a1d24"/>
  </g>

  <!-- CSR -->
  <g transform="translate(370,124)">
    <rect x="0" y="0" width="172" height="104" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="86" y="36" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">CSR</text>
    <text x="86" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">public key</text>
    <text x="86" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">+ device serial</text>
  </g>

  <g transform="translate(554,176)">
    <text x="50" y="-13" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">CSR</text>
    <line x1="0" y1="0" x2="96" y2="0" stroke="#1a1d24" stroke-width="3"/>
    <path d="M96 0 l-14 -7 v14 z" fill="#1a1d24"/>
  </g>

  <!-- issuing CA -->
  <g transform="translate(662,124)">
    <rect x="0" y="0" width="172" height="104" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="86" y="44" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">ISSUING CA</text>
    <text x="86" y="70" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">signs the cert</text>
  </g>

  <g transform="translate(846,176)">
    <text x="58" y="-13" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">signed cert</text>
    <line x1="0" y1="0" x2="104" y2="0" stroke="#c14a3a" stroke-width="3"/>
    <path d="M104 0 l-14 -7 v14 z" fill="#c14a3a"/>
  </g>

  <!-- device cert installed -->
  <g transform="translate(958,118)">
    <rect x="0" y="0" width="150" height="116" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <text x="75" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#c14a3a">DEVICE CERT</text>
    <text x="75" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">public key +</text>
    <text x="75" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">serial +</text>
    <text x="75" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">CA signature</text>
  </g>

  <text x="146" y="312" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">the private key never leaves the chip</text>
</svg>
