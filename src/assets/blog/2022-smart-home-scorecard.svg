<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-label="2022 forecast scorecard">
  <rect width="1000" height="430" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">SCORING THE 2022 FORECAST</text>
  <text x="40" y="78" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#7a808c">8 predictions &#183; ~70% &#183; the misses are all timing</text>

  <!-- legend -->
  <g transform="translate(40,114)">
    <g>
      <circle cx="16" cy="16" r="16" fill="#3a7d44"/>
      <path d="M8 16 l5 6 l11 -13" fill="none" stroke="#fdfaf2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#1a1d24">HIT</text>
      <text x="44" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">5</text>
    </g>
    <g transform="translate(300,0)">
      <circle cx="16" cy="16" r="16" fill="#c14a3a"/>
      <path d="M9 9 l14 14 M23 9 l-14 14" stroke="#fdfaf2" stroke-width="3" stroke-linecap="round"/>
      <text x="44" y="14" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#1a1d24">MISS</text>
      <text x="44" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">3 &#183; 2 partial, 1 clean</text>
    </g>
  </g>

  <!-- rows -->
  <g transform="translate(40,184)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14.5" fill="#1a1d24">
    <g transform="translate(0,0)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Matter 1.0 ships</text><text x="690" y="0" fill="#7a808c" font-size="12.5">ratified Oct 4</text></g>
    <g transform="translate(0,32)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">Frigate 0.12 + face recognition</text><text x="690" y="0" fill="#7a808c" font-size="12.5">0.11 only; bolt-on (partial)</text></g>
    <g transform="translate(0,64)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">New-house build planning</text><text x="690" y="0" fill="#7a808c" font-size="12.5">lot bought Oct</text></g>
    <g transform="translate(0,96)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">ESPHome keeps exploding</text><text x="690" y="0" fill="#7a808c" font-size="12.5">22 devices (was 14)</text></g>
    <g transform="translate(0,128)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Aqara Matter-bridge for Zigbee</text><text x="690" y="0" fill="#7a808c" font-size="12.5">M2 shipped</text></g>
    <g transform="translate(0,160)"><circle cx="11" cy="-5" r="11" fill="#3a7d44"/><text x="34" y="0">Home Assistant Yellow ships</text><text x="690" y="0" fill="#7a808c" font-size="12.5">primary host now</text></g>
    <g transform="translate(0,192)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">A DIY weather station</text><text x="690" y="0" fill="#7a808c" font-size="12.5">half-built (partial)</text></g>
    <g transform="translate(0,224)"><circle cx="11" cy="-5" r="11" fill="#c14a3a"/><text x="34" y="0">Tesla Powerwall in the plan</text><text x="690" y="0" fill="#7a808c" font-size="12.5">decided against</text></g>
  </g>
</svg>
