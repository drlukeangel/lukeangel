<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Hardware lands, intelligence slips">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24">

    <text x="500" y="44" text-anchor="middle" font-size="16">the recurring pattern: the box arrives on time, the intelligence layer slips a year</text>

    <!-- timeline -->
    <line x1="120" y1="170" x2="900" y2="170" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
    <g font-size="12" fill="#5b616b" text-anchor="middle">
      <text x="220" y="196">forecast year</text>
      <text x="510" y="196">+1 year</text>
      <text x="800" y="196">+2 years</text>
    </g>
    <g fill="#5b616b">
      <circle cx="220" cy="170" r="4"/><circle cx="510" cy="170" r="4"/><circle cx="800" cy="170" r="4"/>
    </g>

    <!-- hardware row: lands on date -->
    <text x="120" y="92" font-size="14" fill="#3a7d44">HARDWARE — lands on its date</text>
    <g>
      <rect x="195" y="104" width="50" height="30" rx="6" fill="#3a7d44" fill-opacity="0.18" stroke="#3a7d44" stroke-width="2.5"/>
      <path d="M208 119 l8 8 14 -16" fill="none" stroke="#3a7d44" stroke-width="3"/>
      <text x="265" y="124" font-size="12" fill="#5b616b">Bespoke kitchen · EV charger · 3 Matter bridges · 2nd LoRa gateway — all shipped</text>
    </g>

    <!-- intelligence row: slips -->
    <text x="120" y="240" font-size="14" fill="#c14a3a">INTELLIGENCE — slips a year</text>
    <g>
      <!-- predicted at forecast year -->
      <rect x="195" y="252" width="50" height="30" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="4 4"/>
      <text x="220" y="304" text-anchor="middle" font-size="11" fill="#c14a3a">predicted</text>
      <!-- slip arrow -->
      <line x1="250" y1="267" x2="476" y2="267" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="3 6"/>
      <path d="M484 267 l-14 -7 v14 z" fill="#c14a3a"/>
      <!-- still not shipped at +1 -->
      <rect x="486" y="252" width="50" height="30" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <path d="M499 258 l24 18 M523 258 l-24 18" stroke="#c14a3a" stroke-width="3"/>
      <text x="511" y="304" text-anchor="middle" font-size="11" fill="#c14a3a">still not there</text>
      <text x="575" y="272" font-size="12" fill="#5b616b">Frigate face recognition + all-local</text>
      <text x="575" y="290" font-size="12" fill="#5b616b">HA voice — pulled / robotic, deferred</text>
    </g>

    <text x="500" y="392" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">6 of 8 hit — and both misses were the same bet: AI-on-camera maturing enough to deploy</text>
  </g>
</svg>
