<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" width="1100" height="420" role="img" aria-label="A/B firmware slots with auto-rollback. A new signed image is written to the inactive slot B; the device boots into it and must mark itself good within N minutes. If it does, B becomes active; if it doesn't, the bootloader automatically rolls back to slot A, the last known-good image.">
  <rect width="1100" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">A/B SLOTS — UPDATE, THEN PROVE IT</text>

  <g transform="translate(40,150)">
    <rect x="0" y="0" width="156" height="86" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(16,18)"><rect x="0" y="0" width="30" height="30" rx="5" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/><path d="M7 15 l6 6 11 -14" fill="none" stroke="#2a52be" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
    <text x="98" y="40" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">new signed</text>
    <text x="98" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">image</text>
  </g>
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="196" y1="193" x2="240" y2="193"/><path d="M244 193 l-15 -7 v14 z"/></g>

  <g transform="translate(256,150)">
    <rect x="0" y="0" width="170" height="86" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-dasharray="9 6"/>
    <text x="85" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">SLOT B</text>
    <text x="85" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">try on next boot</text>
  </g>
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="426" y1="193" x2="470" y2="193"/><path d="M474 193 l-15 -7 v14 z"/></g>

  <polygon points="586,150 668,193 586,236 504,193" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="586" y="189" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">good in</text>
  <text x="586" y="205" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">N min?</text>

  <g stroke="#3a7d44" stroke-width="3" fill="none"><path d="M668 193 H 760 V 130"/></g>
  <path d="M760 126 l-7 15 h14 z" fill="#3a7d44"/>
  <text x="714" y="182" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">yes</text>
  <rect x="760" y="92" width="300" height="68" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
  <text x="910" y="123" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#3a7d44">SLOT B becomes active</text>
  <text x="910" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">the update sticks</text>

  <g stroke="#2a52be" stroke-width="3" fill="none"><path d="M668 193 H 760 V 256"/></g>
  <path d="M760 260 l-7 -15 h14 z" fill="#2a52be"/>
  <text x="714" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#2a52be">no</text>
  <rect x="760" y="260" width="300" height="68" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
  <text x="910" y="291" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#2a52be">auto-rollback to SLOT A</text>
  <text x="910" y="311" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">last known-good · never bricks</text>

  <text x="430" y="384" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Slot A stays untouched until B proves itself.</text>
</svg>
