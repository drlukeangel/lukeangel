<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A Raspberry Pi running the home locally">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- the house outline (the whole system lives inside it) -->
  <path d="M120 250 L600 120 L1080 250 L1080 520 L120 520 Z" fill="none" stroke="#1a1d24" stroke-width="3.5" stroke-linejoin="round" opacity="0.5"/>
  <path d="M120 250 L600 120 L1080 250" fill="none" stroke="#6a4c93" stroke-width="5" stroke-linejoin="round"/>

  <!-- Raspberry Pi board, center -->
  <g transform="translate(470,310)">
    <rect x="0" y="0" width="260" height="170" rx="12" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- SoC chip -->
    <rect x="96" y="56" width="64" height="60" rx="6" fill="#1a1d24"/>
    <!-- GPIO header (double row of pins) -->
    <g fill="#6a4c93">
      <rect x="20" y="18" width="8" height="8"/><rect x="34" y="18" width="8" height="8"/><rect x="48" y="18" width="8" height="8"/><rect x="62" y="18" width="8" height="8"/><rect x="76" y="18" width="8" height="8"/><rect x="90" y="18" width="8" height="8"/><rect x="104" y="18" width="8" height="8"/><rect x="118" y="18" width="8" height="8"/><rect x="132" y="18" width="8" height="8"/><rect x="146" y="18" width="8" height="8"/>
      <rect x="20" y="30" width="8" height="8"/><rect x="34" y="30" width="8" height="8"/><rect x="48" y="30" width="8" height="8"/><rect x="62" y="30" width="8" height="8"/><rect x="76" y="30" width="8" height="8"/><rect x="90" y="30" width="8" height="8"/><rect x="104" y="30" width="8" height="8"/><rect x="118" y="30" width="8" height="8"/><rect x="132" y="30" width="8" height="8"/><rect x="146" y="30" width="8" height="8"/>
    </g>
    <!-- USB + ethernet blocks on the right edge -->
    <rect x="206" y="40" width="46" height="28" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="206" y="78" width="46" height="28" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- a healthy status LED -->
    <circle cx="34" cy="150" r="7" fill="#3a7d44"/>
  </g>

  <!-- local links out to device glyphs inside the house -->
  <g stroke="#6a4c93" stroke-width="3" fill="none" opacity="0.8">
    <path d="M470 360 H300"/>
    <path d="M730 360 H900"/>
    <path d="M600 480 V520"/>
  </g>
  <!-- bulb glyph (left) -->
  <g transform="translate(250,340)">
    <circle cx="0" cy="0" r="20" fill="#6a4c93" fill-opacity="0.18" stroke="#1a1d24" stroke-width="3"/>
    <rect x="-9" y="18" width="18" height="9" rx="2" fill="#1a1d24" opacity="0.5"/>
  </g>
  <!-- sensor glyph (right) -->
  <g transform="translate(940,340)">
    <rect x="-20" y="-16" width="40" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#6a4c93"/>
  </g>

  <!-- crossed-out cloud above the roof: nothing leaves the house -->
  <g transform="translate(540,150)">
    <path d="M40 50 a24 24 0 0 1 4 -46 a30 30 0 0 1 56 6 a20 20 0 0 1 -2 40 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="3.5" opacity="0.6"/>
    <line x1="14" y1="10" x2="112" y2="66" stroke="#c14a3a" stroke-width="4.5"/>
  </g>
</svg>
