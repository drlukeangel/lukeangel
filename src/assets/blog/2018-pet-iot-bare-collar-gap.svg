<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Atom bare-collar gap 2018">
  <rect width="960" height="420" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
    .bad{fill:#c14a3a;}
    .acc{fill:#c87533;}
  </style>

  <text x="40" y="46" class="ttl">Atom's collar in 2018 — the blank that was the right call</text>

  <!-- month axis -->
  <line x1="80" y1="200" x2="880" y2="200" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
  <text x="80" y="320" class="sm">Jan</text>
  <text x="430" y="320" class="sm">Aug</text>
  <text x="850" y="320" text-anchor="end" class="sm">Dec →</text>

  <!-- Whistle 3 worn Jan-Aug -->
  <rect x="80" y="160" width="360" height="36" rx="6" fill="#c87533" fill-opacity="0.25" stroke="#c87533" stroke-width="2.5"/>
  <text x="260" y="184" text-anchor="middle" class="sm">Whistle 3 (cellular) — battery degraded</text>
  <!-- decommission marker -->
  <line x1="440" y1="140" x2="440" y2="296" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="440" y="132" text-anchor="middle" class="sm bad">decommissioned</text>

  <!-- bare-collar gap Aug-Dec -->
  <rect x="440" y="160" width="360" height="36" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="620" y="184" text-anchor="middle" class="sm bad">bare collar — 4 months, deliberate</text>

  <!-- waiting-for-Fi pointer -->
  <line x1="800" y1="178" x2="870" y2="178" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="835" y="232" text-anchor="middle" class="sm acc">waiting</text>
  <text x="835" y="248" text-anchor="middle" class="sm acc">for Fi</text>

  <!-- reasoning row -->
  <rect x="80" y="262" width="720" height="30" rx="6" fill="#fdfaf2" stroke="#7a808c" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" class="sm">only worthwhile cellular tracker was a newer Whistle — and Mars locked the API, so: buy nothing</text>

  <line x1="40" y1="350" x2="920" y2="350" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="480" y="386" text-anchor="middle" class="cap">The truest entry in the ledger this year is a blank — and it was the right move.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
  </defs>
</svg>
