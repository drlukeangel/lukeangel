<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Each layer has its own owner and its own remediation cost.">
  <rect width="1000" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">SEVEN OWNERS · SEVEN REMEDIATION COSTS</text>

  <!-- column heads -->
  <g font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">
    <text x="40"  y="78">LAYER</text>
    <text x="320" y="78">OWNS IT</text>
    <text x="640" y="78">COST TO FIX A BREAK</text>
  </g>
  <line x1="40" y1="88" x2="960" y2="88" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- rows: y centres at 116,164,212,260,308,356,404 -->
  <g font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">
    <text x="40" y="121">1 Hardware</text>
    <text x="320" y="121">HW eng + mfg</text>
    <text x="40" y="169">2 Firmware</text>
    <text x="320" y="169">firmware eng</text>
    <text x="40" y="217">3 Identity</text>
    <text x="320" y="217">cloud + firmware</text>
    <text x="40" y="265">4 Transport</text>
    <text x="320" y="265">cloud + firmware</text>
    <text x="40" y="313">5 Cloud / app</text>
    <text x="320" y="313">platform eng</text>
    <text x="40" y="361">6 Data</text>
    <text x="320" y="361">data + privacy</text>
    <text x="40" y="409">7 Detection</text>
    <text x="320" y="409">ops / security</text>
  </g>

  <!-- cost bars: longer = costlier. anchored at x=640 -->
  <g>
    <!-- 1 hardware: board respin = worst -->
    <rect x="640" y="106" width="300" height="20" rx="5" fill="#c14a3a" fill-opacity="0.85"/>
    <text x="650" y="121" font-family="ui-monospace,monospace" font-size="11" fill="#fdfaf2">board respin</text>
    <!-- 2 firmware -->
    <rect x="640" y="154" width="180" height="20" rx="5" fill="#c14a3a" fill-opacity="0.55"/>
    <text x="650" y="169" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">emergency OTA</text>
    <!-- 3 identity -->
    <rect x="640" y="202" width="150" height="20" rx="5" fill="#c14a3a" fill-opacity="0.45"/>
    <text x="650" y="217" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">cert re-issue</text>
    <!-- 4 transport -->
    <rect x="640" y="250" width="110" height="20" rx="5" fill="#c14a3a" fill-opacity="0.35"/>
    <text x="650" y="265" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">policy + reconnect</text>
    <!-- 5 cloud -->
    <rect x="640" y="298" width="120" height="20" rx="5" fill="#c14a3a" fill-opacity="0.4"/>
    <text x="650" y="313" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">IAM redeploy</text>
    <!-- 6 data -->
    <rect x="640" y="346" width="240" height="20" rx="5" fill="#c14a3a" fill-opacity="0.7"/>
    <text x="650" y="361" font-family="ui-monospace,monospace" font-size="11" fill="#fdfaf2">disclosure + GDPR</text>
    <!-- 7 detection -->
    <rect x="640" y="394" width="90" height="20" rx="5" fill="#c14a3a" fill-opacity="0.3"/>
    <text x="650" y="409" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">tune + alert</text>
  </g>

  <text x="40" y="450" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">silicon is the one you cannot patch — which is why it ships in v1</text>
</svg>
