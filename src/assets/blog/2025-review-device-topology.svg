<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" width="1040" height="560" role="img" aria-label="2025 smart-home device topology with Matter bridge layer">
  <rect x="0.5" y="0.5" width="1039" height="559" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .labw{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;font-weight:700;fill:#fdfaf2}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b}
    .acc{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;font-weight:700;fill:#6a4c93}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <!-- TOP: four ecosystem views -->
  <g>
    <rect x="60" y="40" width="190" height="54" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="155" y="73" text-anchor="middle" class="lab">Apple Home</text>
    <rect x="290" y="40" width="190" height="54" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="385" y="73" text-anchor="middle" class="lab">Google Home</text>
    <rect x="560" y="40" width="190" height="54" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="655" y="73" text-anchor="middle" class="lab">SmartThings</text>
    <rect x="790" y="40" width="190" height="54" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="885" y="73" text-anchor="middle" class="lab">Home Assistant</text>
  </g>

  <!-- links from views down to bridge -->
  <g stroke="#6a4c93" stroke-width="2" opacity="0.7">
    <line x1="155" y1="94" x2="430" y2="150"/><line x1="385" y1="94" x2="480" y2="150"/>
    <line x1="655" y1="94" x2="560" y2="150"/><line x1="885" y1="94" x2="610" y2="150"/>
  </g>

  <!-- MIDDLE: Matter bridge layer -->
  <rect x="300" y="150" width="440" height="58" rx="12" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.6"/>
  <text x="520" y="178" text-anchor="middle" class="acc">Matter bridge layer</text>
  <text x="520" y="197" text-anchor="middle" class="sm">every app sees the same devices</text>

  <!-- links bridge down to the two local brains -->
  <g stroke="#1a1d24" stroke-width="2.4">
    <line x1="430" y1="208" x2="320" y2="266"/><line x1="610" y1="208" x2="720" y2="266"/>
  </g>

  <!-- the two local brains -->
  <rect x="170" y="266" width="300" height="64" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2.4"/>
  <text x="320" y="294" text-anchor="middle" class="lab">Home Assistant — orchestrator</text>
  <text x="320" y="314" text-anchor="middle" class="sm">on dedicated hardware</text>

  <rect x="570" y="266" width="300" height="64" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2.4"/>
  <text x="720" y="294" text-anchor="middle" class="lab">SmartThings hub</text>
  <text x="720" y="314" text-anchor="middle" class="sm">Edge drivers run local (Lua)</text>

  <!-- device fanout -->
  <g stroke="#6a4c93" stroke-width="1.8" opacity="0.8">
    <line x1="250" y1="330" x2="200" y2="396"/><line x1="320" y1="330" x2="320" y2="396"/><line x1="390" y1="330" x2="440" y2="396"/>
    <line x1="650" y1="330" x2="600" y2="396"/><line x1="720" y1="330" x2="720" y2="396"/><line x1="790" y1="330" x2="840" y2="396"/>
  </g>
  <g fill="#6a4c93">
    <circle cx="200" cy="404" r="7"/><circle cx="320" cy="404" r="7"/><circle cx="440" cy="404" r="7"/>
    <circle cx="600" cy="404" r="7"/><circle cx="720" cy="404" r="7"/><circle cx="840" cy="404" r="7"/>
  </g>
  <text x="320" y="436" text-anchor="middle" class="sm">Zigbee · Z-Wave · Matter · ESPHome</text>
  <text x="720" y="436" text-anchor="middle" class="sm">Z-Wave bridged from HA · appliances</text>

  <!-- side: cloud optional + voice split -->
  <g>
    <path d="M905 280 a18 18 0 0 1 4 -35 a24 24 0 0 1 45 6 a16 16 0 0 1 -6 30 z" fill="#fff" stroke="#7a808c" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="930" y="320" text-anchor="middle" class="sm">cloud</text>
    <text x="930" y="336" text-anchor="middle" class="sm">optional</text>
  </g>

  <!-- voice split row -->
  <rect x="170" y="460" width="320" height="50" rx="9" fill="#6a4c93" fill-opacity="0.06" stroke="#6a4c93" stroke-width="2"/>
  <text x="330" y="490" text-anchor="middle" class="lab">HA local voice → control</text>
  <rect x="560" y="460" width="320" height="50" rx="9" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="720" y="490" text-anchor="middle" class="lab">Echo / Google → music + timers</text>

  <text x="520" y="540" text-anchor="middle" class="cap">What needs to stay in the house stays in the house; what doesn't, doesn't.</text>
</svg>
