<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Per-device identity across a fleet: one CA, thousands of unique device certs, most healthy and one revoked.">
  <rect width="1000" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE IDENTITY PER DEVICE · AT FLEET SCALE</text>

  <!-- issuing CA -->
  <rect x="356" y="68" width="288" height="74" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <g transform="translate(404,82)" stroke="#c14a3a" stroke-width="2.6" fill="none">
    <rect x="0" y="12" width="22" height="17" rx="3"/>
    <path d="M3.5 12 v-4.5 a7.5 7.5 0 0 1 15 0 v4.5"/>
  </g>
  <text x="516" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">ISSUING CA</text>
  <text x="500" y="124" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">signs every device cert · trusted by IoT Core</text>

  <!-- fan-out lines to a grid of devices -->
  <g stroke="#1a1d24" stroke-width="1.3" stroke-opacity="0.3">
    <line x1="500" y1="142" x2="150" y2="210"/>
    <line x1="500" y1="142" x2="850" y2="210"/>
    <line x1="500" y1="142" x2="500" y2="200"/>
  </g>
  <text x="640" y="178" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">5,000+ in the field</text>

  <!-- device grid: each is a puck with a tiny cert seal; one is revoked -->
  <g font-family="ui-monospace,monospace">
    <!-- generate 5 cols x 3 rows; coords explicit -->
    <!-- row template: puck rect 56x40 rx8 + seal circle -->
    <!-- Use a repeating layout -->
    <!-- ROW 1 -->
    <g transform="translate(120,210)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(280,210)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(440,210)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(600,210)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(760,210)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- ROW 2 -->
    <g transform="translate(120,278)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- the revoked one -->
    <g transform="translate(280,278)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/><circle cx="28" cy="20" r="9" fill="none" stroke="#c14a3a" stroke-width="2.2"/><path d="M24 16 l8 8 M32 16 l-8 8" stroke="#c14a3a" stroke-width="2.2" stroke-linecap="round"/></g>
    <g transform="translate(440,278)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(600,278)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(760,278)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- ROW 3 -->
    <g transform="translate(120,346)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(280,346)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(440,346)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(600,346)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(760,346)"><rect width="56" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.2"/><circle cx="28" cy="20" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M24 20 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>

  <!-- legend -->
  <g font-family="ui-monospace,monospace" font-size="12">
    <circle cx="130" cy="416" r="9" fill="none" stroke="#3a7d44" stroke-width="2"/><path d="M126 416 l3 3 6 -7" fill="none" stroke="#3a7d44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="148" y="420" fill="#1a1d24">valid cert · key sealed in secure element</text>
    <circle cx="540" cy="416" r="9" fill="none" stroke="#c14a3a" stroke-width="2.2"/><path d="M536 412 l8 8 M544 412 l-8 8" stroke="#c14a3a" stroke-width="2.2" stroke-linecap="round"/>
    <text x="558" y="420" fill="#1a1d24">policy flipped to deny — off in &lt; 1 min</text>
  </g>
</svg>
