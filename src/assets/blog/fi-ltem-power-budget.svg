<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="LTE-M vs 2G/3G power">
  <rect width="1000" height="520" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">WHY THE RADIO'S IDLE BEHAVIOUR SETS BATTERY LIFE</text>

  <!-- TOP: Whistle 3, always-listening 2G/3G -->
  <g transform="translate(40,90)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c14a3a">WHISTLE 3 &#183; 2G/3G modem, always listening</text>
    <!-- power trace: high flat with spikes -->
    <line x1="0" y1="120" x2="800" y2="120" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="-2" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c" text-anchor="end" transform="rotate(-90 -2 80)">power</text>
    <path d="M0 78 L120 78 L120 36 L150 36 L150 78 L320 78 L320 40 L350 40 L350 78 L520 78 L520 34 L550 34 L550 78 L720 78 L720 40 L750 40 L750 78 L800 78"
          fill="none" stroke="#c14a3a" stroke-width="3"/>
    <!-- shaded high floor -->
    <rect x="0" y="78" width="800" height="42" fill="#c14a3a" fill-opacity="0.1"/>
    <text x="400" y="104" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">never sleeps &#8212; high idle floor drains a small battery fast</text>
  </g>

  <!-- BOTTOM: Fi, LTE-M with sleep -->
  <g transform="translate(40,290)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#3a7d44">FI &#183; LTE-M (Cat-M1), deep sleep between check-ins</text>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="-2" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c" text-anchor="end" transform="rotate(-90 -2 80)">power</text>
    <!-- low flat with brief spikes -->
    <path d="M0 112 L150 112 L150 40 L168 40 L168 112 L400 112 L400 40 L418 40 L418 112 L650 112 L650 40 L668 40 L668 112 L800 112"
          fill="none" stroke="#3a7d44" stroke-width="3"/>
    <rect x="0" y="112" width="800" height="8" fill="#3a7d44" fill-opacity="0.12"/>
    <text x="400" y="104" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">sleeps deep between brief check-ins &#8212; low idle floor</text>
  </g>

  <!-- outcome strip -->
  <g transform="translate(40,470)" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="0" y="-26" width="370" height="38" rx="8" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="1.5"/>
    <text x="18" y="-1" font-size="14" fill="#1a1d24">Whistle 3 real: <tspan font-weight="700">~3 days</tspan></text>
    <rect x="430" y="-26" width="370" height="38" rx="8" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="448" y="-1" font-size="14" fill="#1a1d24">Fi measured: <tspan font-weight="700">~14 days</tspan></text>
  </g>
</svg>
