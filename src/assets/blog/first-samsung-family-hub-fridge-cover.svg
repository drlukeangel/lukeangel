<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A fridge that is also a hub">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- the fridge, left-center -->
  <g transform="translate(150,120)">
    <!-- body -->
    <rect x="0" y="0" width="300" height="400" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- door split (4-door flex: vertical center + horizontal lower) -->
    <line x1="150" y1="0" x2="150" y2="250" stroke="#1a1d24" stroke-width="4"/>
    <line x1="0" y1="250" x2="300" y2="250" stroke="#1a1d24" stroke-width="4"/>
    <line x1="150" y1="250" x2="150" y2="400" stroke="#1a1d24" stroke-width="4"/>
    <!-- handles -->
    <rect x="128" y="40" width="8" height="120" rx="4" fill="#1a1d24"/>
    <rect x="164" y="40" width="8" height="120" rx="4" fill="#1a1d24"/>
    <!-- the touchscreen on the right upper door -->
    <rect x="172" y="34" width="108" height="180" rx="8" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="4"/>
    <!-- screen content abstraction: a few UI bars -->
    <g fill="#6a4c93" fill-opacity="0.5">
      <rect x="186" y="52" width="80" height="10" rx="3"/>
      <rect x="186" y="74" width="56" height="8" rx="3"/>
      <rect x="186" y="92" width="68" height="8" rx="3"/>
    </g>
    <!-- a small calendar grid on screen -->
    <g stroke="#6a4c93" stroke-width="2" opacity="0.5">
      <rect x="186" y="120" width="80" height="70" fill="none"/>
      <line x1="186" y1="143" x2="266" y2="143"/><line x1="186" y1="166" x2="266" y2="166"/>
      <line x1="213" y1="120" x2="213" y2="190"/><line x1="240" y1="120" x2="240" y2="190"/>
    </g>
  </g>

  <!-- hub radiating: concentric arcs from the screen out to small device glyphs on the right -->
  <g transform="translate(450,250)">
    <g fill="none" stroke="#6a4c93" stroke-width="3" opacity="0.5">
      <path d="M0 0 a60 60 0 0 1 0 120" transform="translate(0,-60)"/>
      <path d="M0 0 a100 100 0 0 1 0 200" transform="translate(0,-100)"/>
      <path d="M0 0 a140 140 0 0 1 0 280" transform="translate(0,-140)"/>
    </g>
  </g>

  <!-- device glyphs the hub talks to -->
  <!-- bulb -->
  <g transform="translate(720,180)">
    <circle cx="0" cy="0" r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-9" y="20" width="18" height="12" rx="2" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g stroke="#6a4c93" stroke-width="3" opacity="0.7"><line x1="-30" y1="-22" x2="-22" y2="-16"/><line x1="0" y1="-34" x2="0" y2="-26"/><line x1="30" y1="-22" x2="22" y2="-16"/></g>
  </g>
  <!-- TV (the Frame) -->
  <g transform="translate(860,300)">
    <rect x="-40" y="-26" width="80" height="52" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-30" y="-16" width="60" height="32" rx="2" fill="#6a4c93" fill-opacity="0.14"/>
  </g>
  <!-- sensor -->
  <g transform="translate(740,420)">
    <rect x="-22" y="-22" width="44" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="0" r="7" fill="#6a4c93" fill-opacity="0.5"/>
  </g>
  <!-- oven -->
  <g transform="translate(900,440)">
    <rect x="-30" y="-26" width="60" height="52" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-22" y="-6" width="44" height="22" rx="3" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="-14" cy="-15" r="3.5" fill="#6a4c93"/><circle cx="0" cy="-15" r="3.5" fill="#6a4c93"/><circle cx="14" cy="-15" r="3.5" fill="#6a4c93"/>
  </g>

  <!-- connecting lines hub-> devices -->
  <g stroke="#6a4c93" stroke-width="3" opacity="0.6">
    <line x1="480" y1="230" x2="700" y2="185"/>
    <line x1="490" y1="270" x2="822" y2="300"/>
    <line x1="480" y1="300" x2="720" y2="412"/>
    <line x1="490" y1="320" x2="872" y2="438"/>
  </g>
</svg>
