<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Three data stores by shape">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE STORES, THREE SHAPES</text>

  <!-- ===== POSTGRES ===== -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="336" height="340" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">POSTGRES (RDS)</text>
    <text x="168" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">the entity store</text>
    <!-- cylinder glyph -->
    <g transform="translate(138,82)" stroke="#2a52be" stroke-width="2.6" fill="#2a52be" fill-opacity="0.08">
      <ellipse cx="30" cy="10" rx="30" ry="10"/>
      <path d="M0 10 v44 a30 10 0 0 0 60 0 v-44" fill="none"/>
      <path d="M0 32 a30 10 0 0 0 60 0" fill="none"/>
    </g>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="24" y="186">• relational, transactional</text>
      <text x="24" y="212">• source of truth for state</text>
      <text x="24" y="238">• carts, stores, accounts,</text>
      <text x="40" y="258">sessions-in-progress</text>
      <text x="24" y="286">• holds the only PII</text>
    </g>
    <text x="168" y="322" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">read pattern: joins, by key</text>
  </g>

  <!-- ===== DYNAMODB ===== -->
  <g transform="translate(392,80)">
    <rect x="0" y="0" width="336" height="340" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">DYNAMODB</text>
    <text x="168" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">the telemetry store</text>
    <!-- stacked rows glyph (append) -->
    <g transform="translate(118,84)">
      <rect x="0" y="0" width="100" height="14" rx="3" fill="#2a52be" fill-opacity="0.5"/>
      <rect x="0" y="20" width="100" height="14" rx="3" fill="#2a52be" fill-opacity="0.4"/>
      <rect x="0" y="40" width="100" height="14" rx="3" fill="#2a52be" fill-opacity="0.3"/>
      <rect x="0" y="60" width="100" height="14" rx="3" fill="#2a52be" fill-opacity="0.2"/>
      <path d="M50 84 l-8 -12 h16 z" fill="#2a52be"/>
    </g>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="24" y="186">• append-only, time-series</text>
      <text x="24" y="212">• single-digit-ms at scale</text>
      <text x="24" y="238">• each scan, health event,</text>
      <text x="40" y="258">session-end</text>
      <text x="24" y="286">• no PII by design</text>
    </g>
    <text x="168" y="322" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">read pattern: by cart + time</text>
  </g>

  <!-- ===== S3 ===== -->
  <g transform="translate(744,80)">
    <rect x="0" y="0" width="336" height="340" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">S3</text>
    <text x="168" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">artifacts + archive</text>
    <!-- bucket glyph -->
    <g transform="translate(138,80)" stroke="#2a52be" stroke-width="2.6" fill="#2a52be" fill-opacity="0.08">
      <path d="M0 0 h60 l-6 60 h-48 z"/>
      <ellipse cx="30" cy="0" rx="30" ry="8" fill="none"/>
    </g>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="24" y="186">• large immutable blobs</text>
      <text x="24" y="212">• OTA firmware images</text>
      <text x="24" y="238">• signed session-end</text>
      <text x="40" y="258">receipts</text>
      <text x="24" y="286">• analytics raw zone</text>
    </g>
    <text x="168" y="322" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">read pattern: by object key</text>
  </g>

  <text x="560" y="452" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">One store per data shape — state, time-series, and blobs each go where their read pattern is cheap.</text>
</svg>
