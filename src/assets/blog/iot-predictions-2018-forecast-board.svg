<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" role="img" aria-label="2018 prediction bet board with confidence levels.">
  <rect width="960" height="580" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="0" y="0" width="8" height="580" rx="4" fill="#0066cc"/>

  <text x="44" y="50" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="20" fill="#1a1d24" font-weight="600">THE 2018 BETS</text>
  <text x="700" y="50" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" fill="#7a808c">CONFIDENCE</text>

  <!-- confidence scale legend -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#7a808c">
    <text x="700" y="72">low</text>
    <text x="892" y="72" text-anchor="end">high</text>
  </g>

  <!-- bet rows: label + a confidence bar (fill = how sure) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" font-size="16" fill="#1a1d24">

    <!-- row template constants: bar track x=700 w=192 -->
    <!-- 1 Google ships first-party display -->
    <text x="44" y="106">Google ships its own smart display</text>
    <rect x="700" y="94" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="94" width="173" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="126" x2="916" y2="126" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 2 HomePod misses commercially -->
    <text x="44" y="152">HomePod stalls in year one</text>
    <rect x="700" y="140" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="140" width="154" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="172" x2="916" y2="172" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 3 mesh wifi table stakes -->
    <text x="44" y="198">Mesh Wi-Fi becomes table stakes</text>
    <rect x="700" y="186" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="186" width="180" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="218" x2="916" y2="218" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 4 Ring becomes doorbell standard -->
    <text x="44" y="244">Ring becomes the doorbell standard</text>
    <rect x="700" y="232" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="232" width="165" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="264" x2="916" y2="264" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 5 Watch ECG finally ships -->
    <text x="44" y="290">Apple Watch ECG finally ships</text>
    <rect x="700" y="278" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="278" width="138" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="310" x2="916" y2="310" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 6 AirPods 2 will NOT ship -->
    <text x="44" y="336">AirPods 2 will NOT ship this year</text>
    <rect x="700" y="324" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="324" width="150" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="356" x2="916" y2="356" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 7 first IoT-security scandal Q1 -->
    <text x="44" y="382">First IoT-security scandal by Q1</text>
    <rect x="700" y="370" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="370" width="186" height="14" rx="7" fill="#0066cc"/>

    <line x1="44" y1="402" x2="916" y2="402" stroke="#1a1d24" stroke-opacity="0.07" stroke-width="1.5"/>

    <!-- 8 Sonos files for IPO -->
    <text x="44" y="428">Sonos files for IPO</text>
    <rect x="700" y="416" width="192" height="14" rx="7" fill="#1a1d24" opacity="0.08"/>
    <rect x="700" y="416" width="128" height="14" rx="7" fill="#0066cc"/>
  </g>

  <!-- footnote: these are forecasts, scored next year -->
  <rect x="44" y="468" width="872" height="78" rx="8" fill="#0066cc" opacity="0.08"/>
  <g font-family="Newsreader,Georgia,serif" font-style="italic" fill="#1a1d24">
    <text x="62" y="500" font-size="18">Bar length is how sure I am today — not how it turns out.</text>
    <text x="62" y="528" font-size="18">Same as every year: write them down, score them in January.</text>
  </g>
</svg>
