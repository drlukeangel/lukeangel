<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 414" width="1040" height="414" role="img" aria-label="Works with Nest before and after the shutdown">
  <rect x="0.5" y="0.5" width="1039" height="413" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lb{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
    .gn{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#3a7d44}
    .rd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#c14a3a}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:1.5px;fill:#7a808c}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <!-- BEFORE -->
  <text x="60" y="44" class="hd">BEFORE — WORKS WITH NEST (OAuth)</text>
  <g transform="translate(60,70)">
    <circle cx="60" cy="60" r="34" fill="#fff" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="60" cy="60" r="14" fill="none" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="2"/>
    <text x="60" y="118" text-anchor="middle" class="sm">Nest</text>

    <!-- read + write, both ways -->
    <path d="M100 48 L250 48" stroke="#3a7d44" stroke-width="2.4" fill="none"/>
    <path d="M250 48 l-12 -5 v10 z" fill="#3a7d44"/>
    <text x="120" y="40" class="gn">read state →</text>
    <path d="M250 72 L100 72" stroke="#3a7d44" stroke-width="2.4" fill="none"/>
    <path d="M100 72 l12 -5 v10 z" fill="#3a7d44"/>
    <text x="120" y="90" class="gn">← send command</text>

    <rect x="252" y="20" width="190" height="80" rx="9" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="2"/>
    <text x="347" y="46" text-anchor="middle" class="lb">your automations</text>
    <text x="347" y="66" text-anchor="middle" class="sm">SmartThings · IFTTT</text>
    <text x="347" y="82" text-anchor="middle" class="sm">hobbyist scripts</text>
  </g>

  <!-- divider -->
  <line x1="60" y1="208" x2="980" y2="208" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.4"/>

  <!-- AFTER -->
  <text x="60" y="244" class="hd">AFTER — WORKS WITH GOOGLE ASSISTANT (voice-first, command-only)</text>
  <g transform="translate(60,270)">
    <circle cx="60" cy="50" r="34" fill="#fff" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="60" cy="50" r="14" fill="none" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="2"/>
    <text x="60" y="106" text-anchor="middle" class="sm">Nest</text>

    <!-- read path severed -->
    <path d="M100 36 L250 36" stroke="#c14a3a" stroke-width="2.2" stroke-dasharray="6 5" fill="none"/>
    <text x="120" y="28" class="rd">read state — gone</text>
    <g stroke="#c14a3a" stroke-width="2.6">
      <line x1="168" y1="28" x2="182" y2="44"/>
      <line x1="182" y1="28" x2="168" y2="44"/>
    </g>

    <!-- command-only voice path -->
    <path d="M100 62 L250 62" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="2.2" fill="none"/>
    <path d="M250 62 l-12 -5 v10 z" fill="#1a1d24" fill-opacity="0.6"/>
    <text x="120" y="80" class="sm">voice command only →</text>

    <rect x="252" y="34" width="190" height="56" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="347" y="58" text-anchor="middle" class="lb">"set the temperature"</text>
    <text x="347" y="78" text-anchor="middle" class="sm">no programmable logic</text>
  </g>

  <text x="520" y="392" text-anchor="middle" class="cap">The API didn't break — it was withdrawn. The read-and-react path you built on is just gone.</text>
</svg>
