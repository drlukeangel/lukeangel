<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Before and after cutting vendor clouds">
  <rect width="1000" height="520" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <line x1="500" y1="40" x2="500" y2="440" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 8"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">

    <!-- BEFORE -->
    <text x="250" y="50" text-anchor="middle" font-size="16" fill="#c14a3a">before — control via vendor clouds</text>
    <!-- four clouds with a device under each -->
    <g>
      <g transform="translate(70 90)"><path d="M-34 12 a18 18 0 0 1 10 -32 a24 24 0 0 1 46 4 a16 16 0 0 1 2 28 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="6" text-anchor="middle" font-size="10" fill="#5b616b">Belkin</text></g>
      <g transform="translate(190 90)"><path d="M-34 12 a18 18 0 0 1 10 -32 a24 24 0 0 1 46 4 a16 16 0 0 1 2 28 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="6" text-anchor="middle" font-size="10" fill="#5b616b">Ring</text></g>
      <g transform="translate(310 90)"><path d="M-34 12 a18 18 0 0 1 10 -32 a24 24 0 0 1 46 4 a16 16 0 0 1 2 28 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="6" text-anchor="middle" font-size="10" fill="#5b616b">Samsung</text></g>
      <g transform="translate(430 90)"><path d="M-34 12 a18 18 0 0 1 10 -32 a24 24 0 0 1 46 4 a16 16 0 0 1 2 28 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="6" text-anchor="middle" font-size="9" fill="#5b616b">WiFi bulb</text></g>
    </g>
    <!-- devices row -->
    <g fill="#6a4c93">
      <rect x="56" y="220" width="28" height="28" rx="5"/><rect x="176" y="220" width="28" height="28" rx="5"/><rect x="296" y="220" width="28" height="28" rx="5"/><rect x="416" y="220" width="28" height="28" rx="5"/>
    </g>
    <!-- each device -> its cloud (long, fragile) -->
    <g stroke="#c14a3a" stroke-width="2" stroke-dasharray="3 5" opacity="0.6">
      <line x1="70" y1="220" x2="70" y2="118"/><line x1="190" y1="220" x2="190" y2="118"/><line x1="310" y1="220" x2="310" y2="118"/><line x1="430" y1="220" x2="430" y2="118"/>
    </g>
    <text x="250" y="300" text-anchor="middle" font-size="13" fill="#c14a3a">dead internet → all control lost</text>

    <!-- AFTER -->
    <text x="750" y="50" text-anchor="middle" font-size="16" fill="#3a7d44">after — local protocols, one hub</text>
    <!-- HA hub center -->
    <g transform="translate(750 150)">
      <rect x="-48" y="-30" width="96" height="60" rx="12" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
      <text x="0" y="4" text-anchor="middle" font-size="12" fill="#6a4c93">HA · LAN</text>
    </g>
    <!-- devices around, solid local links -->
    <g fill="#6a4c93">
      <rect x="576" y="240" width="28" height="28" rx="5"/><rect x="676" y="250" width="28" height="28" rx="5"/><rect x="796" y="250" width="28" height="28" rx="5"/><rect x="896" y="240" width="28" height="28" rx="5"/>
    </g>
    <g stroke="#3a7d44" stroke-width="2.5" fill="none">
      <path d="M590 240 L726 178"/><path d="M690 250 L730 180"/><path d="M810 250 L770 180"/><path d="M910 240 L774 178"/>
    </g>
    <text x="640" y="300" font-size="11" fill="#3a7d44">Z-Wave · Zigbee · LEAP · Hue</text>
    <!-- one thin data-in feed still to a cloud -->
    <g transform="translate(890 95)"><path d="M-30 10 a16 16 0 0 1 9 -28 a20 20 0 0 1 40 4 a14 14 0 0 1 2 24 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5"/></g>
    <line x1="798" y1="150" x2="876" y2="100" stroke="#7a808c" stroke-width="2" stroke-dasharray="2 5"/>
    <text x="750" y="340" text-anchor="middle" font-size="12" fill="#5b616b">only thin data-in (weather, calendar, push) still touches a cloud</text>

    <text x="500" y="430" text-anchor="middle" font-size="13" fill="#1a1d24">control-out went local; only harmless data-in still leaves the house</text>
  </g>
</svg>
