<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 470" role="img" aria-label="A change flows into a held-out eval set, is scored against a rubric, then a threshold gate forks to ship on pass or blocked on fail">
  <rect width="1100" height="470" fill="#fbf9f3"/>
  <text x="40" y="46" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="2" fill="#2b2b2b">THE REGRESSION GATE FOR A NON-DETERMINISTIC SYSTEM</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="17" text-anchor="middle">
    <!-- change / PR -->
    <rect x="40" y="150" width="170" height="92" rx="10" fill="#ece9f7" stroke="#4f46b8" stroke-width="2.5"/>
    <text x="125" y="190" fill="#2b2b2b">a change</text>
    <text x="125" y="214" font-size="13" fill="#6a655c">prompt · model · code</text>

    <!-- held-out eval set -->
    <rect x="280" y="150" width="170" height="92" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <text x="365" y="190" fill="#2b2b2b">held-out</text>
    <text x="365" y="214" fill="#2b2b2b">eval set</text>

    <!-- rubric score -->
    <rect x="520" y="150" width="170" height="92" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <text x="605" y="186" fill="#2b2b2b">rubric score</text>
    <text x="605" y="216" font-size="22" fill="#4f46b8">★ ★ ★ ☆</text>
  </g>

  <!-- threshold gate -->
  <g transform="translate(800,196)">
    <rect x="-44" y="-44" width="88" height="88" rx="8" transform="rotate(45)" fill="#fffdf8" stroke="#4f46b8" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#2b2b2b">≥ bar?</text>
    <text x="0" y="20" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#6a655c">threshold</text>
  </g>

  <!-- ship / blocked -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="16" text-anchor="middle">
    <rect x="980" y="96" width="96" height="74" rx="10" fill="#fffdf8" stroke="#3a7d44" stroke-width="3"/>
    <path d="M1013 132 L1024 144 L1044 118" fill="none" stroke="#3a7d44" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1028" y="162" fill="#3a7d44">ship</text>
    <rect x="980" y="226" width="96" height="74" rx="10" fill="#fffdf8" stroke="#c14a3a" stroke-width="3"/>
    <path d="M1012 244 L1044 276 M1044 244 L1012 276" stroke="#c14a3a" stroke-width="5" stroke-linecap="round"/>
    <text x="1028" y="294" fill="#c14a3a">blocked</text>
  </g>

  <!-- flow arrows -->
  <g stroke="#6a655c" stroke-width="2.5" fill="none" marker-end="url(#ev-arr)">
    <path d="M210 196 L278 196"/>
    <path d="M450 196 L518 196"/>
    <path d="M690 196 L752 196"/>
    <path d="M848 168 C900 150 930 138 978 133"/>
    <path d="M848 224 C900 244 930 256 978 263"/>
  </g>
  <defs><marker id="ev-arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6a655c"/></marker></defs>

  <text x="40" y="430" font-family="Georgia, serif" font-style="italic" font-size="19" fill="#2b2b2b">You ship against the number, not the opinion — which is also how a feature the CEO loved got cut.</text>
</svg>
