<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2024 device outlook">
  <defs>
    <pattern id="dots24" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots24)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- spatial headset (Vision Pro silhouette) -->
  <g transform="translate(150,250)">
    <path d="M0 60 Q0 0 90 0 L270 0 Q360 0 360 60 L360 130 Q360 185 290 185 Q230 185 215 150 Q180 132 145 150 Q130 185 70 185 Q0 185 0 130 Z"
          fill="#1a1d24"/>
    <path d="M40 70 Q40 40 95 40 L160 40 Q185 40 185 70 L185 120 Q185 150 140 150 Q70 150 55 120 Q40 100 40 70 Z"
          fill="#0066cc" fill-opacity="0.85"/>
    <path d="M205 40 L270 40 Q320 40 320 70 L320 110 Q320 150 270 150 Q225 150 215 120 L205 70 Z"
          fill="#0066cc" fill-opacity="0.55"/>
    <rect x="-26" y="44" width="40" height="22" rx="11" fill="#1a1d24"/>
  </g>

  <!-- smart glasses (the breakout wearable) -->
  <g transform="translate(620,150)">
    <rect x="0" y="14" width="150" height="62" rx="22" fill="none" stroke="#1a1d24" stroke-width="9"/>
    <rect x="190" y="14" width="150" height="62" rx="22" fill="none" stroke="#1a1d24" stroke-width="9"/>
    <path d="M150 40 q20 -14 40 0" fill="none" stroke="#1a1d24" stroke-width="9"/>
    <circle cx="14" cy="6" r="9" fill="#0066cc"/>
    <rect x="-34" y="36" width="36" height="9" rx="4" fill="#1a1d24"/>
    <rect x="340" y="36" width="36" height="9" rx="4" fill="#1a1d24"/>
  </g>

  <!-- standalone AI gadget (pin / puck) -->
  <g transform="translate(660,340)">
    <rect x="0" y="0" width="150" height="200" rx="30" fill="#1a1d24"/>
    <circle cx="75" cy="74" r="40" fill="#fdfaf2"/>
    <circle cx="75" cy="74" r="24" fill="#0066cc" fill-opacity="0.5"/>
    <circle cx="75" cy="74" r="10" fill="#1a1d24"/>
    <rect x="40" y="140" width="70" height="14" rx="7" fill="#fdfaf2" fill-opacity="0.25"/>
    <rect x="40" y="164" width="50" height="14" rx="7" fill="#fdfaf2" fill-opacity="0.18"/>
  </g>

  <!-- smart ring -->
  <g transform="translate(920,360)">
    <circle cx="90" cy="90" r="78" fill="none" stroke="#1a1d24" stroke-width="34"/>
    <circle cx="90" cy="90" r="78" fill="none" stroke="#0066cc" stroke-width="34" stroke-dasharray="40 450" stroke-linecap="round" transform="rotate(-50 90 90)"/>
  </g>

  <!-- forecast arc -->
  <path d="M120 560 Q500 470 1060 540" fill="none" stroke="#0066cc" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round" opacity="0.7"/>
  <circle cx="1060" cy="540" r="9" fill="#0066cc"/>
</svg>
