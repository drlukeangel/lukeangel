<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="two winter outages">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">TWO OUTAGES, ONE WINTER &#8212; THE 6 AM FEED THAT DIDN'T FIRE</text>

  <!-- OUTAGE 1 -->
  <g transform="translate(0,110)">
    <text x="40" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">DEC 2016 &#183; ~6 HOURS</text>
    <text x="40" y="20" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">"database migration issue"</text>
    <!-- night band -->
    <rect x="40" y="34" width="920" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <!-- outage span 11pm-9am-ish -->
    <rect x="640" y="34" width="240" height="34" rx="0" fill="#c14a3a" fill-opacity="0.14"/>
    <!-- hour ticks -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">
      <text x="48" y="86">6 PM</text>
      <text x="380" y="86" text-anchor="middle">11 PM</text>
      <text x="710" y="86" text-anchor="middle">6 AM</text>
      <text x="952" y="86" text-anchor="end">9 AM</text>
    </g>
    <line x1="380" y1="34" x2="380" y2="68" stroke="#c14a3a" stroke-width="2"/>
    <!-- missed feed marker at 6am -->
    <g transform="translate(710,51)">
      <circle cx="0" cy="0" r="13" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
      <path d="M-6 -6 l12 12 M6 -6 l-12 12" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="710" y="20" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12" fill="#c14a3a">6 AM feed skipped &#183; found at 7:30, fed by hand</text>
  </g>

  <!-- OUTAGE 2 -->
  <g transform="translate(0,250)">
    <text x="40" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">FEB 2017 &#183; ~3 HOURS</text>
    <text x="40" y="20" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">cloud-wide "infrastructure event"</text>
    <rect x="40" y="34" width="920" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="560" y="34" width="190" height="34" rx="0" fill="#c14a3a" fill-opacity="0.14"/>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">
      <text x="48" y="86">3 AM</text>
      <text x="710" y="86" text-anchor="middle">6 AM</text>
      <text x="952" y="86" text-anchor="end">9 AM</text>
    </g>
    <g transform="translate(710,51)">
      <circle cx="0" cy="0" r="13" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
      <path d="M-6 -6 l12 12 M6 -6 l-12 12" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="710" y="20" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12" fill="#c14a3a">6 AM feed skipped &#183; caught at 6:45, fed by hand</text>
  </g>

  <text x="500" y="450" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">Both times the app said only "offline." No "we missed your feed" alert &#8212; I diagnosed each one myself.</text>
</svg>
