<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Join and sleep timing">
  <rect width="880" height="420" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#7a808c}
    .ok{fill:#3a7d44}.bad{fill:#c14a3a}
  </style>

  <!-- compliant device row -->
  <text class="lbl" x="40" y="70">compliant device</text>
  <line x1="40" y1="120" x2="840" y2="120" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
  <!-- join marker -->
  <circle cx="120" cy="120" r="7" fill="#6a4c93"/>
  <text class="mut" x="104" y="150">join</text>
  <!-- awake window -->
  <rect x="120" y="100" width="430" height="16" rx="6" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2"/>
  <text class="mut" x="250" y="86">stays awake</text>
  <!-- configure reporting lands inside the awake window -->
  <line x1="300" y1="100" x2="300" y2="132" stroke="#3a7d44" stroke-width="3"/>
  <circle cx="300" cy="108" r="6" class="ok"/>
  <path d="M300 110 l9 9 l16 -20" fill="none" class="ok" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="mut" x="240" y="150">configure reporting → set</text>

  <!-- aqara device row -->
  <text class="lbl" x="40" y="250">Aqara device</text>
  <line x1="40" y1="300" x2="840" y2="300" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="120" cy="300" r="7" fill="#6a4c93"/>
  <text class="mut" x="104" y="330">join</text>
  <!-- short awake window -->
  <rect x="120" y="280" width="120" height="16" rx="6" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2"/>
  <text class="mut" x="128" y="266">awake ~30s</text>
  <!-- asleep region -->
  <rect x="240" y="280" width="600" height="16" rx="6" fill="#7a808c" fill-opacity="0.14" stroke="#7a808c" stroke-width="2" stroke-dasharray="5 5"/>
  <text class="mut" x="500" y="266">asleep</text>
  <!-- configure attempt arrives after sleep -->
  <line x1="360" y1="296" x2="360" y2="324" stroke="#c14a3a" stroke-width="3"/>
  <path d="M348 320 l24 24 M372 320 l-24 24" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
  <text class="mut" x="392" y="338">reporting attempt → missed</text>
</svg>
