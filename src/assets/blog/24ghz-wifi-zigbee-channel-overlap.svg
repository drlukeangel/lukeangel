<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="2.4 GHz channel overlap">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- frequency baseline -->
    <line x1="80" y1="240" x2="920" y2="240" stroke="#1a1d24" stroke-opacity="0.35" stroke-width="2.5"/>
    <text x="80" y="270" font-size="12" fill="#5b616b">2.412 GHz</text>
    <text x="900" y="270" text-anchor="end" font-size="12" fill="#5b616b">2.484 GHz</text>

    <!-- WiFi channel humps 1 / 6 / 11 -->
    <g fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2.5">
      <path d="M120 240 Q 210 110 300 240 Z"/>
      <path d="M400 240 Q 490 110 580 240 Z"/>
      <path d="M660 240 Q 750 110 840 240 Z"/>
    </g>
    <g font-size="13" fill="#6a4c93" text-anchor="middle">
      <text x="210" y="150">Wi-Fi 1</text>
      <text x="490" y="150">Wi-Fi 6</text>
      <text x="750" y="150">Wi-Fi 11</text>
    </g>

    <!-- Zigbee channel ticks below the line -->
    <g stroke-width="3">
      <!-- overlapping: 15 / 20 / 25 sit on top of WiFi 1/6/11 -->
      <line x1="210" y1="240" x2="210" y2="290" stroke="#c14a3a"/>
      <line x1="490" y1="240" x2="490" y2="290" stroke="#c14a3a"/>
      <line x1="750" y1="240" x2="750" y2="290" stroke="#c14a3a"/>
      <!-- safe: in the gaps -->
      <line x1="350" y1="240" x2="350" y2="285" stroke="#3a7d44"/>
      <line x1="620" y1="240" x2="620" y2="285" stroke="#3a7d44"/>
      <line x1="885" y1="240" x2="885" y2="285" stroke="#3a7d44"/>
    </g>
    <g font-size="12" text-anchor="middle">
      <text x="210" y="308" fill="#c14a3a">zb 15</text>
      <text x="490" y="308" fill="#c14a3a">zb 20</text>
      <text x="750" y="308" fill="#c14a3a">zb 25</text>
      <text x="350" y="303" fill="#3a7d44">zb 18</text>
      <text x="620" y="303" fill="#3a7d44">zb 23</text>
      <text x="885" y="303" fill="#3a7d44">zb 26</text>
    </g>

    <!-- legend -->
    <g transform="translate(80 350)" font-size="13">
      <line x1="0" y1="-4" x2="24" y2="-4" stroke="#c14a3a" stroke-width="3"/>
      <text x="32" y="0" fill="#c14a3a">Zigbee channel on a Wi-Fi hump — avoid</text>
      <line x1="430" y1="-4" x2="454" y2="-4" stroke="#3a7d44" stroke-width="3"/>
      <text x="462" y="0" fill="#3a7d44">Zigbee channel in a gap — safe</text>
    </g>
    <text x="500" y="388" text-anchor="middle" font-size="13" fill="#5b616b">pick a Zigbee channel in the gaps; move IoT Wi-Fi off the channel your laptops use</text>
  </g>
</svg>
