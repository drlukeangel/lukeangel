<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 470" width="1100" height="470" role="img" aria-label="Just-In-Time Registration flow. A bootstrap certificate signed by your CA is baked in at the factory. On first connect, AWS IoT Core sees the unknown certificate and validates the CA chain, then hands off to your registration Lambda, which checks whether the device was sold, recalled, or running expected firmware. If it registers, the device gets a per-device certificate and a scoped policy. If not, it is rejected.">
  <rect width="1100" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">JUST-IN-TIME REGISTRATION (JITR)</text>

  <!-- top row -->
  <g font-family="ui-monospace, monospace">
    <!-- A -->
    <rect x="34" y="92" width="210" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="139" y="126" text-anchor="middle" font-size="14" letter-spacing="1" fill="#1a1d24">FACTORY</text>
    <text x="139" y="150" text-anchor="middle" font-size="12" fill="#5b616b">bootstrap cert,</text>
    <text x="139" y="168" text-anchor="middle" font-size="12" fill="#5b616b">signed by your CA</text>

    <!-- B -->
    <rect x="288" y="92" width="156" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="366" y="132" text-anchor="middle" font-size="14" letter-spacing="1" fill="#1a1d24">DEVICE</text>
    <text x="366" y="156" text-anchor="middle" font-size="12" fill="#5b616b">first connect</text>

    <!-- C -->
    <rect x="488" y="92" width="214" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="595" y="124" text-anchor="middle" font-size="14" letter-spacing="1" fill="#1a1d24">AWS IoT CORE</text>
    <text x="595" y="148" text-anchor="middle" font-size="12" fill="#5b616b">unknown cert —</text>
    <text x="595" y="166" text-anchor="middle" font-size="12" fill="#5b616b">validate CA chain</text>

    <!-- D -->
    <rect x="746" y="92" width="214" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="853" y="124" text-anchor="middle" font-size="14" letter-spacing="1" fill="#1a1d24">YOUR LAMBDA</text>
    <text x="853" y="148" text-anchor="middle" font-size="12" fill="#5b616b">sold? recalled?</text>
    <text x="853" y="166" text-anchor="middle" font-size="12" fill="#5b616b">firmware ok?</text>

    <!-- arrows across -->
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
      <line x1="244" y1="138" x2="284" y2="138"/><path d="M288 138 l-15 -7 v14 z"/>
      <line x1="444" y1="138" x2="484" y2="138"/><path d="M488 138 l-15 -7 v14 z"/>
      <line x1="702" y1="138" x2="742" y2="138"/><path d="M746 138 l-15 -7 v14 z"/>
    </g>

    <!-- decision diamond -->
    <polygon points="853,210 921,252 853,294 785,252" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <line x1="853" y1="184" x2="853" y2="210" stroke="#1a1d24" stroke-width="3"/>
    <path d="M853 210 l-7 -15 h14 z" fill="#1a1d24"/>
    <text x="853" y="257" text-anchor="middle" font-size="13" fill="#1a1d24">register?</text>

    <!-- YES branch -> ISSUE -->
    <g stroke="#3a7d44" stroke-width="3" fill="#3a7d44">
      <path d="M785 252 H 540 V 360" fill="none"/>
      <path d="M540 364 l-7 -15 h14 z"/>
    </g>
    <text x="648" y="242" text-anchor="middle" font-size="13" fill="#3a7d44">yes</text>
    <rect x="396" y="364" width="288" height="86" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
    <text x="540" y="398" text-anchor="middle" font-size="14" letter-spacing="1" fill="#3a7d44">ISSUE</text>
    <text x="540" y="422" text-anchor="middle" font-size="12" fill="#5b616b">per-device cert +</text>
    <text x="540" y="440" text-anchor="middle" font-size="12" fill="#5b616b">scoped IoT policy</text>

    <!-- NO branch -> REJECT -->
    <g stroke="#c14a3a" stroke-width="3" fill="#c14a3a">
      <path d="M921 252 H 974 V 360" fill="none"/>
      <path d="M974 364 l-7 -15 h14 z"/>
    </g>
    <text x="948" y="242" text-anchor="middle" font-size="13" fill="#c14a3a">no</text>
    <rect x="860" y="364" width="206" height="86" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <text x="963" y="402" text-anchor="middle" font-size="14" letter-spacing="1" fill="#c14a3a">REJECT</text>
    <text x="963" y="426" text-anchor="middle" font-size="12" fill="#5b616b">no fleet access</text>
  </g>
</svg>
