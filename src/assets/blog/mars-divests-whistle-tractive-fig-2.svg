<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Home-anchor battery trick, 2013 and 2025">
  <rect width="1000" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;font-weight:700;}
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:10.5px;fill:#5b616b;}
    .kick{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:14.5px;fill:#5b616b;}
  </style>
  <defs>
    <marker id="da" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
    <marker id="dao" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#c87533"/></marker>
  </defs>

  <text x="40" y="42" class="kick">SAME INSTINCT, NEW RADIO — "the dog is home, stop spending battery"</text>

  <line x1="500" y1="70" x2="500" y2="400" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- LEFT: 2013 Whistle, WiFi proximity -->
  <text x="60" y="100" class="hd">2013 — Whistle puck</text>
  <text x="60" y="120" class="sm">uses home Wi-Fi proximity as the anchor</text>

  <!-- house with wifi -->
  <g transform="translate(70,150)">
    <path d="M0 40 L55 0 L110 40 L110 110 L0 110 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <path d="M40 40 a30 30 0 0 1 30 0" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <path d="M48 50 a18 18 0 0 1 14 0" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <circle cx="55" cy="62" r="3.5" fill="#c87533"/>
    <text x="55" y="132" text-anchor="middle" class="sm">house Wi-Fi</text>
  </g>
  <line x1="195" y1="205" x2="265" y2="205" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#da)"/>
  <text x="230" y="196" text-anchor="middle" class="sm">"home"</text>
  <!-- collar puck -->
  <g transform="translate(275,176)">
    <rect x="0" y="0" width="170" height="58" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="28" cy="29" r="13" fill="#c87533" fill-opacity="0.18" stroke="#1a1d24" stroke-width="2"/>
    <text x="52" y="26" class="lab">collar</text>
    <text x="52" y="44" class="sm">radio idle</text>
  </g>
  <text x="60" y="300" class="sm">No cellular yet. Wi-Fi seen = home =</text>
  <text x="60" y="318" class="sm">stop polling. Crude, but the right idea.</text>

  <!-- RIGHT: 2025 Tractive Base Station, BLE beacon -->
  <text x="560" y="100" class="hd">2025 — Tractive Base Station</text>
  <text x="560" y="120" class="sm">a dedicated BLE beacon is the anchor</text>

  <!-- base station puck -->
  <g transform="translate(570,150)">
    <rect x="0" y="20" width="90" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <path d="M30 20 a15 15 0 0 1 30 0" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <path d="M36 14 a9 9 0 0 1 18 0" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <text x="45" y="58" text-anchor="middle" class="sm">BLE</text>
    <text x="45" y="106" text-anchor="middle" class="sm">plug-in anchor</text>
  </g>
  <line x1="685" y1="205" x2="750" y2="205" stroke="#c87533" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#dao)"/>
  <text x="720" y="196" text-anchor="middle" class="sm">"home"</text>
  <g transform="translate(760,176)">
    <rect x="0" y="0" width="180" height="58" rx="12" fill="#fdfaf2" stroke="#c87533" stroke-width="3"/>
    <circle cx="28" cy="29" r="13" fill="#c87533" fill-opacity="0.18" stroke="#1a1d24" stroke-width="2"/>
    <text x="52" y="26" class="lab">DOG 6 collar</text>
    <text x="52" y="44" class="sm">LTE-M sleeps</text>
  </g>
  <text x="560" y="300" class="sm">Cellular goes quiet inside the beacon's</text>
  <text x="560" y="318" class="sm">zone — the claim is ~2 weeks per charge.</text>

  <line x1="40" y1="408" x2="960" y2="408" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="500" y="440" text-anchor="middle" class="cap">Twelve years apart, the same architectural choice — only the radio and the silicon underneath have changed.</text>
</svg>
