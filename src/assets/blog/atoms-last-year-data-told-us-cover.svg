<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A year of data, one line fading, one quietly rising">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#c87533"/>

  <!-- a single baseline -->
  <line x1="150" y1="470" x2="1060" y2="470" stroke="#1a1d24" stroke-width="2" opacity="0.18"/>

  <!-- ACTIVITY: the line I watched — strong, gently declining across the year, fading toward the end -->
  <path d="M150 250 C300 235, 360 250, 470 285 C600 326, 720 360, 840 408 C920 440, 980 458, 1060 466"
        fill="none" stroke="#1a1d24" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <!-- fade the last stretch to suggest the end -->
  <path d="M840 408 C920 440, 980 458, 1060 466"
        fill="none" stroke="#fdfaf2" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 10" opacity="0.6"/>
  <!-- a small dot where the line ends -->
  <circle cx="1060" cy="466" r="6" fill="#1a1d24" opacity="0.55"/>

  <!-- SCRATCHING: the line I missed — faint orange, quietly rising underneath, climbing at the end -->
  <path d="M150 452 C320 450, 470 444, 620 430 C760 417, 870 396, 960 360 C1010 340, 1040 322, 1060 308"
        fill="none" stroke="#c87533" stroke-width="4" stroke-linecap="round"/>
  <!-- the rising end gets a small emphasis circle -->
  <circle cx="1060" cy="308" r="9" fill="#c87533"/>
  <g stroke="#c87533" stroke-width="3" fill="none" opacity="0.9">
    <path d="M1074 300 a16 16 0 0 1 0 22"/>
  </g>

  <!-- a soft seated-dog silhouette to the left, watching the year — quiet, low-contrast; floppy Lab ears -->
  <g transform="translate(150,150)" opacity="0.16">
    <!-- body + head -->
    <path d="M40 150 q-14 -72 18 -104 q40 -26 80 0 q32 32 18 104 z" fill="#1a1d24"/>
    <circle cx="98" cy="58" r="40" fill="#1a1d24"/>
    <!-- floppy ears hanging down each side of the head -->
    <path d="M62 40 q-22 8 -16 56 q14 8 22 -8 q-10 -28 -6 -48 z" fill="#1a1d24"/>
    <path d="M134 40 q22 8 16 56 q-14 8 -22 -8 q10 -28 6 -48 z" fill="#1a1d24"/>
    <!-- muzzle -->
    <path d="M86 70 q12 22 24 0" fill="none" stroke="#fdfaf2" stroke-width="4" opacity="0.5"/>
    <!-- tail -->
    <path d="M134 132 q52 8 46 -62" fill="none" stroke="#1a1d24" stroke-width="5"/>
  </g>
</svg>
