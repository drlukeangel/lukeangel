<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img" aria-label="Splitting two same-weight cats">
  <rect width="940" height="470" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>

  <!-- LEFT: weight alone — two overlapping bell curves, can't separate -->
  <text x="40" y="44" class="hd">Weight alone: can't separate</text>
  <g transform="translate(60,90)">
    <line x1="0" y1="120" x2="300" y2="120" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
    <!-- curve A (Joule ~9.5) -->
    <path d="M 40 120 C 90 120 110 30 150 30 C 190 30 210 120 260 120" fill="#c87533" fill-opacity="0.14" stroke="#c87533" stroke-width="3"/>
    <!-- curve B (Boson ~9.0) slightly left, overlapping -->
    <path d="M 20 120 C 70 120 90 40 130 40 C 170 40 190 120 240 120" fill="#1a1d24" fill-opacity="0.06" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.6"/>
    <text x="150" y="142" text-anchor="middle" class="sm">weight →</text>
    <text x="155" y="20" text-anchor="middle" class="sm">Joule ~9.5 / Boson ~9.0 — overlap</text>
  </g>

  <!-- arrow to the right -->
  <line x1="380" y1="170" x2="470" y2="170" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#pf)"/>
  <text x="425" y="158" text-anchor="middle" class="sm">+ behavior</text>

  <!-- RIGHT: secondary signals pull them apart -->
  <text x="520" y="44" class="hd">Add behavior: pulls them apart</text>
  <g transform="translate(520,80)">
    <!-- three secondary axes as small labeled rows -->
    <text x="0" y="24" class="lab">duration</text>
    <rect x="120" y="12" width="120" height="14" rx="7" fill="#c87533" fill-opacity="0.5"/>
    <rect x="250" y="12" width="80" height="14" rx="7" fill="#1a1d24" fill-opacity="0.25"/>
    <text x="0" y="64" class="lab">time-of-day</text>
    <rect x="120" y="52" width="70" height="14" rx="7" fill="#c87533" fill-opacity="0.5"/>
    <rect x="250" y="52" width="120" height="14" rx="7" fill="#1a1d24" fill-opacity="0.25"/>
    <text x="0" y="104" class="lab">who-follows-whom</text>
    <rect x="200" y="92" width="100" height="14" rx="7" fill="#c87533" fill-opacity="0.5"/>
    <rect x="200" y="110" width="60" height="14" rx="7" fill="#1a1d24" fill-opacity="0.25"/>
  </g>
  <!-- two resolved cat profiles -->
  <g transform="translate(560,250)">
    <g fill="#fdfaf2" stroke="#c87533" stroke-width="3.5" stroke-linejoin="round"><path d="M -18 -3 L -11 -18 L -3 -8 L 3 -8 L 11 -18 L 18 -3 Q 18 18 0 20 Q -18 18 -18 -3 Z"/></g>
    <text x="40" y="6" class="lab" fill="#c87533">Joule</text>
  </g>
  <g transform="translate(760,250)">
    <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5" stroke-linejoin="round" stroke-opacity="0.8"><path d="M -18 -3 L -11 -18 L -3 -8 L 3 -8 L 11 -18 L 18 -3 Q 18 18 0 20 Q -18 18 -18 -3 Z"/></g>
    <text x="40" y="6" class="lab">Boson</text>
  </g>

  <defs><marker id="pf" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#1a1d24"/></marker></defs>

  <line x1="40" y1="400" x2="900" y2="400" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="430" class="cap">Weight starts the guess; the behavioral signals finish it — no chip, no collar.</text>
  <text x="40" y="452" class="sm">The definitive fix would be an RFID reader at the box — identity, not inference. Petivity doesn't ship one.</text>
</svg>
