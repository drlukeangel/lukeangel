<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Whistle vs FitBark data paths">
  <rect width="960" height="540" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:18px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
    .bad{fill:#c14a3a;}
  </style>

  <line x1="480" y1="60" x2="480" y2="430" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- ============ LEFT: WHISTLE ============ -->
  <text x="40" y="50" class="ttl">Whistle</text>
  <!-- puck with two radios -->
  <g transform="translate(120,150)">
    <circle cx="0" cy="0" r="46" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <text x="0" y="-6" text-anchor="middle" class="sm">BLE</text>
    <text x="0" y="14" text-anchor="middle" class="sm">+ Wi-Fi</text>
  </g>
  <text x="120" y="225" text-anchor="middle" class="sm">puck</text>

  <!-- path A: BLE -> phone -> cloud -->
  <g transform="translate(0,150)">
    <line x1="166" y1="-20" x2="270" y2="-50" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>
    <text x="200" y="-58" class="sm">BLE</text>
    <!-- phone -->
    <rect x="280" y="-90" width="46" height="74" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <line x1="280" y1="-78" x2="326" y2="-78" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="303" y="-2" text-anchor="middle" class="sm">phone</text>
    <line x1="326" y1="-44" x2="406" y2="-18" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>
  </g>

  <!-- path B: Wi-Fi straight to cloud (no phone) -->
  <g transform="translate(0,150)">
    <line x1="166" y1="18" x2="408" y2="14" stroke="#c87533" stroke-width="3" marker-end="url(#aro)"/>
    <text x="250" y="46" text-anchor="middle" class="sm">home Wi-Fi — no phone</text>
  </g>

  <!-- cloud (left) -->
  <g transform="translate(420,150)">
    <path d="M -12 0 a 22 22 0 0 1 22 -22 a 26 26 0 0 1 48 6 a 18 18 0 0 1 2 36 l -60 0 a 16 16 0 0 1 -12 -20 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="28" y="6" text-anchor="middle" class="sm">cloud</text>
  </g>

  <!-- no base station marker -->
  <g transform="translate(120,300)">
    <rect x="-70" y="0" width="140" height="48" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="0" y="22" text-anchor="middle" class="sm bad">no base</text>
    <text x="0" y="40" text-anchor="middle" class="sm bad">station</text>
    <line x1="-70" y1="0" x2="70" y2="48" stroke="#c14a3a" stroke-width="2"/>
  </g>

  <!-- ============ RIGHT: FITBARK ============ -->
  <text x="520" y="50" class="ttl">FitBark</text>
  <!-- bone tag, BLE only -->
  <g transform="translate(600,150)">
    <rect x="-34" y="-15" width="68" height="30" rx="15" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="-34" cy="-11" r="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="-34" cy="11" r="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="34" cy="-11" r="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="34" cy="11" r="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" class="sm">BLE</text>
  </g>
  <text x="600" y="222" text-anchor="middle" class="sm">tag — BLE only</text>

  <!-- BLE -> phone -> cloud -->
  <g>
    <line x1="650" y1="135" x2="720" y2="105" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>
    <text x="668" y="100" class="sm">BLE</text>
    <rect x="728" y="70" width="44" height="70" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <line x1="728" y1="82" x2="772" y2="82" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="750" y="158" text-anchor="middle" class="sm">phone</text>
    <line x1="772" y1="100" x2="850" y2="125" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>
  </g>

  <!-- optional base station path -->
  <g>
    <rect x="540" y="270" width="130" height="50" rx="8" fill="#fdfaf2" stroke="#c87533" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="605" y="290" text-anchor="middle" class="sm">optional Wi-Fi</text>
    <text x="605" y="308" text-anchor="middle" class="sm">base station</text>
    <line x1="600" y1="235" x2="600" y2="266" stroke="#c87533" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#aro)"/>
    <line x1="670" y1="285" x2="848" y2="165" stroke="#c87533" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#aro)"/>
  </g>

  <!-- cloud (right) -->
  <g transform="translate(855,135)">
    <path d="M -12 0 a 22 22 0 0 1 22 -22 a 26 26 0 0 1 48 6 a 18 18 0 0 1 2 36 l -60 0 a 16 16 0 0 1 -12 -20 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="28" y="6" text-anchor="middle" class="sm">cloud</text>
  </g>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
    <marker id="aro" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#c87533"/></marker>
  </defs>

  <!-- bottom note -->
  <line x1="40" y1="450" x2="920" y2="450" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="480" y="486" text-anchor="middle" class="cap">The hub belongs to FitBark — the radio Whistle baked into the puck.</text>
  <text x="480" y="512" text-anchor="middle" class="sm">Whistle: BLE + Wi-Fi on board, no hub.  ·  FitBark: BLE only, optional plug-in hub.</text>
</svg>
