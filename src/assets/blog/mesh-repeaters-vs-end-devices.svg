<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="mesh routing">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="50" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">WHAT EXTENDS THE MESH</text>

  <!-- hub -->
  <g transform="translate(120,250)">
    <rect x="-46" y="-40" width="92" height="80" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="16" fill="#6a4c93" fill-opacity="0.2" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">hub</text>
  </g>

  <!-- routing path: hub -> plug (repeater) -> switch (repeater) -> far sensor -->
  <g stroke="#3a7d44" stroke-width="3.5" fill="none" stroke-linecap="round">
    <line x1="166" y1="250" x2="334" y2="180"/>
    <line x1="386" y1="180" x2="554" y2="180"/>
    <line x1="606" y1="200" x2="744" y2="250"/>
  </g>

  <!-- mains-powered repeater: plug -->
  <g transform="translate(360,180)">
    <rect x="-26" y="-26" width="52" height="52" rx="8" fill="#fff" stroke="#3a7d44" stroke-width="3"/>
    <circle cx="-8" cy="-2" r="3.5" fill="#3a7d44"/><circle cx="8" cy="-2" r="3.5" fill="#3a7d44"/>
    <rect x="-7" y="8" width="14" height="6" rx="1.5" fill="#3a7d44"/>
    <text x="0" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">plug · mains</text>
    <text x="0" y="63" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#3a7d44">repeats</text>
  </g>

  <!-- mains-powered repeater: switch -->
  <g transform="translate(580,180)">
    <rect x="-24" y="-30" width="48" height="60" rx="6" fill="#fff" stroke="#3a7d44" stroke-width="3"/>
    <rect x="-12" y="-18" width="24" height="36" rx="3" fill="#3a7d44" fill-opacity="0.15" stroke="#3a7d44" stroke-width="2"/>
    <text x="0" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">switch · mains</text>
    <text x="0" y="67" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#3a7d44">repeats</text>
  </g>

  <!-- far sensor reached via the chain -->
  <g transform="translate(780,250)">
    <circle cx="0" cy="0" r="22" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <path d="M-9 4 a9 9 0 0 1 18 0" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="0" cy="-3" r="3" fill="#1a1d24"/>
    <text x="0" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">far sensor</text>
    <text x="0" y="59" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">reached</text>
  </g>

  <!-- battery end-devices that add coverage = none -->
  <g transform="translate(360,360)">
    <circle cx="0" cy="0" r="18" fill="#fff" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="4 4"/>
    <rect x="-5" y="-6" width="10" height="12" rx="1.5" fill="#c14a3a" fill-opacity="0.3"/>
    <text x="0" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">battery sensor</text>
  </g>
  <g transform="translate(470,360)">
    <circle cx="0" cy="0" r="18" fill="#fff" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="4 4"/>
    <rect x="-5" y="-6" width="10" height="12" rx="1.5" fill="#c14a3a" fill-opacity="0.3"/>
    <text x="0" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">battery sensor</text>
  </g>
  <text x="540" y="365" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#c14a3a">end-devices only — add ten, the mesh grows by zero.</text>
</svg>
