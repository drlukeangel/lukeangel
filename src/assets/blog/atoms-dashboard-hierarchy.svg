<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" role="img" aria-label="The app's home screen foregrounds activity; the behavioral signals sit a tap deeper.">
  <rect width="1080" height="400" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHAT THE APP SHOWS FIRST</text>

  <!-- HOME SCREEN phone, activity hero -->
  <g transform="translate(110,80)">
    <rect x="0" y="0" width="170" height="280" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="14" y="22" width="142" height="236" rx="6" fill="#1a1d24" fill-opacity="0.03" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="85" cy="14" r="3.5" fill="#1a1d24" opacity="0.4"/>
    <!-- big activity ring = the hero -->
    <circle cx="85" cy="92" r="44" fill="none" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="11"/>
    <path d="M85 48 a44 44 0 1 1 -38 66" fill="none" stroke="#c87533" stroke-width="11" stroke-linecap="round"/>
    <text x="85" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">ACTIVITY</text>
    <!-- secondary rows, small -->
    <rect x="26" y="168" width="118" height="20" rx="4" fill="#1a1d24" fill-opacity="0.06"/>
    <rect x="26" y="198" width="118" height="20" rx="4" fill="#1a1d24" fill-opacity="0.06"/>
    <text x="40" y="248" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">HOME</text>
  </g>
  <text x="195" y="384" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">opens here — every time</text>

  <!-- arrow: a tap deeper -->
  <g stroke="#5b616b" stroke-width="3" fill="#5b616b">
    <path d="M320 220 H470" fill="none"/><path d="M474 220 l-16 -8 v16 z"/>
  </g>
  <text x="397" y="208" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">one tap deeper →</text>
  <text x="397" y="246" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">(rarely opened)</text>

  <!-- HEALTH SCREEN phone, behavioral list -->
  <g transform="translate(520,80)">
    <rect x="0" y="0" width="170" height="280" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="14" y="22" width="142" height="236" rx="6" fill="#1a1d24" fill-opacity="0.03" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="85" cy="14" r="3.5" fill="#1a1d24" opacity="0.4"/>
    <!-- behavioral rows -->
    <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
      <rect x="26" y="40" width="118" height="30" rx="5" fill="#c87533" fill-opacity="0.16" stroke="#c87533" stroke-width="2"/>
      <text x="40" y="60">scratching ↑</text>
      <rect x="26" y="80" width="118" height="30" rx="5" fill="#1a1d24" fill-opacity="0.05"/>
      <text x="40" y="100" fill="#5b616b">licking</text>
      <rect x="26" y="120" width="118" height="30" rx="5" fill="#1a1d24" fill-opacity="0.05"/>
      <text x="40" y="140" fill="#5b616b">drinking</text>
      <rect x="26" y="160" width="118" height="30" rx="5" fill="#1a1d24" fill-opacity="0.05"/>
      <text x="40" y="180" fill="#5b616b">sleep</text>
    </g>
    <text x="50" y="248" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">HEALTH</text>
  </g>
  <text x="605" y="384" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#c87533">the signal was sitting right here</text>

  <!-- right-side takeaway -->
  <g transform="translate(750,120)">
    <rect x="0" y="0" width="290" height="180" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8" stroke-opacity="0.4"/>
    <text x="20" y="40" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">The hierarchy answers</text>
    <text x="20" y="60" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">one question:</text>
    <text x="20" y="92" font-family="ui-monospace,monospace" font-size="13" fill="#c87533">"is the dog active?"</text>
    <text x="20" y="128" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">— the right question for a</text>
    <text x="20" y="146" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">healthy adult dog, and the</text>
    <text x="20" y="164" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">wrong one for a failing heart.</text>
  </g>
</svg>
