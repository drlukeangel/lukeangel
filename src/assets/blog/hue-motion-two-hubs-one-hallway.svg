<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="two hubs, one hallway">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">TWO PIRs IN ONE HALLWAY</text>

  <!-- the hallway box in the middle -->
  <rect x="400" y="100" width="200" height="300" rx="10" fill="#6a4c93" fill-opacity="0.05" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6 6"/>
  <text x="500" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">one hallway</text>

  <!-- Hue Motion sensor in the hallway -->
  <g transform="translate(500,180)">
    <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#fff" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="0" cy="0" r="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#6a4c93" fill-opacity="0.4" stroke="#6a4c93" stroke-width="1.8"/>
    <text x="0" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">Hue Motion</text>
  </g>

  <!-- Aeotec sensor in the hallway -->
  <g transform="translate(500,310)">
    <circle r="28" fill="#fff" stroke="#2a52be" stroke-width="3"/>
    <circle r="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <circle r="4.5" fill="#2a52be" fill-opacity="0.4" stroke="#2a52be" stroke-width="1.8"/>
    <text x="0" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">Aeotec PIR</text>
  </g>

  <!-- Hue bridge (left) -->
  <g transform="translate(150,180)">
    <rect x="-50" y="-34" width="100" height="68" rx="12" fill="#fff" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="0" cy="0" r="14" fill="#6a4c93" fill-opacity="0.2" stroke="#6a4c93" stroke-width="2"/>
    <text x="0" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">Hue bridge</text>
    <text x="0" y="71" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#6a4c93">→ lights, instant</text>
  </g>
  <g stroke="#6a4c93" stroke-width="3" stroke-dasharray="3 6"><line x1="200" y1="180" x2="470" y2="180"/></g>

  <!-- SmartThings hub (right) -->
  <g transform="translate(850,310)">
    <rect x="-50" y="-34" width="100" height="68" rx="12" fill="#fff" stroke="#2a52be" stroke-width="3"/>
    <circle cx="0" cy="0" r="14" fill="#2a52be" fill-opacity="0.2" stroke="#2a52be" stroke-width="2"/>
    <text x="0" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">SmartThings</text>
    <text x="0" y="71" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#2a52be">→ security app</text>
  </g>
  <g stroke="#2a52be" stroke-width="3" stroke-dasharray="3 6"><line x1="528" y1="310" x2="800" y2="310"/></g>

  <!-- the gap: a broken link between the two sensors -->
  <g transform="translate(500,245)">
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="4 4" stroke-opacity="0.7"/>
    <g transform="translate(0,0)">
      <circle r="13" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#c14a3a" stroke-width="2.5"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#c14a3a" stroke-width="2.5"/>
    </g>
  </g>

  <text x="500" y="440" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#5b616b">both fire on the same footsteps. Neither knows the other exists. That's the multi-hub world.</text>
</svg>
