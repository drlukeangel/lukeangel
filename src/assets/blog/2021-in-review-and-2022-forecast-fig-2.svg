<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-label="Camera to Frigate to Coral pipeline, 2021">
  <rect width="1000" height="430" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24" text-anchor="middle">

    <!-- camera stack -->
    <text x="120" y="44" font-size="12" fill="#5b616b">6 cameras</text>
    <g font-size="10">
      <g transform="translate(120 70)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="22" fill="#1a1d24">PoE · porch</text></g>
      <g transform="translate(120 112)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="22" fill="#1a1d24">PoE · backyard</text></g>
      <g transform="translate(120 154)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="22" fill="#1a1d24">PoE · side yard</text></g>
      <g transform="translate(120 196)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="22" fill="#1a1d24">PoE · driveway</text></g>
      <g transform="translate(120 238)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="22" fill="#1a1d24">PoE · doorbell</text></g>
      <g transform="translate(120 280)"><rect x="-86" y="0" width="172" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 4"/><text x="0" y="22" fill="#5b616b">Wi-Fi · garage</text></g>
    </g>

    <!-- arrows to Frigate -->
    <g stroke="#6a4c93" stroke-width="2" fill="none" opacity="0.7">
      <path d="M210 87 C 300 110, 330 160, 392 178"/>
      <path d="M210 129 C 300 150, 340 170, 392 188"/>
      <path d="M210 171 L392 196"/>
      <path d="M210 213 C 300 210, 340 200, 392 204"/>
      <path d="M210 255 C 300 240, 340 215, 392 212"/>
      <path d="M210 297 C 300 280, 340 230, 392 220"/>
    </g>

    <!-- Frigate box on mini-PC with Coral -->
    <g transform="translate(530 200)">
      <rect x="-130" y="-58" width="260" height="116" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-26" font-size="15" fill="#6a4c93">Frigate 0.9</text>
      <text x="0" y="-6" font-size="10.5" fill="#5b616b">on a mini-PC</text>
      <!-- coral chip -->
      <rect x="-58" y="14" width="116" height="34" rx="6" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2"/>
      <text x="0" y="36" font-size="11" fill="#6a4c93">Coral USB · TPU</text>
      <!-- pins -->
      <g stroke="#6a4c93" stroke-width="2"><line x1="-58" y1="22" x2="-66" y2="22"/><line x1="-58" y1="40" x2="-66" y2="40"/><line x1="58" y1="22" x2="66" y2="22"/><line x1="58" y1="40" x2="66" y2="40"/></g>
    </g>

    <!-- arrow to HA -->
    <g stroke="#6a4c93" stroke-width="2.5" fill="none">
      <path d="M662 200 L760 200"/>
      <path d="M752 194 L762 200 L752 206" />
    </g>

    <!-- HA + notifications -->
    <g transform="translate(862 200)">
      <rect x="-92" y="-58" width="180" height="116" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-26" font-size="13" fill="#6a4c93">Home Assistant</text>
      <text x="0" y="-4" font-size="10.5" fill="#3a7d44">person → notify</text>
      <text x="0" y="16" font-size="10.5" fill="#5b616b">car/dog → ignore</text>
      <text x="0" y="38" font-size="10.5" fill="#5b616b">events to NVR</text>
    </g>

    <text x="500" y="400" font-size="13" fill="#5b616b">one accelerator runs object detection on every stream locally</text>
  </g>
</svg>
