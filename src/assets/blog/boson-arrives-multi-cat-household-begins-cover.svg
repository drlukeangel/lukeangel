<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="two cats, two identities">
  <defs>
    <pattern id="dotsBO" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsBO)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <line x1="90" y1="500" x2="1120" y2="500" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>

  <!-- cat door (left, the shared access point) -->
  <g transform="translate(230,330)">
    <rect x="-70" y="-40" width="140" height="200" rx="8" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-46" y="0" width="92" height="100" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-46" y="0" width="92" height="60" rx="10" fill="#1a1d24" fill-opacity="0.05"/>
    <line x1="-46" y1="60" x2="46" y2="60" stroke="#1a1d24" stroke-width="3"/>
    <!-- chip-read light -->
    <circle cx="0" cy="128" r="7" fill="#3a7d44"/>
  </g>

  <!-- BIG cat (Joule, ~9.5lb) with chip tag -->
  <g transform="translate(560,330)">
    <!-- body -->
    <ellipse cx="0" cy="120" rx="92" ry="56" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <!-- head -->
    <circle cx="-66" cy="58" r="46" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <path d="M-96 26 l-8 -30 l28 16 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-36 26 l8 -30 l-28 16 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="-78" cy="56" r="4" fill="#1a1d24"/>
    <circle cx="-54" cy="56" r="4" fill="#1a1d24"/>
    <!-- tail -->
    <path d="M86 132 C 140 120, 150 60, 120 40" fill="none" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <!-- chip tag A -->
    <g transform="translate(-66,108)">
      <rect x="-20" y="-12" width="40" height="24" rx="6" fill="#c87533" fill-opacity="0.18" stroke="#c87533" stroke-width="2.5"/>
      <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#c87533" stroke-width="2"/>
      <line x1="-12" y1="2" x2="6" y2="2" stroke="#c87533" stroke-width="2"/>
    </g>
  </g>

  <!-- TINY kitten (Boson, ~2lb) with a different chip tag -->
  <g transform="translate(870,400)">
    <ellipse cx="0" cy="50" rx="40" ry="26" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="-28" cy="18" r="24" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <path d="M-44 2 l-5 -16 l15 9 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-12 2 l5 -16 l-15 9 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="-34" cy="17" r="3" fill="#1a1d24"/>
    <circle cx="-22" cy="17" r="3" fill="#1a1d24"/>
    <path d="M38 56 C 64 50, 66 26, 52 18" fill="none" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <!-- chip tag B (different mark) -->
    <g transform="translate(-28,44)">
      <rect x="-16" y="-10" width="32" height="20" rx="5" fill="#357a8c" fill-opacity="0.18" stroke="#357a8c" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#357a8c" stroke-width="2"/>
      <path d="M-7 0 a7 7 0 0 1 14 0" fill="none" stroke="#357a8c" stroke-width="2"/>
    </g>
  </g>
</svg>
