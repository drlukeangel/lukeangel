<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t d">
  <title id="t">Hardware development — accelerating from staged waterfall toward agile-style iteration</title>
  <desc id="d">2017-era diagram of hardware development maturity: traditional stage-gate on left (long, sequential, expensive iteration), accelerated hybrid in the middle, and full agile-hardware on the right with weekly iteration.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <rect width="800" height="380" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Hardware development — accelerating to agility and beyond</text>

  <!-- Three columns -->
  <g transform="translate(40,80)">
    <rect width="220" height="240" fill="#fff" stroke="#cfd5db" rx="6"/>
    <rect width="220" height="32" fill="#1a1d24" rx="6"/>
    <rect y="22" width="220" height="10" fill="#1a1d24"/>
    <text x="110" y="22" text-anchor="middle" class="label" fill="#fff">Traditional · stage-gate</text>
    <text x="20" y="62" class="small">cycle time: 6-18 months</text>
    <text x="20" y="80" class="small">tooling cost per iter: $$$$$</text>
    <text x="20" y="98" class="small">phases sequential</text>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#cfd5db"/>
    <text x="20" y="130" class="small">Concept → Design → Tooling →</text>
    <text x="20" y="146" class="small">Pilot → Validate → Launch</text>
    <text x="20" y="178" class="small" fill="#9b0000">user feedback: at launch</text>
    <text x="20" y="194" class="small" fill="#9b0000">recovery cost: ruinous</text>
  </g>

  <g transform="translate(290,80)">
    <rect width="220" height="240" fill="#fff" stroke="#cfd5db" rx="6"/>
    <rect width="220" height="32" fill="#0066cc" rx="6"/>
    <rect y="22" width="220" height="10" fill="#0066cc"/>
    <text x="110" y="22" text-anchor="middle" class="label" fill="#fff">Accelerated hybrid</text>
    <text x="20" y="62" class="small">cycle time: 3-6 months</text>
    <text x="20" y="80" class="small">tooling cost per iter: $$$</text>
    <text x="20" y="98" class="small">phases overlapped</text>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#cfd5db"/>
    <text x="20" y="130" class="small">3D-printed proto + rapid prototyping</text>
    <text x="20" y="146" class="small">Soft tooling + small-batch pilots</text>
    <text x="20" y="162" class="small">Concurrent EE/ME/FW tracks</text>
    <text x="20" y="194" class="small">user feedback: at each major iteration</text>
    <text x="20" y="210" class="small">recovery cost: moderate</text>
  </g>

  <g transform="translate(540,80)">
    <rect width="220" height="240" fill="#fff" stroke="#cfd5db" rx="6"/>
    <rect width="220" height="32" fill="#ff6b35" rx="6"/>
    <rect y="22" width="220" height="10" fill="#ff6b35"/>
    <text x="110" y="22" text-anchor="middle" class="label" fill="#fff">Agile hardware</text>
    <text x="20" y="62" class="small">cycle time: 2-6 weeks</text>
    <text x="20" y="80" class="small">tooling cost per iter: $</text>
    <text x="20" y="98" class="small">cross-functional teams</text>
    <line x1="20" y1="110" x2="200" y2="110" stroke="#cfd5db"/>
    <text x="20" y="130" class="small">Modular architecture</text>
    <text x="20" y="146" class="small">Continuous prototype refresh</text>
    <text x="20" y="162" class="small">Customer feedback every sprint</text>
    <text x="20" y="194" class="small" fill="#10a37f">user feedback: continuous</text>
    <text x="20" y="210" class="small" fill="#10a37f">recovery cost: low</text>
  </g>

  <!-- bottom arrow -->
  <line x1="60" y1="350" x2="740" y2="350" stroke="#5a6470" stroke-width="2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6470"/>
    </marker>
  </defs>
  <text x="400" y="370" text-anchor="middle" class="small">cycle time shrinks · iteration cost drops · learning rate accelerates</text>
</svg>
