<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="2019 forecast timeline">
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:10px;fill:#5b616b}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:16px;font-weight:600;fill:#1a1d24}
    .qtr{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;font-weight:600;fill:#5b616b}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:12px;fill:#7a808c}
  </style>
  <rect width="800" height="480" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <text x="32" y="42" class="ttl">Eight bets for 2019, placed on the calendar</text>

  <!-- timeline axis -->
  <line x1="60" y1="92" x2="740" y2="92" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
  <!-- quarter ticks -->
  <g>
    <line x1="60" y1="86" x2="60" y2="98" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="230" y1="86" x2="230" y2="98" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="400" y1="86" x2="400" y2="98" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="570" y1="86" x2="570" y2="98" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="740" y1="86" x2="740" y2="98" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <text x="60" y="78" text-anchor="middle" class="qtr">Q1</text>
    <text x="230" y="78" text-anchor="middle" class="qtr">Q2</text>
    <text x="400" y="78" text-anchor="middle" class="qtr">Q3</text>
    <text x="570" y="78" text-anchor="middle" class="qtr">Q4</text>
    <text x="740" y="78" text-anchor="middle" class="qtr">'20</text>
  </g>

  <!-- markers on axis -->
  <g>
    <circle cx="320" cy="92" r="6" fill="#0066cc"/>
    <circle cx="450" cy="92" r="6" fill="#0066cc"/>
    <circle cx="610" cy="92" r="6" fill="#0066cc"/>
    <circle cx="660" cy="92" r="6" fill="#0066cc"/>
  </g>

  <!-- bet rows -->
  <g transform="translate(32,128)">
    <!-- row template 36px -->
    <g transform="translate(0,0)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">AirPods Pro w/ active noise cancellation</text>
      <text x="470" y="12" class="sm">Q4 · $249 · WF-1000XM3 pressures H1</text>
    </g>
    <g transform="translate(0,34)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Apple Watch S5 — always-on display</text>
      <text x="470" y="12" class="sm">September</text>
    </g>
    <g transform="translate(0,68)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Smart-ring category gets serious</text>
      <text x="470" y="12" class="sm">Oura Gen 2 → 100K units by EOY</text>
    </g>
    <g transform="translate(0,102)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Home-IP interop standard announced</text>
      <text x="470" y="12" class="sm">announced EOY · ships 18mo+ out</text>
    </g>
    <g transform="translate(0,136)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Wi-Fi 6 (802.11ax) routers hit retail</text>
      <text x="470" y="12" class="sm">by Q3 · adoption slow till '20-21</text>
    </g>
    <g transform="translate(0,170)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Watch S5 gets a cellular-only mode</text>
      <text x="470" y="12" class="sm">"leave the phone at home"</text>
    </g>
    <g transform="translate(0,204)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Fitbit acquired or pivots off hardware</text>
      <text x="470" y="12" class="sm">EOY · best buyer: Google</text>
    </g>
    <g transform="translate(0,238)">
      <rect width="14" height="14" rx="3" fill="#0066cc"/>
      <text x="26" y="12" class="lbl">Smart displays outsell speakers (one Q)</text>
      <text x="470" y="12" class="sm">Q4 · Show 5/8, Nest Hub Max</text>
    </g>
  </g>

  <text x="32" y="446" class="cap">Each square is a call I'm willing to be wrong on. Some are dated tight; the standards one I expect to slip.</text>
</svg>
