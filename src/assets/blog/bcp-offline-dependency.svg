<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 500" width="1120" height="500" role="img" aria-label="What each generation does when the cloud is unreachable">
  <rect width="1120" height="500" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHAT HAPPENS WHEN THE CLOUD IS GONE</text>

  <line x1="560" y1="78" x2="560" y2="438" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.12"/>

  <!-- ===== LEFT: v1 — works offline ===== -->
  <text x="285" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#3a7d44">v1 · compute on the device</text>

  <!-- device -->
  <g transform="translate(110,150)">
    <rect x="0" y="0" width="150" height="120" rx="14" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-width="3.5"/>
    <text x="75" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">device runs</text>
    <!-- flash buffer cells -->
    <text x="75" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">records to flash</text>
    <g fill="#3a7d44" opacity="0.7">
      <rect x="28" y="74" width="18" height="24" rx="3"/>
      <rect x="52" y="74" width="18" height="24" rx="3"/>
      <rect x="76" y="74" width="18" height="24" rx="3"/>
      <rect x="100" y="74" width="18" height="24" rx="3"/>
    </g>
  </g>
  <!-- broken link to cloud -->
  <g stroke="#7a808c" stroke-width="3" stroke-dasharray="8 7" fill="none">
    <line x1="260" y1="210" x2="330" y2="210"/>
  </g>
  <!-- break mark -->
  <g stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round">
    <line x1="288" y1="196" x2="302" y2="224"/>
    <line x1="302" y1="196" x2="288" y2="224"/>
  </g>
  <!-- faded cloud (unreachable) -->
  <path d="M348 240 a24 24 0 0 1 2 -48 a32 32 0 0 1 62 -3 a26 26 0 0 1 24 51 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
  <!-- sync-later arc -->
  <path d="M185 282 C 220 350 340 350 392 296" fill="none" stroke="#3a7d44" stroke-width="2.6" stroke-dasharray="6 6"/>
  <path d="M392 296 l-13 2 5 12 z" fill="#3a7d44"/>
  <text x="285" y="372" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44">session syncs when the link returns</text>
  <!-- verdict chip -->
  <rect x="170" y="392" width="230" height="34" rx="17" fill="#3a7d44" fill-opacity="0.14" stroke="#3a7d44" stroke-width="2"/>
  <text x="285" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">user keeps working</text>

  <!-- ===== RIGHT: v2 — useless offline ===== -->
  <text x="835" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#c14a3a">v2 · compute in the cloud</text>

  <g transform="translate(660,150)">
    <rect x="0" y="0" width="150" height="120" rx="14" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-width="3.5"/>
    <text x="75" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">cart waits</text>
    <text x="75" y="60" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">payment needs</text>
    <text x="75" y="76" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">a cloud authorize</text>
    <!-- spinner-ish stalled glyph -->
    <circle cx="75" cy="100" r="11" fill="none" stroke="#c14a3a" stroke-width="3" stroke-dasharray="34 14"/>
  </g>
  <!-- broken link -->
  <g stroke="#7a808c" stroke-width="3" stroke-dasharray="8 7" fill="none">
    <line x1="810" y1="210" x2="880" y2="210"/>
  </g>
  <g stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round">
    <line x1="838" y1="196" x2="852" y2="224"/>
    <line x1="852" y1="196" x2="838" y2="224"/>
  </g>
  <path d="M898 240 a24 24 0 0 1 2 -48 a32 32 0 0 1 62 -3 a26 26 0 0 1 24 51 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
  <text x="835" y="372" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">no authorize → no checkout</text>
  <rect x="720" y="392" width="230" height="34" rx="17" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2"/>
  <text x="835" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">customer is stuck at the gate</text>

  <text x="560" y="470" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">Push compute to the device or accept the dependency — a product decision we made without arguing it out.</text>
</svg>
