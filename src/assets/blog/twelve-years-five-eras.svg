<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 410" width="1080" height="410" role="img" aria-label="Five eras of pet IoT from 2013 to 2025.">
  <rect width="1080" height="410" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">FIVE ERAS, 2013–2025</text>

  <!-- spine -->
  <line x1="70" y1="200" x2="1010" y2="200" stroke="#1a1d24" stroke-width="2.5" opacity="0.25"/>

  <!-- era 1 -->
  <g transform="translate(70,0)">
    <circle cx="40" cy="200" r="8" fill="#c87533"/>
    <text x="40" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">2013–15</text>
    <text x="40" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">dog fitness</text>
    <text x="40" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">trackers</text>
    <text x="40" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">Whistle · FitBark</text>
    <text x="40" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">· Tagg</text>
  </g>

  <!-- era 2 -->
  <g transform="translate(245,0)">
    <circle cx="40" cy="200" r="8" fill="#c87533"/>
    <text x="40" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">2015–18</text>
    <text x="40" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">cat IoT joins,</text>
    <text x="40" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">Mars consolidates</text>
    <text x="40" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">SureFlap · Mars</text>
    <text x="40" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">buys Whistle '16</text>
  </g>

  <!-- era 3 -->
  <g transform="translate(420,0)">
    <circle cx="40" cy="200" r="8" fill="#c14a3a"/>
    <text x="40" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">2018–20</text>
    <text x="40" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">cloud-dependency</text>
    <text x="40" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">catastrophe</text>
    <text x="40" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">Petnet collapse</text>
    <text x="40" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">· Fi launches</text>
  </g>

  <!-- era 4 -->
  <g transform="translate(595,0)">
    <circle cx="40" cy="200" r="8" fill="#c87533"/>
    <text x="40" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">2020–23</text>
    <text x="40" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">behavioral health</text>
    <text x="40" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">+ AirTag</text>
    <text x="40" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">Whistle Health</text>
    <text x="40" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">· Petivity</text>
  </g>

  <!-- era 5 -->
  <g transform="translate(800,0)">
    <circle cx="40" cy="200" r="9" fill="#1a1d24"/>
    <text x="40" y="90" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">2023–25</text>
    <text x="40" y="150" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">DIY local-first +</text>
    <text x="40" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">the contraction</text>
    <text x="40" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">ESP32 DIY ·</text>
    <text x="40" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">Mars divests '25</text>
  </g>

  <text x="540" y="360" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">Sprawl, then consolidation, then a cloud catastrophe — and at the end, the empire letting go.</text>
</svg>
