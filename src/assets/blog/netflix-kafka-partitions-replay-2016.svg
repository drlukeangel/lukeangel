<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t d">
  <title id="t">Kafka partitions and replay — events sharded for parallelism, replayable from any offset</title>
  <desc id="d">2016-era flat diagram showing a Kafka topic split across three partitions, each with ordered events. Consumers can read forward from any offset, including replaying historical events to backfill a new dashboard or fix a downstream bug.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="380" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Kafka — partitions for parallelism, offsets for replay</text>

  <!-- Topic header -->
  <text x="40" y="80" class="label">topic: user-events</text>

  <!-- Partition 0 -->
  <g transform="translate(40,100)">
    <text x="0" y="14" class="small">partition 0</text>
    <rect width="640" height="36" fill="#1a1d24" rx="2"/>
    <g fill="#e50914">
      <rect x="6" y="6" width="24" height="24"/>
      <rect x="36" y="6" width="24" height="24"/>
      <rect x="66" y="6" width="24" height="24"/>
      <rect x="96" y="6" width="24" height="24"/>
      <rect x="126" y="6" width="24" height="24"/>
      <rect x="156" y="6" width="24" height="24"/>
      <rect x="186" y="6" width="24" height="24"/>
      <rect x="216" y="6" width="24" height="24"/>
      <rect x="246" y="6" width="24" height="24"/>
      <rect x="276" y="6" width="24" height="24"/>
      <rect x="306" y="6" width="24" height="24"/>
      <rect x="336" y="6" width="24" height="24"/>
      <rect x="366" y="6" width="24" height="24"/>
      <rect x="396" y="6" width="24" height="24"/>
      <rect x="426" y="6" width="24" height="24"/>
    </g>
  </g>

  <!-- Partition 1 -->
  <g transform="translate(40,160)">
    <text x="0" y="14" class="small">partition 1</text>
    <rect width="640" height="36" fill="#1a1d24" rx="2"/>
    <g fill="#e50914">
      <rect x="6" y="6" width="24" height="24"/>
      <rect x="36" y="6" width="24" height="24"/>
      <rect x="66" y="6" width="24" height="24"/>
      <rect x="96" y="6" width="24" height="24"/>
      <rect x="126" y="6" width="24" height="24"/>
      <rect x="156" y="6" width="24" height="24"/>
      <rect x="186" y="6" width="24" height="24"/>
      <rect x="216" y="6" width="24" height="24"/>
      <rect x="246" y="6" width="24" height="24"/>
      <rect x="276" y="6" width="24" height="24"/>
      <rect x="306" y="6" width="24" height="24"/>
      <rect x="336" y="6" width="24" height="24"/>
    </g>
  </g>

  <!-- Partition 2 -->
  <g transform="translate(40,220)">
    <text x="0" y="14" class="small">partition 2</text>
    <rect width="640" height="36" fill="#1a1d24" rx="2"/>
    <g fill="#e50914">
      <rect x="6" y="6" width="24" height="24"/>
      <rect x="36" y="6" width="24" height="24"/>
      <rect x="66" y="6" width="24" height="24"/>
      <rect x="96" y="6" width="24" height="24"/>
      <rect x="126" y="6" width="24" height="24"/>
      <rect x="156" y="6" width="24" height="24"/>
      <rect x="186" y="6" width="24" height="24"/>
      <rect x="216" y="6" width="24" height="24"/>
    </g>
  </g>

  <!-- Offsets axis -->
  <text x="46" y="282" class="small">offset 0</text>
  <text x="676" y="282" text-anchor="end" class="small">offset N (latest)</text>

  <!-- Replay annotation -->
  <line x1="200" y1="190" x2="120" y2="190" stroke="#ff6b35" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#ar)"/>
  <text x="160" y="183" text-anchor="middle" class="small" fill="#ff6b35">replay</text>

  <!-- Bottom note -->
  <g transform="translate(40,300)">
    <rect width="720" height="60" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="22" class="label">Two superpowers in one diagram</text>
    <text x="14" y="42" class="small">- <tspan font-weight="600">Partitions</tspan>: events are sharded by key (user_id, session_id) — three parallel consumers read three partitions at full speed.</text>
    <text x="14" y="56" class="small">- <tspan font-weight="600">Replay</tspan>: a new consumer can start at offset 0 and re-process the entire log to backfill a new feature or rebuild state.</text>
  </g>
</svg>
