<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Connected cat door">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- cat door (left): a flap in a wall section, with a cat silhouette -->
  <g transform="translate(150 250)">
    <!-- wall slab -->
    <rect x="0" y="-60" width="60" height="300" fill="#1a1d24" fill-opacity="0.08" stroke="#1a1d24" stroke-width="4"/>
    <!-- the flap door unit -->
    <rect x="6" y="90" width="48" height="80" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <line x1="6" y1="118" x2="54" y2="118" stroke="#1a1d24" stroke-width="3"/>
    <!-- chip-read indicator -->
    <circle cx="30" cy="104" r="5" fill="#c87533"/>
  </g>
  <!-- cat silhouette approaching the door -->
  <g transform="translate(70 380)" fill="#1a1d24">
    <path d="M0 0 q 18 -40 56 -34 q -6 -16 2 -26 q 10 8 12 26 q 26 8 26 36 l 2 30 l -10 0 l -4 -26 q -16 6 -38 6 l -2 22 l -10 0 l 0 -24 q -26 -6 -34 -36 z"/>
    <!-- tail -->
    <path d="M-2 -2 q -26 -6 -28 -38 q 8 -2 12 8 q 4 22 22 22 z"/>
  </g>

  <!-- sub-GHz RF hop arcs from door toward the hub -->
  <g transform="translate(210 345)" stroke="#c87533" fill="none" stroke-linecap="round">
    <path d="M0 0 q 110 -70 250 -160" stroke-width="3" opacity="0.35" stroke-dasharray="2 12"/>
    <path d="M0 -2 a 40 40 0 0 1 40 -34" stroke-width="4" opacity="0.45"/>
    <path d="M8 8 a 70 70 0 0 1 70 -58" stroke-width="4" opacity="0.7"/>
    <path d="M16 18 a 100 100 0 0 1 100 -84" stroke-width="4" opacity="0.95"/>
  </g>

  <!-- hub (center) -->
  <g transform="translate(470 150)">
    <rect x="0" y="0" width="120" height="70" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="60" cy="35" r="12" fill="#c87533"/>
    <circle cx="60" cy="35" r="22" fill="none" stroke="#c87533" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- ethernet cable from hub to cloud (solid straight = wired) -->
  <path d="M590 185 L760 185" stroke="#1a1d24" stroke-width="5"/>
  <!-- little RJ45 plug glyphs -->
  <rect x="586" y="178" width="14" height="14" rx="2" fill="#1a1d24"/>
  <rect x="750" y="178" width="14" height="14" rx="2" fill="#1a1d24"/>

  <!-- cloud -->
  <g transform="translate(870 185)">
    <path d="M-95 26 a44 44 0 0 1 24 -82 a58 58 0 0 1 108 9 a42 42 0 0 1 4 73 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  </g>

  <!-- down to phone -->
  <path d="M870 245 L870 360" stroke="#1a1d24" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round"/>
  <g transform="translate(830 365)">
    <rect x="0" y="0" width="80" height="150" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="12" y="20" width="56" height="100" rx="3" fill="#1a1d24" fill-opacity="0.06" stroke="#1a1d24" stroke-width="2"/>
    <circle cx="40" cy="134" r="6" fill="#1a1d24"/>
    <!-- a tiny log row in the screen -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="#c87533" stroke-width="4"/>
    <line x1="20" y1="58" x2="52" y2="58" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
    <line x1="20" y1="74" x2="56" y2="74" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
  </g>
</svg>
