<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" role="img" aria-label="How a broken layer cascades into the layers that depend on it.">
  <rect width="1000" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">COMPROMISE CASCADES UPWARD</text>

  <!-- Case A: hardware breaks -> identity + transport fall -->
  <text x="40" y="86" font-family="ui-monospace,monospace" font-size="12.5" fill="#7a808c">a broken layer 1 invalidates 3 and 4</text>
  <g font-family="ui-monospace,monospace" font-size="13">
    <!-- L1 broken -->
    <rect x="40" y="100" width="150" height="52" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <path d="M58 118 l16 16 M74 118 l-16 16" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    <text x="118" y="123" text-anchor="middle" fill="#1a1d24">1 Hardware</text>
    <text x="118" y="141" text-anchor="middle" font-size="10.5" fill="#c14a3a">key extracted</text>
    <!-- arrows -->
    <g stroke="#c14a3a" stroke-width="2.6" fill="#c14a3a">
      <path d="M190 116 H 286"/><path d="M290 116 l-15 -6 v12 z"/>
      <path d="M190 136 H 286"/><path d="M290 136 l-15 -6 v12 z"/>
    </g>
    <!-- 3 + 4 fall -->
    <rect x="290" y="100" width="160" height="24" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="370" y="117" text-anchor="middle" font-size="11.5" fill="#c14a3a">3 Identity — moot</text>
    <rect x="290" y="128" width="160" height="24" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="370" y="145" text-anchor="middle" font-size="11.5" fill="#c14a3a">4 Transport — moot</text>
  </g>

  <!-- Case B: cloud breaks -> data + detection fall -->
  <text x="540" y="86" font-family="ui-monospace,monospace" font-size="12.5" fill="#7a808c">a broken layer 5 invalidates 6 and 7</text>
  <g font-family="ui-monospace,monospace" font-size="13">
    <rect x="540" y="100" width="150" height="52" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <path d="M558 118 l16 16 M574 118 l-16 16" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    <text x="618" y="123" text-anchor="middle" fill="#1a1d24">5 Cloud</text>
    <text x="618" y="141" text-anchor="middle" font-size="10.5" fill="#c14a3a">broad IAM</text>
    <g stroke="#c14a3a" stroke-width="2.6" fill="#c14a3a">
      <path d="M690 116 H 786"/><path d="M790 116 l-15 -6 v12 z"/>
      <path d="M690 136 H 786"/><path d="M790 136 l-15 -6 v12 z"/>
    </g>
    <rect x="790" y="100" width="170" height="24" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="875" y="117" text-anchor="middle" font-size="11.5" fill="#c14a3a">6 Data — exposed</text>
    <rect x="790" y="128" width="170" height="24" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="875" y="145" text-anchor="middle" font-size="11.5" fill="#c14a3a">7 Detection — blind</text>
  </g>

  <!-- the point: independence -->
  <line x1="40" y1="208" x2="960" y2="208" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="244" font-family="ui-monospace,monospace" font-size="12.5" fill="#7a808c">the discipline: keep each layer independent so one break is survivable</text>

  <!-- independent row -->
  <g font-family="ui-monospace,monospace" font-size="12">
    <rect x="40" y="262" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <path d="M58 280 l16 16 M74 280 l-16 16" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    <text x="115" y="306" text-anchor="middle" fill="#c14a3a">one breaks</text>

    <g stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.35" stroke-dasharray="2 5"><line x1="190" y1="290" x2="232" y2="290"/></g>

    <rect x="232" y="262" width="120" height="56" rx="9" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <path d="M270 290 l8 8 16 -18" fill="none" stroke="#3a7d44" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="364" y="262" width="120" height="56" rx="9" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <path d="M402 290 l8 8 16 -18" fill="none" stroke="#3a7d44" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="496" y="262" width="120" height="56" rx="9" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <path d="M534 290 l8 8 16 -18" fill="none" stroke="#3a7d44" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="650" y="296" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">the others compensate while you fix it</text>
</svg>
