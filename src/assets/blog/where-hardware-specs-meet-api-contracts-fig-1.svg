<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 430" width="1080" height="430" role="img" aria-label="The layer closest to the data owns its canonical interpretation.">
  <rect width="1080" height="430" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE LAYER CLOSEST TO THE DATA OWNS ITS INTERPRETATION</text>

  <!-- the head-replacement question, traced through three layers -->
  <text x="44" y="86" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">one question — "when do we tell the user to replace the head?" — split by who is closest to the data</text>

  <!-- FIRMWARE -->
  <g transform="translate(44,112)">
    <rect x="0" y="0" width="312" height="240" rx="14" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.4"/>
    <text x="22" y="38" font-family="ui-monospace,monospace" font-size="13" fill="#357a8c">FIRMWARE</text>
    <text x="22" y="60" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">physically reads the chip on the head</text>
    <line x1="22" y1="78" x2="290" y2="78" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1"/>
    <text x="22" y="106" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">OWNS</text>
    <!-- chip icon -->
    <g transform="translate(40,138)">
      <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#357a8c" fill-opacity="0.12" stroke="#357a8c" stroke-width="2.2"/>
      <g stroke="#357a8c" stroke-width="2"><line x1="-20" y1="-8" x2="-16" y2="-8"/><line x1="-20" y1="8" x2="-16" y2="8"/><line x1="16" y1="-8" x2="20" y2="-8"/><line x1="16" y1="8" x2="20" y2="8"/></g>
    </g>
    <text x="74" y="138" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">head-ID byte format</text>
    <text x="22" y="186" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">owns the contract that</text>
    <text x="22" y="206" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">documents the bytes, and the</text>
    <text x="22" y="226" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">migration plan when they change</text>
  </g>

  <!-- CLOUD -->
  <g transform="translate(384,112)">
    <rect x="0" y="0" width="312" height="240" rx="14" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.4"/>
    <text x="22" y="38" font-family="ui-monospace,monospace" font-size="13" fill="#357a8c">CLOUD</text>
    <text x="22" y="60" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">aggregates sessions across time</text>
    <line x1="22" y1="78" x2="290" y2="78" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1"/>
    <text x="22" y="106" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">OWNS</text>
    <!-- cloud icon -->
    <g transform="translate(40,138)">
      <path d="M-18 12 a13 13 0 0 1 1 -26 a15 15 0 0 1 28 -4 a12 12 0 0 1 9 30 z" fill="#357a8c" fill-opacity="0.12" stroke="#357a8c" stroke-width="2"/>
    </g>
    <text x="74" y="134" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">hours-since-attached</text>
    <text x="74" y="156" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">"replace" decision (push)</text>
    <text x="22" y="200" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">canonical, because it sees</text>
    <text x="22" y="220" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">every session over time</text>
  </g>

  <!-- MOBILE -->
  <g transform="translate(724,112)">
    <rect x="0" y="0" width="312" height="240" rx="14" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.4"/>
    <text x="22" y="38" font-family="ui-monospace,monospace" font-size="13" fill="#357a8c">MOBILE</text>
    <text x="22" y="60" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">the surface the user actually sees</text>
    <line x1="22" y1="78" x2="290" y2="78" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1"/>
    <text x="22" y="106" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">OWNS</text>
    <!-- phone icon -->
    <g transform="translate(40,138)">
      <rect x="-13" y="-18" width="26" height="36" rx="5" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.2"/>
      <rect x="-9" y="-13" width="18" height="24" rx="2" fill="#357a8c" fill-opacity="0.1"/>
    </g>
    <text x="74" y="138" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">in-app "replace" surface</text>
    <text x="22" y="186" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">renders the cloud's decision —</text>
    <text x="22" y="206" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#357a8c">does not recompute it</text>
  </g>

  <!-- data-proximity arrow underneath -->
  <g stroke="#7a808c" stroke-width="2.4" fill="#7a808c" stroke-linecap="round">
    <line x1="200" y1="372" x2="880" y2="372"/><path d="M884 372 l-14 -7 v14 z"/>
  </g>
  <text x="200" y="396" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">closest to the silicon</text>
  <text x="880" y="396" text-anchor="end" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">closest to the user</text>
  <text x="540" y="396" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="13.5" font-style="italic" fill="#3a3f4a">one interpretation, one owner, one place a fix lands</text>
</svg>
