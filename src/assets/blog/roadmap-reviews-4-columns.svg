<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <rect width="1200" height="720" fill="#fdfaf2"/>
  <defs>
    <pattern id="rr4cDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="720" fill="url(#rr4cDots)"/>
  <rect x="0" y="0" width="24" height="720" fill="#2a52be"/>

  <line x1="80" y1="100" x2="1120" y2="100" stroke="#1a1d24" stroke-width="2"/>
  <text x="80" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#7a808c">THE TEMPLATE</text>
  <text x="1120" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#2a52be" text-anchor="end">4 COLUMNS</text>

  <text x="80" y="170" font-family="Newsreader, serif" font-weight="500" font-size="44" fill="#1a1d24" letter-spacing="-1">The four columns I use for every roadmap review</text>

  <!-- 4 columns -->
  <g font-family="Newsreader, serif" fill="#1a1d24">
    <!-- Column 1 -->
    <g transform="translate(80, 230)">
      <rect x="0" y="0" width="245" height="420" rx="10" fill="#ffffff" stroke="#1a1d24" stroke-width="2"/>
      <text x="20" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#2a52be">COLUMN 01</text>
      <text x="20" y="84" font-weight="500" font-size="28">Observed</text>
      <text x="20" y="110" font-style="italic" font-size="14" fill="#7a808c">What actually happened.</text>
      <line x1="20" y1="128" x2="225" y2="128" stroke="#1a1d24" stroke-width="1" stroke-dasharray="3,5"/>
      <text x="20" y="160" font-size="15" fill="#1a1d24">· Eval avg 4.27 → 3.91</text>
      <text x="20" y="186" font-size="15" fill="#1a1d24">· p95 latency 1.4s</text>
      <text x="20" y="212" font-size="15" fill="#1a1d24">· 3 support tickets re:</text>
      <text x="20" y="232" font-size="15" fill="#1a1d24">  date formatting</text>
      <text x="20" y="258" font-size="15" fill="#1a1d24">· Two evals reflagged</text>
      <text x="20" y="278" font-size="15" fill="#1a1d24">  in the regression set</text>
    </g>
    <!-- Column 2 -->
    <g transform="translate(345, 230)">
      <rect x="0" y="0" width="245" height="420" rx="10" fill="#ffffff" stroke="#1a1d24" stroke-width="2"/>
      <text x="20" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#2a52be">COLUMN 02</text>
      <text x="20" y="84" font-weight="500" font-size="28">Assumed</text>
      <text x="20" y="110" font-style="italic" font-size="14" fill="#7a808c">What we believed when we planned it.</text>
      <line x1="20" y1="128" x2="225" y2="128" stroke="#1a1d24" stroke-width="1" stroke-dasharray="3,5"/>
      <text x="20" y="160" font-size="15" fill="#1a1d24">· Prompt change was</text>
      <text x="20" y="180" font-size="15" fill="#1a1d24">  drop-in safe</text>
      <text x="20" y="206" font-size="15" fill="#1a1d24">· 4o-mini same shape</text>
      <text x="20" y="226" font-size="15" fill="#1a1d24">  as 4o on this task</text>
      <text x="20" y="252" font-size="15" fill="#1a1d24">· Users like the new</text>
      <text x="20" y="272" font-size="15" fill="#1a1d24">  date format</text>
    </g>
    <!-- Column 3 -->
    <g transform="translate(610, 230)">
      <rect x="0" y="0" width="245" height="420" rx="10" fill="#ffffff" stroke="#1a1d24" stroke-width="2"/>
      <text x="20" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#2a52be">COLUMN 03</text>
      <text x="20" y="84" font-weight="500" font-size="28">Evidence</text>
      <text x="20" y="110" font-style="italic" font-size="14" fill="#7a808c">What's actually true now.</text>
      <line x1="20" y1="128" x2="225" y2="128" stroke="#1a1d24" stroke-width="1" stroke-dasharray="3,5"/>
      <text x="20" y="160" font-size="15" fill="#1a1d24">· The change cost us</text>
      <text x="20" y="180" font-size="15" fill="#1a1d24">  9% on format axis</text>
      <text x="20" y="206" font-size="15" fill="#1a1d24">· 4o-mini hallucinates</text>
      <text x="20" y="226" font-size="15" fill="#1a1d24">  on long tool chains</text>
      <text x="20" y="252" font-size="15" fill="#1a1d24">· Tickets came from</text>
      <text x="20" y="272" font-size="15" fill="#1a1d24">  power users, not new</text>
    </g>
    <!-- Column 4 -->
    <g transform="translate(875, 230)">
      <rect x="0" y="0" width="245" height="420" rx="10" fill="#2a52be"/>
      <text x="20" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#fdfaf2">COLUMN 04</text>
      <text x="20" y="84" font-weight="500" font-size="28" fill="#fdfaf2">Committing to</text>
      <text x="20" y="110" font-style="italic" font-size="14" fill="#ffffff" opacity="0.8">What we'll do this week.</text>
      <line x1="20" y1="128" x2="225" y2="128" stroke="#fdfaf2" stroke-width="1" stroke-dasharray="3,5" opacity="0.6"/>
      <text x="20" y="160" font-size="15" fill="#fdfaf2">· Revert the prompt</text>
      <text x="20" y="180" font-size="15" fill="#fdfaf2">  on prod</text>
      <text x="20" y="206" font-size="15" fill="#fdfaf2">· Add the failing</text>
      <text x="20" y="226" font-size="15" fill="#fdfaf2">  examples to evals</text>
      <text x="20" y="252" font-size="15" fill="#fdfaf2">· Ship format fix</text>
      <text x="20" y="272" font-size="15" fill="#fdfaf2">  behind a flag</text>
      <text x="20" y="298" font-size="15" fill="#fdfaf2">· Re-review Thursday</text>
    </g>
  </g>

  <text x="80" y="690" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">OBSERVED  →  ASSUMED  →  EVIDENCE  →  COMMITTING TO</text>
  <text x="1120" y="690" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#2a52be" text-anchor="end">LUKEANGEL.CO</text>
</svg>
