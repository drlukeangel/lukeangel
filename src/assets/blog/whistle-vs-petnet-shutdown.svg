<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" width="1080" height="420" role="img" aria-label="A managed device shutdown versus a silent collapse.">
  <rect width="1080" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">TWO WAYS A CLOUD DEVICE CAN DIE</text>

  <line x1="540" y1="70" x2="540" y2="384" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- LEFT: Petnet — silent crash -->
  <text x="270" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#c14a3a">PETNET (2020) — silent crash</text>
  <!-- a cliff-edge line: working, then straight off the edge -->
  <polyline points="70,150 230,150 230,330 470,330" fill="none" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="230" cy="150" r="5" fill="#c14a3a"/>
  <text x="150" y="138" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">working…</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a" text-anchor="start">
    <text x="250" y="200">✗ no warning</text>
    <text x="250" y="224">✗ no communication</text>
    <text x="250" y="248">✗ no replacement</text>
    <text x="250" y="272">✗ no data export</text>
  </g>
  <text x="270" y="364" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">insolvent — couldn't soft-land if it wanted to</text>

  <!-- RIGHT: Whistle — managed wind-down -->
  <text x="810" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#3a7d44">WHISTLE (2025) — managed wind-down</text>
  <!-- a graceful ramp down with a notice window -->
  <polyline points="610,150 760,150 1010,300" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round"/>
  <circle cx="760" cy="150" r="5" fill="#3a7d44"/>
  <!-- the ~7-week notice window shaded -->
  <rect x="760" y="150" width="250" height="150" fill="#3a7d44" fill-opacity="0.08"/>
  <text x="885" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">~7-week notice window</text>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44" text-anchor="start">
    <text x="620" y="200">✓ 7 weeks' notice</text>
    <text x="620" y="224">✓ free Tractive tracker</text>
    <text x="620" y="248">✓ subscription credit</text>
    <text x="620" y="272">✓ ~6-week data-export window</text>
  </g>
  <text x="810" y="364" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">solvent owner chose to land it gently</text>

  <text x="540" y="404" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a3f4a">The difference isn't the shutdown — it's whether someone solvent decided to do it kindly.</text>
</svg>
