<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A device's integration links severed by a closing door">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- the cloud device (Nest-like round thermostat) in the center -->
  <g transform="translate(540,290)">
    <circle cx="0" cy="0" r="62" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="0" r="40" fill="#6a4c93" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="#6a4c93" fill-opacity="0.25"/>
    <!-- a small dial tick -->
    <line x1="0" y1="-40" x2="0" y2="-28" stroke="#1a1d24" stroke-width="4"/>
  </g>

  <!-- the integration spokes that USED to connect — now severed with red cut-marks -->
  <g stroke="#7a808c" stroke-width="3" opacity="0.4" stroke-dasharray="6 6">
    <line x1="500" y1="250" x2="320" y2="140"/>
    <line x1="480" y1="290" x2="240" y2="290"/>
    <line x1="500" y1="330" x2="320" y2="440"/>
  </g>
  <!-- the severed-target nodes (automations, faded) -->
  <g fill="#fdfaf2" stroke="#7a808c" stroke-width="3" opacity="0.5">
    <rect x="240" y="112" width="90" height="56" rx="10"/>
    <rect x="150" y="262" width="90" height="56" rx="10"/>
    <rect x="240" y="412" width="90" height="56" rx="10"/>
  </g>
  <!-- red cut marks on each severed spoke -->
  <g stroke="#c14a3a" stroke-width="4.5" stroke-linecap="round">
    <g transform="translate(410,195)"><line x1="-13" y1="-13" x2="13" y2="13"/><line x1="-13" y1="13" x2="13" y2="-13"/></g>
    <g transform="translate(360,290)"><line x1="-13" y1="-13" x2="13" y2="13"/><line x1="-13" y1="13" x2="13" y2="-13"/></g>
    <g transform="translate(410,385)"><line x1="-13" y1="-13" x2="13" y2="13"/><line x1="-13" y1="13" x2="13" y2="-13"/></g>
  </g>

  <!-- a CLOSING DOOR motif on the right (the API withdrawn, not broken) -->
  <g transform="translate(720,170)">
    <!-- doorframe -->
    <rect x="0" y="0" width="160" height="280" rx="4" fill="none" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- the door, mostly shut (only a sliver open) -->
    <path d="M150 14 L40 40 L40 264 L150 270 Z" fill="#6a4c93" fill-opacity="0.14" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <!-- handle -->
    <circle cx="60" cy="150" r="7" fill="#1a1d24"/>
    <!-- a red bar across = closed/withdrawn -->
    <line x1="14" y1="288" x2="146" y2="288" stroke="#c14a3a" stroke-width="5"/>
  </g>
  <!-- link from device toward the closing door (the cloud path being shut) -->
  <g stroke="#c14a3a" stroke-width="3" fill="none" stroke-dasharray="4 6">
    <line x1="602" y1="290" x2="716" y2="300"/>
  </g>
</svg>
