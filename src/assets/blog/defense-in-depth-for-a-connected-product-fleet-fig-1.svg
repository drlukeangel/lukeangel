<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" role="img" aria-label="Seven nested defense layers around a device core.">
  <rect width="1000" height="540" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">SEVEN LAYERS · EACH ASSUMES THE NEXT FAILS</text>

  <!-- nested rings, centred on device core at (340,300) -->
  <g fill="none">
    <rect x="84"  y="84"  width="512" height="432" rx="24" stroke="#1a1d24" stroke-width="2.4" stroke-opacity="0.85"/>
    <rect x="120" y="120" width="440" height="360" rx="22" stroke="#1a1d24" stroke-width="2.2" stroke-opacity="0.8"/>
    <rect x="156" y="156" width="368" height="288" rx="20" stroke="#1a1d24" stroke-width="2"   stroke-opacity="0.75"/>
    <rect x="192" y="192" width="296" height="216" rx="18" stroke="#1a1d24" stroke-width="2"   stroke-opacity="0.7"/>
    <rect x="228" y="228" width="224" height="144" rx="16" stroke="#1a1d24" stroke-width="2"   stroke-opacity="0.65"/>
    <rect x="264" y="264" width="152" height="72"  rx="14" stroke="#1a1d24" stroke-width="2"   stroke-opacity="0.6"/>
  </g>

  <!-- device core: chip -->
  <g transform="translate(300,278)">
    <rect x="0" y="0" width="80" height="44" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <g stroke="#c14a3a" stroke-width="2.4">
      <line x1="-8" y1="12" x2="0" y2="12"/><line x1="-8" y1="22" x2="0" y2="22"/><line x1="-8" y1="32" x2="0" y2="32"/>
      <line x1="80" y1="12" x2="88" y2="12"/><line x1="80" y1="22" x2="88" y2="22"/><line x1="80" y1="32" x2="88" y2="32"/>
    </g>
    <text x="40" y="27" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">device</text>
  </g>

  <!-- ring labels, ranked outward on the right -->
  <g font-family="ui-monospace,monospace" font-size="13.5" fill="#1a1d24">
    <g stroke="#1a1d24" stroke-width="1.2" stroke-opacity="0.4">
      <line x1="380" y1="300" x2="640" y2="300"/>
      <line x1="416" y1="264" x2="640" y2="264"/>
      <line x1="452" y1="228" x2="640" y2="228"/>
      <line x1="488" y1="192" x2="640" y2="192"/>
      <line x1="524" y1="156" x2="640" y2="156"/>
      <line x1="560" y1="120" x2="640" y2="120"/>
      <line x1="596" y1="84"  x2="640" y2="84"/>
    </g>
    <text x="652" y="305">1 · Hardware — key in the secure element</text>
    <text x="652" y="269">2 · Firmware — signed images, secure boot</text>
    <text x="652" y="233">3 · Identity — per-device X.509</text>
    <text x="652" y="197">4 · Transport — mutual TLS, pinned CA</text>
    <text x="652" y="161">5 · Cloud — least-privilege policy + IAM</text>
    <text x="652" y="125">6 · Data — encryption, PII classification</text>
    <text x="652" y="89">7 · Detection — watches every layer below</text>
  </g>

  <text x="84" y="528" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">break one ring, the rest still hold while you fix it</text>
</svg>
