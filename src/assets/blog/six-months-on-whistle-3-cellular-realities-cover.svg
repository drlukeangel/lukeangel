<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Cellular tracker realities">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- battery depletion chart frame -->
  <g transform="translate(150 90)">
    <!-- axes -->
    <line x1="0" y1="0" x2="0" y2="320" stroke="#1a1d24" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="0" y1="320" x2="620" y2="320" stroke="#1a1d24" stroke-opacity="0.35" stroke-width="3"/>

    <!-- claimed curve: gentle, reaches empty near right edge (day 7) -->
    <path d="M0 12 C 200 40, 430 150, 600 318" fill="none" stroke="#3a7d44" stroke-width="6" stroke-linecap="round"/>
    <!-- in-use curve: steep, empty by ~day 3 -->
    <path d="M0 12 C 90 90, 180 240, 250 318" fill="none" stroke="#c14a3a" stroke-width="6" stroke-linecap="round"/>

    <!-- markers where curves hit empty -->
    <circle cx="250" cy="318" r="9" fill="#c14a3a"/>
    <circle cx="600" cy="318" r="9" fill="#3a7d44"/>

    <!-- a small battery glyph at the start, full -->
    <g transform="translate(-118 -22)">
      <rect x="0" y="0" width="86" height="44" rx="7" fill="none" stroke="#1a1d24" stroke-width="4"/>
      <rect x="86" y="13" width="10" height="18" rx="2" fill="#1a1d24"/>
      <rect x="8" y="8" width="58" height="28" rx="3" fill="#c87533"/>
    </g>
    <!-- battery glyph near the steep empty point, drained -->
    <g transform="translate(218 350)">
      <rect x="0" y="0" width="64" height="32" rx="5" fill="none" stroke="#c14a3a" stroke-width="3.5"/>
      <rect x="64" y="9" width="8" height="14" rx="2" fill="#c14a3a"/>
      <rect x="6" y="6" width="9" height="20" rx="2" fill="#c14a3a"/>
    </g>
  </g>

  <!-- GPS accuracy concentric rings, right side -->
  <g transform="translate(960 300)">
    <circle r="150" fill="none" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="3" stroke-dasharray="6 8"/>
    <circle r="105" fill="none" stroke="#1a1d24" stroke-opacity="0.22" stroke-width="3"/>
    <circle r="62" fill="none" stroke="#c87533" stroke-opacity="0.55" stroke-width="3.5"/>
    <circle r="26" fill="none" stroke="#3a7d44" stroke-width="4"/>
    <!-- true position marker (dog) -->
    <circle r="8" fill="#1a1d24"/>
    <!-- satellite tick -->
    <g transform="translate(118 -118)">
      <rect x="-13" y="-7" width="26" height="14" rx="3" fill="#1a1d24" transform="rotate(35)"/>
      <line x1="0" y1="0" x2="-58" y2="58" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3" stroke-dasharray="4 6"/>
    </g>
  </g>
</svg>
