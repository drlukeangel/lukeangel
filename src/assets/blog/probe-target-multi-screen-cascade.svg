<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-label="One trigger fans out to multiple screens">
  <rect x="0.5" y="0.5" width="1039" height="419" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;font-weight:700;fill:#1a1d24}
  </style>

  <!-- trigger -->
  <rect x="40" y="160" width="230" height="100" rx="12" fill="#c87533" fill-opacity="0.10" stroke="#c87533" stroke-width="2.5"/>
  <text x="155" y="196" text-anchor="middle" class="hd">oven probe</text>
  <text x="155" y="220" text-anchor="middle" class="lbl">target temp reached</text>
  <text x="155" y="242" text-anchor="middle" class="sm">one state change</text>

  <!-- HA decision node -->
  <rect x="340" y="180" width="160" height="60" rx="10" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
  <text x="420" y="206" text-anchor="middle" class="hd" fill="#6a4c93">HA automation</text>
  <text x="420" y="226" text-anchor="middle" class="sm">fan-out</text>

  <line x1="270" y1="210" x2="334" y2="210" stroke="#1a1d24" stroke-width="2"/>
  <polygon points="334,205 344,210 334,215" fill="#1a1d24"/>

  <!-- three outputs -->
  <g>
    <rect x="620" y="50" width="360" height="78" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="640" y="82" class="lbl">Frame TV</text>
    <text x="640" y="104" class="sm">banner across the great room</text>

    <rect x="620" y="171" width="360" height="78" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="640" y="203" class="lbl">Echo (kitchen)</text>
    <text x="640" y="225" class="sm">spoken announcement</text>

    <rect x="620" y="292" width="360" height="78" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="640" y="324" class="lbl">phone push</text>
    <text x="640" y="346" class="sm">for whoever's not in the room</text>
  </g>

  <g stroke="#6a4c93" stroke-width="2" fill="#6a4c93">
    <path d="M500 200 C560 200 560 92 614 92" fill="none"/><polygon points="614,87 624,92 614,97"/>
    <path d="M500 210 H614" fill="none"/><polygon points="614,205 624,210 614,215"/>
    <path d="M500 220 C560 220 560 328 614 328" fill="none"/><polygon points="614,323 624,328 614,333"/>
  </g>

  <text x="520" y="402" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="14.5" fill="#5b616b">The roast is ready, and the open-plan kitchen knows it from anywhere.</text>
</svg>
