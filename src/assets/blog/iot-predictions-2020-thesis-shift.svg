<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 384" role="img" aria-label="Thesis shift room to body">
  <rect width="760" height="384" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="15" letter-spacing="2" fill="#7a808c">WHERE THE PLATFORM LIVES · 2017 → 2020</text>

    <!-- 2017: the room (voice everywhere) -->
    <g transform="translate(60,96)">
      <!-- room / house outline -->
      <g stroke="#7a808c" stroke-width="2.6" fill="none">
        <path d="M0 60 l90 -56 l90 56"/>
        <rect x="14" y="60" width="152" height="128" rx="4"/>
      </g>
      <!-- speaker puck inside -->
      <g transform="translate(70,108)">
        <rect x="0" y="0" width="40" height="56" rx="18" fill="#7a808c" fill-opacity="0.18" stroke="#7a808c" stroke-width="2"/>
        <line x1="8" y1="14" x2="32" y2="14" stroke="#7a808c" stroke-width="1.6"/>
        <line x1="8" y1="22" x2="32" y2="22" stroke="#7a808c" stroke-width="1.6"/>
        <circle cx="20" cy="42" r="4" fill="#7a808c"/>
      </g>
      <text x="90" y="222" text-anchor="middle" font-size="14" fill="#1a1d24" font-weight="600">2017 — the room</text>
      <text x="90" y="244" text-anchor="middle" font-size="12" fill="#5b616b">"voice everywhere"</text>
      <text x="90" y="262" text-anchor="middle" font-size="11" fill="#7a808c">one shared device per space</text>
    </g>

    <!-- arrow -->
    <g stroke="#0066cc" stroke-width="3.5" fill="#0066cc">
      <line x1="290" y1="160" x2="450" y2="160"/>
      <path d="M456 160 l-16 -9 v18 z"/>
    </g>
    <text x="373" y="148" text-anchor="middle" font-size="12" fill="#0066cc">three years on</text>

    <!-- 2020: the body (4-6 sensors) -->
    <g transform="translate(560,96)">
      <!-- body silhouette -->
      <g fill="#0066cc" fill-opacity="0.14" stroke="#0066cc" stroke-width="2">
        <circle cx="40" cy="24" r="18"/>
        <path d="M16 50 q24 -14 48 0 l8 70 q-32 12 -64 0 z"/>
        <path d="M16 54 l-18 50 M64 54 l18 50"/>
        <path d="M28 120 l-8 64 M52 120 l8 64"/>
      </g>
      <!-- sensor dots -->
      <circle cx="56" cy="18" r="5" fill="#0066cc"/>
      <circle cx="6" cy="92" r="5" fill="#0066cc"/>
      <circle cx="20" cy="180" r="5" fill="#0066cc"/>
      <circle cx="62" cy="70" r="5" fill="#0066cc"/>
      <text x="40" y="222" text-anchor="middle" font-size="14" fill="#1a1d24" font-weight="600">2020 — the body</text>
      <text x="40" y="244" text-anchor="middle" font-size="12" fill="#5b616b">4-6 sensors at once</text>
      <text x="40" y="262" text-anchor="middle" font-size="11" fill="#7a808c">ear · wrist · finger · skin</text>
    </g>

    <text x="380" y="332" text-anchor="middle" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">Both theses are correct — just three years apart.</text>
  </g>
</svg>
