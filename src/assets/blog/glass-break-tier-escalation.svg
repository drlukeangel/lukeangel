<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-label="Two-tier escalation by signal certainty">
  <rect width="760" height="360" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Tier 1 trigger -->
  <g transform="translate(40,60)">
    <rect x="0" y="0" width="190" height="64" rx="10" fill="#fdfaf2" stroke="#7a808c" stroke-width="3"/>
    <text x="95" y="28" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#1a1d24">contact opens</text>
    <text x="95" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">ambiguous</text>
  </g>

  <!-- Tier 2 trigger -->
  <g transform="translate(40,230)">
    <rect x="0" y="0" width="190" height="64" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <text x="95" y="28" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#1a1d24">glass / vibration</text>
    <text x="95" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">unambiguous</text>
  </g>

  <!-- arrows -->
  <g stroke="#1a1d24" stroke-width="3" fill="none" stroke-opacity="0.55">
    <path d="M230 92 H300" marker-end="url(#gbarr)"/>
    <path d="M230 262 H300" marker-end="url(#gbarr)"/>
  </g>
  <defs>
    <marker id="gbarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1d24" fill-opacity="0.55"/>
    </marker>
  </defs>

  <!-- response icons: notify, light, siren -->
  <!-- notify (bell) -->
  <g transform="translate(330,40)">
    <path d="M12 4 a14 14 0 0 1 14 14 v12 l5 7 H-7 l5 -7 v-12 a14 14 0 0 1 14 -14 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M7 41 a6 6 0 0 0 12 0" fill="none" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <!-- light bulb -->
  <g transform="translate(430,42)">
    <circle cx="13" cy="16" r="15" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <rect x="6" y="30" width="14" height="10" rx="2" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <g stroke="#6a4c93" stroke-width="2.5" stroke-linecap="round">
      <line x1="-6" y1="6" x2="-13" y2="2"/><line x1="32" y1="6" x2="39" y2="2"/><line x1="13" y1="-4" x2="13" y2="-11"/>
    </g>
  </g>

  <!-- Tier 1 response box -->
  <g transform="translate(310,30)">
    <rect x="0" y="0" width="170" height="62" rx="10" fill="none" stroke="#7a808c" stroke-width="2" stroke-dasharray="5 4"/>
  </g>

  <!-- Tier 2 response box: notify + light + siren -->
  <g transform="translate(310,210)">
    <rect x="0" y="0" width="290" height="86" rx="10" fill="none" stroke="#c14a3a" stroke-width="2.5"/>
  </g>
  <g transform="translate(330,222)">
    <path d="M12 4 a14 14 0 0 1 14 14 v12 l5 7 H-7 l5 -7 v-12 a14 14 0 0 1 14 -14 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M7 41 a6 6 0 0 0 12 0" fill="none" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <g transform="translate(430,224)">
    <circle cx="13" cy="16" r="15" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <rect x="6" y="30" width="14" height="10" rx="2" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <g stroke="#6a4c93" stroke-width="2.5" stroke-linecap="round">
      <line x1="-6" y1="6" x2="-13" y2="2"/><line x1="32" y1="6" x2="39" y2="2"/><line x1="13" y1="-4" x2="13" y2="-11"/>
    </g>
  </g>
  <!-- siren (horn) -->
  <g transform="translate(528,226)">
    <path d="M0 12 h14 l24 -16 v44 l-24 -16 H0 z" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3" stroke-linejoin="round"/>
    <g stroke="#c14a3a" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M46 6 q12 14 0 28"/>
      <path d="M54 -4 q22 24 0 48"/>
    </g>
  </g>

  <text x="395" y="116" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">notify + scare-light</text>
  <text x="455" y="318" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">notify + light + siren · always</text>
</svg>
