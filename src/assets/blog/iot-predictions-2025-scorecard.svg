<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="2024 score sheet: glasses won, headsets and pins lost.">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">2024 SCORE SHEET — UNITS DECIDE THE WINNER</text>

  <!-- axis baseline -->
  <line x1="300" y1="470" x2="1080" y2="470" stroke="#1a1d24" stroke-width="2"/>
  <text x="300" y="498" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">0</text>
  <text x="690" y="498" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">1M</text>
  <text x="1080" y="498" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">2M+ annual run-rate</text>
  <line x1="690" y1="100" x2="690" y2="470" stroke="#1a1d24" stroke-dasharray="4 5" stroke-opacity="0.3"/>

  <g font-family="ui-monospace,monospace">
    <!-- Ray-Ban Meta — the winner, bar to 2M+ -->
    <text x="290" y="135" text-anchor="end" font-size="13" fill="#1a1d24">Ray-Ban Meta</text>
    <rect x="300" y="118" width="780" height="26" rx="4" fill="#0066cc"/>
    <text x="1070" y="136" text-anchor="end" font-size="12" fill="#fdfaf2">glasses · 2M+ · BREAKOUT</text>

    <!-- Galaxy Ring — sold well, small bar -->
    <text x="290" y="195" text-anchor="end" font-size="13" fill="#1a1d24">Galaxy Ring $399</text>
    <rect x="300" y="178" width="150" height="26" rx="4" fill="#0066cc" fill-opacity="0.55"/>
    <text x="462" y="196" font-size="11" fill="#3a7d44">sold well · priced right</text>

    <!-- Watch Series 10 — established line -->
    <text x="290" y="255" text-anchor="end" font-size="13" fill="#1a1d24">Watch Series 10</text>
    <rect x="300" y="238" width="540" height="26" rx="4" fill="#0066cc" fill-opacity="0.4"/>
    <text x="852" y="256" font-size="11" fill="#3a7d44">bigger display · no BP sensor</text>

    <!-- Vision Pro — under 500K -->
    <text x="290" y="315" text-anchor="end" font-size="13" fill="#1a1d24">Vision Pro $3,499</text>
    <rect x="300" y="298" width="190" height="26" rx="4" fill="#c14a3a" fill-opacity="0.8"/>
    <text x="502" y="316" font-size="11" fill="#c14a3a">headset · &lt;500K · bled Q1→Q4</text>

    <!-- AI Pin — destroyed -->
    <text x="290" y="375" text-anchor="end" font-size="13" fill="#1a1d24">Humane AI Pin</text>
    <rect x="300" y="358" width="70" height="26" rx="4" fill="#c14a3a"/>
    <text x="382" y="376" font-size="11" fill="#c14a3a">pin · panned · exploring sale</text>

    <!-- Rabbit R1 — panned -->
    <text x="290" y="435" text-anchor="end" font-size="13" fill="#1a1d24">Rabbit R1</text>
    <rect x="300" y="418" width="60" height="26" rx="4" fill="#c14a3a"/>
    <text x="372" y="436" font-size="11" fill="#c14a3a">AI device · LAM was scripts</text>
  </g>

  <text x="560" y="540" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">The flagship category-creators each sold under 500K. The quiet one sold 2M+. Glasses won.</text>
</svg>
