<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="cameras, a Coral box, and DIY sensors">
  <defs>
    <pattern id="dots21sh" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots21sh)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- central box (mini-PC) with an AI accelerator -->
  <g transform="translate(600,315)">
    <rect x="-80" y="-56" width="160" height="112" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <!-- Coral accelerator chip -->
    <rect x="-30" y="-20" width="60" height="40" rx="5" fill="#1a1d24"/>
    <g stroke="#6a4c93" stroke-width="2.5"><line x1="-30" y1="-8" x2="-40" y2="-8"/><line x1="-30" y1="8" x2="-40" y2="8"/><line x1="30" y1="-8" x2="40" y2="-8"/><line x1="30" y1="8" x2="40" y2="8"/></g>
    <circle cx="0" cy="0" r="8" fill="#6a4c93" fill-opacity="0.6"/>
    <circle cx="56" cy="-40" r="6" fill="#3a7d44"/>
  </g>

  <!-- a cluster of PoE cameras feeding the box -->
  <g>
    <!-- five small bullet cams arranged around the top -->
    <g transform="translate(300,150)"><rect x="-30" y="-16" width="52" height="32" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3"/><circle cx="-12" cy="0" r="9" fill="#1a1d24"/><circle cx="-12" cy="0" r="3" fill="#6a4c93"/></g>
    <g transform="translate(440,110)"><rect x="-30" y="-16" width="52" height="32" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3"/><circle cx="-12" cy="0" r="9" fill="#1a1d24"/><circle cx="-12" cy="0" r="3" fill="#6a4c93"/></g>
    <g transform="translate(600,96)"><rect x="-30" y="-16" width="52" height="32" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3"/><circle cx="-12" cy="0" r="9" fill="#1a1d24"/><circle cx="-12" cy="0" r="3" fill="#6a4c93"/></g>
    <g transform="translate(760,110)"><rect x="-30" y="-16" width="52" height="32" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3"/><circle cx="-12" cy="0" r="9" fill="#1a1d24"/><circle cx="-12" cy="0" r="3" fill="#6a4c93"/></g>
    <g transform="translate(900,150)"><rect x="-30" y="-16" width="52" height="32" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3"/><circle cx="-12" cy="0" r="9" fill="#1a1d24"/><circle cx="-12" cy="0" r="3" fill="#6a4c93"/></g>
    <!-- feed lines into the box -->
    <g stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2.5">
      <line x1="300" y1="166" x2="540" y2="280"/>
      <line x1="440" y1="126" x2="565" y2="270"/>
      <line x1="600" y1="112" x2="600" y2="259"/>
      <line x1="760" y1="126" x2="635" y2="270"/>
      <line x1="900" y1="166" x2="660" y2="280"/>
    </g>
  </g>

  <!-- a scatter of tiny DIY ESP sensor boards along the bottom -->
  <g transform="translate(0,470)" fill="#fff" stroke="#1a1d24" stroke-width="2.5">
    <g transform="translate(240,0)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(330,30)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(430,8)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(540,34)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(650,6)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(760,32)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(870,8)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
    <g transform="translate(960,30)"><rect x="-18" y="-12" width="36" height="24" rx="3"/><rect x="-10" y="-5" width="10" height="10" fill="#6a4c93" fill-opacity="0.3" stroke="none"/></g>
  </g>
</svg>
