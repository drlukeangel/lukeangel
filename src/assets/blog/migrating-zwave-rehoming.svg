<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Re-homing Z-Wave devices">
  <rect width="1000" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.5px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 14px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11.5px; fill: #5b616b; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <text x="40" y="40" class="h">RE-HOMING EACH Z-WAVE DEVICE — ONE BUTTON-PRESS DANCE PER SENSOR</text>

  <!-- BEFORE: device joined to ST hub -> cloud -->
  <g transform="translate(40,150)">
    <text x="0" y="-8" class="sub">BEFORE</text>
    <rect x="0" y="14" width="150" height="56" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="75" y="38" text-anchor="middle" class="lbl">SmartThings</text>
    <text x="75" y="56" text-anchor="middle" class="sub">hub (500-series)</text>
    <!-- cloud below the hub -->
    <line x1="75" y1="70" x2="75" y2="96" stroke="#c14a3a" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M40 130 a16 16 0 0 1 3 -31 a20 20 0 0 1 38 4 a13 13 0 0 1 -2 27 z" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
    <text x="62" y="120" text-anchor="middle" class="sub" fill="#c14a3a">cloud</text>
    <!-- sensor -->
    <rect x="0" y="-72" width="150" height="40" rx="6" fill="#fdfaf2" stroke="#7a808c" stroke-width="1.8"/>
    <text x="75" y="-47" text-anchor="middle" class="sub">door sensor (Z-Wave)</text>
    <line x1="75" y1="-32" x2="75" y2="14" stroke="#7a808c" stroke-width="2"/>
  </g>

  <!-- middle: the dance -->
  <g transform="translate(280,90)">
    <rect x="0" y="0" width="420" height="290" rx="10" fill="#6a4c93" fill-opacity="0.06" stroke="#6a4c93" stroke-width="1.8" stroke-dasharray="6 5"/>
    <text x="210" y="34" text-anchor="middle" class="lbl">the inclusion dance, per device</text>

    <!-- step 1 -->
    <g transform="translate(30,58)">
      <circle cx="14" cy="14" r="14" fill="#c14a3a" fill-opacity="0.14" stroke="#c14a3a" stroke-width="2"/>
      <text x="14" y="19" text-anchor="middle" class="sub" fill="#c14a3a">1</text>
      <text x="40" y="13" class="lbl">Exclude from SmartThings</text>
      <text x="40" y="32" class="sub">IDE → remove → press the sensor button</text>
    </g>
    <!-- step 2 -->
    <g transform="translate(30,128)">
      <circle cx="14" cy="14" r="14" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="2"/>
      <text x="14" y="19" text-anchor="middle" class="sub" fill="#6a4c93">2</text>
      <text x="40" y="13" class="lbl">Walk to the device</text>
      <text x="40" y="32" class="sub">basement, bulkhead, every wall switch</text>
    </g>
    <!-- step 3 -->
    <g transform="translate(30,198)">
      <circle cx="14" cy="14" r="14" fill="#3a7d44" fill-opacity="0.14" stroke="#3a7d44" stroke-width="2"/>
      <text x="14" y="19" text-anchor="middle" class="sub" fill="#3a7d44">3</text>
      <text x="40" y="13" class="lbl">Include on the Z-Stick</text>
      <text x="40" y="32" class="sub">HA Z-Wave UI → add node → press again</text>
    </g>
    <text x="210" y="270" text-anchor="middle" class="sub">× 8 devices ≈ 2 hours, one Saturday</text>
  </g>

  <!-- AFTER: device on Pi Z-Stick, local -->
  <g transform="translate(810,150)">
    <text x="0" y="-8" class="sub">AFTER</text>
    <rect x="0" y="14" width="150" height="56" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="75" y="38" text-anchor="middle" class="lbl">Pi + Z-Stick</text>
    <text x="75" y="56" text-anchor="middle" class="sub">Gen5, in the closet</text>
    <text x="75" y="108" text-anchor="middle" class="sub" fill="#3a7d44">stays local — no cloud</text>
    <!-- sensor -->
    <rect x="0" y="-72" width="150" height="40" rx="6" fill="#fdfaf2" stroke="#7a808c" stroke-width="1.8"/>
    <text x="75" y="-47" text-anchor="middle" class="sub">door sensor (Z-Wave)</text>
    <line x1="75" y1="-32" x2="75" y2="14" stroke="#3a7d44" stroke-width="2.4"/>
  </g>

  <text x="500" y="440" text-anchor="middle" class="cap">The 500-series chip is the same generation on both sides — the radio doesn't change, only which controller owns it.</text>
</svg>
