<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1a1d24" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#b7410e"/>

  <!-- left side: mesh of nodes radiating spokes inward -->
  <g stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <line x1="400" y1="315" x2="200" y2="160"/>
    <line x1="400" y1="315" x2="150" y2="290"/>
    <line x1="400" y1="315" x2="180" y2="420"/>
    <line x1="400" y1="315" x2="280" y2="510"/>
    <line x1="400" y1="315" x2="420" y2="510"/>
    <line x1="400" y1="315" x2="280" y2="170"/>
    <line x1="400" y1="315" x2="420" y2="180"/>
    <line x1="400" y1="315" x2="510" y2="270"/>
    <line x1="400" y1="315" x2="510" y2="370"/>
  </g>

  <!-- left leaves -->
  <g fill="#1a1d24">
    <circle cx="200" cy="160" r="14"/>
    <circle cx="150" cy="290" r="14"/>
    <circle cx="180" cy="420" r="14"/>
    <circle cx="280" cy="510" r="14"/>
    <circle cx="420" cy="510" r="14"/>
    <circle cx="280" cy="170" r="14"/>
    <circle cx="420" cy="180" r="14"/>
  </g>

  <!-- left hub -->
  <circle cx="400" cy="315" r="34" fill="#b7410e"/>
  <circle cx="400" cy="315" r="34" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="400" cy="315" r="15" fill="#fdfaf2" fill-opacity="0.85"/>

  <!-- bridge arrow / handoff: dashed line + a small accent-colored chevron -->
  <g stroke="#b7410e" stroke-opacity="0.6" stroke-width="3" fill="none">
    <line x1="510" y1="270" x2="800" y2="270" stroke-dasharray="8 6"/>
    <line x1="510" y1="370" x2="800" y2="370" stroke-dasharray="8 6"/>
  </g>

  <!-- chevron arrowheads pointing right (handoff direction) -->
  <g fill="#b7410e">
    <polygon points="800,260 822,270 800,280"/>
    <polygon points="800,360 822,370 800,380"/>
  </g>

  <!-- right side: stylized open-source seal — a circular medallion with a small ribbon tail -->
  <!-- outer medallion ring -->
  <circle cx="930" cy="315" r="118" fill="#fdfaf2"/>
  <circle cx="930" cy="315" r="118" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <!-- inner accent ring -->
  <circle cx="930" cy="315" r="92" fill="none" stroke="#b7410e" stroke-width="4"/>

  <!-- a stylized check mark inside, drawn as paths -->
  <path d="M 880 320 L 920 360 L 985 280" fill="none"
        stroke="#1a1d24" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ribbon tails dropping below the medallion -->
  <path d="M 895 410 L 895 500 L 920 480 L 945 500 L 945 410 Z"
        fill="#b7410e" stroke="#1a1d24" stroke-width="2" stroke-linejoin="round"/>
</svg>
