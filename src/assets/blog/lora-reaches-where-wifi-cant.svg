<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="radio reach across the yard">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">40 METRES + A FENCE: ONLY ONE RADIO REACHES</text>

  <!-- house (left) -->
  <g transform="translate(120,250)">
    <rect x="-50" y="-40" width="100" height="80" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <path d="M-50 -40 L0 -80 L50 -40 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <text x="0" y="64" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">house + gateway</text>
  </g>

  <!-- fence (middle) -->
  <g transform="translate(530,250)" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5">
    <line x1="0" y1="-50" x2="0" y2="40"/>
    <line x1="-14" y1="-50" x2="-14" y2="40"/>
    <line x1="14" y1="-50" x2="14" y2="40"/>
  </g>
  <text x="530" y="320" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">6-ft fence</text>

  <!-- garden (right) -->
  <g transform="translate(880,250)">
    <rect x="-44" y="0" width="88" height="36" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="3"/>
    <g stroke="#3a7d44" stroke-width="3" fill="none" stroke-linecap="round"><path d="M-24 0 q-4 -18 0 -28"/><path d="M0 0 q-4 -20 0 -30"/><path d="M24 0 q-4 -18 0 -26"/></g>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">garden + soil probe</text>
  </g>

  <!-- three reach lines -->
  <!-- WiFi: dies before the fence -->
  <g>
    <line x1="170" y1="200" x2="430" y2="200" stroke="#c14a3a" stroke-width="3" stroke-dasharray="6 5"/>
    <path d="M430 200 l-2 -8 l-8 4 Z" fill="#c14a3a"/>
    <text x="300" y="190" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">Wi-Fi &#183; &lt; -85 dBm, dies in the yard</text>
  </g>
  <!-- Zigbee: dies even sooner -->
  <g>
    <line x1="170" y1="230" x2="360" y2="230" stroke="#c14a3a" stroke-width="3" stroke-dasharray="6 5" stroke-opacity="0.7"/>
    <path d="M360 230 l-2 -8 l-8 4 Z" fill="#c14a3a" fill-opacity="0.7"/>
    <text x="265" y="248" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">Zigbee 2.4 GHz &#183; doesn't clear the fence</text>
  </g>
  <!-- LoRa: reaches all the way -->
  <g>
    <line x1="170" y1="150" x2="838" y2="150" stroke="#3a7d44" stroke-width="3.5"/>
    <path d="M838 150 l-2 -9 l-9 4 Z" fill="#3a7d44"/>
    <text x="500" y="140" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#3a7d44">LoRa 915 MHz &#183; reaches with margin</text>
  </g>

  <text x="40" y="408" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">The trade is throughput &#8212; but a moisture reading every 30 minutes barely needs any.</text>
</svg>
