<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440" role="img" aria-label="Step cache hit-or-miss decision.">
  <rect width="960" height="440" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="60" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="1" fill="#7a808c">STEP CACHE — hit or miss</text>

  <!-- incoming step -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <rect x="60" y="88" width="220" height="96" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="170" y="124" fill="#1a1d24">a pipeline step</text>
    <text x="170" y="148" fill="#5b616b">prep · 18 min</text>
    <text x="170" y="170" fill="#5b616b">to run</text>
  </g>

  <!-- key built from inputs + config -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" text-anchor="middle">
    <rect x="340" y="80" width="240" height="112" rx="11" fill="#4f46b8" fill-opacity="0.08" stroke="#4f46b8" stroke-width="2.5" stroke-dasharray="7 6"/>
    <text x="460" y="108" font-size="13" fill="#4f46b8">cache key =</text>
    <text x="460" y="134" fill="#1a1d24">input artifacts (S3)</text>
    <text x="460" y="156" fill="#1a1d24">+ step config</text>
    <text x="460" y="178" fill="#1a1d24">+ image / args</text>
  </g>
  <line x1="280" y1="136" x2="334" y2="136" stroke="#1a1d24" stroke-width="3"/>
  <path d="M340 136 l-16 -7 v14 z" fill="#1a1d24"/>

  <!-- decision diamond -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" text-anchor="middle">
    <path d="M740 136 L800 96 L860 136 L800 176 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="800" y="132" fill="#1a1d24">key</text>
    <text x="800" y="150" fill="#1a1d24">seen?</text>
  </g>
  <line x1="580" y1="136" x2="734" y2="136" stroke="#1a1d24" stroke-width="3"/>
  <path d="M740 136 l-16 -7 v14 z" fill="#1a1d24"/>

  <!-- HIT branch (down-left), skip -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <path d="M800 176 L800 248 L360 248 L360 288" stroke="#3a7d44" stroke-width="3" fill="none"/>
    <path d="M360 294 l-7 -16 h14 z" fill="#3a7d44"/>
    <text x="690" y="240" fill="#3a7d44">hit · reuse</text>
    <rect x="200" y="300" width="320" height="76" rx="11" fill="#3a7d44" fill-opacity="0.10" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="360" y="334" fill="#1a1d24" font-weight="bold">skip — reuse cached output</text>
    <text x="360" y="358" fill="#5b616b">~0 min · the 3x speedup</text>
  </g>

  <!-- MISS branch (down-right), run -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <path d="M860 136 L900 136 L900 300" stroke="#c14a3a" stroke-width="3" fill="none"/>
    <path d="M900 306 l-7 -16 h14 z" fill="#c14a3a"/>
    <text x="900" y="220" fill="#c14a3a" font-size="12">miss</text>
    <rect x="580" y="312" width="290" height="76" rx="11" fill="#c14a3a" fill-opacity="0.10" stroke="#c14a3a" stroke-width="2.5"/>
    <text x="725" y="346" fill="#1a1d24" font-weight="bold">run the step</text>
    <text x="725" y="370" fill="#5b616b">input or code changed</text>
  </g>

  <text x="60" y="416" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#5b616b">Same inputs and same code means the same key — so the slow step runs once and is skipped after.</text>
</svg>
