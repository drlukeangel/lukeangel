<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" width="1080" height="360" role="img" aria-label="Three 2018 moves — a brain, a nervous system, and a local radio — assembling the local-first house.">
  <rect width="1080" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE MOVES, ALL ONE DIRECTION</text>

  <!-- three pieces, each a card, all feeding a local house on the right -->
  <!-- 1: Node-RED brain -->
  <g transform="translate(60,78)">
    <rect x="0" y="0" width="240" height="62" rx="12" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="2.6"/>
    <g transform="translate(22,20)" fill="#6a4c93"><circle cx="0" cy="11" r="6"/><circle cx="26" cy="22" r="6"/><circle cx="52" cy="11" r="6"/></g>
    <g transform="translate(22,20)" stroke="#6a4c93" stroke-width="2.2" fill="none"><path d="M0 11 L26 22"/><path d="M26 22 L52 11"/></g>
    <text x="140" y="30" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">Node-RED</text>
    <text x="140" y="47" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">the brain (Feb)</text>
  </g>
  <!-- 2: MQTT nervous system -->
  <g transform="translate(60,154)">
    <rect x="0" y="0" width="240" height="62" rx="12" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="2.6"/>
    <g transform="translate(22,18)"><line x1="0" y1="18" x2="64" y2="18" stroke="#1a1d24" stroke-width="3"/><g fill="#6a4c93"><circle cx="10" cy="6" r="5"/><circle cx="34" cy="6" r="5"/><circle cx="56" cy="30" r="5"/></g></g>
    <text x="140" y="30" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">MQTT bus</text>
    <text x="140" y="47" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">nervous system (Feb)</text>
  </g>
  <!-- 3: ConBee radio -->
  <g transform="translate(60,230)">
    <rect x="0" y="0" width="240" height="62" rx="12" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="2.6"/>
    <g transform="translate(22,20)"><rect x="0" y="0" width="48" height="20" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/><g stroke="#6a4c93" stroke-width="2.2" fill="none"><path d="M56 10 a11 11 0 0 1 0 0"/><path d="M60 1 a15 15 0 0 1 0 18"/></g></g>
    <text x="150" y="30" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">ConBee</text>
    <text x="150" y="47" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">local radio (Oct)</text>
  </g>

  <!-- arrows converging on the house -->
  <g stroke="#6a4c93" stroke-width="3" fill="#6a4c93">
    <path d="M300 109 C430 109, 500 175, 610 188" fill="none"/>
    <path d="M300 261 C430 261, 500 195, 610 190" fill="none"/>
    <path d="M300 185 H610" fill="none"/>
    <path d="M614 185 l-15 -7 v14 z"/>
  </g>

  <!-- the local-first house -->
  <g transform="translate(650,108)">
    <path d="M30 84 L130 30 L230 84 L230 188 L30 188 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <path d="M30 84 L130 30 L230 84" fill="none" stroke="#6a4c93" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="130" cy="140" r="10" fill="#3a7d44"/>
    <text x="130" y="212" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">~80% server-independent</text>
  </g>

  <text x="540" y="344" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">A brain, a nervous system, and a radio it owns — all pulling the house off the cloud.</text>
</svg>
