<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="An agent orchestration loop inside a managed boundary.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="bg-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
    <marker id="cv-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1d24"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- managed boundary: dashed rounded box wrapping the whole loop -->
  <rect x="170" y="120" width="690" height="400" rx="30" fill="none"
        stroke="#4f46b8" stroke-width="3" stroke-dasharray="13 11" opacity="0.8"/>

  <!-- the orchestration loop: a large dashed cycle with directional arrows -->
  <g fill="none" stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round" opacity="0.9">
    <!-- top arc: model -> tool -->
    <path d="M455 250 C 540 200, 660 200, 745 250" marker-end="url(#cv-arrow)"/>
    <!-- bottom arc: tool -> model (observation) -->
    <path d="M745 415 C 660 465, 540 465, 455 415" marker-end="url(#cv-arrow)"/>
  </g>

  <!-- model node (left of loop): a small neural-net graph in a rounded slab -->
  <g transform="translate(390,332)">
    <rect x="-72" y="-66" width="144" height="132" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <g stroke="#4f46b8" fill="#4f46b8">
      <circle cx="-34" cy="-30" r="5"/><circle cx="-34" cy="6" r="5"/><circle cx="-34" cy="40" r="5"/>
      <circle cx="2" cy="-12" r="5"/><circle cx="2" cy="24" r="5"/>
      <circle cx="38" cy="6" r="5"/>
      <g stroke-width="2.4" fill="none" opacity="0.85">
        <line x1="-34" y1="-30" x2="2" y2="-12"/><line x1="-34" y1="6" x2="2" y2="-12"/>
        <line x1="-34" y1="6" x2="2" y2="24"/><line x1="-34" y1="40" x2="2" y2="24"/>
        <line x1="2" y1="-12" x2="38" y2="6"/><line x1="2" y1="24" x2="38" y2="6"/>
      </g>
    </g>
  </g>

  <!-- tool / action-group node (right of loop): stacked function blocks -->
  <g transform="translate(740,332)">
    <rect x="-30" y="-78" width="148" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="-30" y="-22" width="148" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="-30" y="34"  width="148" height="48" rx="10" fill="#4f46b8" stroke="#4f46b8"/>
    <!-- little gear-ish dots on each block to read as 'functions' -->
    <g fill="#4f46b8">
      <circle cx="-6" cy="-54" r="5"/><circle cx="-6" cy="2" r="5"/>
    </g>
    <g fill="#fdfaf2"><circle cx="-6" cy="58" r="5"/></g>
  </g>

  <!-- knowledge base feeding from the side: a stacked-disk cylinder, outside-the-loop edge -->
  <g transform="translate(700,150)">
    <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="5">
      <path d="M0 6 a40 13 0 0 0 80 0 v40 a40 13 0 0 1 -80 0 z"/>
      <ellipse cx="40" cy="6" rx="40" ry="13"/>
    </g>
    <path d="M0 26 a40 13 0 0 0 80 0" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.5"/>
    <!-- arrow from KB into the model node region -->
    <path d="M40 60 C 30 110, -10 150, -260 200" fill="none" stroke="#4f46b8" stroke-width="3" stroke-dasharray="9 8" marker-end="url(#cv-arrow)" opacity="0.85"/>
  </g>

  <!-- goal entering at top-left into the loop -->
  <g transform="translate(220,250)">
    <circle cx="0" cy="0" r="14" fill="#4f46b8"/>
    <path d="M14 0 C 90 -10, 130 30, 160 60" fill="none" stroke="#1a1d24" stroke-width="3.5" marker-end="url(#cv-arrow)" opacity="0.9"/>
  </g>

  <!-- answer leaving at bottom toward the right, outside the boundary -->
  <g transform="translate(820,470)">
    <path d="M-10 -50 C 60 -10, 120 30, 180 30" fill="none" stroke="#1a1d24" stroke-width="3.5" marker-end="url(#cv-arrow)" opacity="0.9"/>
    <circle cx="195" cy="30" r="14" fill="none" stroke="#3a7d44" stroke-width="5"/>
    <path d="M188 30 l5 6 l9 -12" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
