<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="ba-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#ba-dots)"/>
  <rect x="0" y="0" width="20" height="630" fill="#1a1d24"/>
  <text x="80" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#7a808c">FIRST IMPRESSIONS — JUL 2024</text>
  <text x="1120" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#2a52be" text-anchor="end">GA</text>
  <line x1="80" y1="118" x2="1120" y2="118" stroke="#1a1d24" stroke-width="1"/>

  <g transform="translate(820, 165)" stroke="#1a1d24" stroke-width="2" fill="none">
    <rect x="0"   y="0" width="78" height="50" rx="4"/>
    <text x="39" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24" stroke="none">model</text>
    <line x1="78" y1="25" x2="100" y2="25" marker-end="url(#ba-arrow)"/>
    <rect x="100" y="0" width="78" height="50" rx="4"/>
    <text x="139" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24" stroke="none">tools</text>
    <line x1="178" y1="25" x2="200" y2="25" marker-end="url(#ba-arrow)"/>
    <rect x="200" y="0" width="78" height="50" rx="4" fill="#2a52be" stroke="#2a52be"/>
    <text x="239" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#fdfaf2" stroke="none">action</text>
    <defs>
      <marker id="ba-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#1a1d24"/>
      </marker>
    </defs>
  </g>

  <text x="80" y="290" font-family="Newsreader, serif" font-weight="500" font-size="74" fill="#1a1d24">Bedrock Agents</text>
  <text x="80" y="368" font-family="Newsreader, serif" font-style="italic" font-weight="400" font-size="50" fill="#2a52be">just GA'd —</text>
  <text x="80" y="426" font-family="Newsreader, serif" font-style="italic" font-size="32" fill="#7a808c">the parts of it I'd actually use.</text>

  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1a1d24" stroke-width="1"/>
  <text x="80" y="540" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">L. ANGEL — AWS AI</text>
