<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 380" width="1080" height="380" role="img" aria-label="A Zigbee mesh: mains-powered devices route for battery sensors back to the coordinator.">
  <rect width="1080" height="380" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE MESH HEALS ITSELF — IF YOU GIVE IT ROUTERS</text>

  <!-- coordinator (the ConBee) far left -->
  <g transform="translate(80,170)">
    <rect x="0" y="-22" width="96" height="44" rx="8" fill="#6a4c93" fill-opacity="0.16" stroke="#1a1d24" stroke-width="3"/>
    <text x="48" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">ConBee</text>
    <text x="48" y="44" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">coordinator</text>
  </g>

  <!-- mains-powered routers (filled), the backbone -->
  <g fill="#6a4c93">
    <circle cx="330" cy="130" r="18"/>
    <circle cx="330" cy="250" r="18"/>
    <circle cx="600" cy="190" r="18"/>
  </g>
  <g font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c" text-anchor="middle">
    <text x="330" y="98">bulb (router)</text>
    <text x="330" y="288">plug (router)</text>
    <text x="600" y="158">bulb (router)</text>
  </g>

  <!-- battery leaves (hollow), at the edges -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3">
    <circle cx="840" cy="120" r="13"/>
    <circle cx="880" cy="250" r="13"/>
    <circle cx="600" cy="320" r="13"/>
  </g>
  <g font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c" text-anchor="middle">
    <text x="840" y="96">sensor</text>
    <text x="900" y="276">sensor</text>
    <text x="600" y="346">sensor</text>
  </g>

  <!-- mesh links: coordinator -> routers -> leaves -->
  <g stroke="#6a4c93" stroke-width="2.6" fill="none">
    <path d="M176 160 L312 134"/>
    <path d="M176 180 L312 246"/>
    <path d="M348 130 L582 186"/>
    <path d="M348 250 L584 196"/>
    <path d="M618 190 L827 124"/>
    <path d="M618 195 L867 246"/>
    <path d="M600 208 L600 307"/>
  </g>

  <!-- a battery leaf hops THROUGH a router (highlighted path) -->
  <g stroke="#3a7d44" stroke-width="3" fill="none" stroke-dasharray="2 6">
    <path d="M827 124 L618 190"/>
    <path d="M600 190 L176 165"/>
  </g>
  <text x="540" y="368" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">A sensor's data hops router-to-router back to the coordinator — give the mesh mains-powered devices to lean on.</text>
</svg>
