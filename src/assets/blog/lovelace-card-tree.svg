<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" role="img" aria-label="Lovelace card tree">
  <rect width="880" height="440" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
  </style>

  <!-- connectors first (behind) -->
  <g stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2" fill="none">
    <path d="M440 78 L160 140"/>
    <path d="M440 78 L440 140"/>
    <path d="M440 78 L720 140"/>
    <!-- view -> cards -->
    <path d="M160 178 L130 250"/>
    <path d="M160 178 L250 250"/>
    <path d="M440 178 L440 250"/>
    <path d="M720 178 L720 250"/>
    <!-- cards -> entities -->
    <path d="M130 288 L130 350"/>
    <path d="M250 288 L250 350"/>
    <path d="M440 288 L440 350"/>
    <path d="M720 288 L720 350"/>
  </g>

  <!-- dashboard root -->
  <g transform="translate(440 58)">
    <rect x="-70" y="-22" width="140" height="40" rx="8" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.5"/>
    <text class="lbl" x="-50" y="4">dashboard</text>
  </g>

  <!-- views row -->
  <g>
    <g transform="translate(160 158)"><rect x="-62" y="-20" width="124" height="38" rx="7" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2"/><text class="lbl" x="-44" y="5">Overview</text></g>
    <g transform="translate(440 158)"><rect x="-62" y="-20" width="124" height="38" rx="7" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2"/><text class="lbl" x="-44" y="5">Security</text></g>
    <g transform="translate(720 158)"><rect x="-50" y="-20" width="100" height="38" rx="7" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2"/><text class="lbl" x="-30" y="5">Lights</text></g>
  </g>
  <text class="mut" x="40" y="158">views</text>

  <!-- cards row -->
  <g>
    <g transform="translate(130 269)"><rect x="-56" y="-19" width="112" height="38" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.4"/><text class="mut" x="-42" y="4">who's home</text></g>
    <g transform="translate(250 269)"><rect x="-46" y="-19" width="92" height="38" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.4"/><text class="mut" x="-32" y="4">climate</text></g>
    <g transform="translate(440 269)"><rect x="-52" y="-19" width="104" height="38" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.4"/><text class="mut" x="-38" y="4">doors list</text></g>
    <g transform="translate(720 269)"><rect x="-60" y="-19" width="120" height="38" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.4"/><text class="mut" x="-48" y="4">goodnight btn</text></g>
  </g>

  <!-- entities row -->
  <g fill="#3a7d44">
    <circle cx="130" cy="368" r="7"/>
    <circle cx="250" cy="368" r="7"/>
    <circle cx="440" cy="368" r="7"/>
    <circle cx="720" cy="368" r="7"/>
  </g>
  <text class="mut" x="64" y="416">device_tracker · sensor · binary_sensor · script</text>
</svg>
