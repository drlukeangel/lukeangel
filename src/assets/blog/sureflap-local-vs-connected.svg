<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" width="940" height="520" role="img" aria-label="Local device versus connected IoT.">
  <rect x="1" y="1" width="938" height="518" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#5b616b;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;font-weight:600;}
  </style>

  <!-- divider down the middle -->
  <line x1="470" y1="40" x2="470" y2="480" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.18"/>

  <!-- ============ LEFT: the SureFlap door — a closed island ============ -->
  <text x="235" y="56" text-anchor="middle" class="hd" font-size="18">this door — a local island</text>

  <!-- boundary box: the door frame -->
  <rect x="48" y="80" width="374" height="320" rx="14" fill="none" stroke="#c87533" stroke-width="2.5"/>
  <text x="64" y="104" class="mut" font-size="14">the door frame — the boundary</text>

  <!-- the sense -> decide -> act core as a tight loop -->
  <g transform="translate(235,200)">
    <!-- sense -->
    <g transform="translate(0,-66)">
      <rect x="-78" y="-26" width="156" height="52" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-3" text-anchor="middle" class="lbl" font-size="15" font-weight="600">sense</text>
      <text x="0" y="15" text-anchor="middle" class="mut" font-size="13">read the chip</text>
    </g>
    <!-- decide -->
    <g transform="translate(96,52)">
      <rect x="-72" y="-26" width="144" height="52" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-3" text-anchor="middle" class="lbl" font-size="15" font-weight="600">decide</text>
      <text x="0" y="15" text-anchor="middle" class="mut" font-size="13">on the list?</text>
    </g>
    <!-- act -->
    <g transform="translate(-96,52)">
      <rect x="-72" y="-26" width="144" height="52" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-3" text-anchor="middle" class="lbl" font-size="15" font-weight="600">act</text>
      <text x="0" y="15" text-anchor="middle" class="mut" font-size="13">latch / hold</text>
    </g>
    <!-- the three loop arrows -->
    <g fill="none" stroke="#1a1d24" stroke-width="2.5">
      <path d="M58 -52 C 96 -36 110 -8 102 20" marker-end="url(#al)"/>
      <path d="M24 78 L -24 78" marker-end="url(#al)"/>
      <path d="M-102 20 C -110 -8 -96 -36 -58 -52" marker-end="url(#al)"/>
    </g>
  </g>

  <!-- the wall: nothing crosses -->
  <g transform="translate(235,360)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#c14a3a" stroke-width="3"/>
    <!-- a blocked arrow trying to leave -->
    <path d="M0 -22 L0 -4" fill="none" stroke="#c14a3a" stroke-width="3" marker-end="url(#alr)"/>
    <line x1="-14" y1="-9" x2="14" y2="9" stroke="#c14a3a" stroke-width="3"/>
    <text x="0" y="22" text-anchor="middle" class="mut" font-size="13" fill="#c14a3a">nothing crosses — no record, no network</text>
  </g>

  <!-- ============ RIGHT: a connected device ============ -->
  <text x="705" y="56" text-anchor="middle" class="hd" font-size="18">a connected device — the contrast</text>

  <!-- boundary box: the device -->
  <rect x="518" y="80" width="220" height="240" rx="14" fill="none" stroke="#2a52be" stroke-width="2.5"/>
  <text x="534" y="104" class="mut" font-size="14">same core …</text>

  <g transform="translate(628,200)">
    <g transform="translate(0,-66)">
      <rect x="-78" y="-26" width="156" height="52" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-3" text-anchor="middle" class="lbl" font-size="15" font-weight="600">sense</text>
      <text x="0" y="15" text-anchor="middle" class="mut" font-size="13">read the chip</text>
    </g>
    <g transform="translate(0,52)">
      <rect x="-78" y="-26" width="156" height="52" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-3" text-anchor="middle" class="lbl" font-size="15" font-weight="600">decide + act</text>
      <text x="0" y="15" text-anchor="middle" class="mut" font-size="13">latch / hold</text>
    </g>
    <path d="M0 -40 L0 24" fill="none" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#al)"/>
  </g>

  <!-- an arrow leaving across the network boundary -->
  <path d="M628 268 L628 318" fill="none" stroke="#2a52be" stroke-width="2.5" marker-end="url(#alb)"/>
  <text x="648" y="298" class="mut" font-size="13" fill="#2a52be">+ report</text>

  <!-- cloud -->
  <g transform="translate(628,372)">
    <path d="M-46 14 a26 26 0 0 1 6 -51 a30 30 0 0 1 57 -6 a24 24 0 0 1 9 47 a20 20 0 0 1 -4 16 Z"
          fill="#fff" stroke="#2a52be" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="6" y="6" text-anchor="middle" class="lbl" font-size="13" font-weight="600" fill="#2a52be">cloud</text>
  </g>

  <!-- phone + accumulating history -->
  <g transform="translate(840,372)">
    <rect x="-30" y="-44" width="60" height="92" rx="10" fill="#fff" stroke="#2a52be" stroke-width="2.5"/>
    <line x1="-30" y1="-28" x2="30" y2="-28" stroke="#2a52be" stroke-width="1.5" opacity="0.4"/>
    <!-- a little rising history of bars on the screen -->
    <g fill="#2a52be" opacity="0.8">
      <rect x="-20" y="20" width="8" height="14" rx="2"/>
      <rect x="-8" y="10" width="8" height="24" rx="2"/>
      <rect x="4" y="2" width="8" height="32" rx="2"/>
      <rect x="16" y="14" width="8" height="20" rx="2"/>
    </g>
    <text x="0" y="-12" text-anchor="middle" class="mut" font-size="11">history</text>
  </g>

  <!-- arrows cloud<->phone -->
  <path d="M676 372 L808 372" fill="none" stroke="#2a52be" stroke-width="2.5" marker-end="url(#alb)"/>

  <!-- bottom caption spanning width -->
  <text x="470" y="500" text-anchor="middle" class="cap" font-size="15">both share the sense–decide–act core; only the right adds the network, the other side, and data that outlives the moment</text>

  <defs>
    <marker id="al" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1d24"/>
    </marker>
    <marker id="alb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2a52be"/>
    </marker>
    <marker id="alr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c14a3a"/>
    </marker>
  </defs>
</svg>
