<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2021 pet-tech in review">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- LEFT: dog collar arc carrying a GPS puck (location, the daily driver) -->
  <g transform="translate(250,300)">
    <path d="M -120 70 Q 0 -110 120 70" fill="none" stroke="#1a1d24" stroke-width="13" stroke-linecap="round"/>
    <path d="M -120 70 Q 0 -110 120 70" fill="none" stroke="#c87533" stroke-width="4" stroke-linecap="round" stroke-opacity="0.5"/>
    <!-- GPS puck -->
    <g transform="translate(0,5)">
      <circle cx="0" cy="0" r="42" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#c87533" stroke-width="3"/>
      <circle cx="0" cy="0" r="7" fill="#c87533"/>
      <!-- little GPS crosshair fix above -->
    </g>
    <g transform="translate(0,-150)" stroke="#c87533" stroke-width="3.5" fill="none" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-14" y1="0" x2="14" y2="0"/>
      <circle cx="0" cy="0" r="9"/>
    </g>
    <line x1="0" y1="-128" x2="0" y2="-42" stroke="#c87533" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round"/>
  </g>

  <!-- CENTER: AirTag disc, set apart and crossed out (the hyped device that left) -->
  <g transform="translate(600,330)">
    <circle cx="0" cy="0" r="58" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#7a808c" stroke-width="3"/>
    <!-- beep waves -->
    <g transform="translate(64,-44)" stroke="#c14a3a" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M 0 14 Q 16 -2 32 14"/>
      <path d="M 8 22 Q 16 12 24 22" stroke-opacity="0.6"/>
    </g>
    <!-- cross-out -->
    <line x1="-52" y1="52" x2="52" y2="-52" stroke="#c14a3a" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- RIGHT: behavioral health — sparkline rising over three signal icons -->
  <g transform="translate(900,300)">
    <!-- sparkline -->
    <polyline points="-70,40 -45,20 -20,28 5,-6 30,4 55,-26 75,-44" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="75" cy="-44" r="6" fill="#c87533"/>
    <!-- three behavior icons below: a drop (licking/drinking), a scratch (paw lines), a moon (sleep) -->
    <g transform="translate(-70,90)" stroke="#1a1d24" stroke-width="3.5" fill="none">
      <path d="M 0 -12 C 9 0 9 12 0 12 C -9 12 -9 0 0 -12 Z" fill="#fdfaf2"/>
    </g>
    <g transform="translate(0,90)" stroke="#1a1d24" stroke-width="3.5" fill="none" stroke-linecap="round">
      <line x1="-10" y1="-12" x2="-6" y2="12"/>
      <line x1="0" y1="-14" x2="0" y2="12"/>
      <line x1="10" y1="-12" x2="6" y2="12"/>
    </g>
    <g transform="translate(70,90)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5">
      <path d="M 10 -13 A 15 15 0 1 0 12 16 A 12 12 0 1 1 10 -13 Z"/>
    </g>
  </g>
</svg>
