<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t d">
  <title id="t">Containers vs VMs — same host, very different resource overhead</title>
  <desc id="d">2016-era flat side-by-side: left stack shows three VMs each with their own OS kernel on a hypervisor; right stack shows three containers sharing the host kernel via Docker engine. Annotations show why containers boot in seconds and use far less memory.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .head{font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:600;fill:#1a1d24}
    .layer{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#fff}
  </style>
  <rect width="800" height="400" fill="#f5f7fa"/>
  <text x="400" y="38" text-anchor="middle" class="title">Containers vs VMs — what's actually different at runtime</text>

  <!-- LEFT: VM stack -->
  <text x="40" y="78" class="head">Virtual machines (heavyweight)</text>
  <g transform="translate(40,90)">
    <!-- 3 VMs -->
    <g transform="translate(0,0)">
      <rect width="100" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="50" y="24" text-anchor="middle" class="small">App A</text>
      <rect y="40" width="100" height="40" fill="#cfe0f5" stroke="#0066cc"/>
      <text x="50" y="64" text-anchor="middle" class="small">guest OS</text>
    </g>
    <g transform="translate(110,0)">
      <rect width="100" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="50" y="24" text-anchor="middle" class="small">App B</text>
      <rect y="40" width="100" height="40" fill="#cfe0f5" stroke="#0066cc"/>
      <text x="50" y="64" text-anchor="middle" class="small">guest OS</text>
    </g>
    <g transform="translate(220,0)">
      <rect width="100" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="50" y="24" text-anchor="middle" class="small">App C</text>
      <rect y="40" width="100" height="40" fill="#cfe0f5" stroke="#0066cc"/>
      <text x="50" y="64" text-anchor="middle" class="small">guest OS</text>
    </g>
    <!-- hypervisor -->
    <rect y="90" width="320" height="40" fill="#0066cc" rx="2"/>
    <text x="160" y="114" text-anchor="middle" class="layer">Hypervisor (VMware / KVM / Hyper-V)</text>
    <!-- host OS -->
    <rect y="140" width="320" height="40" fill="#1a1d24" rx="2"/>
    <text x="160" y="164" text-anchor="middle" class="layer">Host OS</text>
    <!-- hardware -->
    <rect y="190" width="320" height="30" fill="#5a6470" rx="2"/>
    <text x="160" y="210" text-anchor="middle" class="layer" font-size="10">Hardware</text>
  </g>

  <text x="40" y="330" class="small">- each VM carries a full guest OS (~ 200-500 MB)</text>
  <text x="40" y="346" class="small">- boot time: 30-120 seconds</text>
  <text x="40" y="362" class="small">- isolation: complete (separate kernel)</text>

  <!-- RIGHT: Container stack -->
  <text x="440" y="78" class="head" fill="#10a37f">Containers (lightweight)</text>
  <g transform="translate(440,90)">
    <!-- 3 containers -->
    <g transform="translate(0,0)">
      <rect width="100" height="60" fill="#d1fae5" stroke="#10a37f"/>
      <text x="50" y="36" text-anchor="middle" class="small">App A</text>
    </g>
    <g transform="translate(110,0)">
      <rect width="100" height="60" fill="#d1fae5" stroke="#10a37f"/>
      <text x="50" y="36" text-anchor="middle" class="small">App B</text>
    </g>
    <g transform="translate(220,0)">
      <rect width="100" height="60" fill="#d1fae5" stroke="#10a37f"/>
      <text x="50" y="36" text-anchor="middle" class="small">App C</text>
    </g>
    <!-- docker engine -->
    <rect y="70" width="320" height="40" fill="#10a37f" rx="2"/>
    <text x="160" y="94" text-anchor="middle" class="layer">Docker engine</text>
    <!-- host OS shared -->
    <rect y="120" width="320" height="40" fill="#1a1d24" rx="2"/>
    <text x="160" y="144" text-anchor="middle" class="layer">Host OS — kernel shared by all containers</text>
    <!-- hardware -->
    <rect y="170" width="320" height="30" fill="#5a6470" rx="2"/>
    <text x="160" y="190" text-anchor="middle" class="layer" font-size="10">Hardware</text>
  </g>

  <text x="440" y="330" class="small" fill="#10a37f">- containers share the host kernel — no guest OS overhead</text>
  <text x="440" y="346" class="small" fill="#10a37f">- boot time: under 1 second</text>
  <text x="440" y="362" class="small" fill="#10a37f">- isolation: process-level (cgroups + namespaces)</text>
</svg>
