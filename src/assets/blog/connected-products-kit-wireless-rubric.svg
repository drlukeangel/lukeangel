<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" width="1120" height="460" role="img" aria-label="Five-question wireless rubric narrowing to a radio choice">
  <rect width="1120" height="460" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">FIVE QUESTIONS, THE RADIO PICKS ITSELF</text>

  <!-- five funneling questions -->
  <g font-family="ui-monospace, monospace" font-size="12.5" fill="#1a1d24">
    <rect x="40" y="86" width="300" height="52" rx="10" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="60" y="110">1 · range to gateway</text>
    <text x="60" y="128" font-size="11" fill="#7a808c">the decision; the rest is tax on it</text>

    <rect x="70" y="152" width="300" height="52" rx="10" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="90" y="176">2 · frequency × payload</text>
    <text x="90" y="194" font-size="11" fill="#7a808c">power draw × bandwidth need</text>

    <rect x="100" y="218" width="300" height="52" rx="10" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="120" y="242">3 · BOM-cost budget</text>
    <text x="120" y="260" font-size="11" fill="#7a808c">the radio locks the rest of the BOM</text>

    <rect x="130" y="284" width="300" height="52" rx="10" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="150" y="308">4 · power budget</text>
    <text x="150" y="326" font-size="11" fill="#7a808c">wall · battery · harvest</text>

    <rect x="160" y="350" width="300" height="52" rx="10" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="180" y="374">5 · security tier the buyer demands</text>
    <text x="180" y="392" font-size="11" fill="#7a808c">consumer · commercial · industrial</text>
  </g>

  <!-- funnel arrows pointing right -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24" stroke-opacity="0.5">
    <line x1="500" y1="112" x2="560" y2="190"/>
    <line x1="500" y1="178" x2="560" y2="208"/>
    <line x1="500" y1="244" x2="560" y2="226"/>
    <line x1="500" y1="310" x2="560" y2="244"/>
    <line x1="500" y1="376" x2="560" y2="262"/>
  </g>
  <g stroke="#2a52be" stroke-width="3.5" fill="#2a52be">
    <line x1="556" y1="226" x2="636" y2="226"/>
    <path d="M640 226 l-16 -8 v16 z"/>
  </g>

  <!-- outcome: a radio choice -->
  <g font-family="ui-monospace, monospace">
    <rect x="650" y="150" width="430" height="160" rx="14" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="3"/>
    <text x="676" y="186" font-size="13" letter-spacing="1" fill="#2a52be">A RADIO, USUALLY BY Q2</text>
    <g font-size="13" fill="#1a1d24">
      <text x="676" y="222">BLE / Wi-Fi — short range, wall power</text>
      <text x="676" y="252">LoRa / sub-GHz — long range, low rate</text>
      <text x="676" y="282">cellular — anywhere, pays in power + cost</text>
    </g>
  </g>
  <text x="650" y="346" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">Same five questions whether it's a drill, a coffee machine,</text>
  <text x="650" y="368" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">or a connected anything. Worked examples in docs/rubric.md.</text>
</svg>
