<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A test set checked against fresh outputs before reaching a customer.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="pr-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#pr-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- LEFT: stack of input -> expected-output pair cards (the test set) -->
  <g>
    <!-- card 1 -->
    <rect x="96" y="150" width="232" height="74" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="114" y="166" width="84" height="18" rx="5" fill="#1a1d24" opacity="0.18"/>
    <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24"><line x1="206" y1="175" x2="232" y2="175"/><path d="M238 175 l-12 -6 v12 z"/></g>
    <rect x="244" y="166" width="68" height="18" rx="5" fill="#4f46b8" opacity="0.85"/>
    <rect x="114" y="194" width="56" height="12" rx="4" fill="#1a1d24" opacity="0.10"/>
    <!-- card 2 -->
    <rect x="96" y="240" width="232" height="74" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="114" y="256" width="84" height="18" rx="5" fill="#1a1d24" opacity="0.18"/>
    <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24"><line x1="206" y1="265" x2="232" y2="265"/><path d="M238 265 l-12 -6 v12 z"/></g>
    <rect x="244" y="256" width="68" height="18" rx="5" fill="#4f46b8" opacity="0.85"/>
    <rect x="114" y="284" width="56" height="12" rx="4" fill="#1a1d24" opacity="0.10"/>
    <!-- card 3 -->
    <rect x="96" y="330" width="232" height="74" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="114" y="346" width="84" height="18" rx="5" fill="#1a1d24" opacity="0.18"/>
    <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24"><line x1="206" y1="355" x2="232" y2="355"/><path d="M238 355 l-12 -6 v12 z"/></g>
    <rect x="244" y="346" width="68" height="18" rx="5" fill="#4f46b8" opacity="0.85"/>
    <rect x="114" y="374" width="56" height="12" rx="4" fill="#1a1d24" opacity="0.10"/>
    <!-- card 4 (refusal-required: smaller dashed expected swatch) -->
    <rect x="96" y="420" width="232" height="74" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="114" y="436" width="84" height="18" rx="5" fill="#1a1d24" opacity="0.18"/>
    <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24"><line x1="206" y1="445" x2="232" y2="445"/><path d="M238 445 l-12 -6 v12 z"/></g>
    <rect x="244" y="436" width="40" height="18" rx="5" fill="none" stroke="#4f46b8" stroke-width="2.5" stroke-dasharray="5 3"/>
    <rect x="114" y="464" width="56" height="12" rx="4" fill="#1a1d24" opacity="0.10"/>
  </g>

  <!-- arrow: test set -> check -->
  <g stroke="#1a1d24" stroke-width="3.5" fill="#1a1d24"><line x1="340" y1="322" x2="470" y2="322"/><path d="M476 322 l-18 -8 v16 z"/></g>

  <!-- CENTER: the comparison check — fresh output matched against expected, a gate -->
  <rect x="486" y="206" width="232" height="232" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <!-- expected swatch (indigo) over fresh swatch (outline), being compared -->
  <rect x="528" y="250" width="148" height="30" rx="7" fill="#4f46b8" opacity="0.85"/>
  <rect x="528" y="296" width="148" height="30" rx="7" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <!-- comparison bracket between the two swatches -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="none" opacity="0.55">
    <path d="M508 280 q-12 8 0 16"/>
  </g>
  <!-- pass mark (green check) and fail mark (red x) leaving the gate -->
  <circle cx="566" cy="386" r="22" fill="#fdfaf2" stroke="#3a7d44" stroke-width="4"/>
  <path d="M555 386 l8 9 14 -18" fill="none" stroke="#3a7d44" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="638" cy="386" r="22" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
  <path d="M629 377 l18 18 M647 377 l-18 18" stroke="#c14a3a" stroke-width="4.5" stroke-linecap="round"/>

  <!-- pass arrow: check -> customer (solid) -->
  <g stroke="#1a1d24" stroke-width="3.5" fill="#1a1d24"><line x1="730" y1="322" x2="864" y2="322"/><path d="M870 322 l-18 -8 v16 z"/></g>

  <!-- the caught regression: red x is intercepted, turned back (blocked) before the customer -->
  <g stroke="#c14a3a" stroke-width="3" fill="none" opacity="0.9">
    <path d="M662 408 q40 70 -2 96"/>
  </g>
  <path d="M660 504 l16 -3 -10 -13 z" fill="#c14a3a" opacity="0.9"/>
  <!-- stop bar showing it is blocked -->
  <line x1="612" y1="520" x2="700" y2="520" stroke="#c14a3a" stroke-width="5" stroke-linecap="round"/>

  <!-- RIGHT: the customer-facing product surface (a screen on a stand) -->
  <rect x="888" y="222" width="212" height="172" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <g fill="#1a1d24" opacity="0.2">
    <rect x="918" y="252" width="132" height="9" rx="4"/>
    <rect x="918" y="276" width="96" height="9" rx="4"/>
  </g>
  <rect x="918" y="312" width="152" height="36" rx="8" fill="#4f46b8" fill-opacity="0.13" stroke="#4f46b8" stroke-width="2.5"/>
  <circle cx="940" cy="330" r="6" fill="#4f46b8"/>
  <rect x="956" y="327" width="98" height="6" rx="3" fill="#4f46b8" opacity="0.55"/>
  <g stroke="#1a1d24" stroke-width="4" stroke-linecap="round"><line x1="994" y1="394" x2="994" y2="420"/><line x1="952" y1="420" x2="1036" y2="420"/></g>
  <!-- a small standing figure beside the screen: the customer -->
  <circle cx="1066" cy="372" r="13" fill="none" stroke="#1a1d24" stroke-width="3.5"/>
  <path d="M1066 386 v34 M1066 420 l-14 18 M1066 420 l14 18 M1052 400 h28" fill="none" stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round"/>
</svg>
