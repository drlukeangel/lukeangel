<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">Docker networking — bridge network on a single host, overlay network across two hosts</title>
  <desc id="d">2016-era flat diagram comparing bridge (left, single host with three containers on docker0) and overlay (right, two hosts connected via VXLAN tunnel with containers on each side sharing a logical L2 segment).</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .section{font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:600;fill:#1a1d24}
  </style>
  <rect width="800" height="460" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Docker networking — bridge (single host) vs overlay (multi-host)</text>

  <!-- LEFT: Bridge network -->
  <text x="40" y="80" class="section">Bridge driver — single host</text>
  <g transform="translate(40,90)">
    <rect width="340" height="320" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="20" class="small">host: docker01</text>

    <!-- containers -->
    <g transform="translate(20,40)">
      <rect width="92" height="60" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="46" y="32" text-anchor="middle" class="label">web</text>
      <text x="46" y="48" text-anchor="middle" class="small">172.17.0.2</text>
    </g>
    <g transform="translate(124,40)">
      <rect width="92" height="60" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="46" y="32" text-anchor="middle" class="label">api</text>
      <text x="46" y="48" text-anchor="middle" class="small">172.17.0.3</text>
    </g>
    <g transform="translate(228,40)">
      <rect width="92" height="60" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="46" y="32" text-anchor="middle" class="label">db</text>
      <text x="46" y="48" text-anchor="middle" class="small">172.17.0.4</text>
    </g>

    <!-- veth lines -->
    <line x1="66" y1="100" x2="66" y2="140" stroke="#5a6470" stroke-width="1"/>
    <line x1="170" y1="100" x2="170" y2="140" stroke="#5a6470" stroke-width="1"/>
    <line x1="274" y1="100" x2="274" y2="140" stroke="#5a6470" stroke-width="1"/>

    <!-- docker0 bridge -->
    <rect x="20" y="140" width="300" height="36" fill="#1a1d24" rx="2"/>
    <text x="170" y="163" text-anchor="middle" class="label" fill="#fff">docker0 bridge (172.17.0.0/16)</text>

    <!-- to eth0 -->
    <line x1="170" y1="176" x2="170" y2="216" stroke="#5a6470" stroke-width="1"/>
    <rect x="20" y="216" width="300" height="36" fill="#0066cc" rx="2"/>
    <text x="170" y="239" text-anchor="middle" class="label" fill="#fff">host eth0 (NAT/iptables)</text>

    <!-- caption -->
    <text x="20" y="285" class="small">- containers get private IPs in 172.17.0.0/16</text>
    <text x="20" y="300" class="small">- intra-host container ↔ container is free</text>
  </g>

  <!-- RIGHT: Overlay network -->
  <text x="420" y="80" class="section">Overlay driver — two hosts, one logical network</text>
  <g transform="translate(420,90)">
    <rect width="340" height="320" fill="#fff" stroke="#cfd5db" rx="6"/>

    <!-- host 1 -->
    <g transform="translate(14,14)">
      <rect width="150" height="160" fill="#f5f7fa" stroke="#cfd5db"/>
      <text x="10" y="16" class="small">host: docker01</text>
      <rect x="14" y="26" width="120" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="74" y="50" text-anchor="middle" class="label">web</text>
      <text x="74" y="62" text-anchor="middle" class="small">10.0.9.2</text>
      <rect x="14" y="74" width="120" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="74" y="98" text-anchor="middle" class="label">cache</text>
      <text x="74" y="110" text-anchor="middle" class="small">10.0.9.3</text>
      <rect x="14" y="124" width="120" height="24" fill="#1a1d24"/>
      <text x="74" y="141" text-anchor="middle" class="small" fill="#fff">vxlan endpoint</text>
    </g>

    <!-- host 2 -->
    <g transform="translate(176,14)">
      <rect width="150" height="160" fill="#f5f7fa" stroke="#cfd5db"/>
      <text x="10" y="16" class="small">host: docker02</text>
      <rect x="14" y="26" width="120" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="74" y="50" text-anchor="middle" class="label">api</text>
      <text x="74" y="62" text-anchor="middle" class="small">10.0.9.4</text>
      <rect x="14" y="74" width="120" height="40" fill="#e6f0fa" stroke="#0066cc"/>
      <text x="74" y="98" text-anchor="middle" class="label">db</text>
      <text x="74" y="110" text-anchor="middle" class="small">10.0.9.5</text>
      <rect x="14" y="124" width="120" height="24" fill="#1a1d24"/>
      <text x="74" y="141" text-anchor="middle" class="small" fill="#fff">vxlan endpoint</text>
    </g>

    <!-- tunnel -->
    <path d="M 88 188 C 88 220, 252 220, 252 188" fill="none" stroke="#ff6b35" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="170" y="232" text-anchor="middle" class="small" fill="#ff6b35">VXLAN tunnel — UDP 4789</text>

    <!-- caption -->
    <text x="14" y="270" class="small">- containers across hosts share one L2 network</text>
    <text x="14" y="286" class="small">- 10.0.9.0/24 is the logical overlay subnet</text>
    <text x="14" y="302" class="small">- physical underlay can be anything routable</text>
  </g>
</svg>
