<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="Tagg's cellular topology and Whistle's BLE topology, side by side.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- column divider -->
  <line x1="540" y1="40" x2="540" y2="430" stroke="#1a1d24" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.2"/>

  <!-- ===================== LEFT: TAGG / CELLULAR ===================== -->
  <text x="40" y="44" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#1a1d24">TAGG · CELLULAR</text>
  <text x="40" y="66" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">radio reaches the whole network</text>

  <!-- collar puck -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="118" height="74" rx="14" fill="#c87533" stroke="#1a1d24" stroke-width="3"/>
    <path d="M59 0 L59 -16" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <circle cx="59" cy="-19" r="3.5" fill="#1a1d24"/>
    <circle cx="59" cy="37" r="9" fill="#fdfaf2"/>
    <circle cx="59" cy="37" r="4" fill="#c87533"/>
    <text x="59" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">COLLAR PUCK</text>
    <text x="59" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">GSM + GPS</text>
  </g>

  <!-- arrow puck -> tower -->
  <g stroke="#c87533" stroke-width="3" fill="#c87533"><line x1="196" y1="187" x2="244" y2="187"/><path d="M250 187 l-16 -7 v14 z"/></g>
  <text x="223" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c87533">cellular</text>

  <!-- cell tower -->
  <g transform="translate(258,150)">
    <rect x="0" y="0" width="92" height="74" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(46,16)" stroke="#1a1d24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-12 44 L-3 6 M12 44 L3 6 M-9 28 L9 28"/>
      <path d="M0 6 L0 -4"/>
    </g>
    <circle cx="46" cy="9" r="3.5" fill="#c87533"/>
    <text x="46" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">CELL TOWER</text>
  </g>

  <!-- arrow tower -> cloud -->
  <g stroke="#c87533" stroke-width="3" fill="#c87533"><line x1="358" y1="187" x2="402" y2="187"/><path d="M408 187 l-16 -7 v14 z"/></g>

  <!-- cloud -->
  <g transform="translate(416,148)">
    <path d="M22 60 a26 26 0 0 1 4 -52 a34 34 0 0 1 64 -5 a29 29 0 0 1 22 57 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <text x="66" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">SNAPTRACS</text>
    <text x="66" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">cloud → phone</text>
  </g>

  <!-- left summary chips -->
  <g transform="translate(70,300)" font-family="ui-monospace,monospace" font-size="12">
    <rect x="0" y="0" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
    <text x="100" y="22" text-anchor="middle" fill="#3a7d44">real-time location</text>
    <rect x="0" y="44" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
    <text x="100" y="66" text-anchor="middle" fill="#c14a3a">2–3 day battery</text>
    <rect x="0" y="88" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
    <text x="100" y="110" text-anchor="middle" fill="#c14a3a">$7.95 / month</text>
  </g>

  <!-- ===================== RIGHT: WHISTLE / BLE + WI-FI ===================== -->
  <text x="566" y="44" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#1a1d24">WHISTLE · BLE + WI-FI</text>
  <text x="566" y="66" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">two low-power radios, straight from the puck</text>

  <!-- collar puck (outline) — carries BLE + WiFi, no base station -->
  <g transform="translate(566,170)">
    <circle cx="40" cy="37" r="35" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="40" cy="37" r="20" fill="none" stroke="#c87533" stroke-width="3"/>
    <circle cx="40" cy="37" r="5" fill="#c87533"/>
    <text x="40" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">COLLAR PUCK</text>
    <text x="40" y="114" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">BLE 4.0 + Wi-Fi</text>
  </g>

  <!-- UPPER PATH: puck -BLE-> phone -relays-> cloud -->
  <!-- arrow puck -> phone (diagonal up-right) -->
  <g stroke="#c87533" stroke-width="3" fill="#c87533"><line x1="646" y1="192" x2="700" y2="150"/><path d="M705 146 l-9 14 13 -4 z"/></g>
  <text x="652" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c87533">BLE → phone</text>

  <!-- phone -->
  <g transform="translate(712,98)">
    <rect x="0" y="0" width="52" height="88" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="7" y="12" width="38" height="58" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2"/>
    <circle cx="26" cy="6" r="2.5" fill="#1a1d24" opacity="0.45"/>
    <g fill="#c87533"><rect x="12" y="51" width="7" height="14" rx="1.5"/><rect x="22" y="43" width="7" height="22" rx="1.5"/><rect x="32" y="35" width="7" height="30" rx="1.5"/></g>
    <text x="26" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">PHONE</text>
  </g>

  <!-- arrow phone -> cloud (relays) -->
  <g stroke="#c87533" stroke-width="3" fill="#c87533"><line x1="766" y1="140" x2="886" y2="174"/><path d="M892 176 l-15 -2 4 -14 z"/></g>
  <text x="824" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c87533">relays</text>

  <!-- LOWER PATH: puck -home Wi-Fi-> cloud (direct, no base station) -->
  <g stroke="#c87533" stroke-width="3" fill="#c87533"><line x1="650" y1="232" x2="884" y2="224"/><path d="M890 224 l-15 -7 -1 15 z"/></g>
  <text x="766" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c87533">home Wi-Fi → cloud (direct)</text>

  <!-- cloud -->
  <g transform="translate(898,162)">
    <path d="M22 60 a26 26 0 0 1 4 -52 a34 34 0 0 1 64 -5 a29 29 0 0 1 22 57 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <text x="66" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">WHISTLE</text>
    <text x="66" y="116" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">cloud → app</text>
  </g>

  <!-- right summary chips -->
  <g transform="translate(596,300)" font-family="ui-monospace,monospace" font-size="12">
    <rect x="0" y="0" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
    <text x="100" y="22" text-anchor="middle" fill="#c14a3a">home range only</text>
    <rect x="0" y="44" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
    <text x="100" y="66" text-anchor="middle" fill="#3a7d44">7+ day battery</text>
    <rect x="0" y="88" width="200" height="34" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
    <text x="100" y="110" text-anchor="middle" fill="#3a7d44">no subscription</text>
  </g>

  <text x="540" y="452" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">Same job, opposite radios — and the radio decides the battery, the range, and the bill.</text>
</svg>
