<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Agent loop billing, before and after prompt caching.">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- divider -->
  <line x1="560" y1="40" x2="560" y2="430" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>

  <!-- ===== LEFT: before — the 4K prefix billed every step ===== -->
  <text x="44" y="56" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="14" fill="#1a1d24">Before — every step pays full price</text>
  <text x="44" y="78" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">the 4K system + tools prefix, re-billed</text>

  <!-- a column of agent steps, each carrying a full-price prefix block + a small new-token block -->
  <g font-family="ui-monospace,monospace">
    <!-- step rows -->
    <g>
      <rect x="44" y="100" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="56" y="122" font-size="11.5" fill="#c14a3a">prefix · full price</text>
      <rect x="222" y="100" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="252" y="122" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="300" y="122" font-size="11" fill="#7a808c">step 1</text>
    </g>
    <g>
      <rect x="44" y="142" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="56" y="164" font-size="11.5" fill="#c14a3a">prefix · full price</text>
      <rect x="222" y="142" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="252" y="164" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="300" y="164" font-size="11" fill="#7a808c">step 2</text>
    </g>
    <g>
      <rect x="44" y="184" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="56" y="206" font-size="11.5" fill="#c14a3a">prefix · full price</text>
      <rect x="222" y="184" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="252" y="206" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="300" y="206" font-size="11" fill="#7a808c">step 3</text>
    </g>
    <text x="129" y="246" text-anchor="middle" font-size="22" fill="#7a808c" letter-spacing="3">· · ·</text>
    <g>
      <rect x="44" y="260" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="56" y="282" font-size="11.5" fill="#c14a3a">prefix · full price</text>
      <rect x="222" y="260" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="252" y="282" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="300" y="282" font-size="11" fill="#7a808c">step 10</text>
    </g>
  </g>
  <line x1="44" y1="318" x2="430" y2="318" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
  <text x="44" y="352" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">prefix billed: 10x</text>
  <text x="44" y="392" font-family="ui-monospace,monospace" font-size="20" fill="#c14a3a">~$0.18 / run</text>

  <!-- ===== RIGHT: after — prefix paid once, cache rate after ===== -->
  <text x="600" y="56" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">After — prefix paid once, then cache rate</text>
  <text x="600" y="78" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">Bedrock prompt caching (preview)</text>

  <g font-family="ui-monospace,monospace">
    <g>
      <rect x="600" y="100" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="612" y="122" font-size="11.5" fill="#c14a3a">prefix · full price</text>
      <rect x="778" y="100" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="808" y="122" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="856" y="122" font-size="11" fill="#7a808c">step 1</text>
    </g>
    <g>
      <rect x="600" y="142" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.6" stroke-dasharray="6 5"/>
      <text x="612" y="164" font-size="11.5" fill="#3a7d44">prefix · cache rate</text>
      <rect x="778" y="142" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="808" y="164" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="856" y="164" font-size="11" fill="#7a808c">step 2</text>
    </g>
    <g>
      <rect x="600" y="184" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.6" stroke-dasharray="6 5"/>
      <text x="612" y="206" font-size="11.5" fill="#3a7d44">prefix · cache rate</text>
      <rect x="778" y="184" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="808" y="206" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="856" y="206" font-size="11" fill="#7a808c">step 3</text>
    </g>
    <text x="685" y="246" text-anchor="middle" font-size="22" fill="#7a808c" letter-spacing="3">· · ·</text>
    <g>
      <rect x="600" y="260" width="170" height="34" rx="6" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.6" stroke-dasharray="6 5"/>
      <text x="612" y="282" font-size="11.5" fill="#3a7d44">prefix · cache rate</text>
      <rect x="778" y="260" width="60" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="808" y="282" font-size="10.5" fill="#7a808c" text-anchor="middle">new</text>
      <text x="856" y="282" font-size="11" fill="#7a808c">step 10</text>
    </g>
  </g>
  <line x1="600" y1="318" x2="986" y2="318" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
  <text x="600" y="352" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">prefix billed: 1x full + 9x cache</text>
  <text x="600" y="392" font-family="ui-monospace,monospace" font-size="20" fill="#3a7d44">~$0.04 / run</text>

  <text x="560" y="430" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">At ~50K runs a month, the gap is roughly $7K/month back.</text>
</svg>
