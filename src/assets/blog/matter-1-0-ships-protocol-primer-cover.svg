<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Matter layers">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- Matter slab on top -->
  <rect x="180" y="120" width="840" height="90" rx="12" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="4"/>

  <!-- three transport pillars -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5">
    <rect x="250" y="240" width="180" height="200" rx="10"/>
    <rect x="510" y="240" width="180" height="200" rx="10"/>
    <rect x="770" y="240" width="180" height="200" rx="10"/>
  </g>

  <!-- pillar 1: Thread mesh nodes -->
  <g transform="translate(340,340)">
    <g fill="#6a4c93">
      <circle cx="0" cy="-40" r="11"/><circle cx="-38" cy="20" r="11"/>
      <circle cx="38" cy="20" r="11"/><circle cx="0" cy="44" r="11"/>
    </g>
    <g stroke="#6a4c93" stroke-width="2.5">
      <line x1="0" y1="-40" x2="-38" y2="20"/><line x1="0" y1="-40" x2="38" y2="20"/>
      <line x1="-38" y1="20" x2="38" y2="20"/><line x1="-38" y1="20" x2="0" y2="44"/>
      <line x1="38" y1="20" x2="0" y2="44"/>
    </g>
  </g>

  <!-- pillar 2: Wi-Fi arcs -->
  <g transform="translate(600,360)" stroke="#6a4c93" stroke-width="4" fill="none">
    <path d="M-46 0 a46 46 0 0 1 92 0"/>
    <path d="M-30 -16 a30 30 0 0 1 60 0"/>
    <path d="M-14 -32 a14 14 0 0 1 28 0"/>
    <circle cx="0" cy="6" r="6" fill="#6a4c93" stroke="none"/>
  </g>

  <!-- pillar 3: Ethernet jack -->
  <g transform="translate(860,300)">
    <rect x="0" y="0" width="60" height="78" rx="6" fill="none" stroke="#6a4c93" stroke-width="4"/>
    <rect x="18" y="-12" width="24" height="16" fill="#6a4c93"/>
    <g stroke="#6a4c93" stroke-width="3">
      <line x1="12" y1="20" x2="12" y2="40"/><line x1="24" y1="20" x2="24" y2="40"/>
      <line x1="36" y1="20" x2="36" y2="40"/><line x1="48" y1="20" x2="48" y2="40"/>
    </g>
  </g>

  <!-- connectors slab -> pillars -->
  <g stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5">
    <line x1="340" y1="210" x2="340" y2="240"/>
    <line x1="600" y1="210" x2="600" y2="240"/>
    <line x1="860" y1="210" x2="860" y2="240"/>
  </g>

  <!-- multi-fabric hint: one bulb joined to three hubs, bottom -->
  <g transform="translate(600,520)">
    <circle cx="0" cy="0" r="26" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <path d="M-12 -4 a12 12 0 0 1 24 0 q0 9 -6 13 l0 6 l-12 0 l0 -6 q-6 -4 -6 -13 Z" fill="#6a4c93"/>
    <g stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5">
      <line x1="-22" y1="-14" x2="-150" y2="-40"/>
      <line x1="0" y1="-26" x2="0" y2="-60"/>
      <line x1="22" y1="-14" x2="150" y2="-40"/>
    </g>
    <g fill="#1a1d24" fill-opacity="0.8">
      <circle cx="-150" cy="-46" r="9"/><circle cx="0" cy="-66" r="9"/><circle cx="150" cy="-46" r="9"/>
    </g>
  </g>
</svg>
