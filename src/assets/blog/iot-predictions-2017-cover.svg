<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2017 predictions cover">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- central voice speaker (the hub the home now orbits) -->
  <g transform="translate(600,330)">
    <!-- concentric voice-reach rings -->
    <circle r="250" fill="none" stroke="#0066cc" stroke-opacity="0.10" stroke-width="2"/>
    <circle r="185" fill="none" stroke="#0066cc" stroke-opacity="0.16" stroke-width="2"/>
    <circle r="120" fill="none" stroke="#0066cc" stroke-opacity="0.22" stroke-width="2"/>

    <!-- speaker body -->
    <rect x="-52" y="-78" width="104" height="156" rx="52" fill="#0066cc"/>
    <circle cx="0" cy="-34" r="20" fill="#fdfaf2"/>
    <circle cx="0" cy="-34" r="8" fill="#0066cc"/>
    <!-- light bar -->
    <rect x="-34" y="22" width="68" height="30" rx="15" fill="#fdfaf2" fill-opacity="0.30"/>
  </g>

  <!-- orbiting connected devices, drawn as silhouettes only -->
  <!-- earbuds case (left) -->
  <g transform="translate(250,230)" fill="#1a1d24">
    <rect x="0" y="0" width="84" height="56" rx="14"/>
    <rect x="14" y="-26" width="18" height="34" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="52" y="-26" width="18" height="34" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  </g>

  <!-- camera / doorbell (top right) -->
  <g transform="translate(880,170)">
    <rect x="0" y="0" width="64" height="112" rx="18" fill="#1a1d24"/>
    <circle cx="32" cy="34" r="18" fill="#fdfaf2"/>
    <circle cx="32" cy="34" r="8" fill="#0066cc"/>
    <circle cx="32" cy="78" r="7" fill="#fdfaf2"/>
  </g>

  <!-- smart display (right) -->
  <g transform="translate(890,360)">
    <rect x="0" y="0" width="128" height="92" rx="12" fill="#1a1d24"/>
    <rect x="10" y="10" width="108" height="72" rx="5" fill="#fdfaf2"/>
    <rect x="20" y="22" width="56" height="10" rx="5" fill="#0066cc" fill-opacity="0.5"/>
    <rect x="20" y="40" width="80" height="8" rx="4" fill="#1a1d24" fill-opacity="0.18"/>
    <rect x="20" y="54" width="64" height="8" rx="4" fill="#1a1d24" fill-opacity="0.18"/>
  </g>

  <!-- watch (bottom left) -->
  <g transform="translate(300,440)">
    <rect x="0" y="-20" width="14" height="100" rx="7" fill="#1a1d24" fill-opacity="0.45"/>
    <rect x="40" y="-20" width="14" height="100" rx="7" fill="#1a1d24" fill-opacity="0.45"/>
    <rect x="-10" y="6" width="74" height="68" rx="18" fill="#1a1d24"/>
    <rect x="0" y="16" width="54" height="48" rx="10" fill="#fdfaf2"/>
    <circle cx="27" cy="40" r="11" fill="#0066cc" fill-opacity="0.55"/>
  </g>

  <!-- phone running an app (bottom right) -->
  <g transform="translate(820,470)">
    <rect x="0" y="0" width="60" height="108" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="8" y="10" width="44" height="78" rx="3" fill="#1a1d24" fill-opacity="0.12"/>
    <circle cx="30" cy="98" r="4" fill="#1a1d24" fill-opacity="0.4"/>
  </g>

  <!-- thin connection spokes from hub to devices -->
  <g stroke="#0066cc" stroke-opacity="0.30" stroke-width="2">
    <line x1="600" y1="330" x2="300" y2="250"/>
    <line x1="600" y1="330" x2="900" y2="210"/>
    <line x1="600" y1="330" x2="930" y2="400"/>
    <line x1="600" y1="330" x2="335" y2="470"/>
  </g>
</svg>
