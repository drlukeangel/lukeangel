<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 420" width="1060" height="420" role="img" aria-label="Rotating-salt HMAC">
  <rect width="1060" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHY A ROTATING SALT — IRREVERSIBLE, AND UNJOINABLE ACROSS WINDOWS</text>

  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- input identifier -->
    <rect x="40" y="96" width="200" height="56" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="122" font-size="13" fill="#1a1d24">operator_email</text>
    <text x="60" y="142" font-size="11" fill="#7a808c">a direct identifier</text>

    <!-- same input, lower row -->
    <rect x="40" y="252" width="200" height="56" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="278" font-size="13" fill="#1a1d24">operator_email</text>
    <text x="60" y="298" font-size="11" fill="#7a808c">same value, next quarter</text>

    <!-- HMAC node Q1 -->
    <rect x="376" y="84" width="252" height="84" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
    <text x="396" y="116" font-size="13" fill="#2a52be">HMAC-SHA256</text>
    <text x="396" y="138" font-size="11.5" fill="#7a808c">salt = Q1 salt</text>
    <text x="396" y="156" font-size="11.5" fill="#7a808c">(rotated each window)</text>

    <!-- HMAC node Q2 -->
    <rect x="376" y="240" width="252" height="84" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
    <text x="396" y="272" font-size="13" fill="#2a52be">HMAC-SHA256</text>
    <text x="396" y="294" font-size="11.5" fill="#7a808c">salt = Q2 salt</text>
    <text x="396" y="312" font-size="11.5" fill="#7a808c">(a different salt)</text>

    <!-- arrows in -->
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
      <line x1="240" y1="124" x2="372" y2="124"/><path d="M376 124 l-15 -7 v14 z"/>
      <line x1="240" y1="280" x2="372" y2="280"/><path d="M376 280 l-15 -7 v14 z"/>
    </g>

    <!-- outputs -->
    <rect x="764" y="92" width="256" height="68" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="784" y="120" font-size="12.5" fill="#1a1d24">a3f9c1…  (Q1 digest)</text>
    <text x="784" y="142" font-size="11" fill="#7a808c">irreversible — no key reverses it</text>

    <rect x="764" y="248" width="256" height="68" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="784" y="276" font-size="12.5" fill="#1a1d24">7b20e4…  (Q2 digest)</text>
    <text x="784" y="298" font-size="11" fill="#7a808c">≠ Q1 digest for the same input</text>

    <!-- arrows out -->
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
      <line x1="628" y1="126" x2="760" y2="126"/><path d="M764 126 l-15 -7 v14 z"/>
      <line x1="628" y1="282" x2="760" y2="282"/><path d="M764 282 l-15 -7 v14 z"/>
    </g>
  </g>

  <!-- the cross-window break -->
  <g font-family="Newsreader, Georgia, serif">
    <line x1="892" y1="160" x2="892" y2="248" stroke="#c14a3a" stroke-width="3" stroke-dasharray="6,7"/>
    <path d="M886 204 l12 0 l-6 -10 z" fill="#c14a3a"/>
    <path d="M886 204 l12 0 l-6 10 z" fill="#c14a3a"/>
    <text x="540" y="388" text-anchor="middle" font-size="16" font-style="italic" fill="#2a52be">rotate the salt and the two windows can't be joined — the digest is not a stable key</text>
  </g>
</svg>
