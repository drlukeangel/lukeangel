<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A pet collar tracker with a GPS fix and a LoRa radio link.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="pt3-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#pt3-dots)"/>
  <rect width="24" height="630" fill="#1f7a6b"/>

  <!-- GPS satellite, top right -->
  <g transform="translate(940,118)">
    <rect x="-16" y="-12" width="32" height="24" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <g stroke="#1a1d24" stroke-width="4" stroke-linecap="round">
      <line x1="-16" y1="-2" x2="-58" y2="-22"/><line x1="-16" y1="2" x2="-58" y2="22"/>
      <line x1="16" y1="-2" x2="58" y2="-22"/><line x1="16" y1="2" x2="58" y2="22"/>
    </g>
    <g fill="#1f7a6b" opacity="0.85">
      <rect x="-56" y="-26" width="36" height="8" rx="2" transform="rotate(-20 -38 -22)"/>
      <rect x="20" y="-26" width="36" height="8" rx="2" transform="rotate(20 38 -22)"/>
    </g>
  </g>

  <!-- GPS fix line from satellite down to the tag -->
  <line x1="912" y1="150" x2="600" y2="330" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="3 9" opacity="0.4"/>

  <!-- LoRa signal arcs radiating left from the collar tag -->
  <g transform="translate(560,360)" fill="none" stroke="#1f7a6b" stroke-linecap="round">
    <path d="M-70 -56 A 90 90 0 0 0 -70 56" stroke-width="5" opacity="0.55"/>
    <path d="M-112 -92 A 145 145 0 0 0 -112 92" stroke-width="5" opacity="0.32"/>
    <path d="M-154 -128 A 200 200 0 0 0 -154 128" stroke-width="5" opacity="0.16"/>
  </g>

  <!-- the collar tag: rounded puck on a collar band -->
  <g transform="translate(560,360)">
    <!-- collar band sweeping behind -->
    <path d="M-150 220 Q -40 120 8 -10 Q 56 -140 210 -200" fill="none" stroke="#1a1d24" stroke-width="34" stroke-linecap="round" opacity="0.12"/>
    <path d="M-150 220 Q -40 120 8 -10 Q 56 -140 210 -200" fill="none" stroke="#1a1d24" stroke-width="18" stroke-linecap="round" opacity="0.18"/>

    <!-- puck body -->
    <rect x="-66" y="-78" width="160" height="156" rx="34" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <!-- GPS crosshair / location dot face -->
    <circle cx="14" cy="0" r="44" fill="none" stroke="#1a1d24" stroke-width="4" opacity="0.5"/>
    <circle cx="14" cy="0" r="14" fill="#1f7a6b"/>
    <line x1="14" y1="-58" x2="14" y2="-44" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="44" x2="14" y2="58" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <line x1="-44" y1="0" x2="-30" y2="0" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <line x1="58" y1="0" x2="72" y2="0" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>

    <!-- antenna nub top -->
    <rect x="6" y="-98" width="16" height="22" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>

    <!-- little battery indicator at the base of the puck -->
    <g transform="translate(-50,52)">
      <rect x="0" y="0" width="40" height="18" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
      <rect x="40" y="5" width="4" height="8" rx="1" fill="#1a1d24"/>
      <rect x="4" y="4" width="22" height="10" rx="1.5" fill="#1f7a6b"/>
    </g>
  </g>
</svg>
