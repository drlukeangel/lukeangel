<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Hub topology">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">

    <!-- cat door -->
    <g transform="translate(70 150)">
      <rect x="0" y="0" width="64" height="120" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <line x1="0" y1="46" x2="64" y2="46" stroke="#1a1d24" stroke-width="2.5"/>
      <circle cx="32" cy="28" r="6" fill="#c87533"/>
      <text x="32" y="148" text-anchor="middle" font-size="14">cat door</text>
      <text x="32" y="166" text-anchor="middle" font-size="12" fill="#5b616b">chip read</text>
    </g>

    <!-- wall between door and hub -->
    <rect x="220" y="90" width="16" height="240" fill="#1a1d24" fill-opacity="0.10"/>
    <text x="228" y="350" text-anchor="middle" font-size="12" fill="#7a808c">wall</text>

    <!-- sub-GHz RF hop -->
    <g transform="translate(140 200)" stroke="#c87533" fill="none" stroke-width="3">
      <path d="M0 0 a30 30 0 0 1 30 -22" opacity="0.5"/>
      <path d="M6 12 a55 55 0 0 1 55 -42" opacity="0.8"/>
    </g>
    <path d="M140 210 L300 165" stroke="#c87533" stroke-width="3" stroke-dasharray="3 8"/>
    <text x="210" y="150" text-anchor="middle" font-size="13" fill="#c87533">sub-GHz RF</text>
    <text x="210" y="170" text-anchor="middle" font-size="11" fill="#5b616b">~10 m thru walls</text>

    <!-- hub -->
    <g transform="translate(310 165)">
      <rect x="0" y="0" width="120" height="74" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="60" cy="37" r="11" fill="#c87533"/>
      <text x="60" y="100" text-anchor="middle" font-size="14">hub</text>
    </g>

    <!-- ethernet (solid = wired) -->
    <path d="M430 202 L560 202" stroke="#1a1d24" stroke-width="4"/>
    <rect x="424" y="195" width="12" height="14" rx="2" fill="#1a1d24"/>
    <rect x="554" y="195" width="12" height="14" rx="2" fill="#1a1d24"/>
    <text x="497" y="185" text-anchor="middle" font-size="13" fill="#5b616b">Ethernet</text>

    <!-- cloud -->
    <g transform="translate(640 202)">
      <path d="M-78 22 a36 36 0 0 1 20 -66 a48 48 0 0 1 90 8 a34 34 0 0 1 3 60 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-size="13">cloud</text>
    </g>

    <!-- to phone -->
    <path d="M720 202 L850 202" stroke="#1a1d24" stroke-width="3" stroke-dasharray="2 9" marker-end="url(#ta)"/>
    <g transform="translate(862 158)">
      <rect x="0" y="0" width="60" height="100" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <line x1="12" y1="26" x2="42" y2="26" stroke="#c87533" stroke-width="3"/>
      <line x1="12" y1="42" x2="38" y2="42" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
      <line x1="12" y1="56" x2="40" y2="56" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
      <text x="30" y="120" text-anchor="middle" font-size="13">app</text>
    </g>

    <text x="500" y="400" text-anchor="middle" font-size="13" fill="#5b616b">the door already existed — the hub only adds the network layer</text>

    <defs>
      <marker id="ta" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#1a1d24"/></marker>
    </defs>
  </g>
</svg>
