<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 470" width="1060" height="470" role="img" aria-label="One porch-light automation migrating across five implementations">
  <rect x="0.5" y="0.5" width="1059" height="469" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13.5px;font-weight:700;fill:#1a1d24}
    .yr{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11.5px;fill:#6a4c93}
    .io{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#5b616b}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <!-- input: sunset, fixed at far left -->
  <g transform="translate(70,150)">
    <circle r="30" fill="#6a4c93" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2.5"/>
    <circle r="12" fill="#6a4c93"/>
    <g stroke="#6a4c93" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-22" x2="0" y2="-28"/><line x1="16" y1="-16" x2="20" y2="-20"/>
      <line x1="22" y1="0" x2="28" y2="0"/><line x1="-16" y1="-16" x2="-20" y2="-20"/><line x1="-22" y1="0" x2="-28" y2="0"/>
    </g>
  </g>
  <text x="70" y="206" text-anchor="middle" class="io">sunset</text>
  <text x="70" y="224" text-anchor="middle" class="io">(input)</text>

  <!-- five engine boxes in the middle, swapped over time -->
  <g>
    <!-- 1 -->
    <rect x="170" y="118" width="128" height="64" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="234" y="146" text-anchor="middle" class="lab">Python cron</text>
    <text x="234" y="166" text-anchor="middle" class="yr">2012</text>
    <!-- 2 -->
    <rect x="318" y="118" width="128" height="64" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="382" y="146" text-anchor="middle" class="lab">IFTTT</text>
    <text x="382" y="166" text-anchor="middle" class="yr">2014</text>
    <!-- 3 -->
    <rect x="466" y="118" width="128" height="64" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="530" y="142" text-anchor="middle" class="lab">SmartThings</text>
    <text x="530" y="160" text-anchor="middle" class="lab">SmartApp</text>
    <text x="530" y="177" text-anchor="middle" class="yr">2015</text>
    <!-- 4 -->
    <rect x="614" y="118" width="128" height="64" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <text x="678" y="142" text-anchor="middle" class="lab">HA YAML</text>
    <text x="678" y="160" text-anchor="middle" class="lab">automation</text>
    <text x="678" y="177" text-anchor="middle" class="yr">2017</text>
    <!-- 5 -->
    <rect x="762" y="118" width="128" height="64" rx="9" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="826" y="142" text-anchor="middle" class="lab">HA trigger</text>
    <text x="826" y="160" text-anchor="middle" class="lab">(today)</text>
    <text x="826" y="177" text-anchor="middle" class="yr">2025</text>

    <!-- swap arrows between engines -->
    <g stroke="#7a808c" stroke-width="2" fill="#7a808c" stroke-dasharray="4 4">
      <line x1="298" y1="150" x2="314" y2="150"/><line x1="446" y1="150" x2="462" y2="150"/>
      <line x1="594" y1="150" x2="610" y2="150"/><line x1="742" y1="150" x2="758" y2="150"/>
    </g>
  </g>

  <!-- output: porch light on, fixed at far right -->
  <g transform="translate(982,150)">
    <path d="M0 -26 a20 20 0 0 1 12 36 h-24 a20 20 0 0 1 12 -36 z" fill="#6a4c93" fill-opacity="0.18" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="-7" y="10" width="14" height="9" rx="2" fill="#1a1d24"/>
    <g stroke="#6a4c93" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-34" x2="0" y2="-42"/><line x1="20" y1="-14" x2="28" y2="-18"/><line x1="-20" y1="-14" x2="-28" y2="-18"/>
    </g>
  </g>
  <text x="982" y="206" text-anchor="middle" class="io">light on</text>
  <text x="982" y="224" text-anchor="middle" class="io">(output)</text>

  <!-- the fixed-ends framing lines -->
  <g stroke="#1a1d24" stroke-width="2.2" fill="#1a1d24">
    <line x1="100" y1="150" x2="166" y2="150"/><path d="M170 150 l-14 -6 v12 z"/>
    <line x1="894" y1="150" x2="952" y2="150"/><path d="M956 150 l-14 -6 v12 z"/>
  </g>

  <text x="530" y="300" text-anchor="middle" class="cap">Same input, same output, for thirteen years. Only the engine in the middle got rewritten — five times.</text>
  <text x="530" y="340" text-anchor="middle" class="cap">The behavior is the contract. The platform is an implementation detail.</text>
</svg>
