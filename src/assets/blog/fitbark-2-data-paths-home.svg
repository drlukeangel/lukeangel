<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" width="1180" height="620" role="img" aria-label="How each tracker gets its data home.">
  <rect width="1180" height="620" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- divider -->
  <line x1="590" y1="56" x2="590" y2="566" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.18"/>

  <!-- ============ LEFT: Whistle — BLE + built-in WiFi, no base station ============ -->
  <text x="296" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#1a1d24">WHISTLE</text>
  <text x="296" y="70" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#7a808c">BLE + Wi-Fi in the puck</text>

  <!-- coin puck -->
  <g transform="translate(120,300)">
    <circle cx="0" cy="0" r="40" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#c87533" stroke-width="4"/>
    <circle cx="0" cy="0" r="6" fill="#c87533"/>
    <text x="0" y="66" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">puck</text>
  </g>

  <!-- cloud, top -->
  <g transform="translate(420,96)">
    <path d="M34 56 a32 32 0 0 1 5 -63 a42 42 0 0 1 78 -6 a35 35 0 0 1 27 69 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round"/>
    <text x="86" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">cloud</text>
  </g>

  <!-- phone (BLE path) -->
  <g transform="translate(360,300)">
    <rect x="0" y="0" width="72" height="120" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="10" y="18" width="52" height="78" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="36" cy="108" r="5" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
    <text x="36" y="142" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">phone</text>
  </g>

  <!-- path A: puck -> phone (BLE) -->
  <path d="M162 296 L356 322" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round"/>
  <text x="250" y="296" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c87533">BLE</text>
  <!-- phone -> cloud -->
  <path d="M404 296 C 440 230, 470 200, 488 170" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round"/>

  <!-- path B: puck -> cloud direct over home WiFi (the key Whistle fact) -->
  <path d="M150 268 C 250 150, 360 150, 452 150" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 12"/>
  <text x="262" y="142" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c87533">home Wi-Fi (direct)</text>

  <!-- callout: no base station -->
  <g transform="translate(296,470)">
    <path d="M-30 -22 l60 0 0 44 -60 0 z M-30 -22 l60 44 M30 -22 l-60 44" fill="none" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="58" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#c14a3a">no base station</text>
  </g>

  <!-- ============ RIGHT: FitBark — BLE only, optional plug-in WiFi base station ============ -->
  <text x="884" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#1a1d24">FITBARK</text>
  <text x="884" y="70" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#7a808c">BLE only + optional base</text>

  <!-- bone tag -->
  <g transform="translate(700,300)">
    <g fill="#c87533" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round">
      <circle cx="-34" cy="0" r="18"/>
      <circle cx="-34" cy="-15" r="13"/>
      <circle cx="-34" cy="15" r="13"/>
      <circle cx="34" cy="0" r="18"/>
      <circle cx="34" cy="-15" r="13"/>
      <circle cx="34" cy="15" r="13"/>
      <rect x="-34" y="-15" width="68" height="30" rx="7"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#fdfaf2"/>
    <circle cx="0" cy="0" r="4" fill="#c87533"/>
    <text x="0" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">tag</text>
  </g>

  <!-- cloud, top right -->
  <g transform="translate(1000,96)">
    <path d="M34 56 a32 32 0 0 1 5 -63 a42 42 0 0 1 78 -6 a35 35 0 0 1 27 69 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round"/>
    <text x="86" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">cloud</text>
  </g>

  <!-- phone (the only default path) -->
  <g transform="translate(940,300)">
    <rect x="0" y="0" width="72" height="120" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="10" y="18" width="52" height="78" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="36" cy="108" r="5" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
    <text x="36" y="142" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">phone</text>
  </g>

  <!-- tag -> phone (BLE, the default) -->
  <path d="M742 300 L936 320" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round"/>
  <text x="838" y="296" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c87533">BLE</text>
  <!-- phone -> cloud -->
  <path d="M984 296 C 1020 230, 1050 200, 1068 170" fill="none" stroke="#c87533" stroke-width="5" stroke-linecap="round"/>

  <!-- optional add-on base station (separate box) -->
  <g transform="translate(700,470)">
    <rect x="-46" y="-26" width="92" height="52" rx="9" fill="#fdfaf2" stroke="#5b616b" stroke-width="4" stroke-dasharray="7 6"/>
    <!-- wifi waves on the base -->
    <g fill="none" stroke="#5b616b" stroke-width="3" stroke-linecap="round">
      <path d="M-14 4 a18 18 0 0 1 28 0"/>
      <path d="M-22 -6 a30 30 0 0 1 44 0"/>
    </g>
    <circle cx="0" cy="14" r="3.5" fill="#5b616b"/>
    <text x="0" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#5b616b">optional Wi-Fi base</text>
  </g>
  <!-- tag -> optional base (BLE) -->
  <path d="M700 350 L700 440" fill="none" stroke="#5b616b" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 10"/>
  <!-- base -> cloud (only if you buy it) -->
  <path d="M740 452 C 900 360, 1010 220, 1068 168" fill="none" stroke="#5b616b" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 10"/>
</svg>
