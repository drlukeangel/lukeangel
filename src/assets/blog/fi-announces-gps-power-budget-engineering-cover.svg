<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Pet collar power budget">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- stacked daily-energy bar, left: modem dominates -->
  <g transform="translate(200 100)">
    <!-- axis -->
    <line x1="0" y1="0" x2="0" y2="430" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
    <line x1="0" y1="430" x2="240" y2="430" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
    <!-- the single tall bar, segmented -->
    <!-- modem (biggest) -->
    <rect x="60" y="40" width="120" height="250" fill="#c87533" fill-opacity="0.75"/>
    <!-- gps -->
    <rect x="60" y="290" width="120" height="70" fill="#1a1d24" fill-opacity="0.55"/>
    <!-- ble -->
    <rect x="60" y="360" width="120" height="30" fill="#1a1d24" fill-opacity="0.30"/>
    <!-- mcu -->
    <rect x="60" y="390" width="120" height="40" fill="#1a1d24" fill-opacity="0.18"/>
    <!-- outline -->
    <rect x="60" y="40" width="120" height="390" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <!-- bracket marking the modem segment -->
    <path d="M196 40 q 14 0 14 14 v 95 q 0 14 14 14 q -14 0 -14 14 v 95 q 0 14 -14 14" fill="none" stroke="#c14a3a" stroke-width="3"/>
  </g>

  <!-- battery comparison bars, right -->
  <g transform="translate(600 180)">
    <!-- traditional GSM/3G: short, days -->
    <rect x="0" y="0" width="150" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="150" y="20" width="14" height="24" rx="3" fill="#1a1d24"/>
    <rect x="8" y="8" width="40" height="48" rx="4" fill="#c14a3a" fill-opacity="0.5"/>

    <!-- LTE-M: long, weeks -->
    <g transform="translate(0 130)">
      <rect x="0" y="0" width="460" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
      <rect x="460" y="20" width="14" height="24" rx="3" fill="#1a1d24"/>
      <rect x="8" y="8" width="420" height="48" rx="4" fill="#3a7d44" fill-opacity="0.45"/>
    </g>

    <!-- a small lightning/sleep marker between the two -->
    <g transform="translate(520 65)">
      <path d="M0 -30 L-16 6 L0 6 L-6 34 L18 -8 L2 -8 Z" fill="#c87533"/>
    </g>
  </g>
</svg>
