<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" role="img" aria-label="Mars data pipeline">
  <rect width="940" height="500" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>
  <defs><marker id="mp" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
  <marker id="mpo" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#c87533"/></marker></defs>

  <!-- collar (left) -->
  <g transform="translate(70,210)">
    <rect x="0" y="0" width="120" height="56" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="60" y="26" text-anchor="middle" class="lab">collar data</text>
    <text x="60" y="44" text-anchor="middle" class="sm">activity · location · behavior</text>
  </g>
  <line x1="190" y1="238" x2="250" y2="238" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#mp)"/>

  <!-- central analytics lake -->
  <g transform="translate(255,178)">
    <rect x="0" y="0" width="180" height="120" rx="12" fill="#c87533" fill-opacity="0.08" stroke="#1a1d24" stroke-width="3"/>
    <text x="90" y="30" text-anchor="middle" class="hd">one data lake</text>
    <text x="90" y="56" text-anchor="middle" class="sm">cross-referenced with</text>
    <text x="90" y="78" text-anchor="middle" class="sm">vet diagnoses,</text>
    <text x="90" y="96" text-anchor="middle" class="sm">food + treat purchases</text>
  </g>

  <!-- three input feeders into the lake (from below) -->
  <g class="sm" text-anchor="middle">
    <g transform="translate(180,400)"><rect x="-54" y="-22" width="108" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="-2">Banfield/VCA</text><text x="0" y="14">clinic visits</text></g>
    <g transform="translate(310,400)"><rect x="-54" y="-22" width="108" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="-2">Royal Canin</text><text x="0" y="14">/ Pedigree</text></g>
    <g transform="translate(440,400)"><rect x="-54" y="-22" width="108" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="-2">treat</text><text x="0" y="14">purchases</text></g>
  </g>
  <line x1="180" y1="378" x2="250" y2="306" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5" marker-end="url(#mp)"/>
  <line x1="320" y1="378" x2="335" y2="302" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5" marker-end="url(#mp)"/>
  <line x1="440" y1="378" x2="410" y2="306" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5" marker-end="url(#mp)"/>

  <!-- output: recommendation funnel (right) -->
  <line x1="435" y1="238" x2="500" y2="238" stroke="#c87533" stroke-width="3" marker-end="url(#mpo)"/>
  <g transform="translate(505,160)">
    <rect x="0" y="0" width="380" height="156" rx="12" fill="#fdfaf2" stroke="#c87533" stroke-width="3"/>
    <text x="190" y="30" text-anchor="middle" class="hd">…comes back as a pitch</text>
    <text x="20" y="62" class="sm">→ "recommendations" in the Whistle app</text>
    <text x="20" y="88" class="sm">→ "wellness reports" from the Mars clinic</text>
    <text x="20" y="114" class="sm">→ targeted marketing for Mars-brand food</text>
    <text x="20" y="140" class="sm">→ all pointing back at Mars-owned products</text>
  </g>

  <line x1="40" y1="452" x2="900" y2="452" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="470" y="480" text-anchor="middle" class="cap">Every interaction Mars has with the dog is informed by every other one — one lake, one owner.</text>
</svg>
