<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-label="Mars conflict-of-interest loop">
  <rect width="920" height="500" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
    .red{fill:#c14a3a;}
  </style>
  <defs>
    <marker id="ai" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#c14a3a"/></marker>
  </defs>

  <!-- collar (bottom-left) -->
  <g transform="translate(150,360)">
    <circle cx="0" cy="0" r="40" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="6" fill="#c87533"/>
    <text x="0" y="68" text-anchor="middle" class="sm">the collar on the dog</text>
  </g>

  <!-- Mars analytics (top-center) -->
  <g transform="translate(360,90)">
    <rect x="0" y="0" width="240" height="120" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="120" y="34" text-anchor="middle" class="hd">Mars analytics</text>
    <line x1="20" y1="50" x2="220" y2="50" stroke="#1a1d24" stroke-opacity="0.12"/>
    <text x="120" y="74" text-anchor="middle" class="sm">activity + location telemetry</text>
    <text x="120" y="96" text-anchor="middle" class="sm">+ food-purchase history (own brands)</text>
  </g>

  <!-- owner's app (right) -->
  <g transform="translate(700,250)">
    <rect x="0" y="0" width="58" height="96" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <line x1="0" y1="14" x2="58" y2="14" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="29" y="120" text-anchor="middle" class="sm">owner's app</text>
  </g>

  <!-- food shelf (bottom-right) -->
  <g transform="translate(640,400)">
    <rect x="0" y="0" width="170" height="56" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g fill="#c87533" fill-opacity="0.18" stroke="#c87533" stroke-width="2">
      <rect x="14" y="12" width="22" height="32" rx="2"/>
      <rect x="46" y="12" width="22" height="32" rx="2"/>
      <rect x="78" y="12" width="22" height="32" rx="2"/>
      <rect x="110" y="12" width="22" height="32" rx="2"/>
      <rect x="142" y="8" width="20" height="36" rx="2"/>
    </g>
    <text x="85" y="76" text-anchor="middle" class="sm">the same company's pet food</text>
  </g>

  <!-- arrow: collar -> analytics (telemetry up) -->
  <path d="M 178 326 Q 280 200 372 165" fill="none" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ai)"/>
  <text x="240" y="250" class="sm">telemetry ↑</text>

  <!-- arrow: analytics -> app (recommendation) -->
  <path d="M 600 165 Q 700 200 728 246" fill="none" stroke="#c14a3a" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="648" y="200" class="lab red">"feed more"</text>
  <text x="648" y="220" class="sm red">recommendation ↓</text>

  <!-- arrow: app -> food shelf (sell) -->
  <path d="M 729 348 Q 715 384 720 396" fill="none" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#ar2)"/>

  <!-- closed-loop note -->
  <line x1="40" y1="466" x2="880" y2="466" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="460" y="494" text-anchor="middle" class="cap">The party measuring the dog and the party selling the food are now the same party.</text>
</svg>
