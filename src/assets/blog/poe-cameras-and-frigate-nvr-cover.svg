<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="PoE cameras and Frigate">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- four PoE cameras down the left, each a single PoE cable to the switch -->
  <g>
    <g transform="translate(120 120)"><rect x="-40" y="-22" width="80" height="44" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><circle cx="14" cy="0" r="13" fill="#1a1d24"/><circle cx="14" cy="0" r="5" fill="#fdfaf2"/></g>
    <g transform="translate(120 230)"><rect x="-40" y="-22" width="80" height="44" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><circle cx="14" cy="0" r="13" fill="#1a1d24"/><circle cx="14" cy="0" r="5" fill="#fdfaf2"/></g>
    <g transform="translate(120 340)"><rect x="-40" y="-22" width="80" height="44" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><circle cx="14" cy="0" r="13" fill="#1a1d24"/><circle cx="14" cy="0" r="5" fill="#fdfaf2"/></g>
    <g transform="translate(120 450)"><rect x="-40" y="-22" width="80" height="44" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><circle cx="14" cy="0" r="13" fill="#1a1d24"/><circle cx="14" cy="0" r="5" fill="#fdfaf2"/></g>
  </g>
  <!-- PoE cables converging to a switch -->
  <g stroke="#6a4c93" stroke-width="4" fill="none">
    <path d="M160 120 C 280 160, 340 260, 400 290"/>
    <path d="M160 230 C 280 250, 340 280, 400 300"/>
    <path d="M160 340 C 280 330, 340 320, 400 310"/>
    <path d="M160 450 C 280 410, 340 350, 400 320"/>
  </g>
  <!-- PoE switch -->
  <g transform="translate(400 285)"><rect x="0" y="0" width="120" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><g fill="#6a4c93"><rect x="14" y="32" width="12" height="10"/><rect x="34" y="32" width="12" height="10"/><rect x="54" y="32" width="12" height="10"/><rect x="74" y="32" width="12" height="10"/></g></g>
  <!-- to Frigate server -->
  <path d="M520 310 L600 310" stroke="#1a1d24" stroke-width="5"/>
  <g transform="translate(600 250)">
    <rect x="0" y="0" width="160" height="120" rx="14" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="6"/>
    <g stroke="#6a4c93" stroke-width="5" stroke-linecap="round"><line x1="24" y1="34" x2="120" y2="34"/><line x1="24" y1="60" x2="120" y2="60"/><line x1="24" y1="86" x2="90" y2="86"/></g>
    <!-- coral usb stub -->
    <rect x="160" y="50" width="30" height="20" rx="3" fill="#1a1d24"/>
  </g>

  <!-- detection result: a person box drawn on a frame, right -->
  <g transform="translate(880 230)">
    <rect x="0" y="0" width="240" height="160" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <!-- a person silhouette -->
    <g transform="translate(120 95)" fill="#1a1d24" fill-opacity="0.7"><circle cx="0" cy="-34" r="16"/><path d="M-18 -12 q18 -14 36 0 l6 44 l-14 0 l-4 -28 l-12 0 l-4 28 l-14 0 z"/></g>
    <!-- detection bounding box around the person -->
    <rect x="86" y="36" width="68" height="104" rx="4" fill="none" stroke="#3a7d44" stroke-width="4"/>
    <!-- small confidence tick -->
    <rect x="86" y="22" width="40" height="12" rx="2" fill="#3a7d44"/>
  </g>
  <!-- link server -> frame -->
  <path d="M760 310 C 810 300, 840 290, 876 290" stroke="#6a4c93" stroke-width="4" fill="none"/>
</svg>
