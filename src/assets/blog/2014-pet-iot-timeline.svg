<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="A 2014 timeline of the household's pet-tech across twelve months.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">PET-TECH IN THE HOUSE · 2014</text>

  <!-- month axis -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#7a808c" text-anchor="middle">
    <text x="120" y="92">JAN</text>
    <text x="190" y="92">FEB</text>
    <text x="260" y="92">MAR</text>
    <text x="330" y="92">APR</text>
    <text x="400" y="92">MAY</text>
    <text x="470" y="92">JUN</text>
    <text x="540" y="92">JUL</text>
    <text x="610" y="92">AUG</text>
    <text x="680" y="92">SEP</text>
    <text x="750" y="92">OCT</text>
    <text x="820" y="92">NOV</text>
    <text x="890" y="92">DEC</text>
  </g>
  <line x1="120" y1="104" x2="930" y2="104" stroke="#1a1d24" stroke-width="1.5" opacity="0.2"/>
  <g stroke="#1a1d24" stroke-width="1" opacity="0.1">
    <line x1="120" y1="104" x2="120" y2="408"/>
    <line x1="190" y1="104" x2="190" y2="408"/>
    <line x1="260" y1="104" x2="260" y2="408"/>
    <line x1="330" y1="104" x2="330" y2="408"/>
    <line x1="400" y1="104" x2="400" y2="408"/>
    <line x1="470" y1="104" x2="470" y2="408"/>
    <line x1="540" y1="104" x2="540" y2="408"/>
    <line x1="610" y1="104" x2="610" y2="408"/>
    <line x1="680" y1="104" x2="680" y2="408"/>
    <line x1="750" y1="104" x2="750" y2="408"/>
    <line x1="820" y1="104" x2="820" y2="408"/>
    <line x1="890" y1="104" x2="890" y2="408"/>
  </g>

  <!-- ============ DOG LANE ============ -->
  <text x="40" y="150" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">DOG · Atom</text>
  <!-- continuous Whistle activity bar running the whole year -->
  <rect x="120" y="162" width="810" height="30" rx="6" fill="#c87533" opacity="0.85"/>
  <text x="525" y="182" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#fdfaf2">the Whistle — a full year of activity data</text>

  <!-- May: Whistle teases a cellular GPS device that doesn't ship this year -->
  <g transform="translate(400,212)">
    <circle cx="0" cy="0" r="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <line x1="0" y1="-50" x2="0" y2="-6" stroke="#1a1d24" stroke-width="1.5" opacity="0.35" stroke-dasharray="3 4"/>
    <rect x="-72" y="6" width="160" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <text x="8" y="22" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">cellular GPS teased</text>
    <text x="8" y="35" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">→ didn't ship in 2014</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="278" x2="1040" y2="278" stroke="#1a1d24" stroke-width="1" opacity="0.1"/>

  <!-- ============ CAT LANE ============ -->
  <text x="40" y="316" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">CAT · Joule</text>
  <!-- the empty lane: a faint dashed rail showing nothing shipped -->
  <line x1="120" y1="330" x2="930" y2="330" stroke="#1a1d24" stroke-width="2" opacity="0.18" stroke-dasharray="2 8"/>

  <!-- April: Joule + passive microchip (the only real cat mark) -->
  <g transform="translate(330,330)">
    <circle cx="0" cy="0" r="7" fill="#c87533" stroke="#1a1d24" stroke-width="3"/>
    <rect x="-58" y="14" width="116" height="48" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <text x="0" y="32" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">Joule arrives</text>
    <text x="0" y="47" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">+ passive microchip</text>
    <text x="0" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">(the entire stack)</text>
  </g>

  <!-- June: PetCube bought + returned (struck through) -->
  <g transform="translate(470,330)">
    <circle cx="0" cy="0" r="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
    <rect x="-52" y="-66" width="120" height="48" rx="7" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-opacity="0.55"/>
    <line x1="0" y1="-18" x2="0" y2="-2" stroke="#c14a3a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 4"/>
    <text x="8" y="-46" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a" text-decoration="line-through">PetCube camera</text>
    <text x="8" y="-30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c14a3a">bought → returned</text>
  </g>

  <text x="540" y="448" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">One lane runs all year on real data; the other has a single mark in April and a thing I sent back.</text>
</svg>
