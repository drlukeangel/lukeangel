<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 480" width="1040" height="480" role="img" aria-label="Four smart-home laws that held across thirteen years">
  <rect x="0.5" y="0.5" width="1039" height="479" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .w{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;font-weight:700;fill:#3a7d44}
    .l{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#7a808c}
    .x{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13.5px;fill:#c14a3a}
    .why{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <!-- four rows: WINNER  >  LOSER, with a why on the right -->
  <!-- row 1 -->
  <g transform="translate(0,70)">
    <rect x="60" y="-30" width="200" height="58" rx="10" fill="#3a7d44" fill-opacity="0.10" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="160" y="4" text-anchor="middle" class="w">local execution</text>
    <text x="298" y="4" text-anchor="middle" class="l" font-size="22">&gt;</text>
    <rect x="336" y="-30" width="180" height="58" rx="10" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="426" y="4" text-anchor="middle" class="x">the cloud</text>
    <text x="560" y="-2" class="why">the cloud is rented infrastructure —</text>
    <text x="560" y="16" class="why">Wink and Insteon went dark and bricked homes</text>
  </g>
  <!-- row 2 -->
  <g transform="translate(0,170)">
    <rect x="60" y="-30" width="200" height="58" rx="10" fill="#3a7d44" fill-opacity="0.10" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="160" y="4" text-anchor="middle" class="w">mesh radios</text>
    <text x="298" y="4" text-anchor="middle" class="l" font-size="22">&gt;</text>
    <rect x="336" y="-30" width="180" height="58" rx="10" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="426" y="4" text-anchor="middle" class="x">Wi-Fi peripherals</text>
    <text x="560" y="-2" class="why">2012 Zigbee bulbs still run;</text>
    <text x="560" y="16" class="why">the 2013 Wi-Fi plugs died with their cloud</text>
  </g>
  <!-- row 3 -->
  <g transform="translate(0,270)">
    <rect x="60" y="-30" width="200" height="58" rx="10" fill="#3a7d44" fill-opacity="0.10" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="160" y="4" text-anchor="middle" class="w">open protocols</text>
    <text x="298" y="4" text-anchor="middle" class="l" font-size="22">&gt;</text>
    <rect x="336" y="-30" width="180" height="58" rx="10" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="426" y="4" text-anchor="middle" class="x">vendor lock-in</text>
    <text x="560" y="-2" class="why">Zigbee / Z-Wave / MQTT / IP outlived</text>
    <text x="560" y="16" class="why">every vendor that bet on a private cloud</text>
  </g>
  <!-- row 4 -->
  <g transform="translate(0,370)">
    <rect x="60" y="-30" width="456" height="58" rx="10" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.4"/>
    <text x="288" y="4" text-anchor="middle" class="w" fill="#6a4c93">the hub is always the bottleneck — upgrade it first</text>
    <text x="560" y="-2" class="why">every era's ceiling was the hub;</text>
    <text x="560" y="16" class="why">a better hub unblocked everything else</text>
  </g>

  <text x="520" y="448" text-anchor="middle" class="cap">Four laws I'd now carve over the door. Thirteen years kept proving them.</text>
</svg>
