<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">Docker service discovery — services registering and querying a distributed config store</title>
  <desc id="d">2016-era flat-material diagram: a distributed key/value store at the center (etcd/consul); two services registering themselves on startup; a third service querying the store to find the others.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Service discovery — distributed config store as the source of truth</text>

  <!-- central kv store -->
  <g transform="translate(310,160)">
    <rect width="180" height="140" fill="#fff" stroke="#cfd5db" stroke-width="2" rx="6"/>
    <rect width="180" height="32" fill="#1a1d24" rx="6"/>
    <rect y="22" width="180" height="10" fill="#1a1d24"/>
    <text x="90" y="22" text-anchor="middle" class="label" fill="#fff">distributed kv store</text>
    <text x="90" y="60" text-anchor="middle" class="small">etcd · Consul · ZooKeeper</text>

    <line x1="14" y1="76" x2="166" y2="76" stroke="#cfd5db"/>

    <text x="14" y="94" class="small">/services/web/v1 → 10.0.9.2:8080</text>
    <text x="14" y="110" class="small">/services/api/v2 → 10.0.9.4:9000</text>
    <text x="14" y="126" class="small">/services/db/main → 10.0.9.5:5432</text>
  </g>

  <!-- service A registering -->
  <g transform="translate(40,100)">
    <rect width="180" height="80" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#00bcd4" rx="4"/>
    <rect y="18" width="180" height="10" fill="#00bcd4"/>
    <text x="90" y="20" text-anchor="middle" class="label" fill="#fff">web (instance 1)</text>
    <text x="14" y="50" class="small">on startup:</text>
    <text x="14" y="66" class="small">PUT /services/web/v1</text>
  </g>
  <line x1="222" y1="142" x2="310" y2="200" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>
  <text x="226" y="180" class="small" fill="#0066cc">register</text>

  <!-- service B registering -->
  <g transform="translate(40,260)">
    <rect width="180" height="80" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#00bcd4" rx="4"/>
    <rect y="18" width="180" height="10" fill="#00bcd4"/>
    <text x="90" y="20" text-anchor="middle" class="label" fill="#fff">api (instance 2)</text>
    <text x="14" y="50" class="small">on startup:</text>
    <text x="14" y="66" class="small">PUT /services/api/v2</text>
  </g>
  <line x1="222" y1="300" x2="310" y2="262" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>
  <text x="226" y="290" class="small" fill="#0066cc">register</text>

  <!-- consumer querying -->
  <g transform="translate(580,180)">
    <rect width="180" height="100" fill="#fff" stroke="#cfd5db" rx="4"/>
    <rect width="180" height="28" fill="#ff6b35" rx="4"/>
    <rect y="18" width="180" height="10" fill="#ff6b35"/>
    <text x="90" y="20" text-anchor="middle" class="label" fill="#fff">jobs worker</text>
    <text x="14" y="50" class="small">at request time:</text>
    <text x="14" y="66" class="small">GET /services/api/v2</text>
    <text x="14" y="82" class="small">→ 10.0.9.4:9000</text>
  </g>
  <line x1="580" y1="230" x2="490" y2="222" stroke="#ff6b35" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="500" y="216" class="small" fill="#ff6b35">discover</text>

  <!-- caption row -->
  <text x="40" y="400" class="small">- services register their address on startup, deregister on shutdown</text>
  <text x="40" y="416" class="small">- consumers never hard-code addresses — they query the store</text>
  <text x="40" y="432" class="small">- failover, scale-up, and rolling deploys all just look like updates to keys</text>
</svg>
