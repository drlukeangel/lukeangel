<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 480" width="1040" height="480" role="img" aria-label="The inverted pipeline: default every datum to de-identified Tier 1 and promote only through an explicit logged join.">
  <rect width="1040" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="520" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="1" fill="#1a1d24">DEFAULT DE-IDENTIFIED &#183; PROMOTE ONLY THROUGH A LOGGED JOIN</text>

  <!-- ===== TOP: the usual instinct (greyed) ===== -->
  <g transform="translate(60,76)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">the usual instinct &#8212; collect everything identifiable, lock it down later</text>
    <g transform="translate(0,16)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#7a808c">
      <rect x="0" y="0" width="180" height="44" rx="7" fill="#c14a3a" fill-opacity="0.05" stroke="#c14a3a" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="90" y="20" text-anchor="middle">stamp identity at ingest</text>
      <text x="90" y="37" text-anchor="middle" font-size="10" fill="#7a808c">every event = Tier 3</text>
      <path d="M188 22 H236" stroke="#c14a3a" stroke-width="2" fill="none"/><path d="M240 22 l-12 -7 v14 z" fill="#c14a3a"/>
      <text x="250" y="18" fill="#c14a3a">whole firehose regulated</text>
      <text x="250" y="35" font-size="10.5" fill="#7a808c">encrypt + isolate everything, more risk not less</text>
    </g>
  </g>

  <line x1="40" y1="170" x2="1000" y2="170" stroke="#1a1d24" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- ===== BOTTOM: what we built ===== -->
  <text x="60" y="200" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#3a7d44">what we built &#8212; earn your way up, per record</text>

  <!-- device events arrive -->
  <g transform="translate(60,228)">
    <rect x="0" y="0" width="150" height="64" rx="9" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.4"/>
    <text x="75" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#357a8c">device events</text>
    <text x="75" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">no identity attached</text>
  </g>
  <path d="M212 260 H270" stroke="#357a8c" stroke-width="2.6" fill="none"/><path d="M274 260 l-12 -7 v14 z" fill="#357a8c"/>

  <!-- Tier 1 default store -->
  <g transform="translate(284,224)">
    <rect x="0" y="0" width="190" height="72" rx="10" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-width="2.8"/>
    <text x="95" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#3a7d44">Tier 1 store (default)</text>
    <text x="95" y="52" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">de-identified, full stop</text>
  </g>

  <!-- the only path up: logged join service -->
  <g transform="translate(540,210)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.8"/>
    <!-- a small gate / key glyph -->
    <g transform="translate(34,50)" stroke="#357a8c" stroke-width="2.4" fill="none" stroke-linecap="round">
      <rect x="-12" y="-14" width="24" height="28" rx="4" fill="#fdfaf2"/>
      <path d="M-7 -14 v-7 a7 7 0 0 1 14 0 v7"/>
    </g>
    <text x="118" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#357a8c">join service</text>
    <text x="118" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">explicit, logged</text>
    <text x="118" y="78" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">reason + actor</text>
  </g>
  <path d="M476 260 H536" stroke="#357a8c" stroke-width="2.6" fill="none"/><path d="M540 260 l-12 -7 v14 z" fill="#357a8c"/>
  <text x="508" y="248" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#357a8c">only path up</text>

  <!-- Tier 2 / Tier 3 -->
  <g transform="translate(800,212)" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="0" y="0" width="170" height="44" rx="8" fill="#357a8c" fill-opacity="0.08" stroke="#357a8c" stroke-width="2.2"/>
    <text x="85" y="27" text-anchor="middle" font-size="12.5" fill="#357a8c">Tier 2 &#183; pseudonymous</text>
    <rect x="0" y="56" width="170" height="44" rx="8" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-width="2.2"/>
    <text x="85" y="83" text-anchor="middle" font-size="12.5" fill="#c14a3a">Tier 3 &#183; identifiable</text>
  </g>
  <path d="M742 250 H796" stroke="#357a8c" stroke-width="2.4" fill="none"/><path d="M800 250 l-12 -7 v14 z" fill="#357a8c"/>
  <path d="M742 270 C 770 270, 778 280, 796 286" stroke="#c14a3a" stroke-width="2.4" fill="none"/><path d="M800 287 l-13 -5 5 -12 z" fill="#c14a3a"/>

  <!-- audit-log note -->
  <text x="520" y="356" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">the promotion log IS the map of where regulatory exposure actually is</text>

  <!-- caption -->
  <text x="520" y="448" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">your surface shrinks to exactly the rows you chose to elevate &#8212; the set you can hand an auditor without a sweep</text>
</svg>
