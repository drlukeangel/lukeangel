<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A device and a cloud, each carrying a certified seal, joined by a locked two-way channel — mutual identity and the trusted channel it opens.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="dct-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dct-dots)"/>
  <rect width="24" height="630" fill="#c14a3a"/>

  <!-- device (left) -->
  <rect x="120" y="252" width="230" height="180" rx="24" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <circle cx="158" cy="290" r="8" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <circle cx="158" cy="290" r="3" fill="#c14a3a"/>
  <rect x="158" y="322" width="158" height="78" rx="10" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.35"/>
  <!-- device cert seal -->
  <g transform="translate(330,252)">
    <circle cx="0" cy="0" r="22" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
    <path d="M-9 15 L-13 37 L-3 29 L0 39 L3 29 L13 37 L9 15" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-10 0 l7 8 12 -15" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- trusted channel -->
  <line x1="350" y1="340" x2="392" y2="340" stroke="#1a1d24" stroke-width="4"/>
  <rect x="392" y="300" width="416" height="80" rx="40" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <g stroke="#1a1d24" stroke-width="4" fill="#1a1d24">
    <line x1="430" y1="340" x2="498" y2="340"/><path d="M426 340 l16 -8 v16 z"/>
    <line x1="702" y1="340" x2="770" y2="340"/><path d="M774 340 l-16 -8 v16 z"/>
  </g>
  <g transform="translate(576,312)">
    <rect x="0" y="26" width="48" height="38" rx="7" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5"/>
    <path d="M9 26 v-11 a15 15 0 0 1 30 0 v11" fill="none" stroke="#c14a3a" stroke-width="5"/>
    <circle cx="24" cy="44" r="5" fill="#c14a3a"/>
  </g>
  <line x1="808" y1="340" x2="852" y2="340" stroke="#1a1d24" stroke-width="4"/>

  <!-- cloud (right) -->
  <path d="M 858 400 a 40 40 0 0 1 -4 -80 a 52 52 0 0 1 100 -30 a 48 48 0 0 1 92 18 a 42 42 0 0 1 6 92 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <!-- cloud cert seal -->
  <g transform="translate(1052,302)">
    <circle cx="0" cy="0" r="22" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
    <path d="M-9 15 L-13 37 L-3 29 L0 39 L3 29 L13 37 L9 15" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-10 0 l7 8 12 -15" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
