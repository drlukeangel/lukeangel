<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" role="img" aria-label="2022 forecast scorecard">
  <rect width="940" height="600" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:16px;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:16px;fill:#5b616b;}
    .big{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:22px;fill:#1a1d24;font-weight:700;}
  </style>
  <text x="40" y="46" class="big">2022 → 2023 forecast: 4 of 8 + a partial</text>

  <g transform="translate(40,76)"><text x="0" y="24" class="lab">Mars acquires another notable player</text><text x="430" y="24" class="mut">— Champion Petfoods (Feb)</text>
    <g transform="translate(800,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,134)"><text x="0" y="24" class="lab">A credible AI behavior product ships</text><text x="430" y="24" class="mut">— mostly theater</text>
    <g transform="translate(800,12)"><circle r="16" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5"/><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,192)"><text x="0" y="24" class="lab">Atom's baseline drifts (he turns 10)</text><text x="430" y="24" class="mut">— activity down, sleep broken</text>
    <g transform="translate(800,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,250)"><text x="0" y="24" class="lab">Move into the new build, redesign layout</text><text x="430" y="24" class="mut">— done, October</text>
    <g transform="translate(800,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,308)"><text x="0" y="24" class="lab">Petivity changes its model</text><text x="430" y="24" class="mut">— no, still no fee</text>
    <g transform="translate(800,12)"><circle r="16" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5"/><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,366)"><text x="0" y="24" class="lab">A non-Mars health tracker launches</text><text x="430" y="24" class="mut">— nothing credible</text>
    <g transform="translate(800,12)"><circle r="16" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5"/><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,424)"><text x="0" y="24" class="lab">More Halo-class shock-fences ship</text>
    <g transform="translate(800,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#1a1d24" stroke-opacity="0.08"/></g>
  <g transform="translate(40,482)"><text x="0" y="24" class="lab">First Matter-compatible pet device</text><text x="430" y="24" class="mut">— hubs yes, pet-specific no</text>
    <g transform="translate(800,12)"><circle r="16" fill="#c87533" fill-opacity="0.14" stroke="#c87533" stroke-width="2.5"/><path d="M 0 -16 A 16 16 0 0 0 0 16 Z" fill="#c87533" fill-opacity="0.5"/></g></g>

  <line x1="40" y1="536" x2="880" y2="536" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="568" class="cap">Worst score yet — but the one I'd have traded to miss, the senior-dog drift, landed.</text>
</svg>
