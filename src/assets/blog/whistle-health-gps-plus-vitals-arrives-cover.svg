<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="behavior tracked, vitals missing">
  <defs>
    <pattern id="dotsWH" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsWH)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- center: the collar puck -->
  <g transform="translate(480,320)">
    <path d="M-150 60 C -60 10, 60 10, 150 60" fill="none" stroke="#1a1d24" stroke-width="30" stroke-opacity="0.9" stroke-linecap="round"/>
    <path d="M-150 60 C -60 10, 60 10, 150 60" fill="none" stroke="#fdfaf2" stroke-width="4" stroke-dasharray="2 13" stroke-opacity="0.6"/>
    <rect x="-50" y="-2" width="100" height="68" rx="20" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="32" r="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="32" r="4" fill="#c87533"/>
  </g>

  <!-- behavior icons it DOES sense, ringed around it (in accent) -->
  <!-- scratch (paw) -->
  <g transform="translate(250,170)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <ellipse cx="0" cy="6" rx="11" ry="9" fill="#c87533" fill-opacity="0.6"/>
    <circle cx="-9" cy="-9" r="4" fill="#c87533" fill-opacity="0.6"/>
    <circle cx="0" cy="-13" r="4" fill="#c87533" fill-opacity="0.6"/>
    <circle cx="9" cy="-9" r="4" fill="#c87533" fill-opacity="0.6"/>
  </g>
  <!-- lick (tongue) -->
  <g transform="translate(480,120)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <path d="M-7 -12 a7 7 0 0 1 14 0 l0 14 a7 7 0 0 1 -14 0 Z" fill="#c87533" fill-opacity="0.5"/>
    <line x1="0" y1="-12" x2="0" y2="10" stroke="#fff" stroke-width="2"/>
  </g>
  <!-- drink (drop) -->
  <g transform="translate(710,170)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <path d="M0 -16 C 12 0, 12 14, 0 14 C -12 14, -12 0, 0 -16 Z" fill="#c87533" fill-opacity="0.5"/>
  </g>
  <!-- sleep (crescent) -->
  <g transform="translate(250,470)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <path d="M8 -14 a16 16 0 1 0 0 28 a13 13 0 1 1 0 -28 Z" fill="#c87533" fill-opacity="0.55"/>
  </g>
  <!-- activity (running steps as a zigzag) -->
  <g transform="translate(710,470)">
    <circle cx="0" cy="0" r="34" fill="#fff" stroke="#c87533" stroke-width="3"/>
    <path d="M-16 8 l8 -12 l7 8 l9 -14" fill="none" stroke="#c87533" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- faint links from collar to each behavior icon -->
  <g stroke="#c87533" stroke-width="2" stroke-opacity="0.35" stroke-dasharray="3 6">
    <line x1="430" y1="300" x2="278" y2="195"/>
    <line x1="480" y1="290" x2="480" y2="150"/>
    <line x1="530" y1="300" x2="682" y2="195"/>
    <line x1="435" y1="345" x2="280" y2="448"/>
    <line x1="525" y1="345" x2="680" y2="448"/>
  </g>

  <!-- the vital it does NOT measure: faded heart-rate trace + question mark (set apart, right side) -->
  <g transform="translate(990,310)">
    <rect x="-110" y="-90" width="220" height="180" rx="16" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="7 7" stroke-opacity="0.7"/>
    <!-- faded ECG trace -->
    <path d="M-86 0 L-50 0 L-40 -34 L-28 40 L-16 0 L20 0 L30 -30 L42 36 L54 0 L86 0"
          fill="none" stroke="#c14a3a" stroke-width="3" stroke-opacity="0.35"/>
    <!-- big question mark, hand-drawn as vector paths (text-free) -->
    <g fill="none" stroke="#c14a3a" stroke-opacity="0.45" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <!-- hook + stem: opens up-left, curves over the top, down the right, and tucks into the stem -->
      <path d="M-17 -52 a18 18 0 0 1 33 8 c0 14 -16 16 -16 30"/>
    </g>
    <!-- dot of the question mark (filled, no stroke) -->
    <circle cx="0" cy="-3" r="5.5" fill="#c14a3a" fill-opacity="0.45"/>
  </g>
</svg>
