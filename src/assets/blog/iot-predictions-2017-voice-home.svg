<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-label="The voice-first home">
  <rect width="760" height="540" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="50" font-size="20" fill="#1a1d24" letter-spacing="1">THE HOME OF 2017</text>
    <text x="40" y="74" font-size="13" fill="#7a808c">voice became the interface — the speaker is the hub</text>

    <!-- voice reach ring -->
    <circle cx="380" cy="300" r="190" fill="#0066cc" fill-opacity="0.05" stroke="#0066cc" stroke-opacity="0.35" stroke-dasharray="5 5"/>
    <text x="380" y="135" font-size="12" fill="#0066cc" text-anchor="middle" letter-spacing="1">VOICE REACH</text>

    <!-- central speaker hub -->
    <g transform="translate(380,300)">
      <rect x="-34" y="-50" width="68" height="100" rx="34" fill="#0066cc"/>
      <circle cx="0" cy="-22" r="13" fill="#fdfaf2"/>
      <circle cx="0" cy="-22" r="5" fill="#0066cc"/>
      <rect x="-22" y="14" width="44" height="22" rx="11" fill="#fdfaf2" fill-opacity="0.25"/>
    </g>
    <text x="380" y="380" font-size="12" fill="#1a1d24" text-anchor="middle">voice hub</text>

    <!-- voice-reachable device nodes (12) arranged around ring -->
    <!-- helper: small rounded device puck -->
    <g fill="#1a1d24">
      <!-- top arc -->
      <rect x="262" y="180" width="34" height="26" rx="6"/>
      <rect x="340" y="158" width="34" height="26" rx="6"/>
      <rect x="418" y="170" width="34" height="26" rx="6"/>
      <rect x="486" y="218" width="34" height="26" rx="6"/>
      <!-- sides -->
      <rect x="232" y="262" width="34" height="26" rx="6"/>
      <rect x="500" y="288" width="34" height="26" rx="6"/>
      <rect x="240" y="346" width="34" height="26" rx="6"/>
      <rect x="498" y="356" width="34" height="26" rx="6"/>
      <!-- bottom arc -->
      <rect x="300" y="420" width="34" height="26" rx="6"/>
      <rect x="372" y="438" width="34" height="26" rx="6"/>
      <rect x="442" y="420" width="34" height="26" rx="6"/>
      <rect x="318" y="208" width="34" height="26" rx="6"/>
    </g>
    <!-- thin spokes from hub to a few nodes -->
    <g stroke="#0066cc" stroke-opacity="0.4" stroke-width="1.5">
      <line x1="380" y1="300" x2="279" y2="193"/>
      <line x1="380" y1="300" x2="357" y2="171"/>
      <line x1="380" y1="300" x2="435" y2="183"/>
      <line x1="380" y1="300" x2="249" y2="359"/>
      <line x1="380" y1="300" x2="515" y2="369"/>
      <line x1="380" y1="300" x2="389" y2="451"/>
    </g>
    <text x="380" y="498" font-size="12" fill="#3a7d44" text-anchor="middle">12 devices answer to your voice</text>

    <!-- app-only devices, outside the ring -->
    <g>
      <rect x="630" y="120" width="44" height="60" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
      <rect x="638" y="130" width="28" height="34" rx="3" fill="#c14a3a" fill-opacity="0.18"/>
      <rect x="630" y="200" width="44" height="60" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
      <rect x="638" y="210" width="28" height="34" rx="3" fill="#c14a3a" fill-opacity="0.18"/>
      <text x="652" y="288" font-size="11" fill="#c14a3a" text-anchor="middle">still apps</text>
      <text x="652" y="304" font-size="11" fill="#c14a3a" text-anchor="middle">(2)</text>
    </g>
    <text x="652" y="104" font-size="11" fill="#7a808c" text-anchor="middle">outside voice</text>
  </g>
</svg>
