<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- baseline the tasks drain to -->
  <line x1="120" y1="500" x2="1140" y2="500" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>

  <!-- healthy tasks: short ink bars that drained back to baseline -->
  <g fill="#1a1d24" fill-opacity="0.55">
    <rect x="150" y="462" width="44" height="38"/>
    <rect x="214" y="444" width="44" height="56"/>
    <rect x="278" y="470" width="44" height="30"/>
    <rect x="342" y="452" width="44" height="48"/>
    <rect x="406" y="468" width="44" height="32"/>
    <rect x="470" y="440" width="44" height="60"/>
    <rect x="534" y="466" width="44" height="34"/>
  </g>

  <!-- the leak: a rust staircase of tasks spawned and never finished, growing unbounded -->
  <g fill="#b7410e">
    <rect x="660" y="430" width="56" height="70"/>
    <rect x="736" y="372" width="56" height="128"/>
    <rect x="812" y="300" width="56" height="200"/>
    <rect x="888" y="214" width="56" height="286"/>
    <rect x="964" y="120" width="56" height="380"/>
    <rect x="1040" y="70" width="56" height="430"/>
  </g>

  <!-- a thin arrow-of-growth cue: an open chevron rising over the staircase -->
  <polyline points="660,400 1068,90" fill="none" stroke="#1a1d24" stroke-opacity="0.35"
            stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>
</svg>
