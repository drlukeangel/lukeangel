<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="Mixed-protocol state mid-migration">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24" text-anchor="middle">

    <text x="500" y="36" font-size="15" fill="#6a4c93">where each device lives, mid-migration</text>

    <!-- Pi / HA box (left, the destination) -->
    <g transform="translate(250 110)">
      <rect x="-150" y="0" width="300" height="270" rx="12" fill="#6a4c93" fill-opacity="0.07" stroke="#6a4c93" stroke-width="2.5"/>
      <text x="0" y="26" font-size="14" fill="#6a4c93">Raspberry Pi — Home Assistant</text>
      <text x="0" y="44" font-size="11" fill="#3a7d44">runs local, survives an outage</text>

      <!-- Z-Stick row -->
      <rect x="-130" y="62" width="260" height="56" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <rect x="-118" y="76" width="20" height="12" rx="2" fill="#1a1d24"/>
      <text x="22" y="84" font-size="12">Aeotec Z-Stick Gen5</text>
      <text x="0" y="106" font-size="11" fill="#5b616b">8 Z-Wave nodes — migrated</text>

      <!-- iOS presence row -->
      <rect x="-130" y="130" width="260" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="0" y="151" font-size="12">HA iOS app — device_tracker</text>
      <text x="0" y="168" font-size="11" fill="#5b616b">group.family presence</text>

      <!-- ConBee placeholder -->
      <rect x="-130" y="192" width="260" height="56" rx="8" fill="#fdfaf2" stroke="#7a808c" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="0" y="213" font-size="12" fill="#7a808c">ConBee + deCONZ — on order</text>
      <text x="0" y="231" font-size="11" fill="#7a808c">Zigbee lands here next</text>
    </g>

    <!-- SmartThings hub (right, draining) -->
    <g transform="translate(770 150)">
      <rect x="-130" y="0" width="260" height="190" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-opacity="0.6"/>
      <text x="0" y="26" font-size="14" fill="#c14a3a">SmartThings hub — draining</text>
      <text x="0" y="44" font-size="11" fill="#5b616b">cloud round-trip, dies in outage</text>

      <rect x="-110" y="60" width="220" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="0" y="78" font-size="12">Zigbee motion + outlet</text>
      <text x="0" y="95" font-size="11" fill="#c14a3a">still here</text>

      <rect x="-110" y="116" width="220" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="0" y="134" font-size="12">Arrival Sensors</text>
      <text x="0" y="151" font-size="11" fill="#c14a3a">retiring — phone GPS wins</text>
    </g>

    <!-- migration arrow -->
    <path d="M640 245 L405 245" stroke="#3a7d44" stroke-width="3" marker-end="url(#g)"/>
    <text x="522" y="232" font-size="11" fill="#3a7d44">once ConBee arrives</text>

    <text x="500" y="452" font-size="12" fill="#5b616b">Z-Wave + presence already local; Zigbee is the last hop off the cloud</text>

    <defs>
      <marker id="g" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#3a7d44"/></marker>
    </defs>
  </g>
</svg>
