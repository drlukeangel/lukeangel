<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" width="940" height="430" role="img" aria-label="The twelve-year home-anchor arc.">
  <rect x="1" y="1" width="938" height="428" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#5b616b;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;fill:#5b616b;}
  </style>

  <text x="40" y="46" class="lbl" font-size="16" letter-spacing="1.5">"NEAR HOME MEANS STOP SPENDING BATTERY" — A TWELVE-YEAR ARC</text>

  <!-- step 1: 2013 Whistle, home WiFi as the anchor -->
  <g transform="translate(60,110)">
    <rect x="0" y="0" width="250" height="150" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="18" y="32" class="lbl" font-size="14" font-weight="600">2013 · first Whistle</text>
    <text x="18" y="60" class="mut" font-size="12.5">home Wi-Fi proximity =</text>
    <text x="18" y="78" class="mut" font-size="12.5">"the dog's home" signal</text>
    <text x="18" y="102" class="mut" font-size="12.5">syncs cheaply when in range</text>
    <text x="18" y="130" class="lbl" font-size="12.5" font-weight="600" fill="#3a7d44">no extra hardware</text>
  </g>

  <!-- arrow 1->2 -->
  <g fill="none" stroke="#1a1d24" stroke-width="2.5"><path d="M312 185 L356 185" marker-end="url(#ah)"/></g>

  <!-- step 2: the wall -->
  <g transform="translate(358,110)">
    <rect x="0" y="0" width="222" height="150" rx="12" fill="#fff" stroke="#c14a3a" stroke-width="2.5"/>
    <text x="18" y="32" class="lbl" font-size="14" font-weight="600" fill="#c14a3a">the wall</text>
    <text x="18" y="60" class="mut" font-size="12.5">Wi-Fi proximity fails where</text>
    <text x="18" y="84" class="mut" font-size="12.5">Wi-Fi won't reach:</text>
    <text x="18" y="106" class="mut" font-size="12.5">basements, outbuildings,</text>
    <text x="18" y="126" class="mut" font-size="12.5">patchy upstairs coverage</text>
  </g>

  <!-- arrow 2->3 -->
  <g fill="none" stroke="#1a1d24" stroke-width="2.5"><path d="M582 185 L626 185" marker-end="url(#ah)"/></g>

  <!-- step 3: 2025 Base Station -->
  <g transform="translate(628,110)">
    <rect x="0" y="0" width="252" height="150" rx="12" fill="#fff" stroke="#c87533" stroke-width="2.5"/>
    <text x="18" y="32" class="lbl" font-size="14" font-weight="600" fill="#c87533">2025 · Base Station</text>
    <text x="18" y="60" class="mut" font-size="12.5">a dedicated BLE beacon you</text>
    <text x="18" y="78" class="mut" font-size="12.5">plug in — home anchor</text>
    <text x="18" y="96" class="mut" font-size="12.5">independent of Wi-Fi reach</text>
    <text x="18" y="124" class="lbl" font-size="12.5" font-weight="600">same instinct, new puck</text>
  </g>

  <!-- the shared idea, underlined across the bottom -->
  <g transform="translate(60,300)">
    <rect x="0" y="0" width="820" height="56" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <text x="410" y="24" text-anchor="middle" class="lbl" font-size="13.5" font-weight="600">the idea is unchanged for twelve years: when the pet is home, stop checking where it is</text>
    <text x="410" y="44" text-anchor="middle" class="mut" font-size="12.5">what's new is bolting on a separate beacon to carry that signal where Wi-Fi won't go</text>
  </g>

  <text x="470" y="400" text-anchor="middle" class="cap" font-size="14.5">A tidy full circle — except the radio chosen for that 2025 beacon didn't have to be a 2013 answer.</text>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1d24"/>
    </marker>
  </defs>
</svg>
