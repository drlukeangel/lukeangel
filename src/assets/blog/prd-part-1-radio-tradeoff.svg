<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Three-radio tradeoff matrix">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE RADIOS, THREE JOBS</text>

  <!-- column headers -->
  <g font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">
    <text x="300" y="92" text-anchor="middle">role</text>
    <text x="500" y="92" text-anchor="middle">TX power</text>
    <text x="688" y="92" text-anchor="middle">throughput</text>
    <text x="912" y="92" text-anchor="middle">why this one</text>
  </g>
  <line x1="40" y1="104" x2="1080" y2="104" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.18"/>

  <!-- ROW 1 — WiFi -->
  <g font-family="ui-monospace,monospace">
    <rect x="40" y="120" width="190" height="86" rx="10" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="3"/>
    <text x="135" y="156" text-anchor="middle" font-size="14" fill="#1a1d24">WiFi 2.4 GHz</text>
    <text x="135" y="180" text-anchor="middle" font-size="11" fill="#2a52be">PRIMARY</text>
    <text x="300" y="168" text-anchor="middle" font-size="12" fill="#1a1d24">store-powered</text>
    <text x="500" y="168" text-anchor="middle" font-size="12" fill="#1a1d24">5–50 Mbps</text>
    <text x="688" y="168" text-anchor="middle" font-size="12" fill="#1a1d24">known coverage</text>
    <text x="912" y="161" text-anchor="middle" font-size="11.5" fill="#7a808c">store pays the bill;</text>
    <text x="912" y="179" text-anchor="middle" font-size="11.5" fill="#7a808c">we need only ~10 kbps</text>
  </g>

  <!-- ROW 2 — LTE-M -->
  <g font-family="ui-monospace,monospace">
    <rect x="40" y="218" width="190" height="86" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="135" y="254" text-anchor="middle" font-size="14" fill="#1a1d24">LTE-M (Cat-M1)</text>
    <text x="135" y="278" text-anchor="middle" font-size="11" fill="#7a808c">BACKUP</text>
    <text x="300" y="266" text-anchor="middle" font-size="12" fill="#1a1d24">50–100 mW</text>
    <text x="500" y="266" text-anchor="middle" font-size="12" fill="#1a1d24">~300 kbps</text>
    <text x="688" y="266" text-anchor="middle" font-size="12" fill="#1a1d24">carrier-wide</text>
    <text x="912" y="259" text-anchor="middle" font-size="11.5" fill="#7a808c">battery-IoT cellular;</text>
    <text x="912" y="277" text-anchor="middle" font-size="11.5" fill="#7a808c">deep-sleep paging</text>
  </g>

  <!-- ROW 3 — BLE -->
  <g font-family="ui-monospace,monospace">
    <rect x="40" y="316" width="190" height="86" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="135" y="352" text-anchor="middle" font-size="14" fill="#1a1d24">BLE 5.0</text>
    <text x="135" y="376" text-anchor="middle" font-size="11" fill="#7a808c">PROXIMITY</text>
    <text x="300" y="360" text-anchor="middle" font-size="12" fill="#1a1d24">~10 mW</text>
    <text x="500" y="360" text-anchor="middle" font-size="12" fill="#1a1d24">short bursts</text>
    <text x="688" y="360" text-anchor="middle" font-size="12" fill="#1a1d24">&lt; 10 m</text>
    <text x="912" y="353" text-anchor="middle" font-size="11.5" fill="#7a808c">terminal · staff tablet ·</text>
    <text x="912" y="371" text-anchor="middle" font-size="11.5" fill="#7a808c">phone QR — not transport</text>
  </g>

  <!-- vertical separators -->
  <g stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.10">
    <line x1="396" y1="120" x2="396" y2="402"/>
    <line x1="592" y1="120" x2="592" y2="402"/>
    <line x1="788" y1="120" x2="788" y2="402"/>
  </g>

  <text x="560" y="446" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">No single radio wins on power, reach, and cost at once — so the spec carries all three, each on the job it's best at.</text>
</svg>
