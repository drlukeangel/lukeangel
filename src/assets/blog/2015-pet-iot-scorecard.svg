<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" role="img" aria-label="2014 forecast scorecard">
  <rect width="920" height="600" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:16px;fill:#5b616b;}
    .big{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:22px;fill:#1a1d24;font-weight:700;}
  </style>

  <text x="40" y="48" class="big">2014 → 2015 forecast: 6 of 8</text>

  <!-- rows -->
  <!-- helper: each row y -->
  <!-- 1 hit -->
  <g transform="translate(40,80)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Manual SureFlap chip door reaches retail</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 2 hit -->
  <g transform="translate(40,138)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Installed the SureFlap door for Joule (May)</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 3 hit -->
  <g transform="translate(40,196)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Petnet ships to backers (late November)</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 4 hit -->
  <g transform="translate(40,254)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">A real dog-camera category forms</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 5 hit -->
  <g transform="translate(40,312)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Second-gen dog fitness band lands (FitBark)</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 6 hit -->
  <g transform="translate(40,370)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Vet-data platform pitched — and flops</text>
    <g transform="translate(770,12)"><circle r="16" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/><path d="M -7 1 L -2 7 L 9 -7" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- 7 MISS -->
  <g transform="translate(40,428)">
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>
    <text x="0" y="24" class="lab">Whistle ships a cellular-GPS model</text>
    <text x="430" y="24" class="mut">— a year early</text>
    <g transform="translate(770,12)"><circle r="16" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5"/><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/></g>
  </g>
  <!-- 8 MISS -->
  <g transform="translate(40,486)">
    <text x="0" y="24" class="lab">Tagg's parent divests or shutters it</text>
    <text x="430" y="24" class="mut">— still subsidized</text>
    <g transform="translate(770,12)"><circle r="16" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2.5"/><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/></g>
  </g>

  <!-- footer: the two misses are the same bet -->
  <line x1="40" y1="534" x2="880" y2="534" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="566" class="cap">Both misses were the same bet — location — placed a year too early.</text>
</svg>
