<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" role="img" aria-label="Convergence in one puck">
  <rect width="960" height="470" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#5b616b;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>

  <!-- center puck -->
  <g transform="translate(480,200)">
    <circle cx="0" cy="0" r="52" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#c87533" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#c87533"/>
    <rect x="-12" y="-64" width="24" height="16" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <text x="480" y="280" text-anchor="middle" class="sm">one puck</text>

  <!-- LEFT: home regime, low power, faint -->
  <text x="60" y="60" class="hd">AT HOME — cheap radios</text>
  <g opacity="0.55">
    <!-- house -->
    <g transform="translate(110,150)" fill="none" stroke="#1a1d24" stroke-width="3">
      <path d="M -38 28 L -38 -2 L 0 -34 L 38 -2 L 38 28 Z"/>
      <rect x="-12" y="2" width="24" height="26"/>
    </g>
    <text x="110" y="205" text-anchor="middle" class="sm">home Wi-Fi</text>
    <!-- phone -->
    <rect x="170" y="240" width="40" height="64" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <line x1="170" y1="251" x2="210" y2="251" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="190" y="324" text-anchor="middle" class="sm">phone (BLE)</text>
  </g>
  <!-- faint links into puck -->
  <line x1="150" y1="150" x2="430" y2="190" stroke="#7a808c" stroke-width="2.5" stroke-dasharray="5 5"/>
  <line x1="214" y1="270" x2="432" y2="214" stroke="#7a808c" stroke-width="2.5" stroke-dasharray="5 5"/>

  <!-- RIGHT: away regime, expensive radios, bold -->
  <text x="900" y="60" text-anchor="end" class="hd">DOG OUT — expensive radios</text>
  <!-- GPS satellite -->
  <g transform="translate(800,130)">
    <rect x="-18" y="-10" width="36" height="20" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="-58" y="-13" width="34" height="26" rx="2" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="24" y="-13" width="34" height="26" rx="2" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="42" text-anchor="middle" class="sm">GPS fix</text>
  </g>
  <line x1="770" y1="150" x2="528" y2="190" stroke="#c87533" stroke-width="3" stroke-dasharray="3 9" stroke-linecap="round"/>
  <!-- cell tower -->
  <g transform="translate(810,250)">
    <path d="M -18 90 L -7 0 L 7 0 L 18 90" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <line x1="-13" y1="34" x2="13" y2="34" stroke="#1a1d24" stroke-width="2.5"/>
    <g stroke="#c87533" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 10 -6 Q 30 -2 34 18"/>
    </g>
    <text x="0" y="112" text-anchor="middle" class="sm">cellular</text>
  </g>
  <line x1="792" y1="300" x2="530" y2="220" stroke="#c87533" stroke-width="3" stroke-dasharray="3 9" stroke-linecap="round"/>

  <!-- the switch / geofence at the bottom -->
  <g transform="translate(480,370)">
    <line x1="-360" y1="0" x2="360" y2="0" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- toggle: pointer to the cheap (left) side by default -->
    <line x1="0" y1="0" x2="-13" y2="-12" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <text x="-30" y="34" text-anchor="end" class="sm">stays on cheap radios by default…</text>
    <text x="30" y="34" class="sm">…flips to GPS + cellular past the geofence</text>
  </g>

  <text x="480" y="448" text-anchor="middle" class="cap">Low power at home, findable anywhere — the two-device problem solved in one puck.</text>
</svg>
