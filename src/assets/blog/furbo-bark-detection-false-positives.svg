<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="Bark detection false positives">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">

    <!-- real barks bar, left -->
    <text x="170" y="70" text-anchor="middle" font-size="16">real barks</text>
    <g transform="translate(110 90)">
      <rect x="0" y="0" width="120" height="210" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <!-- caught ~70% -->
      <rect x="0" y="63" width="120" height="147" rx="0" fill="#3a7d44" fill-opacity="0.7"/>
      <line x1="0" y1="63" x2="120" y2="63" stroke="#1a1d24" stroke-width="2"/>
      <text x="60" y="150" text-anchor="middle" font-size="14" fill="#fdfaf2">caught ~70%</text>
      <text x="60" y="40" text-anchor="middle" font-size="13" fill="#c14a3a">missed ~30%</text>
    </g>

    <!-- threshold line across the middle -->
    <line x1="60" y1="330" x2="940" y2="330" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="6 6"/>
    <text x="60" y="352" font-size="13" fill="#5b616b">alert threshold — anything above fires a notification</text>

    <!-- non-bark sounds crossing the threshold, right -->
    <text x="640" y="70" text-anchor="middle" font-size="16">non-bark sounds</text>
    <g font-size="13" fill="#1a1d24">
      <!-- each sound as a tag that pokes above threshold -->
      <g transform="translate(430 110)">
        <rect x="0" y="0" width="110" height="34" rx="17" fill="#c14a3a" fill-opacity="0.14" stroke="#c14a3a" stroke-width="2"/>
        <text x="55" y="22" text-anchor="middle" fill="#c14a3a">doorbell</text>
      </g>
      <g transform="translate(560 150)">
        <rect x="0" y="0" width="130" height="34" rx="17" fill="#c14a3a" fill-opacity="0.14" stroke="#c14a3a" stroke-width="2"/>
        <text x="65" y="22" text-anchor="middle" fill="#c14a3a">mail carrier</text>
      </g>
      <g transform="translate(440 195)">
        <rect x="0" y="0" width="70" height="34" rx="17" fill="#c14a3a" fill-opacity="0.14" stroke="#c14a3a" stroke-width="2"/>
        <text x="35" y="22" text-anchor="middle" fill="#c14a3a">TV</text>
      </g>
      <g transform="translate(700 200)">
        <rect x="0" y="0" width="140" height="34" rx="17" fill="#c14a3a" fill-opacity="0.14" stroke="#c14a3a" stroke-width="2"/>
        <text x="70" y="22" text-anchor="middle" fill="#c14a3a">kitchen clatter</text>
      </g>
      <!-- arrows pushing them down across threshold -->
      <g stroke="#c14a3a" stroke-width="2" opacity="0.6">
        <path d="M485 250 L485 322" marker-end="url(#fa)"/>
        <path d="M625 250 L625 322" marker-end="url(#fa)"/>
        <path d="M770 250 L770 322" marker-end="url(#fa)"/>
      </g>
    </g>

    <text x="500" y="410" text-anchor="middle" font-size="15" fill="#c14a3a">false positives, not misses, are what make the alert useless</text>

    <defs>
      <marker id="fa" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto"><path d="M0 0 L4.5 7 L9 0 z" fill="#c14a3a"/></marker>
    </defs>
  </g>
</svg>
