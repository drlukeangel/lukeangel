<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Internet outage survival test">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <line x1="500" y1="80" x2="500" y2="420" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 8"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <text x="250" y="50" text-anchor="middle" font-size="16" fill="#3a7d44">still working — all local</text>
    <text x="750" y="50" text-anchor="middle" font-size="16" fill="#c14a3a">dark until the link returns</text>

    <!-- left list with checks -->
    <g>
      <g transform="translate(60 100)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">all lighting (Hue, Lutron, Zigbee)</text></g>
      <g transform="translate(60 145)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">all Z-Wave devices</text></g>
      <g transform="translate(60 190)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">all Zigbee via Zigbee2MQTT</text></g>
      <g transform="translate(60 235)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">local HA dashboard + iPad panels</text></g>
      <g transform="translate(60 280)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">local automations + security alarm</text></g>
      <g transform="translate(60 325)"><path d="M0 0 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="5"/><text x="40" y="6">cameras recording to the NVR</text></g>
    </g>

    <!-- right list with X -->
    <g>
      <g transform="translate(560 100)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="5"/><text x="40" y="6">voice assistants</text></g>
      <g transform="translate(560 145)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="5"/><text x="40" y="6">off-LAN access (Nabu Casa)</text></g>
      <g transform="translate(560 190)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="5"/><text x="40" y="6">remote camera viewing on phone</text></g>
      <g transform="translate(560 235)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="5"/><text x="40" y="6">Spotify casting</text></g>
      <g transform="translate(560 280)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="5"/><text x="40" y="6">push (queued → fire on reconnect)</text></g>
    </g>

    <text x="500" y="450" text-anchor="middle" font-size="13" fill="#5b616b">everything load-bearing kept running; only cloud-by-nature conveniences went dark</text>
  </g>
</svg>
