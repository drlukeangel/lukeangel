<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" width="1040" height="470" role="img" aria-label="Device count across thirteen years">
  <rect x="0.5" y="0.5" width="1039" height="469" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .ax{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#7a808c}
    .er{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;fill:#5b616b}
    .nu{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;font-weight:700;fill:#6a4c93}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c}
  </style>

  <text x="60" y="44" class="hd">ONE BULB → ~250 DEVICES — THE HOUSE ACCRETED, IT DIDN'T MIGRATE</text>

  <!-- axes -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="80" y1="380" x2="980" y2="380" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
  <text x="74" y="380" text-anchor="end" class="ax">0</text>
  <text x="74" y="300" text-anchor="end" class="ax">60</text>
  <text x="74" y="220" text-anchor="end" class="ax">130</text>
  <text x="74" y="140" text-anchor="end" class="ax">200</text>

  <!-- new-house move marker -->
  <line x1="800" y1="80" x2="800" y2="380" stroke="#6a4c93" stroke-width="1.4" stroke-dasharray="4 5" stroke-opacity="0.55"/>
  <text x="800" y="98" text-anchor="middle" class="er" fill="#6a4c93">2023 move — wire from the studs</text>

  <!-- accretion curve: 2012 ~1, 2014 ~12, 2017 ~45, 2020 ~95, 2023 ~150, 2025 ~250 -->
  <path d="M80 379 L210 366 L420 327 L620 270 L800 207 L980 118"
        fill="none" stroke="#6a4c93" stroke-width="3"/>
  <!-- era dots -->
  <circle cx="80"  cy="379" r="5" fill="#6a4c93"/>
  <circle cx="210" cy="366" r="5" fill="#6a4c93"/>
  <circle cx="420" cy="327" r="5" fill="#6a4c93"/>
  <circle cx="620" cy="270" r="5" fill="#6a4c93"/>
  <circle cx="800" cy="207" r="5" fill="#6a4c93"/>
  <circle cx="980" cy="118" r="5" fill="#6a4c93"/>

  <!-- year labels -->
  <text x="80"  y="400" text-anchor="middle" class="ax">2012</text>
  <text x="210" y="400" text-anchor="middle" class="ax">2014</text>
  <text x="420" y="400" text-anchor="middle" class="ax">2017</text>
  <text x="620" y="400" text-anchor="middle" class="ax">2020</text>
  <text x="800" y="400" text-anchor="middle" class="ax">2023</text>
  <text x="980" y="400" text-anchor="middle" class="ax">2025</text>

  <!-- count callouts -->
  <text x="92"  y="372" class="nu">1</text>
  <text x="222" y="358" class="nu">~12</text>
  <text x="432" y="319" class="nu">~45</text>
  <text x="632" y="262" class="nu">~95</text>
  <text x="690" y="200" class="nu">~150</text>
  <text x="940" y="110" class="nu">~250</text>

  <!-- era band labels under curve -->
  <text x="145" y="425" text-anchor="middle" class="er">E1 gardens</text>
  <text x="315" y="425" text-anchor="middle" class="er">E2 hub-of-hubs</text>
  <text x="520" y="425" text-anchor="middle" class="er">E3 local-first</text>
  <text x="710" y="425" text-anchor="middle" class="er">E4 ops</text>
  <text x="890" y="425" text-anchor="middle" class="er">E5 multi-hub Matter</text>

  <text x="520" y="452" text-anchor="middle" class="cap">Each era stacked on the last — the slope steepens, the old layers never leave.</text>
</svg>
