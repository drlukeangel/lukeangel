<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="908 MHz vs 2.4 GHz band occupancy">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">THE QUIET BAND VS THE CROWDED ONE</text>

  <!-- Quiet 908 MHz lane -->
  <text x="40" y="96" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#6a4c93">908 MHz (US) &#183; Z-Wave</text>
  <rect x="40" y="108" width="700" height="64" rx="10" fill="#6a4c93" fill-opacity="0.05" stroke="#6a4c93" stroke-width="2"/>
  <!-- one lone occupant -->
  <g transform="translate(150,140)">
    <circle cx="0" cy="0" r="9" fill="#6a4c93"/>
    <g stroke="#6a4c93" fill="none" stroke-linecap="round"><path d="M-14 -10 a18 18 0 0 1 28 0" stroke-width="3"/></g>
    <text x="22" y="5" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#5b616b">Z-Wave, alone</text>
  </g>
  <text x="752" y="146" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">~40 kbps</text>
  <text x="752" y="164" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">enough for "door opened"</text>

  <!-- Crowded 2.4 GHz lane -->
  <text x="40" y="232" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#c14a3a">2.4 GHz &#183; Wi-Fi + Zigbee + Bluetooth + the rest</text>
  <rect x="40" y="244" width="700" height="120" rx="10" fill="#c14a3a" fill-opacity="0.05" stroke="#c14a3a" stroke-width="2"/>
  <!-- crowd of occupants, overlapping -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10">
    <g transform="translate(110,278)"><circle r="8" fill="#357a8c"/><text x="14" y="4" fill="#5b616b">Wi-Fi</text></g>
    <g transform="translate(250,278)"><circle r="8" fill="#3a7d44"/><text x="14" y="4" fill="#5b616b">Zigbee</text></g>
    <g transform="translate(400,278)"><circle r="8" fill="#6a4c93"/><text x="14" y="4" fill="#5b616b">Bluetooth</text></g>
    <g transform="translate(560,278)"><circle r="8" fill="#c87533"/><text x="14" y="4" fill="#5b616b">microwave</text></g>
    <g transform="translate(140,330)"><circle r="8" fill="#c14a3a"/><text x="14" y="4" fill="#5b616b">baby monitor</text></g>
    <g transform="translate(320,330)"><circle r="8" fill="#1a1d24" fill-opacity="0.6"/><text x="14" y="4" fill="#5b616b">phone</text></g>
    <g transform="translate(470,330)"><circle r="8" fill="#357a8c" fill-opacity="0.7"/><text x="14" y="4" fill="#5b616b">a dozen smart devices</text></g>
  </g>
  <text x="752" y="298" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">50+ Mbps</text>
  <text x="752" y="316" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">carries video &#8212;</text>
  <text x="752" y="332" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">but everyone's fighting</text>

  <text x="40" y="430" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">A quiet band buys reliability and years of battery; a crowded one buys speed and collisions.</text>
</svg>
