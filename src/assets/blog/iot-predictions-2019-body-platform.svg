<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="body as platform">
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:16px;font-weight:600;fill:#1a1d24}
    .yr{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;font-weight:600;fill:#0066cc}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:12px;fill:#7a808c}
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <text x="32" y="44" class="ttl">The body is becoming the platform — one sensor site at a time</text>

  <!-- WRIST -->
  <g transform="translate(70,110)">
    <!-- watch -->
    <rect x="0" y="0" width="100" height="130" rx="22" fill="#fff" stroke="#0066cc" stroke-width="3"/>
    <rect x="14" y="16" width="72" height="62" rx="6" fill="#0066cc"/>
    <!-- ECG trace -->
    <path d="M22,47 H38 l5,-16 l6,30 l6,-22 l5,8 H78" stroke="#fff" stroke-width="2" fill="none"/>
    <line x1="50" y1="92" x2="50" y2="112" stroke="#0066cc" stroke-width="2"/>
    <text x="50" y="158" text-anchor="middle" class="lbl">Wrist</text>
    <text x="50" y="176" text-anchor="middle" class="sm">smartwatch</text>
    <text x="50" y="-8" text-anchor="middle" class="yr">2018 · ECG, FDA</text>
  </g>

  <!-- arrow 1 -->
  <line x1="190" y1="170" x2="270" y2="170" stroke="#0066cc" stroke-width="2.5" marker-end="url(#a1)"/>

  <!-- EAR -->
  <g transform="translate(300,110)">
    <ellipse cx="22" cy="58" rx="22" ry="40" fill="#fff" stroke="#0066cc" stroke-width="3"/>
    <ellipse cx="86" cy="58" rx="22" ry="40" fill="#fff" stroke="#0066cc" stroke-width="3"/>
    <rect x="14" y="92" width="16" height="34" rx="6" fill="#0066cc"/>
    <rect x="78" y="92" width="16" height="34" rx="6" fill="#0066cc"/>
    <!-- noise-cancel waves -->
    <path d="M-6,40 q-12,18 0,36" stroke="#0066cc" stroke-width="1.6" fill="none" opacity="0.6"/>
    <path d="M114,40 q12,18 0,36" stroke="#0066cc" stroke-width="1.6" fill="none" opacity="0.6"/>
    <text x="54" y="158" text-anchor="middle" class="lbl">Ear</text>
    <text x="54" y="176" text-anchor="middle" class="sm">true-wireless earbud</text>
    <text x="54" y="-8" text-anchor="middle" class="yr">2019 · ANC bet</text>
  </g>

  <!-- arrow 2 -->
  <line x1="430" y1="170" x2="510" y2="170" stroke="#0066cc" stroke-width="2.5" marker-end="url(#a1)"/>

  <!-- FINGER -->
  <g transform="translate(560,110)">
    <circle cx="55" cy="58" r="46" fill="none" stroke="#0066cc" stroke-width="14"/>
    <circle cx="55" cy="58" r="46" fill="none" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="14" stroke-dasharray="6 8"/>
    <!-- PPG dot -->
    <circle cx="55" cy="104" r="6" fill="#0066cc"/>
    <text x="55" y="158" text-anchor="middle" class="lbl">Finger</text>
    <text x="55" y="176" text-anchor="middle" class="sm">smart ring</text>
    <text x="55" y="-8" text-anchor="middle" class="yr">2019 · goes serious</text>
  </g>

  <!-- bottom thesis bar -->
  <g transform="translate(32,310)">
    <rect width="736" height="60" rx="6" fill="#0066cc" fill-opacity="0.06" stroke="#0066cc" stroke-opacity="0.3"/>
    <text x="20" y="26" class="lbl">Same playbook each time: a clinical-grade sensor migrates onto an everyday-wear object.</text>
    <text x="20" y="46" class="sm">The smartwatch became a medical device. The earbud is next. The body is the surface every platform is racing to instrument.</text>
  </g>
  <text x="32" y="394" class="cap">A forecast, not a finish line — the ring and the ANC earbud are still bets as of January.</text>
</svg>
