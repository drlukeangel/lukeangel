<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1a1d24" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#b7410e"/>

  <!-- spokes from single central hub -->
  <g stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <line x1="600" y1="315" x2="380" y2="180"/>
    <line x1="600" y1="315" x2="320" y2="290"/>
    <line x1="600" y1="315" x2="360" y2="430"/>
    <line x1="600" y1="315" x2="470" y2="510"/>
    <line x1="600" y1="315" x2="730" y2="510"/>
    <line x1="600" y1="315" x2="840" y2="430"/>
    <line x1="600" y1="315" x2="880" y2="290"/>
    <line x1="600" y1="315" x2="820" y2="180"/>
    <line x1="600" y1="315" x2="600" y2="130"/>
  </g>

  <!-- leaf nodes around the hub -->
  <g fill="#1a1d24">
    <circle cx="380" cy="180" r="14"/>
    <circle cx="320" cy="290" r="14"/>
    <circle cx="360" cy="430" r="14"/>
    <circle cx="470" cy="510" r="14"/>
    <circle cx="730" cy="510" r="14"/>
    <circle cx="840" cy="430" r="14"/>
    <circle cx="880" cy="290" r="14"/>
    <circle cx="820" cy="180" r="14"/>
    <circle cx="600" cy="130" r="14"/>
  </g>

  <!-- central hub -->
  <circle cx="600" cy="315" r="38" fill="#b7410e"/>
  <circle cx="600" cy="315" r="38" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="600" cy="315" r="17" fill="#fdfaf2" fill-opacity="0.85"/>
</svg>
