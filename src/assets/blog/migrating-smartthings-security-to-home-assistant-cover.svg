<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A door sensor triggering a local security response">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- a door, ajar, with a contact sensor -->
  <g transform="translate(140,180)">
    <!-- frame -->
    <rect x="0" y="0" width="180" height="280" rx="6" fill="none" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- door swung open a bit (parallelogram) -->
    <path d="M16 12 L150 40 L150 252 L16 268 Z" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <!-- handle -->
    <circle cx="36" cy="140" r="7" fill="#1a1d24"/>
    <!-- contact sensor: two halves separated (door open) -->
    <rect x="150" y="46" width="20" height="34" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <rect x="176" y="40" width="14" height="34" rx="3" fill="#6a4c93" fill-opacity="0.5" stroke="#1a1d24" stroke-width="2.6"/>
    <!-- the gap spark -->
    <line x1="170" y1="63" x2="176" y2="57" stroke="#c14a3a" stroke-width="3"/>
  </g>

  <!-- signal to the Pi -->
  <g stroke="#6a4c93" stroke-width="3.5" fill="#6a4c93">
    <path d="M340 300 H470" fill="none" stroke-dasharray="2 8"/>
    <path d="M474 300 l-14 -7 v14 z"/>
  </g>

  <!-- the Pi (local brain) -->
  <g transform="translate(490,250)">
    <rect x="0" y="0" width="180" height="120" rx="12" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="68" y="40" width="44" height="40" rx="5" fill="#1a1d24"/>
    <g fill="#6a4c93"><rect x="18" y="16" width="6" height="6"/><rect x="30" y="16" width="6" height="6"/><rect x="42" y="16" width="6" height="6"/><rect x="54" y="16" width="6" height="6"/></g>
    <circle cx="24" cy="100" r="6" fill="#3a7d44"/>
  </g>

  <!-- two outputs: alert (phone) + lights -->
  <!-- to phone -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <path d="M670 290 C740 270, 780 250, 830 235" fill="none"/><path d="M834 233 l-16 1 l7 13 z"/>
  </g>
  <g transform="translate(840,180)">
    <rect x="0" y="0" width="70" height="120" rx="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="10" y="14" width="50" height="78" rx="4" fill="#6a4c93" fill-opacity="0.1" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
    <!-- alert glyph -->
    <path d="M35 34 v26 M35 70 v6" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- to light -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <path d="M670 340 C760 360, 820 380, 870 392" fill="none"/><path d="M874 393 l-16 -3 l4 14 z"/>
  </g>
  <g transform="translate(910,360)">
    <circle cx="0" cy="0" r="26" fill="#6a4c93" fill-opacity="0.3" stroke="#1a1d24" stroke-width="3"/>
    <!-- radiating brightness lines -->
    <g stroke="#c87533" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-40" x2="0" y2="-50"/><line x1="40" y1="0" x2="50" y2="0"/>
      <line x1="28" y1="-28" x2="35" y2="-35"/><line x1="28" y1="28" x2="35" y2="35"/>
    </g>
    <rect x="-9" y="22" width="18" height="9" rx="2" fill="#1a1d24" opacity="0.5"/>
  </g>

  <!-- crossed-out cloud (no cloud round-trip) -->
  <g transform="translate(470,90)">
    <path d="M40 50 a24 24 0 0 1 4 -46 a30 30 0 0 1 56 6 a20 20 0 0 1 -2 40 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="3.5" opacity="0.6"/>
    <line x1="14" y1="10" x2="112" y2="66" stroke="#c14a3a" stroke-width="4.5"/>
  </g>
</svg>
