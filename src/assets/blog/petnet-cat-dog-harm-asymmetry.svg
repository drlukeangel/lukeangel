<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="cat vs dog harm over days">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">SAME OUTAGE, DIFFERENT ANIMAL</text>

  <!-- axes -->
  <g stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2">
    <line x1="90" y1="400" x2="900" y2="400"/>
    <line x1="90" y1="80" x2="90" y2="400"/>
  </g>
  <text x="40" y="240" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c" transform="rotate(-90 40 240)">health risk</text>
  <text x="495" y="448" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">days without scheduled food</text>

  <!-- day gridlines 1..7 -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">
    <g transform="translate(0,0)">
      <text x="200" y="420" text-anchor="middle">1</text>
      <text x="320" y="420" text-anchor="middle">2</text>
      <text x="440" y="420" text-anchor="middle">3</text>
      <text x="560" y="420" text-anchor="middle">4</text>
      <text x="680" y="420" text-anchor="middle">5</text>
      <text x="800" y="420" text-anchor="middle">7</text>
    </g>
  </g>

  <!-- cat danger threshold at ~2 days -->
  <line x1="320" y1="80" x2="320" y2="400" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 6" stroke-opacity="0.6"/>
  <text x="328" y="100" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">cat: lipidosis risk after ~2 days</text>

  <!-- the outage span marker (full week) -->
  <line x1="800" y1="80" x2="800" y2="400" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 5" stroke-opacity="0.4"/>
  <text x="792" y="100" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#1a1d24">the outage lasted a week</text>

  <!-- dog curve: stays low -->
  <path d="M200 388 L320 384 L440 376 L560 366 L680 354 L800 340"
        fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round"/>
  <circle cx="800" cy="340" r="6" fill="#3a7d44"/>
  <text x="816" y="344" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#3a7d44">dog</text>

  <!-- cat curve: low then steep after day 2 -->
  <path d="M200 384 L320 372 C 400 360, 460 250, 560 200 C 640 160, 720 120, 800 104"
        fill="none" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="800" cy="104" r="6" fill="#c14a3a"/>
  <text x="816" y="108" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#c14a3a">cat</text>

  <text x="495" y="478" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">A week-long outage is a bad few days for a dog and an emergency for a cat.</text>
</svg>
