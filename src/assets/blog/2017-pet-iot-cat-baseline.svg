<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Cat door from guesses to logged baseline">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">THE CAT DOOR GOES FROM GUESS TO LOG</text>

  <!-- BEFORE -->
  <text x="40" y="106" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#7a808c">BEFORE &#183; microchip door, no hub</text>
  <!-- door -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="60" height="64" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="10" y="10" width="40" height="44" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
  </g>
  <text x="170" y="186" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#7a808c">&#8220;Joule goes out sometimes&#8221;</text>
  <!-- fuzzy timeline -->
  <line x1="170" y1="210" x2="940" y2="210" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="3 7"/>
  <text x="170" y="234" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#7a808c">no events &#183; no times &#183; just a hunch</text>

  <line x1="40" y1="262" x2="960" y2="262" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- AFTER -->
  <text x="40" y="304" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#c87533">AFTER &#183; Sure Petcare hub networks the door</text>
  <!-- door + hub -->
  <g transform="translate(70,338)">
    <rect x="0" y="0" width="60" height="64" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="10" y="10" width="40" height="44" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <!-- signal to hub -->
    <g stroke="#c87533" fill="none" stroke-linecap="round">
      <path d="M68 18 a14 14 0 0 1 0 28" stroke-width="2.5"/>
    </g>
  </g>
  <!-- logged event timeline: in/out markers -->
  <line x1="170" y1="370" x2="940" y2="370" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a808c" text-anchor="middle">
    <!-- out -->
    <g transform="translate(230,370)"><path d="M0 -16 l0 16" stroke="#c87533" stroke-width="3"/><polygon points="0,-22 -6,-12 6,-12" fill="#c87533"/><text x="0" y="22">out 7:10</text></g>
    <g transform="translate(360,370)"><path d="M0 16 l0 -16" stroke="#3a7d44" stroke-width="3"/><polygon points="0,22 -6,12 6,12" fill="#3a7d44"/><text x="0" y="-22">in 9:42</text></g>
    <g transform="translate(520,370)"><path d="M0 -16 l0 16" stroke="#c87533" stroke-width="3"/><polygon points="0,-22 -6,-12 6,-12" fill="#c87533"/><text x="0" y="22">out 14:05</text></g>
    <g transform="translate(660,370)"><path d="M0 16 l0 -16" stroke="#3a7d44" stroke-width="3"/><polygon points="0,22 -6,12 6,12" fill="#3a7d44"/><text x="0" y="-22">in 16:30</text></g>
    <g transform="translate(820,370)"><path d="M0 -16 l0 16" stroke="#c87533" stroke-width="3"/><polygon points="0,-22 -6,-12 6,-12" fill="#c87533"/><text x="0" y="22">out 20:50</text></g>
  </g>
  <text x="170" y="430" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#c87533">a logged baseline you can watch for change</text>
</svg>
