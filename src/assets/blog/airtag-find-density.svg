<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="AirTag find rate depends on iPhone density">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">A CROWD-FOUND TAG IS ONLY AS GOOD AS THE CROWD</text>

  <line x1="500" y1="80" x2="500" y2="410" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- LEFT: dense suburb -->
  <text x="40" y="116" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#3a7d44">DENSE SUBURB &#183; iPhones everywhere</text>

  <!-- dog tag in middle -->
  <g transform="translate(150,250)">
    <circle cx="0" cy="0" r="22" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="0" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">Atom&#8217;s tag</text>
  </g>
  <!-- surrounding phones, dashed relays -->
  <g fill="#fff" stroke="#1a1d24" stroke-width="2.5">
    <g transform="translate(280,150)"><rect x="-9" y="-16" width="18" height="32" rx="4"/></g>
    <g transform="translate(320,250)"><rect x="-9" y="-16" width="18" height="32" rx="4"/></g>
    <g transform="translate(280,350)"><rect x="-9" y="-16" width="18" height="32" rx="4"/></g>
    <g transform="translate(180,140)"><rect x="-9" y="-16" width="18" height="32" rx="4"/></g>
  </g>
  <g stroke="#3a7d44" stroke-width="2.5" stroke-dasharray="5 5">
    <line x1="170" y1="240" x2="270" y2="158"/>
    <line x1="172" y1="250" x2="308" y2="250"/>
    <line x1="170" y1="262" x2="270" y2="342"/>
    <line x1="150" y1="228" x2="180" y2="156"/>
  </g>
  <text x="40" y="402" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#3a7d44">rarely a minute without a passing phone &#183; fresh fixes</text>

  <!-- RIGHT: deep woods -->
  <text x="540" y="116" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#c14a3a">DEEP WOODS &#183; no iPhones near</text>

  <!-- trees -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#fdfaf2">
    <g transform="translate(640,170)"><path d="M0 0 l-16 30 l32 0 Z"/><path d="M0 18 l-18 34 l36 0 Z"/><rect x="-4" y="50" width="8" height="14"/></g>
    <g transform="translate(850,300)"><path d="M0 0 l-16 30 l32 0 Z"/><path d="M0 18 l-18 34 l36 0 Z"/><rect x="-4" y="50" width="8" height="14"/></g>
    <g transform="translate(770,150)"><path d="M0 0 l-13 26 l26 0 Z"/><rect x="-3" y="26" width="6" height="12"/></g>
  </g>
  <!-- tag shouting into nothing -->
  <g transform="translate(680,290)">
    <circle cx="0" cy="0" r="22" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <g stroke="#c14a3a" fill="none" stroke-linecap="round" stroke-opacity="0.7">
      <path d="M22 -8 a14 14 0 0 1 0 16" stroke-width="2.5"/>
      <path d="M32 -16 a26 26 0 0 1 0 32" stroke-width="2.5" stroke-opacity="0.4"/>
    </g>
  </g>
  <text x="560" y="360" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#c14a3a">no relay &#183; last-seen goes stale</text>
  <text x="540" y="402" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#c14a3a">broadcasts to no one &#183; useless on the trail</text>
</svg>
