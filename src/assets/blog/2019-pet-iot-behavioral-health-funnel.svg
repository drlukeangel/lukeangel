<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 450" role="img" aria-label="Whistle GO Explore behavioral health funnel">
  <rect width="960" height="450" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
    .acc{fill:#c87533;}
    .muted{fill:#7a808c;}
  </style>

  <text x="40" y="46" class="ttl">Whistle GO Explore — not a thermometer, a behavior model</text>

  <!-- collar source -->
  <g transform="translate(130,180)">
    <circle cx="0" cy="0" r="34" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" class="sm">collar</text>
  </g>
  <text x="130" y="240" text-anchor="middle" class="sm">accelerometer</text>

  <!-- inferred behaviors stack -->
  <g transform="translate(280,90)">
    <rect x="0" y="0" width="150" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="75" y="21" text-anchor="middle" class="sm">licking</text>
    <rect x="0" y="44" width="150" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="75" y="65" text-anchor="middle" class="sm">scratching</text>
    <rect x="0" y="88" width="150" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="75" y="109" text-anchor="middle" class="sm">sleeping</text>
    <rect x="0" y="132" width="150" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="75" y="153" text-anchor="middle" class="sm">activity drift</text>
  </g>
  <!-- arrows collar -> behaviors -->
  <line x1="166" y1="170" x2="276" y2="110" stroke="#1a1d24" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="166" y1="180" x2="276" y2="180" stroke="#1a1d24" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="166" y1="192" x2="276" y2="250" stroke="#1a1d24" stroke-width="2" marker-end="url(#ar)"/>

  <!-- model -->
  <g transform="translate(490,140)">
    <path d="M 0 0 h 130 v 90 h -130 z" fill="#fdfaf2" stroke="#c87533" stroke-width="2.5"/>
    <text x="65" y="38" text-anchor="middle" class="sm">model on tens of</text>
    <text x="65" y="58" text-anchor="middle" class="sm">thousands of dogs</text>
    <text x="65" y="78" text-anchor="middle" class="muted">(multi-year study)</text>
  </g>
  <line x1="430" y1="185" x2="486" y2="185" stroke="#1a1d24" stroke-width="2" marker-end="url(#ar)"/>

  <!-- health signal out -->
  <g transform="translate(700,160)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="90" y="22" text-anchor="middle" class="sm">behavioral-health</text>
    <text x="90" y="40" text-anchor="middle" class="sm">trend + alerts</text>
  </g>
  <line x1="624" y1="185" x2="696" y2="185" stroke="#1a1d24" stroke-width="2" marker-end="url(#ar)"/>

  <!-- contrast: vitals NOT measured -->
  <rect x="280" y="300" width="400" height="34" rx="6" fill="#fdfaf2" stroke="#7a808c" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="480" y="322" text-anchor="middle" class="sm muted">no vitals — no temperature, no heart rate (yet)</text>

  <line x1="40" y1="364" x2="920" y2="364" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="480" y="400" text-anchor="middle" class="cap">A collar that infers health from behavior — and a longitudinal data funnel for Mars.</text>
  <text x="480" y="426" text-anchor="middle" class="sm">It happens to also tell you where the dog is.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
  </defs>
</svg>
