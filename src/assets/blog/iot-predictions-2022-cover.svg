<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="2022 IoT predictions cover">
  <defs>
    <pattern id="dots22" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots22)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- a shelf line the devices sit on: the "manufacturing gate" motif, abstract -->
  <line x1="150" y1="470" x2="1060" y2="470" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Matter hub / connected node, center: rings radiating from a node -->
  <g transform="translate(330,300)" fill="none" stroke="#0066cc" stroke-width="6">
    <circle cx="0" cy="0" r="34" fill="#0066cc" stroke="none"/>
    <path d="M-58 0 a58 58 0 0 1 116 0" stroke-opacity="0.75"/>
    <path d="M-92 0 a92 92 0 0 1 184 0" stroke-opacity="0.45"/>
    <path d="M-126 0 a126 126 0 0 1 252 0" stroke-opacity="0.22"/>
  </g>

  <!-- smartwatch on the shelf -->
  <g transform="translate(620,330)">
    <rect x="-66" y="-110" width="32" height="60" rx="12" fill="#1a1d24" fill-opacity="0.8"/>
    <rect x="-66" y="100" width="32" height="60" rx="12" fill="#1a1d24" fill-opacity="0.8"/>
    <rect x="-90" y="-66" width="180" height="200" rx="44" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <rect x="-66" y="-42" width="132" height="152" rx="24" fill="#0066cc" fill-opacity="0.85"/>
    <rect x="90" y="0" width="14" height="36" rx="5" fill="#1a1d24" fill-opacity="0.8"/>
  </g>

  <!-- earbuds case + buds -->
  <g transform="translate(860,360)">
    <rect x="-58" y="-30" width="116" height="92" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <ellipse cx="-22" cy="-40" rx="18" ry="34" fill="#fdfaf2" stroke="#0066cc" stroke-width="6"/>
    <ellipse cx="22" cy="-40" rx="18" ry="34" fill="#fdfaf2" stroke="#0066cc" stroke-width="6"/>
    <circle cx="-22" cy="-50" r="7" fill="#0066cc"/>
    <circle cx="22" cy="-50" r="7" fill="#0066cc"/>
  </g>

  <!-- faint slipped-date motif: a dashed forward shift -->
  <g stroke="#0066cc" stroke-opacity="0.5" stroke-width="4" stroke-dasharray="10 8" fill="none">
    <path d="M150 540 h840"/>
    <path d="M990 540 l-22 -11 v22 z" fill="#0066cc" fill-opacity="0.5" stroke="none"/>
  </g>
</svg>
