<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" width="1040" height="360" role="img" aria-label="What got built across 2025">
  <rect x="0.5" y="0.5" width="1039" height="359" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .mo{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;font-weight:700;fill:#6a4c93}
    .ev{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;fill:#1a1d24}
    .sub{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11.5px;fill:#7a808c}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <text x="60" y="44" class="hd">2025 — WORK AT THE EDGES, NOT IN THE WALLS</text>

  <!-- spine -->
  <line x1="120" y1="90" x2="120" y2="300" stroke="#6a4c93" stroke-width="2.4"/>

  <!-- Mar -->
  <circle cx="120" cy="110" r="6" fill="#6a4c93"/>
  <text x="150" y="106" class="mo">MAR</text>
  <text x="220" y="106" class="ev">8 SmartThings Edge drivers — local on the hub</text>
  <text x="220" y="123" class="sub">Lua, no cloud round trip — the thing I left ST to get in 2017</text>

  <!-- Apr -->
  <circle cx="120" cy="158" r="6" fill="#6a4c93"/>
  <text x="150" y="154" class="mo">APR</text>
  <text x="220" y="154" class="ev">2nd Coral USB accelerator</text>
  <text x="220" y="171" class="sub">dropped Frigate inference latency — notifications stopped lagging</text>

  <!-- through-year HA voice -->
  <circle cx="120" cy="206" r="6" fill="#6a4c93"/>
  <text x="150" y="202" class="mo">YR 2</text>
  <text x="220" y="202" class="ev">HA local voice crossed the line</text>
  <text x="220" y="219" class="sub">Whisper Turbo + Piper on a Pi 5 — ~1.2 s end to end, family uses it</text>

  <!-- Oct -->
  <circle cx="120" cy="254" r="6" fill="#c14a3a"/>
  <text x="150" y="250" class="mo" fill="#c14a3a">OCT</text>
  <text x="220" y="250" class="ev" fill="#c14a3a">Solar + battery contract signed</text>
  <text x="220" y="267" class="sub">the math finally tipped — install slated Q1 2026</text>

  <!-- Dec -->
  <circle cx="120" cy="290" r="6" fill="#6a4c93"/>
  <text x="150" y="286" class="mo">DEC</text>
  <text x="220" y="286" class="ev">iRobot j7+ retired the i7+</text>

  <text x="520" y="338" text-anchor="middle" class="cap">Less new hardware than any year since the move — the saturated house only needed seams.</text>
</svg>
