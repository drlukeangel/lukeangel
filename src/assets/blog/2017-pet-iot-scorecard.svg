<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-label="2017 forecast scorecard">
  <rect width="1000" height="560" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" fill="#1a1d24">
    <g transform="translate(60 70)"><path d="M0 0 l11 13 l21 -27" fill="none" stroke="#3a7d44" stroke-width="6"/><text x="56" y="9">SureFlap hub ships</text></g>
    <g transform="translate(60 122)"><path d="M0 0 l11 13 l21 -27" fill="none" stroke="#3a7d44" stroke-width="6"/><text x="56" y="9">Furbo written up</text></g>
    <g transform="translate(60 174)"><path d="M0 0 l11 13 l21 -27" fill="none" stroke="#3a7d44" stroke-width="6"/><text x="56" y="9">smaller 2nd-gen cellular tracker</text></g>
    <g transform="translate(60 226)">
      <circle cx="13" cy="-3" r="15" fill="none" stroke="#c87533" stroke-width="5"/>
      <path d="M13 -18 a15 15 0 0 1 0 30 z" fill="#c87533"/>
      <text x="56" y="9">Petnet multi-day outage (trending)</text>
