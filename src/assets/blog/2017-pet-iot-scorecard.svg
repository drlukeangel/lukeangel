    <g transform="translate(0 40)"><path d="M0 0 l11 13 l21 -27" fill="none" stroke="#3a7d44" stroke-width="6"/><text x="50" y="9" font-size="20" fill="#3a7d44">4 hit</text></g>
    <g transform="translate(0 90)"><circle cx="13" cy="-3" r="13" fill="none" stroke="#c87533" stroke-width="5"/><path d="M13 -16 a13 13 0 0 1 0 26 z" fill="#c87533"/><text x="50" y="9" font-size="20" fill="#c87533">1 near-miss</text></g>
    <g transform="translate(0 140)"><path d="M0 -11 l22 22 M22 -11 l-22 22" fill="none" stroke="#c14a3a" stroke-width="6"/><text x="50" y="9" font-size="20" fill="#c14a3a">3 miss</text></g>
    <line x1="0" y1="180" x2="230" y2="180" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <text x="0" y="220" font-size="30" fill="#1a1d24">~60%</text>
    <text x="0" y="250" font-size="14" fill="#5b616b">structure lands, timing slips</text>
