    <g transform="translate(60 278)"><path d="M0 -13 l26 26 M26 -13 l-26 26" fill="none" stroke="#c14a3a" stroke-width="6"/><text x="56" y="9">Litter-Robot Wi-Fi (slipped to 2018)</text></g>
    <g transform="translate(60 330)"><path d="M0 -13 l26 26 M26 -13 l-26 26" fill="none" stroke="#c14a3a" stroke-width="6"/><text x="56" y="9">another Mars acquisition</text></g>
    <g transform="translate(60 382)"><path d="M0 -13 l26 26 M26 -13 l-26 26" fill="none" stroke="#c14a3a" stroke-width="6"/><text x="56" y="9">first HomeKit pet device</text></g>
    <g transform="translate(60 434)"><path d="M0 0 l11 13 l21 -27" fill="none" stroke="#3a7d44" stroke-width="6"/><text x="56" y="9">a useful cat-side device</text></g>
  </g>

  <g transform="translate(680 95)" font-family="ui-monospace, 'JetBrains Mono', monospace">
