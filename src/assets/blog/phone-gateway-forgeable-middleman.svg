<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" width="1080" height="500" role="img" aria-label="Why chaining trust through the phone fails. The Bluetooth link from the device to the phone is encrypted under the bonding key, but session data exits that link in cleartext inside the phone, which must decrypt it to use it. Because the bonding key is a link key the cloud never holds, the claim 'this arrived over a bonded link' can only be made by the untrusted phone. An attacker who controls the app — by decompiling and re-signing it, or by driving the REST API directly with a valid user token — can mount three forgeries that all succeed against a naive cloud: submit synthesized session bytes stamped with any device serial, replay another account's captured upload, and inflate engagement counts.">
  <rect width="1080" height="500" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE FORGEABLE MIDDLEMAN</text>

  <!-- device -->
  <g transform="translate(56,150)">
    <rect x="0" y="0" width="150" height="104" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <g transform="translate(30,34)" stroke="#357a8c" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -15 L10 -7 L-8 8 M-8 -7 L10 8 L0 15 L0 -15"/>
    </g>
    <text x="92" y="46" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DEVICE</text>
    <text x="92" y="68" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">honest session</text>
  </g>

  <!-- encrypted BLE link -->
  <text x="270" y="180" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#357a8c">BLE · encrypted (LTK)</text>
  <g stroke="#357a8c" stroke-width="3.2" fill="#357a8c" stroke-linecap="round">
    <line x1="206" y1="202" x2="332" y2="202"/>
    <path d="M344 202 l-16 -7 v14 z"/>
  </g>
  <g transform="translate(270,210)" fill="none" stroke="#357a8c" stroke-width="2.2" stroke-linecap="round">
    <path d="M-6 0 v-5 a6 6 0 0 1 12 0 v5"/>
    <rect x="-9" y="0" width="18" height="14" rx="2.5" fill="#fdfaf2"/>
  </g>

  <!-- hostile phone -->
  <g transform="translate(358,120)">
    <rect x="0" y="0" width="190" height="220" rx="16" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3.2"/>
    <text x="95" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">HOSTILE PHONE</text>
    <line x1="18" y1="44" x2="172" y2="44" stroke="#c14a3a" stroke-width="1" opacity="0.4"/>
    <!-- cleartext warning -->
    <text x="95" y="70" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">data is cleartext here</text>
    <text x="95" y="88" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">(it must decrypt to use it)</text>
    <!-- two attack postures -->
    <rect x="20" y="106" width="150" height="44" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="95" y="126" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c14a3a">decompiled + re-signed app</text>
    <text x="95" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c14a3a">— or —</text>
    <rect x="20" y="160" width="150" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="95" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#c14a3a">raw REST + valid token</text>
  </g>

  <!-- three forged uploads -->
  <text x="640" y="180" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">forged uploads</text>
  <g stroke="#c14a3a" stroke-width="3.2" fill="#c14a3a" stroke-linecap="round">
    <line x1="548" y1="202" x2="690" y2="202"/>
    <path d="M702 202 l-16 -7 v14 z"/>
  </g>

  <!-- naive cloud accepts -->
  <g transform="translate(712,116)">
    <rect x="0" y="0" width="312" height="228" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="156" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">NAIVE CLOUD — trusts the phone</text>
    <line x1="18" y1="44" x2="294" y2="44" stroke="#1a1d24" stroke-width="1" opacity="0.25"/>
    <g font-family="ui-monospace,monospace" font-size="11.5">
      <!-- 1 synthesize -->
      <g transform="translate(24,58)">
        <path d="M0 8 l8 8 l16 -18" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="2" fill="#1a1d24">SYNTHESIZE</text>
        <text x="40" y="20" fill="#7a808c">fake bytes, any serial</text>
      </g>
      <!-- 2 replay -->
      <g transform="translate(24,118)">
        <path d="M0 8 l8 8 l16 -18" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="2" fill="#1a1d24">REPLAY</text>
        <text x="40" y="20" fill="#7a808c">another account's upload</text>
      </g>
      <!-- 3 inflate -->
      <g transform="translate(24,178)">
        <path d="M0 8 l8 8 l16 -18" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="2" fill="#1a1d24">INFLATE</text>
        <text x="40" y="20" fill="#7a808c">engagement counts</text>
      </g>
    </g>
  </g>

  <line x1="40" y1="386" x2="1040" y2="386" stroke="#1a1d24" stroke-width="1" opacity="0.15"/>
  <text x="540" y="422" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">The bonding key secures the radio, not the upload. "It came over a bonded link"</text>
  <text x="540" y="450" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">is a claim only the liar can make — so chaining trust through the phone authenticates the phone, not the device.</text>
</svg>
