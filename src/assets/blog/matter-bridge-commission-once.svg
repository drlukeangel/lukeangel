<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" width="1040" height="420" role="img" aria-label="Commission the bridge once, every controller sees the devices">
  <rect x="0.5" y="0.5" width="1039" height="419" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lb{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c}
    .ac{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;fill:#6a4c93}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <text x="60" y="42" class="hd">COMMISSION THE BRIDGE ONCE — MULTI-ADMIN DOES THE REST</text>

  <!-- legacy devices (left) -->
  <g transform="translate(70,120)">
    <text x="0" y="-18" class="sm">existing Zigbee / Z-Wave kit</text>
    <rect x="0" y="0"  width="120" height="26" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="12" y="18" class="sm">door sensor</text>
    <rect x="0" y="36" width="120" height="26" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="12" y="54" class="sm">Hue bulb</text>
    <rect x="0" y="72" width="120" height="26" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="12" y="90" class="sm">Z-Wave lock</text>
    <text x="60" y="128" text-anchor="middle" class="sm">no Matter of</text>
    <text x="60" y="144" text-anchor="middle" class="sm">their own</text>
  </g>

  <!-- arrows into bridge -->
  <path d="M192 133 L300 175" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <path d="M192 169 L300 185" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <path d="M192 205 L300 200" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" fill="none"/>

  <!-- bridge -->
  <g transform="translate(300,150)">
    <rect x="0" y="0" width="170" height="90" rx="10" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="85" y="34" text-anchor="middle" class="ac">Matter bridge</text>
    <text x="85" y="56" text-anchor="middle" class="sm">Aqara M2 / Hue v2 /</text>
    <text x="85" y="72" text-anchor="middle" class="sm">HA add-on</text>
  </g>
  <text x="385" y="262" text-anchor="middle" class="lb">one setup code, scanned once</text>

  <!-- fan-out to three fabrics -->
  <path d="M470 175 C 560 120, 640 110, 720 100" stroke="#6a4c93" stroke-width="2.2" fill="none"/>
  <path d="M470 195 C 560 195, 640 195, 720 195" stroke="#6a4c93" stroke-width="2.2" fill="none"/>
  <path d="M470 215 C 560 250, 640 280, 720 290" stroke="#6a4c93" stroke-width="2.2" fill="none"/>

  <g transform="translate(720,82)">
    <rect x="0" y="0" width="240" height="36" rx="7" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="14" y="23" class="lb">Apple Home — own commissioning</text>
  </g>
  <g transform="translate(720,177)">
    <rect x="0" y="0" width="240" height="36" rx="7" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="14" y="23" class="lb">Google Home — own commissioning</text>
  </g>
  <g transform="translate(720,272)">
    <rect x="0" y="0" width="240" height="36" rx="7" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="14" y="23" class="lb">Alexa / HA — own commissioning</text>
  </g>

  <text x="520" y="360" text-anchor="middle" class="cap">Each ecosystem enumerates every device behind the bridge — same state, separate admin, no per-device pairing.</text>
  <text x="520" y="392" text-anchor="middle" class="cap">Matter shares state, not decisions: the automation logic stays in each brain.</text>
</svg>
