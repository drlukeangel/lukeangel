<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#2a52be" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- 2x2 grid, four distinctly tinted cells -->
  <g>
    <!-- top-left: Analyze (amber) -->
    <rect x="360" y="120" width="240" height="190" fill="#c87533" fill-opacity="0.16" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
    <!-- top-right: Build (green) -->
    <rect x="600" y="120" width="240" height="190" fill="#3a7d44" fill-opacity="0.20" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
    <!-- bottom-left: Drop (grey) -->
    <rect x="360" y="310" width="240" height="190" fill="#1a1d24" fill-opacity="0.06" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
    <!-- bottom-right: Test (blue) -->
    <rect x="600" y="310" width="240" height="190" fill="#2a52be" fill-opacity="0.14" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  </g>

  <!-- small glyphs, no words: a check (build), a flask (test), a magnifier (analyze), a trash arc (drop) -->
  <!-- build check -->
  <path d="M690 205 l24 26 l46 -56" fill="none" stroke="#3a7d44" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- analyze magnifier -->
  <circle cx="470" cy="200" r="26" fill="none" stroke="#c87533" stroke-width="8"/>
  <line x1="490" y1="220" x2="512" y2="242" stroke="#c87533" stroke-width="9" stroke-linecap="round"/>
  <!-- test flask -->
  <path d="M712 372 v34 l-26 44 a6 6 0 0 0 5 9 h62 a6 6 0 0 0 5 -9 l-26 -44 v-34 z" fill="none" stroke="#2a52be" stroke-width="7" stroke-linejoin="round"/>
  <line x1="704" y1="372" x2="740" y2="372" stroke="#2a52be" stroke-width="7" stroke-linecap="round"/>
  <!-- drop: down arrow -->
  <line x1="480" y1="372" x2="480" y2="436" stroke="#7a808c" stroke-width="8" stroke-linecap="round"/>
  <polygon points="480,448 462,420 498,420" fill="#7a808c"/>

  <!-- axes: ink arrows, no text labels (carried by H1 + alt) -->
  <line x1="360" y1="540" x2="840" y2="540" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="3"/>
  <polygon points="840,540 824,532 824,548" fill="#1a1d24" fill-opacity="0.55"/>
  <line x1="320" y1="500" x2="320" y2="120" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="3"/>
  <polygon points="320,120 312,136 328,136" fill="#1a1d24" fill-opacity="0.55"/>
</svg>
