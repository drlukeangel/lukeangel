<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The closed corporate loop">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
    <marker id="cl" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0 0 L10 5.5 L0 11 z" fill="#c87533"/></marker>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- the corporate boundary enclosing the whole loop -->
  <rect x="360" y="90" width="560" height="450" rx="34" fill="#c87533" fill-opacity="0.05" stroke="#1a1d24" stroke-width="6"/>
  <!-- closing-in corner brackets -->
  <g stroke="#c87533" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M 392 128 L 392 110 L 412 110"/>
    <path d="M 868 110 L 888 110 L 888 128"/>
    <path d="M 392 502 L 392 520 L 412 520"/>
    <path d="M 868 520 L 888 520 L 888 502"/>
  </g>

  <!-- central analytics hub -->
  <g transform="translate(640,315)">
    <circle cx="0" cy="0" r="58" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- data-graph nodes inside the hub -->
    <circle cx="-18" cy="-14" r="6" fill="#c87533"/><circle cx="20" cy="-18" r="6" fill="#c87533"/>
    <circle cx="22" cy="16" r="6" fill="#c87533"/><circle cx="-16" cy="18" r="6" fill="#c87533"/><circle cx="0" cy="0" r="6" fill="#c87533"/>
    <g stroke="#c87533" stroke-width="2.5"><line x1="-18" y1="-14" x2="0" y2="0"/><line x1="20" y1="-18" x2="0" y2="0"/><line x1="22" y1="16" x2="0" y2="0"/><line x1="-16" y1="18" x2="0" y2="0"/></g>
  </g>

  <!-- node 1: collar (top-left) -> hub -->
  <g transform="translate(470,180)">
    <circle cx="0" cy="0" r="36" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-18" y="-12" width="36" height="24" rx="6" fill="none" stroke="#c87533" stroke-width="3"/><circle cx="0" cy="0" r="4" fill="#c87533"/>
  </g>
  <path d="M 496 206 Q 560 250 596 285" fill="none" stroke="#c87533" stroke-width="4" marker-end="url(#cl)"/>

  <!-- node 2: vet cross (top-right) <- hub -->
  <g transform="translate(810,180)">
    <circle cx="0" cy="0" r="36" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <g stroke="#c87533" stroke-width="6" stroke-linecap="round"><line x1="0" y1="-16" x2="0" y2="16"/><line x1="-16" y1="0" x2="16" y2="0"/></g>
  </g>
  <path d="M 686 286 Q 750 248 786 208" fill="none" stroke="#c87533" stroke-width="4" marker-end="url(#cl)"/>

  <!-- node 3: food bowl (bottom-right) <- hub -->
  <g transform="translate(810,450)">
    <circle cx="0" cy="0" r="36" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <ellipse cx="0" cy="6" rx="22" ry="9" fill="#c87533" fill-opacity="0.2" stroke="#c87533" stroke-width="3"/>
    <path d="M -22 4 Q 0 -16 22 4" fill="none" stroke="#c87533" stroke-width="3"/>
  </g>
  <path d="M 686 344 Q 750 392 786 424" fill="none" stroke="#c87533" stroke-width="4" marker-end="url(#cl)"/>

  <!-- node 4: recommendation bubble (bottom-left) <- hub, -> back to collar (closing the loop) -->
  <g transform="translate(470,450)">
    <circle cx="0" cy="0" r="36" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <path d="M -16 -6 L 16 -6 L 16 8 L -2 8 L -10 16 L -8 8 L -16 8 Z" fill="none" stroke="#c87533" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <path d="M 596 344 Q 532 392 496 424" fill="none" stroke="#c87533" stroke-width="4" marker-end="url(#cl)"/>
  <!-- closing arrow: recommendation back up to the collar (the loop closes) -->
  <path d="M 470 414 L 470 216" fill="none" stroke="#c87533" stroke-width="4" stroke-dasharray="2 11" marker-end="url(#cl)"/>
</svg>
