<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="accelerometer infers behavior, not vitals">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">ONE SENSOR, INFERRING BEHAVIOR</text>

  <!-- the one sensor -->
  <g transform="translate(130,230)">
    <rect x="-58" y="-44" width="116" height="88" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <!-- accelerometer glyph: 3 axes -->
    <line x1="0" y1="14" x2="0" y2="-22" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="-26" y2="26" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="26" y2="0" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="68" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">accelerometer</text>
  </g>

  <!-- arrow to the model -->
  <line x1="192" y1="230" x2="250" y2="230" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5"/>
  <path d="M250 230 l-12 -5 l0 10 Z" fill="#1a1d24" fill-opacity="0.5"/>

  <!-- pattern model -->
  <g transform="translate(310,230)">
    <rect x="-44" y="-36" width="88" height="72" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">pattern</text>
    <text x="0" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">model</text>
  </g>

  <!-- behaviors it produces (green, real) -->
  <g transform="translate(420,90)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#1a1d24">
    <g><circle cx="8" cy="-4" r="6" fill="#3a7d44"/><text x="26" y="0">scratching</text></g>
    <g transform="translate(0,34)"><circle cx="8" cy="-4" r="6" fill="#3a7d44"/><text x="26" y="0">licking</text></g>
    <g transform="translate(0,68)"><circle cx="8" cy="-4" r="6" fill="#3a7d44"/><text x="26" y="0">eating / drinking</text></g>
    <g transform="translate(0,102)"><circle cx="8" cy="-4" r="6" fill="#3a7d44"/><text x="26" y="0">sleeping</text></g>
    <g transform="translate(0,136)"><circle cx="8" cy="-4" r="6" fill="#3a7d44"/><text x="26" y="0">activity</text></g>
  </g>
  <!-- fan-out lines model->behaviors -->
  <g stroke="#3a7d44" stroke-width="2" stroke-opacity="0.4">
    <line x1="354" y1="220" x2="416" y2="86"/>
    <line x1="354" y1="226" x2="416" y2="120"/>
    <line x1="354" y1="232" x2="416" y2="154"/>
    <line x1="354" y1="238" x2="416" y2="188"/>
    <line x1="354" y1="244" x2="416" y2="222"/>
  </g>
  <!-- wellness score rollup -->
  <g transform="translate(700,160)">
    <rect x="-50" y="-26" width="150" height="52" rx="10" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="25" y="6" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">wellness score</text>
  </g>
  <line x1="600" y1="158" x2="648" y2="160" stroke="#3a7d44" stroke-width="2" stroke-opacity="0.5"/>

  <!-- what it does NOT measure (greyed, separated below) -->
  <line x1="420" y1="330" x2="940" y2="330" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="4 6"/>
  <text x="420" y="362" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#c14a3a">NOT MEASURED &#183; no sensor for these</text>
  <g transform="translate(420,392)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#7a808c">
    <g><path d="M3 -9 l8 8 M11 -9 l-8 8" stroke="#c14a3a" stroke-width="2.5" stroke-linecap="round"/><text x="26" y="0">heart rate</text></g>
    <g transform="translate(220,0)"><path d="M3 -9 l8 8 M11 -9 l-8 8" stroke="#c14a3a" stroke-width="2.5" stroke-linecap="round"/><text x="26" y="0">respiratory rate</text></g>
    <g transform="translate(0,32)"><path d="M3 -9 l8 8 M11 -9 l-8 8" stroke="#c14a3a" stroke-width="2.5" stroke-linecap="round"/><text x="26" y="0">body temperature</text></g>
  </g>
  <text x="420" y="468" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">Every output is an inference from movement &#8212; never a vital sign.</text>
</svg>
