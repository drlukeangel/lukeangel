<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 470" role="img" aria-label="A stable product layer sits on a single abstraction interface above three interchangeable model blocks; a side note reads model choice is evaluate and configure, not rewrite">
  <rect width="1100" height="470" fill="#fbf9f3"/>
  <text x="40" y="46" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="2" fill="#2b2b2b">ONE STABLE LAYER · INTERCHANGEABLE MODELS</text>

  <!-- product/application layer -->
  <rect x="40" y="86" width="800" height="78" rx="12" fill="#4f46b8"/>
  <text x="440" y="131" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#ffffff">product / application layer</text>

  <!-- abstraction interface (dashed) -->
  <line x1="40" y1="196" x2="840" y2="196" stroke="#4f46b8" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="40" y="222" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#6a655c">one interface · the product never sees the model swap</text>

  <!-- interchangeable model blocks -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="17" text-anchor="middle">
    <rect x="40"  y="262" width="170" height="86" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <text x="125" y="312" fill="#2b2b2b">model A</text>
    <rect x="250" y="262" width="170" height="86" rx="10" fill="#ece9f7" stroke="#4f46b8" stroke-width="4"/>
    <text x="335" y="305" fill="#2b2b2b">model B</text>
    <text x="335" y="328" font-size="13" fill="#4f46b8">— selected —</text>
    <rect x="460" y="262" width="170" height="86" rx="10" fill="#fffdf8" stroke="#2b2b2b" stroke-width="2.5"/>
    <text x="545" y="312" fill="#2b2b2b">model C</text>
  </g>
  <g stroke="#6a655c" stroke-width="2.4" fill="none" marker-end="url(#ab-arr)">
    <path d="M215 305 L245 305"/>
    <path d="M425 305 L455 305"/>
  </g>
  <defs><marker id="ab-arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6a655c"/></marker></defs>

  <!-- side note -->
  <g transform="translate(890,150)">
    <rect x="-30" y="-44" width="190" height="150" rx="12" fill="#f3f1fb" stroke="#4f46b8" stroke-width="2"/>
    <text x="65" y="-12" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#2b2b2b">model choice</text>
    <text x="65" y="16" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#2b2b2b">= evaluate +</text>
    <text x="65" y="44" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#2b2b2b">configure</text>
    <text x="65" y="80" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#c14a3a">not rewrite</text>
  </g>
</svg>
