<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Zigbee sensor mesh">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- coordinator: Pi + USB stick, centre-left -->
  <g transform="translate(250 315)">
    <rect x="-70" y="-50" width="140" height="100" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="-40" cy="-22" r="6" fill="#3a7d44"/>
    <rect x="-22" y="-30" width="86" height="14" rx="3" fill="#1a1d24" fill-opacity="0.12"/>
    <rect x="-22" y="-6" width="86" height="14" rx="3" fill="#1a1d24" fill-opacity="0.12"/>
    <!-- USB stick poking out the right -->
    <rect x="70" y="-14" width="58" height="28" rx="6" fill="#6a4c93"/>
    <rect x="128" y="-7" width="16" height="14" rx="3" fill="#1a1d24" fill-opacity="0.3"/>
  </g>

  <!-- two router plugs -->
  <g transform="translate(620 170)">
    <rect x="-26" y="-26" width="52" height="52" rx="9" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="-9" cy="0" r="4" fill="#1a1d24"/>
    <circle cx="9" cy="0" r="4" fill="#1a1d24"/>
  </g>
  <g transform="translate(660 470)">
    <rect x="-26" y="-26" width="52" height="52" rx="9" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="-9" cy="0" r="4" fill="#1a1d24"/>
    <circle cx="9" cy="0" r="4" fill="#1a1d24"/>
  </g>

  <!-- mesh links -->
  <g stroke="#6a4c93" stroke-width="3" fill="none" stroke-opacity="0.7">
    <line x1="378" y1="300" x2="594" y2="178"/>
    <line x1="378" y1="330" x2="634" y2="462"/>
    <line x1="646" y1="178" x2="900" y2="120"/>
    <line x1="646" y1="170" x2="960" y2="250"/>
    <line x1="686" y1="462" x2="930" y2="400"/>
    <line x1="686" y1="470" x2="980" y2="540"/>
    <line x1="646" y1="190" x2="900" y2="330"/>
  </g>

  <!-- contact sensors: small two-piece pucks -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3">
    <g transform="translate(910 110)"><rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/></g>
    <g transform="translate(972 244)"><rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/></g>
    <g transform="translate(912 322)"><rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/></g>
    <g transform="translate(942 392)"><rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/></g>
    <g transform="translate(992 534)"><rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/></g>
  </g>

  <!-- one dropped sensor: greyed, broken link -->
  <g transform="translate(1080 200)">
    <line x1="-60" y1="30" x2="-18" y2="6" stroke="#c14a3a" stroke-width="3" stroke-dasharray="6 7" stroke-opacity="0.8"/>
    <g fill="#fdfaf2" stroke="#7a808c" stroke-width="3" stroke-dasharray="5 5">
      <rect x="-18" y="-12" width="26" height="24" rx="4"/><rect x="12" y="-8" width="12" height="16" rx="3"/>
    </g>
  </g>
</svg>
