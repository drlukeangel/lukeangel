<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-label="Frigate pipeline">
  <rect width="1000" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>

  <!-- camera frames in -->
  <g transform="translate(40,140)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="60" y="-14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#5b616b">every frame</text>
    <text x="60" y="45" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">CAMERA</text>
    <text x="60" y="64" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">10 fps</text>
  </g>

  <!-- motion gate -->
  <g transform="translate(240,120)">
    <rect x="0" y="0" width="190" height="120" rx="8" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="95" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">MOTION DETECT</text>
    <text x="95" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">cheap · OpenCV · CPU</text>
    <line x1="20" y1="76" x2="170" y2="76" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="95" y="98" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#6a4c93">motion mask = gate</text>
  </g>

  <!-- arrow camera->motion -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="160" y1="180" x2="232" y2="180"/>
    <path d="M232 180 l-10 -5 l0 10 z"/>
  </g>

  <!-- masked frames discarded (down) -->
  <g transform="translate(300,250)">
    <text x="35" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#c14a3a">~80/day trees</text>
    <text x="35" y="78" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#c14a3a">dropped here</text>
  </g>
  <g stroke="#c14a3a" stroke-width="2.5" fill="#c14a3a" stroke-dasharray="6 4">
    <line x1="335" y1="240" x2="335" y2="270"/>
  </g>
  <g fill="#c14a3a"><path d="M335 272 l-5 -10 l10 0 z"/></g>

  <!-- arrow motion->coral (only motion frames) -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="430" y1="180" x2="552" y2="180"/>
    <path d="M552 180 l-10 -5 l0 10 z"/>
  </g>
  <text x="491" y="168" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">only motion frames</text>

  <!-- coral / object detection -->
  <g transform="translate(560,120)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="100" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">CORAL USB</text>
    <text x="100" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">MobileNet · COCO</text>
    <!-- chip with pins -->
    <rect x="65" y="72" width="70" height="34" rx="4" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2"/>
    <g stroke="#6a4c93" stroke-width="2">
      <line x1="65" y1="80" x2="55" y2="80"/><line x1="65" y1="98" x2="55" y2="98"/>
      <line x1="135" y1="80" x2="145" y2="80"/><line x1="135" y1="98" x2="145" y2="98"/>
    </g>
    <text x="100" y="95" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#1a1d24">~12 ms/frame</text>
  </g>

  <!-- arrow to events -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="760" y1="180" x2="832" y2="180"/>
    <path d="M832 180 l-10 -5 l0 10 z"/>
  </g>

  <!-- events out -->
  <g transform="translate(840,140)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="60" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">EVENTS</text>
    <text x="60" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#3a7d44">→ MQTT</text>
  </g>
</svg>
