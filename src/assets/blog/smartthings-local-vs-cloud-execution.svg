<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Local vs cloud execution">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">

    <!-- boundary line -->
    <line x1="500" y1="60" x2="500" y2="400" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="5 7"/>
    <text x="250" y="44" text-anchor="middle" font-size="16" fill="#3a7d44">local · on the LAN</text>
    <text x="750" y="44" text-anchor="middle" font-size="16" fill="#c14a3a">cloud · round-trips the internet</text>

    <!-- LOCAL items -->
    <g transform="translate(70 90)">
      <rect x="0" y="0" width="370" height="60" rx="10" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-opacity="0.4" stroke-width="2"/>
      <text x="16" y="26" font-size="13">native Z-Wave / Zigbee devices</text>
      <text x="16" y="46" font-size="12" fill="#3a7d44">instant, through the hub</text>
    </g>
    <g transform="translate(70 170)">
      <rect x="0" y="0" width="370" height="60" rx="10" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-opacity="0.4" stroke-width="2"/>
      <text x="16" y="26" font-size="13">whitelisted built-ins</text>
      <text x="16" y="46" font-size="12" fill="#3a7d44">basic lighting, Smart Home Monitor · &lt; 2 s</text>
    </g>

    <!-- CLOUD items -->
    <g transform="translate(560 90)">
      <rect x="0" y="0" width="370" height="60" rx="10" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
      <text x="16" y="26" font-size="13">custom Groovy SmartApps</text>
      <text x="16" y="46" font-size="12" fill="#c14a3a">2-5 s round-trip · the architectural risk</text>
    </g>
    <g transform="translate(560 170)">
      <rect x="0" y="0" width="370" height="60" rx="10" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
      <text x="16" y="26" font-size="13">cross-vendor: Hue · Wemo · Lutron</text>
      <text x="16" y="46" font-size="12" fill="#c14a3a">each via its own vendor cloud</text>
    </g>
    <g transform="translate(560 250)">
      <rect x="0" y="0" width="370" height="60" rx="10" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
      <text x="16" y="26" font-size="13">mobile app real-time state</text>
      <text x="16" y="46" font-size="12" fill="#c14a3a">cloud-polled even on the same Wi-Fi</text>
    </g>

    <text x="500" y="440" text-anchor="middle" font-size="13" fill="#5b616b">"runs locally" is true only for native devices + a whitelist; everything I write runs in the cloud</text>
  </g>
</svg>
