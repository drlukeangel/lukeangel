<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Cross-border data residency: US and EU PII kept in-region">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">PII STAYS IN-REGION BY DESIGN</text>

  <!-- ===== US region ===== -->
  <rect x="44" y="84" width="448" height="248" rx="16" fill="#2a52be" fill-opacity="0.05" stroke="#2a52be" stroke-width="3"/>
  <text x="72" y="116" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#2a52be">US REGIONS</text>
  <!-- cloud -->
  <g transform="translate(110,150)">
    <path d="M30 58 a27 27 0 0 1 4 -54 a33 33 0 0 1 60 10 a24 24 0 0 1 -6 48 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <!-- locked PII store -->
  <g transform="translate(250,168)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(88,16)" stroke="#2a52be" stroke-width="3" fill="none">
      <rect x="0" y="11" width="24" height="18" rx="3"/>
      <path d="M4 11 v-5 a8 8 0 0 1 16 0 v5"/>
    </g>
    <text x="100" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">US customer PII</text>
    <text x="100" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">Tier 3 · US data only</text>
  </g>

  <!-- ===== EU region ===== -->
  <rect x="628" y="84" width="448" height="248" rx="16" fill="#3a7d44" fill-opacity="0.05" stroke="#3a7d44" stroke-width="3"/>
  <text x="656" y="116" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#3a7d44">EU REGIONS</text>
  <text x="1052" y="116" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">eu-west-1 / eu-central-1</text>
  <g transform="translate(694,150)">
    <path d="M30 58 a27 27 0 0 1 4 -54 a33 33 0 0 1 60 10 a24 24 0 0 1 -6 48 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <g transform="translate(834,168)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(88,16)" stroke="#3a7d44" stroke-width="3" fill="none">
      <rect x="0" y="11" width="24" height="18" rx="3"/>
      <path d="M4 11 v-5 a8 8 0 0 1 16 0 v5"/>
    </g>
    <text x="100" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">EU customer PII</text>
    <text x="100" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">Tier 3 · EU data only</text>
  </g>

  <!-- the residency boundary: PII does NOT cross -->
  <line x1="560" y1="74" x2="560" y2="342" stroke="#c14a3a" stroke-width="3" stroke-dasharray="9 6"/>
  <!-- blocked PII crossing -->
  <g transform="translate(560,210)">
    <circle cx="0" cy="0" r="20" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c14a3a" stroke-width="3.5"/>
    <line x1="-10" y1="10" x2="10" y2="-10" stroke="#c14a3a" stroke-width="3.5"/>
  </g>
  <rect x="494" y="250" width="132" height="20" rx="5" fill="#fdfaf2"/>
  <text x="560" y="264" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">PII never co-located</text>

  <!-- the one sanctioned thin flow: engineering/ops access under SCCs -->
  <g stroke="#7a808c" stroke-width="2.4" stroke-dasharray="4 5" fill="none">
    <path d="M450 308 C 520 320 600 320 670 308"/>
  </g>
  <rect x="438" y="326" width="244" height="18" rx="5" fill="#fdfaf2"/>
  <text x="560" y="339" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">eng / ops access only — under SCCs + TOMs</text>

  <!-- bottom: why this is tractable -->
  <g transform="translate(44,358)">
    <rect x="0" y="0" width="1032" height="86" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <text x="24" y="32" font-family="ui-monospace,monospace" font-size="12" letter-spacing="1" fill="#7a808c">WHY RIGHT-TO-DELETION IS TRACTABLE</text>
    <text x="24" y="62" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">Tier-3 deletion lands within 30 days, in any region — because the PII sits in one isolated place, not sprinkled across telemetry.</text>
  </g>
</svg>
