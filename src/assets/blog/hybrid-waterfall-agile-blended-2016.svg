<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t d">
  <title id="t">Hybrid Waterfall + Agile — keep the guard rails, ship in iterations</title>
  <desc id="d">2016-era flat diagram showing a hybrid project structure: waterfall-style outer milestones (charter, requirements, design, launch) with agile sprints filling the development phase. Best of both — predictable bookends and adaptive middle.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#fff;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <rect width="800" height="380" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Hybrid model — waterfall bookends, agile middle</text>

  <!-- Outer waterfall phases -->
  <g transform="translate(40,80)">
    <rect width="120" height="60" fill="#0066cc" rx="4"/>
    <text x="60" y="32" text-anchor="middle" class="label">Charter</text>
    <text x="60" y="48" text-anchor="middle" class="small" fill="#cfe0f5">waterfall gate</text>
  </g>
  <g transform="translate(170,80)">
    <rect width="120" height="60" fill="#0066cc" rx="4"/>
    <text x="60" y="32" text-anchor="middle" class="label">Requirements</text>
    <text x="60" y="48" text-anchor="middle" class="small" fill="#cfe0f5">waterfall gate</text>
  </g>

  <!-- Agile middle -->
  <g transform="translate(300,80)">
    <rect width="320" height="60" fill="#ff6b35" rx="4"/>
    <text x="160" y="32" text-anchor="middle" class="label">Build (agile sprints)</text>
    <text x="160" y="48" text-anchor="middle" class="small" fill="#fff5ee">2-week sprints · adaptive scope</text>
  </g>

  <g transform="translate(630,80)">
    <rect width="130" height="60" fill="#0066cc" rx="4"/>
    <text x="65" y="32" text-anchor="middle" class="label">Launch</text>
    <text x="65" y="48" text-anchor="middle" class="small" fill="#cfe0f5">waterfall gate</text>
  </g>

  <!-- Sprint detail underneath -->
  <text x="460" y="170" text-anchor="middle" class="small">inside the build phase:</text>
  <g transform="translate(300,180)">
    <rect width="60" height="40" fill="#ee5f29" rx="2"/><text x="30" y="24" text-anchor="middle" class="small" fill="#fff">S1</text>
    <rect x="66" width="60" height="40" fill="#dc561d" rx="2"/><text x="96" y="24" text-anchor="middle" class="small" fill="#fff">S2</text>
    <rect x="132" width="60" height="40" fill="#cb4d11" rx="2"/><text x="162" y="24" text-anchor="middle" class="small" fill="#fff">S3</text>
    <rect x="198" width="60" height="40" fill="#b94405" rx="2"/><text x="228" y="24" text-anchor="middle" class="small" fill="#fff">S4</text>
    <rect x="264" width="56" height="40" fill="#a83b00" rx="2"/><text x="292" y="24" text-anchor="middle" class="small" fill="#fff">S5</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40,260)">
    <rect width="720" height="100" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="22" class="label" fill="#1a1d24">When this beats pure waterfall and pure agile</text>
    <text x="14" y="44" class="small">- <tspan font-weight="600">Charter &amp; Launch are immovable</tspan> (regulatory, contractual, vendor-coordinated): the outer waterfall gates protect them.</text>
    <text x="14" y="62" class="small">- <tspan font-weight="600">The middle is the messy part</tspan> (UX iteration, eval-driven AI features, customer feedback loops): agile sprints fit it.</text>
    <text x="14" y="80" class="small">- <tspan font-weight="600">Reporting to stakeholders</tspan> uses the waterfall language they speak; the team operates with agile cadence internally.</text>
  </g>
</svg>
