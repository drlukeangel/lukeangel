<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Year-end forecast scorecard and house">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- LEFT: forecast scorecard — a ledger card with rows, mostly checks, one half, one cross -->
  <g transform="translate(110,150)">
    <rect x="0" y="0" width="430" height="360" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- spine perforations -->
    <g fill="#6a4c93" opacity="0.5"><circle cx="22" cy="40" r="4"/><circle cx="22" cy="100" r="4"/><circle cx="22" cy="160" r="4"/><circle cx="22" cy="220" r="4"/><circle cx="22" cy="280" r="4"/><circle cx="22" cy="320" r="4"/></g>
    <!-- 8 rows: each a bar + a status glyph -->
    <g>
      <!-- row template: bar then glyph -->
      <!-- 6 checks -->
      <g stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" fill="none">
        <path d="M362 38 l8 9 16 -20"/>
        <path d="M362 78 l8 9 16 -20"/>
        <path d="M362 118 l8 9 16 -20"/>
        <path d="M362 158 l8 9 16 -20"/>
        <path d="M362 238 l8 9 16 -20"/>
        <path d="M362 320 l8 9 16 -20"/>
      </g>
      <!-- half mark (Matter cameras) — half-filled circle -->
      <g transform="translate(375,200)">
        <circle r="13" fill="none" stroke="#7a808c" stroke-width="3"/>
        <path d="M0 -13 a13 13 0 0 1 0 26 z" fill="#7a808c"/>
      </g>
      <!-- one cross (solar — the good miss) -->
      <g transform="translate(375,280)" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round">
        <line x1="-10" y1="-10" x2="10" y2="10"/><line x1="10" y1="-10" x2="-10" y2="10"/>
      </g>
      <!-- prediction bars (muted) -->
      <g fill="#1a1d24" opacity="0.16">
        <rect x="60" y="30" width="250" height="16" rx="8"/>
        <rect x="60" y="70" width="210" height="16" rx="8"/>
        <rect x="60" y="110" width="270" height="16" rx="8"/>
        <rect x="60" y="150" width="190" height="16" rx="8"/>
        <rect x="60" y="190" width="240" height="16" rx="8"/>
        <rect x="60" y="270" width="220" height="16" rx="8"/>
        <rect x="60" y="230" width="200" height="16" rx="8"/>
        <rect x="60" y="312" width="260" height="16" rx="8"/>
      </g>
    </g>
  </g>

  <!-- RIGHT: a house carrying this year's three real additions -->
  <g transform="translate(640,150)">
    <!-- house outline -->
    <g fill="none" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round">
      <path d="M40 360 V150 L230 30 L420 150 V360 Z"/>
      <line x1="40" y1="240" x2="420" y2="240" opacity="0.35"/>
    </g>
    <!-- solar panel on the roof slope -->
    <g transform="translate(150,70) rotate(-32)">
      <rect x="0" y="0" width="120" height="56" rx="4" fill="#6a4c93" fill-opacity="0.15" stroke="#1a1d24" stroke-width="2.4"/>
      <g stroke="#1a1d24" stroke-width="1.4" opacity="0.6">
        <line x1="40" y1="0" x2="40" y2="56"/><line x1="80" y1="0" x2="80" y2="56"/>
        <line x1="0" y1="28" x2="120" y2="28"/>
      </g>
    </g>
    <!-- battery box on the wall -->
    <g transform="translate(70,270)">
      <rect x="0" y="0" width="44" height="70" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
      <rect x="14" y="-8" width="16" height="8" rx="2" fill="#1a1d24"/>
      <path d="M24 14 l-9 22 h12 l-9 22" fill="none" stroke="#6a4c93" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- robot vacuum on the floor -->
    <g transform="translate(300,326)">
      <ellipse cx="0" cy="0" rx="44" ry="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
      <ellipse cx="0" cy="-4" rx="44" ry="14" fill="#6a4c93" fill-opacity="0.12" stroke="#1a1d24" stroke-width="2.4"/>
      <circle cx="0" cy="-4" r="6" fill="#6a4c93"/>
    </g>
    <!-- local voice waveform inside the house -->
    <g transform="translate(230,180)" stroke="#6a4c93" stroke-width="3" stroke-linecap="round">
      <line x1="-44" y1="0" x2="-44" y2="0"/>
      <line x1="-44" y1="-6" x2="-44" y2="6"/>
      <line x1="-30" y1="-16" x2="-30" y2="16"/>
      <line x1="-16" y1="-28" x2="-16" y2="28"/>
      <line x1="-2" y1="-14" x2="-2" y2="14"/>
      <line x1="12" y1="-24" x2="12" y2="24"/>
      <line x1="26" y1="-10" x2="26" y2="10"/>
      <line x1="40" y1="-20" x2="40" y2="20"/>
    </g>
  </g>
</svg>
