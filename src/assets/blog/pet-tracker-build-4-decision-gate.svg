<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560" role="img" aria-label="Scorecard decision gate">
  <rect width="920" height="560" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:18px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#7a808c;letter-spacing:1px;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:16px;fill:#5b616b;}
  </style>

  <text x="40" y="46" class="hd">CRITERION</text>
  <text x="430" y="46" class="hd">PASS TARGET</text>
  <text x="700" y="46" class="hd">GATES THE BUILD?</text>
  <line x1="40" y1="58" x2="880" y2="58" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Row: LoRa range -->
  <g transform="translate(0,100)">
    <circle cx="52" cy="-4" r="10" fill="#1f7a6b"/>
    <text x="76" y="0" class="lbl">LoRa range</text>
    <text x="76" y="22" class="sm">1km LOS / 300m suburb / 150m trail</text>
    <text x="430" y="0" class="lbl">all three hold</text>
    <text x="700" y="0" class="lbl" fill="#c14a3a">HARD STOP</text>
  </g>
  <line x1="40" y1="138" x2="880" y2="138" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Row: battery -->
  <g transform="translate(0,182)">
    <circle cx="52" cy="-4" r="10" fill="#1f7a6b"/>
    <text x="76" y="0" class="lbl">Battery runtime</text>
    <text x="76" y="22" class="sm">3 days beaconing / 2 wks idle</text>
    <text x="430" y="0" class="lbl">active &#8805; 3 days</text>
    <text x="700" y="0" class="lbl" fill="#c14a3a">HARD STOP</text>
  </g>
  <line x1="40" y1="220" x2="880" y2="220" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Row: GPS -->
  <g transform="translate(0,264)">
    <circle cx="52" cy="-4" r="10" fill="#1f7a6b" opacity="0.6"/>
    <text x="76" y="0" class="lbl">GPS fix &amp; accuracy</text>
    <text x="76" y="22" class="sm">60s cold / 15s warm / &#8804;10m</text>
    <text x="430" y="0" class="lbl">meets targets</text>
    <text x="700" y="0" class="lbl">required</text>
  </g>
  <line x1="40" y1="302" x2="880" y2="302" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Row: presence + link -->
  <g transform="translate(0,346)">
    <circle cx="52" cy="-4" r="10" fill="#1f7a6b" opacity="0.6"/>
    <text x="76" y="0" class="lbl">Presence + BLE link</text>
    <text x="76" y="22" class="sm">9/10 transitions / reconnect &#8804;30s</text>
    <text x="430" y="0" class="lbl">reliable</text>
    <text x="700" y="0" class="lbl">required</text>
  </g>
  <line x1="40" y1="384" x2="880" y2="384" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>

  <!-- The gate: AND of all -> two outcomes -->
  <g transform="translate(0,450)">
    <rect x="40" y="0" width="300" height="76" rx="12" fill="#1a1d24" opacity="0.05"/>
    <text x="60" y="34" class="lbl">ALL hold for real use</text>
    <text x="60" y="58" class="sm">range + GPS + 3-day battery</text>

    <!-- go arrow -->
    <path d="M345 24 h120" fill="none" stroke="#3a7d44" stroke-width="4" marker-end="url(#ar-go)"/>
    <rect x="470" y="2" width="180" height="44" rx="10" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
    <path d="M488 24 l9 11 l18 -22" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="522" y="30" class="lbl" fill="#3a7d44">BUILD COLLAR</text>

    <!-- hold arrow -->
    <path d="M345 54 h120" fill="none" stroke="#c14a3a" stroke-width="4" marker-end="url(#ar-no)"/>
    <rect x="470" y="56" width="400" height="44" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <path d="M484 70 l16 16 M500 70 l-16 16" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
    <text x="512" y="83" class="sm" fill="#c14a3a">RECONSIDER: antenna, cellular, or power tuning</text>
  </g>

  <defs>
    <marker id="ar-go" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3a7d44"/></marker>
    <marker id="ar-no" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#c14a3a"/></marker>
  </defs>
</svg>
