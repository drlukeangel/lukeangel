<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="Fleet telemetry dashboard mockup">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- window chrome -->
  <line x1="0" y1="58" x2="1120" y2="58" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g>
    <circle cx="34" cy="30" r="6" fill="#c14a3a" fill-opacity="0.55"/>
    <circle cx="56" cy="30" r="6" fill="#7a808c" fill-opacity="0.45"/>
    <circle cx="78" cy="30" r="6" fill="#3a7d44" fill-opacity="0.55"/>
  </g>
  <text x="108" y="35" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#7a808c">fleet telemetry · GET /tools</text>
  <!-- live pill -->
  <g>
    <rect x="958" y="19" width="128" height="24" rx="12" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="1.5"/>
    <circle cx="976" cy="31" r="4.5" fill="#3a7d44"/>
    <text x="988" y="36" font-family="ui-monospace, monospace" font-size="12.5" fill="#3a7d44">live · last 24h</text>
  </g>

  <!-- summary stat cards -->
  <g font-family="ui-monospace, monospace">
    <!-- card: tools online -->
    <rect x="34" y="80" width="252" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2"/>
    <text x="52" y="108" font-size="12" letter-spacing="1.5" fill="#7a808c">TOOLS ONLINE</text>
    <text x="52" y="150" font-family="ui-monospace, monospace" font-size="38" fill="#1a1d24">187</text>
    <text x="142" y="150" font-size="15" fill="#7a808c">/ 200</text>

    <!-- card: avg battery -->
    <rect x="298" y="80" width="252" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2"/>
    <text x="316" y="108" font-size="12" letter-spacing="1.5" fill="#7a808c">AVG BATTERY</text>
    <text x="316" y="150" font-size="38" fill="#2a52be">72%</text>
    <!-- mini battery glyph -->
    <rect x="430" y="123" width="92" height="26" rx="4" fill="none" stroke="#2a52be" stroke-width="2.5"/>
    <rect x="524" y="130" width="6" height="12" rx="2" fill="#2a52be"/>
    <rect x="434" y="127" width="62" height="18" rx="2" fill="#2a52be" fill-opacity="0.6"/>

    <!-- card: usage minutes -->
    <rect x="562" y="80" width="252" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2"/>
    <text x="580" y="108" font-size="12" letter-spacing="1.5" fill="#7a808c">USAGE MIN · 24H</text>
    <text x="580" y="150" font-size="38" fill="#1a1d24">14.2k</text>
    <!-- sparkline -->
    <polyline points="700,150 716,140 732,146 748,128 764,134 780,118 796,124" fill="none" stroke="#2a52be" stroke-width="2.5"/>

    <!-- card: active faults -->
    <rect x="826" y="80" width="260" height="92" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
    <text x="844" y="108" font-size="12" letter-spacing="1.5" fill="#7a808c">ACTIVE FAULTS</text>
    <text x="844" y="150" font-size="38" fill="#c14a3a">6</text>
    <!-- warning triangle -->
    <path d="M928 150 L948 116 L968 150 Z" fill="none" stroke="#c14a3a" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="948" y1="128" x2="948" y2="140" stroke="#c14a3a" stroke-width="2.5"/>
    <circle cx="948" cy="145" r="1.8" fill="#c14a3a"/>
  </g>

  <!-- table header -->
  <g font-family="ui-monospace, monospace">
    <text x="34" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">DEVICE</text>
    <text x="270" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">BATTERY</text>
    <text x="470" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">TORQUE (N·m)</text>
    <text x="690" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">USAGE MIN</text>
    <text x="850" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">FAULT</text>
    <text x="1000" y="208" font-size="13" letter-spacing="1.5" fill="#7a808c">SEEN</text>
  </g>
  <line x1="34" y1="220" x2="1086" y2="220" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- rows -->
  <g font-family="ui-monospace, monospace" font-size="13.5" fill="#1a1d24">
    <!-- row 1 — impact wrench, healthy -->
    <text x="34" y="252">impact-wrench-0a14</text>
    <rect x="270" y="240" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="242" width="106" height="10" rx="2" fill="#3a7d44" fill-opacity="0.65"/>
    <text x="400" y="252" font-size="12.5" fill="#5b616b">88%</text>
    <text x="470" y="252">142</text>
    <text x="690" y="252">37</text>
    <text x="850" y="252" fill="#3a7d44">— ok</text>
    <text x="1000" y="252" fill="#5b616b">live</text>
    <line x1="34" y1="266" x2="1086" y2="266" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

    <!-- row 2 — drill, low battery -->
    <text x="34" y="296">drill-3f02</text>
    <rect x="270" y="284" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="286" width="26" height="10" rx="2" fill="#c87533" fill-opacity="0.7"/>
    <text x="400" y="296" font-size="12.5" fill="#5b616b">19%</text>
    <text x="470" y="296">58</text>
    <text x="690" y="296">12</text>
    <text x="850" y="296" fill="#3a7d44">— ok</text>
    <text x="1000" y="296" fill="#5b616b">2m ago</text>
    <line x1="34" y1="310" x2="1086" y2="310" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

    <!-- row 3 — driver, overtemp fault -->
    <text x="34" y="340">driver-7b9c</text>
    <rect x="270" y="328" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="330" width="74" height="10" rx="2" fill="#3a7d44" fill-opacity="0.65"/>
    <text x="400" y="340" font-size="12.5" fill="#5b616b">61%</text>
    <text x="470" y="340">96</text>
    <text x="690" y="340">29</text>
    <!-- fault chip -->
    <rect x="850" y="328" width="118" height="20" rx="10" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="1.3"/>
    <text x="862" y="342" font-size="11.5" fill="#c14a3a">E07 overtemp</text>
    <text x="1000" y="340" fill="#5b616b">9m ago</text>
    <line x1="34" y1="354" x2="1086" y2="354" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

    <!-- row 4 — impact wrench, healthy -->
    <text x="34" y="384">impact-wrench-c521</text>
    <rect x="270" y="372" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="374" width="90" height="10" rx="2" fill="#3a7d44" fill-opacity="0.65"/>
    <text x="400" y="384" font-size="12.5" fill="#5b616b">74%</text>
    <text x="470" y="384">155</text>
    <text x="690" y="384">44</text>
    <text x="850" y="384" fill="#3a7d44">— ok</text>
    <text x="1000" y="384" fill="#5b616b">live</text>
    <line x1="34" y1="398" x2="1086" y2="398" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

    <!-- row 5 — drill, cell-imbalance fault -->
    <text x="34" y="428">drill-1d88</text>
    <rect x="270" y="416" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="418" width="50" height="10" rx="2" fill="#c87533" fill-opacity="0.7"/>
    <text x="400" y="428" font-size="12.5" fill="#5b616b">38%</text>
    <text x="470" y="428">71</text>
    <text x="690" y="428">21</text>
    <rect x="850" y="416" width="132" height="20" rx="10" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="1.3"/>
    <text x="862" y="430" font-size="11.5" fill="#c14a3a">E12 cell-imbal</text>
    <text x="1000" y="428" fill="#5b616b">14m ago</text>
    <line x1="34" y1="442" x2="1086" y2="442" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1"/>

    <!-- row 6 — driver, healthy -->
    <text x="34" y="472">driver-e034</text>
    <rect x="270" y="460" width="120" height="14" rx="3" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect x="272" y="462" width="113" height="10" rx="2" fill="#3a7d44" fill-opacity="0.65"/>
    <text x="400" y="472" font-size="12.5" fill="#5b616b">94%</text>
    <text x="470" y="472">88</text>
    <text x="690" y="472">33</text>
    <text x="850" y="472" fill="#3a7d44">— ok</text>
    <text x="1000" y="472" fill="#5b616b">live</text>
  </g>

  <!-- footer note -->
  <text x="34" y="524" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">187 of 200 tools reporting · the dashboard polls GET /tools and reads what the ingest path wrote to DynamoDB.</text>
</svg>
