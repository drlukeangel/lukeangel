<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="What one CDK deploy stands up">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE CDK DEPLOY STANDS THIS UP</text>

  <!-- device source (outside the stack) -->
  <g font-family="ui-monospace, monospace">
    <rect x="40" y="150" width="150" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-dasharray="7 6"/>
    <circle cx="115" cy="196" r="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="115" cy="196" r="6" fill="#2a52be"/>
    <text x="115" y="240" text-anchor="middle" font-size="12.5" fill="#1a1d24">simulator</text>
    <text x="115" y="258" text-anchor="middle" font-size="12.5" fill="#1a1d24">or ESP32-C3</text>
  </g>
  <text x="115" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">you pick one</text>

  <!-- arrow device -> iot core (MQTT/TLS) -->
  <g stroke="#2a52be" stroke-width="3" fill="#2a52be">
    <line x1="190" y1="210" x2="252" y2="210"/>
    <path d="M256 210 l-15 -7 v14 z"/>
  </g>
  <text x="221" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">mqtt / tls</text>

  <!-- the provisioned stack boundary -->
  <rect x="262" y="84" width="700" height="302" rx="14" fill="#2a52be" fill-opacity="0.05" stroke="#2a52be" stroke-width="2.5" stroke-dasharray="3 6"/>
  <text x="282" y="112" font-family="ui-monospace,monospace" font-size="12" letter-spacing="2" fill="#2a52be">cloud/cdk · the stack</text>

  <g font-family="ui-monospace, monospace">
    <!-- IoT Core + topic rule -->
    <rect x="282" y="150" width="150" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="357" cy="194" r="14" fill="none" stroke="#2a52be" stroke-width="3"/>
    <circle cx="357" cy="194" r="3.5" fill="#2a52be"/>
    <text x="357" y="234" text-anchor="middle" font-size="12.5" fill="#1a1d24">IoT Core</text>
    <text x="357" y="252" text-anchor="middle" font-size="11" fill="#7a808c">+ topic rule</text>

    <!-- Lambda ingest -->
    <rect x="472" y="150" width="150" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M533 178 L555 178 L544 200 L562 200 L536 236 L548 206 L530 206 Z" fill="#2a52be"/>
    <text x="547" y="252" text-anchor="middle" font-size="12.5" fill="#1a1d24">ingest λ</text>

    <!-- DynamoDB -->
    <rect x="662" y="150" width="150" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M715 178 a22 8 0 0 0 44 0 v34 a22 8 0 0 1 -44 0 Z" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <ellipse cx="737" cy="178" rx="22" ry="8" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="737" y="252" text-anchor="middle" font-size="12.5" fill="#1a1d24">DynamoDB</text>

    <!-- HTTP API + query lambda -->
    <rect x="852" y="150" width="92" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M898 176 a18 18 0 1 0 0.1 0 M880 194 h36 M898 176 c-10 6 -10 30 0 36 M898 176 c10 6 10 30 0 36" fill="none" stroke="#2a52be" stroke-width="2.5"/>
    <text x="898" y="252" text-anchor="middle" font-size="11.5" fill="#1a1d24">HTTP API</text>
    <text x="898" y="268" text-anchor="middle" font-size="10.5" fill="#7a808c">query λ</text>
  </g>

  <!-- flow arrows inside stack -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <line x1="432" y1="210" x2="468" y2="210"/><path d="M472 210 l-15 -7 v14 z"/>
    <line x1="622" y1="210" x2="658" y2="210"/><path d="M662 210 l-15 -7 v14 z"/>
  </g>
  <!-- DDB read back to query API (reverse) -->
  <g stroke="#7a808c" stroke-width="2.5" fill="#7a808c">
    <line x1="848" y1="232" x2="816" y2="232"/><path d="M812 232 l15 -7 v14 z"/>
  </g>

  <!-- dashboard outside stack, reads HTTP API -->
  <g stroke="#2a52be" stroke-width="3" fill="#2a52be">
    <line x1="944" y1="200" x2="980" y2="200"/><path d="M984 200 l-15 -7 v14 z"/>
  </g>
  <g font-family="ui-monospace, monospace">
    <rect x="988" y="150" width="96" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-dasharray="7 6"/>
    <rect x="1006" y="178" width="11" height="14" fill="#2a52be"/>
    <rect x="1022" y="170" width="11" height="22" fill="#2a52be" fill-opacity="0.7"/>
    <rect x="1038" y="184" width="11" height="8" fill="#2a52be" fill-opacity="0.45"/>
    <text x="1036" y="234" text-anchor="middle" font-size="12" fill="#1a1d24">dashboard</text>
    <text x="1036" y="252" text-anchor="middle" font-size="10.5" fill="#7a808c">GET /tools</text>
  </g>

  <!-- footer note -->
  <text x="34" y="438" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">Single tenant, moderate scale. No OTA, no cert rotation, no analytics layer — those graduate out.</text>
</svg>
