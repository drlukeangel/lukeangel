<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470">
  <rect width="900" height="470" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>

  <line x1="450" y1="64" x2="450" y2="420" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- LEFT: verify in the gossip (the wrong turn) -->
  <text x="50" y="50" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="17" font-weight="700" fill="#c14a3a">VERIFY IN THE GOSSIP</text>
  <text x="50" y="74" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#5b616b">the wrong turn</text>

  <!-- a digest cloud carrying the cert, checked on receipt -->
  <g transform="translate(60 110)">
    <path d="M40 60 a28 28 0 0 1 8 -54 a32 32 0 0 1 58 -6 a26 26 0 0 1 38 22 a24 24 0 0 1 -6 46 Z"
          fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-opacity="0.8"/>
    <text x="92" y="44" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#1a1d24">digest</text>
    <text x="92" y="60" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="11" fill="#5b616b">+ cert rides along</text>
  </g>

  <!-- arrow down into the hot path -->
  <line x1="150" y1="200" x2="150" y2="246" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="3"/>
  <polygon points="150,250 144,240 156,240" fill="#1a1d24" fill-opacity="0.4"/>

  <text x="60" y="282" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">checked on every receipt,</text>
  <text x="60" y="302" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">inside live_digests()</text>

  <!-- cost callout -->
  <g transform="translate(60 330)">
    <rect x="0" y="0" width="320" height="62" rx="6" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2"/>
    <path d="M20 31 l-9 -9 m9 9 l9 9 m-9 -9 l9 -9 m-9 9 l-9 9" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
    <text x="44" y="27" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#1a1d24">parses security content in the</text>
    <text x="44" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#1a1d24">one path you want dumb &amp; fast</text>
  </g>

  <!-- RIGHT: verify at the connection (the answer) -->
  <text x="490" y="50" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="17" font-weight="700" fill="#3a7d44">VERIFY AT THE CONNECTION</text>
  <text x="490" y="74" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#5b616b">the answer</text>

  <!-- two nodes opening a direct connection, SVID as first frame -->
  <g>
    <circle cx="540" cy="170" r="26" fill="#b7410e"/>
    <circle cx="810" cy="170" r="26" fill="#b7410e"/>
    <line x1="566" y1="170" x2="784" y2="170" stroke="#3a7d44" stroke-width="3"/>
    <!-- first-frame seal on the wire -->
    <g transform="translate(675 170)">
      <circle r="18" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
      <path d="M-8 0 l5 6 l11 -13" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="675" y="226" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#5b616b">SVID = first bi-stream frame</text>

  <!-- arrow down -->
  <line x1="675" y1="246" x2="675" y2="288" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="3"/>
  <polygon points="675,292 669,282 681,282" fill="#1a1d24" fill-opacity="0.4"/>

  <!-- benefit callout -->
  <g transform="translate(520 312)">
    <rect x="0" y="0" width="320" height="80" rx="6" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
    <path d="M22 40 l8 9 l16 -19" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="30" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#1a1d24">one gate, at the door, on the</text>
    <text x="60" y="49" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#1a1d24">connection you're about to use</text>
    <text x="60" y="68" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="12" fill="#5b616b">gossip stays pure soft-state</text>
  </g>
</svg>
