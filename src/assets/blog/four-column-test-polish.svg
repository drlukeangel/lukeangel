<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470">
  <rect x="2" y="2" width="996" height="466" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    text{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24}
    .h{font-size:18px;font-weight:700}.sub{font-size:14px;fill:#5b616b}.mid{font-size:15px;font-weight:700;fill:#b7410e}
  </style>
  <text class="sub" x="40" y="42" fill="#7a808c">clarity answers what we'd build; only a test answers whether to</text>
  <!-- left: polished mockup, feels ready -->
  <rect x="60" y="90" width="320" height="300" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
  <rect x="90" y="120" width="260" height="34" rx="5" fill="#3a7d44" fill-opacity="0.18"/>
  <rect x="90" y="170" width="200" height="18" rx="4" fill="#1a1d24" fill-opacity="0.25"/>
  <rect x="90" y="198" width="240" height="18" rx="4" fill="#1a1d24" fill-opacity="0.25"/>
  <rect x="90" y="226" width="160" height="18" rx="4" fill="#1a1d24" fill-opacity="0.25"/>
  <rect x="90" y="300" width="120" height="44" rx="6" fill="#3a7d44" fill-opacity="0.3"/>
  <path d="M300 322 l16 16 l28 -32" fill="none" stroke="#3a7d44" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="h good" x="90" y="375" fill="#3a7d44">feels ready</text>
  <!-- middle arrow -->
  <line x1="395" y1="240" x2="600" y2="240" stroke="#b7410e" stroke-width="3" stroke-dasharray="2 0"/><polygon points="600,240 584,231 584,249" fill="#b7410e"/>
  <text class="mid" x="497" y="228" text-anchor="middle">polish is</text>
  <text class="mid" x="497" y="262" text-anchor="middle">not evidence</text>
  <!-- right: a lone data point with a question -->
  <rect x="620" y="90" width="320" height="300" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-opacity="0.5" stroke-width="3" stroke-dasharray="9 6"/>
  <circle cx="780" cy="220" r="14" fill="#c14a3a"/>
  <text x="780" y="290" font-family="ui-monospace,monospace" font-size="60" fill="#c14a3a" text-anchor="middle">?</text>
  <text class="h" x="650" y="375" fill="#c14a3a">is it wanted?</text>
</svg>
