<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="failing smart feeder, working backup">
  <defs>
    <pattern id="dotsPN" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsPN)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <line x1="90" y1="510" x2="1120" y2="510" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>

  <!-- broken cloud link overhead (left side) -->
  <g transform="translate(360,120)">
    <path d="M-70 24 a34 34 0 0 1 60 -28 a40 40 0 0 1 74 14 a30 30 0 0 1 -4 60 l-118 0 a30 30 0 0 1 -12 -46 Z"
          fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5"/>
    <!-- broken X over the cloud -->
    <circle cx="0" cy="34" r="20" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
    <path d="M-9 25 l18 18 M9 25 l-18 18" stroke="#c14a3a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- severed link from cloud to smart feeder -->
  <g stroke="#c14a3a" stroke-width="4" stroke-linecap="round">
    <line x1="360" y1="208" x2="360" y2="250"/>
    <line x1="360" y1="278" x2="360" y2="300"/>
  </g>
  <path d="M352 256 l16 16 M368 256 l-16 16" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- LEFT: fracturing smart (cloud) feeder -->
  <g transform="translate(360,300)">
    <!-- hopper -->
    <path d="M-86 20 L-50 -120 L50 -120 L86 20 Z" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <!-- crack lines through it -->
    <path d="M-10 -118 l-14 60 l18 22 l-10 56" fill="none" stroke="#c14a3a" stroke-width="3" stroke-opacity="0.85"/>
    <path d="M30 -110 l-8 44 l14 28" fill="none" stroke="#c14a3a" stroke-width="3" stroke-opacity="0.7"/>
    <!-- base + bowl -->
    <rect x="-86" y="20" width="172" height="54" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <ellipse cx="0" cy="96" rx="58" ry="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <!-- empty bowl (nothing dispensed) -->
    <ellipse cx="0" cy="96" rx="34" ry="9" fill="#1a1d24" fill-opacity="0.05"/>
    <!-- dead status light -->
    <circle cx="0" cy="46" r="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  </g>

  <!-- RIGHT: simple mechanical timer feeder, running -->
  <g transform="translate(840,330)">
    <rect x="-78" y="-150" width="156" height="120" rx="16" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <!-- clock face: it just runs -->
    <circle cx="0" cy="-90" r="40" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <line x1="0" y1="-90" x2="0" y2="-118" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-90" x2="22" y2="-78" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-90" r="4" fill="#1a1d24"/>
    <!-- bowl + kibble present -->
    <ellipse cx="0" cy="14" rx="66" ry="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <ellipse cx="0" cy="10" rx="40" ry="11" fill="#c87533" fill-opacity="0.25"/>
    <circle cx="-14" cy="8" r="5" fill="#c87533"/>
    <circle cx="2" cy="12" r="5" fill="#c87533"/>
    <circle cx="16" cy="7" r="5" fill="#c87533"/>
    <!-- green running light -->
    <circle cx="56" cy="-128" r="7" fill="#3a7d44"/>
  </g>
</svg>
