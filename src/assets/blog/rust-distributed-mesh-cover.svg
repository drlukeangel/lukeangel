<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1a1d24" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- background + faint dot pattern -->
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 24px left accent bar (rust orange) -->
  <rect x="0" y="0" width="24" height="630" fill="#b7410e"/>

  <!-- ============================================================== -->
  <!-- connection lines (drawn first so nodes sit on top)             -->
  <!-- ============================================================== -->

  <g stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <!-- LEFT CLUSTER (hub at 380,280) -->
    <line x1="380" y1="280" x2="220" y2="170"/>
    <line x1="380" y1="280" x2="170" y2="270"/>
    <line x1="380" y1="280" x2="200" y2="400"/>
    <line x1="380" y1="280" x2="290" y2="470"/>
    <line x1="380" y1="280" x2="430" y2="490"/>
    <line x1="380" y1="280" x2="540" y2="380"/>
    <line x1="380" y1="280" x2="530" y2="180"/>
    <line x1="380" y1="280" x2="270" y2="140"/>

    <!-- RIGHT CLUSTER (hub at 920,330) -->
    <line x1="920" y1="330" x2="780" y2="200"/>
    <line x1="920" y1="330" x2="1060" y2="240"/>
    <line x1="920" y1="330" x2="1110" y2="370"/>
    <line x1="920" y1="330" x2="1000" y2="490"/>
    <line x1="920" y1="330" x2="850" y2="490"/>
    <line x1="920" y1="330" x2="740" y2="400"/>
    <line x1="920" y1="330" x2="850" y2="160"/>
  </g>

  <!-- BRIDGE: dashed accent line connecting the two clusters -->
  <g stroke="#b7410e" stroke-opacity="0.55" stroke-width="2.5" fill="none">
    <line x1="540" y1="380" x2="650" y2="330" stroke-dasharray="6 5"/>
    <line x1="650" y1="330" x2="740" y2="400" stroke-dasharray="6 5"/>
    <line x1="540" y1="380" x2="650" y2="330" stroke-dasharray="6 5"/>
  </g>

  <!-- ============================================================== -->
  <!-- nodes — hubs are larger, accent-filled; leaves are ink         -->
  <!-- ============================================================== -->

  <!-- LEFT CLUSTER LEAVES (small ink circles) -->
  <g fill="#1a1d24">
    <circle cx="220" cy="170" r="14"/>
    <circle cx="170" cy="270" r="14"/>
    <circle cx="200" cy="400" r="14"/>
    <circle cx="290" cy="470" r="14"/>
    <circle cx="430" cy="490" r="14"/>
    <circle cx="540" cy="380" r="14"/>
    <circle cx="530" cy="180" r="14"/>
    <circle cx="270" cy="140" r="14"/>
  </g>

  <!-- LEFT HUB (large accent-filled with ink stroke) -->
  <circle cx="380" cy="280" r="32" fill="#b7410e"/>
  <circle cx="380" cy="280" r="32" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <!-- small inner ring on the hub for depth -->
  <circle cx="380" cy="280" r="14" fill="#fdfaf2" fill-opacity="0.85"/>

  <!-- BRIDGE NODE (mid-illustration, distinct ring style) -->
  <circle cx="650" cy="330" r="22" fill="#fdfaf2"/>
  <circle cx="650" cy="330" r="22" fill="none" stroke="#b7410e" stroke-width="3"/>
  <circle cx="650" cy="330" r="8" fill="#b7410e"/>

  <!-- RIGHT CLUSTER LEAVES (small ink circles) -->
  <g fill="#1a1d24">
    <circle cx="780" cy="200" r="14"/>
    <circle cx="1060" cy="240" r="14"/>
    <circle cx="1110" cy="370" r="14"/>
    <circle cx="1000" cy="490" r="14"/>
    <circle cx="850" cy="490" r="14"/>
    <circle cx="740" cy="400" r="14"/>
    <circle cx="850" cy="160" r="14"/>
  </g>

  <!-- RIGHT HUB (large accent-filled with ink stroke) -->
  <circle cx="920" cy="330" r="32" fill="#b7410e"/>
  <circle cx="920" cy="330" r="32" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="920" cy="330" r="14" fill="#fdfaf2" fill-opacity="0.85"/>
</svg>
