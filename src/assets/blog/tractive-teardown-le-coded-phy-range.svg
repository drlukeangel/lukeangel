<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 430" width="1080" height="430" role="img" aria-label="Standard BLE coverage versus LE Coded PHY coverage in a multi-floor house.">
  <rect width="1080" height="430" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">SAME CHIP, SAME POWER — DIFFERENT PHY</text>

  <line x1="540" y1="70" x2="540" y2="392" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- ===== LEFT: standard 1M PHY (what ships) ===== -->
  <text x="270" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">1M PHY — what ships</text>
  <!-- 3-floor house -->
  <g transform="translate(150,110)">
    <path d="M40 60 L120 14 L200 60 Z" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="60" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="126" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="192" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <!-- Base Station on the middle floor -->
    <rect x="104" y="146" width="30" height="26" rx="5" fill="#c87533" opacity="0.85" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- coverage = only the middle floor -->
    <ellipse cx="120" cy="159" rx="86" ry="40" fill="#c87533" fill-opacity="0.14" stroke="#c87533" stroke-width="2.5"/>
  </g>
  <!-- dead-zone marks on the other floors -->
  <g stroke="#c14a3a" stroke-width="3" stroke-linecap="round">
    <line x1="200" y1="186" x2="214" y2="200"/><line x1="214" y1="186" x2="200" y2="200"/>
    <line x1="200" y1="318" x2="214" y2="332"/><line x1="214" y1="318" x2="200" y2="332"/>
  </g>
  <text x="270" y="392" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">one floor covered — basement &amp; top are dead</text>

  <!-- ===== RIGHT: LE Coded PHY S=8 (could have) ===== -->
  <text x="810" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#1a1d24">LE Coded PHY S=8 — could have</text>
  <g transform="translate(690,110)">
    <path d="M40 60 L120 14 L200 60 Z" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="60" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="126" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="192" width="160" height="66" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <rect x="104" y="146" width="30" height="26" rx="5" fill="#c87533" opacity="0.85" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- coverage = whole house (~4x radius) -->
    <ellipse cx="120" cy="159" rx="150" ry="118" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/>
  </g>
  <g stroke="#3a7d44" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M884 188 l8 9 l16 -18"/>
    <path d="M884 320 l8 9 l16 -18"/>
  </g>
  <text x="810" y="392" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44">~4× range covers the whole house — trades data rate for reach</text>
</svg>
