<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" role="img" aria-label="two confidence knobs">
  <rect width="1000" height="380" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" font-weight="700" fill="#1a1d24">TWO KNOBS, NOT ONE</text>

  <!-- frame strip -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="58" y="0" width="50" height="50" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="116" y="0" width="50" height="50" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <rect x="174" y="0" width="50" height="50" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="112" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">frames Frigate tracks</text>
  </g>

  <!-- min_score gate (per frame) -->
  <g transform="translate(310,80)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="115" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">min_score</text>
    <text x="115" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">per single frame</text>
    <line x1="20" y1="68" x2="210" y2="68" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="115" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">"is this frame a hit?"</text>
    <text x="115" y="110" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#6a4c93">default 0.5</text>
  </g>

  <!-- threshold gate (cumulative) -->
  <g transform="translate(610,80)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="115" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">threshold</text>
    <text x="115" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">avg across frames</text>
    <line x1="20" y1="68" x2="210" y2="68" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="115" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">"promote to event?"</text>
    <text x="115" y="110" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#6a4c93">default 0.7</text>
  </g>

  <!-- arrows -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="265" y1="115" x2="302" y2="125"/><path d="M302 125 l-11 -2 l3 -9 z"/>
    <line x1="540" y1="140" x2="602" y2="140"/><path d="M602 140 l-10 -5 l0 10 z"/>
  </g>

  <!-- saved event out -->
  <g transform="translate(40,250)">
    <rect x="0" y="0" width="800" height="70" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="24" y="30" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">SAVED EVENT</text>
    <text x="24" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#3a7d44">both gates cleared, per camera + per label</text>
    <text x="776" y="42" text-anchor="end" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#5b616b">tune both per camera, never one global pair</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="725" y1="200" x2="600" y2="248"/><path d="M600 250 l4 -11 l7 5 z"/>
  </g>
</svg>
