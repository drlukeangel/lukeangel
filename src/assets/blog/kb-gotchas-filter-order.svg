<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 470" width="1180" height="470" role="img" aria-label="Why a restrictive metadata filter applied after top-K retrieval can return zero results, and the over-retrieve fix.">
  <rect width="1180" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- divider -->
  <line x1="590" y1="40" x2="590" y2="430" stroke="#1a1d24" stroke-width="1" opacity="0.2"/>

  <!-- LEFT: the trap -->
  <text x="40" y="56" font-family="ui-monospace, monospace" font-size="16" letter-spacing="1" fill="#c14a3a">THE TRAP — filter AFTER a small top-K</text>

  <!-- retrieve top-5 -->
  <text x="40" y="100" font-family="ui-monospace, monospace" font-size="13" fill="#5b616b">1. retrieve top-5 by similarity</text>
  <g font-family="ui-monospace, monospace" font-size="13">
    <rect x="40" y="114" width="200" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="54" y="136" fill="#1a1d24">chunk · product=Y</text>
    <rect x="40" y="152" width="200" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="54" y="174" fill="#1a1d24">chunk · product=Z</text>
    <rect x="40" y="190" width="200" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="54" y="212" fill="#1a1d24">chunk · product=Y</text>
    <rect x="40" y="228" width="200" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="54" y="250" fill="#1a1d24">chunk · product=W</text>
    <rect x="40" y="266" width="200" height="34" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="54" y="288" fill="#1a1d24">chunk · product=Z</text>
  </g>

  <!-- arrow to filter -->
  <line x1="252" y1="207" x2="312" y2="207" stroke="#1a1d24" stroke-width="2.5"/>
  <path d="M318 207 l-14 -6 v12 z" fill="#1a1d24"/>

  <!-- filter box -->
  <text x="296" y="100" font-family="ui-monospace, monospace" font-size="13" fill="#5b616b">2. apply filter product==X</text>
  <rect x="330" y="120" width="216" height="180" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="438" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#c14a3a">0 match X</text>
  <text x="438" y="226" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#7a808c">none of the top-5</text>
  <text x="438" y="244" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#7a808c">were product X</text>

  <!-- empty result -->
  <text x="438" y="346" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#c14a3a">→ empty result set</text>
  <g transform="translate(438,386)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#c14a3a" stroke-width="3"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c14a3a" stroke-width="3"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c14a3a" stroke-width="3"/>
  </g>

  <!-- RIGHT: the fix -->
  <text x="624" y="56" font-family="ui-monospace, monospace" font-size="16" letter-spacing="1" fill="#3a7d44">THE FIX — over-retrieve, THEN filter</text>

  <text x="624" y="100" font-family="ui-monospace, monospace" font-size="13" fill="#5b616b">1. retrieve top-50 by similarity</text>
  <!-- big stack, compressed -->
  <g font-family="ui-monospace, monospace" font-size="12">
    <rect x="624" y="114" width="180" height="22" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="636" y="130" fill="#7a808c">chunk · product=Y</text>
    <rect x="624" y="140" width="180" height="22" rx="4" fill="#4f46b8" fill-opacity="0.15" stroke="#3a7d44" stroke-width="2"/>
    <text x="636" y="156" fill="#1a1d24">chunk · product=X</text>
    <rect x="624" y="166" width="180" height="22" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="636" y="182" fill="#7a808c">chunk · product=Z</text>
    <rect x="624" y="192" width="180" height="22" rx="4" fill="#4f46b8" fill-opacity="0.15" stroke="#3a7d44" stroke-width="2"/>
    <text x="636" y="208" fill="#1a1d24">chunk · product=X</text>
    <rect x="624" y="218" width="180" height="22" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="636" y="234" fill="#7a808c">chunk · product=W</text>
    <text x="636" y="258" fill="#7a808c">… 45 more …</text>
  </g>

  <line x1="816" y1="186" x2="876" y2="186" stroke="#1a1d24" stroke-width="2.5"/>
  <path d="M882 186 l-14 -6 v12 z" fill="#1a1d24"/>

  <text x="858" y="100" font-family="ui-monospace, monospace" font-size="13" fill="#5b616b">2. filter product==X</text>
  <rect x="894" y="120" width="226" height="140" rx="10" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
  <g font-family="ui-monospace, monospace" font-size="13">
    <rect x="910" y="142" width="194" height="30" rx="5" fill="#4f46b8" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2"/>
    <text x="922" y="162" fill="#1a1d24">chunk · product=X</text>
    <rect x="910" y="180" width="194" height="30" rx="5" fill="#4f46b8" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2"/>
    <text x="922" y="200" fill="#1a1d24">chunk · product=X</text>
    <text x="1007" y="238" text-anchor="middle" fill="#7a808c">+ more</text>
  </g>

  <text x="1007" y="306" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#3a7d44">→ usable results</text>
  <g transform="translate(1007,346)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#3a7d44" stroke-width="3"/>
    <path d="M-9 1 L-2 9 L11 -8" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- bottom note -->
  <text x="590" y="448" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#5b616b">The filter runs after retrieval — so a narrow filter needs a wide retrieve, or you shard the KB by that dimension.</text>
</svg>
