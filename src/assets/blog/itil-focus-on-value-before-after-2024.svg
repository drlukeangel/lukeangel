<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">ITIL Focus on Value — before/after journey map of a frustrating support interaction</title>
  <desc id="d">2024-era modern flat diagram comparing the typical frustrating IT support journey (top: 6 painful steps with red sad faces) vs the value-focused journey (bottom: 4 streamlined steps with green smile faces and named value outcomes).</desc>
  <style>
    .label{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .head{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:600}
  </style>
  <defs>
    <linearGradient id="bad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="good" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="#fafbfc"/>
  <text x="40" y="38" class="title">ITIL Focus on Value — the same incident, two journeys</text>

  <!-- BEFORE row -->
  <text x="40" y="78" class="head" fill="#dc2626">BEFORE — service-centric, not value-centric</text>
  <rect x="40" y="92" width="720" height="100" fill="url(#bad)" rx="10"/>
  <g transform="translate(60,112)">
    <!-- 5 steps -->
    <g><circle cx="20" cy="20" r="16" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😕</text><text x="20" y="56" text-anchor="middle" class="small">1. Submit ticket</text><text x="20" y="70" text-anchor="middle" class="small">via portal</text></g>
    <g transform="translate(140,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😣</text><text x="20" y="56" text-anchor="middle" class="small">2. Auto-routed</text><text x="20" y="70" text-anchor="middle" class="small">to wrong queue</text></g>
    <g transform="translate(280,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😖</text><text x="20" y="56" text-anchor="middle" class="small">3. "Have you tried</text><text x="20" y="70" text-anchor="middle" class="small">turning it off?"</text></g>
    <g transform="translate(420,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😩</text><text x="20" y="56" text-anchor="middle" class="small">4. Escalated</text><text x="20" y="70" text-anchor="middle" class="small">3 times</text></g>
    <g transform="translate(560,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😡</text><text x="20" y="56" text-anchor="middle" class="small">5. Closed without</text><text x="20" y="70" text-anchor="middle" class="small">resolution</text></g>
    <line x1="36" y1="20" x2="140" y2="20" stroke="#dc2626" stroke-dasharray="3,3"/>
    <line x1="176" y1="20" x2="280" y2="20" stroke="#dc2626" stroke-dasharray="3,3"/>
    <line x1="316" y1="20" x2="420" y2="20" stroke="#dc2626" stroke-dasharray="3,3"/>
    <line x1="456" y1="20" x2="560" y2="20" stroke="#dc2626" stroke-dasharray="3,3"/>
  </g>

  <!-- middle annotation -->
  <text x="400" y="225" text-anchor="middle" class="small" fill="#5a6470">Same incident. Same systems. Different operating principle.</text>

  <!-- AFTER row -->
  <text x="40" y="262" class="head" fill="#059669">AFTER — Focus on Value</text>
  <rect x="40" y="276" width="720" height="100" fill="url(#good)" rx="10"/>
  <g transform="translate(140,296)">
    <g><circle cx="20" cy="20" r="16" fill="#fff" stroke="#059669" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😊</text><text x="20" y="56" text-anchor="middle" class="small">1. Self-serve fix</text><text x="20" y="70" text-anchor="middle" class="small">via known-issue page</text></g>
    <g transform="translate(160,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#059669" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">🙂</text><text x="20" y="56" text-anchor="middle" class="small">2. If escalation,</text><text x="20" y="70" text-anchor="middle" class="small">human on call</text></g>
    <g transform="translate(320,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#059669" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😀</text><text x="20" y="56" text-anchor="middle" class="small">3. Root-cause fix</text><text x="20" y="70" text-anchor="middle" class="small">in same conversation</text></g>
    <g transform="translate(480,0)"><circle cx="20" cy="20" r="16" fill="#fff" stroke="#059669" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="14">😄</text><text x="20" y="56" text-anchor="middle" class="small">4. Follow-up &amp; fix</text><text x="20" y="70" text-anchor="middle" class="small">propagated to all users</text></g>
    <line x1="36" y1="20" x2="160" y2="20" stroke="#059669"/>
    <line x1="196" y1="20" x2="320" y2="20" stroke="#059669"/>
    <line x1="356" y1="20" x2="480" y2="20" stroke="#059669"/>
  </g>

  <!-- footer principle -->
  <text x="40" y="416" class="small"><tspan font-weight="600" fill="#059669">The shift:</tspan> measure success by user value delivered (fix in &lt; X minutes, user can continue work), not ticket-throughput metrics.</text>
  <text x="40" y="436" class="small">Same staff. Same budget. Different definition of "done."</text>
</svg>
