<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" width="1120" height="480" role="img" aria-label="Who holds the signing key: a factory keeps the firmware-signing private key in an HSM and fuses the matching public key into millions of chips on the line; a hand-rolled build signs with a laptop key and burns its hash into a single ESP32's eFuses. Both end with firmware verified against a fused key at every boot.">
  <rect width="1120" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHO HOLDS THE SIGNING KEY</text>

  <line x1="560" y1="110" x2="560" y2="392" stroke="#1a1d24" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.25"/>

  <!-- FACTORY -->
  <text x="290" y="132" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#1a1d24">THE FACTORY</text>
  <rect x="180" y="150" width="220" height="78" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <g transform="translate(202,172)" stroke="#c14a3a" stroke-width="2.6" fill="none">
    <rect x="0" y="13" width="22" height="17" rx="3"/><path d="M4 13 v-5 a7 7 0 0 1 14 0 v5"/>
  </g>
  <text x="306" y="182" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">HSM</text>
  <text x="306" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">private signing key</text>
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="290" y1="228" x2="290" y2="270"/><path d="M290 274 l-7 -15 h14 z"/></g>
  <text x="404" y="254" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">signs every release</text>
  <g fill="none" stroke="#1a1d24" stroke-width="2.4">
    <rect x="208" y="286" width="30" height="22" rx="4"/><rect x="248" y="286" width="30" height="22" rx="4"/><rect x="288" y="286" width="30" height="22" rx="4"/><rect x="328" y="286" width="30" height="22" rx="4"/>
  </g>
  <text x="290" y="338" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">public key fused into</text>
  <text x="290" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">1,000,000+ chips</text>

  <!-- HAND-ROLLED -->
  <text x="830" y="132" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#1a1d24">HAND-ROLLED</text>
  <rect x="720" y="150" width="220" height="78" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <g transform="translate(742,170)" stroke="#c14a3a" stroke-width="2.4" fill="none">
    <rect x="0" y="0" width="30" height="20" rx="2"/><path d="M-4 26 h38"/>
  </g>
  <text x="846" y="182" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">your laptop</text>
  <text x="846" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">signing key</text>
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="830" y1="228" x2="830" y2="270"/><path d="M830 274 l-7 -15 h14 z"/></g>
  <text x="946" y="254" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">sign your firmware</text>
  <g fill="none" stroke="#1a1d24" stroke-width="2.4"><rect x="815" y="286" width="30" height="22" rx="4"/></g>
  <text x="830" y="338" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">hash burned into</text>
  <text x="830" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">1 ESP32 (eFuse)</text>

  <line x1="40" y1="410" x2="1080" y2="410" stroke="#1a1d24" stroke-width="1" opacity="0.15"/>
  <text x="560" y="448" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="17" font-style="italic" fill="#3a3f4a">Both end the same place: firmware checked against a fused key at every boot.</text>
</svg>
