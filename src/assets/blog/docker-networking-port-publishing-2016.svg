<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t d">
  <title id="t">Docker networking — port publishing from host to container</title>
  <desc id="d">2016-era flat diagram of port publishing: client request comes in on host port 80, docker proxy / iptables forwards to container port 8080, container responds back through the same path.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .mono{font-family:'JetBrains Mono','Menlo','Consolas',monospace;font-size:11px;fill:#1a1d24}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Port publishing — host:80 → container:8080</text>

  <!-- Client -->
  <g transform="translate(40,160)">
    <rect width="140" height="80" fill="#fff" stroke="#cfd5db" rx="4"/>
    <text x="70" y="32" text-anchor="middle" class="label">client</text>
    <text x="70" y="52" text-anchor="middle" class="small">browser / curl</text>
    <text x="70" y="68" text-anchor="middle" class="mono">GET host:80/api</text>
  </g>

  <!-- Arrow to host -->
  <line x1="180" y1="200" x2="240" y2="200" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Host -->
  <g transform="translate(240,80)">
    <rect width="320" height="240" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="22" class="small">docker host</text>

    <!-- Host port 80 -->
    <rect x="14" y="38" width="80" height="40" fill="#0066cc" rx="2"/>
    <text x="54" y="62" text-anchor="middle" class="small" fill="#fff">host :80</text>

    <!-- Arrow inside host -->
    <line x1="94" y1="58" x2="170" y2="58" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

    <!-- iptables / docker proxy -->
    <rect x="170" y="38" width="130" height="40" fill="#1a1d24" rx="2"/>
    <text x="235" y="56" text-anchor="middle" class="small" fill="#fff">iptables DNAT</text>
    <text x="235" y="72" text-anchor="middle" class="small" fill="#9aa3ad">+ docker-proxy</text>

    <!-- Arrow down to container -->
    <line x1="235" y1="78" x2="235" y2="118" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

    <!-- bridge network -->
    <rect x="14" y="118" width="290" height="30" fill="#e6f0fa" stroke="#0066cc" stroke-dasharray="3,3"/>
    <text x="159" y="138" text-anchor="middle" class="small" fill="#0066cc">docker0 bridge — 172.17.0.0/16</text>

    <!-- container -->
    <g transform="translate(120,160)">
      <rect width="160" height="60" fill="#fff" stroke="#10a37f" stroke-width="2" rx="4"/>
      <text x="80" y="22" text-anchor="middle" class="label" fill="#10a37f">api container</text>
      <text x="80" y="40" text-anchor="middle" class="small">172.17.0.2 : 8080</text>
      <text x="80" y="54" text-anchor="middle" class="mono">listening on :8080</text>
    </g>
  </g>

  <!-- bottom note -->
  <g transform="translate(40,340)">
    <rect width="720" height="60" fill="#fff" stroke="#cfd5db" rx="6"/>
    <text x="14" y="22" class="small" font-weight="600">docker run -p 80:8080 my-api</text>
    <text x="14" y="42" class="small">- left of colon = host port (what users hit) · right of colon = container port (what the app listens on)</text>
    <text x="14" y="56" class="small">- docker writes the iptables DNAT rule + spawns docker-proxy fallback · all transparent to the container</text>
  </g>
</svg>
