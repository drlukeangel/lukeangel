<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" role="img" aria-label="A secure element. The private key is generated inside the chip. The device can ask the chip to sign a challenge and the signature comes out, but a request to read the key out is denied even with the board in hand.">
  <rect width="1000" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE SECURE ELEMENT</text>

  <!-- chip -->
  <g transform="translate(80,118)">
    <g stroke="#1a1d24" stroke-width="4" stroke-linecap="round">
      <line x1="-14" y1="40" x2="0" y2="40"/><line x1="-14" y1="90" x2="0" y2="90"/><line x1="-14" y1="140" x2="0" y2="140"/>
      <line x1="240" y1="40" x2="254" y2="40"/><line x1="240" y1="90" x2="254" y2="90"/><line x1="240" y1="140" x2="254" y2="140"/>
    </g>
    <rect x="0" y="0" width="240" height="180" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <text x="120" y="30" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1.5" fill="#7a808c">ATECC608A</text>
    <circle cx="120" cy="106" r="52" fill="none" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 6" opacity="0.45"/>
    <g transform="translate(96,82)" fill="none" stroke="#c14a3a" stroke-width="5" stroke-linecap="round">
      <circle cx="16" cy="16" r="14"/>
      <line x1="26" y1="26" x2="56" y2="56"/>
      <line x1="46" y1="46" x2="56" y2="36"/>
      <line x1="52" y1="52" x2="62" y2="42"/>
    </g>
    <text x="120" y="172" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#7a808c">private key</text>
  </g>

  <!-- allowed: sign() -->
  <g transform="translate(440,158)">
    <text x="78" y="-18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#1a1d24">sign(challenge)</text>
    <line x1="0" y1="0" x2="150" y2="0" stroke="#1a1d24" stroke-width="3.5"/>
    <path d="M150 0 l-15 -7 v14 z" fill="#1a1d24"/>
    <g transform="translate(168,-27)">
      <rect width="150" height="54" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <path d="M18 28 l10 10 20 -24" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="96" y="34" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#1a1d24">signature</text>
    </g>
  </g>

  <!-- denied: read key -->
  <g transform="translate(440,262)">
    <text x="55" y="-18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#c14a3a">read key</text>
    <line x1="0" y1="0" x2="104" y2="0" stroke="#c14a3a" stroke-width="3.5" stroke-dasharray="9 7"/>
    <circle cx="126" cy="0" r="21" fill="none" stroke="#c14a3a" stroke-width="4"/>
    <line x1="111" y1="-15" x2="141" y2="15" stroke="#c14a3a" stroke-width="4"/>
    <text x="160" y="6" font-family="ui-monospace, monospace" font-size="14" fill="#c14a3a">denied — even with the board in hand</text>
  </g>

  <text x="500" y="396" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="17" font-style="italic" fill="#3a3f4a">Generated on-chip at first boot. Sign with it, yes. Read it out, no.</text>
</svg>
