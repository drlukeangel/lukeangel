<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two voice assistants sharing one kitchen">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- counter line -->
  <line x1="150" y1="470" x2="1060" y2="470" stroke="#1a1d24" stroke-width="3" opacity="0.18"/>

  <!-- LEFT speaker: tall cylinder (Echo-like) -->
  <g transform="translate(360,250)">
    <rect x="-44" y="0" width="88" height="220" rx="44" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- light ring on top -->
    <ellipse cx="0" cy="6" rx="40" ry="12" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="3"/>
    <!-- speaker grille dots -->
    <g fill="#1a1d24" opacity="0.18">
      <circle cx="-20" cy="70" r="3"/><circle cx="0" cy="70" r="3"/><circle cx="20" cy="70" r="3"/>
      <circle cx="-20" cy="92" r="3"/><circle cx="0" cy="92" r="3"/><circle cx="20" cy="92" r="3"/>
      <circle cx="-20" cy="114" r="3"/><circle cx="0" cy="114" r="3"/><circle cx="20" cy="114" r="3"/>
      <circle cx="-20" cy="136" r="3"/><circle cx="0" cy="136" r="3"/><circle cx="20" cy="136" r="3"/>
    </g>
  </g>
  <!-- left voice waves -->
  <g stroke="#6a4c93" stroke-width="3.5" fill="none" opacity="0.85">
    <path d="M420 300 a30 30 0 0 1 0 60"/>
    <path d="M438 286 a50 50 0 0 1 0 88"/>
  </g>

  <!-- RIGHT speaker: short squat (Google-Home-like, angled top) -->
  <g transform="translate(800,360)">
    <path d="M-46 110 L-34 24 a34 18 0 0 1 68 0 L46 110 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- angled top face -->
    <ellipse cx="0" cy="24" rx="34" ry="13" fill="#6a4c93" fill-opacity="0.16" stroke="#1a1d24" stroke-width="3"/>
    <!-- four status dots on the top -->
    <g fill="#6a4c93"><circle cx="-15" cy="22" r="4.5"/><circle cx="-5" cy="22" r="4.5"/><circle cx="5" cy="22" r="4.5"/><circle cx="15" cy="22" r="4.5"/></g>
    <!-- fabric base seam -->
    <line x1="-40" y1="70" x2="40" y2="70" stroke="#1a1d24" stroke-width="2.5" opacity="0.3"/>
  </g>
  <!-- right voice waves (mirrored) -->
  <g stroke="#6a4c93" stroke-width="3.5" fill="none" opacity="0.85">
    <path d="M748 384 a30 30 0 0 0 0 60"/>
    <path d="M730 370 a50 50 0 0 0 0 88"/>
  </g>

  <!-- they're talking past each other: two arcs that don't meet, a faint gap mark between -->
  <g transform="translate(600,360)" stroke="#1a1d24" stroke-width="2.5" opacity="0.25" stroke-dasharray="2 8">
    <line x1="-30" y1="0" x2="30" y2="0"/>
  </g>
</svg>
