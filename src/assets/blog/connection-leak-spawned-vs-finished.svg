<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540">
  <rect x="2" y="2" width="996" height="536" rx="10" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', monospace; fill: #1a1d24; }
    .lbl { font-size: 22px; }
    .num { font-size: 22px; }
    .cap { font-size: 19px; fill: #5b616b; }
    .tag { font-size: 21px; fill: #b7410e; font-weight: 700; }
  </style>

  <!-- heading -->
  <text class="cap" x="40" y="56">connection-loop tasks, one short soak</text>

  <!-- scale: 174 units -> 660px, origin x=300 -->
  <!-- spawned -->
  <text class="lbl" x="40" y="135">spawned</text>
  <rect x="300" y="112" width="660" height="40" fill="#1a1d24" fill-opacity="0.55"/>
  <text class="num" x="912" y="139" text-anchor="end" fill="#fdfaf2">174</text>

  <!-- finished + gap -->
  <text class="lbl" x="40" y="225">finished</text>
  <rect x="300" y="202" width="197" height="40" fill="#1a1d24" fill-opacity="0.55"/>
  <text class="num" x="468" y="229" text-anchor="end" fill="#fdfaf2">52</text>
  <!-- the gap: 122 stuck, rust hatch -->
  <rect x="497" y="202" width="463" height="40" fill="#b7410e" fill-opacity="0.20"
        stroke="#b7410e" stroke-width="2.5"/>
  <text class="tag" x="728" y="229" text-anchor="middle">122 stuck alive</text>

  <!-- bracket tying the gap to spawned end -->
  <line x1="497" y1="160" x2="497" y2="262" stroke="#b7410e" stroke-width="2" stroke-dasharray="4 5"/>
  <line x1="960" y1="160" x2="960" y2="262" stroke="#b7410e" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- divider -->
  <line x1="40" y1="320" x2="960" y2="320" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- membership, bounded -->
  <text class="lbl" x="40" y="400">membership</text>
  <rect x="300" y="377" width="57" height="40" fill="#3a7d44" fill-opacity="0.30"
        stroke="#3a7d44" stroke-width="2.5"/>
  <text class="num" x="372" y="404">~15</text>
  <text class="cap" x="470" y="404">peers — flat, exactly as it should be</text>

  <!-- conclusion -->
  <text class="cap" x="40" y="480">live tasks far outrun the state they serve —</text>
  <text class="cap" x="40" y="508">the leak is in task lifetime, not in peer state.</text>
</svg>
