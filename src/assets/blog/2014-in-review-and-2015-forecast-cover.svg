<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2014 — hub and voice arrive">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
    <marker id="ya" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#6a4c93"/></marker>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- center hub -->
  <g transform="translate(600,315)">
    <rect x="-70" y="-46" width="140" height="92" rx="16" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="5"/>
    <!-- two radio glyphs inside -->
    <g stroke="#6a4c93" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M -34 6 Q -20 -16 -6 6"/>
      <path d="M 6 6 Q 20 -16 34 6"/>
    </g>
    <circle cx="-20" cy="6" r="3.5" fill="#6a4c93"/><circle cx="20" cy="6" r="3.5" fill="#6a4c93"/>
  </g>

  <!-- TOP-LEFT: voice speaker (Echo cylinder) -->
  <g transform="translate(280,150)">
    <rect x="-26" y="-46" width="52" height="100" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <ellipse cx="0" cy="-46" rx="26" ry="8" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="3"/>
  </g>
  <line x1="316" y1="180" x2="536" y2="290" stroke="#6a4c93" stroke-width="4" marker-end="url(#ya)"/>

  <!-- TOP-RIGHT: in-wall dimmer switch -->
  <g transform="translate(920,150)">
    <rect x="-30" y="-44" width="60" height="92" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-14" y="-28" width="28" height="44" rx="4" fill="#6a4c93" fill-opacity="0.15" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="0" cy="30" r="5" fill="#6a4c93"/>
  </g>
  <line x1="884" y1="180" x2="664" y2="290" stroke="#6a4c93" stroke-width="4" marker-end="url(#ya)"/>

  <!-- BOTTOM-LEFT: light bulb -->
  <g transform="translate(290,470)">
    <circle cx="0" cy="0" r="36" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <path d="M -12 6 Q 0 -14 12 6" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <rect x="-14" y="34" width="28" height="16" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  </g>
  <line x1="326" y1="448" x2="540" y2="345" stroke="#6a4c93" stroke-width="4" marker-end="url(#ya)"/>

  <!-- BOTTOM-RIGHT: sensor (door/window) -->
  <g transform="translate(910,470)">
    <rect x="-34" y="-22" width="68" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="20" y="-16" width="18" height="32" rx="4" fill="#6a4c93" fill-opacity="0.15" stroke="#6a4c93" stroke-width="3"/>
  </g>
  <line x1="872" y1="452" x2="662" y2="345" stroke="#6a4c93" stroke-width="4" marker-end="url(#ya)"/>
</svg>
