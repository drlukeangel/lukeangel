<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="two latency paths">
  <rect width="1000" height="520" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">WHY THE SAME-MESH PATH WINS</text>

  <!-- the slow cross-ecosystem path -->
  <text x="40" y="92" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#c14a3a">cross-ecosystem · 2–4 s</text>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24" text-anchor="middle">
    <g transform="translate(95,140)"><rect x="-52" y="-22" width="104" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">PIR fires</text><text y="14">~50 ms</text></g>
    <g transform="translate(255,140)"><rect x="-50" y="-22" width="100" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">ST hub</text><text y="14">~200 ms</text></g>
    <g transform="translate(420,140)"><rect x="-58" y="-22" width="116" height="44" rx="7" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2"/><text y="-2">ST cloud</text><text y="14">~1–2 s</text></g>
    <g transform="translate(595,140)"><rect x="-58" y="-22" width="116" height="44" rx="7" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2"/><text y="-2">Hue cloud</text><text y="14">~0.5–1 s</text></g>
    <g transform="translate(760,140)"><rect x="-52" y="-22" width="104" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">Hue bridge</text></g>
    <g transform="translate(905,140)"><rect x="-44" y="-22" width="88" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">bulbs</text></g>
  </g>
  <g stroke="#c14a3a" stroke-width="2.5" stroke-opacity="0.6">
    <line x1="147" y1="140" x2="203" y2="140" marker-end="url(#arR)"/>
    <line x1="307" y1="140" x2="360" y2="140" marker-end="url(#arR)"/>
    <line x1="480" y1="140" x2="535" y2="140" marker-end="url(#arR)"/>
    <line x1="655" y1="140" x2="706" y2="140" marker-end="url(#arR)"/>
    <line x1="814" y1="140" x2="859" y2="140" marker-end="url(#arR)"/>
  </g>
  <text x="500" y="205" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#c14a3a">long enough that you reach for the wall switch out of habit.</text>

  <!-- divider -->
  <line x1="40" y1="250" x2="960" y2="250" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- the fast same-mesh path -->
  <text x="40" y="300" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#3a7d44">same Zigbee mesh, one bridge · under 200 ms</text>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24" text-anchor="middle">
    <g transform="translate(120,360)"><rect x="-60" y="-22" width="120" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">PIR fires</text><text y="14">~50 ms</text></g>
    <g transform="translate(360,360)"><rect x="-78" y="-22" width="156" height="44" rx="7" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2"/><text y="-2">Hue bridge rule</text><text y="14">local · ~10 ms</text></g>
    <g transform="translate(600,360)"><rect x="-52" y="-22" width="104" height="44" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="2"/><text y="-2">bulbs</text></g>
  </g>
  <g stroke="#3a7d44" stroke-width="2.5">
    <line x1="180" y1="360" x2="278" y2="360" marker-end="url(#arG)"/>
    <line x1="438" y1="360" x2="544" y2="360" marker-end="url(#arG)"/>
  </g>
  <text x="600" y="430" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a7d44">light is on before your foot touches the second tile.</text>

  <defs>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#c14a3a" fill-opacity="0.6"/></marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#3a7d44"/></marker>
  </defs>
</svg>
