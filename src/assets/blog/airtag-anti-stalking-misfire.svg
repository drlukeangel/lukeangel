<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="anti-stalking features on a pet">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" font-weight="700" fill="#1a1d24">EACH PROTECTION, AIMED AT A PERSON, ON A PET</text>

  <!-- column headers -->
  <text x="300" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#7a808c">MEANT TO</text>
  <text x="660" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#7a808c">ON A DOG, IT&#8230;</text>

  <!-- row 1: audio chirp -->
  <g transform="translate(0,130)">
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#1a1d24">audio chirp</text>
    <text x="300" y="6" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">warn a tracked person</text>
    <!-- bad marker -->
    <circle cx="600" cy="0" r="11" fill="#c14a3a"/>
    <path d="M595 -5 l10 10 M605 -5 l-10 10" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round"/>
    <text x="622" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#1a1d24">spooks him, invites chewing the collar off</text>
  </g>
  <line x1="40" y1="156" x2="960" y2="156" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- row 2: bystander alert -->
  <g transform="translate(0,196)">
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#1a1d24">"unknown tag near you"</text>
    <text x="300" y="6" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">expose a stalker</text>
    <circle cx="600" cy="0" r="11" fill="#c14a3a"/>
    <path d="M595 -5 l10 10 M605 -5 l-10 10" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round"/>
    <text x="622" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#1a1d24">false-alarms every iPhone at the dog park</text>
  </g>
  <line x1="40" y1="222" x2="960" y2="222" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- row 3: NFC handoff -->
  <g transform="translate(0,262)">
    <text x="40" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#1a1d24">NFC tap &#8594; owner contact</text>
    <text x="300" y="6" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">return a found object</text>
    <circle cx="600" cy="0" r="11" fill="#3a7d44"/>
    <path d="M594 0 l4 5 l9 -11" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="622" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#1a1d24">actually helps return a found pet</text>
  </g>

  <!-- summary -->
  <g transform="translate(40,340)">
    <rect x="0" y="0" width="920" height="70" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
    <text x="24" y="30" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" font-weight="700" fill="#1a1d24">Two of three protections fight pet use.</text>
    <text x="24" y="54" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">Only the one feature that assumes nothing about the tagged thing being a person survives.</text>
  </g>
</svg>
