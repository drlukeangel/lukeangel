<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-labelledby="t d">
  <title id="t">Mobile release cycle time — typical vs optimized pipeline</title>
  <desc id="d">2016-era flat bar comparison: typical mobile release takes 4-8 weeks across slow stages; optimized release with CI/CD, feature flags, and automation collapses it to under a week with parallel stages.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#fff;font-size:12px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
    .row{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:600;fill:#1a1d24}
  </style>
  <rect width="800" height="340" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Mobile release cycle time — typical vs optimized</text>

  <!-- Axis -->
  <line x1="200" y1="250" x2="760" y2="250" stroke="#5a6470"/>
  <text x="200" y="270" text-anchor="middle" class="small">day 0</text>
  <text x="340" y="270" text-anchor="middle" class="small">day 7</text>
  <text x="480" y="270" text-anchor="middle" class="small">day 21</text>
  <text x="620" y="270" text-anchor="middle" class="small">day 42</text>
  <text x="760" y="270" text-anchor="middle" class="small">day 60</text>

  <!-- TYPICAL -->
  <text x="180" y="100" text-anchor="end" class="row" fill="#dc2626">Typical</text>
  <g transform="translate(200,80)">
    <rect width="80" height="32" fill="#dc2626" rx="2"/>
    <text x="40" y="20" text-anchor="middle" class="label">Dev (7d)</text>
    <rect x="90" width="100" height="32" fill="#b91c1c" rx="2"/>
    <text x="140" y="20" text-anchor="middle" class="label">Manual QA (14d)</text>
    <rect x="200" width="80" height="32" fill="#991b1b" rx="2"/>
    <text x="240" y="20" text-anchor="middle" class="label">Beta (10d)</text>
    <rect x="290" width="80" height="32" fill="#7f1d1d" rx="2"/>
    <text x="330" y="20" text-anchor="middle" class="label">Submit (3d)</text>
    <rect x="380" width="100" height="32" fill="#5b1313" rx="2"/>
    <text x="430" y="20" text-anchor="middle" class="label">Review (7-14d)</text>
    <rect x="490" width="60" height="32" fill="#3b0d0d" rx="2"/>
    <text x="520" y="20" text-anchor="middle" class="label">Live</text>
  </g>
  <text x="780" y="100" text-anchor="end" class="small" fill="#dc2626">~6 weeks</text>

  <!-- OPTIMIZED -->
  <text x="180" y="180" text-anchor="end" class="row" fill="#059669">Optimized</text>
  <g transform="translate(200,160)">
    <rect width="60" height="32" fill="#059669" rx="2"/>
    <text x="30" y="20" text-anchor="middle" class="label">Dev (3d)</text>
    <rect x="30" y="32" width="60" height="20" fill="#047857" rx="2"/>
    <text x="60" y="46" text-anchor="middle" class="small" fill="#fff">auto QA in parallel</text>
    <rect x="60" width="40" height="32" fill="#065f46" rx="2"/>
    <text x="80" y="20" text-anchor="middle" class="label">Beta</text>
    <rect x="100" width="40" height="32" fill="#064e3b" rx="2"/>
    <text x="120" y="20" text-anchor="middle" class="label">Submit</text>
    <rect x="140" width="60" height="32" fill="#043520" rx="2"/>
    <text x="170" y="20" text-anchor="middle" class="label">Review</text>
    <rect x="200" width="40" height="32" fill="#022817" rx="2"/>
    <text x="220" y="20" text-anchor="middle" class="label">Flag flip</text>
  </g>
  <text x="780" y="180" text-anchor="end" class="small" fill="#059669">~7 days</text>

  <!-- Bottom annotation -->
  <text x="400" y="304" text-anchor="middle" class="small" font-weight="600">The optimizations:</text>
  <text x="400" y="322" text-anchor="middle" class="small">- Auto QA runs in parallel with dev · feature flags decouple deploy from release · CI/CD removes manual handoffs</text>
</svg>
