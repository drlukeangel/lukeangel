<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="connected device predictions">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- forecast curve sweeping up across the canvas: the "year ahead" -->
  <path d="M110 470 C 320 460, 430 360, 560 320 S 880 240, 1110 150"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round" stroke-opacity="0.85"/>
  <!-- past portion dashed (the year scored), future solid handled above -->
  <path d="M110 470 C 320 460, 430 360, 560 320"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 12" stroke-opacity="0.5"/>
  <!-- plotted bet markers along the curve -->
  <g fill="#0066cc">
    <circle cx="560" cy="320" r="10"/>
    <circle cx="760" cy="262" r="8" fill-opacity="0.85"/>
    <circle cx="940" cy="208" r="8" fill-opacity="0.7"/>
    <circle cx="1110" cy="150" r="11"/>
  </g>

  <!-- voice speaker (the device of the moment) -->
  <g transform="translate(170,300)">
    <rect x="0" y="0" width="120" height="220" rx="60" fill="#0066cc"/>
    <circle cx="60" cy="56" r="26" fill="#fdfaf2" fill-opacity="0.9"/>
    <g stroke="#fdfaf2" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round">
      <line x1="30" y1="150" x2="30" y2="172"/>
      <line x1="45" y1="138" x2="45" y2="184"/>
      <line x1="60" y1="126" x2="60" y2="196"/>
      <line x1="75" y1="138" x2="75" y2="184"/>
      <line x1="90" y1="150" x2="90" y2="172"/>
    </g>
  </g>

  <!-- smartwatch -->
  <g transform="translate(420,360)">
    <rect x="0" y="0" width="120" height="138" rx="26" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="4"/>
    <rect x="18" y="20" width="84" height="98" rx="12" fill="#0066cc" fill-opacity="0.85"/>
    <rect x="40" y="-20" width="40" height="24" rx="8" fill="#1a1d24" fill-opacity="0.25"/>
    <rect x="40" y="134" width="40" height="24" rx="8" fill="#1a1d24" fill-opacity="0.25"/>
  </g>

  <!-- round thermostat -->
  <g transform="translate(700,300)">
    <circle cx="60" cy="60" r="64" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="4"/>
    <circle cx="60" cy="60" r="30" fill="#0066cc" fill-opacity="0.85"/>
  </g>

  <!-- connected camera (the consolidating category) -->
  <g transform="translate(930,330)">
    <rect x="0" y="0" width="150" height="96" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="4"/>
    <circle cx="50" cy="48" r="28" fill="#0066cc" fill-opacity="0.85"/>
    <circle cx="50" cy="48" r="11" fill="#fdfaf2" fill-opacity="0.9"/>
    <circle cx="120" cy="24" r="6" fill="#c14a3a"/>
  </g>
</svg>
