<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="iot-obs-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#iot-obs-dots)"/>
  <rect x="0" y="0" width="20" height="630" fill="#1a1d24"/>
  <text x="80" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#7a808c">OBSERVABILITY — SEP 2024</text>
  <text x="1120" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#2a52be" text-anchor="end">CLOUDWATCH</text>
  <line x1="80" y1="118" x2="1120" y2="118" stroke="#1a1d24" stroke-width="1"/>

  <g transform="translate(820, 175)" stroke="#1a1d24" stroke-width="2" fill="none">
    <polyline points="0,40 30,30 60,38 90,18 120,28 150,12 180,22 210,8 240,16" stroke="#2a52be"/>
    <line x1="0" y1="50" x2="240" y2="50"/>
    <circle cx="0"   cy="40" r="3" fill="#2a52be" stroke="none"/>
    <circle cx="60"  cy="38" r="3" fill="#2a52be" stroke="none"/>
    <circle cx="120" cy="28" r="3" fill="#2a52be" stroke="none"/>
    <circle cx="180" cy="22" r="3" fill="#2a52be" stroke="none"/>
    <circle cx="240" cy="16" r="3" fill="#2a52be" stroke="none"/>
  </g>

  <text x="80" y="295" font-family="Newsreader, serif" font-weight="500" font-size="62" fill="#1a1d24">What good IoT observability</text>
  <text x="80" y="365" font-family="Newsreader, serif" font-weight="500" font-size="62" fill="#1a1d24">looks like in CloudWatch.</text>
  <text x="80" y="425" font-family="Newsreader, serif" font-style="italic" font-size="28" fill="#7a808c">— or, what we wish we'd set up before the first incident.</text>

  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1a1d24" stroke-width="1"/>
  <text x="80" y="540" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">L. ANGEL — IOT OPS</text>
</svg>
