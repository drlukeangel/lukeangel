<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="HAP pairing and encrypted channel">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">HOW A HOMEKIT ACCESSORY PAIRS, THEN TALKS</text>

  <!-- iOS device (left) -->
  <g transform="translate(120,230)">
    <rect x="-44" y="-70" width="88" height="140" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="-34" y="-58" width="68" height="104" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <circle cx="0" cy="58" r="6" fill="#1a1d24" fill-opacity="0.4"/>
    <text x="0" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">iOS</text>
  </g>

  <!-- accessory (right) with MFi chip -->
  <g transform="translate(880,230)">
    <rect x="-50" y="-60" width="100" height="120" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="3.5"/>
    <circle cx="0" cy="-12" r="9" fill="#3a7d44"/>
    <!-- MFi chip badge -->
    <g transform="translate(0,24)">
      <rect x="-24" y="-14" width="48" height="28" rx="3" fill="#1a1d24"/>
      <g stroke="#6a4c93" stroke-width="2"><line x1="-24" y1="-6" x2="-31" y2="-6"/><line x1="-24" y1="6" x2="-31" y2="6"/><line x1="24" y1="-6" x2="31" y2="-6"/><line x1="24" y1="6" x2="31" y2="6"/></g>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#6a4c93">MFi</text>
    </g>
    <text x="0" y="82" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">accessory</text>
  </g>

  <!-- STEP 1: chip challenge-response (the gate) -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12">
    <text x="500" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#6a4c93">1 &#183; CHIP CHALLENGE (the gate)</text>
    <line x1="168" y1="120" x2="826" y2="120" stroke="#6a4c93" stroke-width="2"/>
    <path d="M826 120 l-14 -5 l0 10 Z" fill="#6a4c93"/>
    <text x="500" y="114" text-anchor="middle" font-size="11" fill="#5b616b">"prove you're licensed"</text>
    <line x1="826" y1="146" x2="172" y2="146" stroke="#6a4c93" stroke-width="2"/>
    <path d="M172 146 l14 -5 l0 10 Z" fill="#6a4c93"/>
    <text x="500" y="140" text-anchor="middle" font-size="11" fill="#5b616b">Apple-signed response &#10003;</text>
    <text x="500" y="166" text-anchor="middle" font-size="10.5" fill="#c14a3a">no chip &#8594; no signed response &#8594; iOS refuses to pair</text>
  </g>

  <!-- STEP 2: setup code + key derivation -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12">
    <text x="500" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1d24">2 &#183; 8-DIGIT CODE &#8594; PER-DEVICE KEYS</text>
    <line x1="168" y1="252" x2="826" y2="252" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="5 4"/>
    <text x="500" y="246" text-anchor="middle" font-size="11" fill="#5b616b">setup code &#183; mutual key exchange</text>
  </g>

  <!-- STEP 3: encrypted channel -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12">
    <text x="500" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#3a7d44">3 &#183; ENCRYPTED CHANNEL, EVERY CONNECTION</text>
    <rect x="172" y="338" width="654" height="34" rx="8" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="500" y="360" text-anchor="middle" font-size="11.5" fill="#1a1d24">ChaCha20-Poly1305 &#183; mutual auth &#183; per-device + per-iOS keys</text>
  </g>

  <text x="500" y="430" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">A guest on your Wi-Fi still can't command the device &#8212; they were never paired.</text>
</svg>
