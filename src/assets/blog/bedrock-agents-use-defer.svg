<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Use or defer, sorted by the cost of a wrong answer.">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <defs>
    <marker id="ud-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1d24"/>
    </marker>
  </defs>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHAT DOES A WRONG ANSWER COST?</text>

  <!-- the question -->
  <rect x="400" y="70" width="320" height="60" rx="14" fill="#fdfaf2" stroke="#4f46b8" stroke-width="3"/>
  <text x="560" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">cost of being wrong?</text>
  <text x="560" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">put a number on the failure case</text>

  <!-- branches -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="none">
    <path d="M560 130 V 158 H 290 V 184" marker-end="url(#ud-arrow)"/>
    <path d="M560 130 V 158 H 840 V 184" marker-end="url(#ud-arrow)"/>
  </g>
  <text x="290" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">cheap (retry / review catches it)</text>
  <text x="840" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">expensive (runs unsupervised)</text>

  <!-- LEFT: USE -->
  <rect x="70" y="190" width="440" height="222" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
  <text x="290" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#3a7d44">USE</text>
  <g font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">
    <rect x="100" y="240" width="380" height="40" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="290" y="265" text-anchor="middle">support deflection &#8594; opens a ticket</text>
    <rect x="100" y="290" width="380" height="40" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="290" y="315" text-anchor="middle">internal ops bot (behind the VPN)</text>
    <rect x="100" y="340" width="380" height="50" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="290" y="362" text-anchor="middle">analyst copilot &#8212; human reviews</text>
    <text x="290" y="380" text-anchor="middle" font-size="12" fill="#7a808c">the final query before it runs</text>
  </g>

  <!-- RIGHT: DEFER -->
  <rect x="610" y="190" width="440" height="222" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  <text x="830" y="220" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#c14a3a">DEFER</text>
  <g font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">
    <rect x="640" y="246" width="380" height="56" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="830" y="270" text-anchor="middle">agent-as-the-product</text>
    <text x="830" y="289" text-anchor="middle" font-size="12" fill="#7a808c">unsupervised, long-horizon runs</text>
    <rect x="640" y="316" width="380" height="56" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="830" y="340" text-anchor="middle">multi-agent orchestration</text>
    <text x="830" y="359" text-anchor="middle" font-size="12" fill="#7a808c">no managed primitive yet &#8212; roll it</text>
  </g>

  <text x="560" y="446" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Put it on the jobs where a wrong answer is cheap. Wait on the ones where it isn't.</text>
</svg>
