<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A house wired for this from the studs out">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- house outline (a section / cutaway, showing studs + a wiring spine) -->
  <g transform="translate(290,70) scale(0.78)">
    <!-- roof + body -->
    <path d="M0 220 L350 40 L700 220" fill="none" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round"/>
    <rect x="40" y="220" width="620" height="320" fill="none" stroke="#1a1d24" stroke-width="5"/>

    <!-- stud framing (faint vertical lines) -->
    <g stroke="#1a1d24" stroke-width="2" opacity="0.18">
      <line x1="120" y1="220" x2="120" y2="540"/>
      <line x1="200" y1="220" x2="200" y2="540"/>
      <line x1="280" y1="220" x2="280" y2="540"/>
      <line x1="360" y1="220" x2="360" y2="540"/>
      <line x1="440" y1="220" x2="440" y2="540"/>
      <line x1="520" y1="220" x2="520" y2="540"/>
      <line x1="600" y1="220" x2="600" y2="540"/>
    </g>

    <!-- the structured-wiring closet: a panel lower-left -->
    <rect x="70" y="380" width="90" height="130" rx="6" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="4"/>
    <!-- patch-panel ports -->
    <g fill="#6a4c93" fill-opacity="0.5">
      <rect x="82" y="398" width="14" height="10"/><rect x="102" y="398" width="14" height="10"/><rect x="122" y="398" width="14" height="10"/>
      <rect x="82" y="416" width="14" height="10"/><rect x="102" y="416" width="14" height="10"/><rect x="122" y="416" width="14" height="10"/>
      <rect x="82" y="434" width="14" height="10"/><rect x="102" y="434" width="14" height="10"/><rect x="122" y="434" width="14" height="10"/>
    </g>

    <!-- the wiring spine fanning from the closet to drop points (small circles) -->
    <g stroke="#6a4c93" stroke-width="3" fill="none" opacity="0.8">
      <path d="M160 410 C 280 360, 360 320, 470 300"/>
      <path d="M160 420 C 320 420, 420 430, 540 440"/>
      <path d="M160 400 C 300 300, 380 270, 470 180"/>
      <path d="M160 430 C 260 490, 360 500, 470 500"/>
    </g>
    <!-- drop points -->
    <g fill="#fdfaf2" stroke="#6a4c93" stroke-width="3">
      <circle cx="470" cy="300" r="9"/>
      <circle cx="540" cy="440" r="9"/>
      <circle cx="470" cy="180" r="9"/>
      <circle cx="470" cy="500" r="9"/>
    </g>
  </g>
</svg>
