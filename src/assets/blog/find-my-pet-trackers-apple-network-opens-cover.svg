<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A pet's BLE tag relayed by passing phones">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#c87533"/>

  <!-- ground line -->
  <line x1="90" y1="500" x2="1120" y2="500" stroke="#1a1d24" stroke-width="2.5" opacity="0.18"/>

  <!-- ===== the cat with a small BLE clip on its collar ===== -->
  <g transform="translate(150,352)">
    <!-- seated-cat body -->
    <path d="M22 148 q-10 -56 22 -78 q40 -22 80 0 q32 22 22 78 z"
          fill="#1a1d24" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    <!-- head -->
    <g>
      <path d="M44 70 q-14 -22 0 -40 q12 14 22 14 q12 -4 22 0 q10 0 22 -14 q14 18 0 40" fill="#1a1d24" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="84" cy="56" r="36" fill="#1a1d24" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3"/>
    </g>
    <!-- tail -->
    <path d="M122 132 q46 8 40 -54" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <!-- collar across the neck + clip tag at the throat -->
    <path d="M52 92 q32 16 64 0" fill="none" stroke="#c87533" stroke-width="5"/>
    <circle cx="84" cy="100" r="10" fill="#c87533"/>
    <!-- BLE ping arcs radiating from the tag, downward-right toward the phones, clear of the head -->
    <g stroke="#c87533" stroke-width="3.5" fill="none">
      <path d="M100 96 a20 20 0 0 1 8 26"/>
      <path d="M112 90 a34 34 0 0 1 12 42"/>
    </g>
  </g>

  <!-- ===== three passing phones, each catching the ping ===== -->
  <!-- phone A (near, lower) -->
  <g transform="translate(430,380)">
    <rect x="0" y="0" width="66" height="118" rx="13" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="9" y="14" width="48" height="82" rx="4" fill="#1a1d24" fill-opacity="0.05" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="33" cy="107" r="3.5" fill="#1a1d24" opacity="0.4"/>
    <!-- a small located-dot on screen -->
    <circle cx="33" cy="50" r="7" fill="#c87533"/>
  </g>
  <!-- phone B (mid) -->
  <g transform="translate(560,300)">
    <rect x="0" y="0" width="60" height="108" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="8" y="13" width="44" height="74" rx="4" fill="#1a1d24" fill-opacity="0.05" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="30" cy="97" r="3" fill="#1a1d24" opacity="0.4"/>
  </g>
  <!-- phone C (far) -->
  <g transform="translate(690,360)">
    <rect x="0" y="0" width="58" height="104" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="8" y="12" width="42" height="72" rx="4" fill="#1a1d24" fill-opacity="0.05" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="29" cy="93" r="3" fill="#1a1d24" opacity="0.4"/>
  </g>

  <!-- dotted relay hops phone -> phone -> cloud -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="none" stroke-dasharray="2 8" stroke-linecap="round" opacity="0.55">
    <path d="M496 420 C530 400, 540 370, 560 350"/>
    <path d="M620 340 C660 350, 670 370, 690 392"/>
    <path d="M748 380 C840 330, 900 280, 944 230"/>
  </g>

  <!-- ===== cloud (encrypted) ===== -->
  <g transform="translate(910,120)">
    <path d="M60 110 a40 40 0 0 1 6 -78 a48 48 0 0 1 92 8 a34 34 0 0 1 -4 70 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <!-- a little padlock inside = end-to-end encrypted -->
    <g transform="translate(96,52)">
      <rect x="0" y="14" width="40" height="30" rx="5" fill="#c87533" fill-opacity="0.16" stroke="#1a1d24" stroke-width="3"/>
      <path d="M8 14 v-8 a12 12 0 0 1 24 0 v8" fill="none" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="20" cy="28" r="3.5" fill="#1a1d24"/>
    </g>
  </g>
</svg>
