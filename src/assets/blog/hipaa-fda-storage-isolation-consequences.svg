<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660" role="img" aria-label="The storage and isolation consequences of the three tiers. Device events arrive over TLS 1.2 and land by default in the Tier 1 event store, drawn on DynamoDB and labelled not HIPAA-eligible, carrying no PHI, flowing onward to the data warehouse. A logged join service is the only path upward; promotion is never automatic. Tier 2 pseudonymous data sits beside its identity-mapping table, which is held separately. Inside a separate AWS account boundary on the right, Tier 3 identifiable data lives in HIPAA-eligible RDS and S3, encrypted under its own KMS key with stricter IAM and audit logging, reachable only by cross-account roles. A dentist-portal subsystem behind its own authentication boundary, gated on a signed BAA, is the sole consumer-facing path that can read Tier 3. The consumer app API has no edge to Tier 3 at all.">
  <rect width="1000" height="660" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- device events in, over TLS 1.2 -->
  <g transform="translate(34,70)">
    <rect x="0" y="0" width="150" height="64" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- device puck glyph -->
    <g transform="translate(36,32)" stroke="#357a8c" stroke-width="2.6" fill="none">
      <rect x="-18" y="-14" width="36" height="28" rx="7"/>
      <circle cx="0" cy="0" r="5"/>
    </g>
    <text x="86" y="28" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">device</text>
    <text x="86" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">events</text>
  </g>
  <g transform="translate(184,102)">
    <line x1="0" y1="0" x2="78" y2="0" stroke="#357a8c" stroke-width="3"/>
    <path d="M80 0 l-12 -6 v12 z" fill="#357a8c"/>
    <text x="40" y="-12" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">TLS 1.2</text>
  </g>

  <!-- ===== Tier 1 store (DynamoDB, default landing) ===== -->
  <g transform="translate(272,58)">
    <rect x="0" y="0" width="220" height="92" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
    <!-- cylinder/db glyph -->
    <g transform="translate(40,46)" stroke="#3a7d44" stroke-width="2.6" fill="none">
      <ellipse cx="0" cy="-16" rx="18" ry="6"/>
      <path d="M-18 -16 V14 a18 6 0 0 0 36 0 V-16"/>
      <path d="M-18 -1 a18 6 0 0 0 36 0" />
    </g>
    <text x="130" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#3a7d44">Tier 1 store</text>
    <text x="130" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">DynamoDB</text>
    <text x="130" y="74" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12" fill="#c14a3a">not HIPAA-eligible · no PHI</text>
  </g>

  <!-- Tier 1 -> data warehouse -->
  <g transform="translate(492,104)">
    <line x1="0" y1="0" x2="58" y2="0" stroke="#3a7d44" stroke-width="2.6"/>
    <path d="M60 0 l-12 -6 v12 z" fill="#3a7d44"/>
  </g>
  <g transform="translate(560,72)">
    <rect x="0" y="0" width="150" height="64" rx="11" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.6"/>
    <text x="75" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#1a1d24">data</text>
    <text x="75" y="49" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#1a1d24">warehouse</text>
  </g>

  <!-- ===== the ONLY path up: logged join service ===== -->
  <g transform="translate(330,182)">
    <rect x="0" y="0" width="290" height="60" rx="11" fill="#fdfaf2" stroke="#357a8c" stroke-width="3" stroke-dasharray="0"/>
    <!-- gear/log glyph -->
    <g transform="translate(36,30)" stroke="#357a8c" stroke-width="2.6" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="11"/>
      <line x1="0" y1="-16" x2="0" y2="-13"/><line x1="0" y1="16" x2="0" y2="13"/>
      <line x1="-16" y1="0" x2="-13" y2="0"/><line x1="16" y1="0" x2="13" y2="0"/>
      <line x1="-11" y1="-11" x2="-9" y2="-9"/><line x1="11" y1="11" x2="9" y2="9"/>
      <line x1="11" y1="-11" x2="9" y2="-9"/><line x1="-11" y1="11" x2="-9" y2="9"/>
    </g>
    <text x="170" y="27" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14.5" fill="#1a1d24">logged join service</text>
    <text x="170" y="47" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">only path up · never automatic</text>
  </g>
  <!-- arrow store -> join -->
  <g transform="translate(382,150)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#357a8c" stroke-width="2.6"/>
    <path d="M0 32 l-6 -12 h12 z" fill="#357a8c"/>
  </g>

  <!-- ===== Tier 2 (pseudonymous) + separate mapping table ===== -->
  <g transform="translate(34,290)">
    <rect x="0" y="0" width="300" height="92" rx="12" fill="#fdfaf2" stroke="#357a8c" stroke-width="3"/>
    <text x="20" y="30" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#357a8c">Tier 2</text>
    <text x="20" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">pseudonymous</text>
    <text x="20" y="74" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12" fill="#5b616b">cohort analytics</text>
    <!-- separate mapping table, set apart with a dashed link -->
    <g transform="translate(218,46)" stroke="#357a8c" stroke-width="2.6" fill="none" stroke-linecap="round">
      <rect x="-26" y="-22" width="60" height="44" rx="5" fill="#fdfaf2" stroke-dasharray="5 4"/>
      <line x1="-26" y1="-8" x2="34" y2="-8"/>
      <line x1="4" y1="-22" x2="4" y2="22"/>
    </g>
    <text x="222" y="86" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#5b616b">id-map (separate)</text>
  </g>
  <!-- arrow join -> tier 2 -->
  <g transform="translate(300,242)">
    <line x1="0" y1="0" x2="0" y2="46" stroke="#357a8c" stroke-width="2.6"/>
    <path d="M0 48 l-6 -12 h12 z" fill="#357a8c"/>
  </g>

  <!-- ===== separate AWS ACCOUNT boundary (Tier 3) ===== -->
  <rect x="540" y="278" width="430" height="346" rx="18" fill="none" stroke="#c14a3a" stroke-width="3" stroke-dasharray="10 7"/>
  <text x="560" y="304" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">separate AWS account · cross-account roles only</text>

  <!-- Tier 3 store: HIPAA-eligible RDS + S3, own KMS key -->
  <g transform="translate(566,326)">
    <rect x="0" y="0" width="380" height="120" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <text x="20" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#c14a3a">Tier 3 — identifiable</text>
    <!-- RDS cylinder -->
    <g transform="translate(54,78)" stroke="#c14a3a" stroke-width="2.4" fill="none">
      <ellipse cx="0" cy="-14" rx="16" ry="5"/>
      <path d="M-16 -14 V14 a16 5 0 0 0 32 0 V-14"/>
    </g>
    <text x="54" y="108" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">RDS</text>
    <!-- S3 bucket -->
    <g transform="translate(140,78)" stroke="#c14a3a" stroke-width="2.4" fill="none">
      <path d="M-16 -14 H16 L12 16 H-12 Z" fill="#fdfaf2"/>
    </g>
    <text x="140" y="108" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">S3</text>
    <text x="232" y="62" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">HIPAA-eligible</text>
    <text x="232" y="82" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#5b616b">strict IAM · audit log</text>
    <!-- own KMS key glyph + label, on one baseline -->
    <g transform="translate(244,104)" stroke="#c14a3a" stroke-width="2.6" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="7" fill="#fdfaf2"/>
      <circle cx="0" cy="0" r="2.4" fill="#c14a3a" stroke="none"/>
      <line x1="7" y1="0" x2="23" y2="0"/>
      <line x1="17" y1="0" x2="17" y2="7"/>
      <line x1="23" y1="0" x2="23" y2="8"/>
    </g>
    <text x="280" y="108" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">own KMS key</text>
  </g>

  <!-- dentist-portal subsystem behind its own auth, BAA-gated -->
  <g transform="translate(566,476)">
    <rect x="0" y="0" width="380" height="120" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="20" y="30" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">dentist-portal subsystem</text>
    <!-- own auth boundary: a shield -->
    <g transform="translate(48,78)" stroke="#c14a3a" stroke-width="2.6" fill="none" stroke-linejoin="round">
      <path d="M0 -22 L20 -14 V4 C20 18, 8 26, 0 30 C-8 26, -20 18, -20 4 V-14 Z" fill="#fdfaf2"/>
      <path d="M-9 1 l6 7 l12 -14" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="220" y="64" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">own auth boundary</text>
    <text x="220" y="88" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#c14a3a">gated on a signed BAA</text>
  </g>

  <!-- arrow: join service -> Tier 3 (crossing the account boundary) -->
  <g>
    <path d="M540 212 C 720 212, 700 300, 720 322" fill="none" stroke="#c14a3a" stroke-width="2.6"/>
    <path d="M722 324 l-12 -3 l3 -12 z" fill="#c14a3a"/>
  </g>
  <!-- arrow: Tier 3 store <-> dentist portal -->
  <g transform="translate(756,446)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#c14a3a" stroke-width="2.6"/>
    <path d="M0 32 l-6 -12 h12 z" fill="#c14a3a"/>
    <path d="M0 0 l-6 12 h12 z" fill="#c14a3a"/>
  </g>

  <!-- consumer app API has NO edge to Tier 3 -->
  <g transform="translate(360,548)">
    <rect x="0" y="0" width="160" height="56" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="80" y="26" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">consumer app</text>
    <text x="80" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">API</text>
  </g>
  <!-- severed edge to Tier 3 -->
  <g>
    <path d="M520 576 H556" fill="none" stroke="#c14a3a" stroke-width="2.6" stroke-dasharray="5 6" opacity="0.8"/>
    <g transform="translate(540,576)">
      <circle r="14" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <path d="M-6 -6 L6 6 M6 -6 L-6 6" stroke="#c14a3a" stroke-width="2.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
