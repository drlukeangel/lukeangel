<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" role="img" aria-label="Authentication and authorization are two different questions. Authentication asks who are you, answered by the device's verified identity. Authorization asks what may you do, answered by a small set of permitted actions with everything else denied. Passing the first says nothing about the second.">
  <rect width="1000" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">TWO DIFFERENT QUESTIONS</text>

  <text x="248" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" letter-spacing="1" fill="#1a1d24">AUTHENTICATION</text>
  <text x="248" y="120" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#7a808c">who are you?</text>
  <g transform="translate(176,152)">
    <rect x="0" y="0" width="120" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="26" cy="26" r="6" fill="none" stroke="#1a1d24" stroke-width="2.5"/><circle cx="26" cy="26" r="2.5" fill="#c14a3a"/>
    <rect x="26" y="48" width="74" height="30" rx="6" fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.35"/>
  </g>
  <g transform="translate(300,200)">
    <circle cx="0" cy="0" r="18" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3.5"/>
    <path d="M-8 0 l5 6 10 -12" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="248" y="290" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">verified identity</text>

  <text x="500" y="214" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="48" fill="#c14a3a">&#8800;</text>

  <text x="752" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" letter-spacing="1" fill="#1a1d24">AUTHORIZATION</text>
  <text x="752" y="120" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#7a808c">what may you do?</text>
  <g>
    <rect x="624" y="150" width="262" height="30" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <path d="M640 164 l6 6 11 -13" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="672" y="169" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">its own telemetry · commands</text>
    <rect x="624" y="188" width="262" height="30" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" opacity="0.55"/>
    <g transform="translate(640,198)" stroke="#c14a3a" stroke-width="2.6"><line x1="0" y1="0" x2="12" y2="12"/><line x1="12" y1="0" x2="0" y2="12"/></g>
    <text x="672" y="207" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">wildcards · other devices</text>
    <rect x="624" y="226" width="262" height="30" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" opacity="0.55"/>
    <g transform="translate(640,236)" stroke="#c14a3a" stroke-width="2.6"><line x1="0" y1="0" x2="12" y2="12"/><line x1="12" y1="0" x2="0" y2="12"/></g>
    <text x="672" y="245" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">firmware · admin APIs</text>
  </g>

  <text x="500" y="326" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Passing the first says nothing about the second.</text>
</svg>
