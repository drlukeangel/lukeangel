<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" role="img" aria-label="PIR burst versus always-on continuous traffic over time">
  <rect width="1000" height="400" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" font-weight="700" fill="#1a1d24">THE COUNTER-INTUITIVE PART: BURST VS CONTINUOUS</text>

  <!-- always-on PoE: flat high line -->
  <text x="40" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#7a808c">ALWAYS-ON POE CAM &#183; 4K</text>
  <line x1="60" y1="170" x2="60" y2="108" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="60" y1="170" x2="940" y2="170" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="60" y1="116" x2="940" y2="116" stroke="#7a808c" stroke-width="3"/>
  <text x="500" y="146" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">~6 Mbps, continuous &#8212; every second</text>

  <!-- PIR WiFi: flat zero with two bursts -->
  <text x="40" y="240" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#6a4c93">PIR-TRIGGERED WIFI CAM &#183; 1080p h.265</text>
  <line x1="60" y1="330" x2="60" y2="260" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="60" y1="330" x2="940" y2="330" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- near-zero baseline with two bursts -->
  <path d="M60 328 L260 328 L260 280 L320 280 L320 328 L600 328 L600 280 L660 280 L660 328 L940 328"
        fill="none" stroke="#6a4c93" stroke-width="3"/>
  <text x="290" y="270" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#6a4c93">motion</text>
  <text x="630" y="270" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#6a4c93">motion</text>
  <text x="160" y="322" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#5b616b">~0 Mbps idle</text>

  <text x="500" y="372" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">a wake-on-motion WiFi cam is easier on the network than an always-on PoE cam.</text>
</svg>
