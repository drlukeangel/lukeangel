<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Power budget across a twelve-hour shift">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE 12-HOUR BUDGET</text>

  <!-- axes -->
  <line x1="100" y1="100" x2="100" y2="330" stroke="#1a1d24" stroke-width="2.5"/>
  <line x1="100" y1="330" x2="1050" y2="330" stroke="#1a1d24" stroke-width="2.5"/>
  <!-- y labels (current) -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#7a808c" text-anchor="end">
    <text x="88" y="118">0.8A</text>
    <text x="88" y="190">0.4A</text>
    <text x="88" y="262">0.2A</text>
    <text x="88" y="334">0</text>
  </g>
  <text x="42" y="220" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c" transform="rotate(-90 42 220)">draw (A)</text>

  <!-- average line at 0.4A -->
  <line x1="100" y1="190" x2="1050" y2="190" stroke="#2a52be" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="1044" y="182" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">~0.4A shift average</text>

  <!-- draw profile: scanning bursts (high) over an idle baseline, then deep sleep -->
  <path d="M100 240
           L180 240 L180 130 L250 130 L250 240
           L330 240 L330 150 L400 150 L400 240
           L500 240 L500 128 L560 128 L560 240
           L650 240 L650 158 L720 158 L720 240
           L820 240 L820 138 L880 138 L880 240
           L940 240
           L940 306 L1050 306"
        fill="none" stroke="#3a7d44" stroke-width="3"/>
  <!-- soft fill under the curve -->
  <path d="M100 240 L180 240 L180 130 L250 130 L250 240 L330 240 L330 150 L400 150 L400 240 L500 240 L500 128 L560 128 L560 240 L650 240 L650 158 L720 158 L720 240 L820 240 L820 138 L880 138 L880 240 L940 240 L940 306 L1050 306 L1050 330 L100 330 Z"
        fill="#3a7d44" fill-opacity="0.08"/>

  <!-- state annotations -->
  <text x="215" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#3a7d44">scan burst</text>
  <text x="450" y="226" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">idle baseline</text>
  <text x="995" y="296" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">deep sleep</text>
  <text x="995" y="316" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#5b616b">~0.1A</text>

  <!-- x axis: a 12h shift -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#7a808c" text-anchor="middle">
    <text x="100" y="352">open</text>
    <text x="575" y="352">— mixed scan + idle across a 12-hour shift —</text>
    <text x="1050" y="352">dock</text>
  </g>

  <!-- capacity math box -->
  <rect x="100" y="380" width="950" height="56" rx="10" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="2"/>
  <text x="575" y="404" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">7.8 Ah pack ÷ ~0.4A average ≈ a full 12-hour shift, then a 2-hour charge to 80% at the dock</text>
  <text x="575" y="424" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">the cloud round-trip is kept off the scan path — that 200 ms budget is local-only</text>
</svg>
