<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-label="Announced vs shipped">
  <rect width="960" height="460" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
    .bad{fill:#c14a3a;}
  </style>

  <text x="40" y="48" class="ttl">The Whistle cellular GPS — spring tease to year-end</text>

  <!-- stage 1: press render -->
  <g transform="translate(120,150)">
    <rect x="-70" y="-46" width="140" height="92" rx="8" fill="#fdfaf2" stroke="#c87533" stroke-width="2.5" stroke-dasharray="7 5"/>
    <circle cx="0" cy="-8" r="22" fill="none" stroke="#c87533" stroke-width="2.5" stroke-dasharray="5 4"/>
    <text x="0" y="-3" text-anchor="middle" class="sm">render</text>
  </g>
  <text x="120" y="232" text-anchor="middle" class="sm">spring: press render</text>

  <!-- arrow -->
  <line x1="200" y1="150" x2="300" y2="150" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- stage 2: pre-order page -->
  <g transform="translate(400,150)">
    <rect x="-58" y="-50" width="116" height="100" rx="8" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5"/>
    <line x1="-58" y1="-32" x2="58" y2="-32" stroke="#7a808c" stroke-width="1.5"/>
    <rect x="-40" y="0" width="80" height="24" rx="4" fill="#fdfaf2" stroke="#c87533" stroke-width="2"/>
    <text x="0" y="17" text-anchor="middle" class="sm">$129 + fee</text>
  </g>
  <text x="400" y="232" text-anchor="middle" class="sm">pre-order page</text>

  <!-- arrow -->
  <line x1="478" y1="150" x2="578" y2="150" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- stage 3: empty collar (never shipped 2014) -->
  <g transform="translate(700,150)">
    <path d="M -64 28 A 64 56 0 0 1 64 28" fill="none" stroke="#1a1d24" stroke-width="6"/>
    <rect x="-22" y="-2" width="44" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="6 4"/>
    <line x1="-18" y1="2" x2="18" y2="34" stroke="#c14a3a" stroke-width="2"/>
    <line x1="18" y1="2" x2="-18" y2="34" stroke="#c14a3a" stroke-width="2"/>
  </g>
  <text x="700" y="232" text-anchor="middle" class="sm bad">on Atom's collar: nothing</text>

  <!-- the gap bracket -->
  <line x1="120" y1="290" x2="700" y2="290" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="410" y="328" text-anchor="middle" class="lab bad">the gap between "announced" and "on the dog"</text>

  <line x1="40" y1="370" x2="920" y2="370" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="480" y="408" text-anchor="middle" class="cap">A render and a pre-order page are not a product on a collar.</text>
  <text x="480" y="434" text-anchor="middle" class="sm">Teased ~$129 + monthly · still vapor at year-end.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24"/></marker>
  </defs>
</svg>
