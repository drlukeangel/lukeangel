<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 470" width="1060" height="470" role="img" aria-label="Classify data, then treat each tier. Direct identifiers like email or a serial become a salted hash. Quasi-identifiers like an operator id or name are tokenized. Sensitive attributes like GPS or biometrics are generalized. Behavioral data like battery, torque, or usage is kept as is.">
  <rect width="1060" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">CLASSIFY, THEN TREAT EACH TIER</text>

  <g font-family="ui-monospace,monospace">
    <!-- row 1 -->
    <rect x="40" y="84" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="116" font-size="14" fill="#1a1d24">Direct identifier</text>
    <text x="60" y="140" font-size="12" fill="#7a808c">email · serial tied to a person</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="122" x2="556" y2="122"/><path d="M560 122 l-15 -7 v14 z"/></g>
    <rect x="572" y="84" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
    <text x="592" y="116" font-size="14" fill="#c14a3a">HASH</text>
    <text x="592" y="140" font-size="12" fill="#7a808c">salted, rotating — match but can't read</text>

    <!-- row 2 -->
    <rect x="40" y="180" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="212" font-size="14" fill="#1a1d24">Quasi-identifier</text>
    <text x="60" y="236" font-size="12" fill="#7a808c">operator id · name</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="218" x2="556" y2="218"/><path d="M560 218 l-15 -7 v14 z"/></g>
    <rect x="572" y="180" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
    <text x="592" y="212" font-size="14" fill="#c14a3a">TOKENIZE</text>
    <text x="592" y="236" font-size="12" fill="#7a808c">namespaced — joins across tables fail</text>

    <!-- row 3 -->
    <rect x="40" y="276" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="308" font-size="14" fill="#1a1d24">Sensitive attribute</text>
    <text x="60" y="332" font-size="12" fill="#7a808c">GPS · biometric</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="314" x2="556" y2="314"/><path d="M560 314 l-15 -7 v14 z"/></g>
    <rect x="572" y="276" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
    <text x="592" y="308" font-size="14" fill="#c14a3a">GENERALIZE</text>
    <text x="592" y="332" font-size="12" fill="#7a808c">GPS to a 1 km grid, etc.</text>

    <!-- row 4 -->
    <rect x="40" y="372" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="404" font-size="14" fill="#1a1d24">Behavioral data</text>
    <text x="60" y="428" font-size="12" fill="#7a808c">battery · torque · usage minutes</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="410" x2="556" y2="410"/><path d="M560 410 l-15 -7 v14 z"/></g>
    <rect x="572" y="372" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="592" y="404" font-size="14" fill="#3a7d44">KEEP</text>
    <text x="592" y="428" font-size="12" fill="#7a808c">it's the product, not a person</text>
  </g>
</svg>
