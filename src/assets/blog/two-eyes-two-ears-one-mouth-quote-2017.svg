<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">Quote poster — Two eyes, two ears, one mouth: use them in proportion (Ilse Crawford)</title>
  <desc id="d">2017-era flat poster: cream background with simple line-illustrations of two eyes, two ears, and one mouth across the top in equal scale; the quote and attribution centered below; a small ratio diagram (2:2:1) at the bottom.</desc>
  <rect width="1200" height="630" fill="#f5efe1"/>

  <!-- icons row -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="none">
    <!-- eye 1 -->
    <g transform="translate(160,140)">
      <path d="M 0 30 Q 60 -10 120 30 Q 60 70 0 30 Z"/>
      <circle cx="60" cy="30" r="14" fill="#1a1d24"/>
      <circle cx="65" cy="25" r="3" fill="#f5efe1"/>
    </g>
    <!-- eye 2 -->
    <g transform="translate(320,140)">
      <path d="M 0 30 Q 60 -10 120 30 Q 60 70 0 30 Z"/>
      <circle cx="60" cy="30" r="14" fill="#1a1d24"/>
      <circle cx="65" cy="25" r="3" fill="#f5efe1"/>
    </g>
    <!-- ear 1 -->
    <g transform="translate(540,110)">
      <path d="M 40 100 Q -10 80 10 30 Q 40 -10 80 10 Q 100 50 60 70 Q 50 85 60 100 L 40 100 Z"/>
    </g>
    <!-- ear 2 -->
    <g transform="translate(680,110)">
      <path d="M 50 100 Q 100 80 80 30 Q 50 -10 10 10 Q -10 50 30 70 Q 40 85 30 100 L 50 100 Z"/>
    </g>
    <!-- mouth -->
    <g transform="translate(900,140)">
      <path d="M 0 30 Q 60 -5 120 30 Q 60 65 0 30 Z" fill="#dd0031"/>
      <line x1="0" y1="30" x2="120" y2="30" stroke="#1a1d24" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ratio labels -->
  <text x="220" y="245" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="0.2em" fill="#5a6470">OBSERVE × 2</text>
  <text x="620" y="245" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="0.2em" fill="#5a6470">LISTEN × 2</text>
  <text x="960" y="245" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="0.2em" fill="#5a6470">SPEAK × 1</text>

  <!-- quote -->
  <text x="600" y="350" text-anchor="middle" font-family="'Newsreader','Georgia',serif" font-size="38" font-weight="500" font-style="italic" fill="#1a1d24">"When forming a solution to a problem we have</text>
  <text x="600" y="400" text-anchor="middle" font-family="'Newsreader','Georgia',serif" font-size="38" font-weight="500" font-style="italic" fill="#1a1d24">two eyes, two ears, and one mouth —</text>
  <text x="600" y="450" text-anchor="middle" font-family="'Newsreader','Georgia',serif" font-size="38" font-weight="500" font-style="italic" fill="#1a1d24">and we should use them in that proportion."</text>

  <text x="600" y="510" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" letter-spacing="0.15em" fill="#5a6470">— ILSE CRAWFORD</text>

  <!-- byline -->
  <text x="600" y="580" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" letter-spacing="0.2em" fill="#6b7385">LUKEANGEL.CO · THE JOURNAL · 2017</text>
</svg>
