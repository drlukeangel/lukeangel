<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="Appliance events driving cross-device automations">
  <rect width="1000" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .ev { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11.5px; fill: #6a4c93; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">WHAT "ONE SYSTEM" BUYS — APPLIANCE STATE TRIGGERS A WHOLE-HOUSE RESPONSE</text>

  <!-- left: appliance state events -->
  <g transform="translate(50,80)">
    <text x="0" y="-6" class="sub">APPLIANCE EMITS</text>
    <rect x="0" y="8" width="210" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="16" y="30" class="lbl">oven → "preheating"</text><text x="16" y="48" class="sub">surface_temperature climbs</text>
    <rect x="0" y="98" width="210" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="16" y="120" class="lbl">probe → target reached</text>
    <rect x="0" y="188" width="210" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="16" y="210" class="lbl">dishwasher + oven done</text><text x="16" y="228" class="sub">within 10 min, humidity &gt; 60</text>
    <rect x="0" y="278" width="210" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="16" y="300" class="lbl">wash cycle finished</text>
  </g>

  <!-- center: HA as the rule engine -->
  <g transform="translate(400,170)">
    <rect x="0" y="0" width="160" height="120" rx="12" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
    <text x="80" y="50" text-anchor="middle" class="lbl">Home</text>
    <text x="80" y="70" text-anchor="middle" class="lbl">Assistant</text>
    <text x="80" y="96" text-anchor="middle" class="sub">rules, locally</text>
  </g>

  <!-- right: responses -->
  <g transform="translate(720,80)">
    <text x="0" y="-6" class="sub">HOUSE RESPONDS</text>
    <rect x="0" y="8" width="230" height="50" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/><text x="16" y="30" class="lbl">Echo announces it</text><text x="16" y="48" class="sub">"oven preheating to 425"</text>
    <rect x="0" y="98" width="230" height="50" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/><text x="16" y="120" class="lbl">push to phones</text>
    <rect x="0" y="188" width="230" height="50" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/><text x="16" y="210" class="lbl">dehumidifier on 30 min</text>
    <rect x="0" y="278" width="230" height="50" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/><text x="16" y="300" class="lbl">counter LED → red when hot</text>
  </g>

  <!-- arrows in -->
  <g stroke="#6a4c93" stroke-width="2.4" fill="none">
    <path d="M260 113 C 330 113, 350 200, 398 215"/>
    <path d="M260 203 C 330 203, 350 220, 398 225"/>
    <path d="M260 293 C 330 293, 350 250, 398 240"/>
    <path d="M260 343 C 340 343, 360 270, 398 255"/>
  </g>
  <!-- arrows out -->
  <g stroke="#3a7d44" stroke-width="2.4" fill="none">
    <path d="M560 215 C 630 200, 660 113, 718 113"/>
    <path d="M560 225 C 630 220, 660 203, 718 203"/>
    <path d="M560 235 C 630 250, 660 293, 718 293"/>
    <path d="M560 250 C 640 270, 660 343, 718 343"/>
  </g>

  <text x="500" y="448" text-anchor="middle" class="cap">None of these were possible with a non-connected oven — the kid-warning LED in particular just works now.</text>
</svg>
