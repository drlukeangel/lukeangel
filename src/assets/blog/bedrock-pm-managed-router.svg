<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="The managed-model-API value prop.">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE SDK, ONE IAM, ONE BILL — MANY MODELS</text>

  <!-- private boundary around the exchange -->
  <rect x="40" y="74" width="1040" height="360" rx="20" fill="none" stroke="#4f46b8" stroke-width="2.5" stroke-dasharray="11 9" opacity="0.85"/>
  <text x="62" y="100" font-family="ui-monospace,monospace" font-size="12" letter-spacing="1" fill="#4f46b8">PrivateLink — stays in your VPC</text>

  <!-- your app -->
  <rect x="74" y="190" width="150" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="149" y="240" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">your app</text>
  <text x="149" y="262" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">(a Lambda)</text>

  <!-- single SDK call -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="none"><path d="M224 250 H 332"/></g>
  <g fill="#1a1d24"><path d="M332 250 l-15 -6 v12 z"/></g>
  <text x="278" y="232" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">invoke_model()</text>
  <text x="278" y="276" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">one boto3 client</text>

  <!-- the endpoint, gated by one IAM key -->
  <rect x="336" y="180" width="200" height="140" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="436" y="208" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#4f46b8">Bedrock endpoint</text>
  <!-- IAM key glyph -->
  <g transform="translate(404,232)" fill="none" stroke="#4f46b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="15"/>
    <line x1="11" y1="11" x2="38" y2="38"/>
    <line x1="27" y1="27" x2="37" y2="17"/>
    <line x1="33" y1="33" x2="43" y2="23"/>
  </g>
  <text x="436" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">one IAM policy scopes it</text>

  <!-- fan-out to models -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="none" opacity="0.85">
    <path d="M536 220 C 640 150, 720 132, 812 132"/>
    <path d="M536 240 C 640 210, 720 200, 812 200"/>
    <path d="M536 260 C 640 290, 720 300, 812 300"/>
    <path d="M536 280 C 640 350, 720 368, 812 368"/>
  </g>
  <g fill="#1a1d24">
    <path d="M812 132 l-15 -6 v12 z"/><path d="M812 200 l-15 -6 v12 z"/>
    <path d="M812 300 l-15 -6 v12 z"/><path d="M812 368 l-15 -6 v12 z"/>
  </g>

  <!-- four model providers, abstracted -->
  <g font-family="ui-monospace,monospace">
    <rect x="816" y="108" width="230" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="931" y="138" text-anchor="middle" font-size="12.5" fill="#1a1d24">model — provider A</text>
    <rect x="816" y="176" width="230" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="931" y="206" text-anchor="middle" font-size="12.5" fill="#1a1d24">model — provider B</text>
    <rect x="816" y="276" width="230" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="931" y="306" text-anchor="middle" font-size="12.5" fill="#1a1d24">model — provider C</text>
    <rect x="816" y="344" width="230" height="48" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="931" y="374" text-anchor="middle" font-size="12.5" fill="#1a1d24">model — provider D</text>
  </g>

  <text x="560" y="424" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Swapping models is a model-ID change — not a new integration.</text>
</svg>
