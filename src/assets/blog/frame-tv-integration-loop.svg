<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" role="img" aria-label="Seven ecosystems through one Frame TV">
  <rect width="1000" height="520" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .ctr { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 14px; fill: #1a1d24; font-weight: 600; }
    .node { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11.5px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 10px; fill: #5b616b; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">SEVEN ECOSYSTEMS, ONE DEVICE — THE INTEGRATION LOOP CLOSED</text>

  <!-- center node: the Frame -->
  <g transform="translate(420,210)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
    <path d="M40 36 l40 -22 l40 22" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <text x="80" y="64" text-anchor="middle" class="ctr">Frame TV</text>
    <text x="80" y="84" text-anchor="middle" class="sub">Tizen · ST hub</text>
  </g>

  <!-- 7 spokes around -->
  <!-- helper positions -->
  <g>
    <!-- 1 doorbell cam (top-left) -->
    <g transform="translate(120,70)"><rect x="0" y="0" width="170" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">doorbell cam feed</text><text x="14" y="38" class="sub">Reolink → Frigate</text></g>
    <!-- 2 fridge cast (top) -->
    <g transform="translate(420,40)"><rect x="0" y="0" width="160" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">cast from fridge</text><text x="14" y="38" class="sub">recipe mirror</text></g>
    <!-- 3 airplay/cast (top-right) -->
    <g transform="translate(710,70)"><rect x="0" y="0" width="180" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">AirPlay / Google Cast</text><text x="14" y="38" class="sub">family devices</text></g>
    <!-- 4 SmartThings hub (right) -->
    <g transform="translate(770,230)"><rect x="0" y="0" width="190" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">SmartThings hub</text><text x="14" y="38" class="sub">Zigbee · Z-Wave · Matter</text></g>
    <!-- 5 thread border router (bottom-right) -->
    <g transform="translate(710,400)"><rect x="0" y="0" width="180" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">Thread border router</text><text x="14" y="38" class="sub">Eve · Nanoleaf</text></g>
    <!-- 6 HomeKit (bottom-left) -->
    <g transform="translate(120,400)"><rect x="0" y="0" width="170" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">HomeKit accessory</text><text x="14" y="38" class="sub">shows in Apple Home</text></g>
    <!-- 7 HA (left) -->
    <g transform="translate(40,230)"><rect x="0" y="0" width="190" height="46" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="14" y="22" class="node">Home Assistant</text><text x="14" y="38" class="sub">via ST integration</text></g>
  </g>

  <!-- spokes -->
  <g stroke="#6a4c93" stroke-width="2.4" opacity="0.8">
    <line x1="290" y1="93" x2="430" y2="210"/>
    <line x1="500" y1="86" x2="500" y2="210"/>
    <line x1="710" y1="93" x2="572" y2="210"/>
    <line x1="770" y1="253" x2="580" y2="258"/>
    <line x1="710" y1="423" x2="572" y2="305"/>
    <line x1="290" y1="423" x2="430" y2="305"/>
    <line x1="230" y1="253" x2="420" y2="258"/>
  </g>

  <text x="500" y="494" text-anchor="middle" class="cap">A doorbell ring, a cast recipe, a Matter sensor, an Apple Home tile — all routed through the same screen on the wall.</text>
</svg>
