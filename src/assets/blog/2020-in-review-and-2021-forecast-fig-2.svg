<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="Local-first survives the WAN outage, 2020">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24" text-anchor="middle">

    <!-- the LAN box -->
    <rect x="40" y="56" width="600" height="360" rx="14" fill="#6a4c93" fill-opacity="0.04" stroke="#6a4c93" stroke-opacity="0.35" stroke-width="2"/>
    <text x="340" y="80" font-size="12" fill="#6a4c93">the house LAN — runs without internet</text>

    <!-- HA hub center -->
    <g transform="translate(340 200)">
      <rect x="-72" y="-40" width="144" height="80" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-10" font-size="14" fill="#6a4c93">Home Assistant</text>
      <text x="0" y="10" font-size="10.5" fill="#5b616b">Pi 4 · local rules</text>
      <text x="0" y="28" font-size="10.5" fill="#3a7d44">automations local</text>
    </g>

    <!-- radio leaves around the hub -->
    <g font-size="10.5">
      <g transform="translate(140 130)">
        <rect x="-66" y="-26" width="132" height="52" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
        <text x="0" y="-4" fill="#1a1d24">Zigbee2MQTT</text>
        <text x="0" y="14" fill="#5b616b">CC2652 · sensors</text>
      </g>
      <g transform="translate(140 270)">
        <rect x="-66" y="-26" width="132" height="52" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
        <text x="0" y="-4" fill="#1a1d24">Z-Wave</text>
        <text x="0" y="14" fill="#5b616b">Yale lock · alarm</text>
      </g>
      <g transform="translate(540 130)">
        <rect x="-72" y="-26" width="144" height="52" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
        <text x="0" y="-4" fill="#1a1d24">Frigate + Coral</text>
        <text x="0" y="14" fill="#5b616b">PoE cams · detect</text>
      </g>
      <g transform="translate(540 270)">
        <rect x="-72" y="-26" width="144" height="52" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
        <text x="0" y="-4" fill="#1a1d24">ESPHome / MQTT</text>
        <text x="0" y="14" fill="#5b616b">DIY temp/humidity</text>
      </g>
    </g>
    <g stroke="#6a4c93" stroke-width="2" opacity="0.6">
      <line x1="206" y1="142" x2="270" y2="178"/>
      <line x1="206" y1="258" x2="270" y2="222"/>
      <line x1="468" y1="142" x2="412" y2="178"/>
      <line x1="468" y1="258" x2="412" y2="222"/>
    </g>

    <!-- WAN link, cut -->
    <g transform="translate(820 200)">
      <rect x="-72" y="-40" width="144" height="80" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <text x="0" y="-8" font-size="13" fill="#c14a3a">cloud / WAN</text>
      <text x="0" y="12" font-size="10.5" fill="#5b616b">push notifs only</text>
      <text x="0" y="30" font-size="10.5" fill="#c14a3a">down 4× this year</text>
    </g>
    <!-- cut link with scissors break -->
    <g>
      <line x1="412" y1="200" x2="690" y2="200" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="5 6"/>
      <line x1="540" y1="184" x2="562" y2="216" stroke="#c14a3a" stroke-width="3"/>
      <line x1="562" y1="184" x2="540" y2="216" stroke="#c14a3a" stroke-width="3"/>
      <text x="551" y="172" font-size="11" fill="#c14a3a">link cut</text>
    </g>

    <text x="500" y="448" font-size="13" fill="#5b616b">internet drops, the house keeps running — only notifications queue</text>
  </g>
</svg>
