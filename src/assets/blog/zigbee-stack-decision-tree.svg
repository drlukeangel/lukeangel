<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480" role="img" aria-label="Which Zigbee stack to pick">
  <rect width="1000" height="480" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .q { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 12.5px; fill: #1a1d24; }
    .pick { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 15px; fill: #1a1d24; font-weight: 600; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 10.5px; fill: #5b616b; }
    .edge { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #7a808c; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">STARTING FRESH IN 2020 — WHICH STACK?</text>

  <!-- Q1 -->
  <g transform="translate(360,60)">
    <path d="M120 0 l120 44 l-120 44 l-120 -44 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="120" y="40" text-anchor="middle" class="q">already own a ConBee II?</text>
    <text x="120" y="58" text-anchor="middle" class="sub">(or running Zigbee off a non-HA box)</text>
  </g>

  <!-- Q1 yes -> deCONZ -->
  <line x1="360" y1="104" x2="180" y2="180" stroke="#1a1d24" stroke-width="2"/>
  <text x="240" y="150" class="edge">yes</text>
  <g transform="translate(60,180)">
    <rect x="0" y="0" width="240" height="78" rx="10" fill="#6a4c93" fill-opacity="0.08" stroke="#6a4c93" stroke-width="2.4"/>
    <text x="20" y="32" class="pick">deCONZ</text>
    <text x="20" y="54" class="sub">Phoscon UI is genuinely nice;</text>
    <text x="20" y="70" class="sub">WebSocket API callable anywhere</text>
  </g>

  <!-- Q1 no -> Q2 -->
  <line x1="480" y1="104" x2="560" y2="170" stroke="#1a1d24" stroke-width="2"/>
  <text x="520" y="150" class="edge">no</text>
  <g transform="translate(440,170)">
    <path d="M120 0 l120 42 l-120 42 l-120 -42 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="120" y="38" text-anchor="middle" class="q">&lt; 15 devices, all</text>
    <text x="120" y="56" text-anchor="middle" class="q">standard-spec, MQTT scary?</text>
  </g>

  <!-- Q2 yes -> ZHA -->
  <line x1="440" y1="212" x2="300" y2="300" stroke="#1a1d24" stroke-width="2"/>
  <text x="350" y="265" class="edge">yes</text>
  <g transform="translate(120,300)">
    <rect x="0" y="0" width="250" height="78" rx="10" fill="#3a7d44" fill-opacity="0.07" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="20" y="32" class="pick">ZHA</text>
    <text x="20" y="54" class="sub">zero add-ons, lives inside HA,</text>
    <text x="20" y="70" class="sub">updates with HA core</text>
  </g>

  <!-- Q2 no -> Z2M -->
  <line x1="680" y1="212" x2="760" y2="300" stroke="#1a1d24" stroke-width="2"/>
  <text x="730" y="265" class="edge">no</text>
  <g transform="translate(620,300)">
    <rect x="0" y="0" width="300" height="78" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="20" y="32" class="pick">Zigbee2MQTT</text>
    <text x="20" y="54" class="sub">widest device support (1,800+),</text>
    <text x="20" y="70" class="sub">best topology UI, rides your MQTT bus</text>
  </g>

  <text x="500" y="446" text-anchor="middle" class="cap">All three land within ~10% on reliability — the question isn't "which works," it's "which ergonomics fit you."</text>
</svg>
