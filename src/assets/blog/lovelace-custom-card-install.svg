<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="Custom card install path">
  <rect width="880" height="360" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#1a1d24}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
    .mono{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b}
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#6a4c93"/></marker>
  </defs>

  <!-- step 1: download JS -->
  <g transform="translate(110 130)">
    <rect x="-72" y="-46" width="144" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- file glyph -->
    <path d="M-22 -28 h30 l14 14 v36 h-44 z" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/>
    <path d="M8 -28 v14 h14" fill="none" stroke="#6a4c93" stroke-width="2.5"/>
    <!-- download arrow -->
    <path d="M-44 4 v22 M-52 18 l8 10 l8 -10" fill="none" stroke="#3a7d44" stroke-width="2.5" stroke-linecap="round"/>
    <text class="mut" x="-58" y="40">download .js</text>
  </g>

  <!-- step 2: /config/www -->
  <g transform="translate(330 130)">
    <rect x="-72" y="-46" width="144" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- folder glyph -->
    <path d="M-34 -18 h22 l8 10 h28 v34 h-58 z" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.5"/>
    <text class="mono" x="-58" y="40">/config/www/</text>
  </g>

  <!-- step 3: resources block -->
  <g transform="translate(550 130)">
    <rect x="-72" y="-46" width="144" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="-40" y="-26" width="80" height="44" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="-30" y1="-14" x2="30" y2="-14" stroke="#6a4c93" stroke-width="3"/>
    <line x1="-30" y1="-2" x2="20" y2="-2" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="3"/>
    <line x1="-30" y1="10" x2="24" y2="10" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="3"/>
    <text class="mono" x="-50" y="40">resources:</text>
  </g>

  <!-- step 4: custom card in view -->
  <g transform="translate(770 130)">
    <rect x="-72" y="-46" width="144" height="92" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.5"/>
    <!-- mini graph card glyph -->
    <rect x="-44" y="-26" width="88" height="40" rx="5" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2"/>
    <path d="M-36 4 L-18 -10 L-2 -2 L16 -16 L36 -6" fill="none" stroke="#6a4c93" stroke-width="2.5"/>
    <text class="mono" x="-52" y="40">custom:card</text>
  </g>

  <!-- arrows between steps -->
  <g stroke="#6a4c93" stroke-width="2.5" fill="none">
    <path d="M186 130 L252 130" marker-end="url(#a)"/>
    <path d="M406 130 L472 130" marker-end="url(#a)"/>
    <path d="M626 130 L692 130" marker-end="url(#a)"/>
  </g>

  <!-- no-store note under the whole chain -->
  <text class="mut" x="300" y="250">no store, no one-click — each step by hand</text>
</svg>
