<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" role="img" aria-label="zone decides notify or log">
  <rect width="1000" height="400" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" font-weight="700" fill="#1a1d24">THE ZONE DECIDES WHETHER IT MATTERS</text>

  <!-- same detection -->
  <g transform="translate(40,120)">
    <rect x="0" y="0" width="190" height="100" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="95" y="38" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">person detected</text>
    <text x="95" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">same model</text>
    <text x="95" y="78" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">same camera</text>
  </g>

  <!-- zone branch -->
  <g transform="translate(330,90)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="90" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">zone = on_porch</text>
    <text x="90" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">crossed into porch</text>
  </g>
  <g transform="translate(330,200)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#7a808c" fill-opacity="0.12" stroke="#7a808c" stroke-width="2.5"/>
    <text x="90" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">zone = sidewalk</text>
    <text x="90" y="52" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">walked past</text>
  </g>

  <!-- arrows from detect to zones -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="230" y1="160" x2="324" y2="125"/><path d="M324 125 l-11 0 l4 -10 z"/>
    <line x1="230" y1="180" x2="324" y2="235"/><path d="M324 235 l-11 -1 l5 -9 z"/>
  </g>

  <!-- outcomes -->
  <g transform="translate(610,90)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#3a7d44">NOTIFY</text>
    <text x="90" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">push to phone</text>
  </g>
  <g transform="translate(610,200)">
    <rect x="0" y="0" width="180" height="70" rx="8" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5"/>
    <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#5b616b">LOG ONLY</text>
    <text x="90" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">never notifies</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="510" y1="125" x2="604" y2="125"/><path d="M604 125 l-10 -5 l0 10 z"/>
    <line x1="510" y1="235" x2="604" y2="235"/><path d="M604 235 l-10 -5 l0 10 z"/>
  </g>

  <text x="500" y="346" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">detection is a commodity; where it happened is the product.</text>
</svg>
