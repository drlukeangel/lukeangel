<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 440" width="1120" height="440" role="img" aria-label="Publish-mostly topic asymmetry">
  <rect width="1120" height="440" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE PUBLISH-MOSTLY ASYMMETRY</text>

  <!-- cart -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="190" height="150" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="95" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">CART</text>
    <!-- puck/device glyph: display + wheels -->
    <rect x="55" y="50" width="80" height="46" rx="6" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="2"/>
    <circle cx="72" cy="112" r="9" fill="none" stroke="#2a52be" stroke-width="2.4"/>
    <circle cx="118" cy="112" r="9" fill="none" stroke="#2a52be" stroke-width="2.4"/>
    <text x="95" y="140" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12" font-style="italic" fill="#5b616b">a device</text>
  </g>

  <!-- broker -->
  <g transform="translate(720,140)">
    <rect x="0" y="0" width="330" height="170" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="165" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">AWS IoT Core</text>
    <text x="165" y="54" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">MQTT broker · mutual TLS</text>
    <line x1="24" y1="70" x2="306" y2="70" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
    <text x="24" y="98" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">N publish topics →</text>
    <text x="40" y="118" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">scan · health · fault</text>
    <text x="40" y="136" font-family="ui-monospace,monospace" font-size="11" fill="#5b616b">session-start/-end · identify · boot</text>
    <text x="24" y="158" font-family="ui-monospace,monospace" font-size="11.5" fill="#c14a3a">1 command topic ←</text>
  </g>

  <!-- publish arrows (many, up) -->
  <g stroke="#2a52be" stroke-width="3" fill="#2a52be">
    <path d="M255 200 H705" fill="none"/>
    <path d="M705 200 l-16 -7 v14 z"/>
    <path d="M255 180 H705" fill="none" stroke-opacity="0.55"/>
    <path d="M705 180 l-16 -7 v14 z" fill-opacity="0.55"/>
    <path d="M255 220 H705" fill="none" stroke-opacity="0.35"/>
    <path d="M705 220 l-16 -7 v14 z" fill-opacity="0.35"/>
  </g>
  <text x="480" y="172" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#2a52be">publishes (the common case)</text>
  <text x="480" y="238" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">every telemetry message goes up this way</text>

  <!-- one command arrow (down, dashed) -->
  <g stroke="#c14a3a" stroke-width="3" fill="#c14a3a">
    <path d="M705 285 H271" fill="none" stroke-dasharray="8 6"/>
    <path d="M255 285 l16 -7 v14 z"/>
  </g>
  <text x="480" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#c14a3a">subscribes to one per-cart command topic</text>
  <text x="480" y="312" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">OTA · sleep · wake · customer-override only</text>

  <!-- takeaway -->
  <rect x="60" y="358" width="990" height="56" rx="10" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="2"/>
  <text x="555" y="382" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">A device that can only publish can't be commanded into doing something it shouldn't.</text>
  <text x="555" y="402" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">bidirectional is a privilege granted to one topic for one reason — the rest is one-way</text>
</svg>
