<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-label="2018 scorecard">
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#5b616b}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:16px;font-weight:600;fill:#1a1d24}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:12px;fill:#7a808c}
  </style>
  <rect width="800" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <text x="32" y="44" class="ttl">The 2018 calls, marked against what actually shipped</text>

  <!-- legend -->
  <g transform="translate(540,30)">
    <circle cx="8" cy="8" r="7" fill="#3a7d44"/><path d="M4.5,8 L7,10.5 L11.5,5.5" stroke="#fff" stroke-width="1.6" fill="none"/>
    <text x="22" y="12" class="sm">hit</text>
    <circle cx="78" cy="8" r="7" fill="#c87533"/>
    <text x="92" y="12" class="sm">half-hit</text>
  </g>

  <!-- rows -->
  <g transform="translate(32,74)">
    <!-- helper rows: each 40px tall -->
    <!-- 1 -->
    <g transform="translate(0,0)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">Google Home Hub ships Q4</text>
      <text x="430" y="14" class="sm">shipped Oct 2018, to the quarter</text>
    </g>
    <!-- 2 -->
    <g transform="translate(0,38)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">HomePod misses commercially</text>
      <text x="430" y="14" class="sm">~3.5M units, Q4 price cut</text>
    </g>
    <!-- 3 -->
    <g transform="translate(0,76)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">Mesh wifi goes table-stakes</text>
      <text x="430" y="14" class="sm">4+ SKUs per retailer by BF</text>
    </g>
    <!-- 4 -->
    <g transform="translate(0,114)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">Ring + Nest Hello win doorbells</text>
      <text x="430" y="14" class="sm">~70%+ combined share</text>
    </g>
    <!-- 5 -->
    <g transform="translate(0,152)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">Apple Watch ECG ships, FDA-cleared</text>
      <text x="430" y="14" class="sm">Series 4, Sep 2018</text>
    </g>
    <!-- 6 -->
    <g transform="translate(0,190)">
      <circle cx="10" cy="10" r="9" fill="#3a7d44"/><path d="M5,10 L8.5,13.5 L15,5.5" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="32" y="14" class="lbl">No AirPods refresh in 2018</text>
      <text x="430" y="14" class="sm">held; refresh slipped to 2019</text>
    </g>
    <!-- 7 -->
    <g transform="translate(0,228)">
      <circle cx="10" cy="10" r="9" fill="#c87533"/>
      <text x="32" y="14" class="lbl">Sonos IPOs in Q3</text>
      <text x="430" y="14" class="sm">Q3 trading, not Q3 filing</text>
    </g>
    <!-- 8 -->
    <g transform="translate(0,266)">
      <circle cx="10" cy="10" r="9" fill="#c87533"/>
      <text x="32" y="14" class="lbl">A front-page IoT-security scandal</text>
      <text x="430" y="14" class="sm">slow burn, not one headline</text>
    </g>
  </g>

  <!-- tally bar -->
  <g transform="translate(32,392)">
    <rect width="736" height="2" y="-14" fill="#1a1d24" fill-opacity="0.1"/>
    <text x="0" y="14" class="lbl" fill="#0066cc">6 clean hits</text>
    <text x="180" y="14" class="lbl" fill="#c87533">2 half-hits</text>
    <text x="360" y="14" class="lbl">net ~88% accuracy, year four</text>
  </g>
  <text x="32" y="448" class="cap">Less drama, more compounding — the platform-and-medical-device thesis held.</text>
</svg>
