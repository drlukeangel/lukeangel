<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="promised vitals vs shipped behavior">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">WHAT 'HEALTH' PROMISES VS WHAT SHIPS</text>

  <!-- TOP tier: the promise (vitals) -->
  <g transform="translate(0,90)">
    <rect x="60" y="0" width="880" height="86" rx="12" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-width="1.5" stroke-dasharray="7 7"/>
    <text x="84" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c14a3a">THE WORD: "HEALTH / VITALS"</text>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#5b616b">
      <text x="84" y="62">heart rate</text>
      <text x="320" y="62">respiratory rate</text>
      <text x="620" y="62">body temperature</text>
    </g>
  </g>

  <!-- THE GAP -->
  <g transform="translate(0,196)">
    <line x1="500" y1="0" x2="500" y2="64" stroke="#1a1d24" stroke-width="2" stroke-dasharray="4 6" stroke-opacity="0.4"/>
    <text x="520" y="38" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#1a1d24">the gap &#8212; still unbuilt in 2021</text>
    <!-- two facing arrows showing the gap -->
    <path d="M360 32 l-40 0" stroke="#7a808c" stroke-width="2"/>
    <path d="M320 32 l12 -6 l0 12 Z" fill="#7a808c"/>
    <path d="M140 32 l40 0" stroke="#7a808c" stroke-width="2"/>
    <path d="M180 32 l-12 -6 l0 12 Z" fill="#7a808c"/>
  </g>

  <!-- BOTTOM tier: what ships (behavior) -->
  <g transform="translate(0,290)">
    <rect x="60" y="0" width="880" height="86" rx="12" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="84" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#3a7d44">WHAT SHIPS: BEHAVIOR &#8594; WELLNESS SCORE</text>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13.5" fill="#5b616b">
      <text x="84" y="62">scratch &#183; lick &#183; eat &#183; drink &#183; sleep &#183; activity, all from one accelerometer</text>
    </g>
  </g>

  <text x="500" y="430" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">The vital-sign collar everyone keeps forecasting hasn't been built yet.</text>
</svg>
