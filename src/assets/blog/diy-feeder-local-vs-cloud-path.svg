<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="Cloud-dependent feeder vs local-only feeder control paths.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHERE THE FEED DECISION LIVES</text>

  <!-- divider -->
  <line x1="540" y1="70" x2="540" y2="430" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- ================= LEFT: Petnet, cloud-dependent ================= -->
  <text x="270" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="14" fill="#1a1d24">PETNET — schedule lives in the cloud</text>

  <!-- phone -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="58" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="8" y="12" width="42" height="60" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2"/>
    <text x="29" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">app</text>
  </g>
  <!-- cloud (the single point of failure) -->
  <g transform="translate(200,120)">
    <path d="M40 70 a30 30 0 0 1 4 -58 a36 36 0 0 1 68 6 a26 26 0 0 1 -2 52 z" fill="#c14a3a" fill-opacity="0.1" stroke="#c14a3a" stroke-width="3"/>
    <text x="76" y="48" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">VENDOR CLOUD</text>
    <text x="76" y="98" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">schedule + brains</text>
  </g>
  <!-- feeder -->
  <g transform="translate(390,150)">
    <rect x="0" y="0" width="92" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M22 22 L70 22 L60 54 L32 54 Z" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="46" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">feeder</text>
  </g>
  <!-- arrows phone->cloud->feeder -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <path d="M120 196 L196 178" fill="none"/><path d="M200 177 l-16 -2 l7 14 z"/>
    <path d="M328 178 L386 196" fill="none"/><path d="M390 197 l-15 -8 l-1 14 z"/>
  </g>
  <!-- the break: cloud down -->
  <g transform="translate(258,128)">
    <line x1="-30" y1="-18" x2="40" y2="40" stroke="#c14a3a" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="270" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#c14a3a">cloud down → feeder bricks</text>
  <text x="270" y="322" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#c14a3a">vendor folds → feeder bricks</text>
  <text x="270" y="396" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a3f4a">Every meal round-trips through a server</text>
  <text x="270" y="416" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a3f4a">you don't own.</text>

  <!-- ================= RIGHT: DIY, local-only ================= -->
  <text x="810" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="14" fill="#1a1d24">DIY — schedule lives in the house</text>

  <!-- house boundary -->
  <rect x="600" y="120" width="420" height="180" rx="12" fill="#c87533" fill-opacity="0.06" stroke="#c87533" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text x="618" y="142" font-family="ui-monospace,monospace" font-size="10.5" fill="#c87533">HOME LAN — no internet needed</text>

  <!-- HA hub -->
  <g transform="translate(626,168)">
    <rect x="0" y="0" width="96" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="22" cy="26" r="7" fill="#3a7d44"/>
    <rect x="38" y="20" width="44" height="6" rx="3" fill="#1a1d24" opacity="0.45"/>
    <rect x="38" y="34" width="44" height="6" rx="3" fill="#1a1d24" opacity="0.45"/>
    <text x="48" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">HA Yellow</text>
  </g>
  <!-- ESP32 -->
  <g transform="translate(774,168)">
    <rect x="0" y="0" width="96" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="16" y="18" width="40" height="26" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
    <text x="48" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">ESP32</text>
  </g>
  <!-- feeder -->
  <g transform="translate(922,168)">
    <rect x="0" y="0" width="80" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M18 22 L62 22 L53 54 L27 54 Z" fill="none" stroke="#c87533" stroke-width="2.5"/>
    <text x="40" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">servo</text>
  </g>
  <!-- arrows hub->esp32->feeder -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <path d="M722 214 L770 214" fill="none"/><path d="M774 214 l-15 -7 v14 z"/>
    <path d="M870 214 L918 214" fill="none"/><path d="M922 214 l-15 -7 v14 z"/>
  </g>
  <text x="810" y="334" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#3a7d44">internet down → still feeds</text>
  <text x="810" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#3a7d44">vendor irrelevant → I own the firmware</text>
  <text x="810" y="408" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a3f4a">~200 ms, closet to bowl, no server.</text>
</svg>
