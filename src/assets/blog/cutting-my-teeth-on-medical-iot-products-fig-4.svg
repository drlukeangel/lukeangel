<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500" width="1040" height="500" role="img" aria-label="The domain model is a graph of foreign keys, which is why Postgres beat DynamoDB for this workload.">
  <rect width="1040" height="500" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="520" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="1" fill="#1a1d24">WHY POSTGRES, NOT DYNAMODB &#8212; THE MODEL IS RELATIONAL TO THE BONE</text>

  <!-- ===== entity graph (left) ===== -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- Account -->
    <g transform="translate(70,110)">
      <rect x="0" y="0" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
      <text x="75" y="34" text-anchor="middle" font-size="14" fill="#357a8c">Account</text>
    </g>
    <!-- Device -->
    <g transform="translate(70,230)">
      <rect x="0" y="0" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
      <text x="75" y="34" text-anchor="middle" font-size="14" fill="#357a8c">Device</text>
    </g>
    <!-- Consumable -->
    <g transform="translate(70,350)">
      <rect x="0" y="0" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
      <text x="75" y="34" text-anchor="middle" font-size="14" fill="#357a8c">Consumable</text>
    </g>
    <!-- Session -->
    <g transform="translate(420,170)">
      <rect x="0" y="0" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="75" y="34" text-anchor="middle" font-size="14" fill="#c14a3a">Session</text>
    </g>
    <!-- Event -->
    <g transform="translate(420,300)">
      <rect x="0" y="0" width="150" height="56" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
      <text x="75" y="34" text-anchor="middle" font-size="14" fill="#c14a3a">Event</text>
    </g>

    <!-- FK edges: Account owns Device owns Consumable -->
    <g stroke="#357a8c" stroke-width="2.4" fill="none">
      <path d="M145 166 V230"/>
      <path d="M145 286 V350"/>
    </g>
    <g font-size="10.5" fill="#5b616b" text-anchor="middle">
      <text x="170" y="202">owns</text>
      <text x="170" y="322">owns</text>
    </g>
    <!-- Session joins back to all three -->
    <g stroke="#c14a3a" stroke-width="2.2" fill="none" stroke-dasharray="2 5">
      <path d="M420 188 C 320 150, 250 140, 220 138"/>
      <path d="M420 200 C 320 230, 260 250, 220 258"/>
      <path d="M420 214 C 320 320, 260 366, 220 378"/>
    </g>
    <text x="340" y="118" text-anchor="middle" font-size="10.5" fill="#c14a3a">Session joins all three</text>
    <!-- Event under Session -->
    <path d="M495 226 V300" stroke="#c14a3a" stroke-width="2.4" fill="none"/>
    <text x="520" y="268" font-size="10.5" fill="#5b616b">appends to</text>
  </g>

  <!-- ===== verdict (right) ===== -->
  <g transform="translate(640,110)">
    <!-- DynamoDB rejected -->
    <rect x="0" y="0" width="330" height="120" rx="12" fill="#c14a3a" fill-opacity="0.05" stroke="#c14a3a" stroke-width="2.4" stroke-dasharray="7 5"/>
    <g transform="translate(34,40)"><path d="M-9 -9 L9 9 M9 -9 L-9 9" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/></g>
    <text x="64" y="38" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#c14a3a">single-table DynamoDB</text>
    <text x="34" y="70" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#5b616b">would fight the data's actual shape</text>
    <text x="34" y="92" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#5b616b">a graph of FKs, not a bag of items</text>

    <!-- Postgres chosen -->
    <rect x="0" y="150" width="330" height="120" rx="12" fill="#3a7d44" fill-opacity="0.06" stroke="#3a7d44" stroke-width="2.6"/>
    <g transform="translate(34,190)"><path d="M-10 0 l7 8 13 -17" fill="none" stroke="#3a7d44" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <text x="64" y="188" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#3a7d44">Postgres on RDS</text>
    <text x="34" y="220" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#5b616b">team depth real &#183; workload fits one instance</text>
    <text x="34" y="242" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#5b616b">a telemetry firehose would pick differently</text>
  </g>

  <!-- caption -->
  <text x="520" y="468" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">we picked for the workload we had, not the one the conference talks were about</text>
</svg>
