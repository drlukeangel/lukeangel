<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" width="940" height="470" role="img" aria-label="Three smart-speaker strategies in 2017.">
  <rect width="940" height="470" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <rect x="0" y="0" width="8" height="470" rx="4" fill="#0066cc"/>

  <text x="44" y="50" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="20" fill="#1a1d24" font-weight="600">WHO SOLD WHAT IN 2017</text>

  <!-- ===== column 1: Amazon — volume ===== -->
  <g transform="translate(60,90)">
    <rect x="0" y="0" width="260" height="330" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.18"/>
    <!-- a stack of speakers = volume -->
    <g transform="translate(130,80)">
      <ellipse cx="0" cy="120" rx="64" ry="14" fill="#0066cc" opacity="0.10"/>
      <rect x="-46" y="-20" width="92" height="130" rx="22" fill="#0066cc" opacity="0.85" stroke="#1a1d24" stroke-width="4"/>
      <rect x="-30" y="-44" width="60" height="40" rx="14" fill="#0066cc" opacity="0.6" stroke="#1a1d24" stroke-width="4"/>
      <rect x="-18" y="-62" width="36" height="24" rx="9" fill="#0066cc" opacity="0.4" stroke="#1a1d24" stroke-width="4"/>
    </g>
    <text x="130" y="252" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="18" fill="#1a1d24" font-weight="600">AMAZON</text>
    <text x="130" y="282" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">sold the volume —</text>
    <text x="130" y="306" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">if you bought one,</text>
    <text x="130" y="326" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">it was an Echo</text>
  </g>

  <!-- ===== column 2: Google — distribution at $29 ===== -->
  <g transform="translate(340,90)">
    <rect x="0" y="0" width="260" height="330" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.18"/>
    <!-- the $29 puck radiating into many homes -->
    <g transform="translate(130,96)">
      <!-- many tiny home roofs -->
      <g fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.5" stroke-linejoin="round">
        <path d="M-92 86 l14 -14 l14 14"/>
        <path d="M-30 96 l14 -14 l14 14"/>
        <path d="M32 96 l14 -14 l14 14"/>
        <path d="M86 84 l14 -14 l14 14"/>
      </g>
      <!-- the small mini puck -->
      <ellipse cx="0" cy="2" rx="50" ry="22" fill="#0066cc" opacity="0.85" stroke="#1a1d24" stroke-width="4"/>
      <ellipse cx="0" cy="-4" rx="50" ry="22" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
      <!-- distribution arrows fanning out -->
      <g stroke="#0066cc" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8">
        <path d="M-34 8 L-78 56"/><path d="M-12 16 L-24 60"/>
        <path d="M12 16 L24 60"/><path d="M34 8 L78 56"/>
      </g>
    </g>
    <text x="130" y="252" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="18" fill="#1a1d24" font-weight="600">GOOGLE</text>
    <text x="130" y="282" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">sold distribution —</text>
    <text x="130" y="306" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">a $29 Mini into</text>
    <text x="130" y="326" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">millions of homes</text>
  </g>

  <!-- ===== column 3: Apple — the idea ===== -->
  <g transform="translate(620,90)">
    <rect x="0" y="0" width="260" height="330" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.18"/>
    <!-- a dotted, not-yet-real speaker = the idea -->
    <g transform="translate(130,82)">
      <rect x="-44" y="-22" width="88" height="124" rx="40" fill="none" stroke="#0066cc" stroke-width="4" stroke-dasharray="6 8" opacity="0.9"/>
      <ellipse cx="0" cy="-22" rx="44" ry="14" fill="none" stroke="#0066cc" stroke-width="4" stroke-dasharray="6 8" opacity="0.9"/>
      <!-- a thought-bubble tail of dots -->
      <circle cx="62" cy="86" r="6" fill="none" stroke="#0066cc" stroke-width="3" opacity="0.7"/>
      <circle cx="78" cy="100" r="4" fill="none" stroke="#0066cc" stroke-width="3" opacity="0.6"/>
    </g>
    <text x="130" y="252" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="18" fill="#1a1d24" font-weight="600">APPLE</text>
    <text x="130" y="282" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">sold the idea —</text>
    <text x="130" y="306" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">a HomePod that</text>
    <text x="130" y="326" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="17" fill="#5b616b">hadn't shipped yet</text>
  </g>
</svg>
