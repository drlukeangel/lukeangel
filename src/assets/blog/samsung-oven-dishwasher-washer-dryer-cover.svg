<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Kitchen and laundry appliances on one system">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- four appliances around a central link -->
  <!-- oven (top-left) -->
  <g transform="translate(230,140)">
    <rect x="0" y="0" width="190" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="22" y="60" width="146" height="70" rx="6" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3"/>
    <!-- knobs -->
    <circle cx="40" cy="32" r="9" fill="#6a4c93" fill-opacity="0.4"/><circle cx="70" cy="32" r="9" fill="#6a4c93" fill-opacity="0.4"/><circle cx="100" cy="32" r="9" fill="#6a4c93" fill-opacity="0.4"/>
    <!-- handle -->
    <rect x="40" y="74" width="110" height="8" rx="4" fill="#1a1d24"/>
  </g>

  <!-- dishwasher (top-right) -->
  <g transform="translate(770,140)">
    <rect x="0" y="0" width="190" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="20" y="22" width="150" height="14" rx="4" fill="#6a4c93" fill-opacity="0.4"/>
    <rect x="22" y="50" width="146" height="84" rx="6" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- washer (bottom-left) -->
  <g transform="translate(230,360)">
    <rect x="0" y="0" width="190" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="95" cy="85" r="48" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="95" cy="85" r="22" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.5"/>
    <rect x="20" y="20" width="150" height="12" rx="4" fill="#6a4c93" fill-opacity="0.4"/>
  </g>

  <!-- dryer (bottom-right) -->
  <g transform="translate(770,360)">
    <rect x="0" y="0" width="190" height="150" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="95" cy="85" r="48" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="95" cy="85" r="22" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.5"/>
    <rect x="20" y="20" width="150" height="12" rx="4" fill="#6a4c93" fill-opacity="0.4"/>
  </g>

  <!-- central hub node -->
  <g transform="translate(595,315)">
    <circle cx="0" cy="0" r="42" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="4"/>
    <circle cx="0" cy="0" r="13" fill="#6a4c93"/>
  </g>

  <!-- links appliance -> hub -->
  <g stroke="#6a4c93" stroke-width="3.5" opacity="0.75">
    <line x1="420" y1="215" x2="558" y2="295"/>
    <line x1="770" y1="215" x2="632" y2="295"/>
    <line x1="420" y1="435" x2="558" y2="335"/>
    <line x1="770" y1="435" x2="632" y2="335"/>
  </g>
</svg>
