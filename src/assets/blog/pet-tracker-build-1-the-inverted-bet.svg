<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 540" width="1120" height="540" role="img" aria-label="The inverted bet, four requirements">
  <rect width="1120" height="540" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE INVERTED BET</text>

  <!-- column headers -->
  <text x="300" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">what everyone ships</text>
  <text x="820" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1f7a6b">what I actually want</text>
  <line x1="560" y1="108" x2="560" y2="500" stroke="#7a808c" stroke-width="1.5" stroke-dasharray="3 10" opacity="0.7"/>

  <g font-family="ui-monospace,monospace" font-size="13.5">
    <!-- row 1: cost / subscription -->
    <g transform="translate(0,150)">
      <circle cx="80" cy="0" r="22" fill="none" stroke="#1f7a6b" stroke-width="3"/>
      <text x="80" y="6" text-anchor="middle" font-size="18" fill="#1f7a6b" font-family="serif">$</text>
      <text x="124" y="-6" fill="#c14a3a">monthly cellular plan, per pet</text>
      <text x="600" y="-6" fill="#1a1d24">cheap, little or no subscription</text>
    </g>
    <!-- row 2: battery -->
    <g transform="translate(0,240)">
      <rect x="62" y="-16" width="34" height="32" rx="4" fill="none" stroke="#1f7a6b" stroke-width="3"/>
      <rect x="96" y="-7" width="5" height="14" rx="2" fill="#1f7a6b"/>
      <rect x="68" y="-10" width="14" height="20" rx="2" fill="#1f7a6b"/>
      <text x="124" y="6" fill="#c14a3a">dies every few days · charging chore</text>
      <text x="600" y="6" fill="#1a1d24">months of battery, not days</text>
    </g>
    <!-- row 3: location-first / health-later -->
    <g transform="translate(0,330)">
      <path d="M80 -22 C 60 -22 56 0 80 18 C 104 0 100 -22 80 -22 Z" fill="none" stroke="#1f7a6b" stroke-width="3"/>
      <circle cx="80" cy="-8" r="7" fill="#1f7a6b"/>
      <text x="124" y="6" fill="#c14a3a">health-first on a coin-cell radio</text>
      <text x="600" y="6" fill="#1a1d24">location first, health later</text>
    </g>
    <!-- row 4: matched to how pets live -->
    <g transform="translate(0,420)">
      <path d="M62 8 L62 -10 L80 -24 L98 -10 L98 8 Z" fill="none" stroke="#1f7a6b" stroke-width="3"/>
      <rect x="74" y="-6" width="12" height="14" fill="#1f7a6b"/>
      <text x="124" y="6" fill="#c14a3a">pays for range it never uses</text>
      <text x="600" y="6" fill="#1a1d24">matched to how pets actually live</text>
    </g>
  </g>

  <!-- home-most-of-the-time footnote band -->
  <text x="600" y="495" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">home most of the time · occasionally on a trail · rarely truly lost</text>
</svg>
