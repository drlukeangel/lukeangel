<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two pet-tracker topologies side by side: a cellular collar puck reaching a tower and cloud, and a BLE collar puck hopping through a home base station to the cloud.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="tw-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#tw-dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- faint vertical divider between the two philosophies -->
  <line x1="600" y1="92" x2="600" y2="540" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.18"/>

  <!-- ============ LEFT: cellular (puck -> tower -> cloud) ============ -->
  <!-- cloud, upper -->
  <g transform="translate(150,120)">
    <path d="M40 70 a40 40 0 0 1 6 -79 a52 52 0 0 1 98 -8 a44 44 0 0 1 34 87 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- cell tower (right-center of the left half) -->
  <g transform="translate(430,210)" stroke="#1a1d24" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- mast -->
    <path d="M-26 250 L-6 40 M26 250 L6 40"/>
    <!-- cross braces -->
    <path d="M-21 195 L21 195 M-17 140 L17 140 M-13 90 L13 90"/>
    <!-- top emitter -->
    <path d="M0 40 L0 14"/>
    <circle cx="0" cy="8" r="6" fill="#c87533" stroke="none"/>
    <!-- tower broadcast arcs (accent) -->
    <g stroke="#c87533" stroke-width="5" opacity="0.9">
      <path d="M16 -6 a30 30 0 0 1 0 36"/>
      <path d="M30 -18 a52 52 0 0 1 0 60"/>
    </g>
    <g stroke="#c87533" stroke-width="5" opacity="0.9">
      <path d="M-16 -6 a30 30 0 0 0 0 36"/>
      <path d="M-30 -18 a52 52 0 0 0 0 60"/>
    </g>
  </g>

  <!-- big cellular signal arcs from puck up to the tower -->
  <g transform="translate(245,470)" fill="none" stroke="#c87533" stroke-linecap="round">
    <path d="M44 -22 A 96 96 0 0 1 118 60" stroke-width="6" opacity="0.95"/>
    <path d="M74 -52 A 150 150 0 0 1 170 86" stroke-width="6" opacity="0.6"/>
    <path d="M104 -82 A 210 210 0 0 1 234 116" stroke-width="6" opacity="0.32"/>
  </g>

  <!-- collar puck, left (cellular) -->
  <g transform="translate(210,470)">
    <!-- collar strap arc behind -->
    <path d="M-120 26 a150 60 0 0 1 240 0" fill="none" stroke="#1a1d24" stroke-width="7" opacity="0.55"/>
    <!-- puck body (accent-filled, the cellular device) -->
    <rect x="-58" y="-30" width="116" height="76" rx="16" fill="#c87533" stroke="#1a1d24" stroke-width="6"/>
    <!-- little antenna nub -->
    <path d="M0 -30 L0 -52" stroke="#1a1d24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="-56" r="5" fill="#1a1d24"/>
    <!-- LED -->
    <circle cx="0" cy="8" r="11" fill="#fdfaf2"/>
    <circle cx="0" cy="8" r="5" fill="#c87533"/>
  </g>

  <!-- ============ RIGHT: BLE + WiFi (puck reaches phone AND cloud directly, no hub) ============ -->
  <!-- cloud, upper right -->
  <g transform="translate(958,108)">
    <path d="M40 70 a40 40 0 0 1 6 -79 a52 52 0 0 1 98 -8 a44 44 0 0 1 34 87 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- phone: receives BLE from the puck, relays up to the cloud -->
  <g transform="translate(852,232)">
    <!-- body -->
    <rect x="0" y="0" width="104" height="158" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <!-- screen -->
    <rect x="13" y="24" width="78" height="108" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>
    <!-- earpiece dot -->
    <circle cx="52" cy="12" r="3.5" fill="#1a1d24" opacity="0.4"/>
    <!-- home button -->
    <circle cx="52" cy="146" r="6" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="3"/>
    <!-- little activity bar-chart on screen (accent) -->
    <g fill="#c87533">
      <rect x="26" y="98" width="12" height="22" rx="2"/>
      <rect x="44" y="82" width="12" height="38" rx="2"/>
      <rect x="62" y="64" width="12" height="56" rx="2"/>
    </g>
  </g>

  <!-- relay arcs from the phone up toward the cloud (WiFi/cell, faint) -->
  <g transform="translate(930,214)" fill="none" stroke="#c87533" stroke-linecap="round">
    <path d="M-12 0 a20 20 0 0 1 28 -10" stroke-width="5" opacity="0.85"/>
    <path d="M-22 10 a36 36 0 0 1 50 -18" stroke-width="5" opacity="0.5"/>
    <circle cx="-16" cy="6" r="4.5" fill="#c87533" stroke="none"/>
  </g>

  <!-- BLE fan from the puck up to the phone (no hub between them) -->
  <g transform="translate(740,448)" fill="none" stroke="#c87533" stroke-linecap="round">
    <path d="M20 -18 a44 44 0 0 1 36 -38" stroke-width="6" opacity="0.95"/>
    <path d="M40 -38 a74 74 0 0 1 60 -62" stroke-width="6" opacity="0.55"/>
    <path d="M60 -58 a104 104 0 0 1 84 -84" stroke-width="6" opacity="0.3"/>
  </g>

  <!-- collar puck, right (BLE + WiFi, no base station) -->
  <g transform="translate(685,478)">
    <!-- collar strap arc behind -->
    <path d="M-118 24 a148 58 0 0 1 236 0" fill="none" stroke="#1a1d24" stroke-width="7" opacity="0.55"/>
    <!-- puck body (outline only, the small/cool low-power device) -->
    <circle cx="0" cy="6" r="44" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <!-- inner ring detail -->
    <circle cx="0" cy="6" r="26" fill="none" stroke="#c87533" stroke-width="5"/>
    <circle cx="0" cy="6" r="6" fill="#c87533"/>
  </g>
</svg>
