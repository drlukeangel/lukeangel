<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" width="1120" height="480" role="img" aria-label="Direct provider integration versus Bedrock.">
  <rect width="1120" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE LLM LAYER — DIRECT vs. BEDROCK</text>

  <!-- divider -->
  <line x1="560" y1="74" x2="560" y2="446" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="2"/>

  <!-- LEFT: direct to provider -->
  <text x="60" y="98" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">Direct to the provider</text>
  <text x="60" y="120" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">a brand-new vendor relationship</text>

  <!-- a chain of gates the team must pass -->
  <g font-family="ui-monospace,monospace">
    <rect x="60" y="138" width="200" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="160" y="163" text-anchor="middle" font-size="12" fill="#1a1d24">new contract</text>
    <rect x="60" y="190" width="200" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="160" y="215" text-anchor="middle" font-size="12" fill="#1a1d24">procurement review</text>
    <rect x="60" y="242" width="200" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="160" y="267" text-anchor="middle" font-size="12" fill="#1a1d24">security questionnaire</text>
    <rect x="60" y="294" width="200" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="160" y="319" text-anchor="middle" font-size="12" fill="#1a1d24">new data-flow approval</text>
  </g>
  <!-- arrows down the chain -->
  <g stroke="#c14a3a" stroke-width="2.4" fill="none" opacity="0.7">
    <path d="M160 178 V 190"/><path d="M160 230 V 242"/><path d="M160 282 V 294"/>
  </g>
  <!-- the model, reached only at the end -->
  <g stroke="#1a1d24" stroke-width="2.4" fill="none" opacity="0.7"><path d="M160 334 V 360"/></g>
  <g fill="#1a1d24" opacity="0.7"><path d="M160 360 l-6 -13 h12 z"/></g>
  <rect x="290" y="232" width="210" height="52" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="395" y="263" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">the model</text>
  <text x="160" y="392" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">~6-week vendor onboarding</text>
  <text x="160" y="414" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">swap a model later: a quarter of work</text>

  <!-- RIGHT: via Bedrock -->
  <text x="608" y="98" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">Via Bedrock</text>
  <text x="608" y="120" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">the AWS relationship you already have</text>

  <!-- single existing gate -->
  <rect x="608" y="190" width="220" height="92" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
  <text x="718" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">existing AWS</text>
  <text x="718" y="244" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">agreement + IAM</text>
  <!-- green check -->
  <path d="M648 262 l9 9 18 -20" fill="none" stroke="#3a7d44" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g stroke="#1a1d24" stroke-width="2.6" fill="none"><path d="M828 236 H 868"/></g>
  <g fill="#1a1d24"><path d="M868 236 l-15 -6 v12 z"/></g>
  <rect x="872" y="210" width="190" height="52" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="967" y="241" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#4f46b8">many models</text>

  <text x="835" y="330" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">net-new vendor onboarding: zero</text>
  <text x="835" y="352" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">swap a model later: a model-ID change</text>

  <text x="560" y="438" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Same code reaches the model; the difference is everything in front of it.</text>
</svg>
