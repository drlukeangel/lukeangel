<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="The order, reordered around a proof-of-concept.">
  <rect width="1000" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE CHIP FAMILY, THREE BUYS</text>

  <!-- shared firmware band across the top of the first two boxes -->
  <g transform="translate(60,86)">
    <rect x="0" y="0" width="560" height="40" rx="9" fill="#1f7a6b" opacity="0.12"/>
    <rect x="0" y="0" width="560" height="40" rx="9" fill="none" stroke="#1f7a6b" stroke-width="2.5"/>
    <text x="280" y="26" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#1f7a6b">one firmware codebase (nRF52840 + SX1262)</text>
  </g>

  <!-- BUY 1: PoC / base station -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="270" height="180" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#7a808c">BUY 1 — arrives tomorrow</text>
    <text x="16" y="58" font-family="ui-monospace, monospace" font-size="17" fill="#1a1d24">Wio Tracker L1 (2-pack)</text>
    <!-- chip glyph -->
    <g transform="translate(16,76)">
      <rect x="0" y="0" width="54" height="54" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <g stroke="#1a1d24" stroke-width="3" stroke-linecap="round">
        <line x1="-10" y1="16" x2="0" y2="16"/><line x1="-10" y1="38" x2="0" y2="38"/>
        <line x1="54" y1="16" x2="64" y2="16"/><line x1="54" y1="38" x2="64" y2="38"/>
      </g>
      <circle cx="27" cy="27" r="9" fill="#1f7a6b"/>
    </g>
    <text x="86" y="100" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">pre-flashed</text>
    <text x="86" y="120" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">Meshtastic</text>
    <text x="16" y="160" font-family="ui-monospace, monospace" font-size="13" fill="#3a7d44">no firmware, no soldering</text>
  </g>

  <!-- arrow 1->2 -->
  <g transform="translate(338,240)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#1a1d24" stroke-width="3.5"/>
    <path d="M32 0 l-14 -7 v14 z" fill="#1a1d24"/>
  </g>

  <!-- BUY 2: collar kit -->
  <g transform="translate(388,150)">
    <rect x="0" y="0" width="232" height="180" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#7a808c">BUY 2 — once range proves</text>
    <text x="16" y="58" font-family="ui-monospace, monospace" font-size="17" fill="#1a1d24">RAK4631 collar</text>
    <g transform="translate(16,76)">
      <rect x="0" y="0" width="54" height="54" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <g stroke="#1a1d24" stroke-width="3" stroke-linecap="round">
        <line x1="-10" y1="16" x2="0" y2="16"/><line x1="-10" y1="38" x2="0" y2="38"/>
        <line x1="54" y1="16" x2="64" y2="16"/><line x1="54" y1="38" x2="64" y2="38"/>
      </g>
      <circle cx="27" cy="27" r="9" fill="#1f7a6b"/>
    </g>
    <text x="86" y="100" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">+ GNSS, accel,</text>
    <text x="86" y="120" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">temp/humidity</text>
    <text x="16" y="160" font-family="ui-monospace, monospace" font-size="13" fill="#3a3f4a">firmware carries straight over</text>
  </g>

  <!-- BUY 3: cellular, separate path -->
  <g transform="translate(680,150)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#7a808c">BUY 3 — phase 2, ordered</text>
    <text x="16" y="58" font-family="ui-monospace, monospace" font-size="17" fill="#1a1d24">Thingy:91 + DK</text>
    <!-- different chip glyph (nRF9160) -->
    <g transform="translate(16,76)">
      <rect x="0" y="0" width="54" height="54" rx="8" fill="#fdfaf2" stroke="#7a808c" stroke-width="3"/>
      <g stroke="#7a808c" stroke-width="3" stroke-linecap="round">
        <line x1="-10" y1="16" x2="0" y2="16"/><line x1="-10" y1="38" x2="0" y2="38"/>
        <line x1="54" y1="16" x2="64" y2="16"/><line x1="54" y1="38" x2="64" y2="38"/>
      </g>
      <text x="27" y="33" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7a808c">LTE</text>
    </g>
    <text x="88" y="100" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">nRF9160 —</text>
    <text x="88" y="120" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#3a3f4a">"anywhere" path</text>
    <text x="16" y="160" font-family="ui-monospace, monospace" font-size="13" fill="#7a808c">DK doubles as debugger</text>
  </g>

  <text x="500" y="406" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="17" font-style="italic" fill="#3a3f4a">The first dollar buys a proof-of-concept, not a product — and the firmware it proves carries to the collar.</text>
  <text x="500" y="440" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#7a808c">the reserved SWD pads let the DK I already own debug all of it</text>
</svg>
