<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480" role="img" aria-label="Wellness score versus ground truth">
  <rect width="1000" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;font-weight:700;}
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11.5px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:10.5px;fill:#5b616b;}
    .kick{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:14.5px;fill:#5b616b;}
    .axis{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:10px;fill:#7a808c;}
  </style>

  <text x="40" y="42" class="kick">ATOM'S "WELLNESS SCORE" VS GROUND TRUTH · 8 MONTHS</text>
  <text x="40" y="64" class="sm">daily score avg 73 ± 12, range 51–94 — checked against the vet and against my own eyes</text>

  <!-- y axis: score 50..95 -->
  <line x1="120" y1="100" x2="120" y2="320" stroke="#1a1d24" stroke-width="2"/>
  <line x1="120" y1="320" x2="720" y2="320" stroke="#1a1d24" stroke-width="2"/>
  <text x="86" y="108" class="axis">95</text>
  <text x="86" y="216" class="axis">73</text>
  <text x="86" y="324" class="axis">50</text>
  <text x="125" y="338" class="axis">score (1–100) — noisy, not predictive</text>

  <!-- average band 61..85 -->
  <rect x="120" y="160" width="600" height="100" fill="#7a808c" fill-opacity="0.10"/>
  <line x1="120" y1="210" x2="720" y2="210" stroke="#5b616b" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="600" y="204" class="sm">avg 73</text>

  <!-- scattered daily dots (muted) -->
  <g fill="#5b616b">
    <circle cx="160" cy="190" r="4"/><circle cx="185" cy="155" r="4"/><circle cx="210" cy="230" r="4"/>
    <circle cx="245" cy="175" r="4"/><circle cx="280" cy="118" r="4"/><circle cx="315" cy="245" r="4"/>
    <circle cx="350" cy="165" r="4"/><circle cx="390" cy="205" r="4"/><circle cx="430" cy="140" r="4"/>
    <circle cx="470" cy="225" r="4"/><circle cx="520" cy="180" r="4"/><circle cx="560" cy="200" r="4"/>
    <circle cx="610" cy="150" r="4"/><circle cx="650" cy="235" r="4"/><circle cx="690" cy="195" r="4"/>
  </g>

  <!-- the lowest score (51) — but Atom was fine -->
  <circle cx="345" cy="305" r="6" fill="#c14a3a"/>
  <text x="358" y="310" class="sm" fill="#c14a3a">51 — lowest score, Atom was fine</text>

  <!-- two real off-days, only vaguely flagged -->
  <circle cx="245" cy="280" r="6" fill="#c87533"/>
  <circle cx="560" cy="272" r="6" fill="#c87533"/>
  <text x="262" y="285" class="sm" fill="#c87533">58</text>
  <text x="577" y="277" class="sm" fill="#c87533">62</text>
  <text x="430" y="384" text-anchor="middle" class="sm" fill="#c87533">orange = my 2 real "off" days — scores only vaguely lower</text>

  <!-- right: ground truth column -->
  <g transform="translate(750,108)">
    <rect x="0" y="0" width="210" height="212" rx="10" fill="#3a7d44" fill-opacity="0.06" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="16" y="28" class="hd" fill="#3a7d44">GROUND TRUTH</text>
    <text x="16" y="56" class="sm">✓ 3 vet visits:</text>
    <text x="16" y="74" class="sm">  "healthy senior dog"</text>
    <text x="16" y="104" class="sm">orange = my 2 "off" days</text>
    <text x="16" y="122" class="sm">  → scores only vaguely low</text>
    <text x="16" y="152" class="sm" fill="#c14a3a">red = the lowest score</text>
    <text x="16" y="170" class="sm" fill="#c14a3a">  → a perfectly fine day</text>
    <text x="16" y="198" class="sm">verdict: vanity metric</text>
  </g>

  <line x1="40" y1="404" x2="960" y2="404" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="500" y="438" text-anchor="middle" class="cap">The underlying data is real. The single-number score compresses it into something worse than the data it came from.</text>
</svg>
