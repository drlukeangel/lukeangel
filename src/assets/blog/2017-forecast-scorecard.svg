<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" role="img" aria-label="2016 forecast scored about 70 percent">
  <rect width="1000" height="430" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 14px; fill: #7a808c; letter-spacing: 2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .big { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 22px; fill: #1a1d24; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <text x="40" y="42" class="h">GRADING THE 2016 FORECAST</text>

  <g>
    <!-- hit: move automations off ST cloud -->
    <g transform="translate(60,76)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/>
      <path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" class="lbl">core automations come off the SmartThings cloud</text>
    </g>
    <!-- partial: HomeKit usable -->
    <g transform="translate(60,124)">
      <circle cx="15" cy="15" r="13" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.4"/>
      <path d="M15 4 a11 11 0 0 1 0 22 z" fill="#6a4c93"/>
      <text x="40" y="20" class="lbl">HomeKit gets enough devices to be usable (partial)</text>
    </g>
    <!-- hit: second voice assistant -->
    <g transform="translate(60,172)">
      <circle cx="15" cy="15" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/>
      <path d="M9 15 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" class="lbl">a second voice assistant in the house</text>
    </g>
    <!-- miss: zigbee+zwave off the hub -->
    <g transform="translate(60,220)">
      <circle cx="15" cy="15" r="13" fill="#c14a3a" fill-opacity="0.1" stroke="#c14a3a" stroke-width="2.4"/>
      <path d="M9 9 l12 12 M21 9 l-12 12" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
      <text x="40" y="20" class="lbl">Zigbee + Z-Wave both off the starter hub</text>
    </g>
    <!-- partial: cross-vendor automation survives outage -->
    <g transform="translate(60,268)">
      <circle cx="15" cy="15" r="13" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.4"/>
      <path d="M15 4 a11 11 0 0 1 0 22 z" fill="#6a4c93"/>
      <text x="40" y="20" class="lbl">an automation that survives a vendor outage (partial)</text>
    </g>
  </g>

  <!-- tally + the big one -->
  <g transform="translate(620,90)">
    <rect x="0" y="0" width="330" height="120" rx="12" fill="#3a7d44" fill-opacity="0.06" stroke="#3a7d44" stroke-width="2.4" stroke-dasharray="7 5"/>
    <text x="24" y="40" class="lbl" fill="#1a1d24">The big one landed:</text>
    <text x="24" y="66" class="lbl" fill="#3a7d44">the automation brain is a box</text>
    <text x="24" y="88" class="lbl" fill="#3a7d44">in my closet, not someone's</text>
    <text x="24" y="110" class="lbl" fill="#3a7d44">data center.</text>
  </g>
  <text x="785" y="280" text-anchor="middle" class="big">3 / 5 + 2 half</text>
  <text x="785" y="312" text-anchor="middle" class="lbl" fill="#6a4c93">≈ 70%</text>

  <text x="500" y="402" text-anchor="middle" class="cap">The protocol-off-the-hub bet missed; the local-first bet — the one that mattered — came in.</text>
</svg>
