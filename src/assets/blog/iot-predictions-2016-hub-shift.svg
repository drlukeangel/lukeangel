<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-label="hub shift">
  <rect width="760" height="360" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="19" fill="#1a1d24" font-weight="600">The hub moves from your hand to the room</text>

    <!-- LEFT: 2015 phone/hub model -->
    <text x="120" y="90" font-size="13" fill="#7a808c" text-anchor="middle">2015 — tap an app</text>
    <!-- phone -->
    <rect x="92" y="110" width="56" height="96" rx="10" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4"/>
    <rect x="100" y="120" width="40" height="64" rx="3" fill="#0066cc" fill-opacity="0.15"/>
    <circle cx="120" cy="196" r="4" fill="#7a808c"/>
    <!-- separate hub box -->
    <rect x="78" y="232" width="84" height="40" rx="6" fill="#fff" stroke="#1a1d24" stroke-opacity="0.4"/>
    <text x="120" y="257" font-size="11" fill="#5b616b" text-anchor="middle">stand-alone hub</text>
    <line x1="120" y1="206" x2="120" y2="232" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- devices -->
    <g stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="162" y1="252" x2="225" y2="160"/>
      <line x1="162" y1="252" x2="225" y2="210"/>
      <line x1="162" y1="252" x2="225" y2="260"/>
    </g>
    <g fill="#7a808c" font-size="10">
      <circle cx="235" cy="160" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="250" y="164">bulb</text>
      <circle cx="235" cy="210" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="250" y="214">lock</text>
      <circle cx="235" cy="260" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="250" y="264">thermostat</text>
    </g>

    <!-- arrow -->
    <g transform="translate(360,180)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#0066cc" stroke-width="3"/>
      <path d="M50 -7 l14 7 l-14 7 z" fill="#0066cc"/>
    </g>

    <!-- RIGHT: 2016 voice/ambient model -->
    <text x="560" y="90" font-size="13" fill="#7a808c" text-anchor="middle">2016 — say it out loud</text>
    <!-- voice puck -->
    <rect x="528" y="120" width="64" height="120" rx="32" fill="#0066cc"/>
    <circle cx="560" cy="150" r="14" fill="#fdfaf2" fill-opacity="0.85"/>
    <g stroke="#fdfaf2" stroke-opacity="0.8" stroke-width="2">
      <line x1="544" y1="200" x2="544" y2="216"/>
      <line x1="552" y1="194" x2="552" y2="222"/>
      <line x1="560" y1="188" x2="560" y2="228"/>
      <line x1="568" y1="194" x2="568" y2="222"/>
      <line x1="576" y1="200" x2="576" y2="216"/>
    </g>
    <text x="560" y="262" font-size="11" fill="#5b616b" text-anchor="middle">the speaker IS the hub</text>
    <!-- voice waves coming in -->
    <g stroke="#0066cc" stroke-width="2" fill="none" stroke-opacity="0.5">
      <path d="M470 150 q14 30 0 60"/>
      <path d="M452 140 q22 40 0 80"/>
    </g>
    <text x="445" y="120" font-size="11" fill="#0066cc" text-anchor="end">"lights on"</text>
    <!-- devices -->
    <g stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="592" y1="160" x2="660" y2="150"/>
      <line x1="592" y1="180" x2="660" y2="200"/>
      <line x1="592" y1="210" x2="660" y2="250"/>
    </g>
    <g fill="#7a808c" font-size="10">
      <circle cx="672" cy="150" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="687" y="154">bulb</text>
      <circle cx="672" cy="200" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="687" y="204">lock</text>
      <circle cx="672" cy="250" r="9" fill="none" stroke="#7a808c" stroke-width="1.5"/><text x="687" y="254">thermostat</text>
    </g>

    <text x="40" y="338" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">Buying a separate hub becomes an enthusiast thing; the voice speaker absorbs the role.</text>
  </g>
</svg>
