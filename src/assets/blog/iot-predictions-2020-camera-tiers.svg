<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-label="Camera market tiers">
  <rect width="760" height="420" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="15" letter-spacing="2" fill="#7a808c">SMART-HOME CAMERA TIERS · 2020 BET</text>

    <!-- PREMIUM -->
    <g transform="translate(40,76)">
      <rect width="680" height="84" rx="10" fill="#0066cc" fill-opacity="0.08" stroke="#0066cc" stroke-width="2"/>
      <!-- camera glyph -->
      <g transform="translate(28,28)" stroke="#0066cc" stroke-width="2.4" fill="none">
        <rect x="0" y="0" width="40" height="28" rx="5"/>
        <circle cx="20" cy="14" r="8"/>
      </g>
      <text x="90" y="34" font-size="15" fill="#1a1d24" font-weight="600">PREMIUM TIER — holds</text>
      <text x="90" y="56" font-size="12.5" fill="#5b616b">Ring · Nest — brand, ecosystem lock-in, subscriptions</text>
      <text x="660" y="50" text-anchor="end" font-size="22" fill="#0066cc" font-weight="600">$$$</text>
    </g>

    <!-- MIDDLE squeezed -->
    <g transform="translate(40,176)">
      <rect width="680" height="84" rx="10" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-width="2" stroke-dasharray="7 5"/>
      <g transform="translate(28,28)" stroke="#c14a3a" stroke-width="2.4" fill="none">
        <rect x="0" y="0" width="40" height="28" rx="5"/>
        <circle cx="20" cy="14" r="8"/>
      </g>
      <text x="90" y="34" font-size="15" fill="#1a1d24" font-weight="600">MIDDLE — vacuumed up</text>
      <text x="90" y="56" font-size="12.5" fill="#5b616b">Logitech Circle · Canary survivors · Arlo (acquired or secondary)</text>
      <!-- squeeze arrows -->
      <g stroke="#c14a3a" stroke-width="2.6" fill="#c14a3a">
        <path d="M656 14 l-22 0 M634 14 l8 -5 v10 z"/>
        <path d="M656 70 l-22 0 M634 70 l8 -5 v10 z"/>
      </g>
    </g>

    <!-- PRICE FLOOR -->
    <g transform="translate(40,276)">
      <rect width="680" height="84" rx="10" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="2"/>
      <g transform="translate(28,28)" stroke="#3a7d44" stroke-width="2.4" fill="none">
        <rect x="0" y="0" width="40" height="28" rx="5"/>
        <circle cx="20" cy="14" r="8"/>
      </g>
      <text x="90" y="34" font-size="15" fill="#1a1d24" font-weight="600">PRICE FLOOR — Wyze</text>
      <text x="90" y="56" font-size="12.5" fill="#5b616b">$20-30 hardware sets the bottom; the tier I keep under-weighting</text>
      <text x="660" y="50" text-anchor="end" font-size="22" fill="#3a7d44" font-weight="600">$</text>
    </g>

    <text x="40" y="402" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">The barbell wins; the middle is where margin goes to die.</text>
  </g>
</svg>
