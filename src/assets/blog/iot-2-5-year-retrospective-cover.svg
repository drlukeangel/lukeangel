<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="retro-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#retro-dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#2a52be"/>
  <text x="80" y="92" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#7a808c">RETROSPECTIVE — NOV 2025</text>
  <text x="1120" y="92" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#2a52be" text-anchor="end">2.5 YEARS</text>
  <line x1="80" y1="120" x2="1120" y2="120" stroke="#1a1d24" stroke-width="2"/>

  <g transform="translate(800, 170)" stroke="#1a1d24" stroke-width="2" fill="none">
    <line x1="0" y1="40" x2="320" y2="40" stroke-dasharray="6,6"/>
    <circle cx="0" cy="40" r="6" fill="#7a808c" stroke="none"/>
    <circle cx="80" cy="40" r="6" fill="#1a1d24" stroke="none"/>
    <circle cx="160" cy="40" r="6" fill="#1a1d24" stroke="none"/>
    <circle cx="240" cy="40" r="6" fill="#1a1d24" stroke="none"/>
    <circle cx="320" cy="40" r="10" fill="#2a52be" stroke="none"/>
    <text x="0"   y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a808c" stroke="none">'23</text>
    <text x="80"  y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#1a1d24" stroke="none">'24</text>
    <text x="160" y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#1a1d24" stroke="none">'24</text>
    <text x="240" y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#1a1d24" stroke="none">'25</text>
    <text x="320" y="20" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#2a52be" stroke="none">'25</text>
  </g>

  <text x="80" y="288" font-family="Newsreader, serif" font-weight="500" font-size="60" fill="#1a1d24">Two and a half years</text>
  <text x="80" y="356" font-family="Newsreader, serif" font-weight="500" font-size="60" fill="#1a1d24">of connected products —</text>
  <text x="80" y="420" font-family="Newsreader, serif" font-style="italic" font-size="34" fill="#2a52be">what I'd do differently.</text>

  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1a1d24" stroke-width="2"/>
  <text x="80" y="540" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">L. ANGEL — IOT · CRAFT</text>
