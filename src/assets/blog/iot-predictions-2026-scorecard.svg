<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-label="2025 scorecard">
  <rect width="760" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="46" font-size="20" fill="#1a1d24" font-weight="600">2025 — predicted vs. shipped</text>
    <text x="40" y="70" font-size="13" fill="#7a808c">~88% accuracy by my count</text>

    <!-- legend -->
    <g transform="translate(470,36)" font-size="12">
      <circle cx="8" cy="-4" r="7" fill="#3a7d44"/><text x="22" y="0" fill="#5b616b">hit</text>
      <circle cx="78" cy="-4" r="7" fill="#e0a92e"/><text x="92" y="0" fill="#5b616b">partial</text>
      <circle cx="178" cy="-4" r="7" fill="#c14a3a"/><text x="192" y="0" fill="#5b616b">miss</text>
    </g>

    <g font-size="14">
      <!-- Ray-Ban Display HIT -->
      <g transform="translate(40,96)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Meta Ray-Ban Display — product of the year</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">$499 / $799 at Connect; cleared 3M annual run-rate by Q4</text>
      </g>
      <!-- Vision Pro 2 held HIT -->
      <g transform="translate(40,146)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Vision Pro 2 held; Apple teases glasses at WWDC</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">Cheaper variant pushed to early 2026; glasses confirmed for 2026</text>
      </g>
      <!-- Apple Watch 11 BP HIT -->
      <g transform="translate(40,196)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Apple Watch 11 — blood-pressure trend tracking</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">FDA-cleared as trend, not diagnostic; glucose still absent</text>
      </g>
      <!-- On-device AI HIT -->
      <g transform="translate(40,246)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">On-device AI is table-stakes; standalone AI HW dead</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">Apple/Galaxy/Pixel AI all real; Rabbit pivots, Brilliant fades</text>
      </g>
      <!-- Humane PARTIAL -->
      <g transform="translate(40,296)">
        <rect width="680" height="44" rx="6" fill="#e0a92e" fill-opacity="0.10" stroke="#e0a92e" stroke-opacity="0.5"/>
        <circle cx="26" cy="22" r="11" fill="#e0a92e"/>
        <rect x="20" y="20.5" width="12" height="3" rx="1.5" fill="#fff"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Humane bought by HP — right buyer, wrong price</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">$116M (not $1B); AI Pin killed, staff folded into HP</text>
      </g>
      <!-- missed wristband PARTIAL/miss -->
      <g transform="translate(40,346)">
        <rect width="680" height="44" rx="6" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-opacity="0.45"/>
        <circle cx="26" cy="22" r="11" fill="#c14a3a"/>
        <path d="M21 17 l10 10 M31 17 l-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Missed entirely: Meta's neural (EMG) wristband</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">The hands-free input that makes glasses usable — bigger than I called</text>
      </g>
    </g>
    <text x="40" y="424" font-size="11.5" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">Best calls: Ray-Ban Display, the HP buyer, the WWDC tease. Worst miss: Humane valuation, 10x off.</text>
    <rect x="40" y="440" width="680" height="4" rx="2" fill="#0066cc" opacity="0.85"/>
  </g>
</svg>
