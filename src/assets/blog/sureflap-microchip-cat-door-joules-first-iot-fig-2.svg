<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" width="920" height="470" role="img" aria-label="Short read range as a feature.">
  <rect x="1" y="1" width="918" height="468" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#5b616b;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;fill:#5b616b;}
  </style>

  <text x="40" y="48" class="lbl" font-size="16" letter-spacing="1.5">THE SHORT RANGE IS THE FEATURE</text>

  <!-- door frame, left-of-centre, viewed head-on -->
  <g transform="translate(330,255)">
    <rect x="-66" y="-118" width="132" height="236" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="-44" y="-88" width="88" height="176" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <!-- coil ring around opening -->
    <ellipse cx="0" cy="0" rx="36" ry="70" fill="none" stroke="#c87533" stroke-width="3"/>
  </g>

  <!-- read zone: small, hugging the opening -->
  <ellipse cx="330" cy="255" rx="92" ry="92" fill="#c87533" fill-opacity="0.12" stroke="#c87533" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="330" y="120" text-anchor="middle" class="mut" font-size="13" fill="#c87533">read zone — a few cm</text>

  <!-- cat IN the opening: head through, gets read -->
  <g transform="translate(330,255)">
    <circle cx="0" cy="0" r="19" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <path d="M-14 -15 l-5 -15 11 7 z M14 -15 l5 -15 -11 7 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <g transform="translate(388,213)">
    <circle cx="0" cy="0" r="13" fill="#3a7d44"/>
    <path d="M-5 0 l4 4 7 -8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="330" y="405" text-anchor="middle" class="lbl" font-size="13" font-weight="600" fill="#3a7d44">head in the opening → read fires</text>

  <!-- divider gutter -->
  <line x1="560" y1="100" x2="560" y2="400" stroke="#1a1d24" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.18"/>

  <!-- neighbor cat OUT on the deck: far, never read -->
  <g transform="translate(720,250)">
    <ellipse cx="0" cy="14" rx="34" ry="20" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5"/>
    <circle cx="0" cy="-16" r="16" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5"/>
    <path d="M-12 -28 l-4 -12 9 6 z M12 -28 l4 -12 -9 6 z" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="0" y="58" text-anchor="middle" class="mut" font-size="12.5">gray tabby on the deck</text>
  </g>
  <g transform="translate(674,202)">
    <circle cx="0" cy="0" r="13" fill="#c14a3a"/>
    <path d="M-5 -5 l10 10 M5 -5 l-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="720" y="120" text-anchor="middle" class="mut" font-size="13" fill="#c14a3a">out of range</text>
  <text x="720" y="405" text-anchor="middle" class="mut" font-size="13">too far → never powered, never read</text>

  <text x="460" y="446" text-anchor="middle" class="cap" font-size="14.5">A passive chip answers only from as far as the coil can wake it — so the door reads the cat going through, not the deck.</text>
</svg>
