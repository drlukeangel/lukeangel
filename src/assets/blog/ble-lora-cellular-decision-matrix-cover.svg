<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="bl-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bl-dots)"/>
  <rect x="0" y="0" width="16" height="630" fill="#1a1d24"/>
  <text x="80" y="92" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="4" fill="#7a808c">DECISION MATRIX — MAY 2024</text>
  <line x1="80" y1="120" x2="1120" y2="120" stroke="#1a1d24" stroke-width="1"/>

  <g transform="translate(760, 170)">
    <rect x="0" y="0" width="340" height="80" fill="none" stroke="#1a1d24" stroke-width="2"/>
    <line x1="113" y1="0"  x2="113" y2="80" stroke="#1a1d24" stroke-width="2"/>
    <line x1="226" y1="0"  x2="226" y2="80" stroke="#1a1d24" stroke-width="2"/>
    <line x1="0"   y1="38" x2="340" y2="38" stroke="#1a1d24" stroke-width="2"/>
    <text x="56.5" y="24" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#7a808c">BLE</text>
    <text x="169.5" y="24" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#7a808c">LoRa</text>
    <text x="283" y="24" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#7a808c">cellular</text>
    <text x="56.5"  y="64" text-anchor="middle" font-family="Newsreader, serif" font-size="20" fill="#1a1d24">30m</text>
    <text x="169.5" y="64" text-anchor="middle" font-family="Newsreader, serif" font-size="20" fill="#1a1d24">10km</text>
    <text x="283"   y="64" text-anchor="middle" font-family="Newsreader, serif" font-size="20" fill="#2a52be">∞</text>
  </g>

  <text x="80" y="295" font-family="Newsreader, serif" font-weight="500" font-size="68" fill="#1a1d24">BLE vs LoRa vs cellular</text>
  <text x="80" y="365" font-family="Newsreader, serif" font-style="italic" font-size="42" fill="#7a808c">the connected-product</text>
  <text x="80" y="415" font-family="Newsreader, serif" font-style="italic" font-size="42" fill="#7a808c">decision matrix.</text>

  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1a1d24" stroke-width="1"/>
  <text x="80" y="540" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">L. ANGEL — IOT WIRELESS</text>
