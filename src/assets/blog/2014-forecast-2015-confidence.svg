<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="2015 forecast confidence chart">
  <rect width="960" height="560" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .pct{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#5b616b;}
    .ax{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:18px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>
  <text x="40" y="46" class="ttl">2015 forecast — by confidence</text>
  <g class="ax" text-anchor="middle">
    <line x1="320" y1="78" x2="320" y2="500" stroke="#1a1d24" stroke-opacity="0.15"/>
    <line x1="455" y1="78" x2="455" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="590" y1="78" x2="590" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="725" y1="78" x2="725" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="860" y1="78" x2="860" y2="500" stroke="#1a1d24" stroke-opacity="0.15"/>
    <text x="320" y="72">0%</text><text x="455" y="72">25%</text><text x="590" y="72">50%</text><text x="725" y="72">75%</text><text x="860" y="72">100%</text>
  </g>
  <!-- scale: 100% = 540px (320..860), px/pt = 5.4 -->
  <!-- 1: 95 -->
  <g transform="translate(0,90)"><text x="305" y="20" text-anchor="end" class="lab">Alexa Skills Kit launches, ecosystem booms</text>
    <rect x="320" y="4" width="513" height="24" rx="4" fill="#6a4c93" fill-opacity="0.6"/><text x="843" y="22" class="pct">95%</text></g>
  <!-- 2: 85 -->
  <g transform="translate(0,134)"><text x="305" y="20" text-anchor="end" class="lab">HomeKit ships with an MFi-chip tax</text>
    <rect x="320" y="4" width="459" height="24" rx="4" fill="#6a4c93" fill-opacity="0.6"/><text x="789" y="22" class="pct">85%</text></g>
  <!-- 3: 80 -->
  <g transform="translate(0,178)"><text x="305" y="20" text-anchor="end" class="lab">The hub-vs-cloud divide cements</text>
    <rect x="320" y="4" width="432" height="24" rx="4" fill="#6a4c93" fill-opacity="0.6"/><text x="762" y="22" class="pct">80%</text></g>
  <!-- 4: 80 -->
  <g transform="translate(0,222)"><text x="305" y="20" text-anchor="end" class="lab">Aeotec Multisensor 6 lands; I buy one</text>
    <rect x="320" y="4" width="432" height="24" rx="4" fill="#6a4c93" fill-opacity="0.6"/><text x="762" y="22" class="pct">80%</text></g>
  <!-- 5: 60 -->
  <g transform="translate(0,266)"><text x="305" y="20" text-anchor="end" class="lab">Google voice ships, but not in a home</text>
    <rect x="320" y="4" width="324" height="24" rx="4" fill="#6a4c93" fill-opacity="0.6"/><text x="654" y="22" class="pct">60%</text></g>
  <!-- 6: 5 wish/long-shot -->
  <g transform="translate(0,310)"><text x="305" y="20" text-anchor="end" class="lab">A unifying multi-vendor standard ships</text>
    <rect x="320" y="4" width="27" height="24" rx="4" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="1.5" stroke-dasharray="5 3"/><text x="357" y="22" class="pct">5%</text></g>
  <!-- 7: commitment (security arc) -->
  <g transform="translate(0,354)"><text x="305" y="20" text-anchor="end" class="lab">I build a real home-security arc</text>
    <rect x="320" y="4" width="540" height="24" rx="4" fill="#6a4c93" fill-opacity="0.85" stroke="#1a1d24" stroke-width="2"/><text x="500" y="22" text-anchor="middle" class="pct" fill="#fdfaf2">a commitment, not a guess</text></g>
  <!-- 8: commitment (zigbee primer) -->
  <g transform="translate(0,398)"><text x="305" y="20" text-anchor="end" class="lab">I write the Zigbee primer I owe</text>
    <rect x="320" y="4" width="540" height="24" rx="4" fill="#6a4c93" fill-opacity="0.85" stroke="#1a1d24" stroke-width="2"/><text x="500" y="22" text-anchor="middle" class="pct" fill="#fdfaf2">a commitment, not a guess</text></g>

  <g transform="translate(320,452)">
    <rect x="0" y="0" width="20" height="14" rx="3" fill="#6a4c93" fill-opacity="0.6"/><text x="28" y="12" class="ax">market read</text>
    <rect x="150" y="0" width="20" height="14" rx="3" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="1.5" stroke-dasharray="5 3"/><text x="178" y="12" class="ax">long shot</text>
    <rect x="290" y="0" width="20" height="14" rx="3" fill="#6a4c93" fill-opacity="0.85" stroke="#1a1d24" stroke-width="1.5"/><text x="318" y="12" class="ax">on me, not the market</text>
  </g>
  <line x1="40" y1="500" x2="920" y2="500" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="534" class="cap">The high bars are easy reads; the standard is three years early; the rest is on me.</text>
</svg>
