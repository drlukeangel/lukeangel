<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A signed firmware update verified at a checkpoint — signature, hash, and version checked — before it is allowed onto the device.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs><pattern id="sota-dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#sota-dots)"/>
  <rect width="24" height="630" fill="#c14a3a"/>

  <!-- update package -->
  <rect x="150" y="248" width="220" height="156" rx="16" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <g fill="#1a1d24" opacity="0.28"><rect x="186" y="300" width="150" height="11" rx="5"/><rect x="186" y="324" width="150" height="11" rx="5"/><rect x="186" y="348" width="100" height="11" rx="5"/></g>
  <g transform="translate(344,250)">
    <circle cx="0" cy="0" r="24" fill="#fdfaf2" stroke="#c14a3a" stroke-width="4"/>
    <path d="M-10 16 L-14 40 L-3 31 L0 42 L3 31 L14 40 L10 16" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-11 0 l8 9 13 -16" fill="none" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g stroke="#1a1d24" stroke-width="4" fill="#1a1d24"><line x1="382" y1="326" x2="452" y2="326"/><path d="M456 326 l-16 -8 v16 z"/></g>

  <!-- verification shield -->
  <path d="M560 250 a56 56 0 0 1 112 0 v36 q0 64 -56 86 q-56 -22 -56 -86 z" fill="#fdfaf2" stroke="#c14a3a" stroke-width="6"/>
  <path d="M588 330 l18 18 38 -46" fill="none" stroke="#c14a3a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g stroke="#1a1d24" stroke-width="4" fill="#1a1d24"><line x1="700" y1="326" x2="770" y2="326"/><path d="M774 326 l-16 -8 v16 z"/></g>

  <!-- device -->
  <rect x="800" y="256" width="220" height="150" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
  <circle cx="838" cy="292" r="8" fill="none" stroke="#1a1d24" stroke-width="3"/><circle cx="838" cy="292" r="3" fill="#3a7d44"/>
  <path d="M866 348 l16 16 30 -36" fill="none" stroke="#3a7d44" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
