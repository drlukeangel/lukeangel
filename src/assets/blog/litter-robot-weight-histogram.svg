<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="entry weight histogram">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">ENTRY WEIGHT, EVERY VISIT &#183; 4 MONTHS</text>

  <!-- axes -->
  <g stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2">
    <line x1="90" y1="400" x2="930" y2="400"/>
    <line x1="90" y1="80" x2="90" y2="400"/>
  </g>
  <text x="44" y="240" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c" transform="rotate(-90 44 240)">visits</text>
  <text x="510" y="446" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">weight at entry (lb)</text>

  <!-- x ticks -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">
    <text x="190" y="420" text-anchor="middle">3</text>
    <text x="310" y="420" text-anchor="middle">4</text>
    <text x="430" y="420" text-anchor="middle">5</text>
    <text x="550" y="420" text-anchor="middle">6</text>
    <text x="670" y="420" text-anchor="middle">7</text>
    <text x="790" y="420" text-anchor="middle">9</text>
    <text x="850" y="420" text-anchor="middle">10</text>
  </g>

  <!-- Boson peak (~3.7) -->
  <g fill="#357a8c" fill-opacity="0.55" stroke="#357a8c" stroke-width="1.5">
    <rect x="150" y="300" width="34" height="100"/>
    <rect x="186" y="210" width="34" height="190"/>
    <rect x="222" y="250" width="34" height="150"/>
    <rect x="258" y="330" width="34" height="70"/>
  </g>
  <text x="220" y="195" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#357a8c">Boson</text>

  <!-- ambiguous middle (sparse) -->
  <g fill="#c14a3a" fill-opacity="0.4" stroke="#c14a3a" stroke-width="1.2">
    <rect x="360" y="384" width="30" height="16"/>
    <rect x="500" y="388" width="30" height="12"/>
    <rect x="640" y="386" width="30" height="14"/>
  </g>
  <text x="510" y="372" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">ambiguous (cat moved on the scale)</text>

  <!-- Joule peak (~9.5) -->
  <g fill="#3a7d44" fill-opacity="0.55" stroke="#3a7d44" stroke-width="1.5">
    <rect x="740" y="320" width="34" height="80"/>
    <rect x="776" y="180" width="34" height="220"/>
    <rect x="812" y="220" width="34" height="180"/>
    <rect x="848" y="330" width="34" height="70"/>
  </g>
  <text x="810" y="165" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#3a7d44">Joule</text>

  <!-- the gap -->
  <text x="510" y="480" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">A wide empty gap between the two peaks is what makes the attribution clean.</text>
</svg>
