<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">The 5-Whys companion to a fishbone diagram — drilling from symptom to root cause</title>
  <desc id="d">2025-era modern flat diagram of the 5-Whys technique applied alongside fishbone analysis: a symptom at the top, then five Why? boxes each drilling deeper, leading to a root cause at the bottom that's actionable.</desc>
  <style>
    .label{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:600;fill:#fff;font-size:14px}
    .small{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:12px;fill:#5a6470}
    .title{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:18px;font-weight:600;fill:#1a1d24}
    .text{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:13px;fill:#1a1d24}
    .symptom{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:600;fill:#fff}
  </style>
  <defs>
    <linearGradient id="why-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#fafbfc"/>
  <text x="400" y="38" text-anchor="middle" class="title">The 5-Whys — drill from symptom to root cause</text>

  <!-- Symptom -->
  <g transform="translate(260,70)">
    <rect width="280" height="46" fill="#dc2626" rx="6"/>
    <text x="140" y="30" text-anchor="middle" class="symptom">SYMPTOM: site outage in production</text>
  </g>

  <!-- arrow -->
  <line x1="400" y1="118" x2="400" y2="146" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Why 1 -->
  <g transform="translate(80,150)">
    <rect width="640" height="40" fill="#0a78d6" rx="4"/>
    <text x="20" y="26" class="label">Why? → the deploy crashed on startup</text>
  </g>
  <line x1="400" y1="192" x2="400" y2="208" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Why 2 -->
  <g transform="translate(80,212)">
    <rect width="640" height="40" fill="#0a6cc1" rx="4"/>
    <text x="20" y="26" class="label">Why? → an env var was missing</text>
  </g>
  <line x1="400" y1="254" x2="400" y2="270" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Why 3 -->
  <g transform="translate(80,274)">
    <rect width="640" height="40" fill="#0a5fac" rx="4"/>
    <text x="20" y="26" class="label">Why? → it wasn't set in the new env after the secret rotation</text>
  </g>
  <line x1="400" y1="316" x2="400" y2="332" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Why 4 -->
  <g transform="translate(80,336)">
    <rect width="640" height="40" fill="#0a5396" rx="4"/>
    <text x="20" y="26" class="label">Why? → the secret rotation playbook doesn't propagate to the new env automatically</text>
  </g>
  <line x1="400" y1="378" x2="400" y2="394" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Root cause -->
  <g transform="translate(80,398)">
    <rect width="640" height="46" fill="#10a37f" rx="6"/>
    <text x="320" y="22" text-anchor="middle" class="symptom">ROOT CAUSE</text>
    <text x="320" y="38" text-anchor="middle" class="small" fill="#fff">Missing automation step in the secret-rotation runbook — actionable, fixable in one PR</text>
  </g>
</svg>
