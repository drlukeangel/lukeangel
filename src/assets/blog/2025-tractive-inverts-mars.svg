<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="Tractive inverts two calls in one year">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">ONE SMALL COMPANY, TWO INVERTED CALLS</text>

  <!-- timeline spine -->
  <line x1="120" y1="250" x2="880" y2="250" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>

  <!-- MAY: vitals -->
  <g transform="translate(300,250)">
    <circle cx="0" cy="0" r="9" fill="#c87533"/>
    <text x="0" y="-110" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c87533">MAY 2025</text>
    <!-- collar + heartbeat -->
    <g transform="translate(0,-78)">
      <rect x="-40" y="-22" width="80" height="44" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <path d="M-26 0 l10 0 l5 -12 l8 24 l6 -12 l13 0" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#1a1d24">resting HR + resp rate</text>
    <text x="0" y="60" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">free OTA to trackers I owned</text>
    <text x="0" y="84" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#3a7d44">the vital sign giants never shipped</text>
  </g>

  <!-- JULY: divestiture -->
  <g transform="translate(660,250)">
    <circle cx="0" cy="0" r="9" fill="#c87533"/>
    <text x="0" y="-150" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c87533">JULY 2025</text>
    <!-- big block Mars -> small block Tractive, handing a puck -->
    <g transform="translate(0,-105)">
      <rect x="-120" y="-26" width="64" height="52" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <text x="-88" y="4" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">Mars</text>
      <rect x="60" y="-20" width="50" height="40" rx="6" fill="#fff" stroke="#c87533" stroke-width="3"/>
      <!-- paw on small block -->
      <g fill="#c87533" transform="translate(85,0)"><circle cx="0" cy="3" r="6"/><circle cx="-7" cy="-6" r="3"/><circle cx="0" cy="-9" r="3"/><circle cx="7" cy="-6" r="3"/></g>
      <!-- arrow: puck handed across -->
      <line x1="-50" y1="0" x2="52" y2="0" stroke="#1a1d24" stroke-width="2.5"/>
      <polygon points="52,0 42,-6 42,6" fill="#1a1d24"/>
      <circle cx="0" cy="0" r="11" fill="#fff" stroke="#1a1d24" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="#1a1d24"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#1a1d24">Mars divests Whistle to Tractive</text>
    <text x="0" y="64" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#3a7d44">the underdog absorbs the giant's device leg</text>
  </g>

  <!-- tick labels under spine -->
  <text x="300" y="278" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">out-engineered the giant</text>
  <text x="660" y="278" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" fill="#7a808c">then bought its hardware</text>

  <text x="500" y="442" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#1a1d24">the empire didn&#8217;t expand &#8212; it sold to the company that just beat it</text>
</svg>
