<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1a1d24" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#b7410e"/>

  <!-- gauge track (rounded rect outline) -->
  <rect x="180" y="290" width="840" height="50" rx="25" ry="25"
        fill="none" stroke="#1a1d24" stroke-width="2"/>

  <!-- gauge fill — pegged red across the entire bar -->
  <rect x="186" y="296" width="828" height="38" rx="19" ry="19" fill="#c14a3a"/>

  <!-- tick marks beneath the gauge -->
  <g stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2">
    <line x1="180" y1="360" x2="180" y2="378"/>
    <line x1="390" y1="360" x2="390" y2="378"/>
    <line x1="600" y1="360" x2="600" y2="378"/>
    <line x1="810" y1="360" x2="810" y2="378"/>
    <line x1="1020" y1="360" x2="1020" y2="378"/>
  </g>

  <!-- 18 small node dots above the gauge, each ALSO pegged -->
  <g fill="#c14a3a">
    <circle cx="220" cy="200" r="11"/>
    <circle cx="290" cy="200" r="11"/>
    <circle cx="360" cy="200" r="11"/>
    <circle cx="430" cy="200" r="11"/>
    <circle cx="500" cy="200" r="11"/>
    <circle cx="570" cy="200" r="11"/>
    <circle cx="640" cy="200" r="11"/>
    <circle cx="710" cy="200" r="11"/>
    <circle cx="780" cy="200" r="11"/>
    <circle cx="850" cy="200" r="11"/>
    <circle cx="920" cy="200" r="11"/>
    <circle cx="990" cy="200" r="11"/>
    <circle cx="255" cy="155" r="11"/>
    <circle cx="395" cy="155" r="11"/>
    <circle cx="535" cy="155" r="11"/>
    <circle cx="675" cy="155" r="11"/>
    <circle cx="815" cy="155" r="11"/>
    <circle cx="955" cy="155" r="11"/>
  </g>

  <!-- a single rust-orange marker at the right edge of the gauge — the 100% indicator -->
  <circle cx="1014" cy="315" r="22" fill="#b7410e"/>
  <circle cx="1014" cy="315" r="22" fill="none" stroke="#1a1d24" stroke-width="2"/>
</svg>
