<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" role="img" aria-label="Correction escalation ladder">
  <rect width="920" height="440" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>

  <text x="40" y="46" class="hd">As the dog nears the invisible line, the cue escalates</text>

  <!-- horizontal escalation: 3 stages with rising intensity, an arrow through them -->
  <line x1="100" y1="200" x2="820" y2="200" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
  <polygon points="820,200 808,193 808,207" fill="#1a1d24" fill-opacity="0.4"/>

  <!-- stage 1: beep (neutral, green) -->
  <g transform="translate(180,200)">
    <circle cx="0" cy="0" r="48" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="3"/>
    <g stroke="#3a7d44" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M -18 8 Q 0 -18 18 8"/>
      <path d="M -9 14 Q 0 2 9 14" stroke-opacity="0.6"/>
    </g>
    <text x="0" y="80" text-anchor="middle" class="lab">beep</text>
    <text x="0" y="100" text-anchor="middle" class="sm">just a sound</text>
  </g>

  <!-- stage 2: vibration (amber) -->
  <g transform="translate(420,200)">
    <circle cx="0" cy="0" r="48" fill="#c87533" fill-opacity="0.10" stroke="#c87533" stroke-width="3"/>
    <g stroke="#c87533" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M -20 -10 l 8 10 l -8 10"/>
      <path d="M 20 -10 l -8 10 l 8 10"/>
      <line x1="-4" y1="-12" x2="-4" y2="12"/>
      <line x1="4" y1="-12" x2="4" y2="12"/>
    </g>
    <text x="0" y="80" text-anchor="middle" class="lab">vibration</text>
    <text x="0" y="100" text-anchor="middle" class="sm">mildly unpleasant</text>
  </g>

  <!-- stage 3: static (red) -->
  <g transform="translate(680,200)">
    <circle cx="0" cy="0" r="48" fill="#c14a3a" fill-opacity="0.10" stroke="#c14a3a" stroke-width="3"/>
    <!-- lightning bolt -->
    <path d="M 6 -22 L -12 4 L 2 4 L -6 24 L 16 -4 L 2 -4 Z" fill="#c14a3a" stroke="none"/>
    <text x="0" y="80" text-anchor="middle" class="lab" fill="#c14a3a">static "correction"</text>
    <text x="0" y="100" text-anchor="middle" class="sm">a shock — 16 levels</text>
  </g>

  <line x1="40" y1="370" x2="880" y2="370" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="400" class="cap">A trained adult dog may stop at the beep. A puppy with no priors meets the shock —</text>
  <text x="40" y="422" class="cap">and generalizes anxiety from a line it never saw, smelled, or heard.</text>
</svg>
