<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="IFTTT latency path">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24" text-anchor="middle">

    <!-- 5 nodes across -->
    <!-- trigger vendor cloud -->
    <g transform="translate(110 120)">
      <path d="M-64 20 a30 30 0 0 1 16 -54 a40 40 0 0 1 76 7 a28 28 0 0 1 3 47 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="0" font-size="12">trigger</text>
      <text x="0" y="16" font-size="11" fill="#5b616b">vendor cloud</text>
    </g>
    <!-- IFTTT -->
    <g transform="translate(360 120)">
      <path d="M-70 22 a32 32 0 0 1 18 -58 a42 42 0 0 1 80 7 a30 30 0 0 1 3 51 z" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
      <text x="0" y="4" font-size="13" fill="#6a4c93">IFTTT</text>
    </g>
    <!-- action vendor cloud -->
    <g transform="translate(620 120)">
      <path d="M-64 20 a30 30 0 0 1 16 -54 a40 40 0 0 1 76 7 a28 28 0 0 1 3 47 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="0" font-size="12">action</text>
      <text x="0" y="16" font-size="11" fill="#5b616b">vendor cloud</text>
    </g>
    <!-- bridge + device -->
    <g transform="translate(860 120)">
      <rect x="-58" y="-34" width="116" height="68" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="-4" font-size="12">bridge</text>
      <text x="0" y="16" font-size="11" fill="#5b616b">→ device</text>
    </g>

    <!-- arrows -->
    <g fill="none" stroke="#6a4c93" stroke-width="3">
      <path d="M178 120 L286 120" marker-end="url(#a)"/>
      <path d="M434 120 L548 120" marker-end="url(#a)"/>
      <path d="M690 120 L796 120" marker-end="url(#a)"/>
    </g>
    <g font-size="11" fill="#5b616b">
      <text x="232" y="104">detect / poll</text>
      <text x="491" y="104">evaluate</text>
      <text x="743" y="104">dispatch</text>
    </g>

    <!-- bracket under whole chain -->
    <path d="M110 200 L110 220 L860 220 L860 200" fill="none" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    <text x="485" y="252" font-size="18" fill="#c14a3a">5–15 seconds, every command</text>

    <text x="485" y="320" font-size="13" fill="#5b616b" text-anchor="middle">the phone and the device are often on the same LAN, milliseconds apart —</text>
    <text x="485" y="342" font-size="13" fill="#5b616b" text-anchor="middle">but every command still takes the long way around through three clouds</text>

    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#6a4c93"/></marker>
    </defs>
  </g>
</svg>
