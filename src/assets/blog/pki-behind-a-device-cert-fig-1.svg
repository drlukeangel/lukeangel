<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="1000" height="450" role="img" aria-label="Anatomy of an X.509 device certificate and how the issuer signature binds it to the CA chain.">
  <rect width="1000" height="450" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">INSIDE A DEVICE CERT · A SIGNED DOCUMENT</text>

  <!-- the certificate body -->
  <rect x="40" y="74" width="430" height="330" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <!-- seal ribbon -->
  <g transform="translate(396,96)">
    <circle cx="20" cy="20" r="20" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <path d="M10 22 l7 7 14 -16" fill="none" stroke="#c14a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 38 l10 12 10 -12" fill="none" stroke="#c14a3a" stroke-width="2.4"/>
  </g>
  <text x="62" y="110" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">X.509 leaf certificate</text>

  <!-- fields -->
  <g font-family="ui-monospace,monospace" font-size="12.5">
    <line x1="62" y1="124" x2="448" y2="124" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
    <text x="62" y="156" fill="#7a808c">Subject</text>
    <text x="200" y="156" fill="#1a1d24">device serial — no PII</text>
    <text x="62" y="196" fill="#7a808c">Public key</text>
    <text x="200" y="196" fill="#1a1d24">ECDSA P-256</text>
    <text x="62" y="236" fill="#7a808c">Issuer</text>
    <text x="200" y="236" fill="#1a1d24">the intermediate CA</text>
    <text x="62" y="276" fill="#7a808c">Validity</text>
    <text x="200" y="276" fill="#1a1d24">not-before / not-after</text>
    <text x="62" y="316" fill="#7a808c">Ext: usage</text>
    <text x="200" y="316" fill="#1a1d24">client authentication</text>
  </g>

  <!-- signature band at bottom of cert -->
  <rect x="56" y="338" width="398" height="50" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.4"/>
  <text x="72" y="360" font-family="ui-monospace,monospace" font-size="12.5" fill="#c14a3a">Signature</text>
  <text x="72" y="378" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">issuing CA signs everything above · 1 byte changes → invalid</text>

  <!-- binding arrow to the chain -->
  <g stroke="#c14a3a" stroke-width="3" fill="#c14a3a">
    <path d="M470 363 H 560"/><path d="M564 363 l-15 -6 v12 z"/>
  </g>
  <text x="476" y="352" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">verified up</text>

  <!-- mini chain on the right: leaf -> intermediate -> root -->
  <g font-family="ui-monospace,monospace" font-size="12.5">
    <rect x="584" y="338" width="330" height="44" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="749" y="365" text-anchor="middle" fill="#1a1d24">this leaf cert</text>

    <g stroke="#c14a3a" stroke-width="2.6" fill="#c14a3a"><line x1="749" y1="338" x2="749" y2="300"/><path d="M749 296 l-6 14 h12 z"/></g>
    <text x="762" y="322" fill="#c14a3a">signed by</text>

    <rect x="584" y="240" width="330" height="56" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="749" y="266" text-anchor="middle" fill="#1a1d24">INTERMEDIATE CA</text>
    <text x="749" y="285" text-anchor="middle" font-size="10.5" fill="#7a808c">online · revocable</text>

    <g stroke="#c14a3a" stroke-width="2.6" fill="#c14a3a"><line x1="749" y1="240" x2="749" y2="202"/><path d="M749 198 l-6 14 h12 z"/></g>
    <text x="762" y="224" fill="#c14a3a">signed by</text>

    <rect x="584" y="140" width="330" height="58" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g transform="translate(610,154)" stroke="#c14a3a" stroke-width="2.4" fill="none">
      <rect x="0" y="11" width="20" height="15" rx="3"/><path d="M3 11 v-4 a7 7 0 0 1 14 0 v4"/>
    </g>
    <text x="760" y="166" text-anchor="middle" fill="#1a1d24">ROOT CA</text>
    <text x="760" y="186" text-anchor="middle" font-size="10.5" fill="#7a808c">offline · HSM · the trust anchor</text>
  </g>

  <text x="40" y="432" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">a cert is trusted only because something trusted signed it — all the way to an anchor</text>
</svg>
