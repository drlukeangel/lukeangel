<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" role="img" aria-label="Three hub islands">
  <rect width="1000" height="520" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 16px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 12px; fill: #5b616b; }
    .hub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 17px; fill: #1a1d24; font-weight: 600; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <!-- three islands -->
  <!-- SmartThings -->
  <g transform="translate(70,90)">
    <rect width="240" height="200" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="80" y="22" width="80" height="46" rx="6" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="120" y="50" text-anchor="middle" class="hub">SmartThings</text>
    <text x="120" y="100" text-anchor="middle" class="lbl">Zigbee · Z-Wave</text>
    <text x="120" y="126" text-anchor="middle" class="sub">door / motion sensors</text>
    <text x="120" y="148" text-anchor="middle" class="sub">water leak · outlets</text>
    <text x="120" y="182" text-anchor="middle" class="sub">cloud-mediated rules</text>
  </g>

  <!-- Hue -->
  <g transform="translate(380,90)">
    <rect width="240" height="200" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="80" y="22" width="80" height="46" rx="6" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="120" y="50" text-anchor="middle" class="hub">Hue Bridge</text>
    <text x="120" y="100" text-anchor="middle" class="lbl">Zigbee Light Link</text>
    <text x="120" y="126" text-anchor="middle" class="sub">12 bulbs</text>
    <text x="120" y="148" text-anchor="middle" class="sub">2 motion sensors</text>
    <text x="120" y="182" text-anchor="middle" class="sub">local REST API</text>
  </g>

  <!-- Lutron -->
  <g transform="translate(690,90)">
    <rect width="240" height="200" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="80" y="22" width="80" height="46" rx="6" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="120" y="50" text-anchor="middle" class="hub">Lutron</text>
    <text x="120" y="100" text-anchor="middle" class="lbl">Clear Connect</text>
    <text x="120" y="126" text-anchor="middle" class="sub">Caseta dimmers</text>
    <text x="120" y="148" text-anchor="middle" class="sub">no-neutral switches</text>
    <text x="120" y="182" text-anchor="middle" class="sub">SmartBridge</text>
  </g>

  <!-- broken links between islands -->
  <g stroke="#c14a3a" stroke-width="3" stroke-dasharray="9 7">
    <line x1="310" y1="190" x2="380" y2="190"/>
    <line x1="620" y1="190" x2="690" y2="190"/>
  </g>
  <!-- red X marks on the gaps -->
  <g stroke="#c14a3a" stroke-width="3">
    <line x1="338" y1="178" x2="352" y2="202"/><line x1="352" y1="178" x2="338" y2="202"/>
    <line x1="648" y1="178" x2="662" y2="202"/><line x1="662" y1="178" x2="648" y2="202"/>
  </g>

  <!-- cross-hub workaround note -->
  <g transform="translate(70,330)">
    <rect width="860" height="110" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="22" y="34" class="lbl">Cross-hub automation has exactly two paths, both bad:</text>
    <text x="22" y="64" class="sub">1.  Route everything through SmartThings  →  cloud round-trip, dies in an outage</text>
    <text x="22" y="88" class="sub">2.  Route through HomeKit  →  only the 3 MFi-blessed devices show up</text>
  </g>

  <text x="500" y="478" text-anchor="middle" class="cap">Three hubs, three radios, three apps. No native bridge between any of them.</text>
</svg>
