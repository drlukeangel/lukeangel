<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" width="1080" height="360" role="img" aria-label="The presence-arming logic as a six-node Node-RED flow.">
  <rect width="1080" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">PRESENCE-ARMING, AS A FLOW</text>

  <!-- node helper -->
  <!-- row A: presence -> all away -> delay -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <g>
      <rect x="40" y="90" width="130" height="46" rx="10" fill="#6a4c93" fill-opacity="0.1" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="105" y="111" text-anchor="middle">presence</text>
      <text x="105" y="126" text-anchor="middle" font-size="9.5" fill="#7a808c">HA sensors</text>
    </g>
    <g>
      <rect x="210" y="90" width="130" height="46" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="275" y="111" text-anchor="middle">all away?</text>
      <text x="275" y="126" text-anchor="middle" font-size="9.5" fill="#7a808c">function</text>
    </g>
    <g>
      <rect x="380" y="90" width="130" height="46" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="445" y="111" text-anchor="middle">delay 10 min</text>
    </g>
  </g>
  <!-- row B: sun -> after sunset? -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <g>
      <rect x="40" y="220" width="130" height="46" rx="10" fill="#6a4c93" fill-opacity="0.1" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="105" y="241" text-anchor="middle">sun state</text>
      <text x="105" y="256" text-anchor="middle" font-size="9.5" fill="#7a808c">HA</text>
    </g>
    <g>
      <rect x="210" y="220" width="130" height="46" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="275" y="246" text-anchor="middle">after sunset?</text>
    </g>
  </g>
  <!-- gate (merge) -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <rect x="560" y="150" width="150" height="56" rx="10" fill="#c87533" fill-opacity="0.14" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="635" y="176" text-anchor="middle">gate:</text>
    <text x="635" y="192" text-anchor="middle" font-size="10">guest mode off?</text>
  </g>
  <!-- arm + debug -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <g>
      <rect x="760" y="120" width="130" height="46" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="825" y="141" text-anchor="middle">arm alarm</text>
      <text x="825" y="156" text-anchor="middle" font-size="9.5" fill="#7a808c">HA</text>
    </g>
    <g>
      <rect x="760" y="190" width="130" height="46" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
      <text x="825" y="216" text-anchor="middle">debug</text>
    </g>
  </g>

  <!-- wires + ports -->
  <g fill="#6a4c93"><circle cx="170" cy="113" r="5"/><circle cx="210" cy="113" r="5"/><circle cx="340" cy="113" r="5"/><circle cx="380" cy="113" r="5"/><circle cx="170" cy="243" r="5"/><circle cx="210" cy="243" r="5"/><circle cx="340" cy="243" r="5"/><circle cx="560" cy="178" r="5"/><circle cx="710" cy="178" r="5"/><circle cx="760" cy="143" r="5"/><circle cx="760" cy="213" r="5"/></g>
  <g stroke="#6a4c93" stroke-width="2.6" fill="none">
    <path d="M170 113 H210"/>
    <path d="M340 113 H380"/>
    <path d="M510 113 C540 113, 545 178, 560 178"/>
    <path d="M340 243 C440 243, 470 178, 560 178"/>
    <path d="M710 178 C735 178, 740 143, 760 143"/>
    <path d="M710 178 C735 178, 740 213, 760 213"/>
  </g>
  <!-- live message dot -->
  <circle cx="275" cy="113" r="6.5" fill="#3a7d44"/>

  <text x="540" y="330" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Six nodes I can read at a glance — and every node shows the last message that passed through it.</text>
</svg>
