<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" role="img" aria-label="Mars Petcare portfolio, mid-2023">
  <rect width="1000" height="500" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;font-weight:700;}
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11.5px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:10.5px;fill:#5b616b;}
    .big{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:26px;fill:#c87533;font-weight:700;}
    .kick{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:14.5px;fill:#5b616b;}
  </style>

  <text x="40" y="42" class="kick">THE MARS PETCARE EMPIRE, MID-2023</text>
  <text x="40" y="64" class="sm">one company spanning the device, the clinic, and the bowl · ~$20B revenue</text>

  <!-- THREE PILLAR COLUMNS -->
  <!-- Devices -->
  <g transform="translate(40,86)">
    <rect x="0" y="0" width="290" height="172" rx="10" fill="#c87533" fill-opacity="0.06" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <text x="18" y="28" class="hd">DEVICES</text>
    <text x="18" y="56" class="lab">Whistle</text>
    <text x="18" y="74" class="sm">acquired 2016 · GPS + behavior collar</text>
    <text x="18" y="100" class="lab">Tagg</text>
    <text x="18" y="118" class="sm">folded into Whistle · discontinued</text>
    <text x="18" y="150" class="sm" fill="#c87533">~25% of premium connected collars</text>
  </g>
  <!-- Vet clinics -->
  <g transform="translate(355,86)">
    <rect x="0" y="0" width="290" height="172" rx="10" fill="#c87533" fill-opacity="0.06" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <text x="18" y="28" class="hd">VET CLINICS</text>
    <text x="18" y="52" class="sm">Banfield · ~1,000 US (since 2007)</text>
    <text x="18" y="72" class="sm">VCA · ~800+ (2017)</text>
    <text x="18" y="92" class="sm">BluePearl · specialty (2015)</text>
    <text x="18" y="112" class="sm">AniCura · ~430 EU (2018)</text>
    <text x="18" y="132" class="sm">Linnaeus · UK network (2018)</text>
    <text x="18" y="158" class="sm" fill="#c87533">~20% of US vet visits</text>
  </g>
  <!-- Food -->
  <g transform="translate(670,86)">
    <rect x="0" y="0" width="290" height="172" rx="10" fill="#c87533" fill-opacity="0.06" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <text x="18" y="28" class="hd">FOOD</text>
    <text x="18" y="52" class="sm">Royal Canin · prescription-style</text>
    <text x="18" y="72" class="sm">Pedigree · Whiskas · IAMS</text>
    <text x="18" y="92" class="sm">EUKANUBA · premium</text>
    <text x="18" y="112" class="sm">Champion (Acana/Orijen) · 2023</text>
    <text x="18" y="132" class="sm">Sheba · Cesar · Greenies</text>
    <text x="18" y="158" class="sm" fill="#c87533">~40% of global premium pet food</text>
  </g>

  <!-- converge to the dog -->
  <line x1="185" y1="258" x2="500" y2="320" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="500" y1="258" x2="500" y2="320" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="815" y1="258" x2="500" y2="320" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>

  <g transform="translate(380,328)">
    <rect x="0" y="0" width="240" height="78" rx="12" fill="#fdfaf2" stroke="#c87533" stroke-width="3"/>
    <text x="120" y="34" text-anchor="middle" class="hd">one dog</text>
    <text x="120" y="58" text-anchor="middle" class="sm">measured, fed, treated, advised</text>
    <text x="120" y="74" text-anchor="middle" class="sm">— all by the same owner</text>
  </g>

  <line x1="40" y1="438" x2="960" y2="438" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="500" y="468" text-anchor="middle" class="cap">The device that watches the dog, the clinic that treats it, and the food it eats all roll up to one balance sheet.</text>
</svg>
