<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 470" width="1060" height="470" role="img" aria-label="The four-bucket PII rubric">
  <rect width="1060" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE COLUMN, FOUR BUCKETS, ONE TREATMENT EACH</text>

  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- row 1: direct -> hash -->
    <rect x="40" y="84" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="116" font-size="14" fill="#1a1d24">Direct identifier</text>
    <text x="60" y="140" font-size="12" fill="#7a808c">operator_email · tool_serial</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="122" x2="556" y2="122"/><path d="M560 122 l-15 -7 v14 z"/></g>
    <rect x="572" y="84" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
    <text x="592" y="116" font-size="14" fill="#2a52be">HASH</text>
    <text x="592" y="140" font-size="12" fill="#7a808c">HMAC-SHA256, rotating salt — irreversible</text>

    <!-- row 2: quasi -> tokenize -->
    <rect x="40" y="180" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="212" font-size="14" fill="#1a1d24">Quasi-identifier</text>
    <text x="60" y="236" font-size="12" fill="#7a808c">operator_name · job_site_address · MAC</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="218" x2="556" y2="218"/><path d="M560 218 l-15 -7 v14 z"/></g>
    <rect x="572" y="180" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
    <text x="592" y="212" font-size="14" fill="#2a52be">TOKENIZE</text>
    <text x="592" y="236" font-size="12" fill="#7a808c">stable random token — joins still work</text>

    <!-- row 3: sensitive -> generalize -->
    <rect x="40" y="276" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="308" font-size="14" fill="#1a1d24">Sensitive attribute</text>
    <text x="60" y="332" font-size="12" fill="#7a808c">gps_lat / gps_lon · biometric · salary</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="314" x2="556" y2="314"/><path d="M560 314 l-15 -7 v14 z"/></g>
    <rect x="572" y="276" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
    <text x="592" y="308" font-size="14" fill="#2a52be">GENERALIZE</text>
    <text x="592" y="332" font-size="12" fill="#7a808c">GPS to 0.01 grid · ages in 5-yr bins</text>

    <!-- row 4: behavioral -> keep -->
    <rect x="40" y="372" width="430" height="76" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="60" y="404" font-size="14" fill="#1a1d24">Behavioral / non-PII</text>
    <text x="60" y="428" font-size="12" fill="#7a808c">battery_pct · torque_nm · usage_minutes</text>
    <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24"><line x1="480" y1="410" x2="556" y2="410"/><path d="M560 410 l-15 -7 v14 z"/></g>
    <rect x="572" y="372" width="448" height="76" rx="12" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="592" y="404" font-size="14" fill="#3a7d44">KEEP</text>
    <text x="592" y="428" font-size="12" fill="#7a808c">it's what the product runs on — don't touch</text>
  </g>
</svg>
