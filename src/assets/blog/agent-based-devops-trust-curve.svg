<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" width="960" height="430" role="img" aria-label="The trust zones of an agent.">
  <rect width="960" height="430" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>

  <!-- horizontal axis: error rate / trust, low-error on the right -->
  <line x1="80" y1="330" x2="900" y2="330" stroke="#1a1d24" stroke-width="3"/>
  <!-- arrowhead right -->
  <path d="M900 330 l-16 -7 v14 z" fill="#1a1d24"/>

  <!-- three zones drawn as bands -->
  <!-- left band: shut it off -->
  <rect x="80" y="120" width="240" height="210" fill="#c14a3a" opacity="0.08"/>
  <!-- middle band: the expensive middle -->
  <rect x="320" y="120" width="320" height="210" fill="#7a808c" opacity="0.12"/>
  <!-- right band: trust the agent -->
  <rect x="640" y="120" width="260" height="210" fill="#3a7d44" opacity="0.10"/>

  <!-- band dividers -->
  <line x1="320" y1="120" x2="320" y2="330" stroke="#1a1d24" stroke-width="1.5" stroke-dasharray="5 5" stroke-opacity="0.4"/>
  <line x1="640" y1="120" x2="640" y2="330" stroke="#1a1d24" stroke-width="1.5" stroke-dasharray="5 5" stroke-opacity="0.4"/>

  <!-- left zone label + icon (X) -->
  <g transform="translate(200,180)" stroke="#c14a3a" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="-14" y1="-14" x2="14" y2="14"/><line x1="14" y1="-14" x2="-14" y2="14"/>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#c14a3a">SHUT IT OFF</text>
  <text x="200" y="268" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">too wrong to use</text>

  <!-- middle zone label + icon (recycle-of-doubt: a magnifier over the work) -->
  <g transform="translate(480,180)" stroke="#7a808c" stroke-width="5" fill="none" stroke-linecap="round">
    <circle cx="-6" cy="-6" r="14"/>
    <line x1="4" y1="4" x2="18" y2="18"/>
  </g>
  <text x="480" y="240" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#5b616b">THE EXPENSIVE MIDDLE</text>
  <text x="480" y="268" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">right enough to keep, wrong enough</text>
  <text x="480" y="288" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">to double-check everything — eats the savings</text>

  <!-- right zone label + icon (check) -->
  <g transform="translate(770,180)" stroke="#3a7d44" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="16"/><path d="M-8 0 L-2 6 L9 -8"/>
  </g>
  <text x="770" y="240" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#3a7d44">TRUST THE AGENT</text>
  <text x="770" y="268" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">right enough to stop checking</text>

  <!-- axis end labels -->
  <text x="80" y="360" text-anchor="start" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">more errors</text>
  <text x="900" y="360" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">fewer errors →</text>

  <!-- title at top -->
  <text x="480" y="70" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="20" fill="#1a1d24">An agent's value is a step function, not a slope</text>
</svg>
