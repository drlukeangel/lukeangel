<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="iBeacons across rooms">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- floor plan: outer wall -->
  <rect x="180" y="120" width="840" height="400" rx="6" fill="none" stroke="#1a1d24" stroke-width="5"/>
  <!-- interior walls (four rooms) -->
  <line x1="600" y1="120" x2="600" y2="520" stroke="#1a1d24" stroke-width="4"/>
  <line x1="180" y1="320" x2="1020" y2="320" stroke="#1a1d24" stroke-width="4"/>
  <!-- doorway gaps -->
  <rect x="585" y="200" width="30" height="46" fill="#fdfaf2"/>
  <rect x="585" y="400" width="30" height="46" fill="#fdfaf2"/>

  <!-- beacon pucks, one per room, with ranging rings -->
  <g>
    <circle cx="360" cy="210" r="74" fill="#6a4c93" fill-opacity="0.07"/>
    <circle cx="360" cy="210" r="48" fill="#6a4c93" fill-opacity="0.11"/>
    <circle cx="360" cy="210" r="13" fill="#6a4c93"/>
  </g>
  <g>
    <circle cx="800" cy="210" r="74" fill="#6a4c93" fill-opacity="0.07"/>
    <circle cx="800" cy="210" r="48" fill="#6a4c93" fill-opacity="0.11"/>
    <circle cx="800" cy="210" r="13" fill="#6a4c93"/>
  </g>
  <g>
    <circle cx="360" cy="430" r="74" fill="#6a4c93" fill-opacity="0.07"/>
    <circle cx="360" cy="430" r="48" fill="#6a4c93" fill-opacity="0.11"/>
    <circle cx="360" cy="430" r="13" fill="#6a4c93"/>
  </g>
  <g>
    <circle cx="800" cy="430" r="74" fill="#6a4c93" fill-opacity="0.07"/>
    <circle cx="800" cy="430" r="48" fill="#6a4c93" fill-opacity="0.11"/>
    <circle cx="800" cy="430" r="13" fill="#6a4c93"/>
  </g>

  <!-- a phone in the lower-left room, "present" -->
  <g transform="translate(300 410) rotate(-12)">
    <rect x="0" y="0" width="64" height="120" rx="12" fill="#1a1d24"/>
    <rect x="6" y="14" width="52" height="86" rx="3" fill="#f3eee0"/>
    <circle cx="32" cy="110" r="5" fill="#5b616b"/>
    <circle cx="32" cy="57" r="11" fill="#3a7d44"/>
  </g>
</svg>
