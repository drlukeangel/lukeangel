<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-label="2015 scorecard">
  <rect width="760" height="420" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="48" font-size="20" fill="#1a1d24" font-weight="600">2015 — predicted vs. shipped</text>
    <text x="40" y="74" font-size="13" fill="#7a808c">~75% accuracy by my count</text>

    <!-- legend -->
    <g transform="translate(470,38)" font-size="12">
      <circle cx="8" cy="-4" r="7" fill="#3a7d44"/><text x="22" y="0" fill="#5b616b">hit</text>
      <circle cx="78" cy="-4" r="7" fill="#e0a92e"/><text x="92" y="0" fill="#5b616b">half</text>
      <circle cx="160" cy="-4" r="7" fill="#c14a3a"/><text x="174" y="0" fill="#5b616b">miss</text>
    </g>

    <!-- rows -->
    <g font-size="14">
      <!-- Apple Watch HIT -->
      <g transform="translate(40,110)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Apple Watch + Pebble Time</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">~12M Watch units in 9 months — a real category</text>
      </g>
      <!-- Echo HIT -->
      <g transform="translate(40,162)">
        <rect width="680" height="44" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="26" cy="22" r="11" fill="#3a7d44"/>
        <path d="M21 22 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Amazon Echo — voice on the counter</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">&gt;2.5M units; bigger than predicted</text>
      </g>
      <!-- Fitbit HALF -->
      <g transform="translate(40,214)">
        <rect width="680" height="44" rx="6" fill="#e0a92e" fill-opacity="0.10" stroke="#e0a92e" stroke-opacity="0.5"/>
        <circle cx="26" cy="22" r="11" fill="#e0a92e"/>
        <rect x="20" y="20.5" width="12" height="3" rx="1.5" fill="#fff"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Wearables — fitness yes, medical no</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">Fitbit IPO $4.1B; FDA-cleared still 18+ mo out</text>
      </g>
      <!-- Nest HALF -->
      <g transform="translate(40,266)">
        <rect width="680" height="44" rx="6" fill="#e0a92e" fill-opacity="0.10" stroke="#e0a92e" stroke-opacity="0.5"/>
        <circle cx="26" cy="22" r="11" fill="#e0a92e"/>
        <rect x="20" y="20.5" width="12" height="3" rx="1.5" fill="#fff"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Nest — shipped Cam, platform stalled</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">One product; engineers bled; Alphabet limbo</text>
      </g>
      <!-- Standards MISS -->
      <g transform="translate(40,318)">
        <rect width="680" height="44" rx="6" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-opacity="0.45"/>
        <circle cx="26" cy="22" r="11" fill="#c14a3a"/>
        <path d="M21 17 l10 10 M31 17 l-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <text x="52" y="20" fill="#1a1d24" font-weight="600">Smart-home standard — went nowhere</text>
        <text x="52" y="37" fill="#5b616b" font-size="12">ZigBee · Z-Wave · Thread · HomeKit · Brillo/Weave</text>
      </g>
    </g>
    <text x="40" y="394" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">The misses cluster on standards — always optimistic, always wrong.</text>
  </g>
</svg>
