<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2020 predictions cover">
  <defs>
    <pattern id="dots20" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots20)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- central body silhouette wearing a sensor array -->
  <g transform="translate(600,315)">
    <g fill="#0066cc" fill-opacity="0.12" stroke="#0066cc" stroke-width="3">
      <circle cx="0" cy="-150" r="50"/>
      <path d="M-66 -82 q66 -38 132 0 l20 192 q-86 30 -172 0 z"/>
      <path d="M-66 -74 l-58 138 M66 -74 l58 138"/>
      <path d="M-38 110 l-22 188 M38 110 l22 188"/>
    </g>

    <!-- sensor nodes with concentric signal rings -->
    <!-- ear -->
    <g transform="translate(44,-160)">
      <circle r="11" fill="#0066cc"/>
      <circle r="24" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.55"/>
      <circle r="38" fill="none" stroke="#0066cc" stroke-width="2" stroke-opacity="0.3"/>
    </g>
    <!-- wrist -->
    <g transform="translate(-118,40)">
      <circle r="11" fill="#0066cc"/>
      <circle r="24" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.55"/>
      <circle r="38" fill="none" stroke="#0066cc" stroke-width="2" stroke-opacity="0.3"/>
    </g>
    <!-- finger -->
    <g transform="translate(-55,300)">
      <circle r="9" fill="#0066cc"/>
      <circle r="20" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.55"/>
    </g>
    <!-- skin / abdomen patch -->
    <g transform="translate(40,-8)">
      <circle r="11" fill="#0066cc"/>
      <circle r="24" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.55"/>
      <circle r="38" fill="none" stroke="#0066cc" stroke-width="2" stroke-opacity="0.3"/>
    </g>
  </g>

  <!-- a cloud the body's signals rise to, upper right, abstract -->
  <g transform="translate(940,150)" fill="none" stroke="#0066cc" stroke-width="3" stroke-opacity="0.7">
    <path d="M0 40 a34 34 0 0 1 30 -52 a40 40 0 0 1 74 12 a30 30 0 0 1 4 60 h-96 a26 26 0 0 1 -12 -20 z"/>
  </g>
  <g stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.4" stroke-dasharray="3 9" fill="none">
    <path d="M690 160 q140 -30 250 30"/>
  </g>

  <!-- small forward-tick marks suggesting a year/forecast timeline along the base -->
  <g stroke="#0066cc" stroke-width="3" stroke-opacity="0.5">
    <line x1="120" y1="585" x2="120" y2="565"/>
    <line x1="260" y1="585" x2="260" y2="572"/>
    <line x1="400" y1="585" x2="400" y2="572"/>
    <line x1="1080" y1="585" x2="1080" y2="565"/>
  </g>
  <line x1="100" y1="585" x2="1100" y2="585" stroke="#0066cc" stroke-width="2.5" stroke-opacity="0.35"/>
</svg>
