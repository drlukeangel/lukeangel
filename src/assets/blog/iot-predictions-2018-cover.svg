<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A forecast line crossing from solid past into a dotted year ahead, over connected-home device silhouettes.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="pr-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#pr-dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- the "now" boundary: solid past on the left, forecast future on the right -->
  <line x1="640" y1="90" x2="640" y2="470" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.18"/>

  <!-- the forecast trend: rising solid line that continues as a dotted projection -->
  <g transform="translate(110,120)">
    <!-- solid: what happened -->
    <path d="M0 300 L120 270 L240 286 L360 232 L480 246 L530 196"
          fill="none" stroke="#0066cc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- the "you are here" node at the boundary -->
    <circle cx="530" cy="196" r="11" fill="#0066cc" stroke="#1a1d24" stroke-width="4"/>
    <!-- dotted: the projection forward -->
    <path d="M530 196 L660 150 L790 162 L900 110"
          fill="none" stroke="#0066cc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="2 16" opacity="0.85"/>
    <!-- arrowhead on the projection -->
    <path d="M900 110 l -26 4 l 16 18 z" fill="#0066cc"/>
    <!-- faint confidence cone widening into the future -->
    <path d="M530 196 L900 70 L900 150 Z" fill="#0066cc" opacity="0.05"/>
    <path d="M530 196 L900 150 L900 220 Z" fill="#0066cc" opacity="0.05"/>
  </g>

  <!-- ===== connected-home device silhouettes along the baseline ===== -->
  <!-- smart speaker (cylinder) -->
  <g transform="translate(250,430)">
    <rect x="0" y="0" width="92" height="150" rx="46" fill="#fff" stroke="#1a1d24" stroke-width="6"/>
    <ellipse cx="46" cy="24" rx="46" ry="16" fill="#eef2f7" stroke="#1a1d24" stroke-width="6"/>
    <!-- speaker grille dots -->
    <g fill="#1a1d24" opacity="0.25">
      <circle cx="30" cy="74" r="3"/><circle cx="46" cy="74" r="3"/><circle cx="62" cy="74" r="3"/>
      <circle cx="30" cy="92" r="3"/><circle cx="46" cy="92" r="3"/><circle cx="62" cy="92" r="3"/>
      <circle cx="30" cy="110" r="3"/><circle cx="46" cy="110" r="3"/><circle cx="62" cy="110" r="3"/>
    </g>
    <!-- listening glow ring on top -->
    <ellipse cx="46" cy="24" rx="30" ry="10" fill="none" stroke="#0066cc" stroke-width="4" opacity="0.8"/>
  </g>

  <!-- smart display (screen on a wedge stand) -->
  <g transform="translate(470,430)">
    <rect x="0" y="0" width="190" height="128" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="6"/>
    <rect x="16" y="16" width="158" height="96" rx="4" fill="#0066cc" opacity="0.18" stroke="#1a1d24" stroke-width="3"/>
    <!-- wedge stand -->
    <path d="M30 128 L160 128 L178 150 L12 150 Z" fill="#eef2f7" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- video doorbell (rounded tall puck with camera + button) -->
  <g transform="translate(740,420)">
    <rect x="0" y="0" width="74" height="150" rx="20" fill="#fff" stroke="#1a1d24" stroke-width="6"/>
    <circle cx="37" cy="44" r="17" fill="#1a1d24"/>
    <circle cx="37" cy="44" r="7" fill="#eef2f7"/>
    <circle cx="37" cy="108" r="14" fill="#0066cc" opacity="0.85" stroke="#1a1d24" stroke-width="5"/>
  </g>

  <!-- a wrist-wearable silhouette (watch), the health thread -->
  <g transform="translate(900,450)">
    <rect x="6" y="22" width="78" height="96" rx="22" fill="#fff" stroke="#1a1d24" stroke-width="6"/>
    <rect x="20" y="36" width="50" height="68" rx="10" fill="#0066cc" opacity="0.18" stroke="#1a1d24" stroke-width="3"/>
    <!-- straps -->
    <path d="M30 22 L26 -2 L64 -2 L60 22 Z" fill="#eef2f7" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
    <path d="M30 118 L26 142 L64 142 L60 118 Z" fill="#eef2f7" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
    <!-- a faint heart-rate tick on the face -->
    <path d="M28 70 L40 70 L46 58 L54 82 L60 70 L72 70" fill="none" stroke="#0066cc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
</svg>
