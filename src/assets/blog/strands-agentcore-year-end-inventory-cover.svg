<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A layered agent platform with team-shape choices routing to a stack.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="sa-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#sa-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- LEFT: a column of team-shape choices (rounded chips, varied widths) -->
  <g>
    <rect x="92" y="150" width="190" height="46" rx="23" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="92" y="214" width="150" height="46" rx="23" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="92" y="278" width="210" height="46" rx="23" fill="#4f46b8" fill-opacity="0.14" stroke="#4f46b8" stroke-width="3"/>
    <rect x="92" y="342" width="168" height="46" rx="23" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="92" y="406" width="196" height="46" rx="23" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- small dot marker inside each chip -->
    <circle cx="116" cy="173" r="6" fill="#1a1d24" opacity="0.25"/>
    <circle cx="116" cy="237" r="6" fill="#1a1d24" opacity="0.25"/>
    <circle cx="116" cy="301" r="6" fill="#4f46b8"/>
    <circle cx="116" cy="365" r="6" fill="#1a1d24" opacity="0.25"/>
    <circle cx="116" cy="429" r="6" fill="#1a1d24" opacity="0.25"/>
  </g>

  <!-- routing lines from the chips converging toward the stack; the highlighted one is indigo -->
  <g fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.4">
    <path d="M282 173 C360 173 360 300 470 300"/>
    <path d="M242 237 C360 237 360 308 470 308"/>
    <path d="M260 365 C360 365 360 316 470 316"/>
    <path d="M288 429 C360 429 360 324 470 324"/>
  </g>
  <path d="M302 301 C400 301 400 301 470 301" fill="none" stroke="#4f46b8" stroke-width="4"/>
  <path d="M470 301 l-16 -8 v16 z" fill="#4f46b8"/>

  <!-- CENTER/RIGHT: the three-layer stack -->
  <g>
    <!-- top layer: SDK / orchestration (three interchangeable slots, one highlighted) -->
    <rect x="500" y="150" width="560" height="92" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="524" y="172" width="150" height="48" rx="9" fill="#4f46b8" fill-opacity="0.16" stroke="#4f46b8" stroke-width="3"/>
    <rect x="700" y="172" width="150" height="48" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="6 4"/>
    <rect x="876" y="172" width="150" height="48" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="6 4"/>

    <!-- connector -->
    <line x1="780" y1="242" x2="780" y2="266" stroke="#1a1d24" stroke-width="3"/>

    <!-- middle layer: managed runtime (single solid bar) -->
    <rect x="500" y="266" width="560" height="74" rx="14" fill="#4f46b8" fill-opacity="0.10" stroke="#4f46b8" stroke-width="4"/>
    <g stroke="#4f46b8" stroke-width="3" fill="none">
      <circle cx="556" cy="303" r="15"/>
      <path d="M556 290 v26 M543 303 h26"/>
    </g>

    <!-- connector -->
    <line x1="780" y1="340" x2="780" y2="366" stroke="#1a1d24" stroke-width="3"/>

    <!-- bottom layer: four pluggable managed services as separate blocks -->
    <g>
      <rect x="500" y="366" width="128" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
      <rect x="644" y="366" width="128" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
      <rect x="788" y="366" width="128" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
      <rect x="932" y="366" width="128" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
      <!-- a distinct simple icon in each block -->
      <!-- memory: stacked bars -->
      <g stroke="#1a1d24" stroke-width="3" fill="none"><ellipse cx="564" cy="400" rx="26" ry="8"/><path d="M538 400 v22 a26 8 0 0 0 52 0 v-22"/></g>
      <!-- gateway: archway -->
      <path d="M684 432 v-30 a24 24 0 0 1 48 0 v30" fill="none" stroke="#1a1d24" stroke-width="3"/>
      <!-- identity: key -->
      <g stroke="#1a1d24" stroke-width="3" fill="none"><circle cx="840" cy="398" r="11"/><path d="M850 406 l16 16 M860 416 l8 -8 M854 422 l8 -8"/></g>
      <!-- observability: waveform -->
      <path d="M958 410 l14 -14 12 28 14 -34 12 20 14 0" fill="none" stroke="#1a1d24" stroke-width="3" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- model side-note: a small chip off to the side reached by a dashed line (orthogonal model layer) -->
  <g>
    <line x1="780" y1="476" x2="780" y2="512" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.6"/>
    <rect x="690" y="512" width="180" height="58" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g stroke="#1a1d24" stroke-width="2.5" fill="none" opacity="0.85">
      <circle cx="730" cy="541" r="7"/><circle cx="772" cy="527" r="6"/><circle cx="772" cy="555" r="6"/><circle cx="812" cy="541" r="7"/>
      <line x1="737" y1="538" x2="766" y2="529"/><line x1="737" y1="544" x2="766" y2="553"/><line x1="778" y1="527" x2="805" y2="538"/><line x1="778" y1="555" x2="805" y2="544"/>
    </g>
  </g>
</svg>
