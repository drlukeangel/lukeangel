<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="BLE duty cycle vs battery life">
  <rect width="1000" height="460" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <text x="60" y="44" font-size="15" fill="#5b616b">from one CR2032 coin cell · the duty cycle sets the life, not peak transmit power</text>

    <!-- ROW 1: advertising 1 Hz -->
    <g transform="translate(60 80)">
      <text x="0" y="14" font-size="14">advertising · 1 Hz</text>
      <!-- radio blips: short, far apart -->
      <g fill="#6a4c93">
        <rect x="210" y="0" width="6" height="30"/>
        <rect x="320" y="0" width="6" height="30"/>
        <rect x="430" y="0" width="6" height="30"/>
        <rect x="540" y="0" width="6" height="30"/>
        <rect x="650" y="0" width="6" height="30"/>
      </g>
      <line x1="200" y1="30" x2="700" y2="30" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
      <text x="730" y="12" font-size="13" fill="#5b616b">~10 µA</text>
      <text x="730" y="30" font-size="15" fill="#3a7d44">~2 years</text>
    </g>

    <!-- ROW 2: connection 1s -->
    <g transform="translate(60 180)">
      <text x="0" y="14" font-size="14">connection · 1 s</text>
      <g fill="#6a4c93">
        <rect x="210" y="0" width="7" height="30"/><rect x="265" y="0" width="7" height="30"/><rect x="320" y="0" width="7" height="30"/>
        <rect x="375" y="0" width="7" height="30"/><rect x="430" y="0" width="7" height="30"/><rect x="485" y="0" width="7" height="30"/>
        <rect x="540" y="0" width="7" height="30"/><rect x="595" y="0" width="7" height="30"/><rect x="650" y="0" width="7" height="30"/>
      </g>
      <line x1="200" y1="30" x2="700" y2="30" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
      <text x="730" y="12" font-size="13" fill="#5b616b">~30 µA</text>
      <text x="730" y="30" font-size="15" fill="#6a4c93">~10 months</text>
    </g>

    <!-- ROW 3: connection 100ms (responsive) -->
    <g transform="translate(60 280)">
      <text x="0" y="14" font-size="14">connection · 100 ms</text>
      <g fill="#6a4c93">
        <!-- dense blips -->
        <rect x="200" y="0" width="8" height="30"/><rect x="222" y="0" width="8" height="30"/><rect x="244" y="0" width="8" height="30"/><rect x="266" y="0" width="8" height="30"/>
        <rect x="288" y="0" width="8" height="30"/><rect x="310" y="0" width="8" height="30"/><rect x="332" y="0" width="8" height="30"/><rect x="354" y="0" width="8" height="30"/>
        <rect x="376" y="0" width="8" height="30"/><rect x="398" y="0" width="8" height="30"/><rect x="420" y="0" width="8" height="30"/><rect x="442" y="0" width="8" height="30"/>
        <rect x="464" y="0" width="8" height="30"/><rect x="486" y="0" width="8" height="30"/><rect x="508" y="0" width="8" height="30"/><rect x="530" y="0" width="8" height="30"/>
        <rect x="552" y="0" width="8" height="30"/><rect x="574" y="0" width="8" height="30"/><rect x="596" y="0" width="8" height="30"/><rect x="618" y="0" width="8" height="30"/>
        <rect x="640" y="0" width="8" height="30"/><rect x="662" y="0" width="8" height="30"/><rect x="684" y="0" width="8" height="30"/>
      </g>
      <line x1="200" y1="30" x2="700" y2="30" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
      <text x="730" y="12" font-size="13" fill="#5b616b">~200 µA</text>
      <text x="730" y="30" font-size="15" fill="#c14a3a">~6 weeks</text>
    </g>

    <text x="60" y="400" font-size="13" fill="#5b616b">a door sensor advertises (sips); a lock opens a connection only when it has to (gulps)</text>
  </g>
</svg>
