<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" width="1040" height="560" role="img" aria-label="Five smart-home eras as stacked strata">
  <rect x="0.5" y="0.5" width="1039" height="559" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .era{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;font-weight:700;fill:#1a1d24}
    .yr{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#6a4c93}
    .d{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;fill:#5b616b}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b}
  </style>

  <!-- A wedge that narrows toward the top: older eras wider at the base. Left column = labels. -->
  <!-- Era 5 (roof, top) -->
  <path d="M300 70 L520 40 L740 70 V120 H300 Z" fill="#6a4c93" fill-opacity="0.14" stroke="#1a1d24" stroke-width="2" stroke-linejoin="round"/>
  <text x="60" y="92" class="era">Era 5</text>
  <text x="60" y="112" class="yr">2023 — now</text>
  <text x="760" y="88" class="d">new house · multi-hub · Matter bridges</text>
  <text x="760" y="108" class="d">several ecosystems cooperating</text>

  <!-- Era 4 -->
  <rect x="280" y="124" width="480" height="74" fill="#6a4c93" fill-opacity="0.06" stroke="#1a1d24" stroke-width="2"/>
  <text x="60" y="156" class="era">Era 4</text>
  <text x="60" y="176" class="yr">2020 — 2023</text>
  <text x="760" y="152" class="d">cameras · Coral · alarm panel</text>
  <text x="760" y="172" class="d">house as an operations system</text>

  <!-- Era 3 -->
  <rect x="260" y="202" width="520" height="74" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/>
  <text x="60" y="234" class="era">Era 3</text>
  <text x="60" y="254" class="yr">2017 — 2020</text>
  <text x="760" y="230" class="d">Home Assistant · local execution</text>
  <text x="760" y="250" class="d">decisions made in the house</text>

  <!-- Era 2 -->
  <rect x="240" y="280" width="560" height="74" fill="#6a4c93" fill-opacity="0.06" stroke="#1a1d24" stroke-width="2"/>
  <text x="60" y="312" class="era">Era 2</text>
  <text x="60" y="332" class="yr">2014 — 2017</text>
  <text x="760" y="308" class="d">SmartThings hub-of-hubs</text>
  <text x="760" y="328" class="d">cloud-mediated — broke offline</text>

  <!-- Era 1 (base, widest) -->
  <rect x="220" y="358" width="600" height="86" fill="#6a4c93" fill-opacity="0.08" stroke="#1a1d24" stroke-width="2"/>
  <text x="60" y="396" class="era">Era 1</text>
  <text x="60" y="416" class="yr">2012 — 2014</text>
  <text x="760" y="392" class="d">single-vendor walled gardens</text>
  <text x="760" y="412" class="d">four apps, none agreeing</text>

  <!-- ground -->
  <line x1="180" y1="450" x2="860" y2="450" stroke="#1a1d24" stroke-width="2.5" opacity="0.5"/>

  <text x="520" y="510" text-anchor="middle" class="cap">You don't migrate a smart home. You accrete one — each era layered on the last, seams still visible.</text>
</svg>
