<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="Same rubric, opposite answers">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">SAME FIVE QUESTIONS — OPPOSITE ANSWERS</text>

  <!-- center divider -->
  <line x1="560" y1="80" x2="560" y2="510" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18" stroke-dasharray="4 6"/>

  <!-- LEFT: connected power tool -->
  <g font-family="ui-monospace,monospace">
    <text x="290" y="100" text-anchor="middle" font-size="16" fill="#1a1d24">CONNECTED POWER TOOL</text>
    <text x="290" y="122" text-anchor="middle" font-size="11.5" fill="#7a808c">$300 · job-site fleet · 20V battery</text>

    <!-- product glyph: drill silhouette as simple block -->
    <g transform="translate(290,165)">
      <rect x="-44" y="-16" width="68" height="32" rx="6" fill="#2a52be" fill-opacity="0.12" stroke="#2a52be" stroke-width="3"/>
      <rect x="-14" y="16" width="20" height="26" rx="4" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
      <line x1="24" y1="0" x2="48" y2="0" stroke="#2a52be" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- answer chips -->
    <g font-size="13" fill="#1a1d24">
      <rect x="120" y="240" width="340" height="40" rx="8" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="2.5"/>
      <text x="290" y="265" text-anchor="middle">BLE + LoRa dual radio</text>
      <rect x="120" y="294" width="340" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="290" y="319" text-anchor="middle">secure element + cert per tool</text>
      <rect x="120" y="348" width="340" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="290" y="373" text-anchor="middle">AWS IoT fleet management</text>
    </g>
    <text x="290" y="430" text-anchor="middle" font-size="11.5" fill="#7a808c">range 200 m · power = wall-equivalent</text>
    <text x="290" y="450" text-anchor="middle" font-size="11.5" fill="#7a808c">security = commercial / fleet-managed</text>
  </g>

  <!-- RIGHT: consumer BLE tracker -->
  <g font-family="ui-monospace,monospace">
    <text x="830" y="100" text-anchor="middle" font-size="16" fill="#1a1d24">CONSUMER BLE TRACKER</text>
    <text x="830" y="122" text-anchor="middle" font-size="11.5" fill="#7a808c">$30 retail · keys/bag tag · CR2032</text>

    <!-- product glyph: tag -->
    <g transform="translate(830,165)">
      <rect x="-26" y="-22" width="52" height="44" rx="12" fill="#2a52be" fill-opacity="0.12" stroke="#2a52be" stroke-width="3"/>
      <circle cx="0" cy="-6" r="6" fill="none" stroke="#2a52be" stroke-width="3"/>
      <circle cx="0" cy="-6" r="14" fill="none" stroke="#2a52be" stroke-width="2" stroke-opacity="0.5"/>
    </g>

    <g font-size="13" fill="#1a1d24">
      <rect x="660" y="240" width="340" height="40" rx="8" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="2.5"/>
      <text x="830" y="265" text-anchor="middle">BLE only — no LoRa, no cellular</text>
      <rect x="660" y="294" width="340" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="830" y="319" text-anchor="middle">crowdsourced finder network</text>
      <rect x="660" y="348" width="340" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="830" y="373" text-anchor="middle">rotating ID · anti-stalking</text>
    </g>
    <text x="830" y="430" text-anchor="middle" font-size="11.5" fill="#7a808c">range 10 m · power = sub-µA, 12 mo+</text>
    <text x="830" y="450" text-anchor="middle" font-size="11.5" fill="#7a808c">security = consumer privacy</text>
  </g>

  <text x="560" y="498" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#3a3f4a">The rubric isn't a recipe — it surfaces the constraints, and the constraints decide.</text>
</svg>
