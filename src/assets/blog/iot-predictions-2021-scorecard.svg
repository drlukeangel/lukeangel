<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" width="1120" height="620" role="img" aria-label="2020 prediction scorecard">
  <rect width="1120" height="620" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">LAST YEAR'S CALLS, GRADED</text>

  <!-- column legend for the verdict glyphs -->
  <g transform="translate(40,70)" font-family="ui-monospace,monospace" font-size="13">
    <g transform="translate(0,0)">
      <circle cx="12" cy="0" r="11" fill="none" stroke="#3a7d44" stroke-width="3"/>
      <path d="M6 0 l4 5 l8 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="5" fill="#5b616b">hit</text>
    </g>
    <g transform="translate(120,0)">
      <circle cx="12" cy="0" r="11" fill="none" stroke="#0066cc" stroke-width="3"/>
      <path d="M12 -11 A 11 11 0 0 1 12 11 Z" fill="#0066cc"/>
      <text x="32" y="5" fill="#5b616b">partial</text>
    </g>
    <g transform="translate(280,0)">
      <circle cx="12" cy="0" r="11" fill="none" stroke="#c14a3a" stroke-width="3"/>
      <path d="M6 -6 l12 12 M18 -6 l-12 12" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"/>
      <text x="32" y="5" fill="#5b616b">missed timing</text>
    </g>
  </g>

  <!-- rows -->
  <g font-family="ui-monospace,monospace" font-size="16" fill="#1a1d24">
    <!-- row template y positions -->
    <!-- 1 -->
    <g transform="translate(40,130)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#3a7d44" stroke-width="3.5"/>
      <path d="M5 0 l5 6 l9 -13" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="6">Apple Watch SE shipped at the price point I called</text>
    </g>
    <line x1="40" y1="158" x2="1080" y2="158" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 2 -->
    <g transform="translate(40,188)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#0066cc" stroke-width="3.5"/>
      <path d="M12 -13 A 13 13 0 0 1 12 13 Z" fill="#0066cc"/>
      <text x="44" y="6">Pandemic IoT surge — right shape, undershot the magnitude</text>
    </g>
    <line x1="40" y1="216" x2="1080" y2="216" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 3 -->
    <g transform="translate(40,246)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#c14a3a" stroke-width="3.5"/>
      <path d="M5 -7 l14 14 M19 -7 l-14 14" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
      <text x="44" y="6">AirTags did not ship — slipped out of the year</text>
    </g>
    <line x1="40" y1="274" x2="1080" y2="274" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 4 -->
    <g transform="translate(40,304)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#3a7d44" stroke-width="3.5"/>
      <path d="M5 0 l5 6 l9 -13" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="6">Project CHIP consumer products still 18+ months out (I said it would slip)</text>
    </g>
    <line x1="40" y1="332" x2="1080" y2="332" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 5 -->
    <g transform="translate(40,362)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#3a7d44" stroke-width="3.5"/>
      <path d="M5 0 l5 6 l9 -13" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="6">Body-as-sensor-array reached the median active user</text>
    </g>
    <line x1="40" y1="390" x2="1080" y2="390" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 6 -->
    <g transform="translate(40,420)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#0066cc" stroke-width="3.5"/>
      <path d="M12 -13 A 13 13 0 0 1 12 13 Z" fill="#0066cc"/>
      <text x="44" y="6">Sonos headphones still don't exist — I called a 2021 ship</text>
    </g>
    <line x1="40" y1="448" x2="1080" y2="448" stroke="#1a1d24" stroke-opacity="0.08" stroke-width="2"/>

    <!-- 7 -->
    <g transform="translate(40,478)">
      <circle cx="12" cy="0" r="13" fill="none" stroke="#3a7d44" stroke-width="3.5"/>
      <path d="M5 0 l5 6 l9 -13" fill="none" stroke="#3a7d44" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="6">Camera consolidation continued — Wyze became the price floor</text>
    </g>
  </g>

  <!-- net score callout -->
  <g transform="translate(40,520)">
    <rect x="0" y="0" width="1040" height="74" rx="10" fill="#0066cc" fill-opacity="0.08" stroke="#0066cc" stroke-width="2"/>
    <text x="24" y="32" font-family="ui-monospace,monospace" font-size="15" fill="#0066cc">NET ~80% — the lowest of the streak</text>
    <text x="24" y="56" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#5b616b">structural calls held; the pandemic broke the predictability of timing</text>
  </g>
</svg>
