<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 420" width="1120" height="420" role="img" aria-label="Triage: is the fleet sick or the infrastructure?">
  <rect width="1120" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">INCIDENT TRIAGE — IS THE FLEET SICK, OR THE INFRASTRUCTURE?</text>

  <!-- entry -->
  <rect x="420" y="78" width="280" height="56" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
  <text x="560" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">something looks wrong</text>
  <text x="560" y="124" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">which dashboard went red?</text>

  <!-- branches -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="none">
    <path d="M560 134 V 168 H 270 V 200"/>
    <path d="M560 134 V 168 H 850 V 200"/>
  </g>
  <g fill="#1a1d24"><path d="M270 204 l-6 -14 h12 z"/><path d="M850 204 l-6 -14 h12 z"/></g>

  <!-- left: fleet sick -->
  <rect x="100" y="204" width="340" height="172" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  <text x="270" y="236" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">DASHBOARD 1 or 2 red</text>
  <text x="270" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8594; the FLEET is sick</text>
  <line x1="132" y1="276" x2="408" y2="276" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="270" y="302" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">device count drop, auth fails,</text>
  <text x="270" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">per-device p99 climbing</text>
  <text x="270" y="350" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">drill down by thing_name</text>

  <!-- right: infra sick -->
  <rect x="680" y="204" width="340" height="172" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="850" y="236" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">DASHBOARD 3 red</text>
  <text x="850" y="258" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8594; the INFRASTRUCTURE is sick</text>
  <line x1="712" y1="276" x2="988" y2="276" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="850" y="302" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">IoT Rule SQL fails, Lambda throttles,</text>
  <text x="850" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">DynamoDB write throttles, Firehose lag</text>
  <text x="850" y="350" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">fix the pipeline, not the devices</text>

  <text x="560" y="400" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">errors-per-device, not errors-per-request &#8212; you ask questions along the device dimension</text>
</svg>
