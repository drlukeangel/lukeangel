<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Automatic water shutoff">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- main inlet pipe across the middle -->
  <rect x="120" y="290" width="960" height="50" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <!-- water inside, left of valve -->
  <rect x="124" y="298" width="430" height="34" rx="4" fill="#6a4c93" fill-opacity="0.22"/>

  <!-- ball valve body in the run -->
  <g transform="translate(600 315)">
    <circle r="56" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <!-- the ball, shown closed (perpendicular bore) -->
    <circle r="34" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="3"/>
    <rect x="-8" y="-34" width="16" height="68" rx="4" fill="#6a4c93" fill-opacity="0.5"/>
    <!-- lever sticking up -->
    <rect x="-7" y="-118" width="14" height="64" rx="5" fill="#1a1d24"/>
  </g>

  <!-- motorized actuator clamped on top, straddling the lever -->
  <g transform="translate(600 175)">
    <rect x="-86" y="-46" width="172" height="84" rx="14" fill="#6a4c93" fill-opacity="0.85"/>
    <rect x="-70" y="-30" width="140" height="52" rx="8" fill="#fdfaf2" fill-opacity="0.25"/>
    <!-- status light -->
    <circle cx="-58" cy="-26" r="7" fill="#3a7d44"/>
    <!-- clamp arms reaching down to the pipe -->
    <rect x="-78" y="36" width="14" height="70" rx="5" fill="#1a1d24" fill-opacity="0.5"/>
    <rect x="64" y="36" width="14" height="70" rx="5" fill="#1a1d24" fill-opacity="0.5"/>
  </g>

  <!-- three floor leak sensors with water puddles -->
  <g>
    <!-- sensor 1 -->
    <g transform="translate(230 470)">
      <rect x="-30" y="-20" width="60" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="0" cy="0" r="7" fill="#6a4c93"/>
      <ellipse cx="0" cy="44" rx="62" ry="14" fill="#6a4c93" fill-opacity="0.2"/>
    </g>
    <!-- sensor 2 wet (alerting) -->
    <g transform="translate(470 500)">
      <rect x="-30" y="-20" width="60" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
      <circle cx="0" cy="0" r="7" fill="#c14a3a"/>
      <ellipse cx="0" cy="44" rx="74" ry="16" fill="#c14a3a" fill-opacity="0.22"/>
      <!-- radio waves -->
      <path d="M34 -14 q22 18 0 40" fill="none" stroke="#c14a3a" stroke-width="3"/>
      <path d="M48 -24 q34 28 0 60" fill="none" stroke="#c14a3a" stroke-width="3" stroke-opacity="0.6"/>
    </g>
    <!-- sensor 3 -->
    <g transform="translate(960 480)">
      <rect x="-30" y="-20" width="60" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="0" cy="0" r="7" fill="#6a4c93"/>
      <ellipse cx="0" cy="44" rx="58" ry="13" fill="#6a4c93" fill-opacity="0.2"/>
    </g>
  </g>
</svg>
