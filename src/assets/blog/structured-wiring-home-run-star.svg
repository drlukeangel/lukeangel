<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Home-run star wiring topology">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24" text-anchor="middle">

    <text x="500" y="34" font-size="15" fill="#6a4c93">every drop home-runs to one closet — a star, not a daisy chain</text>

    <!-- central closet -->
    <g transform="translate(500 250)">
      <rect x="-90" y="-46" width="180" height="92" rx="12" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="3"/>
      <text x="0" y="-18" font-size="13" fill="#6a4c93">basement closet</text>
      <text x="0" y="2" font-size="11" fill="#5b616b">UniFi 24-port PoE</text>
      <text x="0" y="20" font-size="11" fill="#5b616b">patch panel + UDM Pro</text>
      <text x="0" y="38" font-size="11" fill="#5b616b">HA Yellow · NAS</text>
    </g>

    <!-- spokes to room drops -->
    <!-- top-left rooms -->
    <path d="M430 215 L180 110" stroke="#6a4c93" stroke-width="2" marker-end="url(#s)"/>
    <g transform="translate(110 92)"><rect x="-90" y="-22" width="180" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="-2" font-size="11">living / bedrooms</text><text x="0" y="14" font-size="10" fill="#5b616b">TV, dashboards — 42 Cat6</text></g>

    <!-- mid-left -->
    <path d="M410 250 L180 250" stroke="#6a4c93" stroke-width="2" marker-end="url(#s)"/>
    <g transform="translate(110 250)"><rect x="-90" y="-22" width="180" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="0" y="-2" font-size="11">kitchen / office</text><text x="0" y="14" font-size="10" fill="#5b616b">fridge, VC camera</text></g>

    <!-- bottom-left cameras -->
    <path d="M430 285 L180 390" stroke="#3a7d44" stroke-width="2" marker-end="url(#s2)"/>
    <g transform="translate(110 408)"><rect x="-90" y="-22" width="180" height="44" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/><text x="0" y="-2" font-size="11">6 PoE cameras</text><text x="0" y="14" font-size="10" fill="#5b616b">power + data, one cable</text></g>

    <!-- right: backbone to sub-hubs -->
    <path d="M590 220 L820 120" stroke="#6a4c93" stroke-width="3" marker-end="url(#s)"/>
    <text x="730" y="158" font-size="10" fill="#5b616b">backbone</text>
    <g transform="translate(890 102)"><rect x="-90" y="-22" width="180" height="44" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/><text x="0" y="-2" font-size="11">2nd-floor sub-hub</text><text x="0" y="14" font-size="10" fill="#5b616b">fans out upstairs</text></g>

    <path d="M590 280 L820 380" stroke="#6a4c93" stroke-width="3" marker-end="url(#s)"/>
    <g transform="translate(890 398)"><rect x="-90" y="-22" width="180" height="44" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/><text x="0" y="-2" font-size="11">garage sub-hub</text><text x="0" y="14" font-size="10" fill="#5b616b">EV, workshop</text></g>

    <!-- attic antenna -->
    <path d="M530 205 L600 120" stroke="#c87533" stroke-width="2" marker-end="url(#s3)"/>
    <g transform="translate(600 96)"><rect x="-70" y="-20" width="140" height="40" rx="8" fill="#fdfaf2" stroke="#c87533" stroke-width="2"/><text x="0" y="4" font-size="11">attic LoRa antenna</text></g>

    <text x="500" y="466" font-size="12" fill="#5b616b">3 backbone runs feed sub-hubs; everything else terminates on the closet patch panel</text>

    <defs>
      <marker id="s" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#6a4c93"/></marker>
      <marker id="s2" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#3a7d44"/></marker>
      <marker id="s3" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#c87533"/></marker>
    </defs>
  </g>
</svg>
