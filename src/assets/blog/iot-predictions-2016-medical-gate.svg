<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="medical gate timeline">
  <rect width="760" height="320" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="19" fill="#1a1d24" font-weight="600">The medical gate is regulatory, not technical</text>
    <text x="40" y="68" font-size="12" fill="#7a808c">why "FDA-cleared on the wrist" stays ~18 months out</text>

    <!-- timeline -->
    <line x1="70" y1="180" x2="700" y2="180" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>

    <!-- ticks -->
    <g font-size="12" fill="#5b616b" text-anchor="middle">
      <line x1="120" y1="172" x2="120" y2="188" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <text x="120" y="210">2016</text>
      <line x1="410" y1="172" x2="410" y2="188" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <text x="410" y="210">2017</text>
      <line x1="660" y1="172" x2="660" y2="188" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <text x="660" y="210">2018+</text>
    </g>

    <!-- announce marker (now) -->
    <circle cx="150" cy="180" r="9" fill="#0066cc"/>
    <text x="150" y="140" font-size="12" fill="#1a1d24" text-anchor="middle" font-weight="600">announce</text>
    <text x="150" y="120" font-size="11" fill="#7a808c" text-anchor="middle">ECG · blood-O2</text>
    <line x1="150" y1="148" x2="150" y2="171" stroke="#0066cc" stroke-width="1.5"/>

    <!-- regulatory span bar -->
    <rect x="160" y="232" width="430" height="26" rx="6" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-opacity="0.5"/>
    <text x="375" y="250" font-size="12" fill="#c14a3a" text-anchor="middle">510(k) submission · clinical evidence · review</text>

    <!-- ship marker -->
    <circle cx="600" cy="180" r="9" fill="#3a7d44"/>
    <text x="600" y="140" font-size="12" fill="#1a1d24" text-anchor="middle" font-weight="600">cleared + shipping</text>
    <line x1="600" y1="148" x2="600" y2="171" stroke="#3a7d44" stroke-width="1.5"/>

    <!-- gap bracket -->
    <path d="M150 100 q0 -16 16 -16 h268 q16 0 16 16" fill="none" stroke="#7a808c" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="316" y="78" font-size="12" fill="#5b616b" text-anchor="middle">~18 months of paperwork, not silicon</text>

    <text x="40" y="298" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">Apple Watch can announce health sensors in 2016 and still ship nothing FDA-cleared this year.</text>
  </g>
</svg>
