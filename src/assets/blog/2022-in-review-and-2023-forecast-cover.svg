<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Year-end pivot">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- LEFT: the scorecard column (checks + one cross) -->
  <g transform="translate(150,140)">
    <rect x="-30" y="-40" width="320" height="380" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- rows of mark + bar -->
    <g>
      <!-- hit -->
      <circle cx="20" cy="20" r="18" fill="#3a7d44"/><path d="M11 20 l6 7 l12 -15" stroke="#fdfaf2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="56" y="10" width="190" height="18" rx="9" fill="#1a1d24" fill-opacity="0.12"/>
      <!-- hit -->
      <circle cx="20" cy="80" r="18" fill="#3a7d44"/><path d="M11 80 l6 7 l12 -15" stroke="#fdfaf2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="56" y="70" width="160" height="18" rx="9" fill="#1a1d24" fill-opacity="0.12"/>
      <!-- miss -->
      <circle cx="20" cy="140" r="18" fill="#c14a3a"/><path d="M13 133 l14 14 M27 133 l-14 14" stroke="#fdfaf2" stroke-width="4" stroke-linecap="round"/>
      <rect x="56" y="130" width="200" height="18" rx="9" fill="#1a1d24" fill-opacity="0.12"/>
      <!-- hit -->
      <circle cx="20" cy="200" r="18" fill="#3a7d44"/><path d="M11 200 l6 7 l12 -15" stroke="#fdfaf2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="56" y="190" width="175" height="18" rx="9" fill="#1a1d24" fill-opacity="0.12"/>
      <!-- hit -->
      <circle cx="20" cy="260" r="18" fill="#3a7d44"/><path d="M11 260 l6 7 l12 -15" stroke="#fdfaf2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="56" y="250" width="150" height="18" rx="9" fill="#1a1d24" fill-opacity="0.12"/>
    </g>
  </g>

  <!-- arrow pivot -->
  <g transform="translate(500,315)" stroke="#6a4c93" stroke-width="6" fill="#6a4c93">
    <line x1="0" y1="0" x2="70" y2="0"/>
    <path d="M70 -12 l24 12 l-24 12 z"/>
  </g>

  <!-- RIGHT: house-plan foundation / framing lines -->
  <g transform="translate(660,150)">
    <!-- foundation outline -->
    <rect x="0" y="40" width="420" height="300" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <!-- interior walls -->
    <g stroke="#1a1d24" stroke-width="2" stroke-opacity="0.55">
      <line x1="170" y1="40" x2="170" y2="340"/>
      <line x1="170" y1="190" x2="420" y2="190"/>
      <line x1="0" y1="240" x2="170" y2="240"/>
    </g>
    <!-- studs along top edge -->
    <g stroke="#6a4c93" stroke-width="2.5" stroke-opacity="0.7">
      <line x1="30" y1="40" x2="30" y2="14"/><line x1="70" y1="40" x2="70" y2="14"/>
      <line x1="110" y1="40" x2="110" y2="14"/><line x1="150" y1="40" x2="150" y2="14"/>
      <line x1="210" y1="40" x2="210" y2="14"/><line x1="250" y1="40" x2="250" y2="14"/>
      <line x1="290" y1="40" x2="290" y2="14"/><line x1="330" y1="40" x2="330" y2="14"/>
      <line x1="370" y1="40" x2="370" y2="14"/>
    </g>
    <!-- Cat6 drop markers (small purple dots in rooms) -->
    <g fill="#6a4c93">
      <circle cx="80" cy="120" r="7"/><circle cx="290" cy="110" r="7"/>
      <circle cx="80" cy="290" r="7"/><circle cx="300" cy="270" r="7"/>
      <circle cx="360" cy="130" r="7"/>
    </g>
    <!-- dimension ticks bottom -->
    <g stroke="#7a808c" stroke-width="2">
      <line x1="0" y1="365" x2="420" y2="365"/>
      <line x1="0" y1="358" x2="0" y2="372"/><line x1="420" y1="358" x2="420" y2="372"/>
    </g>
  </g>
</svg>
