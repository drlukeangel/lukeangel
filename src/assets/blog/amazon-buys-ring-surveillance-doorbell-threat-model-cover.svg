<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A doorbell camera's feed rising to a cloud watched by many eyes">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- the doorbell camera, lower-left, pointed at the street -->
  <g transform="translate(150,360)">
    <!-- doorframe edge -->
    <rect x="0" y="-40" width="20" height="240" fill="#1a1d24" fill-opacity="0.08" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- the doorbell body -->
    <rect x="24" y="40" width="60" height="110" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- lens -->
    <circle cx="54" cy="80" r="18" fill="#1a1d24"/>
    <circle cx="54" cy="80" r="8" fill="#6a4c93"/>
    <circle cx="49" cy="75" r="3" fill="#fdfaf2" opacity="0.8"/>
    <!-- button -->
    <circle cx="54" cy="124" r="8" fill="#6a4c93" fill-opacity="0.4" stroke="#1a1d24" stroke-width="2.4"/>
    <!-- field-of-view cone pointing right (at the street) -->
    <path d="M72 80 L240 30 L240 130 Z" fill="#6a4c93" fill-opacity="0.08" stroke="#6a4c93" stroke-width="2" stroke-dasharray="5 5"/>
  </g>

  <!-- feed rising to the cloud -->
  <g stroke="#1a1d24" stroke-width="3.5" fill="#1a1d24">
    <path d="M210 380 C360 300, 480 220, 560 180" fill="none"/>
    <path d="M564 178 l-17 1 l8 14 z"/>
  </g>

  <!-- the cloud (big, central-top) -->
  <g transform="translate(540,90)">
    <path d="M70 150 a44 44 0 0 1 6 -90 a54 54 0 0 1 104 10 a38 38 0 0 1 -4 80 z" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- a recording dot -->
    <circle cx="130" cy="92" r="10" fill="#c14a3a"/>
  </g>

  <!-- many eyes watching the cloud (the "who else gets to watch") -->
  <g transform="translate(820,150)">
    <!-- four eye glyphs fanning out -->
    <g stroke="#1a1d24" stroke-width="3" fill="none">
      <g transform="translate(0,0)"><path d="M-22 0 q22 -20 44 0 q-22 20 -44 0z"/><circle cx="0" cy="0" r="7" fill="#1a1d24"/></g>
      <g transform="translate(70,70)"><path d="M-22 0 q22 -20 44 0 q-22 20 -44 0z"/><circle cx="0" cy="0" r="7" fill="#1a1d24"/></g>
      <g transform="translate(0,140)"><path d="M-22 0 q22 -20 44 0 q-22 20 -44 0z"/><circle cx="0" cy="0" r="7" fill="#1a1d24"/></g>
      <g transform="translate(-60,70)"><path d="M-22 0 q22 -20 44 0 q-22 20 -44 0z"/><circle cx="0" cy="0" r="7" fill="#c14a3a"/></g>
    </g>
  </g>
  <!-- dashed sightlines from cloud to the eyes -->
  <g stroke="#7a808c" stroke-width="2" opacity="0.5" stroke-dasharray="3 6">
    <line x1="700" y1="180" x2="800" y2="150"/>
    <line x1="710" y1="200" x2="880" y2="220"/>
    <line x1="700" y1="210" x2="810" y2="290"/>
    <line x1="700" y1="200" x2="752" y2="220"/>
  </g>
</svg>
