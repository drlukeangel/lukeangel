<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" width="1120" height="480" role="img" aria-label="OTA effort was lower on v2 yet got deferred, inverting the right call.">
  <rect width="1120" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">OTA EFFORT vs. WHEN I CHOSE TO SHIP IT</text>

  <!-- two effort bars on the left -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <!-- axis -->
    <line x1="120" y1="120" x2="120" y2="380" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="120" y1="380" x2="470" y2="380" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <text x="60" y="120" font-size="11" fill="#7a808c">engineer-months</text>

    <!-- v1 bar: ~18 mo, tall -->
    <rect x="170" y="148" width="90" height="232" rx="4" fill="#5b616b" fill-opacity="0.5" stroke="#5b616b" stroke-width="2.5"/>
    <text x="215" y="138" text-anchor="middle" font-size="14" fill="#1a1d24">~18 mo</text>
    <text x="215" y="402" text-anchor="middle" font-size="13" fill="#5b616b">v1: BLE through phone</text>

    <!-- v2 bar: ~4 mo, short -->
    <rect x="330" y="328" width="90" height="52" rx="4" fill="#2a52be" fill-opacity="0.35" stroke="#2a52be" stroke-width="2.5"/>
    <text x="375" y="318" text-anchor="middle" font-size="14" fill="#1a1d24">~4 mo</text>
    <text x="375" y="402" text-anchor="middle" font-size="13" fill="#2a52be">v2: WiFi direct + jobs</text>
  </g>

  <!-- the inversion arrow -->
  <g transform="translate(560,250)">
    <path d="M-30 0 l60 0" stroke="#c14a3a" stroke-width="3" fill="none"/>
    <path d="M30 0 l-10 -6 l0 12 z" fill="#c14a3a"/>
    <text x="0" y="-18" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#c14a3a">easier &#8212; so I</text>
    <text x="0" y="30" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#c14a3a">undervalued it</text>
  </g>

  <!-- right: timeline of when shipped vs when needed -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <line x1="660" y1="250" x2="1060" y2="250" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <!-- deferred point -->
    <circle cx="700" cy="250" r="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <text x="700" y="230" text-anchor="middle" font-size="12" fill="#1a1d24">Q4 &#8217;23</text>
    <text x="700" y="284" text-anchor="middle" font-size="11" fill="#c14a3a">deferred</text>
    <!-- bug ships -->
    <circle cx="830" cy="250" r="8" fill="#c14a3a"/>
    <text x="830" y="230" text-anchor="middle" font-size="12" fill="#1a1d24">Q3 &#8217;24</text>
    <text x="830" y="284" text-anchor="middle" font-size="11" fill="#c14a3a">calibration bug</text>
    <text x="830" y="300" text-anchor="middle" font-size="11" fill="#c14a3a">&#8594; fleet-wide RMA</text>
    <!-- finally shipped -->
    <circle cx="980" cy="250" r="9" fill="#2a52be"/>
    <text x="980" y="230" text-anchor="middle" font-size="12" fill="#1a1d24">Q1 &#8217;25</text>
    <text x="980" y="284" text-anchor="middle" font-size="11" fill="#2a52be">OTA finally ships</text>
    <!-- cost bracket between bug and ship -->
    <path d="M838 318 q72 22 134 0" fill="none" stroke="#c14a3a" stroke-width="2" stroke-opacity="0.6"/>
    <text x="905" y="352" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#c14a3a">RMA cost funded the OTA project several times over</text>
  </g>

  <text x="34" y="446" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#5b616b">The lesson wasn&#8217;t &#8220;remember OTA.&#8221; It was: when the implementation is cheap, that&#8217;s a reason to ship it sooner &#8212; not later.</text>
</svg>
