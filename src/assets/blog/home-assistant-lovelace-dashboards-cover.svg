<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Kitchen wall dashboard">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- fridge on the left -->
  <g transform="translate(170 150)">
    <rect x="0" y="0" width="190" height="360" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <line x1="0" y1="150" x2="190" y2="150" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.3"/>
    <rect x="150" y="30" width="12" height="80" rx="6" fill="#1a1d24" fill-opacity="0.4"/>
    <rect x="150" y="180" width="12" height="120" rx="6" fill="#1a1d24" fill-opacity="0.4"/>
  </g>

  <!-- wall-mounted tablet on the right -->
  <g transform="translate(470 130)">
    <!-- mount arm -->
    <rect x="-34" y="180" width="34" height="16" rx="6" fill="#1a1d24" fill-opacity="0.3"/>
    <circle cx="-40" cy="188" r="14" fill="#1a1d24" fill-opacity="0.18"/>
    <!-- bezel -->
    <rect x="0" y="0" width="520" height="380" rx="24" fill="#1a1d24"/>
    <!-- screen -->
    <rect x="22" y="22" width="476" height="336" rx="10" fill="#fdfaf2"/>

    <!-- top row: two glance tiles -->
    <rect x="44" y="44" width="210" height="96" rx="10" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2"/>
    <circle cx="84" cy="78" r="14" fill="#3a7d44"/>
    <circle cx="138" cy="78" r="14" fill="#3a7d44"/>
    <rect x="64" y="106" width="170" height="12" rx="4" fill="#1a1d24" fill-opacity="0.12"/>

    <rect x="266" y="44" width="210" height="96" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.2"/>
    <path d="M300 110 q24 -52 48 0" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <circle cx="408" cy="84" r="18" fill="#6a4c93" fill-opacity="0.5"/>

    <!-- climate list -->
    <rect x="44" y="160" width="432" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.2"/>
    <line x1="64" y1="190" x2="456" y2="190" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <line x1="64" y1="216" x2="456" y2="216" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <line x1="64" y1="242" x2="456" y2="242" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

    <!-- big goodnight button -->
    <rect x="44" y="272" width="432" height="62" rx="14" fill="#2a3f5f"/>
    <circle cx="80" cy="303" r="16" fill="#fdfaf2" fill-opacity="0.85"/>
    <circle cx="86" cy="299" r="13" fill="#2a3f5f"/>
  </g>
</svg>
