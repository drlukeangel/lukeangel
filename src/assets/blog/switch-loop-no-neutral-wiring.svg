<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Switch-loop wiring, no neutral">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- panel, left -->
    <g transform="translate(60 180)">
      <rect x="0" y="0" width="90" height="130" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <text x="45" y="-12" text-anchor="middle" font-size="13" fill="#5b616b">panel</text>
      <line x1="20" y1="24" x2="70" y2="24" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
      <line x1="20" y1="44" x2="70" y2="44" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2"/>
    </g>

    <!-- fixture, top right -->
    <g transform="translate(640 70)">
      <circle cx="0" cy="0" r="34" fill="#c87533" fill-opacity="0.22" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="0" cy="0" r="10" fill="#c87533"/>
      <text x="0" y="-50" text-anchor="middle" font-size="13" fill="#5b616b">fixture (ceiling)</text>
    </g>

    <!-- switch box, bottom right -->
    <g transform="translate(610 300)">
      <rect x="0" y="0" width="120" height="120" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <rect x="44" y="28" width="32" height="64" rx="6" fill="#6a4c93" fill-opacity="0.15" stroke="#1a1d24" stroke-width="2.5"/>
      <rect x="52" y="40" width="16" height="26" rx="3" fill="#6a4c93"/>
      <text x="60" y="-12" text-anchor="middle" font-size="13" fill="#5b616b">switch box</text>
    </g>

    <!-- hot: panel -> fixture -->
    <path d="M150 210 L150 100 L606 100" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <text x="360" y="90" font-size="12" fill="#1a1d24">hot (from panel)</text>

    <!-- 2-wire drop: fixture -> switch -->
    <path d="M652 104 L652 296" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <path d="M668 104 L668 296" fill="none" stroke="#c87533" stroke-width="4" stroke-dasharray="2 6"/>
    <text x="800" y="200" font-size="12" fill="#1a1d24">black + white</text>
    <text x="800" y="218" font-size="11" fill="#c87533">white reused as switched-hot</text>

    <!-- switched-hot return implied; annotate the box -->
    <g transform="translate(610 440)">
      <rect x="-20" y="-22" width="380" height="38" rx="8" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-opacity="0.4" stroke-width="2"/>
      <text x="170" y="2" text-anchor="middle" font-size="13" fill="#c14a3a">box has hot + switched-hot — but NO neutral</text>
    </g>

    <text x="60" y="400" font-size="13" fill="#5b616b" width="400">the load (bulb) is in the ceiling;</text>
    <text x="60" y="420" font-size="13" fill="#5b616b">the switch just interrupts the loop —</text>
    <text x="60" y="440" font-size="13" fill="#1a1d24">so most smart switches can't power themselves here</text>
  </g>
</svg>
