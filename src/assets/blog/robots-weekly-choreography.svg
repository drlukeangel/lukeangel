<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" role="img" aria-label="The weekly Roomba and Braava choreography">
  <rect width="1000" height="430" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .day { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; font-weight: 600; }
    .t { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .key { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #1a1d24; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">THE WEEK — VACUUM (PURPLE) AND MOP (TEAL), SEQUENCED SO THEY NEVER COLLIDE</text>

  <!-- legend -->
  <g transform="translate(620,18)">
    <circle cx="8" cy="8" r="7" fill="#6a4c93" fill-opacity="0.3" stroke="#6a4c93" stroke-width="2"/><text x="22" y="12" class="key">Roomba i7+</text>
    <rect x="120" y="2" width="14" height="12" rx="3" fill="#357a8c" fill-opacity="0.3" stroke="#357a8c" stroke-width="2"/><text x="142" y="12" class="key">Braava jet m6</text>
  </g>

  <!-- weekday row -->
  <g transform="translate(60,80)">
    <text x="0" y="0" class="day">MON–FRI · nobody home</text>
    <!-- timeline bar -->
    <line x1="0" y1="40" x2="820" y2="40" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <!-- 08:30 roomba downstairs -->
    <rect x="40" y="24" width="240" height="32" rx="6" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2"/><text x="52" y="45" class="t">08:30 vacuum downstairs</text>
    <!-- 09:15 braava -->
    <rect x="320" y="24" width="240" height="32" rx="6" fill="#357a8c" fill-opacity="0.16" stroke="#357a8c" stroke-width="2"/><text x="332" y="45" class="t">09:15 mop kitchen+dining+hall</text>
    <!-- 10:00 both return -->
    <rect x="600" y="24" width="180" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.6"/><text x="612" y="45" class="t">10:00 both to base</text>
  </g>

  <!-- saturday row -->
  <g transform="translate(60,180)">
    <text x="0" y="0" class="day">SAT · kids asleep</text>
    <line x1="0" y1="40" x2="820" y2="40" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="40" y="24" width="240" height="32" rx="6" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2"/><text x="52" y="45" class="t">09:00 vacuum upstairs</text>
    <rect x="320" y="24" width="200" height="32" rx="6" fill="#357a8c" fill-opacity="0.16" stroke="#357a8c" stroke-width="2"/><text x="332" y="45" class="t">10:00 mop bathrooms</text>
  </g>

  <!-- sunday row -->
  <g transform="translate(60,280)">
    <text x="0" y="0" class="day">SUN</text>
    <line x1="0" y1="40" x2="820" y2="40" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="40" y="24" width="300" height="32" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.4" stroke-dasharray="6 5"/><text x="52" y="45" class="t">rest day (the robots, anyway)</text>
  </g>

  <text x="500" y="406" text-anchor="middle" class="cap">Vacuum first, mop second, never the same room at once — and only while the house is empty.</text>
</svg>
