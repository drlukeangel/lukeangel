<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Yearly IoT forecast">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- cream background + faint dot pattern -->
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 24px left accent bar (predictions accent) -->
  <rect x="0" y="0" width="24" height="630" fill="#0066cc"/>

  <!-- baseline / faint grid -->
  <g stroke="#1a1d24" stroke-opacity="0.10" stroke-width="2">
    <line x1="120" y1="500" x2="1120" y2="500"/>
    <line x1="120" y1="400" x2="1120" y2="400"/>
    <line x1="120" y1="300" x2="1120" y2="300"/>
    <line x1="120" y1="200" x2="1120" y2="200"/>
  </g>
  <!-- vertical "now" guide at the fork -->
  <line x1="620" y1="160" x2="620" y2="520" stroke="#1a1d24" stroke-opacity="0.16" stroke-width="2" stroke-dasharray="2 8"/>

  <!-- device silhouettes along the bottom (the body-as-platform era) -->
  <g fill="#1a1d24" fill-opacity="0.12">
    <!-- smartwatch -->
    <g transform="translate(300,470)">
      <rect x="-13" y="-56" width="26" height="40" rx="7"/>
      <rect x="-13" y="16" width="26" height="40" rx="7"/>
      <rect x="-40" y="-26" width="80" height="56" rx="16"/>
      <rect x="-28" y="-14" width="56" height="32" rx="8" fill="#fdfaf2"/>
    </g>
    <!-- earbud -->
    <g transform="translate(620,478)">
      <path d="M0 -36 a26 26 0 0 1 22 24 c0 14 -10 18 -14 30 l-16 0 c-6 -16 -18 -22 -18 -36 a26 26 0 0 1 26 -18 z"/>
      <rect x="-10" y="14" width="14" height="44" rx="6"/>
    </g>
    <!-- smart ring -->
    <g transform="translate(900,470)">
      <circle cx="0" cy="0" r="46"/>
      <circle cx="0" cy="0" r="28" fill="#fdfaf2"/>
      <rect x="-12" y="-50" width="24" height="16" rx="4"/>
    </g>
  </g>

  <!-- forecast trend line: solid history -> fork at the "you-are-here" point -->
  <!-- solid (known) segment -->
  <path d="M120 470 C 240 430, 320 400, 400 360 S 540 300, 620 270"
        fill="none" stroke="#0066cc" stroke-width="6" stroke-linecap="round"/>

  <!-- you-are-here node at the fork -->
  <circle cx="620" cy="270" r="20" fill="#fdfaf2" stroke="#0066cc" stroke-width="6"/>
  <circle cx="620" cy="270" r="6" fill="#0066cc"/>

  <!-- forked dashed (forecast) branches -->
  <path d="M620 270 C 720 230, 820 215, 940 195 S 1060 185, 1120 180"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="2 14" stroke-opacity="0.85"/>
  <path d="M620 270 C 720 300, 820 320, 940 360 S 1060 400, 1120 430"
        fill="none" stroke="#0066cc" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="2 14" stroke-opacity="0.55"/>

  <!-- forecast endpoint markers (open rings on the dashed branches) -->
  <circle cx="1120" cy="180" r="9" fill="#fdfaf2" stroke="#0066cc" stroke-width="4"/>
  <circle cx="1120" cy="430" r="9" fill="#fdfaf2" stroke="#0066cc" stroke-width="4" stroke-opacity="0.6"/>
</svg>
