<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Agentic DevOps workflows, some kept, some shut off.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="qd-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#qd-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- central agent hub: a rounded slab with a small gear glyph -->
  <g transform="translate(300,315)">
    <rect x="-86" y="-104" width="172" height="208" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <!-- gear glyph: a ring of teeth around a hub -->
    <g stroke="#4f46b8" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="34"/>
      <circle cx="0" cy="0" r="13" fill="#4f46b8" stroke="none"/>
      <line x1="0" y1="-34" x2="0" y2="-52"/>
      <line x1="0" y1="34" x2="0" y2="52"/>
      <line x1="-34" y1="0" x2="-52" y2="0"/>
      <line x1="34" y1="0" x2="52" y2="0"/>
      <line x1="-24" y1="-24" x2="-37" y2="-37"/>
      <line x1="24" y1="24" x2="37" y2="37"/>
      <line x1="24" y1="-24" x2="37" y2="-37"/>
      <line x1="-24" y1="24" x2="-37" y2="37"/>
    </g>
  </g>

  <!-- four workflow lanes fanning out from the hub to the right -->
  <!-- routing lines -->
  <g stroke="#1a1d24" stroke-width="3.5" fill="none" opacity="0.85">
    <path d="M392 250 C 520 200, 600 165, 720 165"/>
    <path d="M392 295 C 520 270, 600 252, 720 252"/>
    <path d="M392 335 C 520 360, 600 378, 720 378"/>
    <path d="M392 380 C 520 430, 600 465, 720 465"/>
  </g>

  <!-- lane 1: kept — card with a green check -->
  <g transform="translate(720,140)">
    <rect x="0" y="0" width="320" height="50" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <g transform="translate(36,25)" stroke="#3a7d44" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="16"/>
      <path d="M-7 0 L-2 6 L8 -7"/>
    </g>
    <line x1="78" y1="14" x2="290" y2="14" stroke="#7a808c" stroke-width="4" stroke-linecap="round"/>
    <line x1="78" y1="28" x2="250" y2="28" stroke="#7a808c" stroke-width="4" stroke-linecap="round"/>
    <line x1="78" y1="38" x2="200" y2="38" stroke="#7a808c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- lane 2: kept -->
  <g transform="translate(720,227)">
    <rect x="0" y="0" width="320" height="50" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <g transform="translate(36,25)" stroke="#3a7d44" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="16"/>
      <path d="M-7 0 L-2 6 L8 -7"/>
    </g>
    <line x1="78" y1="14" x2="270" y2="14" stroke="#7a808c" stroke-width="4" stroke-linecap="round"/>
    <line x1="78" y1="28" x2="290" y2="28" stroke="#7a808c" stroke-width="4" stroke-linecap="round"/>
    <line x1="78" y1="38" x2="210" y2="38" stroke="#7a808c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- lane 3: tossed — card with a red cross, dimmed -->
  <g transform="translate(720,353)" opacity="0.92">
    <rect x="0" y="0" width="320" height="50" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5" stroke-dasharray="10 7"/>
    <g transform="translate(36,25)" stroke="#c14a3a" stroke-width="6" fill="none" stroke-linecap="round">
      <line x1="-11" y1="-11" x2="11" y2="11"/>
      <line x1="11" y1="-11" x2="-11" y2="11"/>
    </g>
    <line x1="78" y1="18" x2="250" y2="18" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
    <line x1="78" y1="33" x2="200" y2="33" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- lane 4: tossed -->
  <g transform="translate(720,440)" opacity="0.92">
    <rect x="0" y="0" width="320" height="50" rx="12" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5" stroke-dasharray="10 7"/>
    <g transform="translate(36,25)" stroke="#c14a3a" stroke-width="6" fill="none" stroke-linecap="round">
      <line x1="-11" y1="-11" x2="11" y2="11"/>
      <line x1="11" y1="-11" x2="-11" y2="11"/>
    </g>
    <line x1="78" y1="18" x2="230" y2="18" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
    <line x1="78" y1="33" x2="270" y2="33" stroke="#c14a3a" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
