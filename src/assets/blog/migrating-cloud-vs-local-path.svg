<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" role="img" aria-label="Cloud path versus local path">
  <rect width="1000" height="430" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.5px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .node { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 12px; fill: #1a1d24; }
    .big { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <!-- TOP: cloud path (before) -->
  <text x="40" y="42" class="h">BEFORE — GROOVY SMARTAPP IN THE SMARTTHINGS CLOUD</text>
  <g transform="translate(40,60)">
    <!-- nodes -->
    <g>
      <rect x="0" y="20" width="120" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/><text x="60" y="47" text-anchor="middle" class="node">door sensor</text>
      <rect x="190" y="20" width="120" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/><text x="250" y="47" text-anchor="middle" class="node">ST hub</text>
      <!-- cloud -->
      <path d="M400 64 a22 22 0 0 1 3 -42 a26 26 0 0 1 50 5 a18 18 0 0 1 -2 37 z" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.2"/>
      <text x="428" y="48" text-anchor="middle" class="node" fill="#c14a3a">ST cloud</text>
      <rect x="540" y="20" width="120" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/><text x="600" y="47" text-anchor="middle" class="node">SMS / phone</text>
    </g>
    <!-- arrows -->
    <g stroke="#c14a3a" stroke-width="2.4" fill="#c14a3a">
      <line x1="120" y1="42" x2="186" y2="42"/><path d="M186 42 l-9 -4 v8 z"/>
      <line x1="310" y1="42" x2="398" y2="42"/><path d="M398 42 l-9 -4 v8 z"/>
      <line x1="458" y1="42" x2="536" y2="42"/><path d="M536 42 l-9 -4 v8 z"/>
    </g>
    <!-- metrics -->
    <text x="720" y="38" class="big" fill="#c14a3a">3–5 s</text>
    <text x="720" y="62" class="lbl" fill="#c14a3a">dies in an outage</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="190" x2="960" y2="190" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- BOTTOM: local path (after) -->
  <text x="40" y="232" class="h">AFTER — YAML AUTOMATION ON THE PI, EVERYTHING LOCAL</text>
  <g transform="translate(40,250)">
    <g>
      <rect x="0" y="20" width="120" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/><text x="60" y="47" text-anchor="middle" class="node">door sensor</text>
      <rect x="220" y="20" width="160" height="44" rx="8" fill="#3a7d44" fill-opacity="0.1" stroke="#3a7d44" stroke-width="2.4"/><text x="300" y="41" text-anchor="middle" class="node">Pi: Z-Stick + HA</text><text x="300" y="57" text-anchor="middle" class="node" fill="#5b616b">rule runs here</text>
      <rect x="480" y="20" width="160" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/><text x="560" y="47" text-anchor="middle" class="node">iOS app push</text>
    </g>
    <g stroke="#3a7d44" stroke-width="2.4" fill="#3a7d44">
      <line x1="120" y1="42" x2="216" y2="42"/><path d="M216 42 l-9 -4 v8 z"/>
      <line x1="380" y1="42" x2="476" y2="42"/><path d="M476 42 l-9 -4 v8 z"/>
    </g>
    <text x="720" y="38" class="big" fill="#3a7d44">0.5–1 s</text>
    <text x="720" y="62" class="lbl" fill="#3a7d44">fires even if the internet is down*</text>
  </g>

  <text x="40" y="400" class="cap">*The rule evaluates and the lights fire locally; only the outbound push needs the internet — and that has its own fallback.</text>
</svg>
