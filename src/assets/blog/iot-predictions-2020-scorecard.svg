<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="2019 scorecard">
  <rect width="760" height="560" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="46" font-size="20" fill="#1a1d24" font-weight="600">2019 — predicted vs. shipped</text>
    <text x="40" y="72" font-size="13" fill="#7a808c">~92% accuracy — the mature-category year</text>

    <!-- legend -->
    <g transform="translate(470,36)" font-size="12">
      <circle cx="8" cy="-4" r="7" fill="#3a7d44"/><text x="22" y="0" fill="#5b616b">hit</text>
      <circle cx="78" cy="-4" r="7" fill="#e0a92e"/><text x="92" y="0" fill="#5b616b">under</text>
      <circle cx="168" cy="-4" r="7" fill="#c14a3a"/><text x="182" y="0" fill="#5b616b">miss</text>
    </g>

    <g font-size="14">
      <!-- AirPods Pro HIT -->
      <g transform="translate(40,100)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">AirPods Pro — ANC, $249, Oct</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">sold out within hours</text>
      </g>
      <!-- Watch S5 HIT -->
      <g transform="translate(40,148)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Apple Watch Series 5 — always-on display</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">cellular take rate jumped to ~40% of units</text>
      </g>
      <!-- Smart rings HIT -->
      <g transform="translate(40,196)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Smart rings hit the inflection</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">Oura Gen 2 past 150K; Motiv pivots to enterprise auth</text>
      </g>
      <!-- Matter announce HIT -->
      <g transform="translate(40,244)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">CHIP announced — Apple, Google, Amazon, Zigbee</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">Dec 18, on the calendar I called</text>
      </g>
      <!-- Fitbit acquired HIT -->
      <g transform="translate(40,292)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Fitbit acquired — Google, $2.1B</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">exactly the buyer I called</text>
      </g>
      <!-- Smart displays HIT -->
      <g transform="translate(40,340)">
        <rect width="680" height="40" rx="6" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-opacity="0.4"/>
        <circle cx="24" cy="20" r="11" fill="#3a7d44"/>
        <path d="M19 20 l4 4 l8 -9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Displays overtake speakers in Q4</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">Echo Show 5 + 8 carried it, on the predicted quarter</text>
      </g>
      <!-- Oura UNDER -->
      <g transform="translate(40,388)">
        <rect width="680" height="40" rx="6" fill="#e0a92e" fill-opacity="0.10" stroke="#e0a92e" stroke-opacity="0.5"/>
        <circle cx="24" cy="20" r="11" fill="#e0a92e"/>
        <rect x="18" y="18.5" width="12" height="3" rx="1.5" fill="#fff"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Oura adoption — under-called the curve</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">said 100K, they cleared ~150K (NBA pilot)</text>
      </g>
      <!-- Wyze MISS -->
      <g transform="translate(40,436)">
        <rect width="680" height="40" rx="6" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-opacity="0.45"/>
        <circle cx="24" cy="20" r="11" fill="#c14a3a"/>
        <path d="M19 15 l10 10 M29 15 l-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <text x="50" y="18" fill="#1a1d24" font-weight="600">Wyze — still under-weighting the $20-30 tier</text>
        <text x="50" y="34" fill="#5b616b" font-size="12">Cam Pan, Sense, Bulb, Plug — a category of its own</text>
      </g>
    </g>
    <text x="40" y="510" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">The one I keep missing is the bottom of the price curve, not the top.</text>
  </g>
</svg>
