<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Compute decision tree cover.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="lfc-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#lfc-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- Trunk: a single entry node on the left, branching rightward into three paths -->
  <circle cx="190" cy="315" r="26" fill="#4f46b8"/>
  <circle cx="190" cy="315" r="26" fill="none" stroke="#1a1d24" stroke-width="3"/>

  <!-- branch lines from trunk to three destinations -->
  <g fill="none" stroke="#1a1d24" stroke-width="3.5">
    <path d="M216 315 C 320 315, 360 150, 470 150"/>
    <path d="M216 315 C 320 315, 360 315, 470 315"/>
    <path d="M216 315 C 320 315, 360 478, 470 478"/>
  </g>
  <!-- fork dots where paths split -->
  <g fill="#4f46b8"><circle cx="332" cy="248" r="7"/><circle cx="332" cy="315" r="7"/><circle cx="332" cy="382" r="7"/></g>

  <!-- DEST 1 (top): small serverless puck — a single low rounded slab -->
  <g>
    <ellipse cx="600" cy="150" rx="118" ry="30" fill="#4f46b8" fill-opacity="0.12" stroke="#1a1d24" stroke-width="3"/>
    <rect x="540" y="120" width="120" height="40" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <circle cx="566" cy="140" r="7" fill="#4f46b8"/>
    <rect x="584" y="137" width="62" height="6" rx="3" fill="#1a1d24" opacity="0.3"/>
  </g>

  <!-- DEST 2 (middle): one container box -->
  <g>
    <ellipse cx="600" cy="332" rx="118" ry="30" fill="#4f46b8" fill-opacity="0.12" stroke="#1a1d24" stroke-width="3"/>
    <rect x="546" y="262" width="108" height="78" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <line x1="546" y1="288" x2="654" y2="288" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="566" cy="275" r="5.5" fill="#4f46b8"/>
    <rect x="582" y="272" width="56" height="6" rx="3" fill="#1a1d24" opacity="0.28"/>
    <rect x="566" y="304" width="72" height="6" rx="3" fill="#1a1d24" opacity="0.22"/>
    <rect x="566" y="320" width="48" height="6" rx="3" fill="#1a1d24" opacity="0.22"/>
  </g>

  <!-- DEST 3 (bottom): a rack of stacked boxes on a host platform -->
  <g>
    <ellipse cx="600" cy="500" rx="140" ry="32" fill="#4f46b8" fill-opacity="0.12" stroke="#1a1d24" stroke-width="3"/>
    <!-- host slab -->
    <rect x="498" y="470" width="204" height="22" rx="5" fill="#4f46b8" fill-opacity="0.18" stroke="#1a1d24" stroke-width="3"/>
    <!-- three stacked container boxes -->
    <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5">
      <rect x="512" y="408" width="56" height="58" rx="6"/>
      <rect x="572" y="408" width="56" height="58" rx="6"/>
      <rect x="632" y="408" width="56" height="58" rx="6"/>
    </g>
    <g fill="#4f46b8"><circle cx="528" cy="424" r="5"/><circle cx="588" cy="424" r="5"/><circle cx="648" cy="424" r="5"/></g>
    <g fill="#1a1d24" opacity="0.24">
      <rect x="520" y="442" width="40" height="5" rx="2.5"/>
      <rect x="580" y="442" width="40" height="5" rx="2.5"/>
      <rect x="640" y="442" width="40" height="5" rx="2.5"/>
    </g>
  </g>

  <!-- scale cue: three size brackets growing top to bottom on the right -->
  <g stroke="#4f46b8" stroke-width="3" fill="none" opacity="0.7">
    <path d="M772 138 h14 v24 h-14"/>
    <path d="M772 300 h14 v64 h-14"/>
    <path d="M772 440 h14 v110 h-14"/>
  </g>
</svg>
