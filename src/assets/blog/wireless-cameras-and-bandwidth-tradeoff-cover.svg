<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="PoE pipe vs crowded WiFi band">
  <defs>
    <pattern id="dotsCAM" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsCAM)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- TOP: PoE camera -> fat wired pipe -> switch -->
  <g transform="translate(0,180)">
    <!-- bullet camera -->
    <g transform="translate(180,0)">
      <rect x="-50" y="-26" width="86" height="52" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
      <circle cx="-22" cy="0" r="16" fill="#1a1d24"/><circle cx="-22" cy="0" r="6" fill="#6a4c93" fill-opacity="0.5"/>
      <rect x="-8" y="26" width="10" height="20" fill="#1a1d24" fill-opacity="0.3"/>
    </g>
    <!-- fat pipe -->
    <rect x="240" y="-16" width="560" height="32" rx="6" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="3"/>
    <!-- switch -->
    <g transform="translate(870,0)">
      <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
      <g fill="#3a7d44" fill-opacity="0.6"><rect x="-44" y="10" width="14" height="10"/><rect x="-24" y="10" width="14" height="10"/><rect x="-4" y="10" width="14" height="10"/><rect x="16" y="10" width="14" height="10"/><rect x="36" y="10" width="14" height="10"/></g>
      <circle cx="0" cy="-10" r="7" fill="#3a7d44"/>
    </g>
  </g>

  <!-- BOTTOM: WiFi camera sharing a crowded 2.4 GHz band -->
  <g transform="translate(0,440)">
    <!-- battery WiFi cam -->
    <g transform="translate(180,0)">
      <rect x="-44" y="-40" width="88" height="80" rx="14" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
      <circle cx="0" cy="-8" r="16" fill="#1a1d24"/><circle cx="0" cy="-8" r="6" fill="#6a4c93" fill-opacity="0.5"/>
      <!-- battery hump on top -->
      <rect x="-30" y="-54" width="60" height="16" rx="5" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <!-- wifi waves -->
      <g stroke="#6a4c93" fill="none" stroke-linecap="round">
        <path d="M50 -24 a26 26 0 0 1 0 40" stroke-width="3.5"/>
        <path d="M64 -36 a46 46 0 0 1 0 64" stroke-width="3.5" stroke-opacity="0.55"/>
      </g>
    </g>
    <!-- the crowded band: a lane packed with many device dots -->
    <rect x="280" y="-26" width="560" height="52" rx="10" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-width="2.5"/>
    <g>
      <circle cx="320" cy="0" r="9" fill="#6a4c93"/>
      <circle cx="360" cy="0" r="7" fill="#c14a3a"/>
      <circle cx="398" cy="0" r="8" fill="#357a8c"/>
      <circle cx="436" cy="0" r="6" fill="#c87533"/>
      <circle cx="472" cy="0" r="9" fill="#3a7d44"/>
      <circle cx="512" cy="0" r="7" fill="#6a4c93"/>
      <circle cx="548" cy="0" r="8" fill="#c14a3a"/>
      <circle cx="586" cy="0" r="6" fill="#357a8c"/>
      <circle cx="624" cy="0" r="9" fill="#c87533"/>
      <circle cx="662" cy="0" r="7" fill="#3a7d44"/>
      <circle cx="700" cy="0" r="8" fill="#6a4c93"/>
      <circle cx="740" cy="0" r="6" fill="#c14a3a"/>
      <circle cx="778" cy="0" r="9" fill="#357a8c"/>
    </g>
    <!-- the cam's small slice joining the crowd -->
    <g stroke="#6a4c93" stroke-width="3" stroke-dasharray="3 6" fill="none"><line x1="236" y1="0" x2="300" y2="0"/></g>
  </g>
</svg>
