<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="cloud control path">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">THE TREAT-TOSS ROUTES THROUGH THE CLOUD</text>
  <text x="40" y="72" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">tap "toss" on the phone &#8594; vendor cloud &#8594; the Furbo &#8212; three ways it breaks</text>

  <!-- phone -->
  <g transform="translate(90,170)">
    <rect x="0" y="0" width="78" height="130" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="10" y="14" width="58" height="92" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <circle cx="39" cy="118" r="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="39" y="158" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">phone</text>
  </g>

  <!-- cloud -->
  <g transform="translate(410,150)">
    <path d="M30 70 a40 40 0 0 1 5 -79 a55 55 0 0 1 104 8 a36 36 0 0 1 9 71 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <text x="90" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#1a1d24">Furbo cloud</text>
    <text x="90" y="116" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">command relay</text>
  </g>

  <!-- furbo device -->
  <g transform="translate(810,150)">
    <path d="M10 18 L46 0 L82 18 L82 30 L10 30 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="14" y="30" width="64" height="110" rx="8" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="46" cy="62" r="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="30" y="120" width="32" height="10" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="46" y="168" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">Furbo + hopper</text>
  </g>

  <!-- arrows -->
  <path d="M178 235 L400 218" fill="none" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#fa)"/>
  <path d="M590 218 L800 235" fill="none" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#fa)"/>
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1d24"/>
    </marker>
  </defs>

  <!-- failure callouts -->
  <text x="40" y="350" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#c14a3a">FAILURE MODES I'VE HIT</text>

  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">
    <text x="40" y="382"><tspan fill="#c14a3a" font-weight="700">&#10007;</tspan>  cloud outage &#8212; can't toss (live view often still works direct)</text>
    <text x="40" y="410"><tspan fill="#c14a3a" font-weight="700">&#10007;</tspan>  Wi-Fi loss &#8212; device offline, no control at all</text>
    <text x="40" y="438"><tspan fill="#c14a3a" font-weight="700">&#10007;</tspan>  empty hopper &#8212; dispenses nothing and <tspan font-style="italic" font-family="Newsreader, Georgia, serif">says nothing</tspan></text>
  </g>
</svg>
