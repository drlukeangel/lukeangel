<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Frigate dual stream">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">

    <!-- camera, left -->
    <g transform="translate(70 180)">
      <rect x="0" y="0" width="120" height="80" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle cx="40" cy="40" r="20" fill="#1a1d24"/><circle cx="40" cy="40" r="8" fill="#fdfaf2"/>
      <text x="60" y="104" text-anchor="middle" font-size="13">camera</text>
      <text x="60" y="122" text-anchor="middle" font-size="11" fill="#5b616b">two RTSP streams</text>
    </g>

    <!-- top branch: sub-stream -> detect -->
    <path d="M190 200 C 280 130, 340 110, 420 110" fill="none" stroke="#6a4c93" stroke-width="3" marker-end="url(#a)"/>
    <text x="300" y="100" text-anchor="middle" font-size="12" fill="#6a4c93">sub-stream · 640×360 (tiny)</text>
    <g transform="translate(420 80)">
      <rect x="0" y="0" width="200" height="60" rx="10" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="3"/>
      <text x="100" y="26" text-anchor="middle" font-size="13" fill="#6a4c93">detect pipeline</text>
      <text x="100" y="46" text-anchor="middle" font-size="11" fill="#5b616b">Coral · 10 fps · find objects</text>
    </g>

    <!-- bottom branch: main 4K -> record -->
    <path d="M190 240 C 280 320, 340 340, 420 340" fill="none" stroke="#1a1d24" stroke-width="3" marker-end="url(#b)"/>
    <text x="300" y="372" text-anchor="middle" font-size="12">main · 4K (heavy)</text>
    <g transform="translate(420 310)">
      <rect x="0" y="0" width="200" height="60" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <text x="100" y="26" text-anchor="middle" font-size="13">recorder → disk</text>
      <text x="100" y="46" text-anchor="middle" font-size="11" fill="#5b616b">never decoded for detection</text>
    </g>

    <!-- note -->
    <g transform="translate(680 180)">
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#6a4c93" fill-opacity="0.06" stroke="#6a4c93" stroke-opacity="0.4" stroke-width="2"/>
      <text x="140" y="34" text-anchor="middle" font-size="13" fill="#1a1d24">detect on the cheap pixels,</text>
      <text x="140" y="56" text-anchor="middle" font-size="13" fill="#1a1d24">store the expensive ones</text>
      <text x="140" y="76" text-anchor="middle" font-size="11" fill="#5b616b">— how a Pi + Coral watches 4× 4K</text>
    </g>

    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#6a4c93"/></marker>
      <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#1a1d24"/></marker>
    </defs>
  </g>
</svg>
