<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sidewalk coverage block.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="d8" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.85" fill="#1a1d24" opacity="0.07"/>
    </pattern>
    <radialGradient id="ringFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f7a6b" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#1f7a6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1f7a6b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#d8)"/>
  <rect x="0" y="0" width="24" height="630" fill="#1f7a6b"/>

  <!-- streets (horizontal + vertical lanes) -->
  <line x1="100" y1="160" x2="1180" y2="160" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="100" y1="350" x2="1180" y2="350" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="100" y1="540" x2="1180" y2="540" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="320" y1="80" x2="320" y2="620" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="600" y1="80" x2="600" y2="620" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="900" y1="80" x2="900" y2="620" stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- COVERAGE RINGS (drawn first so houses sit on top) -->
  <!-- bridge 1 (top-left, dense) -->
  <circle cx="230" cy="245" r="180" fill="url(#ringFade)"/>
  <circle cx="230" cy="245" r="120" fill="none" stroke="#1f7a6b" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="230" cy="245" r="70" fill="none" stroke="#1f7a6b" stroke-width="2.2" stroke-opacity="0.75"/>
  <circle cx="230" cy="245" r="32" fill="#1f7a6b" fill-opacity="0.18" stroke="#1f7a6b" stroke-width="2.4"/>

  <!-- bridge 2 (mid-upper, dense overlap with bridge 1) -->
  <circle cx="440" cy="255" r="170" fill="url(#ringFade)"/>
  <circle cx="440" cy="255" r="115" fill="none" stroke="#1f7a6b" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="440" cy="255" r="62" fill="none" stroke="#1f7a6b" stroke-width="2.2" stroke-opacity="0.75"/>

  <!-- bridge 3 (upper-right) -->
  <circle cx="780" cy="220" r="160" fill="url(#ringFade)"/>
  <circle cx="780" cy="220" r="108" fill="none" stroke="#1f7a6b" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="780" cy="220" r="58" fill="none" stroke="#1f7a6b" stroke-width="2.2" stroke-opacity="0.75"/>

  <!-- bridge 4 (mid-row center) -->
  <circle cx="540" cy="445" r="190" fill="url(#ringFade)"/>
  <circle cx="540" cy="445" r="125" fill="none" stroke="#1f7a6b" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="540" cy="445" r="70" fill="none" stroke="#1f7a6b" stroke-width="2.2" stroke-opacity="0.75"/>

  <!-- bridge 5 (bottom-right, smaller / weaker) -->
  <circle cx="990" cy="475" r="135" fill="url(#ringFade)"/>
  <circle cx="990" cy="475" r="85" fill="none" stroke="#1f7a6b" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="990" cy="475" r="48" fill="none" stroke="#1f7a6b" stroke-width="2.2" stroke-opacity="0.75"/>

  <!-- HOUSES (simple roof + base) -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <!-- house 1 (has bridge) -->
    <path d="M 180 215 L 180 280 L 280 280 L 280 215 L 230 175 Z"/>
    <rect x="218" y="240" width="24" height="40"/>
    <!-- house 2 (has bridge) -->
    <path d="M 390 225 L 390 290 L 490 290 L 490 225 L 440 185 Z"/>
    <rect x="428" y="250" width="24" height="40"/>
    <!-- house 3 (no bridge) -->
    <path d="M 660 235 L 660 300 L 760 300 L 760 235 L 710 195 Z"/>
    <rect x="698" y="260" width="24" height="40"/>
    <!-- house 4 (has bridge) -->
    <path d="M 730 190 L 730 255 L 830 255 L 830 190 L 780 150 Z"/>
    <rect x="768" y="215" width="24" height="40"/>
    <!-- house 5 (no bridge, far right) -->
    <path d="M 1010 220 L 1010 285 L 1110 285 L 1110 220 L 1060 180 Z"/>
    <rect x="1048" y="245" width="24" height="40"/>

    <!-- row 2 -->
    <!-- house 6 (no bridge) -->
    <path d="M 180 415 L 180 480 L 280 480 L 280 415 L 230 375 Z"/>
    <rect x="218" y="440" width="24" height="40"/>
    <!-- house 7 (has bridge) -->
    <path d="M 490 415 L 490 480 L 590 480 L 590 415 L 540 375 Z"/>
    <rect x="528" y="440" width="24" height="40"/>
    <!-- house 8 (no bridge — gap zone) -->
    <path d="M 760 420 L 760 485 L 860 485 L 860 420 L 810 380 Z"/>
    <rect x="798" y="445" width="24" height="40"/>
    <!-- house 9 (has bridge) -->
    <path d="M 940 445 L 940 510 L 1040 510 L 1040 445 L 990 405 Z"/>
    <rect x="978" y="470" width="24" height="40"/>

    <!-- row 3 (bottom — sparse / uncovered) -->
    <!-- house 10 -->
    <path d="M 180 580 L 180 615 L 280 615 L 280 580 L 230 565 Z"/>
    <!-- house 11 -->
    <path d="M 660 580 L 660 615 L 760 615 L 760 580 L 710 565 Z"/>
    <!-- house 12 -->
    <path d="M 1010 580 L 1010 615 L 1110 615 L 1110 580 L 1060 565 Z"/>
  </g>

  <!-- BRIDGE DEVICE MARKERS (small speaker icons on bridged houses) -->
  <g stroke="#1f7a6b" stroke-width="1.8" fill="#1f7a6b">
    <!-- bridge on house 1 -->
    <rect x="222" y="195" width="16" height="20" rx="2" fill="#1f7a6b"/>
    <circle cx="230" cy="205" r="3" fill="#fdfaf2"/>
    <!-- bridge on house 2 -->
    <rect x="432" y="205" width="16" height="20" rx="2"/>
    <circle cx="440" cy="215" r="3" fill="#fdfaf2"/>
    <!-- bridge on house 4 -->
    <rect x="772" y="170" width="16" height="20" rx="2"/>
    <circle cx="780" cy="180" r="3" fill="#fdfaf2"/>
    <!-- bridge on house 7 -->
    <rect x="532" y="395" width="16" height="20" rx="2"/>
    <circle cx="540" cy="405" r="3" fill="#fdfaf2"/>
    <!-- bridge on house 9 -->
    <rect x="982" y="425" width="16" height="20" rx="2"/>
    <circle cx="990" cy="435" r="3" fill="#fdfaf2"/>
  </g>

  <!-- COLLAR 1 — in dense overlap (top-left intersection of rings) -->
  <g>
    <circle cx="350" cy="290" r="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <circle cx="350" cy="290" r="6" fill="#1f7a6b"/>
    <!-- collar strap -->
    <path d="M 336 290 Q 350 308 364 290" fill="none" stroke="#1a1d24" stroke-width="2"/>
    <!-- small uplink indicator (3 short stacked arcs going up-right) -->
    <path d="M 366 282 q 6 -4 12 -2" fill="none" stroke="#3a7d44" stroke-width="2" stroke-linecap="round"/>
    <path d="M 368 274 q 8 -5 16 -3" fill="none" stroke="#3a7d44" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- COLLAR 2 — in a gap (between rings, faded uplink) -->
  <g>
    <circle cx="1075" cy="395" r="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <circle cx="1075" cy="395" r="6" fill="#c14a3a"/>
    <path d="M 1061 395 Q 1075 413 1089 395" fill="none" stroke="#1a1d24" stroke-width="2"/>
    <!-- ✗ failed uplink mark -->
    <line x1="1093" y1="380" x2="1107" y2="394" stroke="#c14a3a" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="1107" y1="380" x2="1093" y2="394" stroke="#c14a3a" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- ground hatching (subtle texture in the gap areas) -->
  <g stroke="#1a1d24" stroke-opacity="0.04" stroke-width="0.7">
    <line x1="100" y1="80" x2="120" y2="100"/>
    <line x1="900" y1="100" x2="920" y2="120"/>
    <line x1="1080" y1="540" x2="1100" y2="560"/>
  </g>
</svg>
