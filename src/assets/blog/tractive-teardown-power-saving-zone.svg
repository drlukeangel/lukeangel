<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" role="img" aria-label="How the Base Station beacon drops the tracker's cellular duty cycle at home.">
  <rect width="1080" height="440" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHY THE BEACON SAVES BATTERY</text>

  <!-- Base Station puck -->
  <g transform="translate(70,150)">
    <ellipse cx="60" cy="118" rx="60" ry="16" fill="#1a1d24" opacity="0.08"/>
    <rect x="14" y="40" width="92" height="78" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- whip antenna -->
    <line x1="60" y1="40" x2="60" y2="2" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="60" cy="0" r="4" fill="#1a1d24"/>
    <!-- status LED -->
    <circle cx="60" cy="86" r="6" fill="#3a7d44"/>
    <text x="60" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">Base Station</text>
    <text x="60" y="158" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">USB-C · advertise-only</text>
  </g>

  <!-- BLE advertising arcs out to the tracker -->
  <g stroke="#c87533" stroke-width="3" fill="none">
    <path d="M200 196 a40 40 0 0 1 0 56"/>
    <path d="M222 188 a64 64 0 0 1 0 72"/>
    <path d="M244 180 a88 88 0 0 1 0 88"/>
  </g>
  <text x="250" y="150" font-family="ui-monospace,monospace" font-size="10.5" fill="#c87533">BLE advertising</text>
  <text x="250" y="166" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">manufacturer-data + zone id</text>

  <!-- tracker on the dog -->
  <g transform="translate(360,178)">
    <rect x="0" y="0" width="96" height="84" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <text x="48" y="40" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">DOG 6</text>
    <text x="48" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">cellular tracker</text>
    <text x="48" y="106" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">"I'm home"</text>
  </g>

  <!-- decision: switch duty cycle -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <path d="M456 220 H540" fill="none"/><path d="M544 220 l-15 -7 v14 z"/>
  </g>

  <!-- duty-cycle comparison, right side -->
  <g transform="translate(560,110)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">OUT &amp; ABOUT — no beacon</text>
    <!-- nearly solid bar = frequent fixes -->
    <g fill="#c14a3a">
      <rect x="0" y="14" width="22" height="28" rx="3"/><rect x="30" y="14" width="22" height="28" rx="3"/><rect x="60" y="14" width="22" height="28" rx="3"/><rect x="90" y="14" width="22" height="28" rx="3"/><rect x="120" y="14" width="22" height="28" rx="3"/><rect x="150" y="14" width="22" height="28" rx="3"/><rect x="180" y="14" width="22" height="28" rx="3"/><rect x="210" y="14" width="22" height="28" rx="3"/>
    </g>
    <text x="0" y="64" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">GPS + cellular ~ every 2 min — drains</text>

    <text x="0" y="118" font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">IN THE ZONE — beacon seen</text>
    <!-- sparse bar = on-demand only -->
    <g fill="#3a7d44">
      <rect x="0" y="132" width="22" height="28" rx="3"/><rect x="210" y="132" width="22" height="28" rx="3"/>
    </g>
    <g fill="#3a7d44" opacity="0.18">
      <rect x="30" y="132" width="22" height="28" rx="3"/><rect x="60" y="132" width="22" height="28" rx="3"/><rect x="90" y="132" width="22" height="28" rx="3"/><rect x="120" y="132" width="22" height="28" rx="3"/><rect x="150" y="132" width="22" height="28" rx="3"/><rect x="180" y="132" width="22" height="28" rx="3"/>
    </g>
    <text x="0" y="182" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">on-demand only (app request / geofence) — coasts</text>
  </g>

  <text x="540" y="416" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Seeing the beacon is the tracker's cue that it's safe to stop checking where it is.</text>
</svg>
