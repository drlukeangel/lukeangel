<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="2016 forecast confidence chart">
  <rect width="960" height="560" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lab{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1a1d24;}
    .pct{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#5b616b;}
    .ax{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c;}
    .ttl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:18px;fill:#1a1d24;font-weight:700;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:15px;fill:#5b616b;}
  </style>

  <text x="40" y="46" class="ttl">2016 forecast — by confidence</text>

  <!-- chart geometry: bars start at x=300, full width (100%) = 560px ends at x=860 -->
  <!-- axis ticks -->
  <g class="ax" text-anchor="middle">
    <line x1="300" y1="78" x2="300" y2="500" stroke="#1a1d24" stroke-opacity="0.15"/>
    <line x1="440" y1="78" x2="440" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="580" y1="78" x2="580" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="720" y1="78" x2="720" y2="500" stroke="#1a1d24" stroke-opacity="0.08"/>
    <line x1="860" y1="78" x2="860" y2="500" stroke="#1a1d24" stroke-opacity="0.15"/>
    <text x="300" y="72">0%</text>
    <text x="440" y="72">25%</text>
    <text x="580" y="72">50%</text>
    <text x="720" y="72">75%</text>
    <text x="860" y="72">100%</text>
  </g>

  <!-- bars: width = pct/100 * 560.  read = solid orange; wish = hatched/light -->
  <!-- 1: 80% READ (hinge — highlighted) -->
  <g transform="translate(0,90)">
    <text x="285" y="20" text-anchor="end" class="lab">Cellular-GPS Whistle ships</text>
    <rect x="300" y="4" width="448" height="24" rx="4" fill="#c87533" fill-opacity="0.85"/>
    <rect x="300" y="4" width="448" height="24" rx="4" fill="none" stroke="#1a1d24" stroke-width="2"/>
    <text x="758" y="22" class="pct">80%</text>
  </g>
  <!-- 2: 60% read -->
  <g transform="translate(0,134)">
    <text x="285" y="20" text-anchor="end" class="lab">Conglomerate acquires a startup</text>
    <rect x="300" y="4" width="336" height="24" rx="4" fill="#c87533" fill-opacity="0.6"/>
    <text x="646" y="22" class="pct">60%</text>
  </g>
  <!-- 3: 50% coin-flip read -->
  <g transform="translate(0,178)">
    <text x="285" y="20" text-anchor="end" class="lab">Furbo camera Kickstarter ships</text>
    <rect x="300" y="4" width="280" height="24" rx="4" fill="#c87533" fill-opacity="0.6"/>
    <text x="590" y="22" class="pct">50%</text>
  </g>
  <!-- 4: 75% read -->
  <g transform="translate(0,222)">
    <text x="285" y="20" text-anchor="end" class="lab">Connected SureFlap Hub ships</text>
    <rect x="300" y="4" width="420" height="24" rx="4" fill="#c87533" fill-opacity="0.6"/>
    <text x="730" y="22" class="pct">75%</text>
  </g>
  <!-- 5: 55% read -->
  <g transform="translate(0,266)">
    <text x="285" y="20" text-anchor="end" class="lab">Petnet cloud-outage event</text>
    <rect x="300" y="4" width="308" height="24" rx="4" fill="#c87533" fill-opacity="0.6"/>
    <text x="618" y="22" class="pct">55%</text>
  </g>
  <!-- 6: 35% WISH -->
  <g transform="translate(0,310)">
    <text x="285" y="20" text-anchor="end" class="lab">"Fitness for cats" attempted</text>
    <rect x="300" y="4" width="196" height="24" rx="4" fill="#c87533" fill-opacity="0.18" stroke="#c87533" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="506" y="22" class="pct">35%</text>
  </g>
  <!-- 7: 30% WISH -->
  <g transform="translate(0,354)">
    <text x="285" y="20" text-anchor="end" class="lab">Pet device talks to a smart-home hub</text>
    <rect x="300" y="4" width="168" height="24" rx="4" fill="#c87533" fill-opacity="0.18" stroke="#c87533" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="478" y="22" class="pct">30%</text>
  </g>
  <!-- 8: 55% read -->
  <g transform="translate(0,398)">
    <text x="285" y="20" text-anchor="end" class="lab">Tagg shuts down or pivots</text>
    <rect x="300" y="4" width="308" height="24" rx="4" fill="#c87533" fill-opacity="0.6"/>
    <text x="618" y="22" class="pct">55%</text>
  </g>

  <!-- divider between reads and wishes, drawn as legend -->
  <g transform="translate(300,450)">
    <rect x="0" y="0" width="20" height="14" rx="3" fill="#c87533" fill-opacity="0.6"/>
    <text x="28" y="12" class="ax">grounded read</text>
    <rect x="170" y="0" width="20" height="14" rx="3" fill="#c87533" fill-opacity="0.18" stroke="#c87533" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="198" y="12" class="ax">wishful</text>
    <rect x="320" y="0" width="20" height="14" rx="3" fill="#c87533" fill-opacity="0.85" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="348" y="12" class="ax">the bet the notebook hinges on</text>
  </g>

  <line x1="40" y1="500" x2="920" y2="500" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="534" class="cap">High-confidence reads cluster right; the wishes sit low and dashed.</text>
</svg>
