<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-label="Family Hub cooking flow">
  <rect width="820" height="380" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:13px;fill:#5b616b}
    .box{fill:#fdfaf2;stroke:#1a1d24;stroke-width:1.5}
    .acc{fill:#6a4c93}
  </style>

  <!-- Fridge (Family Hub) -->
  <rect class="box" x="40" y="70" width="150" height="200" rx="8"/>
  <rect x="118" y="86" width="58" height="86" rx="3" class="acc" opacity="0.85"/>
  <rect x="124" y="94" width="46" height="30" rx="2" fill="#fdfaf2"/>
  <line x1="124" y1="134" x2="170" y2="134" stroke="#fdfaf2" stroke-opacity="0.7"/>
  <line x1="124" y1="148" x2="170" y2="148" stroke="#fdfaf2" stroke-opacity="0.7"/>
  <line x1="106" y1="70" x2="106" y2="270" stroke="#1a1d24" stroke-width="1"/>
  <text class="lbl" x="115" y="290" text-anchor="middle">Family Hub fridge</text>
  <text class="sm" x="115" y="306" text-anchor="middle">21" Tizen — SmartThings hub</text>

  <!-- arrows out -->
  <!-- to frame -->
  <path d="M190,120 C290,120 300,90 400,90" fill="none" class="acc" stroke="#6a4c93" stroke-width="2" marker-end="url(#ap)"/>
  <text class="sm" x="300" y="84" text-anchor="middle" fill="#6a4c93">cast recipe</text>
  <!-- to oven -->
  <path d="M190,200 C290,200 300,200 400,200" fill="none" stroke="#1a1d24" stroke-width="2" marker-end="url(#a)"/>
  <text class="sm" x="300" y="194" text-anchor="middle">"preheat 425"</text>
  <!-- timer broadcast -->
  <path d="M190,250 C290,250 300,310 400,310" fill="none" stroke="#1a1d24" stroke-width="2" marker-end="url(#a)"/>
  <text class="sm" x="300" y="304" text-anchor="middle">start timer</text>

  <!-- Frame TV -->
  <rect class="box" x="400" y="52" width="170" height="84" rx="6"/>
  <rect x="416" y="64" width="138" height="58" rx="3" fill="#1a1d24"/>
  <rect x="424" y="72" width="122" height="20" rx="2" fill="#6a4c93" opacity="0.7"/>
  <text class="lbl" x="485" y="153" text-anchor="middle">Frame TV — recipe</text>

  <!-- Oven -->
  <rect class="box" x="400" y="166" width="170" height="74" rx="6"/>
  <rect x="416" y="180" width="138" height="34" rx="3" fill="#1a1d24"/>
  <circle cx="438" cy="197" r="9" fill="#c14a3a"/>
  <rect x="460" y="190" width="80" height="14" rx="2" fill="#7a808c"/>
  <text class="lbl" x="485" y="230" text-anchor="middle">Bespoke oven — preheats</text>

  <!-- Devices announce row -->
  <rect class="box" x="400" y="280" width="170" height="60" rx="6"/>
  <text class="lbl" x="485" y="302" text-anchor="middle">timer announces on</text>
  <text class="sm" x="485" y="320" text-anchor="middle">Frame TV + phones</text>

  <!-- SmartThings hub bus note -->
  <text class="sm" x="615" y="100" fill="#6a4c93">all routed over the</text>
  <text class="sm" x="615" y="116" fill="#6a4c93">SmartThings hub</text>
  <text class="sm" x="615" y="132" fill="#6a4c93">built into the fridge</text>
  <line x1="640" y1="146" x2="640" y2="300" stroke="#6a4c93" stroke-width="1.2" stroke-dasharray="5 4"/>
  <path d="M572,90 H640" fill="none" stroke="#6a4c93" stroke-opacity="0.4"/>
  <path d="M572,200 H640" fill="none" stroke="#6a4c93" stroke-opacity="0.4"/>
  <path d="M572,310 H640" fill="none" stroke="#6a4c93" stroke-opacity="0.4"/>

  <text class="cap" x="40" y="362">The fridge screen is the kitchen's control surface: cast a recipe to the Frame, preheat the oven, fan a timer to every screen.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#1a1d24"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#6a4c93"/></marker>
  </defs>
</svg>
