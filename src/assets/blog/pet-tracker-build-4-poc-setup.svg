<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="920" height="340" role="img" aria-label="Two-node test setup">
  <rect width="920" height="340" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:17px;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#5b616b;}
    .link{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:14px;fill:#1f7a6b;letter-spacing:1px;}
  </style>

  <!-- NODE 1: collar (rides Quark) -->
  <g transform="translate(130,170)">
    <rect x="-70" y="-60" width="140" height="120" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- gps dot -->
    <circle cx="0" cy="-12" r="16" fill="#1f7a6b"/>
    <circle cx="0" cy="-12" r="7" fill="#fdfaf2"/>
    <!-- antenna pins -->
    <g stroke="#1a1d24" stroke-width="5" stroke-linecap="round">
      <line x1="-26" y1="-72" x2="-26" y2="-60"/>
      <line x1="0" y1="-76" x2="0" y2="-60"/>
      <line x1="26" y1="-72" x2="26" y2="-60"/>
    </g>
    <line x1="-44" y1="30" x2="44" y2="30" stroke="#1a1d24" stroke-width="4"/>
    <text x="0" y="92" class="lbl" text-anchor="middle">collar node</text>
    <text x="0" y="114" class="sm" text-anchor="middle">rides Quark, beacons GPS</text>
  </g>

  <!-- LoRa link arc -->
  <g transform="translate(130,170)">
    <path d="M80 -20 q70 -70 150 -40" fill="none" stroke="#1f7a6b" stroke-width="4" stroke-dasharray="3 12" stroke-linecap="round" marker-end="url(#ar-t)"/>
  </g>
  <text x="250" y="58" class="link" text-anchor="middle">LoRa</text>
  <text x="250" y="78" class="sm" text-anchor="middle">position beacon</text>

  <!-- NODE 2: handheld -->
  <g transform="translate(470,170)">
    <rect x="-58" y="-66" width="116" height="132" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- oled screen -->
    <rect x="-40" y="-48" width="80" height="42" rx="5" fill="#1a1d24" opacity="0.85"/>
    <circle cx="0" cy="-27" r="9" fill="#1f7a6b"/>
    <!-- buttons -->
    <circle cx="-26" cy="24" r="9" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="26" cy="24" r="9" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <line x1="0" y1="14" x2="0" y2="40" stroke="#1a1d24" stroke-width="4"/>
    <line x1="-14" y1="27" x2="14" y2="27" stroke="#1a1d24" stroke-width="4"/>
    <!-- antenna -->
    <line x1="0" y1="-78" x2="0" y2="-66" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="98" class="lbl" text-anchor="middle">handheld</text>
    <text x="0" y="120" class="sm" text-anchor="middle">stays with me, receives</text>
  </g>

  <!-- BLE link arc -->
  <g transform="translate(470,170)">
    <path d="M70 0 q70 0 130 0" fill="none" stroke="#1f7a6b" stroke-width="4" stroke-dasharray="3 10" stroke-linecap="round" marker-end="url(#ar-t)"/>
  </g>
  <text x="605" y="148" class="link" text-anchor="middle">BLE</text>
  <text x="605" y="200" class="sm" text-anchor="middle">paired</text>

  <!-- phone w/ map -->
  <g transform="translate(770,170)">
    <rect x="-52" y="-74" width="104" height="148" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <rect x="-38" y="-58" width="76" height="116" rx="4" fill="#1a1d24" opacity="0.06"/>
    <!-- map: faint grid + a pin -->
    <g stroke="#5b616b" stroke-opacity="0.4" stroke-width="2">
      <line x1="-38" y1="-20" x2="38" y2="-20"/>
      <line x1="-38" y1="18" x2="38" y2="18"/>
      <line x1="-10" y1="-58" x2="-10" y2="58"/>
      <line x1="18" y1="-58" x2="18" y2="58"/>
    </g>
    <!-- the moving dot -->
    <circle cx="6" cy="-4" r="11" fill="#1f7a6b"/>
    <circle cx="6" cy="-4" r="20" fill="none" stroke="#1f7a6b" stroke-width="3" stroke-opacity="0.4"/>
    <text x="0" y="98" class="lbl" text-anchor="middle">phone</text>
    <text x="0" y="120" class="sm" text-anchor="middle">draws the map</text>
  </g>

  <defs>
    <marker id="ar-t" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#1f7a6b"/></marker>
  </defs>
</svg>
