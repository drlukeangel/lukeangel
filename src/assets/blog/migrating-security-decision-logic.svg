<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" role="img" aria-label="Security automation decision logic">
  <rect width="1000" height="500" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.5px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #5b616b; }
    .edge { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11px; fill: #7a808c; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <text x="40" y="38" class="h">SAME TRIGGER, DIFFERENT RESPONSE — WHAT LOCAL STATE LETS YOU BRANCH ON</text>

  <!-- trigger -->
  <g transform="translate(400,64)">
    <rect x="0" y="0" width="200" height="48" rx="8" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.4"/>
    <text x="100" y="22" text-anchor="middle" class="lbl">contact sensor → "on"</text>
    <text x="100" y="40" text-anchor="middle" class="sub">a door or window opens</text>
  </g>

  <!-- branch: who's home -->
  <g transform="translate(420,140)">
    <path d="M80 0 l80 38 l-80 38 l-80 -38 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="80" y="34" text-anchor="middle" class="lbl">group.family</text>
    <text x="80" y="50" text-anchor="middle" class="sub">home? away?</text>
  </g>
  <line x1="500" y1="112" x2="500" y2="140" stroke="#1a1d24" stroke-width="2"/>

  <!-- left: away -->
  <line x1="420" y1="178" x2="250" y2="230" stroke="#c14a3a" stroke-width="2"/>
  <text x="300" y="206" class="edge" fill="#c14a3a">nobody home</text>
  <!-- right: home -->
  <line x1="580" y1="178" x2="750" y2="230" stroke="#1a1d24" stroke-width="2"/>
  <text x="640" y="206" class="edge">family home</text>

  <!-- AWAY branch: after-dark condition -->
  <g transform="translate(90,230)">
    <path d="M80 0 l80 32 l-80 32 l-80 -32 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/>
    <text x="80" y="30" text-anchor="middle" class="sub">after sunset?</text>
    <text x="80" y="46" text-anchor="middle" class="sub">(sun condition)</text>
  </g>
  <line x1="170" y1="262" x2="170" y2="262"/>
  <!-- away outcome -->
  <g transform="translate(40,330)">
    <rect x="0" y="0" width="280" height="92" rx="8" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-width="2"/>
    <text x="16" y="26" class="lbl" fill="#c14a3a">SCARE-BRIGHT</text>
    <text x="16" y="48" class="sub">hallway + living room to full</text>
    <text x="16" y="66" class="sub">push to both phones</text>
    <text x="16" y="84" class="sub">log the event locally</text>
  </g>
  <line x1="170" y1="294" x2="180" y2="330" stroke="#c14a3a" stroke-width="2"/>

  <!-- HOME branch: time condition -->
  <g transform="translate(670,230)">
    <path d="M80 0 l80 32 l-80 32 l-80 -32 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.8"/>
    <text x="80" y="30" text-anchor="middle" class="sub">midnight–6am?</text>
    <text x="80" y="46" text-anchor="middle" class="sub">+ it's the bulkhead</text>
  </g>
  <!-- home outcome -->
  <g transform="translate(660,330)">
    <rect x="0" y="0" width="290" height="92" rx="8" fill="#6a4c93" fill-opacity="0.08" stroke="#6a4c93" stroke-width="2"/>
    <text x="16" y="26" class="lbl" fill="#6a4c93">QUIET WAKE</text>
    <text x="16" y="48" class="sub">master bedroom to 50%</text>
    <text x="16" y="66" class="sub">push to both phones</text>
    <text x="16" y="84" class="sub">NO basement light — don't tip them off</text>
  </g>
  <line x1="750" y1="294" x2="800" y2="330" stroke="#6a4c93" stroke-width="2"/>

  <text x="500" y="478" text-anchor="middle" class="cap">Cloud rules fire one canned alert; local state — presence, sun, clock, which sensor — lets one trigger fork into the right response.</text>
</svg>
