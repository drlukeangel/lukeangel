<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A BLE-only health device on the left reaches the cloud only by hopping through the customer's phone in the center. A live path runs device to phone over Bluetooth and phone to cloud over Wi-Fi or cellular; the direct device-to-cloud path is crossed out, because the device has no internet radio of its own.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="ble-cover-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#ble-cover-dots)"/>
  <rect width="24" height="630" fill="#357a8c"/>

  <!-- ================= DEVICE (left): a connected-health puck, BLE only ================= -->
  <g transform="translate(150,250)">
    <!-- puck body -->
    <ellipse cx="80" cy="150" rx="86" ry="26" fill="#1a1d24" opacity="0.06"/>
    <rect x="14" y="36" width="132" height="104" rx="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <ellipse cx="80" cy="36" rx="66" ry="20" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- inset face -->
    <ellipse cx="80" cy="36" rx="46" ry="13" fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.45"/>
    <!-- BLE rune on the body -->
    <g transform="translate(80,92)" stroke="#357a8c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -22 L13 -11 L-10 9 M-10 -9 L13 11 L0 22 L0 -22"/>
    </g>
  </g>
  <!-- BLE emission waves leaving the device -->
  <g transform="translate(330,326)" stroke="#357a8c" fill="none" stroke-linecap="round">
    <path d="M0 -30 A40 40 0 0 1 0 30" stroke-width="5" opacity="0.95"/>
    <path d="M22 -44 A62 62 0 0 1 22 44" stroke-width="5" opacity="0.6"/>
    <path d="M44 -58 A84 84 0 0 1 44 58" stroke-width="5" opacity="0.32"/>
  </g>

  <!-- ================= PHONE (center): the gateway ================= -->
  <g transform="translate(520,210)">
    <rect x="0" y="0" width="160" height="290" rx="26" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <rect x="14" y="40" width="132" height="210" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" opacity="0.4"/>
    <line x1="58" y1="22" x2="102" y2="22" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
    <circle cx="80" cy="270" r="9" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <!-- a small teal BLE glyph + an up-arrow inside the screen, hinting "relay" without words -->
    <g transform="translate(80,118)" stroke="#357a8c" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -18 L11 -9 L-8 8 M-8 -8 L11 9 L0 18 L0 -18"/>
    </g>
    <g transform="translate(80,176)" stroke="#357a8c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="22" x2="0" y2="-16"/>
      <path d="M-13 -3 L0 -18 L13 -3"/>
    </g>
  </g>

  <!-- BLE link: device <-> phone -->
  <g stroke="#357a8c" stroke-width="6" fill="#357a8c" stroke-linecap="round">
    <line x1="400" y1="326" x2="506" y2="326"/>
    <path d="M518 326 l-20 -9 v18 z"/>
    <path d="M388 326 l20 -9 v18 z"/>
  </g>

  <!-- Wi-Fi / cellular link: phone -> cloud -->
  <g stroke="#357a8c" stroke-width="6" fill="#357a8c" stroke-linecap="round">
    <line x1="694" y1="326" x2="852" y2="326"/>
    <path d="M866 326 l-22 -10 v20 z"/>
  </g>

  <!-- ================= CLOUD (right): the backend ================= -->
  <g transform="translate(880,232)">
    <path d="M58 150
             a52 52 0 0 1 4 -103
             a58 58 0 0 1 110 -16
             a46 46 0 0 1 36 119
             z"
          fill="#fdfaf2" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
    <!-- a few server/data ticks inside the cloud -->
    <g stroke="#357a8c" stroke-width="5" stroke-linecap="round">
      <line x1="92" y1="92" x2="172" y2="92"/>
      <line x1="92" y1="112" x2="150" y2="112"/>
      <line x1="92" y1="72" x2="160" y2="72"/>
    </g>
  </g>

  <!-- ================= the SEVERED direct path: device to cloud, crossed out ================= -->
  <g>
    <path d="M250 470 C 520 600, 760 600, 1010 470" fill="none" stroke="#c14a3a" stroke-width="5" stroke-dasharray="4 16" stroke-linecap="round" opacity="0.85"/>
    <!-- big crossed-out marker mid-path -->
    <g transform="translate(630,556)">
      <circle r="34" fill="#fdfaf2" stroke="#c14a3a" stroke-width="5"/>
      <path d="M-15 -15 L15 15 M15 -15 L-15 15" stroke="#c14a3a" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
