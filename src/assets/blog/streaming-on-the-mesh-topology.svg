<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580">
  <rect x="2" y="2" width="996" height="576" rx="10" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', monospace; fill: #1a1d24; }
    .node{ font-size: 20px; font-weight: 700; }
    .cap { font-size: 15px; fill: #5b616b; }
    .key { font-size: 14px; fill: #b7410e; }
  </style>

  <!-- client -->
  <rect x="34" y="250" width="150" height="80" rx="8" fill="#fdfaf2"
        stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <text class="node" x="109" y="285" text-anchor="middle">client</text>
  <text class="cap"  x="109" y="310" text-anchor="middle">by key</text>

  <!-- one bidi QUIC stream to gateway -->
  <line x1="184" y1="290" x2="360" y2="290" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="3"/>
  <text class="cap" x="272" y="278" text-anchor="middle">1 bidi QUIC stream</text>
  <polygon points="360,290 346,282 346,298" fill="#1a1d24" fill-opacity="0.55"/>

  <!-- gateway: the only smart node -->
  <circle cx="450" cy="290" r="86" fill="#fdfaf2" stroke="#b7410e" stroke-width="5"/>
  <text class="node" x="450" y="278" text-anchor="middle">gateway</text>
  <text class="cap"  x="450" y="302" text-anchor="middle">single writer</text>
  <text class="cap"  x="450" y="322" text-anchor="middle">routing dir</text>
  <text class="cap"  x="450" y="398" text-anchor="middle" fill="#3a7d44">gossiped — not centralized</text>

  <!-- mesh boundary -->
  <line x1="700" y1="40" x2="700" y2="540" stroke="#1a1d24" stroke-opacity="0.3"
        stroke-width="3" stroke-dasharray="4 12"/>
  <text class="cap" x="690" y="60" text-anchor="end">mesh A</text>
  <text class="cap" x="712" y="60">mesh B</text>

  <!-- fan-out to storage A (same mesh) -->
  <line x1="528" y1="250" x2="760" y2="150" stroke="#1a1d24" stroke-opacity="0.5" stroke-width="3"/>
  <polygon points="760,150 746,148 750,163" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="key" x="600" y="178">by key</text>

  <!-- fan-out to storage B (other mesh), crosses boundary -->
  <line x1="528" y1="332" x2="760" y2="440" stroke="#1a1d24" stroke-opacity="0.5"
        stroke-width="3" stroke-dasharray="10 7"/>
  <polygon points="760,440 746,431 744,447" fill="#1a1d24" fill-opacity="0.5"/>
  <text class="key" x="592" y="420">by key → cross-mesh</text>

  <!-- storage A: dumb append-only log -->
  <text class="node" x="850" y="105" text-anchor="middle">storage</text>
  <g font-size="14">
    <rect x="775" y="118" width="150" height="30" fill="#3a7d44" fill-opacity="0.18" stroke="#3a7d44" stroke-width="2"/>
    <text x="785" y="138" fill="#1a1d24">@0</text>
    <rect x="775" y="148" width="150" height="30" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.45" stroke-width="2"/>
    <text x="785" y="168" fill="#1a1d24">@1</text>
    <rect x="775" y="178" width="150" height="30" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.45" stroke-width="2"/>
    <text x="785" y="198" fill="#1a1d24">@2</text>
  </g>
  <text class="cap" x="850" y="232" text-anchor="middle">append-only log</text>

  <!-- storage B -->
  <text class="node" x="850" y="408" text-anchor="middle">storage</text>
  <g font-size="14">
    <rect x="775" y="420" width="150" height="30" fill="#b7410e" fill-opacity="0.20" stroke="#b7410e" stroke-width="2"/>
    <text x="785" y="440" fill="#1a1d24">@0</text>
    <rect x="775" y="450" width="150" height="30" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.45" stroke-width="2"/>
    <text x="785" y="470" fill="#1a1d24">@1</text>
  </g>
  <text class="cap" x="850" y="504" text-anchor="middle">offset = index</text>

  <!-- footer -->
  <text class="cap" x="34" y="556">no etcd · no ZooKeeper · no quorum — ordering from the single writer, membership from gossip</text>
</svg>
