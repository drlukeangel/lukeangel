<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="2014 forecast confidence">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24">

    <!-- axis -->
    <line x1="360" y1="48" x2="360" y2="404" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="2"/>
    <g font-size="11" fill="#7a808c" text-anchor="middle">
      <text x="360" y="428">0%</text>
      <text x="520" y="428">25%</text>
      <text x="680" y="428">50%</text>
      <text x="840" y="428">75%</text>
      <text x="940" y="428">100%</text>
    </g>
    <g stroke="#1a1d24" stroke-opacity="0.08" stroke-width="1">
      <line x1="520" y1="48" x2="520" y2="404"/>
      <line x1="680" y1="48" x2="680" y2="404"/>
      <line x1="840" y1="48" x2="840" y2="404"/>
    </g>

    <!-- bars: x scale 360 + conf*6.4 px ; rows at 58,108,158,208,258,308 -->
    <g>
      <!-- talk to the house 95% : 0.95*580=551 -->
      <rect x="360" y="50" width="551" height="34" rx="6" fill="#6a4c93" fill-opacity="0.85"/>
      <text x="350" y="71" font-size="12" text-anchor="end" fill="#1a1d24">"talk to my house" = table-stakes</text>
      <text x="895" y="71" font-size="12" text-anchor="end" fill="#fdfaf2">95%</text>
    </g>
    <g>
      <!-- hub unifier 90% : 0.90*580=522 -->
      <rect x="360" y="100" width="522" height="34" rx="6" fill="#6a4c93" fill-opacity="0.85"/>
      <text x="350" y="121" font-size="12" text-anchor="end" fill="#1a1d24">SmartThings hub at retail</text>
      <text x="866" y="121" font-size="12" text-anchor="end" fill="#fdfaf2">90%</text>
    </g>
    <g>
      <!-- amazon voice 80% : 0.80*580=464 -->
      <rect x="360" y="150" width="464" height="34" rx="6" fill="#6a4c93" fill-opacity="0.7"/>
      <text x="350" y="171" font-size="12" text-anchor="end" fill="#1a1d24">Amazon ships a voice speaker</text>
      <text x="808" y="171" font-size="12" text-anchor="end" fill="#fdfaf2">80%</text>
    </g>
    <g>
      <!-- apple homekit 70% : 0.70*580=406 -->
      <rect x="360" y="200" width="406" height="34" rx="6" fill="#6a4c93" fill-opacity="0.55"/>
      <text x="350" y="221" font-size="12" text-anchor="end" fill="#1a1d24">Apple announces HomeKit (MFi)</text>
      <text x="750" y="221" font-size="12" text-anchor="end" fill="#1a1d24">70%</text>
    </g>
    <g>
      <!-- google 60% : 0.60*580=348 -->
      <rect x="360" y="250" width="348" height="34" rx="6" fill="#6a4c93" fill-opacity="0.42"/>
      <text x="350" y="271" font-size="12" text-anchor="end" fill="#1a1d24">Google buys/builds into smart home</text>
      <text x="692" y="271" font-size="12" text-anchor="end" fill="#1a1d24">60%</text>
    </g>
    <g>
      <!-- zigbee 3.0 60% : 0.60*580=348 -->
      <rect x="360" y="300" width="348" height="34" rx="6" fill="#6a4c93" fill-opacity="0.42"/>
      <text x="350" y="321" font-size="12" text-anchor="end" fill="#1a1d24">Zigbee 3.0 merges ZLL + HA profiles</text>
      <text x="692" y="321" font-size="12" text-anchor="end" fill="#1a1d24">60%</text>
    </g>

    <text x="360" y="30" font-size="13" fill="#5b616b">2014 forecast — calls ranked by confidence</text>
    <text x="940" y="458" font-size="11" fill="#7a808c" text-anchor="end" font-style="italic" font-family="Newsreader, Georgia, serif">voice is the bet; the hub is the enabler</text>
  </g>
</svg>
