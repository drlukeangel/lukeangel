<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Leak response sequence">
  <rect width="880" height="420" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:13px;fill:#1a1d24}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;fill:#7a808c}
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#1a1d24" fill-opacity="0.6"/></marker>
  </defs>

  <!-- wet sensor -->
  <g transform="translate(90 120)">
    <rect x="-50" y="-30" width="100" height="60" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <circle cx="0" cy="-2" r="9" fill="#c14a3a"/>
    <text class="mut" x="-34" y="22">wet sensor</text>
  </g>

  <!-- branch: four immediate + one debounced -->
  <g transform="translate(290 60)">
    <rect x="-58" y="-22" width="116" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <text class="mut" x="-50" y="-2">4 sensors</text>
    <text class="mut" x="-50" y="14">trigger now</text>
  </g>
  <g transform="translate(290 180)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/>
    <text class="mut" x="-64" y="-2">dishwasher:</text>
    <text class="mut" x="-64" y="14">wet for 30s</text>
  </g>

  <!-- automation node -->
  <g transform="translate(500 120)">
    <rect x="-44" y="-34" width="88" height="68" rx="10" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.5"/>
    <text class="mut" x="-38" y="-4">automation</text>
    <text class="mut" x="-26" y="14">fires</text>
  </g>

  <!-- four outcomes -->
  <g>
    <g transform="translate(740 40)"><rect x="-90" y="-20" width="180" height="40" rx="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/><text class="lbl" x="-78" y="5">close main valve</text></g>
    <g transform="translate(740 100)"><rect x="-90" y="-20" width="180" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/><text class="lbl" x="-78" y="5">sound siren</text></g>
    <g transform="translate(740 160)"><rect x="-90" y="-20" width="180" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/><text class="lbl" x="-78" y="5">push to phones</text></g>
    <g transform="translate(740 220)"><rect x="-90" y="-20" width="180" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.4"/><text class="lbl" x="-78" y="5">lights → red</text></g>
  </g>

  <!-- arrows -->
  <g stroke="#1a1d24" stroke-width="2" stroke-opacity="0.6" fill="none">
    <path d="M140 108 L228 70" marker-end="url(#a)"/>
    <path d="M140 132 L214 178" marker-end="url(#a)"/>
    <path d="M348 64 L452 110" marker-end="url(#a)"/>
    <path d="M362 180 L452 132" marker-end="url(#a)"/>
    <path d="M544 104 L646 46" marker-end="url(#a)"/>
    <path d="M544 116 L646 100" marker-end="url(#a)"/>
    <path d="M544 128 L646 160" marker-end="url(#a)"/>
    <path d="M544 140 L646 216" marker-end="url(#a)"/>
  </g>

  <!-- valve closing detail bottom -->
  <g transform="translate(440 350)">
    <text class="mut" x="-150" y="5">sensor wet</text>
    <line x1="-70" y1="0" x2="60" y2="0" stroke="#1a1d24" stroke-opacity="0.4" stroke-width="2" marker-end="url(#a)"/>
    <text class="mut" x="-58" y="-12">~2s report + 8s rotate</text>
    <text class="mut" x="78" y="5">valve closed</text>
  </g>
</svg>
