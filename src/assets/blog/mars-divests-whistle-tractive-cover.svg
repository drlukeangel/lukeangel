<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A large company hands a small pet device to a smaller one">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#c87533"/>

  <!-- ===== the big empire (left): a tall stack of blocks, one leg detaching ===== -->
  <g transform="translate(150,150)">
    <!-- stack of holdings -->
    <rect x="0" y="0" width="230" height="56" rx="8" fill="#1a1d24" fill-opacity="0.07" stroke="#1a1d24" stroke-width="3"/>
    <rect x="0" y="70" width="230" height="56" rx="8" fill="#1a1d24" fill-opacity="0.07" stroke="#1a1d24" stroke-width="3"/>
    <rect x="0" y="140" width="230" height="56" rx="8" fill="#1a1d24" fill-opacity="0.07" stroke="#1a1d24" stroke-width="3"/>
    <!-- the device leg, detaching: drawn askew + faded, sliding away to the right -->
    <g transform="translate(40,222) rotate(-7)">
      <rect x="0" y="0" width="230" height="56" rx="8" fill="#c87533" fill-opacity="0.12" stroke="#c87533" stroke-width="3" stroke-dasharray="8 5"/>
      <!-- little collar-puck glyph inside the detaching leg -->
      <circle cx="40" cy="28" r="15" fill="#c87533"/>
      <g stroke="#fdfaf2" stroke-width="2.6" fill="none"><path d="M52 20 a13 13 0 0 1 0 16"/></g>
    </g>
    <!-- a tiny crack/gap where the leg pulled free -->
    <path d="M20 210 l190 6" stroke="#c14a3a" stroke-width="3" stroke-dasharray="3 6" opacity="0.8"/>
  </g>

  <!-- ===== handoff arrow ===== -->
  <g transform="translate(470,400)">
    <path d="M0 20 H190" fill="none" stroke="#1a1d24" stroke-width="5"/>
    <path d="M196 20 l-22 -11 v22 z" fill="#1a1d24"/>
  </g>

  <!-- ===== the smaller recipient (right): one modest block catching the puck ===== -->
  <g transform="translate(720,330)">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5"/>
    <!-- the puck now landing here, bright -->
    <circle cx="100" cy="64" r="26" fill="#c87533"/>
    <g stroke="#fdfaf2" stroke-width="3" fill="none">
      <path d="M118 50 a22 22 0 0 1 0 28"/>
      <path d="M128 42 a34 34 0 0 1 0 44"/>
    </g>
    <!-- a small pet-paw mark below to signal "pet company" -->
    <g transform="translate(100,118)" fill="#1a1d24" fill-opacity="0.4">
      <circle cx="0" cy="6" r="9"/>
      <circle cx="-13" cy="-7" r="5"/><circle cx="-1" cy="-13" r="5"/><circle cx="12" cy="-7" r="5"/>
    </g>
  </g>

  <!-- ===== the Whistle cloud, going dark, top-right ===== -->
  <g transform="translate(940,120)">
    <path d="M40 96 a28 28 0 0 1 4 -54 a34 34 0 0 1 64 6 a24 24 0 0 1 -2 48 z" fill="#7a808c" fill-opacity="0.1" stroke="#7a808c" stroke-width="3.5" stroke-dasharray="6 5"/>
    <!-- power-off glyph inside = going offline -->
    <g transform="translate(76,52)" stroke="#c14a3a" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M-12 -4 a16 16 0 1 0 24 0"/>
      <line x1="0" y1="-14" x2="0" y2="2"/>
    </g>
  </g>
</svg>
