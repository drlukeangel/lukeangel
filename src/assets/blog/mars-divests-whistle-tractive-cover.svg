<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">Mars divests Whistle to Tractive — cover</title>
  <desc id="d">2025-era modern cover showing the corporate transfer: Mars Petcare logo on left, an arrow with "divests" label crossing the page, and Tractive on the right. A small "Whistle cloud goes dark Aug 31" callout sits beneath the arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#2a323d"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#2a52be"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#fdfaf2" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="80" y="80" font-size="20" letter-spacing="6" opacity="0.6">CONNECTED COLLAR MARKET · JULY 8 2025</text>
    <text x="80" y="180" font-size="72" font-weight="500" letter-spacing="-1.5">Mars divests Whistle</text>
    <text x="80" y="260" font-size="72" font-weight="500" letter-spacing="-1.5">to Tractive</text>
    <text x="80" y="320" font-size="22" font-style="italic" opacity="0.7">Nine years after acquiring it. The empire is starting to look smaller.</text>
  </g>

  <!-- Corporate transfer visualization -->
  <g transform="translate(120,410)">
    <!-- Mars block -->
    <rect width="260" height="120" rx="8" fill="#dc2626" opacity="0.9"/>
    <text x="130" y="50" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="28" font-weight="600">MARS PETCARE</text>
    <text x="130" y="80" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="14" opacity="0.85">food · clinics · analytics</text>
    <text x="130" y="100" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="12" opacity="0.7" font-style="italic">acquired Whistle 2016</text>

    <!-- Arrow -->
    <g transform="translate(280,55)">
      <line x1="0" y1="5" x2="320" y2="5" stroke="url(#arrow)" stroke-width="6"/>
      <polygon points="320,0 340,5 320,10" fill="#2a52be"/>
      <text x="160" y="-12" text-anchor="middle" fill="#fdfaf2" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="4">DIVESTS · JUL 2025</text>
      <text x="160" y="30" text-anchor="middle" fill="#9aa3ad" font-family="'Inter',Arial" font-size="13" font-style="italic">Whistle cloud goes dark · Aug 31</text>
    </g>

    <!-- Tractive block -->
    <rect x="620" y="0" width="260" height="120" rx="8" fill="#2a52be" opacity="0.9"/>
    <text x="750" y="50" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="28" font-weight="600">TRACTIVE</text>
    <text x="750" y="80" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="14" opacity="0.85">Austrian · independent</text>
    <text x="750" y="100" text-anchor="middle" fill="#fdfaf2" font-family="'Inter',Arial" font-size="12" opacity="0.7" font-style="italic">migration path: rebuy a DOG 6</text>
  </g>

  <text x="80" y="600" fill="#fdfaf2" opacity="0.55" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="4">LUKEANGEL.CO · THE JOURNAL · PET IOT FIELD GUIDE</text>
</svg>
