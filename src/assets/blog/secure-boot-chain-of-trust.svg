<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" role="img" aria-label="The boot chain of trust: an immutable Boot ROM with a fused key verifies the second-stage bootloader, which verifies the OS kernel, which verifies the application. Each stage checks the next's signature before running it; any failed signature halts the boot into recovery.">
  <rect width="1080" height="400" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE BOOT CHAIN OF TRUST</text>

  <rect x="40" y="104" width="232" height="96" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <g transform="translate(58,123)" stroke="#c14a3a" stroke-width="2.4" fill="none">
    <rect x="0" y="9" width="18" height="14" rx="2.5"/>
    <path d="M3 9 v-4 a6 6 0 0 1 12 0 v4"/>
  </g>
  <text x="172" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">BOOT ROM</text>
  <text x="156" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">immutable · key fused in</text>

  <text x="292" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">verifies</text>
  <g stroke="#3a7d44" stroke-width="3" fill="#3a7d44"><line x1="272" y1="152" x2="308" y2="152"/><path d="M312 152 l-15 -7 v14 z"/></g>

  <rect x="314" y="104" width="208" height="96" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="418" y="148" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">BOOTLOADER</text>
  <text x="418" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">2nd stage</text>

  <text x="542" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">verifies</text>
  <g stroke="#3a7d44" stroke-width="3" fill="#3a7d44"><line x1="522" y1="152" x2="558" y2="152"/><path d="M562 152 l-15 -7 v14 z"/></g>

  <rect x="564" y="104" width="186" height="96" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="657" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">OS KERNEL</text>

  <text x="770" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">verifies</text>
  <g stroke="#3a7d44" stroke-width="3" fill="#3a7d44"><line x1="750" y1="152" x2="786" y2="152"/><path d="M790 152 l-15 -7 v14 z"/></g>

  <rect x="792" y="104" width="172" height="96" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <text x="878" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">APPLICATION</text>

  <g stroke="#c14a3a" stroke-width="2.6" fill="none" stroke-dasharray="7 5">
    <path d="M657 200 V 251 H 536"/>
  </g>
  <path d="M536 251 l16 -7 v14 z" fill="#c14a3a"/>
  <text x="672" y="228" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">signature fails</text>
  <rect x="300" y="223" width="232" height="58" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
  <text x="416" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">HALT · recovery mode</text>
  <text x="416" y="269" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">won't run untrusted code</text>

  <text x="540" y="352" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Flip one bit and the hash changes — the signature no longer matches, and the chain stops.</text>
</svg>
