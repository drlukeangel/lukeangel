<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2020 pet IoT year">
  <defs>
    <pattern id="dots20" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots20)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <line x1="90" y1="500" x2="1120" y2="500" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
  <!-- soft divider between the year's two halves -->
  <line x1="600" y1="120" x2="600" y2="470" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="4 8"/>

  <!-- LEFT HALF: Petnet died — dead feeder, unplugged -->
  <g transform="translate(330,300)">
    <path d="M-58 6 L-30 -90 L30 -90 L58 6 Z" fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.55"/>
    <rect x="-58" y="6" width="116" height="44" rx="8" fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.55"/>
    <ellipse cx="0" cy="64" rx="40" ry="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.45"/>
    <!-- dead status light -->
    <circle cx="0" cy="26" r="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <!-- unplugged cord -->
    <path d="M58 40 C 96 56, 96 96, 70 110" fill="none" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5"/>
    <rect x="62" y="106" width="16" height="22" rx="3" fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="66" y1="128" x2="66" y2="138" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5"/>
    <line x1="74" y1="128" x2="74" y2="138" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5"/>
    <!-- the death mark -->
    <g transform="translate(-2,-44)">
      <circle cx="0" cy="0" r="20" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3.5"/>
      <path d="M-9 -9 l18 18 M9 -9 l-18 18" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- RIGHT HALF: Boson arrived — second door + chip feeder + tiny kitten -->
  <!-- second cat door -->
  <g transform="translate(760,330)">
    <rect x="-52" y="-30" width="104" height="160" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-34" y="0" width="68" height="78" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-34" y="0" width="68" height="46" rx="9" fill="#1a1d24" fill-opacity="0.05"/>
    <line x1="-34" y1="46" x2="34" y2="46" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="100" r="6" fill="#3a7d44"/>
  </g>
  <!-- microchip feeder -->
  <g transform="translate(910,350)">
    <path d="M-40 8 L-22 -50 L22 -50 L40 8 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <rect x="-40" y="8" width="80" height="32" rx="7" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
    <ellipse cx="0" cy="54" rx="28" ry="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="24" r="6" fill="#3a7d44"/>
  </g>
  <!-- tiny new kitten -->
  <g transform="translate(1040,420)">
    <ellipse cx="0" cy="30" rx="40" ry="26" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="-30" cy="2" r="24" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <path d="M-46 -14 l-5 -16 l15 9 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-14 -14 l5 -16 l-15 9 Z" fill="#fff" stroke="#1a1d24" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="-36" cy="1" r="3" fill="#1a1d24"/>
    <circle cx="-24" cy="1" r="3" fill="#1a1d24"/>
    <path d="M40 36 C 66 30, 68 6, 54 -2" fill="none" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
