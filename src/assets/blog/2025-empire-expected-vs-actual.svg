<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" role="img" aria-label="The empire was forecast to keep expanding; it contracted instead.">
  <rect width="1080" height="400" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHAT I FORECAST vs WHAT HAPPENED</text>

  <!-- axes -->
  <line x1="120" y1="90" x2="120" y2="320" stroke="#1a1d24" stroke-width="1.5" opacity="0.25"/>
  <line x1="120" y1="320" x2="1000" y2="320" stroke="#1a1d24" stroke-width="1.5" opacity="0.25"/>
  <text x="120" y="346" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">2016</text>
  <text x="560" y="346" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">2023</text>
  <text x="1000" y="346" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">2025</text>
  <text x="86" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">more</text>
  <text x="74" y="316" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">fewer</text>

  <!-- shared history line (Mars buys everything, 2016->2023, rising) -->
  <polyline points="120,300 300,260 480,210 700,150" fill="none" stroke="#1a1d24" stroke-width="3.5" stroke-linecap="round"/>
  <text x="360" y="200" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c" transform="rotate(-12 360 200)">Mars buys everything →</text>

  <!-- branch point at 2023/24 -->
  <circle cx="700" cy="150" r="6" fill="#1a1d24"/>

  <!-- FORECAST: keeps rising (dashed grey) -->
  <polyline points="700,150 1000,96" fill="none" stroke="#7a808c" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
  <text x="900" y="98" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">forecast: keeps expanding (80%)</text>

  <!-- ACTUAL: drops (orange, the divest) -->
  <polyline points="700,150 860,150 1000,270" fill="none" stroke="#c87533" stroke-width="4" stroke-linecap="round"/>
  <circle cx="860" cy="150" r="6" fill="#c87533"/>
  <text x="864" y="138" font-family="ui-monospace,monospace" font-size="10.5" fill="#c87533">Jul 2025: divests Whistle</text>
  <text x="930" y="300" font-family="ui-monospace,monospace" font-size="11" fill="#c87533">actual: contracts</text>

  <text x="540" y="384" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Seven years of "the empire only grows" made the one year it shrank impossible to see coming.</text>
</svg>
