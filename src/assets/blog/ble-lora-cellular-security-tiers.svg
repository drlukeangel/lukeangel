<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" width="1120" height="400" role="img" aria-label="Three security tiers by buyer">
  <rect width="1120" height="400" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">QUESTION 5 — THE SECURITY MODEL IS A LADDER, EACH TIER ADDS TO THE LAST</text>

  <!-- Tier 1 -->
  <rect x="60" y="100" width="320" height="250" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="2.5"/>
  <text x="220" y="134" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#2a52be">TIER 1 · consumer</text>
  <text x="220" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">unmanaged, cloud handles auth</text>
  <line x1="92" y1="174" x2="348" y2="174" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="92" y="206" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; cert per device</text>
  <text x="92" y="232" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; TLS to cloud</text>
  <text x="92" y="258" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; cloud-side auth</text>
  <text x="220" y="328" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#7a808c">+$0 secure-element BOM</text>

  <!-- Tier 2 -->
  <rect x="400" y="100" width="320" height="250" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
  <text x="560" y="134" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#2a52be">TIER 2 · commercial</text>
  <text x="560" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">managed network</text>
  <line x1="432" y1="174" x2="688" y2="174" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="432" y="200" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">everything in Tier 1, plus:</text>
  <text x="432" y="226" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; device attestation</text>
  <text x="432" y="252" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; cert rotation</text>
  <text x="432" y="278" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; on-device anti-tamper</text>
  <text x="560" y="328" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">+$1.50&#8211;$5 BOM</text>

  <!-- Tier 3 -->
  <rect x="740" y="100" width="320" height="250" rx="14" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
  <text x="900" y="134" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#c14a3a">TIER 3 · regulated</text>
  <text x="900" y="154" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">industrial, audited</text>
  <line x1="772" y1="174" x2="1028" y2="174" stroke="#1a1d24" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="772" y="200" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">everything in Tier 2, plus:</text>
  <text x="772" y="226" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; fleet behaviour monitor</text>
  <text x="772" y="252" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; HW SE (ATECC608A)</text>
  <text x="772" y="278" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">&#8226; revoke 1 device &lt; 60s</text>
  <text x="900" y="328" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">+$1.50&#8211;$5 BOM, hardware</text>

  <!-- stacking arrows -->
  <g fill="#7a808c"><path d="M382 225 l16 -7 v14 z"/><path d="M722 225 l16 -7 v14 z"/></g>
</svg>
