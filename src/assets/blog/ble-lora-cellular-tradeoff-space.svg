<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="Range versus power tradeoff space">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE TRADEOFF SPACE — REACH vs POWER</text>

  <!-- axes -->
  <g stroke="#1a1d24" stroke-width="2">
    <line x1="120" y1="470" x2="1040" y2="470"/>
    <line x1="120" y1="470" x2="120" y2="90"/>
  </g>
  <!-- axis arrowheads -->
  <path d="M1040 470 l-12 -6 l0 12 z" fill="#1a1d24"/>
  <path d="M120 90 l-6 12 l12 0 z" fill="#1a1d24"/>

  <!-- axis labels -->
  <text x="1040" y="500" text-anchor="end" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">RANGE  (10 m  →  anywhere)</text>
  <g transform="translate(96,280) rotate(-90)"><text text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">BATTERY LIFE  (days  →  years)</text></g>

  <!-- the "frontier" arc: the upper envelope — nothing reaches farther for less power -->
  <path d="M178 118 C 470 150, 640 175, 1000 415" fill="none" stroke="#7a808c" stroke-width="2" stroke-dasharray="6 7"/>
  <text x="476" y="495" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#7a808c">the dashed line is the frontier — reach is paid for in power</text>

  <!-- BLE: short range, long battery (top-left) -->
  <g transform="translate(230,150)">
    <circle cx="0" cy="0" r="46" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">BLE 5.x</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#2a52be">~10 m</text>
    <text x="0" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">coin cell · 1 yr+</text>
  </g>

  <!-- Wi-Fi: short-mid range, poor battery (lower-left) -->
  <g transform="translate(330,400)">
    <circle cx="0" cy="0" r="42" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">Wi-Fi</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">~50 m</text>
    <text x="0" y="70" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">wall-power only</text>
  </g>

  <!-- LoRa: long range, long battery (mid, high) -->
  <g transform="translate(620,210)">
    <circle cx="0" cy="0" r="46" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">LoRa</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">to 10 km</text>
    <text x="0" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">low rate · 1 yr+</text>
  </g>

  <!-- NB-IoT / LTE-M: anywhere, mid battery -->
  <g transform="translate(840,330)">
    <circle cx="0" cy="0" r="48" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">NB-IoT /</text>
    <text x="0" y="12" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">LTE-M</text>
    <text x="0" y="76" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">anywhere · PSM</text>
  </g>

  <!-- Cellular 4G/5G: anywhere, poor battery (lower-right) -->
  <g transform="translate(960,430)">
    <circle cx="0" cy="0" r="44" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">4G / 5G</text>
    <text x="0" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">anywhere</text>
    <text x="44" y="-50" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">high data · thirsty</text>
  </g>
</svg>
