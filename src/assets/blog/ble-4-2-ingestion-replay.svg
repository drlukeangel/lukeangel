<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" width="1080" height="520" role="img" aria-label="Append-only ingestion built for replay. The device writes each session to on-device flash tagged with an ever-increasing monotonic counter (5, 6, 7, 8). The phone drains a range over BLE and uploads it to the cloud, possibly days late and possibly re-sending a range it already sent — here it re-sends 6 and 7. The cloud ingestion endpoint deduplicates on the (device-serial, counter) idempotency key, dropping the duplicate 6 and 7, and reconstructs order from the device timestamp. Late, duplicate, and out-of-order arrivals all converge to one correct, ordered event log.">
  <rect width="1080" height="520" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">APPEND-ONLY INGESTION, BUILT FOR REPLAY</text>

  <!-- column headers -->
  <text x="150" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">DEVICE</text>
  <text x="150" y="106" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">flash · monotonic counter</text>
  <text x="540" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">PHONE</text>
  <text x="540" y="106" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">drains a range · may re-send</text>
  <text x="912" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">CLOUD</text>
  <text x="912" y="106" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">dedup + order server-side</text>

  <!-- DEVICE flash stack -->
  <g font-family="ui-monospace,monospace" font-size="13">
    <rect x="74" y="140" width="152" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="150" y="166" text-anchor="middle" fill="#1a1d24">session #5</text>
    <rect x="74" y="190" width="152" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="150" y="216" text-anchor="middle" fill="#1a1d24">session #6</text>
    <rect x="74" y="240" width="152" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="150" y="266" text-anchor="middle" fill="#1a1d24">session #7</text>
    <rect x="74" y="290" width="152" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="150" y="316" text-anchor="middle" fill="#1a1d24">session #8</text>
  </g>
  <text x="150" y="362" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">counter only ever goes up</text>

  <!-- BLE drain arrow device->phone -->
  <text x="312" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#357a8c">BLE drain</text>
  <g stroke="#357a8c" stroke-width="3.2" fill="#357a8c" stroke-linecap="round">
    <line x1="240" y1="240" x2="404" y2="240"/>
    <path d="M416 240 l-16 -7 v14 z"/>
  </g>
  <text x="320" y="268" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">days late · app was closed</text>

  <!-- PHONE upload buffer (shows a re-sent range) -->
  <g font-family="ui-monospace,monospace" font-size="12">
    <rect x="450" y="150" width="180" height="200" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="540" y="178" text-anchor="middle" fill="#7a808c" font-size="11">uploads range 6..8</text>
    <rect x="470" y="194" width="140" height="34" rx="7" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/><text x="540" y="216" text-anchor="middle" fill="#c14a3a">#6 (again)</text>
    <rect x="470" y="234" width="140" height="34" rx="7" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4"/><text x="540" y="256" text-anchor="middle" fill="#c14a3a">#7 (again)</text>
    <rect x="470" y="274" width="140" height="34" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="540" y="296" text-anchor="middle" fill="#1a1d24">#8</text>
    <text x="540" y="336" text-anchor="middle" fill="#7a808c" font-size="10">cursor slipped → re-sends 6,7</text>
  </g>

  <!-- HTTPS upload arrow phone->cloud -->
  <text x="700" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#357a8c">HTTPS</text>
  <g stroke="#357a8c" stroke-width="3.2" fill="#357a8c" stroke-linecap="round">
    <line x1="636" y1="240" x2="772" y2="240"/>
    <path d="M784 240 l-16 -7 v14 z"/>
  </g>

  <!-- CLOUD: dedup gate + ordered log -->
  <g transform="translate(806,148)">
    <rect x="0" y="0" width="232" height="204" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="116" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">dedup on (serial, counter)</text>
    <line x1="18" y1="44" x2="214" y2="44" stroke="#1a1d24" stroke-width="1" opacity="0.25"/>
    <!-- dropped duplicates -->
    <g font-family="ui-monospace,monospace" font-size="11.5">
      <text x="20" y="74" fill="#c14a3a">#6 dup</text>
      <path d="M86 70 l16 0 m-16 -1 l16 2" stroke="#c14a3a" stroke-width="2"/>
      <text x="118" y="74" fill="#c14a3a">dropped</text>
      <text x="20" y="100" fill="#c14a3a">#7 dup</text>
      <path d="M86 96 l16 0 m-16 -1 l16 2" stroke="#c14a3a" stroke-width="2"/>
      <text x="118" y="100" fill="#c14a3a">dropped</text>
    </g>
    <line x1="18" y1="116" x2="214" y2="116" stroke="#1a1d24" stroke-width="1" opacity="0.25"/>
    <text x="116" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44">ordered event log</text>
    <g font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">
      <text x="116" y="166" text-anchor="middle">… 5 · 6 · 7 · 8 …</text>
    </g>
    <g transform="translate(98,180)" stroke="#3a7d44" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 l8 8 l16 -18"/>
    </g>
  </g>

  <line x1="40" y1="408" x2="1040" y2="408" stroke="#1a1d24" stroke-width="1" opacity="0.15"/>
  <text x="540" y="446" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Late, duplicated, out of order — the gateway can mangle delivery every way at once.</text>
  <text x="540" y="474" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">The idempotency key absorbs all of it, and the same correct log falls out the end.</text>
</svg>
