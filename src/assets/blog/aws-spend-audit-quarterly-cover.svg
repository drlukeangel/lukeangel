<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Spend audit cover.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="sa-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#sa-dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#4f46b8"/>

  <!-- the bill: stacked spend bars, each leaking red drops out its right edge -->
  <g transform="translate(250,150)">
    <rect x="0" y="0"   width="340" height="56" rx="6" fill="#1a1d24"/>
    <rect x="40" y="76"  width="300" height="56" rx="6" fill="#4f46b8"/>
    <rect x="80" y="152" width="260" height="56" rx="6" fill="#6f66c8"/>
    <rect x="120" y="228" width="220" height="56" rx="6" fill="#7a808c"/>

    <!-- leak drops escaping the right edges -->
    <g fill="#c14a3a">
      <circle cx="372" cy="20" r="10"/>
      <circle cx="404" cy="46" r="6"/>
      <circle cx="432" cy="70" r="4"/>
    </g>
    <g fill="#c14a3a">
      <circle cx="372" cy="104" r="9"/>
      <circle cx="402" cy="128" r="5"/>
    </g>
    <g fill="#c14a3a">
      <circle cx="372" cy="180" r="8"/>
      <circle cx="400" cy="202" r="4"/>
    </g>
    <g fill="#c14a3a">
      <circle cx="372" cy="256" r="6"/>
    </g>
  </g>

  <!-- magnifier over the bill: the quarterly audit catching the leaks -->
  <g transform="translate(720,330)">
    <circle cx="0" cy="0" r="124" fill="#fdfaf2"/>
    <circle cx="0" cy="0" r="124" fill="none" stroke="#1a1d24" stroke-width="14"/>
    <line x1="88" y1="88" x2="196" y2="196" stroke="#1a1d24" stroke-width="24" stroke-linecap="round"/>
    <path d="M -52 4 L -14 44 L 60 -46" fill="none" stroke="#3a7d44" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
