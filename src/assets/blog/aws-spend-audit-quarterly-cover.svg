  <g transform="translate(810, 168)">
    <rect x="0" y="0"  width="280" height="22" fill="#1a1d24"/>
    <rect x="0" y="30" width="220" height="22" fill="#2a52be"/>
    <rect x="0" y="60" width="160" height="22" fill="#7a808c"/>
