<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-label="Multi-fabric">
  <rect width="900" height="440" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>

  <!-- three ecosystem hubs across the top -->
  <g>
    <rect x="80" y="50" width="200" height="78" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="180" y="86" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">APPLE HOME</text>
    <text x="180" y="108" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">fabric A</text>

    <rect x="350" y="50" width="200" height="78" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="450" y="86" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">GOOGLE HOME</text>
    <text x="450" y="108" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">fabric B</text>

    <rect x="620" y="50" width="200" height="78" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="720" y="86" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">HOME ASSISTANT</text>
    <text x="720" y="108" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">fabric C</text>
  </g>

  <!-- credentials lines to the one device -->
  <g stroke="#6a4c93" stroke-width="3">
    <line x1="180" y1="128" x2="450" y2="300"/>
    <line x1="450" y1="128" x2="450" y2="300"/>
    <line x1="720" y1="128" x2="450" y2="300"/>
  </g>
  <g fill="#6a4c93" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" text-anchor="middle">
    <text x="262" y="214">credential A</text>
    <text x="486" y="200">cred B</text>
    <text x="636" y="214">credential C</text>
  </g>

  <!-- the one device -->
  <g transform="translate(450,330)">
    <circle cx="0" cy="0" r="44" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M-18 -8 a18 18 0 0 1 36 0 q0 13 -9 19 l0 9 l-18 0 l0 -9 q-9 -6 -9 -19 Z" fill="#6a4c93"/>
  </g>
  <text x="450" y="412" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">ONE Matter device · joined to all three at once</text>
</svg>
