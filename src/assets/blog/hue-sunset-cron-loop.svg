<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Sunset cron loop">
  <rect width="1000" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- step 1: cron clock -->
    <g transform="translate(110 130)">
      <circle r="46" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle r="26" fill="none" stroke="#1a1d24" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-18" stroke="#1a1d24" stroke-width="2.5"/>
      <line x1="0" y1="0" x2="14" y2="6" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="0" y="74" text-anchor="middle" font-size="13" fill="#5b616b">cron, every 5 min</text>
    </g>
    <path d="M168 130 L246 130" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#a)"/>

    <!-- step 2: astral: is it dark? -->
    <g transform="translate(250 96)">
      <rect x="0" y="0" width="170" height="68" rx="10" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
      <text x="85" y="30" text-anchor="middle" font-size="14" fill="#1a1d24">astral:</text>
      <text x="85" y="50" text-anchor="middle" font-size="13" fill="#6a4c93">is the sun down?</text>
      <text x="85" y="92" text-anchor="middle" font-size="12" fill="#5b616b">recomputed each run</text>
    </g>
    <path d="M420 130 L498 130" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#a)"/>

    <!-- step 3: PUT light state to bridge -->
    <g transform="translate(500 96)">
      <rect x="0" y="0" width="180" height="68" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <text x="90" y="30" text-anchor="middle" font-size="13" fill="#1a1d24">PUT /lights/4/state</text>
      <text x="90" y="50" text-anchor="middle" font-size="12" fill="#5b616b">on : is_dark</text>
    </g>
    <path d="M680 130 L758 130" stroke="#1a1d24" stroke-width="2.5" marker-end="url(#a)"/>

    <!-- bridge + porch bulb -->
    <g transform="translate(760 100)">
      <rect x="0" y="0" width="74" height="60" rx="12" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
      <circle cx="37" cy="30" r="9" fill="#6a4c93"/>
      <text x="37" y="80" text-anchor="middle" font-size="12" fill="#5b616b">bridge → porch</text>
    </g>

    <!-- idempotent loop-back arrow -->
    <path d="M820 170 C 820 280, 130 300, 110 196" fill="none" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5" stroke-dasharray="4 6" marker-end="url(#a)"/>
    <text x="470" y="300" text-anchor="middle" font-size="13" fill="#5b616b">idempotent — re-running sets the same state, no physical change</text>

    <!-- no-cloud note -->
    <g transform="translate(300 350)">
      <rect x="0" y="0" width="400" height="44" rx="10" fill="#6a4c93" fill-opacity="0.08" stroke="#6a4c93" stroke-opacity="0.4" stroke-width="2"/>
      <text x="200" y="28" text-anchor="middle" font-size="13" fill="#6a4c93">no cloud in the loop — cron, script, bridge all on the LAN</text>
    </g>

    <defs>
      <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 z" fill="#1a1d24"/></marker>
    </defs>
  </g>
</svg>
