<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 440" width="1120" height="440" role="img" aria-label="Three regulatory regimes the cart sits inside">
  <rect width="1120" height="440" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE REGIMES THE CART SITS INSIDE</text>

  <!-- PCI-DSS -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="336" height="290" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="#1a1d24">PCI-DSS</text>
    <!-- card glyph -->
    <g transform="translate(118,54)">
      <rect x="0" y="0" width="100" height="62" rx="8" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="2.4"/>
      <rect x="12" y="14" width="22" height="16" rx="3" fill="#2a52be" fill-opacity="0.5"/>
      <line x1="12" y1="44" x2="88" y2="44" stroke="#2a52be" stroke-width="2"/>
    </g>
    <text x="168" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#2a52be">cardholder data</text>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="26" y="190">covers: PAN, CVV,</text>
      <text x="26" y="210">magstripe, PIN</text>
      <text x="26" y="240">12 control areas,</text>
      <text x="26" y="260">100s of sub-controls</text>
    </g>
    <text x="168" y="282" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#c14a3a">scope cost is enormous</text>
  </g>

  <!-- GDPR / CCPA -->
  <g transform="translate(392,80)">
    <rect x="0" y="0" width="336" height="290" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="#1a1d24">GDPR + CCPA/CPRA</text>
    <!-- person glyph -->
    <g transform="translate(150,54)" stroke="#2a52be" stroke-width="2.4" fill="#2a52be" fill-opacity="0.10">
      <circle cx="18" cy="16" r="13"/>
      <path d="M0 60 a18 22 0 0 1 36 0 z"/>
    </g>
    <text x="168" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#2a52be">personal data</text>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="26" y="190">covers: anything that</text>
      <text x="26" y="210">identifies a person</text>
      <text x="26" y="240">rights: access, delete,</text>
      <text x="26" y="260">retention, breach report</text>
    </g>
    <text x="168" y="282" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">EU/UK + state-level US</text>
  </g>

  <!-- tax / VAT -->
  <g transform="translate(744,80)">
    <rect x="0" y="0" width="336" height="290" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="168" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="#1a1d24">SALES TAX / VAT</text>
    <!-- receipt glyph -->
    <g transform="translate(138,52)">
      <path d="M0 0 h60 v66 l-10 -7 -10 7 -10 -7 -10 7 -10 -7 -10 7 z" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="2.4"/>
      <line x1="12" y1="18" x2="48" y2="18" stroke="#2a52be" stroke-width="1.8"/>
      <line x1="12" y1="32" x2="48" y2="32" stroke="#2a52be" stroke-width="1.8"/>
    </g>
    <text x="168" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#2a52be">per-jurisdiction</text>
    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24">
      <text x="26" y="190">covers: tax computed</text>
      <text x="26" y="210">+ remitted correctly</text>
      <text x="26" y="240">US state/local, EU VAT,</text>
      <text x="26" y="260">tax-receipt fields</text>
    </g>
    <text x="168" y="282" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="12.5" font-style="italic" fill="#5b616b">we forward to the store's engine</text>
  </g>

  <text x="560" y="416" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">The whole design is a fight to shrink how much of the product sits inside each box.</text>
</svg>
