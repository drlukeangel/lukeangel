<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2022 — four animals, cat side smart">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- TOP: four animal silhouettes — two dogs, two cats -->
  <!-- dog 1 -->
  <g transform="translate(280,200)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-55" y="0" width="115" height="46" rx="23"/>
    <rect x="-42" y="42" width="13" height="34" rx="5"/><rect x="-18" y="42" width="13" height="34" rx="5"/>
    <rect x="30" y="42" width="13" height="34" rx="5"/><rect x="48" y="42" width="13" height="34" rx="5"/>
    <path d="M 54 4 q 28 -6 38 12 q 5 10 18 12 q 7 1 7 8 q 0 6 -7 7 l -18 0 q -18 0 -28 -13 z"/>
    <path d="M 74 4 q 14 -8 20 5 q 3 8 -7 13"/>
    <path d="M -55 18 q -24 -3 -28 -28" fill="none"/>
  </g>
  <!-- dog 2 (smaller, the puppy) -->
  <g transform="translate(470,225)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-40" y="0" width="84" height="34" rx="17"/>
    <rect x="-30" y="30" width="11" height="26" rx="4"/><rect x="-12" y="30" width="11" height="26" rx="4"/>
    <rect x="22" y="30" width="11" height="26" rx="4"/><rect x="36" y="30" width="11" height="26" rx="4"/>
    <path d="M 40 4 q 20 -4 27 9 q 4 7 13 8 q 5 1 5 6 q 0 5 -5 5 l -13 0 q -13 0 -20 -9 z"/>
    <path d="M 54 4 q 10 -6 15 4 q 2 6 -5 9"/>
    <path d="M -40 13 q -18 -2 -21 -20" fill="none"/>
  </g>
  <!-- cat 1 — sitting, upright pointed ears, curled tail (clearly a cat, not a dog) -->
  <g transform="translate(710,180)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- haunch / seated body -->
    <path d="M -34 96 q -14 -70 34 -78 q 30 -5 40 18 q 8 18 6 40 q -2 22 -10 22 l -56 0 q -8 0 -10 -22 z"/>
    <!-- front legs down -->
    <rect x="6" y="78" width="13" height="24" rx="5"/>
    <rect x="26" y="78" width="13" height="24" rx="5"/>
    <!-- head -->
    <circle cx="34" cy="6" r="26"/>
    <!-- pointed ears -->
    <path d="M 14 -12 L 8 -38 L 30 -22 Z"/>
    <path d="M 54 -12 L 60 -38 L 38 -22 Z"/>
    <!-- face -->
    <circle cx="26" cy="4" r="2.6" fill="#1a1d24" stroke="none"/>
    <circle cx="42" cy="4" r="2.6" fill="#1a1d24" stroke="none"/>
    <!-- curled upright tail -->
    <path d="M -34 70 q -34 6 -34 -30 q 0 -18 14 -18" fill="none"/>
  </g>
  <!-- cat 2 — sitting, slightly smaller -->
  <g transform="translate(910,196)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M -30 84 q -12 -62 30 -70 q 27 -4 36 16 q 7 16 5 36 q -2 18 -9 18 l -50 0 q -7 0 -9 -18 z"/>
    <rect x="6" y="68" width="12" height="22" rx="5"/>
    <rect x="24" y="68" width="12" height="22" rx="5"/>
    <circle cx="30" cy="6" r="23"/>
    <path d="M 12 -10 L 7 -33 L 26 -19 Z"/>
    <path d="M 48 -10 L 53 -33 L 34 -19 Z"/>
    <circle cx="23" cy="4" r="2.4" fill="#1a1d24" stroke="none"/>
    <circle cx="37" cy="4" r="2.4" fill="#1a1d24" stroke="none"/>
    <path d="M -30 62 q -30 6 -30 -26 q 0 -16 12 -16" fill="none"/>
  </g>

  <!-- BOTTOM: device row — GPS collar (highlighted), litter scale (highlighted), shock-fence (crossed) -->
  <g transform="translate(0,440)">
    <!-- GPS collar puck -->
    <g transform="translate(340,0)">
      <circle cx="0" cy="0" r="40" fill="#c87533" fill-opacity="0.12" stroke="#c87533" stroke-width="5"/>
      <rect x="-22" y="-14" width="44" height="28" rx="6" fill="none" stroke="#c87533" stroke-width="3"/>
      <circle cx="0" cy="0" r="5" fill="#c87533"/>
    </g>
    <!-- litter scale (highlighted) -->
    <g transform="translate(600,0)">
      <circle cx="0" cy="0" r="40" fill="#c87533" fill-opacity="0.12" stroke="#c87533" stroke-width="5"/>
      <rect x="-26" y="6" width="52" height="14" rx="5" fill="none" stroke="#c87533" stroke-width="3"/>
      <path d="M -20 6 L -16 -12 L 16 -12 L 20 6 Z" fill="none" stroke="#c87533" stroke-width="3"/>
    </g>
    <!-- shock-fence collar (crossed out) -->
    <g transform="translate(860,0)">
      <circle cx="0" cy="0" r="40" fill="#fdfaf2" stroke="#7a808c" stroke-width="4"/>
      <path d="M 4 -18 L -12 4 L 2 4 L -6 22 L 14 -4 L 0 -4 Z" fill="#7a808c" stroke="none"/>
      <line x1="-34" y1="34" x2="34" y2="-34" stroke="#c14a3a" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
