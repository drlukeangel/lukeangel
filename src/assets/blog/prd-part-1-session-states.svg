<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="Session state machine across the user stories">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">ONE SESSION, EVERY PATH IT CAN TAKE</text>

  <!-- happy-path spine: IDLE -> ACTIVE -> COMPLETE -->
  <g font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24" text-anchor="middle">
    <rect x="60"  y="110" width="150" height="64" rx="32" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4"/>
    <text x="135" y="148">IDLE</text>
    <rect x="330" y="110" width="160" height="64" rx="14" fill="#fdfaf2" stroke="#2a52be" stroke-width="3"/>
    <text x="410" y="142">ACTIVE</text>
    <text x="410" y="160" font-size="10" fill="#5b616b">scanning</text>
    <rect x="650" y="110" width="170" height="64" rx="14" fill="#fdfaf2" stroke="#3a7d44" stroke-width="3"/>
    <text x="735" y="142">COMPLETE</text>
    <text x="735" y="160" font-size="10" fill="#5b616b">paid + receipt</text>
  </g>

  <!-- spine arrows -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24">
    <path d="M210 142 H326" fill="none"/>
    <path d="M326 142 l-16 -7 v14 z"/>
    <path d="M490 142 H646" fill="none"/>
    <path d="M646 142 l-16 -7 v14 z"/>
  </g>
  <text x="268" y="132" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">tap / shop-as-guest</text>
  <text x="568" y="132" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#5b616b">pay at end</text>

  <!-- PAUSED state (interrupted shop / edge) -->
  <rect x="330" y="250" width="160" height="60" rx="14" fill="#fdfaf2" stroke="#c87533" stroke-width="2.6"/>
  <text x="410" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">PAUSED</text>
  <text x="410" y="296" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#5b616b">slept, held in flash</text>
  <g stroke="#c87533" stroke-width="2.4" fill="#c87533">
    <path d="M395 174 V246" fill="none" stroke-dasharray="6 5"/>
    <path d="M395 246 l-7 -16 h14 z"/>
    <path d="M425 246 V178" fill="none" stroke-dasharray="6 5"/>
    <path d="M425 178 l-7 16 h14 z"/>
  </g>
  <text x="500" y="220" font-family="ui-monospace,monospace" font-size="10" fill="#c87533">interrupt / resume</text>

  <!-- VOIDED / ABANDONED (edge: out of battery, walk-out) -->
  <rect x="650" y="250" width="170" height="60" rx="14" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.4"/>
  <text x="735" y="278" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">VOIDED /</text>
  <text x="735" y="296" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">ABANDONED</text>
  <g stroke="#7a808c" stroke-width="2.4" fill="#7a808c">
    <path d="M460 174 C 560 230, 640 230, 690 246" fill="none" stroke-dasharray="6 5"/>
    <path d="M690 246 l-17 -3 8 -12 z"/>
  </g>
  <text x="600" y="206" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">battery cliff / left store</text>

  <!-- edge-case sidebar -->
  <g transform="translate(870,96)">
    <rect x="0" y="0" width="190" height="226" rx="12" fill="#2a52be" fill-opacity="0.05" stroke="#2a52be" stroke-width="2"/>
    <text x="16" y="28" font-family="ui-monospace,monospace" font-size="12" fill="#2a52be">EDGE CASES</text>
    <g font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">
      <text x="16" y="58">conn. loss →</text>
      <text x="28" y="76" fill="#5b616b">store-and-forward</text>
      <text x="16" y="104">low battery →</text>
      <text x="28" y="122" fill="#5b616b">sync, swap cart,</text>
      <text x="28" y="138" fill="#5b616b">cloud merges</text>
      <text x="16" y="166">left in lot →</text>
      <text x="28" y="184" fill="#5b616b">hourly cellular</text>
      <text x="28" y="200" fill="#5b616b">location ping</text>
    </g>
  </g>

  <!-- takeaway -->
  <rect x="60" y="376" width="760" height="60" rx="10" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="2"/>
  <text x="440" y="400" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">Four golden paths run the spine; the edge cases are the branches that decide robustness.</text>
  <text x="440" y="420" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">Account is optional throughout — a guest session never leaves the happy path</text>
</svg>
