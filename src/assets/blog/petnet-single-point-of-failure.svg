<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="single point of failure">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">ONE BRAIN, IN THE CLOUD, FOR THE WHOLE FLEET</text>

  <!-- the cloud brain (dead) -->
  <g transform="translate(500,140)">
    <path d="M-80 28 a34 34 0 0 1 62 -32 a40 40 0 0 1 78 14 a32 32 0 0 1 -6 64 l-130 0 a32 32 0 0 1 -4 -46 Z"
          fill="#fff" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5"/>
    <text x="-6" y="34" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#7a808c">DISPATCH TIMER</text>
    <!-- dead mark -->
    <circle cx="86" cy="2" r="16" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3.5"/>
    <path d="M79 -5 l14 14 M93 -5 l-14 14" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
    <text x="-6" y="70" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#c14a3a">stops firing &#8594; nobody gets told to feed</text>
  </g>

  <!-- fleet of feeders, all offline -->
  <g transform="translate(0,330)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">
    <!-- three feeders -->
    <g transform="translate(180,0)">
      <path d="M-34 6 L-18 -54 L18 -54 L34 6 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <rect x="-34" y="6" width="68" height="26" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <ellipse cx="0" cy="40" rx="24" ry="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <text x="0" y="64" text-anchor="middle">offline</text>
    </g>
    <g transform="translate(440,0)">
      <path d="M-34 6 L-18 -54 L18 -54 L34 6 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <rect x="-34" y="6" width="68" height="26" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <ellipse cx="0" cy="40" rx="24" ry="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <text x="0" y="64" text-anchor="middle">offline</text>
    </g>
    <g transform="translate(700,0)">
      <path d="M-34 6 L-18 -54 L18 -54 L34 6 Z" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <rect x="-34" y="6" width="68" height="26" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
      <ellipse cx="0" cy="40" rx="24" ry="8" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.5"/>
      <text x="0" y="64" text-anchor="middle">offline</text>
    </g>
    <!-- the manual-button escape, on the last one -->
    <g transform="translate(700,0)">
      <circle cx="44" cy="-30" r="13" fill="#3a7d44" fill-opacity="0.15" stroke="#3a7d44" stroke-width="2.5"/>
      <circle cx="44" cy="-30" r="4" fill="#3a7d44"/>
      <text x="44" y="-52" text-anchor="middle" fill="#3a7d44">manual</text>
    </g>
  </g>

  <!-- broken links cloud -> feeders -->
  <g stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="6 6">
    <line x1="460" y1="210" x2="190" y2="282"/>
    <line x1="500" y1="218" x2="450" y2="282"/>
    <line x1="540" y1="210" x2="700" y2="282"/>
  </g>
  <!-- small break marks -->
  <g stroke="#c14a3a" stroke-width="3" stroke-linecap="round">
    <path d="M318 240 l12 8 M330 240 l-12 8"/>
    <path d="M474 244 l12 8 M486 244 l-12 8"/>
    <path d="M614 240 l12 8 M626 240 l-12 8"/>
  </g>
  <text x="500" y="478" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">The hardware never broke. The one brain it all depended on did &#8212; so the whole fleet went dark at once.</text>
</svg>
