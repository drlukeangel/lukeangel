<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#1a1d24" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#b7410e"/>

  <!-- spanning-tree spokes -->
  <g stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <line x1="400" y1="290" x2="240" y2="170"/>
    <line x1="400" y1="290" x2="180" y2="290"/>
    <line x1="400" y1="290" x2="220" y2="430"/>
    <line x1="400" y1="290" x2="330" y2="490"/>
    <line x1="400" y1="290" x2="500" y2="470"/>
    <line x1="400" y1="290" x2="570" y2="380"/>
    <line x1="400" y1="290" x2="560" y2="180"/>
    <line x1="400" y1="290" x2="310" y2="130"/>

    <line x1="880" y1="320" x2="760" y2="200"/>
    <line x1="880" y1="320" x2="1030" y2="220"/>
    <line x1="880" y1="320" x2="1090" y2="340"/>
    <line x1="880" y1="320" x2="1050" y2="470"/>
    <line x1="880" y1="320" x2="930" y2="500"/>
    <line x1="880" y1="320" x2="790" y2="430"/>
    <line x1="880" y1="320" x2="830" y2="160"/>
  </g>

  <!-- dashed bridge link through center ring -->
  <g stroke="#b7410e" stroke-opacity="0.6" stroke-width="2.5" fill="none">
    <line x1="570" y1="380" x2="660" y2="320" stroke-dasharray="6 5"/>
    <line x1="660" y1="320" x2="790" y2="430" stroke-dasharray="6 5"/>
  </g>

  <!-- left cluster leaves -->
  <g fill="#1a1d24">
    <circle cx="240" cy="170" r="14"/>
    <circle cx="180" cy="290" r="14"/>
    <circle cx="220" cy="430" r="14"/>
    <circle cx="330" cy="490" r="14"/>
    <circle cx="500" cy="470" r="14"/>
    <circle cx="570" cy="380" r="14"/>
    <circle cx="560" cy="180" r="14"/>
    <circle cx="310" cy="130" r="14"/>
  </g>

  <!-- left hub -->
  <circle cx="400" cy="290" r="34" fill="#b7410e"/>
  <circle cx="400" cy="290" r="34" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="400" cy="290" r="15" fill="#fdfaf2" fill-opacity="0.85"/>

  <!-- bridge ring -->
  <circle cx="660" cy="320" r="22" fill="#fdfaf2"/>
  <circle cx="660" cy="320" r="22" fill="none" stroke="#b7410e" stroke-width="3"/>
  <circle cx="660" cy="320" r="8" fill="#b7410e"/>

  <!-- right cluster leaves -->
  <g fill="#1a1d24">
    <circle cx="760" cy="200" r="14"/>
    <circle cx="1030" cy="220" r="14"/>
    <circle cx="1090" cy="340" r="14"/>
    <circle cx="1050" cy="470" r="14"/>
    <circle cx="930" cy="500" r="14"/>
    <circle cx="790" cy="430" r="14"/>
    <circle cx="830" cy="160" r="14"/>
  </g>

  <!-- right hub -->
  <circle cx="880" cy="320" r="34" fill="#b7410e"/>
  <circle cx="880" cy="320" r="34" fill="none" stroke="#1a1d24" stroke-width="2"/>
  <circle cx="880" cy="320" r="15" fill="#fdfaf2" fill-opacity="0.85"/>
</svg>
