<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Home-run topology">
  <rect width="1000" height="440" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>

  <!-- central closet / patch panel -->
  <g transform="translate(400,160)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="3"/>
    <text x="100" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">WIRING CLOSET</text>
    <!-- patch panel ports -->
    <g fill="#6a4c93">
      <rect x="22" y="46" width="14" height="14" rx="2"/><rect x="44" y="46" width="14" height="14" rx="2"/>
      <rect x="66" y="46" width="14" height="14" rx="2"/><rect x="88" y="46" width="14" height="14" rx="2"/>
      <rect x="110" y="46" width="14" height="14" rx="2"/><rect x="132" y="46" width="14" height="14" rx="2"/>
      <rect x="154" y="46" width="14" height="14" rx="2"/>
    </g>
    <text x="100" y="86" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">patch panel</text>
    <text x="100" y="104" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">PoE switch · HA · NAS</text>
  </g>

  <!-- room endpoints, arranged around -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#1a1d24" text-anchor="middle">
    <g transform="translate(80,60)"><rect x="-58" y="-22" width="116" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">LIVING · 4</text></g>
    <g transform="translate(80,220)"><rect x="-58" y="-22" width="116" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">OFFICE · 4</text></g>
    <g transform="translate(80,380)"><rect x="-58" y="-22" width="116" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">KITCHEN · 3</text></g>
    <g transform="translate(920,60)"><rect x="-66" y="-22" width="132" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">BEDROOMS · 2</text></g>
    <g transform="translate(920,220)"><rect x="-58" y="-22" width="116" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">GARAGE · 3</text></g>
    <g transform="translate(920,380)"><rect x="-66" y="-22" width="132" height="40" rx="7" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text y="4">OUTDOOR · 6</text></g>
  </g>

  <!-- home-run links: each endpoint to closet, individually -->
  <g stroke="#6a4c93" stroke-width="2.5" stroke-opacity="0.75" fill="none">
    <line x1="138" y1="60" x2="400" y2="190"/>
    <line x1="138" y1="220" x2="400" y2="220"/>
    <line x1="138" y1="380" x2="400" y2="250"/>
    <line x1="862" y1="60" x2="600" y2="190"/>
    <line x1="862" y1="220" x2="600" y2="220"/>
    <line x1="862" y1="380" x2="600" y2="250"/>
  </g>

  <text x="500" y="424" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">Every drop home-runs to one closet — no daisy-chaining. ~$40 each in framing; ~$400 each after drywall.</text>
</svg>
