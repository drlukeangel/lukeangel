<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="weight bands converging">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" font-weight="700" fill="#1a1d24">WEIGHT ATTRIBUTION IS A CLOSING WINDOW</text>

  <!-- axes -->
  <g stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2">
    <line x1="90" y1="400" x2="910" y2="400"/>
    <line x1="90" y1="80" x2="90" y2="400"/>
  </g>
  <text x="44" y="240" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c" transform="rotate(-90 44 240)">weight (lb)</text>
  <text x="500" y="446" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#7a808c">months from now</text>

  <!-- month ticks -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#7a808c">
    <text x="160" y="420" text-anchor="middle">now</text>
    <text x="340" y="420" text-anchor="middle">+3</text>
    <text x="520" y="420" text-anchor="middle">+6</text>
    <text x="700" y="420" text-anchor="middle">+9</text>
    <text x="860" y="420" text-anchor="middle">+12</text>
  </g>

  <!-- Joule's band (flat ~9.5lb), drawn as a shaded ribbon -->
  <path d="M120 150 L880 150 L880 178 L120 178 Z" fill="#3a7d44" fill-opacity="0.16"/>
  <line x1="120" y1="164" x2="880" y2="164" stroke="#3a7d44" stroke-width="3"/>
  <text x="888" y="168" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" font-weight="700" fill="#3a7d44">Joule</text>

  <!-- Boson's band (rising kitten), ribbon converging upward -->
  <path d="M120 372 C 300 330, 460 250, 880 184 L880 214 C 460 282, 300 360, 120 388 Z" fill="#c87533" fill-opacity="0.16"/>
  <path d="M120 380 C 300 345, 460 266, 880 199" fill="none" stroke="#c87533" stroke-width="3"/>
  <text x="200" y="372" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" font-weight="700" fill="#c87533">Boson</text>

  <!-- overlap zone marker -->
  <line x1="800" y1="80" x2="800" y2="400" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 6"/>
  <text x="792" y="110" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">bands overlap &#8594;</text>
  <text x="792" y="128" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5" fill="#c14a3a">inference breaks</text>

  <text x="500" y="478" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#5b616b">When the kitten's weight band meets the adult's, the same number could be either cat &#8212; silently.</text>
</svg>
