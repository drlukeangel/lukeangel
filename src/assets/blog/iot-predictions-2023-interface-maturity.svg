<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" role="img" aria-label="interface maturity curve">
  <rect width="860" height="440" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="52" font-size="22" fill="#1a1d24" font-weight="600">WHERE THE INTERFACE GOES NEXT</text>
    <text x="40" y="78" font-size="13" fill="#7a808c">phone, then wrist, then face — each one further from the hand</text>

    <!-- baseline connecting the three stages -->
    <line x1="150" y1="270" x2="710" y2="270" stroke="#1a1d24" stroke-width="2.5" stroke-opacity="0.5"/>
    <line x1="490" y1="270" x2="710" y2="270" stroke="#0066cc" stroke-width="2.5" stroke-dasharray="6 5"/>

    <!-- stage 1: phone (mature) -->
    <g transform="translate(150,270)">
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#1a1d24" stroke-width="2"/>
      <rect x="-26" y="-118" width="52" height="86" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <rect x="-19" y="-110" width="38" height="62" rx="3" fill="#1a1d24" fill-opacity="0.08"/>
      <circle cx="0" cy="-40" r="3.5" fill="#1a1d24"/>
      <text x="0" y="34" text-anchor="middle" font-size="15" fill="#1a1d24" font-weight="600">phone</text>
      <text x="0" y="56" text-anchor="middle" font-size="13" fill="#3a7d44">mature</text>
    </g>

    <!-- stage 2: watch (mature) -->
    <g transform="translate(380,270)">
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#1a1d24" stroke-width="2"/>
      <rect x="-30" y="-110" width="60" height="54" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <rect x="-22" y="-104" width="44" height="42" rx="8" fill="#1a1d24" fill-opacity="0.08"/>
      <path d="M-15 -110 l4 -16 h22 l4 16" fill="none" stroke="#1a1d24" stroke-width="3"/>
      <path d="M-15 -56 l4 16 h22 l4 -16" fill="none" stroke="#1a1d24" stroke-width="3"/>
      <text x="0" y="34" text-anchor="middle" font-size="15" fill="#1a1d24" font-weight="600">watch</text>
      <text x="0" y="56" text-anchor="middle" font-size="13" fill="#3a7d44">mature</text>
    </g>

    <!-- stage 3: face (forecast) -->
    <g transform="translate(610,270)">
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#0066cc" stroke-width="2" stroke-dasharray="4 3"/>
      <!-- headset / glasses silhouette -->
      <rect x="-46" y="-104" width="92" height="44" rx="20" fill="#fdfaf2" stroke="#0066cc" stroke-width="3"/>
      <circle cx="-22" cy="-82" r="12" fill="none" stroke="#0066cc" stroke-width="2.5"/>
      <circle cx="22" cy="-82" r="12" fill="none" stroke="#0066cc" stroke-width="2.5"/>
      <path d="M-10 -82 h-0.2 M10 -82 h0.2" stroke="#0066cc" stroke-width="2.5"/>
      <path d="M-46 -90 q-12 2 -14 14 M46 -90 q12 2 14 14" fill="none" stroke="#0066cc" stroke-width="2.5"/>
      <!-- forecast marker -->
      <circle cx="0" cy="-130" r="14" fill="#fdfaf2" stroke="#0066cc" stroke-width="3"/>
      <text x="0" y="-125" text-anchor="middle" font-size="15" fill="#0066cc">?</text>
      <text x="0" y="34" text-anchor="middle" font-size="15" fill="#1a1d24" font-weight="600">face</text>
      <text x="0" y="56" text-anchor="middle" font-size="13" fill="#0066cc">announced, not shipped</text>
    </g>

    <!-- the call -->
    <line x1="40" y1="372" x2="820" y2="372" stroke="#1a1d24" stroke-opacity="0.12"/>
    <text x="40" y="402" font-size="14" fill="#1a1d24" font-weight="600">2023 is the announcement year for the third interface,</text>
    <text x="40" y="424" font-size="14" fill="#7a808c">not the ship year — the headset gets unveiled; it lands in 2024.</text>
  </g>
</svg>
