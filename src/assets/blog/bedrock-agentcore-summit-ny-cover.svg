<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="ac-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
    <marker id="ac-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a52be"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#ac-dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#2a52be"/>
  <text x="80" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#7a808c">SUMMIT NY — JUL 2025</text>
  <text x="1120" y="90" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="5" fill="#2a52be" text-anchor="end">PREVIEW</text>
  <line x1="80" y1="118" x2="1120" y2="118" stroke="#1a1d24" stroke-width="2"/>

  <g transform="translate(780, 168)">
    <rect x="0" y="0" width="120" height="70" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <text x="60" y="28" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#2a52be">AGENT</text>
    <text x="60" y="50" text-anchor="middle" font-family="Newsreader, serif" font-style="italic" font-size="16" fill="#1a1d24">core</text>
    <line x1="120" y1="35" x2="160" y2="35" stroke="#2a52be" stroke-width="2" marker-end="url(#ac-arrow)"/>
    <rect x="160" y="10" width="50" height="20" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="185" y="24" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#1a1d24">memory</text>
    <rect x="160" y="40" width="50" height="20" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="185" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#1a1d24">tools</text>
    <rect x="220" y="10" width="50" height="20" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <text x="245" y="24" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#1a1d24">trace</text>
    <rect x="220" y="40" width="50" height="20" rx="3" fill="#2a52be" stroke="#2a52be"/>
    <text x="245" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#fdfaf2">runtime</text>
  </g>

  <text x="80" y="290" font-family="Newsreader, serif" font-weight="500" font-size="64" fill="#1a1d24">Bedrock <em style="color: #2a52be;">AgentCore</em></text>
  <text x="80" y="360" font-family="Newsreader, serif" font-weight="500" font-size="64" fill="#1a1d24">at Summit NY —</text>
  <text x="80" y="424" font-family="Newsreader, serif" font-style="italic" font-size="30" fill="#7a808c">what it actually changes.</text>

  <line x1="80" y1="490" x2="1120" y2="490" stroke="#1a1d24" stroke-width="2"/>
  <text x="80" y="540" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#7a808c">L. ANGEL — AGENTS</text>
