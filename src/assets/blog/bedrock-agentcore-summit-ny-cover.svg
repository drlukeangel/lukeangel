<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" aria-label="AgentCore building blocks">
  <defs>
    <pattern id="acdots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#acdots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#4f46b8"/>

  <!-- LEFT: the old monolith — one solid opinionated slab -->
  <g transform="translate(150,180)">
    <rect x="0" y="0" width="210" height="270" rx="14" fill="#4f46b8" opacity="0.16" stroke="#4f46b8" stroke-width="2.5"/>
    <!-- baked-in internal seams to read as "fused / monolithic" -->
    <line x1="0" y1="68" x2="210" y2="68" stroke="#4f46b8" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="136" x2="210" y2="136" stroke="#4f46b8" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="204" x2="210" y2="204" stroke="#4f46b8" stroke-width="1.5" opacity="0.4"/>
    <circle cx="105" cy="34" r="9" fill="#4f46b8" opacity="0.45"/>
    <circle cx="105" cy="102" r="9" fill="#4f46b8" opacity="0.45"/>
    <circle cx="105" cy="170" r="9" fill="#4f46b8" opacity="0.45"/>
    <circle cx="105" cy="238" r="9" fill="#4f46b8" opacity="0.45"/>
  </g>

  <!-- transition arrow -->
  <g transform="translate(400,300)">
    <line x1="0" y1="15" x2="120" y2="15" stroke="#1a1d24" stroke-width="3"/>
    <path d="M120,5 L140,15 L120,25 z" fill="#1a1d24"/>
  </g>

  <!-- RIGHT: the composable set — discrete blocks, separable -->
  <g transform="translate(600,150)">
    <!-- five separate building blocks, gaps between them = modular -->
    <rect x="0"   y="0"   width="120" height="120" rx="12" fill="#fdfaf2" stroke="#4f46b8" stroke-width="3"/>
    <rect x="150" y="0"   width="120" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="300" y="0"   width="120" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="75"  y="150" width="120" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <rect x="225" y="150" width="120" height="120" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>

    <!-- glyphs inside each block, no text -->
    <!-- runtime: play/exec triangle -->
    <path d="M40,40 L82,60 L40,80 z" fill="#4f46b8"/>
    <!-- memory: stacked layers -->
    <g transform="translate(210,38)" stroke="#1a1d24" stroke-width="2.5" fill="none">
      <ellipse cx="0" cy="6" rx="34" ry="11"/>
      <path d="M-34,6 L-34,30 A34 11 0 0 0 34 30 L34,6"/>
      <path d="M-34,18 A34 11 0 0 0 34 18"/>
    </g>
    <!-- tools: wrench/gear -->
    <g transform="translate(360,60)" stroke="#1a1d24" stroke-width="2.5" fill="none">
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="7" fill="#1a1d24"/>
      <line x1="0" y1="-30" x2="0" y2="-22"/><line x1="0" y1="22" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="-22" y2="0"/><line x1="22" y1="0" x2="30" y2="0"/>
    </g>
    <!-- identity: key -->
    <g transform="translate(118,200)" stroke="#1a1d24" stroke-width="2.5" fill="none">
      <circle cx="-14" cy="0" r="12"/>
      <line x1="-3" y1="3" x2="26" y2="3"/>
      <line x1="18" y1="3" x2="18" y2="14"/>
      <line x1="26" y1="3" x2="26" y2="16"/>
    </g>
    <!-- observability: trace waveform -->
    <g transform="translate(265,210)" stroke="#1a1d24" stroke-width="2.5" fill="none">
      <polyline points="0,0 14,0 22,-22 38,22 46,0 60,0"/>
    </g>
  </g>
</svg>
