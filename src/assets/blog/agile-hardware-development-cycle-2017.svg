<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">Agile hardware development — sprint cycle adapted for physical product iteration</title>
  <desc id="d">2017-era flat diagram showing the agile hardware sprint cycle: design sprint, prototype build, test, learn, with longer iteration length (4-6 weeks) than software, and parallel firmware/software sprints feeding into integration testing.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Agile hardware — three parallel sprints feeding an integration cycle</text>

  <!-- Mechanical track -->
  <g transform="translate(40,80)">
    <text x="0" y="0" class="label" fill="#0066cc">Mechanical sprint</text>
    <text x="0" y="16" class="small">4-6 week cycle · CAD → 3D-print → test</text>
    <rect y="32" width="100" height="40" fill="#0066cc" rx="2"/><text x="50" y="56" text-anchor="middle" class="label" fill="#fff">Sprint 1</text>
    <rect x="108" y="32" width="100" height="40" fill="#0a5fb8" rx="2"/><text x="158" y="56" text-anchor="middle" class="label" fill="#fff">Sprint 2</text>
    <rect x="216" y="32" width="100" height="40" fill="#1657a8" rx="2"/><text x="266" y="56" text-anchor="middle" class="label" fill="#fff">Sprint 3</text>
    <rect x="324" y="32" width="100" height="40" fill="#1f4f97" rx="2"/><text x="374" y="56" text-anchor="middle" class="label" fill="#fff">Sprint 4</text>
  </g>

  <!-- Electronics track -->
  <g transform="translate(40,170)">
    <text x="0" y="0" class="label" fill="#ff6b35">Electronics sprint</text>
    <text x="0" y="16" class="small">2-3 week cycle · schematic → board → bench test</text>
    <rect y="32" width="64" height="40" fill="#ff6b35" rx="2"/><text x="32" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S1</text>
    <rect x="72" y="32" width="64" height="40" fill="#ee5f29" rx="2"/><text x="104" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S2</text>
    <rect x="144" y="32" width="64" height="40" fill="#dc561d" rx="2"/><text x="176" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S3</text>
    <rect x="216" y="32" width="64" height="40" fill="#cb4d11" rx="2"/><text x="248" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S4</text>
    <rect x="288" y="32" width="64" height="40" fill="#b94405" rx="2"/><text x="320" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S5</text>
    <rect x="360" y="32" width="64" height="40" fill="#a83b00" rx="2"/><text x="392" y="56" text-anchor="middle" class="label" fill="#fff" font-size="11">S6</text>
  </g>

  <!-- Firmware/software track -->
  <g transform="translate(40,260)">
    <text x="0" y="0" class="label" fill="#10a37f">Firmware / software sprint</text>
    <text x="0" y="16" class="small">1-2 week cycle · standard scrum</text>
    <rect y="32" width="44" height="40" fill="#10a37f" rx="2"/>
    <rect x="52" y="32" width="44" height="40" fill="#0e9573" rx="2"/>
    <rect x="104" y="32" width="44" height="40" fill="#0c8767" rx="2"/>
    <rect x="156" y="32" width="44" height="40" fill="#0a7a5b" rx="2"/>
    <rect x="208" y="32" width="44" height="40" fill="#086c4f" rx="2"/>
    <rect x="260" y="32" width="44" height="40" fill="#065f43" rx="2"/>
    <rect x="312" y="32" width="44" height="40" fill="#055238" rx="2"/>
    <rect x="364" y="32" width="44" height="40" fill="#04452c" rx="2"/>
  </g>

  <!-- Arrows feeding integration -->
  <line x1="470" y1="124" x2="540" y2="200" stroke="#9aa3ad" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="470" y1="220" x2="540" y2="220" stroke="#9aa3ad" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="470" y1="304" x2="540" y2="240" stroke="#9aa3ad" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Integration block -->
  <g transform="translate(550,180)">
    <rect width="200" height="100" fill="#1a1d24" rx="6"/>
    <text x="100" y="34" text-anchor="middle" class="label" fill="#fff">Integration sprint</text>
    <text x="100" y="56" text-anchor="middle" class="small" fill="#9aa3ad">8-12 weeks</text>
    <text x="100" y="74" text-anchor="middle" class="small" fill="#9aa3ad">3 tracks → one device</text>
    <text x="100" y="92" text-anchor="middle" class="small" fill="#9aa3ad">user testing on real hardware</text>
  </g>

  <!-- Bottom callouts -->
  <g transform="translate(40,370)">
    <rect width="720" height="70" fill="#fff" stroke="#cfd5db" rx="4"/>
    <text x="14" y="22" class="label">Why this is harder than software-only agile</text>
    <text x="14" y="42" class="small"><tspan font-weight="600">Iteration cost</tspan> — a 3D-printed iteration is hours, an injection-molded one is weeks. Match sprint length to tooling reality.</text>
    <text x="14" y="58" class="small"><tspan font-weight="600">Track sync</tspan> — software ships fast, mechanical ships slow; the integration sprint is where you accept the bottleneck and move on.</text>
  </g>
</svg>
