<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-label="multi-cat device scorecard">
  <rect width="1000" height="470" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .hd{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:19px;font-weight:700;fill:#1a1d24;}
    .dev{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:15px;font-weight:700;fill:#1a1d24;}
    .sm{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#5b616b;}
    .col{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;fill:#7a808c;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;font-size:13.5px;fill:#5b616b;}
  </style>

  <text x="40" y="46" class="hd">DOES IT KNOW WHICH CAT? — 2020 HOUSEHOLD</text>

  <!-- column headers -->
  <text x="430" y="84" text-anchor="middle" class="col">HOW IT TELLS THEM APART</text>
  <text x="760" y="84" text-anchor="middle" class="col">PER-CAT?</text>

  <!-- row helper geometry: rows at y 110,180,250,320 -->
  <!-- Row 1: SureFlap door -->
  <g transform="translate(0,110)">
    <text x="40" y="20" class="dev">SureFlap cat door</text>
    <text x="40" y="40" class="sm">entry / exit</text>
    <rect x="270" y="2" width="320" height="44" rx="9" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="430" y="30" text-anchor="middle" class="sm" fill="#1a1d24">reads chip at the door</text>
    <!-- green check -->
    <circle cx="760" cy="24" r="17" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2"/>
    <path d="M752 24 l6 7 l11 -15" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Row 2: SureFeed feeder -->
  <g transform="translate(0,180)">
    <text x="40" y="20" class="dev">SureFeed feeder</text>
    <text x="40" y="40" class="sm">on order, per-cat bowl</text>
    <rect x="270" y="2" width="320" height="44" rx="9" fill="#3a7d44" fill-opacity="0.08" stroke="#3a7d44" stroke-width="1.5"/>
    <text x="430" y="30" text-anchor="middle" class="sm" fill="#1a1d24">reads chip at the lid</text>
    <circle cx="760" cy="24" r="17" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2"/>
    <path d="M752 24 l6 7 l11 -15" fill="none" stroke="#3a7d44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Row 3: Litter-Robot -->
  <g transform="translate(0,250)">
    <text x="40" y="20" class="dev">Litter-Robot Connect</text>
    <text x="40" y="40" class="sm">visits + entry weight</text>
    <rect x="270" y="2" width="320" height="44" rx="9" fill="#c87533" fill-opacity="0.08" stroke="#c87533" stroke-width="1.5"/>
    <text x="430" y="30" text-anchor="middle" class="sm" fill="#1a1d24">weighs entry, I infer by hand</text>
    <!-- amber tilde / partial -->
    <circle cx="760" cy="24" r="17" fill="#c87533" fill-opacity="0.12" stroke="#c87533" stroke-width="2"/>
    <path d="M751 27 q4 -8 9 0 q5 8 9 0" fill="none" stroke="#c87533" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Row 4: PetSafe feeder -->
  <g transform="translate(0,320)">
    <text x="40" y="20" class="dev">PetSafe Smart Feed</text>
    <text x="40" y="40" class="sm">one shared bowl</text>
    <rect x="270" y="2" width="320" height="44" rx="9" fill="#c14a3a" fill-opacity="0.07" stroke="#c14a3a" stroke-width="1.5"/>
    <text x="430" y="30" text-anchor="middle" class="sm" fill="#1a1d24">no reader — first cat wins</text>
    <!-- red x -->
    <circle cx="760" cy="24" r="17" fill="#c14a3a" fill-opacity="0.10" stroke="#c14a3a" stroke-width="2"/>
    <path d="M753 17 l14 14 M767 17 l-14 14" fill="none" stroke="#c14a3a" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <line x1="40" y1="402" x2="960" y2="402" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="432" class="cap">The devices that know which cat are the ones that read a chip at the point of access.</text>
  <text x="40" y="454" class="cap">Everything else either guesses from weight, or just feeds whoever got there first.</text>
</svg>
