<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="A trade-off matrix comparing Tagg and Whistle across radio, location, battery, cost, and best fit.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE TRADEOFF, ROW BY ROW</text>

  <!-- column headers -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace">
    <text x="430" y="92" text-anchor="middle" font-size="17" fill="#1a1d24">TAGG</text>
    <text x="430" y="112" text-anchor="middle" font-size="11" fill="#7a808c">cellular</text>
    <text x="760" y="92" text-anchor="middle" font-size="17" fill="#1a1d24">WHISTLE</text>
    <text x="760" y="112" text-anchor="middle" font-size="11" fill="#7a808c">BLE</text>
  </g>

  <!-- column separators -->
  <line x1="300" y1="124" x2="300" y2="404" stroke="#1a1d24" stroke-width="1.5" opacity="0.18"/>
  <line x1="600" y1="124" x2="600" y2="404" stroke="#1a1d24" stroke-width="1.5" opacity="0.18"/>

  <!-- row backgrounds (zebra) -->
  <g fill="#1a1d24" opacity="0.03">
    <rect x="24" y="180" width="1032" height="56"/>
    <rect x="24" y="292" width="1032" height="56"/>
  </g>

  <!-- ROW 1: radio -->
  <text x="44" y="160" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">Radio</text>
  <text x="320" y="160" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">cellular GSM + GPS</text>
  <text x="620" y="160" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">BLE 4.0 only</text>
  <line x1="24" y1="180" x2="1056" y2="180" stroke="#1a1d24" stroke-width="1" opacity="0.1"/>

  <!-- ROW 2: tells you where -->
  <text x="44" y="216" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">Where it is</text>
  <g transform="translate(320,205)"><path d="M0 6 l7 7 14 -16" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="352" y="216" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">yes — anywhere w/ coverage</text>
  <g transform="translate(620,205)" stroke="#c14a3a" stroke-width="3" stroke-linecap="round"><line x1="2" y1="-2" x2="16" y2="12"/><line x1="16" y1="-2" x2="2" y2="12"/></g>
  <text x="652" y="216" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">no — home activity only</text>
  <line x1="24" y1="236" x2="1056" y2="236" stroke="#1a1d24" stroke-width="1" opacity="0.1"/>

  <!-- ROW 3: battery -->
  <text x="44" y="272" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">Battery</text>
  <text x="320" y="272" font-family="ui-monospace,monospace" font-size="14" fill="#c14a3a">2–3 days (tracking)</text>
  <text x="620" y="272" font-family="ui-monospace,monospace" font-size="14" fill="#3a7d44">7+ days</text>
  <line x1="24" y1="292" x2="1056" y2="292" stroke="#1a1d24" stroke-width="1" opacity="0.1"/>

  <!-- ROW 4: ongoing cost -->
  <text x="44" y="328" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">Ongoing cost</text>
  <text x="320" y="328" font-family="ui-monospace,monospace" font-size="14" fill="#c14a3a">$7.95 / month</text>
  <text x="620" y="328" font-family="ui-monospace,monospace" font-size="14" fill="#3a7d44">none</text>
  <line x1="24" y1="348" x2="1056" y2="348" stroke="#1a1d24" stroke-width="1" opacity="0.1"/>

  <!-- ROW 5: best for -->
  <text x="44" y="384" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">Best for</text>
  <text x="320" y="384" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">the dog that gets out</text>
  <text x="620" y="384" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">the dog that stays home</text>

  <text x="540" y="442" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">No 2013 puck gives you both long battery and anywhere-location — the radio forces the choice.</text>
</svg>
