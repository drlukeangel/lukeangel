<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" width="1120" height="600" role="img" aria-label="Cloud ingestion architecture">
  <rect width="1120" height="600" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">CLOUD INGESTION ARCHITECTURE</text>

  <!-- ===== CART (left) ===== -->
  <g transform="translate(40,232)">
    <rect x="0" y="0" width="128" height="120" rx="12" fill="#2a52be" fill-opacity="0.08" stroke="#2a52be" stroke-width="4"/>
    <text x="64" y="34" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">CART</text>
    <text x="64" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">publishes only</text>
    <text x="64" y="80" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#7a808c">no DB access</text>
    <!-- little puck antenna -->
    <line x1="22" y1="0" x2="22" y2="-18" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <circle cx="22" cy="-22" r="4" fill="#2a52be"/>
    <text x="64" y="102" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#5b616b">WiFi / LTE-M</text>
  </g>

  <!-- cart -> broker (MQwTT/TLS) -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <line x1="168" y1="292" x2="236" y2="292"/>
    <path d="M240 292 l-15 -7 v14 z"/>
  </g>
  <text x="202" y="282" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#2a52be">MQTT/TLS</text>
  <text x="202" y="312" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">publish</text>

  <!-- ===== IoT CORE (broker) ===== -->
  <g transform="translate(242,238)">
    <rect x="0" y="0" width="150" height="108" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="75" y="32" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#2a52be">AWS IoT CORE</text>
    <text x="75" y="56" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">MQTT broker</text>
    <text x="75" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">+ IoT Rules</text>
    <text x="75" y="96" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">mTLS per cart</text>
  </g>

  <!-- broker -> lambda -->
  <g stroke="#1a1d24" stroke-width="3" fill="#1a1d24">
    <line x1="392" y1="292" x2="452" y2="292"/>
    <path d="M456 292 l-15 -7 v14 z"/>
  </g>
  <text x="424" y="282" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#7a808c">rule</text>

  <!-- ===== LAMBDA (processing) ===== -->
  <g transform="translate(458,248)">
    <rect x="0" y="0" width="132" height="88" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="66" y="32" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#2a52be">LAMBDA</text>
    <text x="66" y="54" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">validate +</text>
    <text x="66" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">route by type</text>
  </g>

  <!-- lambda fans out to three stores -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24">
    <!-- to postgres (up) -->
    <path d="M590 270 C 660 250 690 160 738 142"/>
    <path d="M742 142 l-16 1 8 13 z"/>
    <!-- to dynamo (mid) -->
    <line x1="590" y1="292" x2="738" y2="292"/>
    <path d="M742 292 l-15 -7 v14 z"/>
    <!-- to s3 (down) -->
    <path d="M590 314 C 660 334 690 424 738 442"/>
    <path d="M742 442 l-8 -14 -8 13 z"/>
  </g>

  <!-- ===== POSTGRES (entity store) ===== -->
  <g transform="translate(744,96)">
    <rect x="0" y="0" width="196" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="98" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#2a52be">POSTGRES (RDS)</text>
    <text x="98" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">entity store — state</text>
    <text x="98" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">carts · stores · accounts</text>
  </g>

  <!-- ===== DYNAMODB (telemetry) ===== -->
  <g transform="translate(744,246)">
    <rect x="0" y="0" width="196" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="98" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#2a52be">DYNAMODB</text>
    <text x="98" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">telemetry — append</text>
    <text x="98" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">scans · health · events</text>
  </g>

  <!-- ===== S3 (artifacts) ===== -->
  <g transform="translate(744,396)">
    <rect x="0" y="0" width="196" height="92" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="98" y="30" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#2a52be">S3</text>
    <text x="98" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#1a1d24">artifacts + archive</text>
    <text x="98" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">OTA · receipts · raw zone</text>
  </g>

  <!-- ===== API GATEWAY + CLIENTS (far right column) ===== -->
  <!-- postgres <-> api gw -->
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24">
    <line x1="940" y1="142" x2="996" y2="142"/>
    <path d="M1000 142 l-15 -7 v14 z"/>
  </g>

  <g transform="translate(1000,96)">
    <rect x="0" y="0" width="92" height="408" rx="12" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="2.5"/>
    <text x="46" y="42" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">API</text>
    <text x="46" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#2a52be">GATEWAY</text>
    <text x="46" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" fill="#7a808c">REST / TLS</text>
    <!-- three client pucks -->
    <g font-family="ui-monospace,monospace" font-size="9.5" fill="#1a1d24" text-anchor="middle">
      <rect x="14" y="96" width="64" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="46" y="113">mobile</text>
      <text x="46" y="127">app</text>
      <rect x="14" y="184" width="64" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="46" y="201">staff</text>
      <text x="46" y="215">tablet</text>
      <rect x="14" y="272" width="64" height="40" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <text x="46" y="289">ops</text>
      <text x="46" y="303">dashboard</text>
    </g>
  </g>
  <!-- api gw to clients (REST/TLS) -->
  <g stroke="#1a1d24" stroke-width="2.2" fill="none" stroke-opacity="0.55">
    <line x1="1046" y1="116" x2="1046" y2="194"/>
    <line x1="1046" y1="116" x2="1046" y2="282"/>
  </g>

  <!-- dynamo -> analytics note -->
  <text x="842" y="356" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#7a808c">→ 90-day hot, then S3</text>

  <text x="560" y="548" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15.5" font-style="italic" fill="#3a3f4a">The cart only publishes; the cloud routes each message to the store whose shape fits it; clients read through one API.</text>
</svg>
