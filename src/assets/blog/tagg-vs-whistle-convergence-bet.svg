<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" width="920" height="470" role="img" aria-label="The convergence bet, drawn as a mode switch.">
  <rect x="1" y="1" width="918" height="468" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#1a1d24;}
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#5b616b;}
    .cap{font-family:Newsreader,Georgia,serif;font-style:italic;fill:#5b616b;}
  </style>

  <text x="40" y="44" class="lbl" font-size="16" letter-spacing="1.5">THE DEVICE I'D BET ON NEXT — ONE PUCK, TWO MODES</text>
  <text x="40" y="66" class="mut" font-size="13">a 2013 guess: split the radio tradeoff across the two situations instead of picking one</text>

  <!-- center: the puck with a mode switch -->
  <g transform="translate(460,240)">
    <circle cx="0" cy="0" r="56" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c87533" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#c87533"/>
    <text x="0" y="92" text-anchor="middle" class="lbl" font-size="14" font-weight="600">one collar puck</text>
    <text x="0" y="110" text-anchor="middle" class="mut" font-size="12.5">picks its radio by situation</text>
  </g>

  <!-- LEFT mode: at home -> low-power radios -->
  <g transform="translate(80,150)">
    <rect x="0" y="0" width="270" height="150" rx="12" fill="#fff" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="18" y="34" class="lbl" font-size="15" font-weight="600" fill="#3a7d44">dog is home</text>
    <text x="18" y="62" class="mut" font-size="13">→ sip BLE + Wi-Fi, like Whistle</text>
    <text x="18" y="86" class="mut" font-size="13">→ activity only, near-range sync</text>
    <text x="18" y="110" class="mut" font-size="13">→ cellular modem stays dark</text>
    <text x="18" y="134" class="lbl" font-size="13" font-weight="600" fill="#3a7d44">→ battery coasts for a week</text>
  </g>
  <!-- arrow home-mode -> puck -->
  <g fill="none" stroke="#3a7d44" stroke-width="2.5"><path d="M352 225 L398 235" marker-end="url(#ag)"/></g>

  <!-- RIGHT mode: dog out -> cellular + GPS -->
  <g transform="translate(570,150)">
    <rect x="0" y="0" width="270" height="150" rx="12" fill="#fff" stroke="#c87533" stroke-width="2.5"/>
    <text x="18" y="34" class="lbl" font-size="15" font-weight="600" fill="#c87533">dog gets out</text>
    <text x="18" y="62" class="mut" font-size="13">→ wake cellular + GPS, like Tagg</text>
    <text x="18" y="86" class="mut" font-size="13">→ real-time location, anywhere</text>
    <text x="18" y="110" class="mut" font-size="13">→ spend battery only when needed</text>
    <text x="18" y="134" class="lbl" font-size="13" font-weight="600" fill="#c87533">→ drains fast — but only now</text>
  </g>
  <!-- arrow puck -> out-mode -->
  <g fill="none" stroke="#c87533" stroke-width="2.5"><path d="M522 235 L568 225" marker-end="url(#ao)"/></g>

  <!-- trigger note under puck -->
  <g transform="translate(460,360)">
    <rect x="-150" y="0" width="300" height="56" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" class="mut" font-size="13">trigger = geofence: home network /</text>
    <text x="0" y="42" text-anchor="middle" class="mut" font-size="13">paired phone in range, or not</text>
  </g>

  <text x="460" y="448" text-anchor="middle" class="cap" font-size="14.5">Sip power in the house; spend it only when the dog's actually missing. We're not there in 2013.</text>

  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a7d44"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c87533"/>
    </marker>
  </defs>
</svg>
