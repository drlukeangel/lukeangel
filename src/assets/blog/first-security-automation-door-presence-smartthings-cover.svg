<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="door, presence, and the hub">
  <defs>
    <pattern id="dotsST" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsST)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <line x1="90" y1="500" x2="1120" y2="500" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>

  <!-- the door with a contact sensor -->
  <g transform="translate(250,300)">
    <rect x="-80" y="-150" width="160" height="320" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <rect x="-62" y="-130" width="124" height="280" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <!-- panels -->
    <rect x="-50" y="-118" width="100" height="120" rx="3" fill="none" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.3"/>
    <rect x="-50" y="14" width="100" height="124" rx="3" fill="none" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.3"/>
    <!-- knob -->
    <circle cx="48" cy="20" r="7" fill="#1a1d24" fill-opacity="0.5"/>
    <!-- contact sensor on the top jamb -->
    <rect x="40" y="-150" width="34" height="18" rx="3" fill="#fff" stroke="#6a4c93" stroke-width="3"/>
    <rect x="40" y="-128" width="20" height="10" rx="2" fill="#6a4c93" fill-opacity="0.3"/>
    <circle cx="68" cy="-141" r="3" fill="#6a4c93"/>
  </g>

  <!-- BLE key fob beacon -->
  <g transform="translate(560,250)">
    <rect x="-26" y="-34" width="52" height="68" rx="12" fill="#fff" stroke="#1a1d24" stroke-width="3.5"/>
    <circle cx="0" cy="-12" r="6" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="0" cy="12" r="9" fill="#6a4c93" fill-opacity="0.25" stroke="#6a4c93" stroke-width="2.5"/>
    <!-- weak signal arcs -->
    <g stroke="#6a4c93" fill="none" stroke-linecap="round" stroke-opacity="0.55">
      <path d="M30 -6 a16 16 0 0 1 0 24" stroke-width="3"/>
    </g>
  </g>

  <!-- phone (geofence presence) -->
  <g transform="translate(560,400)">
    <rect x="-24" y="-44" width="48" height="84" rx="9" fill="#fff" stroke="#1a1d24" stroke-width="3.5"/>
    <rect x="-17" y="-34" width="34" height="58" rx="2" fill="#fdfaf2" stroke="#1a1d24" stroke-width="1.5"/>
    <circle cx="0" cy="32" r="3.5" fill="#1a1d24" fill-opacity="0.5"/>
    <!-- location pin on screen -->
    <path d="M0 -22 a9 9 0 0 1 9 9 c0 7 -9 16 -9 16 c0 0 -9 -9 -9 -16 a9 9 0 0 1 9 -9 Z" fill="#6a4c93" fill-opacity="0.4" stroke="#6a4c93" stroke-width="2"/>
    <circle cx="0" cy="-13" r="3" fill="#fdfaf2"/>
  </g>

  <!-- the hub (decides "home?") -->
  <g transform="translate(920,330)">
    <rect x="-70" y="-50" width="140" height="100" rx="16" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="-8" r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- a small house glyph inside = "home?" -->
    <path d="M-12 -2 L0 -16 L12 -2 Z" fill="none" stroke="#6a4c93" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="-8" y="-2" width="16" height="12" fill="none" stroke="#6a4c93" stroke-width="2.5"/>
    <!-- status LED -->
    <circle cx="0" cy="32" r="6" fill="#3a7d44"/>
  </g>

  <!-- links from each signal to the hub -->
  <g stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5" stroke-dasharray="4 6">
    <line x1="318" y1="170" x2="852" y2="300"/>
    <line x1="588" y1="250" x2="852" y2="318"/>
    <line x1="586" y1="385" x2="852" y2="345"/>
  </g>
</svg>
