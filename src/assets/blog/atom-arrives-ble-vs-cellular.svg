<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" width="1080" height="470" role="img" aria-label="BLE activity tracker versus cellular GPS tracker: the radio you pick decides reach and battery life.">
  <rect width="1080" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE RADIO DECIDES EVERYTHING</text>

  <!-- LEFT: BLE activity tracker (Whistle) -->
  <g transform="translate(40,76)">
    <rect x="0" y="0" width="488" height="318" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="24" y="38" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">BLE ACTIVITY TRACKER</text>

    <!-- duty cycle: mostly off -->
    <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">radio: mostly asleep</text>
    <g transform="translate(24,90)">
      <rect x="0" y="0" width="440" height="30" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
      <g fill="#c87533">
        <rect x="40" y="0" width="14" height="30"/>
        <rect x="150" y="0" width="14" height="30"/>
        <rect x="270" y="0" width="14" height="30"/>
        <rect x="380" y="0" width="14" height="30"/>
      </g>
    </g>

    <!-- reach: home only -->
    <g transform="translate(70,178)">
      <line x1="0" y1="60" x2="320" y2="60" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>
      <!-- house -->
      <g transform="translate(0,18)">
        <path d="M0 42 v-22 l24 -18 l24 18 v22 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
        <g fill="none" stroke="#c87533" stroke-width="2.6" stroke-linecap="round">
          <path d="M48 8 a16 16 0 0 1 0 36"/>
          <path d="M56 0 a28 28 0 0 1 0 52" opacity="0.5"/>
        </g>
      </g>
      <!-- in-range dog -->
      <circle cx="150" cy="64" r="5" fill="#3a7d44"/>
      <text x="150" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">in range = seen</text>
      <!-- out-of-range dog -->
      <circle cx="300" cy="64" r="5" fill="none" stroke="#7a808c" stroke-width="2.4"/>
      <text x="300" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">away = blind</text>
    </g>

    <line x1="24" y1="290" x2="464" y2="290" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <text x="24" y="308" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">~7–10 day battery · no subscription</text>
  </g>

  <!-- RIGHT: cellular GPS tracker (Tagg) -->
  <g transform="translate(552,76)">
    <rect x="0" y="0" width="488" height="318" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="24" y="38" font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">CELLULAR GPS TRACKER</text>

    <!-- duty cycle: mostly on -->
    <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">radio: mostly awake</text>
    <g transform="translate(24,90)">
      <rect x="0" y="0" width="440" height="30" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.2" stroke-width="2"/>
      <rect x="2" y="2" width="436" height="26" rx="3" fill="#c87533" opacity="0.85"/>
    </g>

    <!-- reach: anywhere on cellular -->
    <g transform="translate(40,178)">
      <line x1="0" y1="60" x2="400" y2="60" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="3"/>
      <!-- tower -->
      <g transform="translate(0,4)" stroke="#1a1d24" stroke-width="2.6" fill="none" stroke-linecap="round">
        <path d="M6 56 l8 -44 l8 44"/>
        <line x1="2" y1="30" x2="26" y2="30"/>
        <path d="M14 12 a14 14 0 0 1 0 0 m-10 -4 a18 18 0 0 1 20 0" stroke="#c87533"/>
        <path d="M-2 2 a26 26 0 0 1 32 0" stroke="#c87533" opacity="0.5"/>
      </g>
      <!-- dogs both seen anywhere -->
      <circle cx="170" cy="64" r="5" fill="#3a7d44"/>
      <text x="170" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">at home = seen</text>
      <circle cx="350" cy="64" r="5" fill="#3a7d44"/>
      <text x="350" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3a7d44">miles away = seen</text>
    </g>

    <line x1="24" y1="290" x2="464" y2="290" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
    <text x="24" y="308" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">~2–3 day battery · monthly subscription</text>
  </g>

  <text x="540" y="442" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">More radio on the collar buys you reach and costs you battery. That trade is the whole product decision.</text>
</svg>
