<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="Four hardware constraints mapped to contract concessions.">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">HARDWARE LIMIT (FROZEN) &#8594; WHAT THE CONTRACT GAVE UP TO ABSORB IT</text>

  <!-- column headers -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">
    <text x="48" y="84">HARDWARE CONSTRAINT</text>
    <text x="410" y="84">DEVICE GIVES UP</text>
    <text x="772" y="84">CONTRACT GIVES UP / ABSORBS</text>
  </g>
  <line x1="34" y1="96" x2="1086" y2="96" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>

  <!-- vertical column dividers -->
  <line x1="392" y1="100" x2="392" y2="486" stroke="#1a1d24" stroke-opacity="0.10" stroke-width="1.5"/>
  <line x1="754" y1="100" x2="754" y2="486" stroke="#1a1d24" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- ROW 1: 20-byte MTU -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="34" y="106" width="1052" height="88" rx="9" fill="#357a8c" fill-opacity="0.06" stroke="#357a8c" stroke-opacity="0.35" stroke-width="2"/>
    <text x="48" y="142" font-size="14.5" fill="#1a1d24">20-byte BLE MTU</text>
    <text x="48" y="166" font-size="11" fill="#7a808c">23 - 3 header; DLE often</text>
    <text x="48" y="182" font-size="11" fill="#7a808c">unavailable on old phones</text>
    <text x="410" y="142" font-size="13" fill="#1a1d24">self-describing payloads</text>
    <text x="410" y="166" font-size="11" fill="#5b616b">sends a fixed-layout</text>
    <text x="410" y="182" font-size="11" fill="#5b616b">bit-packed binary frame</text>
    <text x="772" y="142" font-size="13" fill="#1a1d24">receiving JSON from device</text>
    <text x="772" y="166" font-size="11" fill="#5b616b">platform owns the one-way</text>
    <text x="772" y="182" font-size="11" fill="#5b616b">expansion to the app schema</text>
  </g>

  <!-- ROW 2: flash -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="34" y="200" width="1052" height="88" rx="9" fill="#357a8c" fill-opacity="0.06" stroke="#357a8c" stroke-opacity="0.35" stroke-width="2"/>
    <text x="48" y="236" font-size="14.5" fill="#1a1d24">a few KB of flash</text>
    <text x="48" y="260" font-size="11" fill="#7a808c">most belongs to firmware</text>
    <text x="410" y="236" font-size="13" fill="#1a1d24">keeping every session</text>
    <text x="410" y="260" font-size="11" fill="#5b616b">ring buffer; oldest</text>
    <text x="410" y="276" font-size="11" fill="#5b616b">sessions roll off</text>
    <text x="772" y="236" font-size="13" fill="#1a1d24">total recall</text>
    <text x="772" y="260" font-size="11" fill="#5b616b">marks records complete vs.</text>
    <text x="772" y="276" font-size="11" fill="#5b616b">partial-with-known-gaps</text>
  </g>

  <!-- ROW 3: battery -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="34" y="294" width="1052" height="88" rx="9" fill="#357a8c" fill-opacity="0.06" stroke="#357a8c" stroke-opacity="0.35" stroke-width="2"/>
    <text x="48" y="330" font-size="14.5" fill="#1a1d24">small-battery budget</text>
    <text x="48" y="354" font-size="11" fill="#7a808c">battery life is on the box</text>
    <text x="410" y="330" font-size="13" fill="#1a1d24">raw high-rate sampling</text>
    <text x="410" y="354" font-size="11" fill="#5b616b">decimates samples</text>
    <text x="410" y="370" font-size="11" fill="#5b616b">before transmit</text>
    <text x="772" y="330" font-size="13" fill="#1a1d24">server-side hi-res analytics</text>
    <text x="772" y="354" font-size="11" fill="#5b616b">contract carries the</text>
    <text x="772" y="370" font-size="11" fill="#5b616b">downsampled summary</text>
  </g>

  <!-- ROW 4: clock -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="34" y="388" width="1052" height="88" rx="9" fill="#357a8c" fill-opacity="0.06" stroke="#357a8c" stroke-opacity="0.35" stroke-width="2"/>
    <text x="48" y="424" font-size="14.5" fill="#1a1d24">no battery-backed RTC</text>
    <text x="48" y="448" font-size="11" fill="#7a808c">&#34;now&#34; is a guess between syncs</text>
    <text x="410" y="424" font-size="13" fill="#1a1d24">trusted wall-clock time</text>
    <text x="410" y="448" font-size="11" fill="#5b616b">sends a monotonic counter</text>
    <text x="410" y="464" font-size="11" fill="#5b616b">as the ordering key</text>
    <text x="772" y="424" font-size="13" fill="#1a1d24">trusting the timestamp</text>
    <text x="772" y="448" font-size="11" fill="#5b616b">treats device time as a</text>
    <text x="772" y="464" font-size="11" fill="#5b616b">correctable hint</text>
  </g>

  <!-- caption -->
  <text x="34" y="516" font-family="Newsreader, Georgia, serif" font-size="13.5" font-style="italic" fill="#3a3f4a">in every row the frozen thing wins: the board is fixed at production, so the contract is what bends.</text>
</svg>
