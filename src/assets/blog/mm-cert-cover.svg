<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b7410e" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#b7410e"/>

  <!-- left node: the one presenting its credential -->
  <g>
    <line x1="150" y1="250" x2="230" y2="190" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="150" y1="250" x2="210" y2="350" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="230" y1="190" x2="210" y2="350" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <g fill="#b7410e">
      <circle cx="230" cy="190" r="15"/>
      <circle cx="210" cy="350" r="15"/>
      <circle cx="150" cy="250" r="22"/>
    </g>
  </g>

  <!-- the door / gate in the middle: a jamb the connection passes through -->
  <g>
    <rect x="560" y="150" width="80" height="330" rx="6" fill="#fdfaf2"
          stroke="#1a1d24" stroke-opacity="0.7" stroke-width="5"/>
    <line x1="600" y1="150" x2="600" y2="480" stroke="#1a1d24" stroke-opacity="0.55" stroke-width="3"/>
    <circle cx="586" cy="320" r="6" fill="#1a1d24" fill-opacity="0.6"/>
  </g>

  <!-- the direct connection line: solid, straight, through the door -->
  <line x1="172" y1="262" x2="560" y2="300" stroke="#b7410e" stroke-width="5"/>
  <line x1="640" y1="320" x2="1020" y2="280" stroke="#b7410e" stroke-width="5"/>
  <polygon points="1020,280 1004,272 1006,290" fill="#b7410e"/>

  <!-- the certificate seal being presented at the door: circle + ribbon + check, all paths -->
  <g transform="translate(420 305)">
    <circle r="56" fill="#fdfaf2" stroke="#3a7d44" stroke-width="6"/>
    <circle r="42" fill="none" stroke="#3a7d44" stroke-width="2.5" stroke-opacity="0.5"/>
    <!-- scalloped seal edge as short strokes -->
    <g stroke="#3a7d44" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-56" x2="0" y2="-66"/>
      <line x1="40" y1="-40" x2="47" y2="-47"/>
      <line x1="56" y1="0" x2="66" y2="0"/>
      <line x1="40" y1="40" x2="47" y2="47"/>
      <line x1="-40" y1="-40" x2="-47" y2="-47"/>
      <line x1="-56" y1="0" x2="-66" y2="0"/>
    </g>
    <!-- check mark inside the seal -->
    <path d="M-22 2 L-6 20 L26 -20" fill="none" stroke="#3a7d44" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- twin ribbon tails hanging below the seal -->
    <path d="M-20 44 L-30 96 L-14 84 L-6 50 Z" fill="#3a7d44" fill-opacity="0.85"/>
    <path d="M20 44 L30 96 L14 84 L6 50 Z" fill="#3a7d44" fill-opacity="0.85"/>
  </g>

  <!-- right node: the far side that verifies before trusting the connection -->
  <g>
    <line x1="1050" y1="280" x2="970" y2="210" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="1050" y1="280" x2="990" y2="390" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="970" y1="210" x2="990" y2="390" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2"/>
    <g fill="#b7410e">
      <circle cx="970" cy="210" r="15"/>
      <circle cx="990" cy="390" r="15"/>
      <circle cx="1050" cy="280" r="22"/>
    </g>
  </g>
</svg>
