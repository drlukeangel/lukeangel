<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="No-subscription pet tracker spec">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#1f7a6b"/>

  <!-- collar puck (device) -->
  <g transform="translate(250,315)">
    <circle r="92" fill="#1f7a6b" fill-opacity="0.10" stroke="#1f7a6b" stroke-width="6"/>
    <circle r="58" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <!-- paw mark -->
    <circle cx="0" cy="12" r="20" fill="#1f7a6b" fill-opacity="0.85"/>
    <circle cx="-20" cy="-14" r="9" fill="#1f7a6b" fill-opacity="0.85"/>
    <circle cx="0" cy="-22" r="9" fill="#1f7a6b" fill-opacity="0.85"/>
    <circle cx="20" cy="-14" r="9" fill="#1f7a6b" fill-opacity="0.85"/>
    <!-- collar strap -->
    <path d="M -150 -10 A 150 150 0 0 1 150 -10" fill="none" stroke="#1a1d24" stroke-width="10" stroke-opacity="0.30" stroke-linecap="round"/>
  </g>

  <!-- three radio rings rising from the device, increasing range -->
  <g fill="none" stroke="#1f7a6b" stroke-linecap="round">
    <path d="M 372 280 A 120 120 0 0 1 372 350" stroke-width="6" stroke-opacity="0.85"/>
    <path d="M 410 250 A 175 175 0 0 1 410 380" stroke-width="6" stroke-opacity="0.55" stroke-dasharray="4 10"/>
    <path d="M 448 215 A 235 235 0 0 1 448 415" stroke-width="6" stroke-opacity="0.30" stroke-dasharray="2 14"/>
  </g>

  <!-- your own cloud (no middleman) -->
  <g transform="translate(940,270)">
    <path d="M -78 26 a 40 40 0 0 1 6 -78 a 52 52 0 0 1 100 -8 a 38 38 0 0 1 10 86 z"
          fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <!-- direct link, no vendor box between -->
    <circle cx="6" cy="-2" r="13" fill="#1f7a6b" fill-opacity="0.85"/>
  </g>
  <!-- direct line device -> cloud -->
  <line x1="500" y1="300" x2="858" y2="280" stroke="#1f7a6b" stroke-width="5" stroke-dasharray="2 12" stroke-linecap="round"/>

  <!-- no recurring-payment: a coin/dollar with a slash through it -->
  <g transform="translate(940,470)">
    <circle r="56" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <path d="M 0 -28 v 56 M -12 -16 a 14 12 0 0 0 12 8 a 14 12 0 0 1 12 8 a 14 14 0 0 1 -24 6"
          fill="none" stroke="#1a1d24" stroke-width="5" stroke-linecap="round" stroke-opacity="0.55"/>
    <line x1="-46" y1="46" x2="46" y2="-46" stroke="#c14a3a" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
