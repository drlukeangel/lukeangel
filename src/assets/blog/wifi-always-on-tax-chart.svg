<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" role="img" aria-label="Always-on tax by device count">
  <rect width="1000" height="480" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1d24">

    <!-- axes -->
    <line x1="110" y1="60" x2="110" y2="380" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
    <line x1="110" y1="380" x2="900" y2="380" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2.5"/>
    <text x="48" y="220" font-size="13" fill="#5b616b" transform="rotate(-90 48 220)">idle watts</text>

    <!-- WiFi bars: 5 / 15 / 30 devices -->
    <!-- scale: 380 baseline, ~6px per watt -->
    <g fill="#6a4c93" fill-opacity="0.75">
      <rect x="180" y="335" width="90" height="45"/>
      <rect x="360" y="248" width="90" height="132"/>
      <rect x="540" y="110" width="90" height="270"/>
    </g>
    <g font-size="13" fill="#1a1d24">
      <text x="225" y="325" text-anchor="middle">7.5 W</text>
      <text x="405" y="238" text-anchor="middle">22 W</text>
      <text x="585" y="100" text-anchor="middle">45 W</text>
    </g>
    <g font-size="12" fill="#5b616b">
      <text x="225" y="400" text-anchor="middle">5 plugs</text>
      <text x="225" y="418" text-anchor="middle">$10.50/yr</text>
      <text x="405" y="400" text-anchor="middle">15 devices</text>
      <text x="405" y="418" text-anchor="middle">$30.80/yr</text>
      <text x="585" y="400" text-anchor="middle">30 devices</text>
      <text x="585" y="418" text-anchor="middle">$63/yr</text>
    </g>
    <text x="405" y="84" text-anchor="middle" font-size="13" fill="#6a4c93">Wi-Fi — radios that never sleep</text>

    <!-- Zigbee/BLE sliver -->
    <rect x="740" y="376" width="90" height="4" fill="#3a7d44"/>
    <text x="785" y="400" text-anchor="middle" font-size="12" fill="#3a7d44">30 Zigbee/BLE</text>
    <text x="785" y="418" text-anchor="middle" font-size="12" fill="#3a7d44">≈ 0 (µA idle)</text>
    <path d="M785 360 L785 372" stroke="#3a7d44" stroke-width="2" marker-end="url(#a)"/>

    <text x="500" y="455" text-anchor="middle" font-size="13" fill="#5b616b">electricity spent powering radios that wait for a command — not doing any work</text>

    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto"><path d="M0 0 L4.5 7 L9 0 z" fill="#3a7d44"/></marker>
    </defs>
  </g>
</svg>
