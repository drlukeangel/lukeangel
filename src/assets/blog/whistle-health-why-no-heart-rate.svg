<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="why a collar cannot read a pulse">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#1a1d24">

    <text x="40" y="44" font-size="18" font-weight="700">WHY PPG WORKS ON A WRIST AND FAILS ON A COLLAR</text>

    <!-- LEFT: wrist, works (green) -->
    <text x="240" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#3a7d44">WRIST &#183; works</text>
    <!-- skin layer -->
    <rect x="100" y="180" width="280" height="120" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <line x1="100" y1="180" x2="380" y2="180" stroke="#1a1d24" stroke-width="2"/>
    <!-- sensor pressed flat -->
    <rect x="190" y="150" width="100" height="30" rx="4" fill="#3a7d44" fill-opacity="0.15" stroke="#3a7d44" stroke-width="2"/>
    <text x="240" y="138" text-anchor="middle" font-size="11" fill="#5b616b">PPG sensor flush</text>
    <!-- green LED down, reflected up -->
    <line x1="225" y1="180" x2="225" y2="250" stroke="#3a7d44" stroke-width="3"/>
    <path d="M225 250 l-5 -12 l10 0 z" fill="#3a7d44"/>
    <line x1="255" y1="250" x2="255" y2="180" stroke="#3a7d44" stroke-width="3"/>
    <path d="M255 180 l-5 12 l10 0 z" fill="#3a7d44"/>
    <text x="240" y="288" text-anchor="middle" font-size="11" fill="#5b616b">clean reflected pulse</text>

    <!-- RIGHT: collar, fails (red) -->
    <text x="740" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#c14a3a">COLLAR &#183; fails</text>
    <!-- skin -->
    <rect x="600" y="180" width="280" height="120" rx="6" fill="#fff" stroke="#1a1d24" stroke-width="2"/>
    <line x1="600" y1="180" x2="880" y2="180" stroke="#1a1d24" stroke-width="2"/>
    <!-- fur as hatching above skin -->
    <g stroke="#7a808c" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8">
      <line x1="612" y1="180" x2="606" y2="158"/>
      <line x1="628" y1="180" x2="636" y2="156"/>
      <line x1="648" y1="180" x2="642" y2="160"/>
      <line x1="668" y1="180" x2="676" y2="155"/>
      <line x1="824" y1="180" x2="818" y2="158"/>
      <line x1="844" y1="180" x2="852" y2="156"/>
      <line x1="864" y1="180" x2="858" y2="160"/>
    </g>
    <!-- sensor floating, gap + tilt -->
    <g transform="rotate(-8 740 150)">
      <rect x="690" y="138" width="100" height="30" rx="4" fill="#c14a3a" fill-opacity="0.12" stroke="#c14a3a" stroke-width="2"/>
    </g>
    <text x="740" y="124" text-anchor="middle" font-size="11" fill="#5b616b">sensor slides &amp; tilts</text>
    <!-- scattered light -->
    <g stroke="#c14a3a" stroke-width="2.5">
      <line x1="722" y1="170" x2="710" y2="200"/>
      <line x1="740" y1="170" x2="752" y2="196"/>
      <line x1="758" y1="170" x2="772" y2="188"/>
    </g>
    <text x="740" y="288" text-anchor="middle" font-size="11" fill="#c14a3a">scattered, noisy &#8212; no usable pulse</text>

    <!-- the three obstacles, listed -->
    <text x="500" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#c14a3a">three things the wrist doesn't have</text>
    <g font-size="12.5" fill="#5b616b" text-anchor="middle">
      <text x="240" y="384">fur between LED and skin</text>
      <text x="500" y="384">a loose scruff, not taut skin</text>
      <text x="760" y="384">a collar that moves as the dog moves</text>
    </g>
  </g>
</svg>
