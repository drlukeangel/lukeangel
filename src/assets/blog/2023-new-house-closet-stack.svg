<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" role="img" aria-label="The new-house wiring closet stack">
  <rect width="1000" height="460" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.2px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 10.5px; fill: #5b616b; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 13.5px; fill: #7a808c; }
  </style>

  <text x="40" y="34" class="h">THE CLOSET — WHAT THE 42 CAT6 DROPS RUN BACK TO</text>

  <!-- the rack, left -->
  <g transform="translate(60,70)">
    <rect x="0" y="0" width="280" height="330" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <!-- rack units -->
    <g>
      <rect x="20" y="20" width="240" height="46" rx="5" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="36" y="48" class="lbl">UDM Pro router</text>
      <rect x="20" y="78" width="240" height="46" rx="5" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="36" y="100" class="lbl">UniFi 24-port PoE</text><text x="36" y="116" class="sub">6 PoE cameras + drops</text>
      <rect x="20" y="136" width="240" height="46" rx="5" fill="#6a4c93" fill-opacity="0.10" stroke="#1a1d24" stroke-width="2"/><text x="36" y="158" class="lbl">Lutron Caseta Pro 2</text><text x="36" y="174" class="sub">40+ switches</text>
      <rect x="20" y="194" width="240" height="46" rx="5" fill="#6a4c93" fill-opacity="0.14" stroke="#6a4c93" stroke-width="2.4"/><text x="36" y="216" class="lbl">HA Yellow</text><text x="36" y="232" class="sub">the brain — local</text>
      <!-- patch panel -->
      <rect x="20" y="252" width="240" height="58" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
      <g fill="#6a4c93" fill-opacity="0.45"><rect x="34" y="266" width="16" height="12"/><rect x="58" y="266" width="16" height="12"/><rect x="82" y="266" width="16" height="12"/><rect x="106" y="266" width="16" height="12"/><rect x="130" y="266" width="16" height="12"/><rect x="154" y="266" width="16" height="12"/><rect x="178" y="266" width="16" height="12"/><rect x="202" y="266" width="16" height="12"/><rect x="226" y="266" width="16" height="12"/>
      <rect x="34" y="286" width="16" height="12"/><rect x="58" y="286" width="16" height="12"/><rect x="82" y="286" width="16" height="12"/><rect x="106" y="286" width="16" height="12"/><rect x="130" y="286" width="16" height="12"/><rect x="154" y="286" width="16" height="12"/><rect x="178" y="286" width="16" height="12"/><rect x="202" y="286" width="16" height="12"/><rect x="226" y="286" width="16" height="12"/></g>
      <text x="140" y="248" text-anchor="middle" class="sub">42-port patch panel</text>
    </g>
  </g>

  <!-- fan-out to the house, right -->
  <g stroke="#6a4c93" stroke-width="2.6" fill="none" opacity="0.8">
    <path d="M340 270 C 480 200, 560 170, 700 160"/>
    <path d="M340 280 C 480 270, 560 250, 700 250"/>
    <path d="M340 290 C 480 330, 560 350, 700 350"/>
  </g>
  <g>
    <rect x="700" y="135" width="220" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="810" y="166" text-anchor="middle" class="sub">cameras · APs · drops</text>
    <rect x="700" y="225" width="220" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="810" y="256" text-anchor="middle" class="sub">2 wall dashboards</text>
    <rect x="700" y="325" width="220" height="50" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/><text x="810" y="356" text-anchor="middle" class="sub">Caseta lighting · ESPHome</text>
  </g>

  <text x="500" y="436" text-anchor="middle" class="cap">38 of 42 drops already used. "Future-proofing" turned into "barely enough" inside a year.</text>
</svg>
