<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" width="1040" height="430" role="img" aria-label="The signed OTA path: build, offline HSM signing, artifact store and CDN delivery, then on-device verification before flash, with signing keys kept off the delivery path.">
  <rect width="1040" height="430" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE SIGNED PATH · DELIVERY DOES NOT AUTHORIZE</text>

  <!-- BUILD -->
  <g font-family="ui-monospace,monospace">
    <rect x="40" y="96" width="150" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="115" y="124" text-anchor="middle" font-size="13" fill="#1a1d24">build</text>
    <text x="115" y="143" text-anchor="middle" font-size="10.5" fill="#7a808c">unsigned image</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24"><line x1="190" y1="128" x2="232" y2="128"/><path d="M236 128 l-15 -6 v12 z"/></g>

  <!-- HSM SIGNER (offline) -->
  <g font-family="ui-monospace,monospace">
    <rect x="236" y="88" width="170" height="80" rx="10" fill="#fdfaf2" stroke="#c14a3a" stroke-width="3"/>
    <g transform="translate(252,104)" stroke="#c14a3a" stroke-width="2.4" fill="none">
      <rect x="0" y="11" width="18" height="14" rx="3"/><path d="M3 11 v-4 a6 6 0 0 1 12 0 v4"/>
    </g>
    <text x="335" y="116" text-anchor="middle" font-size="13" fill="#1a1d24">HSM signer</text>
    <text x="321" y="135" text-anchor="middle" font-size="10.5" fill="#c14a3a">OFFLINE · key never leaves</text>
    <text x="321" y="152" text-anchor="middle" font-size="10.5" fill="#7a808c">key matched to blast radius</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24"><line x1="406" y1="128" x2="448" y2="128"/><path d="M452 128 l-15 -6 v12 z"/></g>

  <!-- ARTIFACT STORE + CDN -->
  <g font-family="ui-monospace,monospace">
    <rect x="452" y="88" width="180" height="80" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="542" y="116" text-anchor="middle" font-size="13" fill="#1a1d24">artifact store + CDN</text>
    <text x="542" y="135" text-anchor="middle" font-size="10.5" fill="#7a808c">signed image · scoped URL</text>
    <text x="542" y="152" text-anchor="middle" font-size="10.5" fill="#7a808c">cannot sign · only serves</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.6" fill="#1a1d24"><line x1="632" y1="128" x2="674" y2="128"/><path d="M678 128 l-15 -6 v12 z"/></g>

  <!-- DEVICE -->
  <g font-family="ui-monospace,monospace">
    <rect x="678" y="88" width="320" height="148" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="694" y="114" font-size="13" fill="#1a1d24">device — verify before flash</text>
    <g font-size="11.5">
      <path d="M698 132 l7 7 12 -15" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="726" y="138" fill="#1a1d24">signature by the right key</text>
      <path d="M698 158 l7 7 12 -15" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="726" y="164" fill="#1a1d24">hash matches job doc (SHA-256)</text>
      <path d="M698 184 l7 7 12 -15" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="726" y="190" fill="#1a1d24">version above anti-rollback floor</text>
    </g>
    <rect x="694" y="200" width="120" height="24" rx="6" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.4"/>
    <text x="754" y="217" text-anchor="middle" font-size="12" fill="#3a7d44">FLASH</text>
    <text x="828" y="217" font-size="11" fill="#7a808c">else reject</text>
  </g>

  <!-- the separation note: trust comes from the signer, not the path -->
  <g stroke="#c14a3a" stroke-width="2.4" fill="none" stroke-dasharray="6 5">
    <path d="M335 168 C 335 300, 838 300, 838 240"/>
  </g>
  <g stroke="#c14a3a" stroke-width="2.4" fill="#c14a3a"><path d="M838 244 l-6 -14 12 0 z"/></g>
  <text x="586" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">trust travels with the signature — not the server it came from</text>

  <!-- attacker owns CDN -> only DoS -->
  <g font-family="ui-monospace,monospace">
    <text x="452" y="370" font-size="12" fill="#7a808c">own the store + path, still no key:</text>
    <text x="452" y="392" font-size="12.5" fill="#c14a3a">attacker gets denial-of-service, not a fleet</text>
  </g>
  <text x="40" y="392" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">sign offline,<tspan x="40" dy="20">serve online</tspan></text>
</svg>
