<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" width="1120" height="480" role="img" aria-label="Per-cart-per-month cloud cost and margin">
  <rect width="1120" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">PER-CART-PER-MONTH, AT 5,000 CARTS</text>

  <!-- stacked cost bar: each component a segment. Scale: $0.39 total across 620px -->
  <text x="60" y="92" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">cloud cost, stacked by component</text>
  <g transform="translate(60,104)">
    <!-- segments widths scaled ~1px = $0.00063 ; total 0.39 -> 620px -->
    <rect x="0"   y="0" width="8"   height="44" fill="#2a52be" fill-opacity="0.30"/>
    <rect x="8"   y="0" width="32"  height="44" fill="#2a52be" fill-opacity="0.45"/>
    <rect x="40"  y="0" width="127" height="44" fill="#2a52be" fill-opacity="0.62"/>
    <rect x="167" y="0" width="48"  height="44" fill="#2a52be" fill-opacity="0.50"/>
    <rect x="215" y="0" width="64"  height="44" fill="#2a52be" fill-opacity="0.40"/>
    <rect x="279" y="0" width="238" height="44" fill="#2a52be" fill-opacity="0.72"/>
    <rect x="517" y="0" width="48"  height="44" fill="#2a52be" fill-opacity="0.50"/>
    <rect x="565" y="0" width="32"  height="44" fill="#2a52be" fill-opacity="0.45"/>
    <rect x="0" y="0" width="620" height="44" fill="none" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="630" y="29" font-family="ui-monospace,monospace" font-size="14" fill="#1a1d24">= ~$0.39 total</text>
  </g>

  <!-- legend / line items -->
  <g font-family="ui-monospace,monospace" font-size="11.5" fill="#1a1d24" transform="translate(60,184)">
    <text x="0"   y="0">IoT Core $0.005</text>
    <text x="170" y="0">Lambda $0.02</text>
    <text x="320" y="0">DynamoDB write $0.08</text>
    <text x="540" y="0">DynamoDB store $0.03</text>
    <text x="750" y="0">Postgres $0.04</text>
    <text x="0"   y="24" fill="#5b616b">LTE-M backup $0.15</text>
    <text x="170" y="24" fill="#5b616b">S3 $0.03</text>
    <text x="320" y="24" fill="#5b616b">CloudWatch $0.02</text>
  </g>

  <!-- margin waterfall -->
  <text x="60" y="266" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">where the $4.00 goes</text>
  <g transform="translate(60,280)">
    <!-- revenue bar full -->
    <rect x="0" y="0" width="620" height="36" rx="4" fill="#3a7d44" fill-opacity="0.18" stroke="#3a7d44" stroke-width="2"/>
    <text x="10" y="23" font-family="ui-monospace,monospace" font-size="12" fill="#3a7d44">price to store partner — $4.00 / cart / month</text>
    <!-- cost slice -->
    <rect x="0" y="48" width="61" height="36" rx="4" fill="#c14a3a" fill-opacity="0.18" stroke="#c14a3a" stroke-width="2"/>
    <text x="70" y="71" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">cloud cost $0.39</text>
    <!-- margin slice -->
    <rect x="61" y="48" width="559" height="36" rx="4" fill="#2a52be" fill-opacity="0.14" stroke="#2a52be" stroke-width="2"/>
    <text x="340" y="71" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#2a52be">gross margin ~$3.50 / cart / month — before headcount</text>
  </g>

  <!-- takeaway -->
  <rect x="60" y="400" width="1000" height="56" rx="10" fill="#2a52be" fill-opacity="0.06" stroke="#2a52be" stroke-width="2"/>
  <text x="560" y="424" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#1a1d24">At 5,000 carts: ~$3.50 × 5,000 = $17,500 / month gross — enough to fund a small team plus growth.</text>
  <text x="560" y="444" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">the LTE-M backup plan, used ~5% of the time, is the single largest line in the cloud cost</text>
</svg>
