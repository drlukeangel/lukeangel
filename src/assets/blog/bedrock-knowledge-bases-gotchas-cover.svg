<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A managed retrieval pipeline with warning markers on its gotcha steps.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="kbg-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#kbg-dots)"/>
  <rect width="24" height="630" fill="#4f46b8"/>

  <!-- connecting baseline through the pipeline -->
  <line x1="150" y1="315" x2="1060" y2="315" stroke="#1a1d24" stroke-width="3" opacity="0.5"/>

  <!-- arrowheads between stages -->
  <g fill="#1a1d24" opacity="0.5">
    <path d="M318 315 l-16 -7 v14 z"/>
    <path d="M510 315 l-16 -7 v14 z"/>
    <path d="M702 315 l-16 -7 v14 z"/>
    <path d="M894 315 l-16 -7 v14 z"/>
  </g>

  <!-- STAGE 1: source documents (a stack of pages) -->
  <g>
    <rect x="150" y="262" width="84" height="106" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="160" y="252" width="84" height="106" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="170" y="242" width="84" height="106" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g fill="#1a1d24" opacity="0.2">
      <rect x="184" y="262" width="56" height="6" rx="3"/>
      <rect x="184" y="278" width="56" height="6" rx="3"/>
      <rect x="184" y="294" width="40" height="6" rx="3"/>
      <rect x="184" y="310" width="50" height="6" rx="3"/>
    </g>
  </g>

  <!-- STAGE 2: chunks (split blocks) — GOTCHA -->
  <g>
    <rect x="332" y="252" width="78" height="28" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="332" y="288" width="78" height="28" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="332" y="324" width="78" height="28" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g fill="#1a1d24" opacity="0.2">
      <rect x="344" y="264" width="42" height="5" rx="2"/>
      <rect x="344" y="300" width="42" height="5" rx="2"/>
      <rect x="344" y="336" width="32" height="5" rx="2"/>
    </g>
  </g>

  <!-- STAGE 3: vector embeddings (dotted grid of points) -->
  <g>
    <rect x="432" y="248" width="108" height="134" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g fill="#4f46b8">
      <circle cx="458" cy="276" r="5"/><circle cx="486" cy="276" r="5"/><circle cx="514" cy="276" r="5"/>
      <circle cx="458" cy="312" r="5"/><circle cx="486" cy="312" r="5"/><circle cx="514" cy="312" r="5"/>
      <circle cx="458" cy="348" r="5"/><circle cx="486" cy="348" r="5"/><circle cx="514" cy="348" r="5"/>
    </g>
  </g>

  <!-- STAGE 4: retrieve (a magnifier over ranked bars) — GOTCHA -->
  <g>
    <rect x="624" y="248" width="108" height="134" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g fill="#4f46b8" opacity="0.55">
      <rect x="644" y="300" width="60" height="9" rx="4"/>
      <rect x="644" y="318" width="44" height="9" rx="4"/>
      <rect x="644" y="336" width="30" height="9" rx="4"/>
    </g>
    <circle cx="690" cy="284" r="20" fill="none" stroke="#1a1d24" stroke-width="3.5"/>
    <line x1="704" y1="298" x2="718" y2="312" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- STAGE 5: generated answer (a chat/answer card) -->
  <g>
    <rect x="816" y="248" width="120" height="134" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="846" cy="282" r="11" fill="#4f46b8"/>
    <g fill="#1a1d24" opacity="0.2">
      <rect x="836" y="318" width="84" height="7" rx="3"/>
      <rect x="836" y="334" width="84" height="7" rx="3"/>
      <rect x="836" y="350" width="56" height="7" rx="3"/>
    </g>
  </g>

  <!-- WARNING markers on the gotcha steps (chunk, retrieve, re-ingest/sync) -->
  <g>
    <!-- on chunking -->
    <g transform="translate(371,212)">
      <path d="M0 -20 L20 18 L-20 18 Z" fill="#c14a3a" stroke="#fdfaf2" stroke-width="2"/>
      <rect x="-2.5" y="-8" width="5" height="14" rx="2.5" fill="#fdfaf2"/>
      <circle cx="0" cy="12" r="3" fill="#fdfaf2"/>
    </g>
    <!-- on retrieve/filter -->
    <g transform="translate(678,212)">
      <path d="M0 -20 L20 18 L-20 18 Z" fill="#c14a3a" stroke="#fdfaf2" stroke-width="2"/>
      <rect x="-2.5" y="-8" width="5" height="14" rx="2.5" fill="#fdfaf2"/>
      <circle cx="0" cy="12" r="3" fill="#fdfaf2"/>
    </g>
  </g>

  <!-- re-ingest loop: from vector store back to chunks (dashed arc above) — the expensive op -->
  <path d="M486 248 C 486 150, 371 150, 371 248" fill="none" stroke="#4f46b8" stroke-width="2.6" stroke-dasharray="7 5" opacity="0.7"/>
  <path d="M371 248 l-7 -12 14 0 z" fill="#4f46b8" opacity="0.7"/>

  <!-- sync delay marker on the source->chunk feed (a small clock) -->
  <g transform="translate(284,430)">
    <circle cx="0" cy="0" r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="4" stroke="#1a1d24" stroke-width="3" stroke-linecap="round"/>
    <line x1="192" y1="0" x2="-30" y2="0" stroke="#1a1d24" stroke-width="2.5" stroke-dasharray="6 5" opacity="0.5"/>
  </g>
</svg>
