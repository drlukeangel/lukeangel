<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="one sensor, six readings">
  <defs>
    <pattern id="dotsAE" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsAE)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- central puck: a tennis-ball-sized device with a domed PIR lens -->
  <g transform="translate(600,315)">
    <circle cx="0" cy="0" r="92" fill="#fff" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="0" cy="0" r="92" fill="#6a4c93" fill-opacity="0.06"/>
    <!-- faceted PIR dome -->
    <circle cx="0" cy="0" r="58" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <g stroke="#1a1d24" stroke-width="1.5" stroke-opacity="0.3">
      <line x1="-58" y1="0" x2="58" y2="0"/><line x1="0" y1="-58" x2="0" y2="58"/>
      <line x1="-41" y1="-41" x2="41" y2="41"/><line x1="-41" y1="41" x2="41" y2="-41"/>
      <circle cx="0" cy="0" r="29" fill="none"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="#6a4c93" fill-opacity="0.4" stroke="#6a4c93" stroke-width="2.5"/>
  </g>

  <!-- exactly six readings radiating out on six evenly-spaced spokes (60 deg apart) -->
  <g stroke="#1a1d24" stroke-opacity="0.22" stroke-width="2.5" stroke-dasharray="3 7">
    <line x1="600" y1="223" x2="600" y2="128"/>
    <line x1="688" y1="270" x2="858" y2="172"/>
    <line x1="688" y1="360" x2="858" y2="458"/>
    <line x1="600" y1="407" x2="600" y2="502"/>
    <line x1="512" y1="360" x2="342" y2="458"/>
    <line x1="512" y1="270" x2="342" y2="172"/>
  </g>

  <g stroke="#6a4c93" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- top: motion (walking figure) -->
    <g transform="translate(600,106)">
      <circle cx="0" cy="-10" r="7" fill="#6a4c93" fill-opacity="0.2"/>
      <path d="M0 -3 L0 12 M0 2 L-9 9 M0 2 L9 8 M0 12 L-7 24 M0 12 L8 22"/>
    </g>
    <!-- top-right: temperature (thermometer) -->
    <g transform="translate(888,150)">
      <rect x="-5" y="-22" width="10" height="34" rx="5"/>
      <circle cx="0" cy="16" r="9" fill="#c14a3a" fill-opacity="0.3"/>
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#c14a3a"/>
    </g>
    <!-- bottom-right: light (sun) -->
    <g transform="translate(888,480)">
      <circle cx="0" cy="0" r="11" fill="#6a4c93" fill-opacity="0.18"/>
      <g stroke-width="3"><line x1="0" y1="-20" x2="0" y2="-15"/><line x1="0" y1="15" x2="0" y2="20"/><line x1="-20" y1="0" x2="-15" y2="0"/><line x1="15" y1="0" x2="20" y2="0"/><line x1="-14" y1="-14" x2="-11" y2="-11"/><line x1="11" y1="11" x2="14" y2="14"/><line x1="14" y1="-14" x2="11" y2="-11"/><line x1="-11" y1="11" x2="-14" y2="14"/></g>
    </g>
    <!-- bottom: humidity (droplet) -->
    <g transform="translate(600,522)">
      <path d="M0 -22 C 14 -2 14 8 0 18 C -14 8 -14 -2 0 -22 Z" fill="#6a4c93" fill-opacity="0.18"/>
    </g>
    <!-- bottom-left: vibration (waveform burst) -->
    <g transform="translate(312,480)">
      <path d="M-20 0 L-12 0 L-8 -14 L-2 14 L4 -10 L9 8 L13 0 L20 0"/>
    </g>
    <!-- top-left: UV (sun on horizon with intensity rays shooting up) -->
    <g transform="translate(312,154)">
      <line x1="-22" y1="12" x2="22" y2="12"/>
      <path d="M-13 12 a13 13 0 0 1 26 0" fill="#6a4c93" fill-opacity="0.18"/>
      <g stroke-width="3" stroke-linecap="round">
        <line x1="-9" y1="-4" x2="-9" y2="-16"/>
        <line x1="0" y1="-7" x2="0" y2="-21"/>
        <line x1="9" y1="-4" x2="9" y2="-16"/>
      </g>
    </g>
  </g>
</svg>
