<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Battery-powered connected scanner-and-payment workstation">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="pc-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#pc-dots)"/>
  <rect width="24" height="630" fill="#2a52be"/>

  <!-- ground line / dock -->
  <line x1="150" y1="512" x2="1050" y2="512" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.18"/>

  <!-- ===== the workstation body ===== -->
  <!-- handle post -->
  <rect x="372" y="206" width="16" height="300" rx="8" fill="#5b616b"/>
  <rect x="300" y="196" width="120" height="18" rx="9" fill="#5b616b"/>

  <!-- main enclosure -->
  <rect x="404" y="250" width="300" height="236" rx="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <!-- screen -->
  <rect x="430" y="276" width="248" height="150" rx="10" fill="#2a52be" fill-opacity="0.10" stroke="#2a52be" stroke-width="3"/>
  <!-- running-total bars on screen (abstract list, no text) -->
  <g fill="#2a52be" opacity="0.55">
    <rect x="452" y="300" width="120" height="9" rx="4"/>
    <rect x="452" y="322" width="92" height="9" rx="4"/>
    <rect x="452" y="344" width="140" height="9" rx="4"/>
  </g>
  <line x1="452" y1="372" x2="656" y2="372" stroke="#2a52be" stroke-width="2" stroke-opacity="0.45"/>
  <rect x="452" y="386" width="84" height="14" rx="6" fill="#3a7d44" opacity="0.7"/>
  <rect x="588" y="386" width="68" height="14" rx="6" fill="#2a52be" opacity="0.7"/>

  <!-- NFC tap pad -->
  <circle cx="554" cy="456" r="18" fill="none" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5"/>
  <path d="M548 449 a10 10 0 0 1 0 14 M556 446 a16 16 0 0 1 0 20" fill="none" stroke="#2a52be" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ===== 2D barcode scanner head, top-right of body ===== -->
  <rect x="640" y="214" width="92" height="58" rx="12" fill="#1a1d24"/>
  <circle cx="668" cy="243" r="13" fill="#2a52be" fill-opacity="0.35" stroke="#fdfaf2" stroke-width="2.5"/>
  <!-- scan beam to an item -->
  <g stroke="#c14a3a" stroke-width="3" opacity="0.9">
    <line x1="732" y1="232" x2="852" y2="196"/>
    <line x1="732" y1="252" x2="852" y2="288"/>
  </g>
  <!-- the item with a barcode -->
  <rect x="852" y="196" width="118" height="92" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <g stroke="#1a1d24" stroke-width="2.6">
    <line x1="872" y1="222" x2="872" y2="262"/>
    <line x1="882" y1="222" x2="882" y2="262"/>
    <line x1="896" y1="222" x2="896" y2="262"/>
    <line x1="906" y1="222" x2="906" y2="262"/>
    <line x1="920" y1="222" x2="920" y2="262"/>
    <line x1="930" y1="222" x2="930" y2="262"/>
    <line x1="944" y1="222" x2="944" y2="262"/>
  </g>

  <!-- ===== wheeled base ===== -->
  <rect x="386" y="486" width="336" height="22" rx="11" fill="#5b616b"/>
  <circle cx="436" cy="528" r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <circle cx="436" cy="528" r="6" fill="#1a1d24" opacity="0.55"/>
  <circle cx="672" cy="528" r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
  <circle cx="672" cy="528" r="6" fill="#1a1d24" opacity="0.55"/>

  <!-- ===== radios: dual antennas + concentric waves (wifi + cellular) ===== -->
  <!-- antenna stubs on enclosure shoulder -->
  <line x1="424" y1="250" x2="424" y2="214" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
  <line x1="446" y1="250" x2="446" y2="222" stroke="#1a1d24" stroke-width="4" stroke-linecap="round"/>
  <!-- two stacks of waves radiating up-left -->
  <g fill="none" stroke="#2a52be" stroke-width="3.5" stroke-linecap="round">
    <path d="M398 214 a40 40 0 0 0 -52 -10"/>
    <path d="M386 236 a66 66 0 0 0 -78 -14"/>
    <path d="M374 258 a92 92 0 0 0 -104 -18"/>
  </g>
  <circle cx="424" cy="206" r="6" fill="#2a52be"/>

  <!-- ===== power: a battery pack with a charge level ===== -->
  <g transform="translate(150,300)">
    <rect x="0" y="0" width="150" height="78" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/>
    <rect x="150" y="26" width="14" height="26" rx="4" fill="#1a1d24"/>
    <!-- charge cells -->
    <rect x="14" y="16" width="32" height="46" rx="4" fill="#3a7d44" opacity="0.85"/>
    <rect x="54" y="16" width="32" height="46" rx="4" fill="#3a7d44" opacity="0.85"/>
    <rect x="94" y="16" width="32" height="46" rx="4" fill="#3a7d44" opacity="0.30"/>
    <!-- bolt -->
    <path d="M70 -22 l-20 30 h16 l-8 26 26 -34 h-16 z" fill="#2a52be"/>
  </g>
  <!-- power lead into enclosure -->
  <path d="M300 360 C 350 372 360 380 404 384" fill="none" stroke="#5b616b" stroke-width="4"/>

  <!-- ===== secure element chip near the base, bottom-right ===== -->
  <g transform="translate(800,392)">
    <rect x="0" y="0" width="86" height="74" rx="8" fill="#1a1d24"/>
    <g stroke="#fdfaf2" stroke-width="3" stroke-opacity="0.8">
      <line x1="-12" y1="16" x2="0" y2="16"/>
      <line x1="-12" y1="37" x2="0" y2="37"/>
      <line x1="-12" y1="58" x2="0" y2="58"/>
      <line x1="86" y1="16" x2="98" y2="16"/>
      <line x1="86" y1="37" x2="98" y2="37"/>
      <line x1="86" y1="58" x2="98" y2="58"/>
    </g>
    <!-- tiny lock to mark the secure element -->
    <rect x="32" y="34" width="22" height="18" rx="3" fill="none" stroke="#2a52be" stroke-width="3"/>
    <path d="M36 34 v-5 a7 7 0 0 1 14 0 v5" fill="none" stroke="#2a52be" stroke-width="3"/>
  </g>
</svg>
