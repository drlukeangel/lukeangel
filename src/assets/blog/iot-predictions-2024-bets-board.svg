<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-label="2024 bets board">
  <rect width="760" height="520" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="46" font-size="20" fill="#1a1d24" font-weight="600">2024 — nine bets, by conviction</text>
    <text x="40" y="70" font-size="13" fill="#7a808c">Filled bar = how hard I'm betting it lands as written</text>

    <!-- column header -->
    <text x="600" y="70" font-size="11" fill="#7a808c">conviction →</text>

    <g font-size="13.5">
      <!-- helper: each row has a label and a confidence bar (max width 150 at x=560) -->
      <!-- 1 Vision Pro <500K -->
      <g transform="translate(40,96)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Vision Pro ships Feb, &lt;500K units in CY24</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="120" height="14" rx="7" fill="#0066cc" fill-opacity="0.55"/>
      </g>
      <!-- 2 Humane panned -->
      <g transform="translate(40,130)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Humane AI Pin ships and gets panned</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="135" height="14" rx="7" fill="#0066cc" fill-opacity="0.7"/>
      </g>
      <!-- 3 Rabbit panned -->
      <g transform="translate(40,164)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Rabbit R1 ships and gets panned</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="128" height="14" rx="7" fill="#0066cc" fill-opacity="0.7"/>
      </g>
      <!-- 4 Ray-Ban breakout -->
      <g transform="translate(40,198)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Ray-Ban Meta is the breakout wearable</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="142" height="14" rx="7" fill="#0066cc" fill-opacity="0.8"/>
      </g>
      <!-- 5 Watch BP demoed not shipped -->
      <g transform="translate(40,232)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Watch blood-pressure demoed, not shipped</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="95" height="14" rx="7" fill="#0066cc" fill-opacity="0.4"/>
      </g>
      <!-- 6 Galaxy Ring -->
      <g transform="translate(40,266)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Galaxy Ring ships at Unpacked (Aug)</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="138" height="14" rx="7" fill="#0066cc" fill-opacity="0.75"/>
      </g>
      <!-- 7 Matter 1.3 -->
      <g transform="translate(40,300)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Matter v1.3: cameras, doorbells, energy</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="108" height="14" rx="7" fill="#0066cc" fill-opacity="0.5"/>
      </g>
      <!-- 8 Sonos headphones -->
      <g transform="translate(40,334)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Sonos headphones ship in fall, reviews mixed</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="118" height="14" rx="7" fill="#0066cc" fill-opacity="0.55"/>
      </g>
      <!-- 9 iRobot deal -->
      <g transform="translate(40,368)">
        <text x="0" y="16" fill="#1a1d24" font-weight="600">Amazon–iRobot deal falls apart in H1</text>
        <rect x="520" y="4" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.08"/>
        <rect x="520" y="4" width="125" height="14" rx="7" fill="#0066cc" fill-opacity="0.65"/>
      </g>
    </g>

    <line x1="40" y1="402" x2="720" y2="402" stroke="#1a1d24" stroke-opacity="0.1"/>

    <!-- thesis callout -->
    <g transform="translate(40,420)">
      <rect width="680" height="72" rx="8" fill="#0066cc" fill-opacity="0.06" stroke="#0066cc" stroke-opacity="0.35"/>
      <text x="20" y="30" font-size="13.5" fill="#1a1d24" font-weight="600">The through-line</text>
      <text x="20" y="52" font-size="12.5" fill="#5b616b">Standalone AI gadgets get panned; AI added to a thing people already wear breaks out.</text>
    </g>
  </g>
</svg>
