<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 410" width="1080" height="410" role="img" aria-label="Who can access the footage: cloud doorbell versus local NVR.">
  <rect width="1080" height="410" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">WHO CAN WATCH THE FOOTAGE</text>

  <line x1="540" y1="70" x2="540" y2="372" stroke="#1a1d24" stroke-width="2" stroke-dasharray="3 9" opacity="0.16"/>

  <!-- LEFT: cloud doorbell — footage in vendor cloud, many can reach it -->
  <text x="270" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#c14a3a">CLOUD DOORBELL</text>
  <!-- the cloud holding the footage -->
  <g transform="translate(200,120)">
    <path d="M50 70 a26 26 0 0 1 4 -50 a32 32 0 0 1 60 6 a22 22 0 0 1 -2 44 z" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-width="3"/>
    <circle cx="84" cy="40" r="8" fill="#c14a3a"/>
    <text x="84" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">footage lives here</text>
  </g>
  <!-- the actors who can reach it -->
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <text x="60" y="250">✓ me (with subscription)</text>
    <text x="60" y="278" fill="#c14a3a">✓ the vendor — always, it's their cloud</text>
    <text x="60" y="306" fill="#c14a3a">✓ law enforcement — request / subpoena</text>
    <text x="60" y="334" fill="#c14a3a">✓ an attacker — one breach, everyone's footage</text>
    <text x="60" y="362" fill="#7a808c">~ every passerby — recorded without consent</text>
  </g>

  <!-- RIGHT: local NVR — footage in my basement, access is mine -->
  <text x="810" y="92" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="13" fill="#3a7d44">LOCAL NVR</text>
  <!-- a house/box holding the footage -->
  <g transform="translate(745,116)">
    <rect x="0" y="6" width="130" height="80" rx="10" fill="#3a7d44" fill-opacity="0.08" stroke="#1a1d24" stroke-width="3"/>
    <rect x="40" y="34" width="50" height="30" rx="4" fill="#1a1d24"/>
    <circle cx="22" cy="24" r="5" fill="#3a7d44"/>
    <text x="65" y="106" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">footage in my basement</text>
  </g>
  <g font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">
    <text x="600" y="250">✓ me — always</text>
    <text x="600" y="278" fill="#3a7d44">✗ the vendor — no cloud path exists</text>
    <text x="600" y="306" fill="#3a7d44">✓ law enforcement — subpoena served to ME</text>
    <text x="600" y="334" fill="#3a7d44">✗ an attacker — must breach my network first</text>
    <text x="600" y="362" fill="#7a808c">→ access is mine to control</text>
  </g>

  <text x="540" y="398" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a3f4a">Local doesn't make the footage less useful — it makes the access mine.</text>
</svg>
