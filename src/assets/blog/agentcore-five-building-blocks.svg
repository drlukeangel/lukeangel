<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" width="980" height="470" aria-label="AgentCore building blocks">
  <rect width="980" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- your agent code at the center -->
  <rect x="380" y="200" width="220" height="70" rx="12" fill="#4f46b8" opacity="0.12" stroke="#4f46b8" stroke-width="2.5"/>
  <text x="490" y="232" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="14" fill="#1a1d24">your agent code</text>
  <text x="490" y="253" text-anchor="middle" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="12" fill="#5b616b">Strands / LangGraph / CrewAI / your own</text>

  <!-- spokes to five managed blocks -->
  <g stroke="#7a808c" stroke-width="2">
    <line x1="490" y1="200" x2="200" y2="95"/>
    <line x1="490" y1="200" x2="490" y2="70"/>
    <line x1="490" y1="200" x2="790" y2="95"/>
    <line x1="490" y1="270" x2="270" y2="400"/>
    <line x1="490" y1="270" x2="720" y2="400"/>
  </g>

  <!-- Runtime (top-left) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" text-anchor="middle">
    <rect x="100" y="50" width="200" height="64" rx="10" fill="#fdfaf2" stroke="#4f46b8" stroke-width="2.5"/>
    <path d="M125,72 L125,98 L150,85 z" fill="#4f46b8"/>
    <text x="220" y="80" font-size="14" fill="#1a1d24">Runtime</text>
    <text x="220" y="100" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="11" fill="#5b616b">serverless exec</text>
  </g>

  <!-- Memory (top-center) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" text-anchor="middle">
    <rect x="390" y="6" width="200" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <g transform="translate(420,38)" stroke="#1a1d24" stroke-width="2" fill="none">
      <ellipse cx="0" cy="-8" rx="16" ry="5"/>
      <path d="M-16,-8 L-16,8 A16 5 0 0 0 16 8 L16,-8"/>
    </g>
    <text x="505" y="32" font-size="14" fill="#1a1d24">Memory</text>
    <text x="505" y="52" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="11" fill="#5b616b">short + long term</text>
  </g>

  <!-- Tools / Gateway (top-right) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" text-anchor="middle">
    <rect x="690" y="50" width="200" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <g transform="translate(720,82)" stroke="#1a1d24" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="12"/><circle cx="0" cy="0" r="4" fill="#1a1d24"/>
      <line x1="0" y1="-18" x2="0" y2="-13"/><line x1="0" y1="13" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-13" y2="0"/><line x1="13" y1="0" x2="18" y2="0"/>
    </g>
    <text x="800" y="80" font-size="14" fill="#1a1d24">Gateway / Tools</text>
    <text x="800" y="100" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="11" fill="#5b616b">APIs + Lambda as MCP</text>
  </g>

  <!-- Identity (bottom-left) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" text-anchor="middle">
    <rect x="170" y="390" width="200" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <g transform="translate(200,422)" stroke="#1a1d24" stroke-width="2" fill="none">
      <circle cx="-8" cy="0" r="9"/><line x1="1" y1="2" x2="20" y2="2"/>
      <line x1="14" y1="2" x2="14" y2="10"/><line x1="20" y1="2" x2="20" y2="12"/>
    </g>
    <text x="290" y="420" font-size="14" fill="#1a1d24">Identity</text>
    <text x="290" y="440" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="11" fill="#5b616b">act-as end user</text>
  </g>

  <!-- Observability (bottom-right) -->
  <g font-family="ui-monospace,'JetBrains Mono',monospace" text-anchor="middle">
    <rect x="620" y="390" width="200" height="64" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2"/>
    <polyline points="645,422 660,422 668,406 682,438 690,422 705,422" stroke="#1a1d24" stroke-width="2" fill="none"/>
    <text x="745" y="420" font-size="14" fill="#1a1d24">Observability</text>
    <text x="745" y="440" font-family="Newsreader,Georgia,serif" font-style="italic" font-size="11" fill="#5b616b">OpenTelemetry traces</text>
  </g>
</svg>
