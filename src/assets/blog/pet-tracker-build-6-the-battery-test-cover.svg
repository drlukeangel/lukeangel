<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="A battery cell sitting on a baseline, partly filled, with two discharge curves leaving its top: one plunging steeply to the baseline close by, and one gliding gently down across the full width before reaching the baseline far away.">
  <defs>
    <pattern id="bt-dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.1" fill="#cfdedb"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#faf7ee"/>
  <rect width="1200" height="630" fill="url(#bt-dots)"/>
  <rect width="14" height="630" fill="#1f7a6b"/>

  <!-- faint grid -->
  <g stroke="#e9e3d4" stroke-width="1.5">
    <line x1="120" y1="180" x2="1130" y2="180"/>
    <line x1="120" y1="290" x2="1130" y2="290"/>
    <line x1="120" y1="400" x2="1130" y2="400"/>
  </g>
  <!-- baseline -->
  <line x1="120" y1="500" x2="1130" y2="500" stroke="#c9c2b0" stroke-width="2.5"/>

  <!-- discharge curves from a common 'full' point -->
  <!-- steep -->
  <path d="M300 150 C 340 230, 380 380, 430 498" fill="none" stroke="#c14a3a" stroke-width="7" stroke-linecap="round"/>
  <!-- gentle -->
  <path d="M300 150 C 560 210, 880 360, 1090 498" fill="none" stroke="#1f7a6b" stroke-width="7" stroke-linecap="round"/>
  <circle cx="300" cy="150" r="9" fill="#2b2b2b"/>

  <!-- battery cell sitting on baseline, lower-left -->
  <g>
    <rect x="150" y="404" width="190" height="96" rx="16" fill="#fffdf8" stroke="#2b2b2b" stroke-width="6"/>
    <rect x="340" y="432" width="18" height="40" rx="4" fill="#2b2b2b"/>
    <!-- charge fill ~60% -->
    <rect x="164" y="418" width="104" height="68" rx="8" fill="#1f7a6b"/>
    <!-- segment ticks -->
    <line x1="200" y1="418" x2="200" y2="486" stroke="#fffdf8" stroke-width="4"/>
    <line x1="236" y1="418" x2="236" y2="486" stroke="#fffdf8" stroke-width="4"/>
  </g>
</svg>
