<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-label="The body as a sensor array">
  <rect width="760" height="480" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="15" letter-spacing="2" fill="#7a808c">THE BODY AS A 4-SENSOR ARRAY · 2020 BET</text>

    <!-- body silhouette, centered -->
    <g transform="translate(380,0)" fill="#0066cc" fill-opacity="0.12" stroke="#0066cc" stroke-width="2">
      <circle cx="0" cy="120" r="34"/>
      <path d="M-46 168 q46 -26 92 0 l14 132 q-60 22 -120 0 z"/>
      <path d="M-46 174 l-40 96 M46 174 l40 96"/>
      <path d="M-26 300 l-16 130 M26 300 l16 130"/>
    </g>

    <!-- ear: AirPods Pro -->
    <g>
      <circle cx="411" cy="110" r="8" fill="#0066cc"/>
      <line x1="419" y1="110" x2="560" y2="86" stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.5"/>
      <g transform="translate(566,68)">
        <rect width="170" height="40" rx="7" fill="#fdfaf2" stroke="#0066cc" stroke-width="2"/>
        <text x="12" y="18" font-size="13" fill="#1a1d24" font-weight="600">AirPods Pro</text>
        <text x="12" y="33" font-size="11" fill="#5b616b">in-ear · hearing health</text>
      </g>
    </g>

    <!-- wrist: Apple Watch -->
    <g>
      <circle cx="307" cy="266" r="8" fill="#0066cc"/>
      <line x1="299" y1="266" x2="200" y2="200" stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.5"/>
      <g transform="translate(24,168)">
        <rect width="170" height="40" rx="7" fill="#fdfaf2" stroke="#0066cc" stroke-width="2"/>
        <text x="12" y="18" font-size="13" fill="#1a1d24" font-weight="600">Apple Watch</text>
        <text x="12" y="33" font-size="11" fill="#5b616b">wrist · HR · ECG · daytime</text>
      </g>
    </g>

    <!-- finger: Oura ring -->
    <g>
      <circle cx="324" cy="436" r="8" fill="#0066cc"/>
      <line x1="318" y1="430" x2="200" y2="368" stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.5"/>
      <g transform="translate(24,336)">
        <rect width="170" height="40" rx="7" fill="#fdfaf2" stroke="#0066cc" stroke-width="2"/>
        <text x="12" y="18" font-size="13" fill="#1a1d24" font-weight="600">Oura Ring</text>
        <text x="12" y="33" font-size="11" fill="#5b616b">finger · overnight · sleep</text>
      </g>
    </g>

    <!-- abdomen: CGM -->
    <g>
      <circle cx="408" cy="230" r="8" fill="#0066cc"/>
      <line x1="416" y1="230" x2="548" y2="300" stroke="#1a1d24" stroke-width="1.6" stroke-opacity="0.5"/>
      <g transform="translate(548,282)">
        <rect width="188" height="48" rx="7" fill="#fdfaf2" stroke="#0066cc" stroke-width="2"/>
        <text x="12" y="18" font-size="13" fill="#1a1d24" font-weight="600">CGM patch</text>
        <text x="12" y="32" font-size="11" fill="#5b616b">arm · continuous glucose</text>
        <text x="12" y="44" font-size="9.5" fill="#7a808c">diabetics, then fitness adopters</text>
      </g>
    </g>

    <text x="380" y="466" text-anchor="middle" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">By year-end the median Watch-wearer has 2+ other connected wearables.</text>
  </g>
</svg>
