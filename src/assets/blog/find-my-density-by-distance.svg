<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 430" width="1080" height="430" role="img" aria-label="Find My detection rate falls with distance from foot traffic.">
  <rect width="1080" height="430" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="42" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">DETECTION FOLLOWS FOOT TRAFFIC, NOT THE PET</text>

  <!-- concentric zones from the house -->
  <g transform="translate(250,218)">
    <!-- woods ring -->
    <circle cx="0" cy="0" r="158" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-width="2" stroke-dasharray="4 6"/>
    <!-- yard ring -->
    <circle cx="0" cy="0" r="115" fill="#c87533" fill-opacity="0.10" stroke="#c87533" stroke-width="2"/>
    <!-- near-house ring -->
    <circle cx="0" cy="0" r="60" fill="#3a7d44" fill-opacity="0.14" stroke="#3a7d44" stroke-width="2"/>
    <!-- house glyph at centre -->
    <path d="M-18 12 L0 -6 L18 12 L18 30 L-18 30 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6" stroke-linejoin="round"/>
    <!-- iPhone dots: dense near house, sparse outward -->
    <g fill="#1a1d24" opacity="0.55">
      <circle cx="-40" cy="-30" r="3.5"/><circle cx="44" cy="-18" r="3.5"/><circle cx="20" cy="46" r="3.5"/><circle cx="-46" cy="26" r="3.5"/><circle cx="48" cy="34" r="3.5"/>
      <circle cx="-92" cy="-18" r="3.5"/><circle cx="96" cy="40" r="3.5"/><circle cx="6" cy="-100" r="3.5"/>
      <circle cx="150" cy="-60" r="3.5"/>
    </g>
  </g>

  <!-- legend / readout bars on the right -->
  <g transform="translate(520,90)">
    <!-- near house -->
    <text x="0" y="14" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">within ~50 m of the house</text>
    <rect x="0" y="24" width="430" height="26" rx="5" fill="#1a1d24" fill-opacity="0.06"/>
    <rect x="0" y="24" width="409" height="26" rx="5" fill="#3a7d44" opacity="0.85"/>
    <text x="389" y="43" text-anchor="end" font-family="ui-monospace,monospace" font-size="12" fill="#fdfaf2">~95%</text>

    <!-- yard -->
    <text x="0" y="86" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">out in the yard (50–100 m)</text>
    <rect x="0" y="96" width="430" height="26" rx="5" fill="#1a1d24" fill-opacity="0.06"/>
    <rect x="0" y="96" width="344" height="26" rx="5" fill="#c87533" opacity="0.85"/>
    <text x="334" y="115" text-anchor="end" font-family="ui-monospace,monospace" font-size="12" fill="#fdfaf2">~80%</text>

    <!-- woods -->
    <text x="0" y="158" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">off in the woods, no traffic</text>
    <rect x="0" y="168" width="430" height="26" rx="5" fill="#1a1d24" fill-opacity="0.06"/>
    <rect x="0" y="168" width="78" height="26" rx="5" fill="#c14a3a" opacity="0.85"/>
    <text x="92" y="187" text-anchor="start" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">&lt;20%</text>

    <text x="0" y="232" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">…which is the exact opposite of where</text>
    <text x="0" y="250" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">you most need to find a wandering pet.</text>
  </g>

  <text x="540" y="406" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Crowdsourced coverage is best where you needed it least, and worst where the pet actually got lost.</text>
</svg>
