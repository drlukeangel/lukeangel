<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" width="1040" height="470" role="img" aria-label="No single field is health information; the regulated thing exists only at the join of identity and brushing data.">
  <rect width="1040" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="520" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="1" fill="#1a1d24">THE REGULATED THING ONLY EXISTS AT THE JOIN</text>

  <!-- LEFT: device block (no PHI) -->
  <g transform="translate(60,90)">
    <rect x="0" y="0" width="290" height="200" rx="12" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
    <text x="20" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#357a8c">device + telemetry</text>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">
      <text x="20" y="68">duration brushed</text>
      <text x="20" y="92">pressure events</text>
      <text x="20" y="116">coverage estimate</text>
      <text x="20" y="140">brush-head ID &#183; serial</text>
    </g>
    <text x="20" y="178" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#357a8c">just numbers &#8212; no person attached</text>
  </g>

  <!-- RIGHT: user block (no PHI alone) -->
  <g transform="translate(690,90)">
    <rect x="0" y="0" width="290" height="200" rx="12" fill="#fdfaf2" stroke="#357a8c" stroke-width="2.6"/>
    <text x="20" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#357a8c">user, in the app</text>
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b">
      <text x="20" y="68">email</text>
      <text x="20" y="92">name</text>
      <text x="20" y="116">date of birth (optional)</text>
      <text x="20" y="140">dentist (optional)</text>
    </g>
    <text x="20" y="178" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13.5" fill="#357a8c">just identity &#8212; no health claim alone</text>
  </g>

  <!-- join arrows pointing inward to the danger row -->
  <g stroke="#c14a3a" stroke-width="2.6" fill="none">
    <path d="M350 200 H470"/>
    <path d="M690 200 H570"/>
  </g>
  <path d="M474 200 l-13 -8 v16 z" fill="#c14a3a"/>
  <path d="M566 200 l13 -8 v16 z" fill="#c14a3a"/>
  <text x="400" y="186" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#c14a3a">join</text>
  <text x="612" y="186" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#c14a3a">join</text>

  <!-- the join row = PHI -->
  <g transform="translate(320,310)">
    <rect x="0" y="0" width="400" height="86" rx="12" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-width="3"/>
    <text x="200" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#c14a3a">this person brushed this badly</text>
    <text x="200" y="64" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">the one row that is protected health information</text>
  </g>

  <!-- caption -->
  <text x="520" y="446" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="14.5" fill="#5b616b">so the architecture problem isn't protecting fields &#8212; it's controlling joins</text>
</svg>
