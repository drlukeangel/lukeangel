<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2016 pet IoT review">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- scorecard column: rows of verdict marks beside short bars -->
  <g transform="translate(170 120)">
    <!-- 8 ledger rows -->
    <g stroke-linecap="round">
      <!-- row template: a track bar + a mark -->
      <!-- row 1 check -->
      <rect x="80" y="0" width="300" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M20 7 l14 16 l26 -34" fill="none" stroke="#3a7d44" stroke-width="8"/>
      <!-- row 2 check -->
      <rect x="80" y="48" width="240" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M20 55 l14 16 l26 -34" fill="none" stroke="#3a7d44" stroke-width="8"/>
      <!-- row 3 check -->
      <rect x="80" y="96" width="270" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M20 103 l14 16 l26 -34" fill="none" stroke="#3a7d44" stroke-width="8"/>
      <!-- row 4 partial (half) -->
      <rect x="80" y="144" width="200" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <circle cx="36" cy="151" r="18" fill="none" stroke="#c87533" stroke-width="7"/>
      <path d="M36 133 a18 18 0 0 1 0 36 z" fill="#c87533"/>
      <!-- row 5 cross -->
      <rect x="80" y="192" width="180" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M22 187 l32 30 M54 187 l-32 30" fill="none" stroke="#c14a3a" stroke-width="8"/>
      <!-- row 6 cross -->
      <rect x="80" y="240" width="150" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M22 235 l32 30 M54 235 l-32 30" fill="none" stroke="#c14a3a" stroke-width="8"/>
      <!-- row 7 cross -->
      <rect x="80" y="288" width="130" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M22 283 l32 30 M54 283 l-32 30" fill="none" stroke="#c14a3a" stroke-width="8"/>
      <!-- row 8 check -->
      <rect x="80" y="336" width="220" height="14" rx="7" fill="#1a1d24" fill-opacity="0.10"/>
      <path d="M20 343 l14 16 l26 -34" fill="none" stroke="#3a7d44" stroke-width="8"/>
    </g>
  </g>

  <!-- rising consolidation curve, right -->
  <g transform="translate(720 110)">
    <line x1="0" y1="0" x2="0" y2="360" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="3"/>
    <line x1="0" y1="360" x2="380" y2="360" stroke="#1a1d24" stroke-opacity="0.25" stroke-width="3"/>
    <path d="M10 350 C 120 330, 220 220, 370 40" fill="none" stroke="#c87533" stroke-width="7" stroke-linecap="round"/>
    <!-- acquisition node: the device sealed in a corporate boundary -->
    <g transform="translate(370 40)">
      <circle r="11" fill="#c87533"/>
      <rect x="-34" y="-34" width="68" height="68" rx="6" fill="none" stroke="#1a1d24" stroke-opacity="0.45" stroke-width="3" stroke-dasharray="2 7"/>
    </g>
    <!-- a tracker puck on the curve mid-way -->
    <g transform="translate(190 230)">
      <rect x="-16" y="-16" width="32" height="32" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <circle r="5" fill="#c87533"/>
    </g>
  </g>
</svg>
