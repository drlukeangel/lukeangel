<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" width="1120" height="360" role="img" aria-label="Two keypairs, two jobs: Chain A is the manufacturer's firmware-signing key (the manufacturer signs the code, the device verifies it — is my code real?); Chain B is the device's own identity key, carried in its certificate (who is this device?). Same secure hardware, completely different jobs.">
  <rect width="1120" height="360" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">TWO KEYPAIRS, TWO JOBS</text>

  <!-- factory behind key A (the manufacturer) -->
  <g stroke="#1a1d24" stroke-width="2.4" fill="none" opacity="0.2" stroke-linejoin="round">
    <rect x="202" y="150" width="100" height="46"/>
    <path d="M202 150 L202 134 L226 150 L226 134 L250 150 L250 134 L274 150 L274 134 L298 150"/>
    <rect x="285" y="116" width="13" height="34"/>
    <rect x="236" y="168" width="18" height="28"/>
  </g>

  <!-- KEY A -->
  <g transform="translate(250,150)" fill="none" stroke="#c14a3a" stroke-width="6" stroke-linecap="round">
    <circle cx="0" cy="0" r="22"/>
    <line x1="15" y1="15" x2="60" y2="60"/>
    <line x1="44" y1="44" x2="56" y2="32"/>
    <line x1="52" y1="52" x2="64" y2="40"/>
  </g>
  <text x="270" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#1a1d24">FIRMWARE-SIGNING KEY</text>
  <text x="270" y="272" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">the manufacturer's — signs the code</text>
  <text x="270" y="292" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">Chain A · "is my code real?"</text>

  <!-- not equal -->
  <text x="560" y="172" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="52" fill="#1a1d24">&#8800;</text>
  <text x="560" y="208" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#c14a3a">different keys</text>

  <!-- chip next to key B (the device) -->
  <g transform="translate(858,130)" stroke="#1a1d24" stroke-width="2.4" fill="none">
    <rect x="0" y="0" width="46" height="46" rx="6"/>
    <line x1="-7" y1="12" x2="0" y2="12"/><line x1="-7" y1="23" x2="0" y2="23"/><line x1="-7" y1="34" x2="0" y2="34"/>
    <line x1="46" y1="12" x2="53" y2="12"/><line x1="46" y1="23" x2="53" y2="23"/><line x1="46" y1="34" x2="53" y2="34"/>
    <circle cx="23" cy="23" r="5" fill="#1a1d24" stroke="none"/>
  </g>

  <!-- KEY B -->
  <g transform="translate(790,150)" fill="none" stroke="#c14a3a" stroke-width="6" stroke-linecap="round">
    <circle cx="0" cy="0" r="22"/>
    <line x1="15" y1="15" x2="60" y2="60"/>
    <line x1="44" y1="44" x2="56" y2="32"/>
    <line x1="52" y1="52" x2="64" y2="40"/>
  </g>
  <text x="810" y="248" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#1a1d24">DEVICE-IDENTITY KEY</text>
  <text x="810" y="272" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">the device's own — in its certificate</text>
  <text x="810" y="292" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11.5" fill="#7a808c">Chain B · "who is this device?"</text>

  <text x="560" y="334" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">Same secure hardware. Completely different jobs.</text>
</svg>
