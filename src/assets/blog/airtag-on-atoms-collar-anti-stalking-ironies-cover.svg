<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="crowd-found tag on a collar">
  <defs>
    <pattern id="dotsAT" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dotsAT)"/>
  <rect width="24" height="630" fill="#c87533"/>

  <!-- relay halo: scattered phones quietly relaying -->
  <g stroke="#1a1d24" stroke-opacity="0.18" stroke-width="2" fill="none">
    <circle cx="600" cy="300" r="150"/>
    <circle cx="600" cy="300" r="230"/>
    <circle cx="600" cy="300" r="310"/>
  </g>
  <!-- small phones around the halo -->
  <g fill="#fff" stroke="#1a1d24" stroke-width="2.5">
    <g transform="translate(360,170)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
    <g transform="translate(870,200)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
    <g transform="translate(300,420)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
    <g transform="translate(900,420)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
    <g transform="translate(620,90)"><rect x="-11" y="-20" width="22" height="40" rx="5"/><circle cx="0" cy="13" r="2.5" fill="#1a1d24"/></g>
  </g>
  <!-- faint relay links from each phone toward center -->
  <g stroke="#c87533" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="3 7">
    <line x1="360" y1="190" x2="560" y2="290"/>
    <line x1="860" y1="218" x2="640" y2="290"/>
    <line x1="312" y1="402" x2="560" y2="312"/>
    <line x1="888" y1="402" x2="640" y2="312"/>
    <line x1="620" y1="112" x2="600" y2="262"/>
  </g>

  <!-- center: the collar arc + the tag -->
  <path d="M470 360 C 540 320, 660 320, 730 360"
        fill="none" stroke="#1a1d24" stroke-width="34" stroke-opacity="0.9" stroke-linecap="round"/>
  <path d="M470 360 C 540 320, 660 320, 730 360"
        fill="none" stroke="#fdfaf2" stroke-width="5" stroke-dasharray="2 14" stroke-opacity="0.6"/>

  <!-- the disc tag -->
  <g transform="translate(600,300)">
    <circle cx="0" cy="0" r="42" fill="#fff" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="0" cy="0" r="28" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="6" fill="#1a1d24" fill-opacity="0.15"/>
    <!-- mount tab to collar -->
    <rect x="-9" y="36" width="18" height="16" rx="4" fill="#fff" stroke="#1a1d24" stroke-width="3"/>
  </g>

  <!-- chirp sound waves off the tag (the anti-stalking chirp, on the dog) -->
  <g transform="translate(648,260)" stroke="#c14a3a" fill="none" stroke-linecap="round">
    <path d="M0 0 a26 26 0 0 1 22 -16" stroke-width="4"/>
    <path d="M-4 8 a44 44 0 0 1 40 -28" stroke-width="4" stroke-opacity="0.6"/>
    <path d="M-8 16 a62 62 0 0 1 56 -40" stroke-width="4" stroke-opacity="0.35"/>
  </g>
</svg>
