<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" width="1120" height="470" role="img" aria-label="The strangler-fig migration in three phases for one device line. Phase one, dual-write: the mobile SDK writes to both the live legacy service and the new v2 platform, while a nightly reconciliation job compares the two stores. Phase two, after thirty days of clean reconciliation: reads cut over to v2 while writes still go to both, and the legacy box has shrunk. Phase three, after ninety days: the old write path is shut off and the legacy service is drained, leaving only the v2 platform as the system of record.">
  <rect width="1120" height="470" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">STRANGLER-FIG MIGRATION, PER DEVICE LINE</text>

  <!-- ============ PHASE 1 : dual-write ============ -->
  <g font-family="ui-monospace,monospace">
    <text x="56" y="82" font-size="13" fill="#357a8c">PHASE 1 &#183; dual-write</text>
    <text x="56" y="100" font-size="10" fill="#7a808c">writes &#8594; both · reconcile nightly</text>

    <!-- SDK -->
    <rect x="60" y="124" width="84" height="44" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="102" y="151" text-anchor="middle" font-size="11" fill="#1a1d24">SDK</text>

    <!-- legacy (full size) -->
    <rect x="56" y="222" width="116" height="64" rx="9" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5"/>
    <text x="114" y="250" text-anchor="middle" font-size="11" fill="#1a1d24">legacy</text>
    <text x="114" y="268" text-anchor="middle" font-size="9" fill="#7a808c">live</text>

    <!-- v2 (small) -->
    <rect x="200" y="230" width="100" height="48" rx="9" fill="#357a8c" fill-opacity="0.10" stroke="#357a8c" stroke-width="2.5"/>
    <text x="250" y="258" text-anchor="middle" font-size="11" fill="#357a8c">v2</text>

    <!-- write arrow to legacy (straight) -->
    <g stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round">
      <line x1="100" y1="168" x2="108" y2="216"/>
    </g>
    <path d="M109 220 l-9 -7 9 -3 z" fill="#1a1d24"/>
    <!-- write arrow to v2 (curved, stroke only + separate head) -->
    <path d="M126 168 C 180 190, 215 206, 244 224" fill="none" stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M250 228 l-12 -1 4 -8 z" fill="#1a1d24"/>

    <text x="64" y="200" font-size="9" fill="#7a808c">write</text>
    <text x="186" y="196" font-size="9" fill="#7a808c">write</text>

    <!-- reconcile (dashed, between stores) -->
    <path d="M172 250 H 200" fill="none" stroke="#357a8c" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="186" y="312" text-anchor="middle" font-size="9.5" fill="#357a8c">&#8597; reconcile</text>
  </g>

  <!-- divider -->
  <line x1="362" y1="64" x2="362" y2="424" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- ============ PHASE 2 : reads cut over (after 30 days) ============ -->
  <g font-family="ui-monospace,monospace">
    <text x="398" y="82" font-size="13" fill="#357a8c">PHASE 2 &#183; reads &#8594; v2</text>
    <text x="398" y="100" font-size="10" fill="#7a808c">after 30 days clean · writes still both</text>

    <rect x="398" y="124" width="84" height="44" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="440" y="151" text-anchor="middle" font-size="11" fill="#1a1d24">SDK</text>

    <!-- legacy (shrunk) -->
    <rect x="398" y="230" width="94" height="48" rx="9" fill="#fdfaf2" stroke="#7a808c" stroke-width="2.5" stroke-opacity="0.7"/>
    <text x="445" y="258" text-anchor="middle" font-size="10.5" fill="#7a808c">legacy</text>

    <!-- v2 (grown) -->
    <rect x="522" y="222" width="116" height="64" rx="9" fill="#357a8c" fill-opacity="0.12" stroke="#357a8c" stroke-width="3"/>
    <text x="580" y="250" text-anchor="middle" font-size="11" fill="#357a8c">v2</text>
    <text x="580" y="268" text-anchor="middle" font-size="9" fill="#357a8c">reads here</text>

    <!-- write to legacy (faded straight) -->
    <g stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round" opacity="0.45">
      <line x1="438" y1="168" x2="443" y2="224"/>
    </g>
    <path d="M444 228 l-8 -8 9 -2 z" fill="#1a1d24" opacity="0.45"/>
    <!-- write to v2 (curved) -->
    <path d="M456 168 C 510 190, 545 204, 574 216" fill="none" stroke="#1a1d24" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M580 220 l-12 -1 4 -8 z" fill="#1a1d24"/>
    <text x="404" y="202" font-size="9" fill="#7a808c">write</text>

    <!-- read from v2 back up to SDK (curved, green, stroke only) -->
    <path d="M598 222 C 600 184, 530 164, 488 156" fill="none" stroke="#3a7d44" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M488 156 l11 -5 0 10 z" fill="#3a7d44"/>
    <text x="620" y="196" font-size="9" fill="#3a7d44">read</text>
  </g>

  <!-- divider -->
  <line x1="700" y1="64" x2="700" y2="424" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <!-- ============ PHASE 3 : legacy drained (after 90 days) ============ -->
  <g font-family="ui-monospace,monospace">
    <text x="736" y="82" font-size="13" fill="#357a8c">PHASE 3 &#183; legacy off</text>
    <text x="736" y="100" font-size="10" fill="#7a808c">after 90 days · v2 is system of record</text>

    <rect x="736" y="124" width="84" height="44" rx="9" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="778" y="151" text-anchor="middle" font-size="11" fill="#1a1d24">SDK</text>

    <!-- legacy (drained, crossed out) -->
    <rect x="736" y="232" width="80" height="40" rx="9" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2" stroke-dasharray="5 4" stroke-opacity="0.6"/>
    <text x="776" y="257" text-anchor="middle" font-size="9.5" fill="#c14a3a" opacity="0.7">legacy</text>
    <path d="M742 238 L810 266 M810 238 L742 266" stroke="#c14a3a" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- v2 (full, system of record) -->
    <rect x="852" y="214" width="130" height="74" rx="10" fill="#357a8c" fill-opacity="0.14" stroke="#357a8c" stroke-width="3.5"/>
    <text x="917" y="244" text-anchor="middle" font-size="12" fill="#357a8c">v2</text>
    <text x="917" y="264" text-anchor="middle" font-size="9" fill="#357a8c">system of record</text>

    <!-- write to v2 (curved) -->
    <path d="M822 162 C 880 184, 905 196, 916 208" fill="none" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M921 212 l-12 -2 5 -8 z" fill="#1a1d24"/>
    <!-- read from v2 (curved, green) -->
    <path d="M952 214 C 962 182, 875 162, 824 154" fill="none" stroke="#3a7d44" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M824 154 l11 -5 0 10 z" fill="#3a7d44"/>
    <text x="838" y="196" font-size="9" fill="#7a808c">read / write</text>
  </g>

  <!-- timeline footer arrow -->
  <line x1="60" y1="404" x2="1020" y2="404" stroke="#357a8c" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M1034 404 l-16 -7 v14 z" fill="#357a8c" opacity="0.6"/>
  <text x="540" y="396" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="#3a3f4a">old API stays live the whole time; traffic strangles over to v2</text>
</svg>
