<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="Two cost curves over four product launches.">
  <rect width="1120" height="560" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">COST PER NEW PRODUCT, ACROSS FOUR LAUNCHES</text>

  <!-- axes -->
  <line x1="120" y1="90" x2="120" y2="440" stroke="#1a1d24" stroke-width="2.5"/>
  <line x1="120" y1="440" x2="1060" y2="440" stroke="#1a1d24" stroke-width="2.5"/>
  <text x="64" y="270" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#5b616b" transform="rotate(-90 64 270)" text-anchor="middle">cost to ship &#8594;</text>

  <!-- device x-positions -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12.5" fill="#1a1d24" text-anchor="middle">
    <text x="240" y="464">device 1</text>
    <text x="470" y="464">device 2</text>
    <text x="700" y="464">device 3</text>
    <text x="930" y="464">device 4</text>
  </g>

  <!-- ===== HARDWARE: flat-and-high bars, reset every time ===== -->
  <g>
    <rect x="206" y="150" width="68" height="290" rx="4" fill="#7a808c" fill-opacity="0.16" stroke="#7a808c" stroke-width="2.5"/>
    <rect x="436" y="150" width="68" height="290" rx="4" fill="#7a808c" fill-opacity="0.16" stroke="#7a808c" stroke-width="2.5"/>
    <rect x="666" y="150" width="68" height="290" rx="4" fill="#7a808c" fill-opacity="0.16" stroke="#7a808c" stroke-width="2.5"/>
    <rect x="896" y="150" width="68" height="290" rx="4" fill="#7a808c" fill-opacity="0.16" stroke="#7a808c" stroke-width="2.5"/>
    <!-- flat line across the bar tops -->
    <line x1="206" y1="150" x2="964" y2="150" stroke="#7a808c" stroke-width="3" stroke-dasharray="7 5"/>
    <text x="585" y="132" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">HARDWARE &#8212; fresh PCB / BOM / line every time, cost never drops</text>
  </g>

  <!-- ===== PLATFORM-LEVERAGE: tall first bar, then collapsing ===== -->
  <g>
    <!-- device 1: the big upfront platform investment -->
    <rect x="218" y="120" width="44" height="320" rx="4" fill="#357a8c" fill-opacity="0.22" stroke="#357a8c" stroke-width="3"/>
    <!-- device 2: inherits model + auth -->
    <rect x="448" y="300" width="44" height="140" rx="4" fill="#357a8c" fill-opacity="0.22" stroke="#357a8c" stroke-width="3"/>
    <!-- device 3: only its own quirks -->
    <rect x="678" y="372" width="44" height="68" rx="4" fill="#357a8c" fill-opacity="0.22" stroke="#357a8c" stroke-width="3"/>
    <!-- device 4: nearly free -->
    <rect x="908" y="408" width="44" height="32" rx="4" fill="#357a8c" fill-opacity="0.22" stroke="#357a8c" stroke-width="3"/>

    <!-- the descending curve connecting bar tops -->
    <path d="M240 120 Q360 300 470 300 Q580 300 700 372 Q820 410 930 408" fill="none" stroke="#357a8c" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="240" cy="120" r="5" fill="#357a8c"/>
    <circle cx="470" cy="300" r="5" fill="#357a8c"/>
    <circle cx="700" cy="372" r="5" fill="#357a8c"/>
    <circle cx="930" cy="408" r="5" fill="#357a8c"/>
  </g>

  <!-- callouts on the platform curve -->
  <g font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12.5" fill="#357a8c" text-anchor="middle">
    <text x="240" y="108">~13-month upfront build</text>
    <text x="470" y="288">inherits model + auth</text>
    <text x="700" y="360">only its own quirks</text>
    <text x="930" y="396">nearly free</text>
  </g>

  <!-- legend -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13">
    <rect x="140" y="494" width="20" height="14" rx="3" fill="#7a808c" fill-opacity="0.16" stroke="#7a808c" stroke-width="2.5"/>
    <text x="170" y="506" fill="#1a1d24">hardware: resets to full cost, every device</text>
    <rect x="600" y="494" width="20" height="14" rx="3" fill="#357a8c" fill-opacity="0.22" stroke="#357a8c" stroke-width="2.5"/>
    <text x="630" y="506" fill="#1a1d24">platform: each product inherits the last &#8212; the curve bends down</text>
  </g>

  <text x="34" y="540" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#5b616b">The hardware never compounds. The platform is the only thing that does.</text>
</svg>
