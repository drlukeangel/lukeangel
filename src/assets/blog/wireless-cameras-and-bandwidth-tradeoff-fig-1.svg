<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="when WiFi camera is acceptable decision tree">
  <rect width="1000" height="420" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" font-weight="700" fill="#1a1d24">POE FIRST &#8212; WHEN WIFI IS THE RIGHT ANSWER</text>

  <!-- start -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
    <text x="100" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">new camera location</text>
  </g>

  <!-- Q1 critical? -->
  <g transform="translate(300,80)">
    <rect x="0" y="0" width="220" height="80" rx="8" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="110" y="30" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">critical? &#183; 4K?</text>
    <text x="110" y="50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">always-on stream?</text>
    <text x="110" y="68" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">doorbell, driveway</text>
  </g>

  <!-- arrow start->q1 -->
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="240" y1="120" x2="294" y2="120"/><path d="M294 120 l-10 -5 l0 10 z"/>
  </g>

  <!-- YES -> PoE -->
  <g transform="translate(620,40)">
    <rect x="0" y="0" width="320" height="120" rx="8" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
    <text x="160" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#3a7d44">RUN THE CAT6 &#8594; PoE</text>
    <text x="160" y="58" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">wired reliability &#183; UPS-backed</text>
    <text x="160" y="78" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">no 2.4 GHz airtime fight</text>
    <text x="160" y="100" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#1a1d24">eat the weekend install</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="520" y1="100" x2="614" y2="100"/><path d="M614 100 l-10 -5 l0 10 z"/>
  </g>
  <text x="560" y="92" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#3a7d44">YES</text>

  <!-- NO -> WiFi ok -->
  <g transform="translate(620,250)">
    <rect x="0" y="0" width="320" height="120" rx="8" fill="#fdfaf2" stroke="#6a4c93" stroke-width="2.5"/>
    <text x="160" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#6a4c93">WIFI IS FINE</text>
    <text x="160" y="58" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">1080p or below &#183; cap bitrate</text>
    <text x="160" y="78" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">PIR-triggered, not always-on</text>
    <text x="160" y="100" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#1a1d24">garage, shed, temporary</text>
  </g>
  <g stroke="#1a1d24" stroke-width="2.5" fill="#1a1d24">
    <line x1="410" y1="160" x2="500" y2="252"/><path d="M500 252 l-3 -11 l9 3 z"/>
  </g>
  <text x="420" y="220" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#6a4c93">NO</text>
</svg>
