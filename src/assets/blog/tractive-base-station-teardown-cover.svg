<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A radio chip with many capabilities, one in use">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#c87533"/>

  <!-- PCB board -->
  <g transform="translate(330,150)">
    <rect x="0" y="0" width="540" height="330" rx="16" fill="#1a1d24" fill-opacity="0.04" stroke="#1a1d24" stroke-width="4"/>
    <circle cx="26" cy="26" r="9" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.4"/>
    <circle cx="514" cy="26" r="9" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.4"/>
    <circle cx="26" cy="304" r="9" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.4"/>
    <circle cx="514" cy="304" r="9" fill="none" stroke="#1a1d24" stroke-width="3" opacity="0.4"/>
    <g stroke="#c87533" stroke-width="2.5" fill="none" opacity="0.5">
      <path d="M60 70 H160 V120"/>
      <path d="M60 260 H140 V210"/>
      <path d="M480 80 H400 V130"/>
      <path d="M480 250 H410 V200"/>
      <path d="M270 40 V96"/>
      <path d="M270 290 V234"/>
    </g>
    <rect x="120" y="60" width="22" height="12" rx="2" fill="#1a1d24" opacity="0.45"/>
    <rect x="390" y="250" width="22" height="12" rx="2" fill="#1a1d24" opacity="0.45"/>
    <!-- U.FL connector -->
    <rect x="470" y="150" width="34" height="34" rx="5" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="487" cy="167" r="6" fill="none" stroke="#1a1d24" stroke-width="3"/>

    <!-- the SoC under a lifted RF shield -->
    <g transform="translate(204,128)">
      <rect x="-8" y="-8" width="132" height="92" rx="6" fill="none" stroke="#7a808c" stroke-width="3" stroke-dasharray="6 5"/>
      <rect x="0" y="0" width="116" height="76" rx="8" fill="#1a1d24"/>
      <circle cx="16" cy="16" r="5" fill="#c87533"/>
      <g fill="#7a808c">
        <rect x="8" y="-7" width="7" height="7"/><rect x="26" y="-7" width="7" height="7"/><rect x="44" y="-7" width="7" height="7"/><rect x="62" y="-7" width="7" height="7"/><rect x="80" y="-7" width="7" height="7"/><rect x="98" y="-7" width="7" height="7"/>
        <rect x="8" y="76" width="7" height="7"/><rect x="26" y="76" width="7" height="7"/><rect x="44" y="76" width="7" height="7"/><rect x="62" y="76" width="7" height="7"/><rect x="80" y="76" width="7" height="7"/><rect x="98" y="76" width="7" height="7"/>
      </g>
    </g>
  </g>

  <!-- capability spokes radiating from the chip centre (~592,316); only one is lit -->
  <g stroke="#7a808c" stroke-width="3" opacity="0.32" fill="none">
    <line x1="592" y1="316" x2="592" y2="130"/>
    <line x1="592" y1="316" x2="770" y2="172"/>
    <line x1="592" y1="316" x2="832" y2="316"/>
    <line x1="592" y1="316" x2="770" y2="460"/>
    <line x1="592" y1="316" x2="592" y2="522"/>
  </g>
  <g fill="#fdfaf2" stroke="#7a808c" stroke-width="3" opacity="0.5">
    <circle cx="592" cy="110" r="20"/>
    <circle cx="770" cy="172" r="20"/>
    <circle cx="832" cy="316" r="20"/>
    <circle cx="770" cy="460" r="20"/>
    <circle cx="592" cy="522" r="20"/>
  </g>
  <!-- the ONE lit spoke (the BLE mode actually used) -->
  <g>
    <line x1="592" y1="316" x2="424" y2="452" stroke="#c87533" stroke-width="5"/>
    <circle cx="408" cy="464" r="26" fill="#c87533"/>
    <g stroke="#fdfaf2" stroke-width="3" fill="none">
      <path d="M398 466 a14 14 0 0 1 20 0"/>
      <path d="M392 466 a22 22 0 0 1 32 0"/>
    </g>
  </g>
</svg>
