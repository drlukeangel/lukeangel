<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The house stays lit while the cloud goes dark">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="24" height="630" fill="#6a4c93"/>

  <!-- the dark cloud up top, with an X (outage) -->
  <g transform="translate(720,90)">
    <path d="M50 120 a34 34 0 0 1 6 -66 a42 42 0 0 1 80 8 a30 30 0 0 1 -4 58 z" fill="#7a808c" fill-opacity="0.14" stroke="#7a808c" stroke-width="4" stroke-dasharray="7 5"/>
    <!-- power-off glyph -->
    <g transform="translate(94,82)" stroke="#c14a3a" stroke-width="4.5" fill="none" stroke-linecap="round">
      <path d="M-16 -6 a22 22 0 1 0 32 0"/>
      <line x1="0" y1="-20" x2="0" y2="4"/>
    </g>
  </g>

  <!-- severed link from cloud to house (a broken dashed line with a gap break) -->
  <g stroke="#7a808c" stroke-width="3" stroke-dasharray="3 8" opacity="0.5">
    <path d="M740 250 L520 360" fill="none"/>
  </g>
  <g transform="translate(630,305)" stroke="#c14a3a" stroke-width="4" stroke-linecap="round">
    <line x1="-14" y1="-14" x2="14" y2="14"/><line x1="-14" y1="14" x2="14" y2="-14"/>
  </g>

  <!-- the house, lit and running, lower-left -->
  <g transform="translate(150,300)">
    <path d="M40 120 L240 40 L440 120 L440 360 L40 360 Z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M40 120 L240 40 L440 120" fill="none" stroke="#6a4c93" stroke-width="6" stroke-linejoin="round"/>
    <!-- lit windows (glowing) -->
    <g>
      <rect x="110" y="170" width="80" height="80" rx="6" fill="#c87533" fill-opacity="0.35" stroke="#1a1d24" stroke-width="3"/>
      <rect x="290" y="170" width="80" height="80" rx="6" fill="#c87533" fill-opacity="0.35" stroke="#1a1d24" stroke-width="3"/>
      <!-- window mullions -->
      <line x1="150" y1="170" x2="150" y2="250" stroke="#1a1d24" stroke-width="2"/><line x1="110" y1="210" x2="190" y2="210" stroke="#1a1d24" stroke-width="2"/>
      <line x1="330" y1="170" x2="330" y2="250" stroke="#1a1d24" stroke-width="2"/><line x1="290" y1="210" x2="370" y2="210" stroke="#1a1d24" stroke-width="2"/>
    </g>
    <!-- door, with a small green status dot (the Pi keeping it alive) -->
    <rect x="200" y="270" width="80" height="90" rx="4" fill="#6a4c93" fill-opacity="0.12" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="265" cy="316" r="6" fill="#3a7d44"/>
  </g>

  <!-- a tiny brightness flourish off the lit windows -->
  <g stroke="#c87533" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="600" y1="450" x2="624" y2="450"/>
    <line x1="596" y1="478" x2="618" y2="468"/>
    <line x1="596" y1="422" x2="618" y2="432"/>
  </g>
</svg>
