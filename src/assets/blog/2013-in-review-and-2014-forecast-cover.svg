<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2013 smart home review">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#6a4c93"/>

  <!-- three vendor islands across the top -->
  <!-- lighting island -->
  <g transform="translate(230 180)">
    <ellipse cx="0" cy="120" rx="130" ry="30" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.4" stroke-width="2.5"/>
    <circle cx="0" cy="50" r="34" fill="#6a4c93" fill-opacity="0.22" stroke="#1a1d24" stroke-width="4"/><circle cx="0" cy="50" r="11" fill="#6a4c93"/>
    <rect x="-12" y="84" width="24" height="14" rx="3" fill="#1a1d24"/>
  </g>
  <!-- plug island -->
  <g transform="translate(600 180)">
    <ellipse cx="0" cy="120" rx="130" ry="30" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.4" stroke-width="2.5"/>
    <rect x="-30" y="20" width="60" height="74" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><circle cx="0" cy="52" r="11" fill="#6a4c93"/>
  </g>
  <!-- network island -->
  <g transform="translate(970 180)">
    <ellipse cx="0" cy="120" rx="130" ry="30" fill="#6a4c93" fill-opacity="0.10" stroke="#6a4c93" stroke-opacity="0.4" stroke-width="2.5"/>
    <rect x="-38" y="40" width="76" height="40" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="4"/><line x1="-22" y1="24" x2="-22" y2="40" stroke="#1a1d24" stroke-width="4"/><line x1="22" y1="24" x2="22" y2="40" stroke="#1a1d24" stroke-width="4"/>
  </g>

  <!-- thin, sagging IFTTT bridge between islands (duct tape) -->
  <g stroke="#c87533" stroke-width="4" fill="none" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.7">
    <path d="M360 300 Q 415 330 470 300"/>
    <path d="M730 300 Q 785 330 840 300"/>
  </g>

  <!-- the hub-shaped gap waiting below, center -->
  <g transform="translate(600 470)">
    <rect x="-90" y="-50" width="180" height="100" rx="18" fill="none" stroke="#6a4c93" stroke-width="5" stroke-dasharray="8 8"/>
    <!-- the empty, hub-shaped slot the three islands reach toward -->
  </g>
  <g stroke="#6a4c93" stroke-width="3" stroke-dasharray="3 7" opacity="0.45" fill="none">
    <path d="M230 330 C 300 420, 470 440, 512 440"/>
    <path d="M600 330 L600 418"/>
    <path d="M970 330 C 900 420, 730 440, 688 440"/>
  </g>
</svg>
