<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" role="img" aria-label="Weekly watchdog versus quarterly catch.">
  <rect width="1000" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <defs>
    <marker id="ww-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1d24"/>
    </marker>
  </defs>

  <text x="34" y="44" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">CATCH IT MONDAY, NOT THREE MONTHS LATER</text>
  <line x1="34" y1="60" x2="966" y2="60" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1"/>

  <!-- leak start marker -->
  <circle cx="140" cy="120" r="7" fill="#c14a3a"/>
  <text x="140" y="100" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#c14a3a">leak starts</text>
  <text x="140" y="142" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">a box scales up,</text>
  <text x="140" y="158" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">never scales back</text>

  <!-- TOP track: weekly watchdog -->
  <text x="34" y="206" font-family="ui-monospace,monospace" font-size="13" fill="#3a7d44">WEEKLY: Lambda &#8594; Slack, Mon 8am</text>
  <line x1="140" y1="232" x2="900" y2="232" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <g stroke="#3a7d44" stroke-width="1.5">
    <line x1="240" y1="226" x2="240" y2="238"/>
    <line x1="340" y1="226" x2="340" y2="238"/>
    <line x1="440" y1="226" x2="440" y2="238"/>
  </g>
  <!-- the +20% week-over-week alert that fires -->
  <rect x="200" y="244" width="200" height="44" rx="9" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2"/>
  <text x="300" y="268" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#1a1d24">+20% WoW &#8594; fix same week</text>
  <line x1="300" y1="232" x2="300" y2="244" stroke="#3a7d44" stroke-width="1.5"/>
  <circle cx="300" cy="232" r="6" fill="#3a7d44"/>
  <text x="300" y="218" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3a7d44">caught</text>
  <text x="930" y="236" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="12" fill="#7a808c" text-anchor="middle">time</text>
  <path d="M900 232 h 14" stroke="#1a1d24" stroke-width="1.5" marker-end="url(#ww-arrow)" fill="none"/>

  <!-- BOTTOM track: quarterly only -->
  <text x="34" y="330" font-family="ui-monospace,monospace" font-size="13" fill="#c14a3a">QUARTERLY ONLY: caught at audit</text>
  <line x1="140" y1="356" x2="900" y2="356" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- accumulating waste shaded -->
  <path d="M140 356 L 820 356 L 820 344 Q 480 312 140 350 Z" fill="#c14a3a" fill-opacity="0.16"/>
  <text x="470" y="338" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="13" fill="#c14a3a">~3 months of waste billed before anyone looks</text>
  <circle cx="820" cy="356" r="6" fill="#c14a3a"/>
  <text x="820" y="382" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">audit Friday</text>
  <path d="M900 356 h 14" stroke="#1a1d24" stroke-width="1.5" marker-end="url(#ww-arrow)" fill="none"/>
</svg>
