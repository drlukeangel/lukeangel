<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" role="img" aria-label="The outage that proved local-first">
  <rect width="1000" height="470" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .h { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 13px; fill: #7a808c; letter-spacing: 1.5px; }
    .lbl { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 14px; fill: #1a1d24; }
    .sub { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 11.5px; fill: #5b616b; }
    .cap { font-family: Newsreader, Georgia, serif; font-style: italic; font-size: 14px; fill: #7a808c; }
  </style>

  <text x="40" y="38" class="h">NOVEMBER 2017 — THE SMARTTHINGS CLOUD GOES DOWN FOR HOURS</text>

  <!-- the dead cloud, center-top -->
  <g transform="translate(430,70)">
    <path d="M40 96 a30 30 0 0 1 5 -58 a38 38 0 0 1 72 7 a26 26 0 0 1 -3 51 z" fill="#c14a3a" fill-opacity="0.08" stroke="#c14a3a" stroke-width="2.6" stroke-dasharray="7 5"/>
    <text x="78" y="66" text-anchor="middle" class="lbl" fill="#c14a3a">ST cloud</text>
    <text x="78" y="84" text-anchor="middle" class="sub" fill="#c14a3a">DOWN</text>
  </g>

  <!-- LEFT: the cloud-tethered houses, dark -->
  <g transform="translate(60,210)">
    <text x="0" y="-6" class="sub">EVERYONE ON CLOUD RULES</text>
    <!-- two dark houses -->
    <g transform="translate(20,10)">
      <path d="M0 70 L55 24 L110 70 L110 150 L0 150 Z" fill="#7a808c" fill-opacity="0.10" stroke="#7a808c" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="32" y="92" width="46" height="46" rx="3" fill="#7a808c" fill-opacity="0.10" stroke="#7a808c" stroke-width="2"/>
      <!-- dark window: an X -->
      <line x1="42" y1="102" x2="68" y2="128" stroke="#c14a3a" stroke-width="2.2"/><line x1="68" y1="102" x2="42" y2="128" stroke="#c14a3a" stroke-width="2.2"/>
    </g>
    <g transform="translate(160,10)">
      <path d="M0 70 L55 24 L110 70 L110 150 L0 150 Z" fill="#7a808c" fill-opacity="0.10" stroke="#7a808c" stroke-width="2.4" stroke-linejoin="round"/>
      <rect x="32" y="92" width="46" height="46" rx="3" fill="#7a808c" fill-opacity="0.10" stroke="#7a808c" stroke-width="2"/>
      <line x1="42" y1="102" x2="68" y2="128" stroke="#c14a3a" stroke-width="2.2"/><line x1="68" y1="102" x2="42" y2="128" stroke="#c14a3a" stroke-width="2.2"/>
    </g>
    <text x="155" y="190" text-anchor="middle" class="sub" fill="#c14a3a">automations dark — rules live in the cloud</text>
    <!-- broken link to cloud -->
    <line x1="180" y1="10" x2="370" y2="-70" stroke="#c14a3a" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
  </g>

  <!-- RIGHT: my house, lit -->
  <g transform="translate(640,210)">
    <text x="0" y="-6" class="sub">MY HOUSE — RULES ON THE PI</text>
    <g transform="translate(90,10)">
      <path d="M0 70 L55 24 L110 70 L110 150 L0 150 Z" fill="#6a4c93" fill-opacity="0.06" stroke="#1a1d24" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M0 70 L55 24 L110 70" fill="none" stroke="#6a4c93" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- lit window -->
      <rect x="32" y="92" width="46" height="46" rx="3" fill="#c87533" fill-opacity="0.35" stroke="#1a1d24" stroke-width="2"/>
      <!-- green pi dot -->
      <circle cx="95" cy="135" r="6" fill="#3a7d44"/>
    </g>
    <text x="145" y="190" text-anchor="middle" class="sub" fill="#3a7d44">door → light still fires — local, no internet</text>
    <!-- severed link to cloud (X) -->
    <line x1="150" y1="10" x2="0" y2="-70" stroke="#7a808c" stroke-width="2" stroke-dasharray="4 6" opacity="0.5"/>
    <g transform="translate(78,-34)" stroke="#3a7d44" stroke-width="2.4" fill="none"><circle cx="0" cy="0" r="11"/><path d="M-5 0 l4 5 l7 -9"/></g>
  </g>

  <text x="500" y="448" text-anchor="middle" class="cap">The moment local-first stopped being a preference and became the architecture.</text>
</svg>
