<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="2023 IoT outlook cover">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1d24" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="24" height="630" fill="#0066cc"/>

  <!-- Interop mesh: device nodes connected to a hub, two new vectors converging -->
  <g stroke="#0066cc" stroke-width="3" fill="none" stroke-opacity="0.55">
    <line x1="600" y1="315" x2="380" y2="180"/>
    <line x1="600" y1="315" x2="360" y2="380"/>
    <line x1="600" y1="315" x2="470" y2="500"/>
    <line x1="600" y1="315" x2="820" y2="170"/>
    <line x1="600" y1="315" x2="860" y2="360"/>
    <line x1="600" y1="315" x2="740" y2="510"/>
  </g>

  <!-- peripheral device pucks -->
  <g fill="#fdfaf2" stroke="#1a1d24" stroke-width="3">
    <circle cx="380" cy="180" r="34"/>
    <circle cx="360" cy="380" r="30"/>
    <circle cx="470" cy="500" r="28"/>
    <circle cx="820" cy="170" r="32"/>
    <circle cx="860" cy="360" r="34"/>
    <circle cx="740" cy="510" r="28"/>
  </g>
  <!-- little device glyphs inside pucks -->
  <g fill="none" stroke="#0066cc" stroke-width="3" stroke-linecap="round">
    <circle cx="380" cy="180" r="13"/>
    <rect x="350" y="370" width="20" height="20" rx="3"/>
    <path d="M460 500 h20 M470 490 v20"/>
    <path d="M810 170 a10 10 0 0 1 20 0"/>
    <circle cx="860" cy="360" r="12"/>
    <rect x="731" y="501" width="18" height="18" rx="9"/>
  </g>

  <!-- central node: a chip with an on-device-AI brain motif -->
  <g transform="translate(600,315)">
    <rect x="-72" y="-72" width="144" height="144" rx="16" fill="#0066cc"/>
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="#fdfaf2"/>
    <!-- pins -->
    <g stroke="#0066cc" stroke-width="6" stroke-linecap="round">
      <line x1="-72" y1="-34" x2="-90" y2="-34"/><line x1="-72" y1="0" x2="-90" y2="0"/><line x1="-72" y1="34" x2="-90" y2="34"/>
      <line x1="72" y1="-34" x2="90" y2="-34"/><line x1="72" y1="0" x2="90" y2="0"/><line x1="72" y1="34" x2="90" y2="34"/>
      <line x1="-34" y1="-72" x2="-34" y2="-90"/><line x1="0" y1="-72" x2="0" y2="-90"/><line x1="34" y1="-72" x2="34" y2="-90"/>
      <line x1="-34" y1="72" x2="-34" y2="90"/><line x1="0" y1="72" x2="0" y2="90"/><line x1="34" y1="72" x2="34" y2="90"/>
    </g>
    <!-- brain/neural motif = on-device intelligence -->
    <g fill="none" stroke="#0066cc" stroke-width="3.5" stroke-linecap="round">
      <path d="M-26 -8 q-10 -22 14 -26 q20 -6 26 12 q18 0 14 20 q4 16 -14 18 q-6 14 -22 8 q-20 4 -22 -16 q-12 -8 4 -16 z"/>
      <line x1="-8" y1="-30" x2="-8" y2="34"/>
      <line x1="-8" y1="-8" x2="14" y2="2"/>
      <line x1="-8" y1="14" x2="-22" y2="20"/>
    </g>
  </g>
</svg>
