<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="Leak sensor placement">
  <rect width="880" height="460" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <style>
    .mut{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;fill:#7a808c}
  </style>

  <!-- house box, two floors -->
  <rect x="60" y="60" width="760" height="340" rx="8" fill="none" stroke="#1a1d24" stroke-width="3" stroke-opacity="0.5"/>
  <line x1="60" y1="230" x2="820" y2="230" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.25"/>
  <line x1="440" y1="60" x2="440" y2="400" stroke="#1a1d24" stroke-width="2" stroke-opacity="0.12"/>

  <!-- hub centre -->
  <g transform="translate(440 145)">
    <rect x="-30" y="-22" width="60" height="44" rx="8" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle cx="-16" cy="-9" r="4" fill="#3a7d44"/>
    <rect x="-6" y="-14" width="32" height="9" rx="2" fill="#1a1d24" fill-opacity="0.12"/>
    <rect x="-6" y="0" width="32" height="9" rx="2" fill="#1a1d24" fill-opacity="0.12"/>
  </g>
  <text class="mut" x="416" y="190">hub</text>

  <!-- five sensors -->
  <g id="sensors">
    <!-- water heater (basement L) -->
    <g transform="translate(150 320)"><rect x="-22" y="-14" width="44" height="28" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><circle cx="0" cy="0" r="5" fill="#6a4c93"/></g>
    <!-- washer (basement R-ish) -->
    <g transform="translate(330 330)"><rect x="-22" y="-14" width="44" height="28" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><circle cx="0" cy="0" r="5" fill="#6a4c93"/></g>
    <!-- dishwasher (upper R) -->
    <g transform="translate(560 150)"><rect x="-22" y="-14" width="44" height="28" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><circle cx="0" cy="0" r="5" fill="#6a4c93"/></g>
    <!-- master bath vanity (upper R) -->
    <g transform="translate(720 150)"><rect x="-22" y="-14" width="44" height="28" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><circle cx="0" cy="0" r="5" fill="#6a4c93"/></g>
    <!-- half bath (lower R) -->
    <g transform="translate(650 330)"><rect x="-22" y="-14" width="44" height="28" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/><circle cx="0" cy="0" r="5" fill="#6a4c93"/></g>
  </g>

  <!-- links sensors -> hub -->
  <g stroke="#6a4c93" stroke-width="2" stroke-opacity="0.45" fill="none">
    <line x1="172" y1="320" x2="412" y2="158"/>
    <line x1="352" y1="330" x2="416" y2="164"/>
    <line x1="538" y1="150" x2="470" y2="145"/>
    <line x1="698" y1="150" x2="470" y2="142"/>
    <line x1="628" y1="330" x2="464" y2="164"/>
  </g>

  <!-- main inlet entering bottom-left, with actuator -->
  <rect x="20" y="412" width="180" height="20" rx="4" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <rect x="22" y="416" width="90" height="12" rx="3" fill="#6a4c93" fill-opacity="0.22"/>
  <g transform="translate(150 422)">
    <circle r="22" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <circle r="11" fill="#6a4c93" fill-opacity="0.18" stroke="#6a4c93" stroke-width="2"/>
    <rect x="-30" y="-50" width="60" height="26" rx="7" fill="#6a4c93" fill-opacity="0.85"/>
    <rect x="-3" y="-24" width="6" height="14" fill="#1a1d24"/>
  </g>
  <text class="mut" x="190" y="427">main + actuator</text>
</svg>
