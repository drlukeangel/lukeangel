<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-label="Broadcast cache flow.">
  <rect width="1200" height="580" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <defs>
    <marker id="ar7" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#3a7d44"/></marker>
    <marker id="ax7" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#c14a3a"/></marker>
    <marker id="ag7" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5b616b"/></marker>
  </defs>

  <text x="40" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="1.5" fill="#1a1d24">POSITION BROADCAST · where the lat/lng leaks</text>

  <!-- GPS chip box (left) -->
  <g>
    <rect x="60" y="190" width="200" height="200" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4" rx="4"/>
    <!-- chip pins -->
    <g stroke="#1a1d24" stroke-width="1.8">
      <line x1="60" y1="220" x2="48" y2="220"/>
      <line x1="60" y1="260" x2="48" y2="260"/>
      <line x1="60" y1="300" x2="48" y2="300"/>
      <line x1="60" y1="340" x2="48" y2="340"/>
      <line x1="260" y1="220" x2="272" y2="220"/>
      <line x1="260" y1="260" x2="272" y2="260"/>
      <line x1="260" y1="300" x2="272" y2="300"/>
      <line x1="260" y1="340" x2="272" y2="340"/>
    </g>
    <text x="160" y="232" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" fill="#1a1d24">L76K GPS</text>
    <text x="160" y="256" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#5b616b">fresh fix · LOC_INTERNAL</text>
    <text x="160" y="296" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">lat   40.272606</text>
    <text x="160" y="316" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">lng  -75.614714</text>
    <text x="160" y="336" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">alt    24 m</text>
    <text x="160" y="356" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">time  now</text>
  </g>
  <text x="160" y="175" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">the chip is fine</text>

  <!-- live position buffer (middle top) -->
  <g>
    <rect x="490" y="120" width="240" height="120" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.4" rx="6"/>
    <text x="610" y="148" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">live position buffer</text>
    <text x="610" y="172" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">myNodeInfo.position</text>
    <text x="610" y="200" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#3a7d44">altitude · time · LOC_INTERNAL</text>
    <text x="610" y="220" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#3a7d44">[ lat / lng available here too ]</text>
  </g>

  <!-- broadcast cache box (middle bottom) -->
  <g>
    <rect x="490" y="380" width="240" height="120" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.4" stroke-dasharray="6 4" rx="6"/>
    <text x="610" y="408" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">broadcast cache · flash</text>
    <text x="610" y="432" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">lat  40.2953856  (stuck)</text>
    <text x="610" y="450" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">lng -75.6246912  (stuck)</text>
    <text x="610" y="478" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">survives reboot · power-cycle · --remove-position</text>
  </g>

  <!-- arrows from GPS to both -->
  <!-- to live buffer -->
  <path d="M 270 280 Q 380 200 488 175" fill="none" stroke="#3a7d44" stroke-width="2.4" marker-end="url(#ar7)"/>
  <text x="370" y="218" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#3a7d44">every fix</text>

  <!-- to broadcast cache (broken update path) -->
  <path d="M 270 320 Q 380 380 488 435" fill="none" stroke="#c14a3a" stroke-width="2.4" stroke-dasharray="2 6"/>
  <g transform="translate(380, 372)">
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#c14a3a" stroke-width="3.5"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#c14a3a" stroke-width="3.5"/>
  </g>
  <text x="396" y="395" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#c14a3a">never updates from GPS</text>

  <!-- outgoing packet (right) -->
  <g>
    <rect x="900" y="200" width="240" height="200" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.4" rx="4"/>
    <text x="1020" y="232" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">POSITION_APP packet</text>
    <text x="1020" y="252" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#5b616b">over LoRa to the base</text>
    <line x1="920" y1="266" x2="1120" y2="266" stroke="#1a1d24" stroke-opacity="0.18" stroke-width="1.2"/>
    <text x="920" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">lat   40.2953856  ←  cache</text>
    <text x="920" y="312" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">lng  -75.6246912  ←  cache</text>
    <text x="920" y="334" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#3a7d44">alt   24 m         ←  live</text>
    <text x="920" y="356" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#3a7d44">time  now          ←  live</text>
    <text x="920" y="378" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#3a7d44">src   LOC_INTERNAL ←  live</text>
  </g>

  <!-- arrows from buffer and cache to packet -->
  <path d="M 730 180 Q 820 200 900 260" fill="none" stroke="#3a7d44" stroke-width="2.4" marker-end="url(#ar7)"/>
  <text x="780" y="190" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#3a7d44">alt + time</text>

  <path d="M 730 440 Q 820 420 900 370" fill="none" stroke="#c14a3a" stroke-width="2.4" marker-end="url(#ax7)"/>
  <text x="788" y="450" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#c14a3a">lat + lng</text>

  <!-- bottom caption -->
  <text x="40" y="548" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#5b616b">The altitude field arrives fresh; the lat / lng arrives stale. Same packet. Until --factory-reset clears the flash, every broadcast carries a coordinate the chip never produced.</text>
</svg>
