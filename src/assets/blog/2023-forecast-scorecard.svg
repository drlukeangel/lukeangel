    <g transform="translate(60,114)"><circle cx="13" cy="13" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M7 13 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/><text x="38" y="18" class="it">structured wiring + PoE backbone (42 Cat6)</text></g>
    <g transform="translate(60,156)"><circle cx="13" cy="13" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M7 13 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/><text x="38" y="18" class="it">first Matter devices — 3 Eve + 1 Nanoleaf</text></g>
    <g transform="translate(60,198)"><circle cx="13" cy="13" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M7 13 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/><text x="38" y="18" class="it">Frame TV in the great room</text></g>
    <g transform="translate(60,240)"><circle cx="13" cy="13" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M7 13 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/><text x="38" y="18" class="it">HA migrates to the new house</text></g>
    <g transform="translate(60,282)"><circle cx="13" cy="13" r="13" fill="#3a7d44" fill-opacity="0.16" stroke="#3a7d44" stroke-width="2.4"/><path d="M7 13 l4 6 l9 -11" fill="none" stroke="#3a7d44" stroke-width="3" stroke-linecap="round"/><text x="38" y="18" class="it">old-house gear migrates over</text></g>
    <!-- 2 partials -->
    <g transform="translate(60,324)"><circle cx="13" cy="13" r="13" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.4"/><path d="M13 2 a11 11 0 0 1 0 22 z" fill="#6a4c93"/><text x="38" y="18" class="it">Samsung Bespoke kitchen (fridge in; rest early '24)</text></g>
    <g transform="translate(60,366)"><circle cx="13" cy="13" r="13" fill="#6a4c93" fill-opacity="0.16" stroke="#6a4c93" stroke-width="2.4"/><path d="M13 2 a11 11 0 0 1 0 22 z" fill="#6a4c93"/><text x="38" y="18" class="it">wall touchscreens (2 of 3; office delayed)</text></g>
