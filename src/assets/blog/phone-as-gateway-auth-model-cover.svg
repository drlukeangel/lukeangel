<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two separate locked trust domains joined by one contested bridge. On the left, a device and a phone are bonded over Bluetooth, sharing a closed padlock — trust between two physical objects. On the right, the same phone holds a token toward a cloud, a second closed padlock — trust between a human and the backend. The phone sits in both domains and is the only bridge between them, marked with a question mark: the cloud must decide whether to believe what crosses through a middleman it cannot trust.">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs>
    <pattern id="pgw-cover-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#pgw-cover-dots)"/>
  <rect width="24" height="630" fill="#357a8c"/>

  <!-- ============ LEFT DOMAIN: device <-> phone, bonded (a closed padlock between them) ============ -->
  <!-- domain enclosure -->
  <rect x="86" y="150" width="430" height="330" rx="22" fill="none" stroke="#357a8c" stroke-width="2.5" stroke-dasharray="7 8" opacity="0.55"/>

  <!-- DEVICE puck -->
  <g transform="translate(120,250)">
    <ellipse cx="70" cy="150" rx="74" ry="22" fill="#1a1d24" opacity="0.05"/>
    <rect x="10" y="40" width="120" height="98" rx="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <ellipse cx="70" cy="40" rx="60" ry="18" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <ellipse cx="70" cy="40" rx="40" ry="11" fill="none" stroke="#1a1d24" stroke-width="2.5" opacity="0.45"/>
    <!-- BLE rune -->
    <g transform="translate(70,92)" stroke="#357a8c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -22 L13 -11 L-10 9 M-10 -9 L13 11 L0 22 L0 -22"/>
    </g>
  </g>

  <!-- bonding link with a closed padlock sitting on it -->
  <g stroke="#357a8c" stroke-width="6" fill="#357a8c" stroke-linecap="round">
    <line x1="262" y1="318" x2="356" y2="318"/>
    <path d="M368 318 l-20 -9 v18 z"/>
    <path d="M250 318 l20 -9 v18 z"/>
  </g>
  <!-- closed padlock (bond established) -->
  <g transform="translate(290,276)">
    <rect x="-26" y="-30" width="60" height="40" rx="6" fill="#357a8c" opacity="0.08"/>
    <path d="M-12 -30 v-10 a16 16 0 0 1 32 0 v10" fill="none" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
    <rect x="-22" y="-30" width="52" height="40" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="4" cy="-12" r="5" fill="#1a1d24"/>
    <line x1="4" y1="-12" x2="4" y2="-2" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- ============ CENTER: the PHONE — the single bridge, sitting in both domains ============ -->
  <g transform="translate(528,196)">
    <rect x="0" y="0" width="144" height="266" rx="24" fill="#fdfaf2" stroke="#1a1d24" stroke-width="6"/>
    <rect x="13" y="36" width="118" height="190" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5" opacity="0.4"/>
    <line x1="52" y1="20" x2="92" y2="20" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
    <circle cx="72" cy="246" r="8" fill="none" stroke="#1a1d24" stroke-width="4"/>
    <!-- big question mark on the screen: should the cloud trust what crosses through here? -->
    <g transform="translate(72,128)" fill="none" stroke="#c14a3a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22 -26 a22 22 0 1 1 22 38 v10"/>
    </g>
    <circle cx="72" cy="166" r="6.5" fill="#c14a3a"/>
  </g>
  <!-- "in both domains" hint: the phone overlaps both dashed enclosures, shown by the bridge tabs -->

  <!-- ============ RIGHT DOMAIN: phone -> cloud, token (a second closed padlock) ============ -->
  <rect x="684" y="150" width="430" height="330" rx="22" fill="none" stroke="#357a8c" stroke-width="2.5" stroke-dasharray="7 8" opacity="0.55"/>

  <!-- token link phone->cloud with closed padlock -->
  <g stroke="#357a8c" stroke-width="6" fill="#357a8c" stroke-linecap="round">
    <line x1="684" y1="318" x2="838" y2="318"/>
    <path d="M852 318 l-22 -10 v20 z"/>
  </g>
  <!-- closed padlock (OAuth session) -->
  <g transform="translate(760,276)">
    <rect x="-26" y="-30" width="60" height="40" rx="6" fill="#357a8c" opacity="0.08"/>
    <path d="M-12 -30 v-10 a16 16 0 0 1 32 0 v10" fill="none" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
    <rect x="-22" y="-30" width="52" height="40" rx="6" fill="#fdfaf2" stroke="#1a1d24" stroke-width="5"/>
    <circle cx="4" cy="-12" r="5" fill="#1a1d24"/>
    <line x1="4" y1="-12" x2="4" y2="-2" stroke="#1a1d24" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- CLOUD -->
  <g transform="translate(866,228)">
    <path d="M58 150
             a52 52 0 0 1 4 -103
             a58 58 0 0 1 110 -16
             a46 46 0 0 1 36 119
             z"
          fill="#fdfaf2" stroke="#1a1d24" stroke-width="6" stroke-linejoin="round"/>
    <g stroke="#357a8c" stroke-width="5" stroke-linecap="round">
      <line x1="92" y1="72" x2="160" y2="72"/>
      <line x1="92" y1="92" x2="172" y2="92"/>
      <line x1="92" y1="112" x2="150" y2="112"/>
    </g>
  </g>

  <!-- ============ the gap the phone bridges: a seam between the two domains, under the phone ============ -->
  <g>
    <path d="M516 522 q84 36 168 0" fill="none" stroke="#7a808c" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.7"/>
    <!-- two domain feet meeting under the phone, not joined -->
    <line x1="516" y1="492" x2="516" y2="552" stroke="#7a808c" stroke-width="3" stroke-dasharray="2 9" opacity="0.55"/>
    <line x1="684" y1="492" x2="684" y2="552" stroke="#7a808c" stroke-width="3" stroke-dasharray="2 9" opacity="0.55"/>
  </g>
</svg>
