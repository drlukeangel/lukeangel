<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" width="1080" height="420" role="img" aria-label="Three hubs that only bridge awkwardly through the cloud or HomeKit.">
  <rect width="1080" height="420" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="40" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THREE HUBS, NO CLEAN BRIDGE</text>

  <!-- three hub islands across the top, each with its own devices -->
  <!-- SmartThings -->
  <g transform="translate(90,90)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="90" y="36" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">SmartThings hub</text>
    <g font-family="ui-monospace,monospace" font-size="10" fill="#7a808c" text-anchor="middle">
      <text x="90" y="92">Z-Wave + Zigbee sensors,</text>
      <text x="90" y="108">locks, the security automation</text>
    </g>
  </g>
  <!-- Hue -->
  <g transform="translate(450,90)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="90" y="36" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">Hue Bridge</text>
    <g font-family="ui-monospace,monospace" font-size="10" fill="#7a808c" text-anchor="middle">
      <text x="90" y="92">Zigbee bulbs + the</text>
      <text x="90" y="108">motion sensors</text>
    </g>
  </g>
  <!-- Lutron -->
  <g transform="translate(810,90)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="#6a4c93" fill-opacity="0.12" stroke="#6a4c93" stroke-width="2.6"/>
    <text x="90" y="36" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">Lutron Caséta</text>
    <g font-family="ui-monospace,monospace" font-size="10" fill="#7a808c" text-anchor="middle">
      <text x="90" y="92">Clear Connect dimmers</text>
      <text x="90" y="108">+ switches</text>
    </g>
  </g>

  <!-- the two awkward bridges below -->
  <!-- cloud bridge -->
  <g transform="translate(300,250)">
    <path d="M40 60 a26 26 0 0 1 4 -50 a32 32 0 0 1 60 6 a22 22 0 0 1 -2 44 z" fill="#fdfaf2" stroke="#c14a3a" stroke-width="2.6"/>
    <text x="74" y="44" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#c14a3a">CLOUD</text>
    <text x="74" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">cross-hub via SmartThings cloud</text>
    <text x="74" y="108" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c14a3a">= dies in an outage</text>
  </g>
  <!-- HomeKit bridge -->
  <g transform="translate(640,250)">
    <rect x="20" y="6" width="108" height="58" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.6"/>
    <text x="74" y="40" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1a1d24">HomeKit</text>
    <text x="74" y="92" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">only the 3 MFi devices</text>
    <text x="74" y="108" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#c14a3a">= leaves most devices out</text>
  </g>

  <!-- dashed links hubs -> bridges, showing the awkwardness -->
  <g stroke="#1a1d24" stroke-width="2" opacity="0.3" stroke-dasharray="4 5" fill="none">
    <line x1="180" y1="150" x2="360" y2="250"/>
    <line x1="540" y1="150" x2="400" y2="250"/>
    <line x1="540" y1="152" x2="700" y2="250"/>
    <line x1="900" y1="150" x2="740" y2="250"/>
  </g>

  <text x="540" y="396" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="15" font-style="italic" fill="#3a3f4a">Every cross-hub automation rides the cloud or HomeKit — and each leaves something important out.</text>
</svg>
