<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="AI hardware thesis">
  <rect width="760" height="430" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="40" y="44" font-size="19" fill="#1a1d24" font-weight="600">Two ways to ship "AI you wear" in 2024</text>
    <text x="40" y="66" font-size="12.5" fill="#7a808c">Same lesson the AR-glasses category learned in 2016</text>

    <!-- left path: standalone sci-fi gadget -->
    <g transform="translate(40,96)">
      <rect width="330" height="288" rx="10" fill="#c14a3a" fill-opacity="0.06" stroke="#c14a3a" stroke-opacity="0.4"/>
      <text x="20" y="32" font-size="14" fill="#c14a3a" font-weight="600">NEW DEVICE, NO USE CASE</text>
      <text x="20" y="52" font-size="11.5" fill="#7a808c">AI Pin · R1 — build the category from zero</text>

      <!-- pin gadget -->
      <g transform="translate(135,72)">
        <rect x="0" y="0" width="60" height="86" rx="14" fill="#1a1d24"/>
        <circle cx="30" cy="32" r="17" fill="#fdfaf2"/>
        <circle cx="30" cy="32" r="8" fill="#c14a3a" fill-opacity="0.6"/>
        <rect x="14" y="62" width="32" height="7" rx="3.5" fill="#fdfaf2" fill-opacity="0.3"/>
      </g>

      <!-- failure list -->
      <g transform="translate(24,186)" font-size="12" fill="#5b616b">
        <g transform="translate(0,0)"><path d="M0 -4 l10 10 M10 -4 l-10 10" stroke="#c14a3a" stroke-width="2" stroke-linecap="round"/><text x="22" y="2">battery + latency</text></g>
        <g transform="translate(0,26)"><path d="M0 -4 l10 10 M10 -4 l-10 10" stroke="#c14a3a" stroke-width="2" stroke-linecap="round"/><text x="22" y="2">hallucination rate</text></g>
        <g transform="translate(0,52)"><path d="M0 -4 l10 10 M10 -4 l-10 10" stroke="#c14a3a" stroke-width="2" stroke-linecap="round"/><text x="22" y="2">no reason to wear it</text></g>
        <g transform="translate(0,78)"><path d="M0 -4 l10 10 M10 -4 l-10 10" stroke="#c14a3a" stroke-width="2" stroke-linecap="round"/><text x="22" y="2">funding round dies</text></g>
      </g>
    </g>

    <!-- right path: camera on an existing form factor -->
    <g transform="translate(390,96)">
      <rect width="330" height="288" rx="10" fill="#3a7d44" fill-opacity="0.06" stroke="#3a7d44" stroke-opacity="0.4"/>
      <text x="20" y="32" font-size="14" fill="#3a7d44" font-weight="600">FAMILIAR THING, AI ADDED</text>
      <text x="20" y="52" font-size="11.5" fill="#7a808c">Ray-Ban Meta — glasses people already wear</text>

      <!-- glasses -->
      <g transform="translate(95,108)">
        <rect x="0" y="0" width="62" height="30" rx="11" fill="none" stroke="#1a1d24" stroke-width="6"/>
        <rect x="78" y="0" width="62" height="30" rx="11" fill="none" stroke="#1a1d24" stroke-width="6"/>
        <path d="M62 12 q8 -7 16 0" fill="none" stroke="#1a1d24" stroke-width="6"/>
        <circle cx="6" cy="-3" r="6" fill="#3a7d44"/>
      </g>

      <!-- success list -->
      <g transform="translate(24,186)" font-size="12" fill="#5b616b">
        <g transform="translate(0,0)"><path d="M0 2 l4 4 l9 -10" stroke="#3a7d44" stroke-width="2.2" fill="none" stroke-linecap="round"/><text x="22" y="2">socially acceptable</text></g>
        <g transform="translate(0,26)"><path d="M0 2 l4 4 l9 -10" stroke="#3a7d44" stroke-width="2.2" fill="none" stroke-linecap="round"/><text x="22" y="2">capture is the use case</text></g>
        <g transform="translate(0,52)"><path d="M0 2 l4 4 l9 -10" stroke="#3a7d44" stroke-width="2.2" fill="none" stroke-linecap="round"/><text x="22" y="2">good-looking hardware</text></g>
        <g transform="translate(0,78)"><path d="M0 2 l4 4 l9 -10" stroke="#3a7d44" stroke-width="2.2" fill="none" stroke-linecap="round"/><text x="22" y="2">run-rate 1M+/yr by Q4</text></g>
      </g>
    </g>

    <text x="40" y="416" font-size="11" fill="#7a808c" font-style="italic" font-family="Newsreader, Georgia, serif">A sci-fi product without a real use case kills the funding round and the company.</text>
  </g>
</svg>
