<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" width="1120" height="660" role="img" aria-label="2021 predictions ranked by confidence">
  <rect width="1120" height="660" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="46" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="15" letter-spacing="2" fill="#7a808c">THE 2021 BETS, RANKED BY HOW MUCH I'D STAKE</text>

  <!-- confidence axis on the left -->
  <g transform="translate(70,80)">
    <line x1="0" y1="0" x2="0" y2="500" stroke="#7a808c" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 0 l-7 14 l14 0 z" fill="#7a808c"/>
    <g transform="translate(-46,250) rotate(-90)"><text text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#7a808c">CONFIDENCE  (hot-take  →  near-certain)</text></g>
  </g>

  <!-- prediction bars: bar length encodes confidence, all framed as forecasts -->
  <g font-family="ui-monospace,monospace" font-size="15" fill="#1a1d24">
    <!-- high confidence (standards / structural) -->
    <g transform="translate(90,96)">
      <rect x="0" y="0" width="640" height="40" rx="8" fill="#0066cc" fill-opacity="0.85"/>
      <text x="16" y="26" fill="#fdfaf2">Matter ships a v1.0 spec, not consumer products — standards slip</text>
    </g>
    <g transform="translate(90,150)">
      <rect x="0" y="0" width="600" height="40" rx="8" fill="#0066cc" fill-opacity="0.78"/>
      <text x="16" y="26" fill="#fdfaf2">A supply-chain crunch reaches connected devices in H2</text>
    </g>
    <g transform="translate(90,204)">
      <rect x="0" y="0" width="560" height="40" rx="8" fill="#0066cc" fill-opacity="0.7"/>
      <text x="16" y="26" fill="#fdfaf2">Apple AirTags finally ship, UWB precision finding, spring event</text>
    </g>
    <g transform="translate(90,258)">
      <rect x="0" y="0" width="520" height="40" rx="8" fill="#0066cc" fill-opacity="0.62"/>
      <text x="16" y="26" fill="#fdfaf2">Apple Watch Series 7 — first case redesign since Series 4</text>
    </g>

    <!-- mid confidence -->
    <g transform="translate(90,312)">
      <rect x="0" y="0" width="470" height="40" rx="8" fill="#0066cc" fill-opacity="0.52"/>
      <text x="16" y="26" fill="#1a1d24">Wi-Fi 6E reaches enthusiast routers; mass market stays 6</text>
    </g>
    <g transform="translate(90,366)">
      <rect x="0" y="0" width="430" height="40" rx="8" fill="#0066cc" fill-opacity="0.44"/>
      <text x="16" y="26" fill="#1a1d24">Connected health gets a regulatory tailwind — more FDA clearances</text>
    </g>
    <g transform="translate(90,420)">
      <rect x="0" y="0" width="380" height="40" rx="8" fill="#0066cc" fill-opacity="0.36"/>
      <text x="16" y="26" fill="#1a1d24">Ring vs Nest doorbell race settles to a draw</text>
    </g>

    <!-- low confidence / hot-take -->
    <g transform="translate(90,474)">
      <rect x="0" y="0" width="300" height="40" rx="8" fill="#fdfaf2" stroke="#0066cc" stroke-width="2.5" stroke-dasharray="6 6"/>
      <text x="16" y="26" fill="#0066cc">First IoT class-action settles publicly for $50M+ — a hot take</text>
    </g>
  </g>

  <!-- divider note between confident bets and the hot take -->
  <line x1="90" y1="458" x2="730" y2="458" stroke="#1a1d24" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="4 6"/>
  <text x="90" y="558" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#5b616b">Solid bars are calls I'd defend; the dashed bar is the swing I'm taking with eyes open.</text>
  <text x="90" y="588" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="16" fill="#5b616b">These are forecasts written in January — the year hasn't graded them yet.</text>
</svg>
