<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" role="img" aria-label="Dual-signature AND gate">
  <rect width="760" height="380" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <defs>
    <marker id="dsarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1a1d24" fill-opacity="0.55"/>
    </marker>
    <marker id="dsgood" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#c14a3a"/>
    </marker>
  </defs>

  <!-- microphone -->
  <g transform="translate(40,150)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <rect x="48" y="14" width="24" height="36" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <path d="M42 40 a18 18 0 0 0 36 0" fill="none" stroke="#1a1d24" stroke-width="3"/>
    <line x1="60" y1="58" x2="60" y2="66" stroke="#1a1d24" stroke-width="3"/>
  </g>
  <text x="100" y="252" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#7a808c">microphone</text>

  <!-- split arrows -->
  <g stroke="#1a1d24" stroke-width="3" fill="none" stroke-opacity="0.55">
    <path d="M160 175 C220 130, 240 110, 300 100" marker-end="url(#dsarr)"/>
    <path d="M160 205 C220 250, 240 270, 300 280" marker-end="url(#dsarr)"/>
  </g>

  <!-- detector A: impact thump (low-freq) -->
  <g transform="translate(300,60)">
    <rect x="0" y="0" width="210" height="80" rx="10" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <!-- low-freq waveform: big slow pulse -->
    <path d="M16 40 q20 -28 40 0 q20 28 40 0" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <text x="145" y="35" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">impact</text>
    <text x="145" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">thump</text>
  </g>

  <!-- detector B: shatter (high-freq) -->
  <g transform="translate(300,240)">
    <rect x="0" y="0" width="210" height="80" rx="10" fill="#fdfaf2" stroke="#6a4c93" stroke-width="3"/>
    <!-- high-freq waveform: tight zigzag -->
    <path d="M16 40 l10 -22 l10 44 l10 -44 l10 44 l10 -44 l10 22" fill="none" stroke="#6a4c93" stroke-width="3"/>
    <text x="150" y="35" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">shatter</text>
    <text x="150" y="54" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#1a1d24">+ fall</text>
  </g>

  <!-- arrows into AND gate -->
  <g stroke="#1a1d24" stroke-width="3" fill="none" stroke-opacity="0.55">
    <path d="M510 100 C560 120, 565 150, 575 178" marker-end="url(#dsarr)"/>
    <path d="M510 280 C560 260, 565 230, 575 202" marker-end="url(#dsarr)"/>
  </g>

  <!-- AND gate (D-shape) -->
  <g transform="translate(580,150)">
    <path d="M0 0 h36 a40 40 0 0 1 0 80 h-36 z" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
    <text x="30" y="46" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#1a1d24">AND</text>
  </g>

  <!-- output to alarm -->
  <path d="M660 190 H706" stroke="#c14a3a" stroke-width="3" fill="none" marker-end="url(#dsgood)"/>
  <text x="690" y="232" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#c14a3a">alarm</text>

  <text x="380" y="360" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#5b616b">both signatures, or nothing — a dropped pot is one signal, not two</text>
</svg>
