<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" width="1180" height="520" role="img" aria-label="What Knowledge Bases now runs as managed plumbing versus the custom workarounds the team kept around it.">
  <rect width="1180" height="520" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>

  <text x="40" y="52" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" letter-spacing="2" fill="#5b616b">THE BUILD / MANAGED BOUNDARY</text>
  <line x1="40" y1="68" x2="1140" y2="68" stroke="#1a1d24" stroke-width="1" opacity="0.25"/>

  <!-- MANAGED column -->
  <rect x="40" y="92" width="520" height="392" rx="14" fill="#4f46b8" fill-opacity="0.06" stroke="#4f46b8" stroke-width="2.5"/>
  <text x="64" y="128" font-family="ui-monospace, monospace" font-size="16" letter-spacing="1" fill="#4f46b8">KB RUNS THIS — 0 lines of plumbing</text>

  <g font-family="ui-monospace, monospace" font-size="15" fill="#1a1d24">
    <!-- managed items -->
    <g transform="translate(64,160)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15">chunking + embedding</text>
    </g>
    <g transform="translate(64,202)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15">vector store + index lifecycle</text>
    </g>
    <g transform="translate(64,244)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15">dense + hybrid retrieval</text>
    </g>
    <g transform="translate(64,286)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15">metadata filtering at query</text>
    </g>
    <g transform="translate(64,328)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#fdfaf2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15">grounded answer generation</text>
    </g>
    <!-- newly managed: rerank -->
    <g transform="translate(64,370)">
      <circle cx="10" cy="10" r="10" fill="#4f46b8" fill-opacity="0.5" stroke="#4f46b8" stroke-width="2"/>
      <path d="M5 10 L9 15 L16 5" fill="none" stroke="#4f46b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="15" fill="#5b616b">reranking (new — Dec, evaluating)</text>
    </g>
  </g>
  <text x="64" y="446" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#7a808c">Was 1,200 lines of RAG plumbing. Now: none.</text>

  <!-- CUSTOM column -->
  <rect x="620" y="92" width="520" height="392" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-width="2.5"/>
  <text x="644" y="128" font-family="ui-monospace, monospace" font-size="16" letter-spacing="1" fill="#1a1d24">WE STILL BUILD THIS</text>

  <g font-family="ui-monospace, monospace" font-size="15" fill="#1a1d24">
    <g transform="translate(644,160)">
      <rect x="0" y="2" width="20" height="16" rx="3" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="34" y="15">retrieve-then-rerank Lambda</text>
      <text x="34" y="37" font-family="ui-monospace, monospace" font-size="12" fill="#7a808c">cheap gen model · task-specific rank</text>
    </g>
    <g transform="translate(644,222)">
      <rect x="0" y="2" width="20" height="16" rx="3" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="34" y="15">per-query K classifier</text>
      <text x="34" y="37" font-family="ui-monospace, monospace" font-size="12" fill="#7a808c">K=3 narrow · K=10 broad</text>
    </g>
    <g transform="translate(644,284)">
      <rect x="0" y="2" width="20" height="16" rx="3" fill="none" stroke="#1a1d24" stroke-width="2.5"/>
      <text x="34" y="15">split fact-KB / narrative-KB + routing</text>
      <text x="34" y="37" font-family="ui-monospace, monospace" font-size="12" fill="#7a808c">stops tutorials polluting fact lookups</text>
    </g>
    <g transform="translate(644,346)">
      <rect x="0" y="2" width="20" height="16" rx="3" fill="none" stroke="#c14a3a" stroke-width="2.5"/>
      <text x="34" y="15" fill="#c14a3a">structured-data pipeline</text>
      <text x="34" y="37" font-family="ui-monospace, monospace" font-size="12" fill="#7a808c">Glue → Athena → schema-aware prompt</text>
    </g>
  </g>
  <text x="644" y="446" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="15" fill="#7a808c">Quality knobs the managed path doesn't reach — yet.</text>
</svg>
