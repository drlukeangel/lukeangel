<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Recurring subscription bills versus a one-time build">
  <rect width="1200" height="630" fill="#fdfaf2"/>
  <defs><pattern id="pt1-dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="#1a1d24" opacity="0.06"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#pt1-dots)"/>
  <rect width="24" height="630" fill="#1f7a6b"/>

  <!-- LEFT: a recurring stack of renewal/bill envelopes, piling up year after year -->
  <g stroke="#1a1d24" stroke-width="3" fill="#fdfaf2">
    <rect x="150" y="372" width="300" height="180" rx="10"/>
    <rect x="135" y="318" width="300" height="180" rx="10"/>
    <rect x="120" y="264" width="300" height="180" rx="10"/>
    <rect x="105" y="210" width="300" height="180" rx="10"/>
  </g>
  <!-- envelope flap on the top one -->
  <path d="M105 210 L255 318 L405 210" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <!-- recurring-charge ring (a circular arrow) on the top envelope -->
  <g transform="translate(255,320)">
    <path d="M0 -38 A 38 38 0 1 1 -33 19" fill="none" stroke="#c14a3a" stroke-width="5" stroke-linecap="round"/>
    <path d="M-40 6 l8 17 17 -7 z" fill="#c14a3a"/>
  </g>
  <!-- a coin dropping into the recurring slot, repeated -->
  <g fill="none" stroke="#c14a3a" stroke-width="3">
    <circle cx="255" cy="245" r="13"/>
    <circle cx="295" cy="232" r="9" opacity="0.6"/>
    <circle cx="218" cy="234" r="9" opacity="0.6"/>
  </g>

  <!-- DIVIDER: a vertical seam implying "this OR that" -->
  <line x1="600" y1="120" x2="600" y2="520" stroke="#7a808c" stroke-width="2" stroke-dasharray="3 12" opacity="0.7"/>

  <!-- RIGHT: a single DIY tracker puck on a workbench, one-time build -->
  <!-- workbench line -->
  <line x1="700" y1="470" x2="1110" y2="470" stroke="#1a1d24" stroke-width="3"/>
  <!-- the puck (rounded device) -->
  <rect x="800" y="330" width="210" height="140" rx="34" fill="#fdfaf2" stroke="#1f7a6b" stroke-width="6"/>
  <!-- antenna / location pip -->
  <circle cx="905" cy="300" r="14" fill="#1f7a6b"/>
  <line x1="905" y1="314" x2="905" y2="330" stroke="#1f7a6b" stroke-width="6"/>
  <!-- broadcast arcs from the puck (location-first) -->
  <g fill="none" stroke="#1f7a6b" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M935 290 a 50 50 0 0 1 36 18"/>
    <path d="M948 274 a 78 78 0 0 1 56 30"/>
  </g>
  <!-- a tiny chip on the board -->
  <rect x="848" y="378" width="64" height="44" rx="5" fill="none" stroke="#1a1d24" stroke-width="3"/>
  <g stroke="#1a1d24" stroke-width="3">
    <line x1="848" y1="390" x2="836" y2="390"/><line x1="848" y1="410" x2="836" y2="410"/>
    <line x1="912" y1="390" x2="924" y2="390"/><line x1="912" y1="410" x2="924" y2="410"/>
  </g>
  <!-- soldering iron leaning on the bench, one-time tool -->
  <line x1="1040" y1="470" x2="952" y2="404" stroke="#1a1d24" stroke-width="4"/>
  <rect x="1030" y="455" width="56" height="22" rx="6" transform="rotate(37 1058 466)" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
  <!-- one green check: paid once, done -->
  <circle cx="905" cy="510" r="22" fill="none" stroke="#3a7d44" stroke-width="4"/>
  <path d="M894 510 l8 8 15 -18" fill="none" stroke="#3a7d44" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
