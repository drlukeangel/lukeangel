<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="home graph vs groups">
  <rect width="1000" height="500" rx="14" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="40" y="48" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" font-weight="700" fill="#1a1d24">"TURN OFF THE LIGHTS" — WHO FIGURES IT OUT</text>

  <line x1="500" y1="80" x2="500" y2="470" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- LEFT: Google Home Graph resolves automatically -->
  <text x="40" y="110" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#3a7d44">Google · Home Graph resolves it</text>

  <!-- graph: a room node linking to three lights -->
  <g transform="translate(150,250)">
    <circle r="34" fill="#3a7d44" fill-opacity="0.12" stroke="#3a7d44" stroke-width="2.5"/>
    <text y="5" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" fill="#1a1d24">kitchen</text>
  </g>
  <g stroke="#3a7d44" stroke-width="2" stroke-opacity="0.6">
    <line x1="184" y1="240" x2="300" y2="170"/>
    <line x1="188" y1="250" x2="300" y2="250"/>
    <line x1="184" y1="262" x2="300" y2="330"/>
  </g>
  <g fill="#fff" stroke="#1a1d24" stroke-width="2" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" text-anchor="middle">
    <g transform="translate(330,170)"><circle r="20"/><text y="4">light a</text></g>
    <g transform="translate(330,250)"><circle r="20"/><text y="4">light b</text></g>
    <g transform="translate(330,330)"><circle r="20"/><text y="4">light c</text></g>
  </g>
  <text x="60" y="420" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a7d44">the device that heard you knows the room;</text>
  <text x="60" y="442" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#3a7d44">the graph already knows which lights are in it.</text>

  <!-- RIGHT: Alexa needs a manual group -->
  <text x="540" y="110" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" fill="#c14a3a">Alexa · you define the group first</text>

  <g transform="translate(620,200)">
    <rect x="-40" y="-26" width="80" height="52" rx="8" fill="#c14a3a" fill-opacity="0.1" stroke="#c14a3a" stroke-width="2.5" stroke-dasharray="5 4"/>
    <text y="4" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#1a1d24">group:</text>
  </g>
  <text x="620" y="250" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b616b">(hand-built in the app)</text>
  <g fill="#fff" stroke="#1a1d24" stroke-width="2" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" text-anchor="middle">
    <g transform="translate(800,170)"><circle r="20"/><text y="4">light a</text></g>
    <g transform="translate(800,250)"><circle r="20"/><text y="4">light b</text></g>
    <g transform="translate(800,330)"><circle r="20"/><text y="4">light c</text></g>
  </g>
  <g stroke="#c14a3a" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="4 4">
    <line x1="660" y1="195" x2="780" y2="172"/>
    <line x1="660" y1="200" x2="780" y2="250"/>
    <line x1="660" y1="212" x2="780" y2="328"/>
  </g>
  <text x="555" y="420" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#c14a3a">no group, no command — "turn off the lights"</text>
  <text x="555" y="442" font-family="Newsreader, Georgia, serif" font-size="14.5" font-style="italic" fill="#c14a3a">does nothing until you build the set by hand.</text>
</svg>
