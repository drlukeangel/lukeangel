<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" role="img" aria-label="Microchip versus GPS tracker: reactive identity at close range versus active location across a network.">
  <rect width="1080" height="480" rx="12" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2"/>
  <text x="34" y="42" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" letter-spacing="2" fill="#7a808c">IDENTIFIER vs TRACKER</text>

  <!-- divider -->
  <line x1="540" y1="70" x2="540" y2="400" stroke="#1a1d24" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT: microchip = identity -->
  <g transform="translate(60,86)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="14" fill="#c87533">MICROCHIP</text>
    <text x="0" y="22" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">passive · no battery · no radio of its own</text>

    <!-- chip glyph -->
    <g transform="translate(40,86)">
      <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#fdfaf2" stroke="#c87533" stroke-width="3"/>
      <line x1="14" y1="-12" x2="14" y2="12" stroke="#c87533" stroke-width="2" opacity="0.7"/>
      <line x1="6" y1="-12" x2="6" y2="12" stroke="#c87533" stroke-width="2" opacity="0.7"/>
    </g>
    <!-- scanned at close range -->
    <g transform="translate(150,86)">
      <g fill="none" stroke="#c87533" stroke-width="3" opacity="0.7">
        <path d="M-44 -16 a22 22 0 0 0 0 32"/>
        <path d="M-58 -26 a36 36 0 0 0 0 52"/>
      </g>
      <rect x="-6" y="-30" width="44" height="60" rx="10" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <rect x="2" y="-20" width="28" height="18" rx="3" fill="#fdfaf2" stroke="#1a1d24" stroke-opacity="0.3" stroke-width="2"/>
      <text x="16" y="50" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">scanner, a few cm</text>
    </g>

    <text x="0" y="200" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">answers ONE question:</text>
    <text x="0" y="224" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="17" fill="#1a1d24">"who does this animal belong to?"</text>

    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#5b616b">
      <text x="0" y="262">• dark until physically scanned</text>
      <text x="0" y="286">• reactive — finder must act</text>
      <text x="0" y="310">• works on a FOUND pet</text>
    </g>
  </g>

  <!-- RIGHT: tracker = location -->
  <g transform="translate(580,86)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="14" fill="#2a52be">GPS TRACKER</text>
    <text x="0" y="22" font-family="ui-monospace,monospace" font-size="11" fill="#7a808c">battery · GPS + cellular/BLE · network-connected</text>

    <!-- collar device glyph -->
    <g transform="translate(40,90)">
      <rect x="-26" y="-22" width="52" height="44" rx="11" fill="#fdfaf2" stroke="#1a1d24" stroke-width="3"/>
      <!-- battery hint -->
      <rect x="-16" y="-10" width="24" height="10" rx="2" fill="#fdfaf2" stroke="#3a7d44" stroke-width="2.5"/>
      <line x1="11" y1="-7" x2="11" y2="-3" stroke="#3a7d44" stroke-width="2.5"/>
      <!-- signal waves out -->
      <g fill="none" stroke="#2a52be" stroke-width="3">
        <path d="M22 -26 a30 30 0 0 1 0 44" opacity="0.85"/>
        <path d="M40 -40 a48 48 0 0 1 0 72" opacity="0.5"/>
      </g>
    </g>
    <!-- satellites + tower hint -->
    <g transform="translate(150,60)" stroke="#2a52be" stroke-width="2.6" fill="none">
      <circle cx="0" cy="0" r="9"/>
      <line x1="-16" y1="-6" x2="-9" y2="-2"/>
      <line x1="16" y1="-6" x2="9" y2="-2"/>
    </g>
    <text x="158" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#7a808c">GPS + network</text>

    <text x="0" y="200" font-family="ui-monospace,monospace" font-size="12.5" fill="#1a1d24">answers a DIFFERENT one:</text>
    <text x="0" y="224" font-family="Newsreader, Georgia, serif" font-style="italic" font-size="17" fill="#1a1d24">"where is my pet right now?"</text>

    <g font-family="ui-monospace,monospace" font-size="11.5" fill="#5b616b">
      <text x="0" y="262">• reports on its own, continuously</text>
      <text x="0" y="286">• active — no human needed</text>
      <text x="0" y="310">• works on a LOST pet</text>
    </g>
  </g>

  <text x="540" y="448" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="16" font-style="italic" fill="#3a3f4a">The chip identifies a found pet; it can never locate a lost one — and no update will change that.</text>
</svg>
