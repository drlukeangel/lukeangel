<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t d">
  <title id="t">Docker image lifecycle — Dockerfile → docker build → registry push → docker pull → docker run</title>
  <desc id="d">2016-era flat diagram of the canonical Docker image lifecycle: source code + Dockerfile on left; docker build produces an image; docker push uploads to a registry; production hosts docker pull the image; docker run starts containers from it.</desc>
  <style>
    .label{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;fill:#1a1d24;font-size:13px}
    .small{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;fill:#5a6470}
    .mono{font-family:'JetBrains Mono','Menlo','Consolas',monospace;font-size:11px;fill:#fff}
    .title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:17px;font-weight:600;fill:#1a1d24}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="800" height="380" fill="#f5f7fa"/>
  <text x="40" y="38" class="title">Docker image lifecycle — build once, run anywhere</text>

  <!-- 1. Source -->
  <g transform="translate(40,90)">
    <rect width="130" height="140" fill="#fff" stroke="#cfd5db" rx="4"/>
    <text x="65" y="24" text-anchor="middle" class="label">1. Source</text>
    <line x1="14" y1="32" x2="116" y2="32" stroke="#cfd5db"/>
    <text x="14" y="54" class="small">- Dockerfile</text>
    <text x="14" y="72" class="small">- app source code</text>
    <text x="14" y="90" class="small">- package manifest</text>
    <text x="14" y="108" class="small">- assets</text>
    <text x="14" y="128" class="small" fill="#0066cc">git repo</text>
  </g>

  <!-- Arrow with command -->
  <line x1="170" y1="160" x2="240" y2="160" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="180" y="144" width="60" height="22" fill="#1a1d24" rx="2"/>
  <text x="210" y="160" text-anchor="middle" class="mono">build</text>

  <!-- 2. Image -->
  <g transform="translate(240,90)">
    <rect width="130" height="140" fill="#fff" stroke="#0066cc" stroke-width="2" rx="4"/>
    <text x="65" y="24" text-anchor="middle" class="label" fill="#0066cc">2. Image</text>
    <line x1="14" y1="32" x2="116" y2="32" stroke="#cfd5db"/>
    <!-- layered stack -->
    <rect x="20" y="42" width="90" height="14" fill="#e6f0fa"/>
    <text x="65" y="53" text-anchor="middle" class="small">app layer</text>
    <rect x="20" y="58" width="90" height="14" fill="#cfe0f5"/>
    <text x="65" y="69" text-anchor="middle" class="small">deps layer</text>
    <rect x="20" y="74" width="90" height="14" fill="#a8c8e8"/>
    <text x="65" y="85" text-anchor="middle" class="small">runtime layer</text>
    <rect x="20" y="90" width="90" height="14" fill="#7faedb"/>
    <text x="65" y="101" text-anchor="middle" class="small" fill="#fff">base OS layer</text>
    <text x="65" y="126" text-anchor="middle" class="small">my-app:v1.4</text>
  </g>

  <!-- Arrow -->
  <line x1="370" y1="160" x2="440" y2="160" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="380" y="144" width="60" height="22" fill="#1a1d24" rx="2"/>
  <text x="410" y="160" text-anchor="middle" class="mono">push</text>

  <!-- 3. Registry -->
  <g transform="translate(440,90)">
    <rect width="130" height="140" fill="#fff" stroke="#cfd5db" rx="4"/>
    <text x="65" y="24" text-anchor="middle" class="label">3. Registry</text>
    <line x1="14" y1="32" x2="116" y2="32" stroke="#cfd5db"/>
    <text x="65" y="56" text-anchor="middle" class="small">Docker Hub</text>
    <text x="65" y="74" text-anchor="middle" class="small">ECR / GCR / ACR</text>
    <text x="65" y="92" text-anchor="middle" class="small">private registry</text>
    <text x="65" y="120" text-anchor="middle" class="small" fill="#0066cc">my-app:v1.4 ✓</text>
    <text x="65" y="134" text-anchor="middle" class="small">stored as layers</text>
  </g>

  <!-- Arrow -->
  <line x1="570" y1="160" x2="640" y2="160" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="580" y="144" width="60" height="22" fill="#1a1d24" rx="2"/>
  <text x="610" y="160" text-anchor="middle" class="mono">pull</text>

  <!-- 4. Running containers -->
  <g transform="translate(640,90)">
    <rect width="130" height="140" fill="#fff" stroke="#10a37f" stroke-width="2" rx="4"/>
    <text x="65" y="24" text-anchor="middle" class="label" fill="#10a37f">4. Run</text>
    <line x1="14" y1="32" x2="116" y2="32" stroke="#cfd5db"/>
    <rect x="20" y="42" width="40" height="40" fill="#d1fae5" stroke="#10a37f"/>
    <text x="40" y="66" text-anchor="middle" class="small">c1</text>
    <rect x="70" y="42" width="40" height="40" fill="#d1fae5" stroke="#10a37f"/>
    <text x="90" y="66" text-anchor="middle" class="small">c2</text>
    <rect x="20" y="88" width="40" height="40" fill="#d1fae5" stroke="#10a37f"/>
    <text x="40" y="112" text-anchor="middle" class="small">c3</text>
    <rect x="70" y="88" width="40" height="40" fill="#d1fae5" stroke="#10a37f"/>
    <text x="90" y="112" text-anchor="middle" class="small">c4</text>
  </g>

  <!-- Bottom note -->
  <text x="40" y="280" class="small" font-weight="600">Why this matters</text>
  <text x="40" y="302" class="small">- the image is the unit of deployment — once built, it's identical everywhere (dev, staging, prod)</text>
  <text x="40" y="318" class="small">- the registry is the source of truth — production never builds its own images</text>
  <text x="40" y="334" class="small">- the run step is cheap — pull is incremental (only new layers), start is sub-second</text>
  <text x="40" y="350" class="small">- the same image runs 1 container or 100; horizontal scale = "docker run" times N</text>
</svg>
