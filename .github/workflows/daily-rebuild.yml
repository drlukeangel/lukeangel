name: Daily rebuild

# The site is statically built and already auto-deploys on every push to the
# production branch. Date-gated posts (future-dated entries filtered out at
# build time by src/lib/posts.ts) only appear when the site is rebuilt — so
# this job pushes one empty commit per day to trigger the normal deploy,
# advancing "today" and publishing anything whose date has arrived.
#
# No extra setup required: it reuses the existing GitHub -> Vercel build.
# The default GITHUB_TOKEN can push to the repo.

on:
  schedule:
    # 10:00 UTC = 06:00 America/New_York during EDT. GitHub cron is UTC and
    # ignores DST, so during EST this fires at 05:00 ET. Either way it's the
    # morning rebuild that picks up that day's date-gated posts. Note: blog
    # posts dated 09:00 ET won't appear until the *next* day's run since 6am
    # precedes them; midnight-dated gratitude publishes same morning.
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # manual "run now" from the Actions tab

# Update this if the production branch is not "master".
env:
  DEPLOY_BRANCH: master

jobs:
  nudge-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}
      - name: Push empty commit to trigger a deploy
        run: |
          git config user.name  "site-scheduler[bot]"
          git config user.email "site-scheduler@users.noreply.github.com"
          git commit --allow-empty -m "chore: daily rebuild to publish scheduled posts"
          git push origin "${{ env.DEPLOY_BRANCH }}"
