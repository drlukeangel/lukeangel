name: Daily rebuild

# Re-deploys the site once a day so date-gated posts (future-dated entries that
# are filtered out at build time by src/lib/posts.ts) go live on their date
# without a manual push. The site is statically built, so "today" is frozen at
# build time — this scheduled rebuild advances it.
#
# Setup (one time):
#   1. Vercel → Project → Settings → Git → Deploy Hooks → create a hook on the
#      production branch. Copy the URL.
#   2. GitHub → repo → Settings → Secrets and variables → Actions → New secret
#      named VERCEL_DEPLOY_HOOK with that URL.

on:
  schedule:
    # 13:15 UTC = 09:15 America/New_York during EDT (just after the 09:00 ET
    # post time, so that day's blog post and midnight-dated gratitude both
    # become visible in the same run). GitHub cron is always UTC and does not
    # observe DST; during EST this fires at 08:15 ET, which is still fine.
    - cron: "15 13 * * *"
  workflow_dispatch: {}  # allow a manual "run now" from the Actions tab

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK secret is not set — skipping." >&2
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Deploy hook triggered."
